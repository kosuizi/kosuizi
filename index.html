    const mainWeight=Math.max(0.3,1-(daysToMain>365?1:daysToMain/365)*0.5);

    digerPlanlar.forEach(({race:r,plan:dp2})=>{
      // Bu hafta diğer yarışın planında karşılık geldiği haftayı bul
      const match=dp2.find(w2=>{
        const diff=Math.abs(w2.weekStart-wk.weekStart);
        return diff<7*864e5;
      });
      if(!match||match.targetKm<=0)return;
      // Uzak yarışlar daha az ağırlık
      const daysToOther=Math.ceil((new Date(r.tarih+'T12:00:00')-wk.weekStart)/864e5);
      if(daysToOther<0)return; // Geçmiş yarış
      const otherWeight=Math.max(0.1,0.5*(1-(daysToOther>365?1:daysToOther/365)*0.7));
      kmSum+=match.targetKm*otherWeight;
      dpSum+=match.targetDp*otherWeight;
      weightSum+=otherWeight;
    });

    const optKm=round1(kmSum/weightSum);
    const optDp=Math.round(dpSum/weightSum);

    // En kısıtlayıcı fazı seç (Taper > Zirve > Gelişme > Temel)
    const fazOnc={Taper:4,Zirve:3,Gelişme:2,Temel:1,'Yarış Sonrası':0};
    let enKısıtlayıcıFaz=wk.phase;
    digerPlanlar.forEach(({plan:dp2})=>{
      const match=dp2.find(w2=>Math.abs(w2.weekStart-wk.weekStart)<7*864e5);
      if(match&&(fazOnc[match.phase]||0)>(fazOnc[enKısıtlayıcıFaz]||0))
        enKısıtlayıcıFaz=match.phase;
    });

    // Faz Taper ise km'yi orijinal taper hedefine sınırla
    const finalKm=enKısıtlayıcıFaz==='Taper'?Math.min(optKm,wk.targetKm):optKm;
    const finalDp=enKısıtlayıcıFaz==='Taper'?Math.min(optDp,wk.targetDp):optDp;

    const changed=Math.abs(finalKm-wk.targetKm)>0.5||Math.abs(finalDp-wk.targetDp)>50;
    return{
      ...wk,
      targetKm:finalKm, targetDp:finalDp,
      phase:enKısıtlayıcıFaz,
      _optimize:changed,
      _origKm:wk.targetKm, _origDp:wk.targetDp
    };
  });
}

function calcWeeklyTargetsCore(athlete, races, workouts, primary, history=[]){
  if(!athlete||!primary)return[];
  const today=new Date();
  const raceDate=new Date(primary.tarih+'T12:00:00');
  const prepWeeks=parseInt(primary.prep_weeks)||16;
  const km=parseFloat(primary.mesafe)||0;
  const dp=parseFloat(primary.d_plus)||0;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';

  const taperW=parseInt(primary.taper_w)||(km>42?3:km>21?2:1);
  const peakW=parseInt(primary.peak_w)||(km>42?4:km>21?3:2);
  const buildW=prepWeeks-taperW-peakW;

  const siklikStr=athlete.dinlenme_siklik||'3x1';
  const [siklikBlok,siklikDin]=(siklikStr.split('x').map(Number));

  // Sporcunun mevcut CTL'sinden band hesapla — baseKm'i ölçekler
  // Daha yumuşak band etkisi: deneyimsiz sporcunun bile yarış-spesifik minimumu yakalayabilmesi için
  const last=history&&history.length>0?history[history.length-1]:null;
  const currentCtl=last?.ctl||0;
  const currentBand=ctlBand(currentCtl);
  // Band 1→0.75, 2→0.85, 3→1.00, 4→1.10, 5→1.20  (önceki: 0.60–1.15 arası, çok agresif)
  const bandKmMod=currentBand<=1?0.75:currentBand===2?0.85:currentBand===3?1.00:currentBand===4?1.10:1.20;

  // Geçmiş haftaların gerçekleşme durumunu hesapla — telafi için
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete.id);

  // Önce tüm haftaları hesapla (telafi için önce plan gerekli)
  // prepWeeks+1: son iterasyon yarış haftasının kendisi
  const baseWeeks=[];
  for(let w=0;w<prepWeeks+1;w++){
    const weekStart=new Date(raceDate);
    weekStart.setDate(raceDate.getDate()-(prepWeeks-w)*7);
    const dow=weekStart.getDay();
    const diffToMon=dow===0?-6:1-dow;
    weekStart.setDate(weekStart.getDate()+diffToMon);
    weekStart.setHours(0,0,0,0);
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);weekEnd.setHours(23,59,59,999);
    const daysToRace=Math.ceil((raceDate-weekStart)/864e5);
    const isCurrent=weekStart<=today&&weekEnd>=today;
    const isPast=weekEnd<today;

    // Son iterasyon (w===prepWeeks): yarış haftası — her zaman Taper
    const isRaceWeek=w===prepWeeks;

    let phase;
    if(isRaceWeek||w>=prepWeeks-taperW)phase='Taper';
    else if(w>=prepWeeks-taperW-peakW)phase='Zirve';
    else if(w>=buildW*0.5)phase='Gelişme';
    else phase='Temel';

    const isRecovery=(()=>{
      if(phase==='Taper')return false;
      // Zirve fazında da dinlenme haftası aktif
      const posInBlock=(w%siklikBlok);
      return posInBlock>=(siklikBlok-siklikDin);
    })();

    let kmPct;
    if(isRaceWeek){
      // Yarış haftası: çok düşük hacim — sadece açıcı koşular + yarış günü
      kmPct=0.20;
    } else if(phase==='Taper'){
      const taperIdx=w-buildW-peakW;
      let peakMissed=false;
      try{
        const targetLongKm=(km||0)*0.32;
        const twoWeeksAgo=new Date(today);twoWeeksAgo.setDate(today.getDate()-14);
        const bestPeakKm=(athWks||[]).filter(w=>{
          const d=new Date(w.date+'T12:00:00');
          return d>=twoWeeksAgo&&['uzun','tirmanis','back_to_back'].includes(w.tur||'');
        }).reduce((mx,w)=>Math.max(mx,parseFloat(w.mesafe)||0),0);
        peakMissed=taperIdx===0&&targetLongKm>0&&bestPeakKm<targetLongKm*0.7;
      }catch(e){}
      // Kademeli taper: %75 → %55 → %35
      kmPct=peakMissed?0.80:(taperIdx===0?0.75:taperIdx===1?0.55:0.35);
    } else if(phase==='Zirve'){
      // Zirve: dinlenme haftası %70, normal hafta %90–100 (önceki: %85–100)
      kmPct=isRecovery?0.70:0.90+0.05*(w-buildW-peakW+1);
      if(kmPct>1.0)kmPct=1.0;
    } else if(phase==='Gelişme'){
      // Gelişme: Temel'den daha yüksek taban, daha hızlı artış
      const prog=Math.min(1,(w-Math.floor(buildW*0.5)+1)/Math.ceil(buildW*0.5));
      kmPct=isRecovery?prog*0.55:0.55+prog*0.35;
    } else {
      // Temel: düşük taban, yavaş lineer artış
      const prog=Math.min(1,(w+1)/Math.floor(buildW*0.5));
      kmPct=isRecovery?prog*0.45:0.35+prog*0.30;
    }

    // baseKm: yarış mesafesine göre zirve hafta hedefi × sporcunun mevcut kondisyon band'ı
    // Yeni çarpanlar — Daniels/Pfitzinger/Hudson programlarına uyumlu zirve haftalık mesafe hedefleri
    // 5K→30km, 10K→50km, 21K→74km, 42K→84km, 50K→80km, 80K→96km, 100K→100km, 160K→128km
    const baseKmRaw=km<=5?km*6.0:km<=10?km*5.0:km<=21?km*3.5:km<=42?km*2.0:km<=60?km*1.6:km<=80?km*1.2:km<=120?km*1.0:km*0.80;
    const baseKm=round1(baseKmRaw*bandKmMod);
    const minKmHafta=baseKm*0.25; // Dinlenme haftaları dahil hiçbir hafta bunun altına düşmesin
    let targetKm=round1(Math.max(minKmHafta,baseKm*kmPct));
    // D+ — trail için %70 (önceki %60), yol için %25 (önceki %20). Zirve haftada race D+'sının ~%70'ine ulaşmalı
    const baseDp=isTrail?dp*0.70:dp*0.25;
    let targetDp=Math.round(baseDp*kmPct*(isRecovery?0.5:1));

    // Yarış haftası: yarışın kendi mesafe ve D+ değeri + hafta içindeki hafif açıcı antrenmanlar
    // Hafif açıcı hacim: baseKm × 0.15 (shake-out + strides için)
    if(isRaceWeek){
      const acikKm=round1(baseKm*0.15);
      const acikDp=Math.round(baseDp*0.15);
      targetKm=round1(km+acikKm);
      targetDp=Math.round(dp+acikDp);
    }

    // Geçmiş hafta gerçekleşen km ve dp
    let actualKm=0, actualDp=0;
    if(isPast){
      const wWks=athWks.filter(w=>{const d=new Date(w.date+'T12:00:00');return d>=weekStart&&d<=weekEnd;});
      actualKm=round1(wWks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
      actualDp=Math.round(wWks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0));
    }

    // Gerçekleşme durumu — antrenman bilimi: %85+ ideal, %70-85 hafif eksik, %40-70 eksik, <%40 başarısız, >%120 aşırı
    const kmRatio=targetKm>0?(actualKm/targetKm):null;
    let weekStatus='normal'; // normal | missed | deficit | ok | overshoot
    if(isPast&&kmRatio!==null){
      if(kmRatio<0.40)weekStatus='missed';
      else if(kmRatio<0.85)weekStatus='deficit';
      else if(kmRatio<=1.20)weekStatus='ok';
      else weekStatus='overshoot';
    }

    baseWeeks.push({
      weekIdx:w+1,weekStart,weekEnd,phase,isRecovery,isRaceWeek,
      targetKm,targetDp,daysToRace,
      isPast,isCurrent:weekStart<=today&&weekEnd>=today,
      actualKm,actualDp,kmRatio,weekStatus,
      _kmPct:kmPct,_baseKm:baseKm,_baseDp:baseDp,_isRecovery:isRecovery,_origTargetKm:targetKm,_origTargetDp:targetDp
    });
  }

  // ── Telafi & geri çekme mantığı (antrenman bilimi tabanlı) ────────────────
  // Prensipler:
  // 1. Eksik haftalar (deficit): kayıp yükün %50'si gelecek 2-3 haftaya yayılır
  // 2. Başarısız haftalar (missed, <%40): telafi yapılmaz — fitness kaybı, plan re-base
  // 3. Aşırı haftalar (overshoot, >%120): sonraki hafta %5-10 azaltılır (overtraining koruma)
  // 4. Telafi sadece Temel/Gelişme fazında uygulanır (Taper/Zirve'ye dokunulmaz)
  // 5. Maksimum tek hafta artışı %10 (10% rule — Daniels/Pfitzinger)
  // 6. Mevcut ACWR > 1.25 ise telafi uygulanmaz (sakatlık riski)

  let telafiKm=0, telafiDp=0;
  let overshootBackoff=0; // Bir sonraki haftada uygulanacak azaltma faktörü (0–0.10)
  const currentAcwr=last?.acwr||1.0;

  // Geçmiş "missed" hafta sayısı — fitness kaybı sinyali
  let missedCount=0;

  const weeks=baseWeeks.map((wk,i)=>{
    if(wk.isPast){
      // Geçmiş hafta bitti — telafi/backoff birikimini güncelle
      if(wk.weekStatus==='missed'){
        // Başarısız hafta — telafi yapılmaz, fitness kaybı sayacı
        missedCount++;
      } else if(wk.weekStatus==='deficit'){
        // Eksik hafta — kayıp yükün %50'si telafi havuzuna
        const eksikKm=Math.max(0,wk.targetKm-wk.actualKm);
        const eksikDp=Math.max(0,wk.targetDp-wk.actualDp);
        telafiKm+=eksikKm*0.50;
        telafiDp+=eksikDp*0.50;
      } else if(wk.weekStatus==='overshoot'){
        // Aşırı hafta — bir sonraki Temel/Gelişme haftasında %8 geri çekme
        overshootBackoff=Math.max(overshootBackoff,0.08);
      }
      return{...wk,telafiUygulandı:false,backoffUygulandı:false};
    }

    // Gelecek/mevcut hafta — Taper ve Zirve'ye dokunma
    if(wk.phase==='Taper'||wk.phase==='Zirve'){
      return{...wk,telafiUygulandı:false,backoffUygulandı:false};
    }

    // 1. Aşırı yük backoff'u (öncelik)
    if(overshootBackoff>0){
      const azaltKm=wk.targetKm*overshootBackoff;
      const azaltDp=wk.targetDp*overshootBackoff;
      const yeniKm=round1(wk.targetKm-azaltKm);
      const yeniDp=Math.round(wk.targetDp-azaltDp);
      overshootBackoff=0; // Tek seferlik
      return{...wk,targetKm:yeniKm,targetDp:yeniDp,backoffUygulandı:true,backoffPct:8,telafiUygulandı:false};
    }

    // 2. ACWR güvenlik: mevcut ACWR > 1.25 ise telafi yapma
    if(currentAcwr>1.25||telafiKm<=0){
      return{...wk,telafiUygulandı:false,backoffUygulandı:false};
    }

    // 3. Eksik telafi: maksimum hafta hedefinin %15'i kadar ek (10% rule güvenli sınırı)
    // Dinlenme haftalarına da telafi yapma (deload korunmalı)
    if(wk.isRecovery){
      return{...wk,telafiUygulandı:false,backoffUygulandı:false};
    }

    const buHaftaTelafi=Math.min(telafiKm,wk.targetKm*0.15);
    const buHaftaTelafiDp=Math.min(telafiDp,wk.targetDp*0.15);
    telafiKm=Math.max(0,telafiKm-buHaftaTelafi);
    telafiDp=Math.max(0,telafiDp-buHaftaTelafiDp);

    // 4. Birden fazla missed hafta varsa, gelecek haftaları %10 azalt (re-base)
    let missedRebase=0;
    if(missedCount>=2){
      missedRebase=0.10;
    }

    const finalKm=round1((wk.targetKm+buHaftaTelafi)*(1-missedRebase));
    const finalDp=Math.round((wk.targetDp+buHaftaTelafiDp)*(1-missedRebase));

    return{
      ...wk,
      targetKm:finalKm,
      targetDp:finalDp,
      telafiUygulandı:buHaftaTelafi>0,
      telafiKm:round1(buHaftaTelafi),
      telafiDp:Math.round(buHaftaTelafiDp),
      backoffUygulandı:false,
      missedRebase:missedRebase>0?Math.round(missedRebase*100):0
    };
  });

  return weeks;
}

// ── Zirve Hafta Ulaşılabilirlik Değerlendirmesi (Bağlam-Duyarlı) ─────────────
// Sporcunun bulunduğu faza göre farklı değerlendirmeler üretir:
//   - Yarış haftası: Başarı mesajı, yarış günü bilgileri
//   - Taper: Form zirvesi yaklaşıyor, hacim düşür mesajı
//   - Zirve: Bu haftanın hedefine uygunluk
//   - Zirve öncesi (Temel/Gelişme): Projeksiyon ile ulaşılabilirlik
// Döner: { status, message, currentWeek, actionItems[], peak*, projected*, gap* }
function evaluatePeakReachability(weeks, primary, athlete){
  if(!weeks||!weeks.length||!primary)return null;

  // Bulunduğu hafta — tüm analizin merkezi
  const currentWeek=weeks.find(w=>w.isCurrent);
  if(!currentWeek)return null;

  const peakWeeks=weeks.filter(w=>w.phase==='Zirve'&&!w._isRecovery);
  const peakKm=peakWeeks.length?Math.max(...peakWeeks.map(w=>w.targetKm)):0;
  const peakDp=peakWeeks.length?Math.max(...peakWeeks.map(w=>w.targetDp)):0;

  // Yarış gününe kalan gün sayısı
  const today=new Date();
  const raceDate=new Date(primary.tarih+'T12:00:00');
  const daysToRace=Math.ceil((raceDate-today)/864e5);

  const baseResult={
    currentWeek,peakKm,peakDp,
    currentTargetKm:currentWeek.targetKm,
    currentTargetDp:currentWeek.targetDp,
    currentActualKm:currentWeek.actualKm,
    currentActualDp:currentWeek.actualDp,
    phase:currentWeek.phase,
    daysToRace
  };

  // ── YARIŞ HAFTASI ──
  if(currentWeek.isRaceWeek){
    return{
      ...baseResult,
      status:'race',
      title:'🏁 Yarış Haftası',
      message:daysToRace<=0?'Bugün yarış günün — başarılar! 🎯':
              daysToRace===1?'Yarın yarış günün — son hazırlıklar, iyi uyu, iyi beslen':
              `Yarışa ${daysToRace} gün kaldı — son açıcı antrenmanlar ve taper`,
      actionItems:[
        '⚡ Kısa açıcı koşu + strides (15-25 dk)',
        '💧 Hidrasyon ve karbonhidrat yüklemesi',
        '😴 Uyku öncelikli — 7-9 saat kaliteli uyku',
        '🎯 Bu hafta hedefi: Yarış ('+primary.mesafe+'km / D+ '+primary.d_plus+'m) + '+round1(currentWeek.targetKm-primary.mesafe)+'km açıcı'
      ]
    };
  }

  // ── TAPER FAZI ──
  if(currentWeek.phase==='Taper'){
    const taperWeeksLeft=weeks.filter(w=>w.phase==='Taper'&&!w.isPast&&!w.isCurrent).length;
    return{
      ...baseResult,
      status:'taper',
      title:'🔽 Taper Fazı',
      message:`Yarışa ${daysToRace} gün kaldı — form zirvesi inşa ediliyor. Hacmi kademeli düşür, yoğunluğu koru.`,
      actionItems:[
        `📉 Bu hafta hedefi: ${currentWeek.targetKm}km / D+ ${currentWeek.targetDp}m (zirve haftanın %${Math.round(currentWeek.targetKm/Math.max(1,peakKm)*100)}'i)`,
        '🎯 Yoğunluğu koru — hız ve eşik çalışmaları kısalt ama bırakma',
        '💪 Kuvvet antrenmanlarını %50 azalt, ağırlığı hafiflet',
        '😴 Uyku ve toparlanmaya öncelik ver — form bu hafta inşa ediliyor',
        taperWeeksLeft>0?`⏳ ${taperWeeksLeft} taper haftası daha var`:'🏁 Bir sonraki hafta yarış!'
      ]
    };
  }

  // ── ZİRVE FAZI ──
  if(currentWeek.phase==='Zirve'){
    const kmDone=currentWeek.actualKm;
    const dpDone=currentWeek.actualDp;
    const kmTarget=currentWeek.targetKm;
    const dpTarget=currentWeek.targetDp;
    const kmPct=kmTarget>0?Math.round(kmDone/kmTarget*100):0;
    const dpPct=dpTarget>0?Math.round(dpDone/dpTarget*100):0;
    const peakWeeksLeft=weeks.filter(w=>w.phase==='Zirve'&&!w.isPast&&!w.isCurrent&&!w._isRecovery).length;

    let status='peak_ok',title='⛰️ Zirve Fazı',message,actionItems=[];
    const kmGap=Math.max(0,round1(kmTarget-kmDone));
    const dpGap=Math.max(0,Math.round(dpTarget-dpDone));

    if(currentWeek.isRecovery){
      status='peak_recovery';
      title='⛰️ Zirve Fazı — Dinlenme Haftası';
      message=`Dinlenme haftasındasın — hacim %${Math.round(currentWeek._kmPct*100)} indirildi. Süper kompanzasyon için toparlanmayı önceliklendir.`;
      actionItems=[
        `📊 Bu hafta hedefi: ${kmTarget}km / D+ ${dpTarget}m (hafif)`,
        '💆 Kolay Z1-Z2 koşular, yoga/pilates, esneme',
        '🔄 Bir sonraki hafta tam yüke döneceksin'
      ];
    } else if(kmPct>=85&&dpPct>=85){
      status='peak_ok';
      title='⛰️ Zirve Fazı — Hedefte';
      message=`✓ Bu haftanın zirve hedefine ulaştın (Mesafe %${kmPct}, D+ %${dpPct}). Tutarlılığı koru.`;
      actionItems=[
        `📊 Bu hafta: ${kmDone}/${kmTarget}km · D+ ${dpDone}/${dpTarget}m`,
        peakWeeksLeft>0?`⏳ ${peakWeeksLeft} zirve haftası daha var`:'🔽 Bir sonraki hafta Taper başlıyor',
        '🎯 Uzun koşu ve tırmanışlı anahtar antrenmanları önceliklendir'
      ];
    } else {
      status='peak_behind';
      title='⛰️ Zirve Fazı — Açık Var';
      message=`Bu haftanın zirve hedefine henüz ulaşılmadı. Kalan günlerde ${kmGap>0?kmGap+'km ':''}${dpGap>0?'+ D+ '+dpGap+'m':''} gerekli.`;
      const kalanGun=Math.max(1,Math.ceil((currentWeek.weekEnd-today)/864e5));
      actionItems=[
        `📊 Bu hafta: ${kmDone}/${kmTarget}km · D+ ${dpDone}/${dpTarget}m`,
        kmGap>0?`🏃 Kalan ${kalanGun} günde ${kmGap}km — günlük ortalama ~${round1(kmGap/kalanGun)}km`:null,
        dpGap>0?`⛰️ D+ açığı ${dpGap}m — en az 1 tırmanışlı antrenman ekle`:null,
        '⚠ Çok yüksek haftalık artış riskli (ACWR) — yarın uzun koşu planla'
      ].filter(Boolean);
    }

    return{...baseResult,status,title,message,actionItems};
  }

  // ── GELİŞME / TEMEL FAZI (Zirve öncesi) ──
  // Bu aşamada geleceğe yönelik projeksiyon mantıklı
  const pastWeeks=weeks.filter(w=>w.isPast&&w.targetKm>0);
  const recent=pastWeeks.slice(-4);
  const recentKmRatio=recent.length?recent.reduce((s,w)=>s+(w.kmRatio||0),0)/recent.length:1;
  const recentDpRatio=recent.length?recent.reduce((s,w)=>s+(w.targetDp>0?w.actualDp/w.targetDp:1),0)/recent.length:1;

  const lastDoneKm=recent.length?recent[recent.length-1].actualKm:currentWeek.targetKm*0.5;
  const lastDoneDp=recent.length?recent[recent.length-1].actualDp:currentWeek.targetDp*0.5;

  const currentIdx=weeks.findIndex(w=>w.isCurrent);
  const firstPeakIdx=weeks.findIndex(w=>w.phase==='Zirve');
  const weeksToFirstPeak=firstPeakIdx>=0&&currentIdx>=0?Math.max(0,firstPeakIdx-currentIdx):0;

  // 10% rule
  const maxReachableKm=weeksToFirstPeak>0?round1(lastDoneKm*Math.pow(1.10,weeksToFirstPeak)):lastDoneKm;
  const maxReachableDp=weeksToFirstPeak>0?Math.round(lastDoneDp*Math.pow(1.10,weeksToFirstPeak)):lastDoneDp;

  const projectedPeakKm=round1(Math.min(peakKm,maxReachableKm)*Math.min(1,recentKmRatio+0.1));
  const projectedPeakDp=Math.round(Math.min(peakDp,maxReachableDp)*Math.min(1,recentDpRatio+0.1));

  const gapKm=round1(peakKm-projectedPeakKm);
  const gapDp=Math.round(peakDp-projectedPeakDp);
  const kmGapPct=peakKm>0?gapKm/peakKm:0;
  const dpGapPct=peakDp>0?gapDp/peakDp:0;
  const worstGap=Math.max(kmGapPct,dpGapPct);

  // Bu haftanın ideal hedefi
  const currentKmPct=currentWeek.targetKm>0?Math.round(currentWeek.actualKm/currentWeek.targetKm*100):0;
  const currentDpPct=currentWeek.targetDp>0?Math.round(currentWeek.actualDp/currentWeek.targetDp*100):0;

  const phaseLabel=currentWeek.phase==='Gelişme'?'📈 Gelişme Fazı':'🏗️ Temel Fazı';
  let status,title,message,actionItems=[];

  const currentIsRecovery=currentWeek.isRecovery;

  if(currentIsRecovery){
    status='recovery';
    title=`${phaseLabel} — Dinlenme Haftası`;
    message=`Dinlenme haftasındasın — hacim ${Math.round(currentWeek._kmPct*100)}%'e indirildi. Toparlanma için ideal.`;
    actionItems=[
      `📊 Bu hafta hedefi: ${currentWeek.targetKm}km / D+ ${currentWeek.targetDp}m`,
      '💆 Kolay koşular + çapraz antrenman',
      '🔄 Bir sonraki hafta tam yüke döneceksin'
    ];
  } else if(worstGap<=0.05){
    status='ideal';
    title=phaseLabel;
    message=`✓ Mevcut trendle zirve hedeflere ulaşılacak. Bu hafta hedefin: ${currentWeek.targetKm}km / D+ ${currentWeek.targetDp}m`;
    actionItems=[
      `📊 Bu hafta: ${currentWeek.actualKm}/${currentWeek.targetKm}km (%${currentKmPct}) · D+ ${currentWeek.actualDp}/${currentWeek.targetDp}m (%${currentDpPct})`,
      `⏳ Zirveye ${weeksToFirstPeak} hafta`,
      '🎯 Tutarlılığı koru — değişiklik gerekmez'
    ];
  } else if(worstGap<=0.20){
    status='risk';
    title=phaseLabel+' — Dikkat';
    message=`⚠ Zirve hedeflere ulaşmak için tutarlılık artırılmalı. Bu haftaya odaklan: ${currentWeek.targetKm}km / D+ ${currentWeek.targetDp}m`;
    actionItems=[
      `📊 Bu hafta: ${currentWeek.actualKm}/${currentWeek.targetKm}km (%${currentKmPct}) · D+ ${currentWeek.actualDp}/${currentWeek.targetDp}m (%${currentDpPct})`,
      `📉 Projeksiyon zirve: ${projectedPeakKm}km (hedef ${peakKm}km)`,
      gapKm>0?`🎯 Haftalık ortalama +${round1(gapKm/Math.max(1,weeksToFirstPeak))}km artış gerekli`:null,
      gapDp>0?`⛰️ D+ için haftada +${Math.round(gapDp/Math.max(1,weeksToFirstPeak))}m ekle`:null,
      '✓ 10% rule içinde kalarak sürdürülebilir artış'
    ].filter(Boolean);
  } else {
    status='unlikely';
    title=phaseLabel+' — Plan Revizesi Önerilir';
    message=`Mevcut trendle zirve hedeflere ulaşılması zor. Şu an odaklanılacak: bu hafta ${currentWeek.targetKm}km / D+ ${currentWeek.targetDp}m`;
    actionItems=[
      `📊 Bu hafta: ${currentWeek.actualKm}/${currentWeek.targetKm}km (%${currentKmPct}) · D+ ${currentWeek.actualDp}/${currentWeek.targetDp}m (%${currentDpPct})`,
      `📉 Projeksiyon: ${projectedPeakKm}km vs hedef ${peakKm}km (açık %${Math.round(kmGapPct*100)})`,
      `⏳ Zirveye ${weeksToFirstPeak} hafta — mevcut trend yeterli değil`,
      '💡 Öneri 1: Hazırlık süresini uzat (yarış tarihini erteleme mümkünse)',
      '💡 Öneri 2: Yarış hedefini daha kısa mesafeye revize et',
      '💡 Öneri 3: Antrenman sıklığını artır (haftada +1 gün)',
      gapDp>peakDp*0.3?'⛰️ Tırmanışlı antrenmanları öncelikli ekle':null
    ].filter(Boolean);
  }

  return{
    ...baseResult,
    status,title,message,actionItems,
    projectedPeakKm,projectedPeakDp,
    gapKm,gapDp,
    recentKmRatio:round1(recentKmRatio),
    weeksToFirstPeak
  };
}

// ── Günün Antrenmanı Motoru (yeniden yazıldı) ─────────────────────────────────

function recommendWorkout(athlete, history, races, workoutsThisWeek, allWorkouts, planMode='optimize', planTodayDay=null){
  if(!athlete) return null;
  const last=history[history.length-1];
  const today=new Date();
  const dayShort=DAYS_SHORT[today.getDay()];
  const dayOfWeek=DAYS_TR[today.getDay()];

  // ── Temel fitness metrikleri ──────────────────────────────────────────────
  const ctl=last?.ctl||0;
  const tsb=last?.tsb||0;
  const acwr=last?.acwr||1.0;
  const mechCtl=last?.mechCtl||0;
  const mechAtl=last?.mechAtl||0;
  const phase=last?.phase||'Temel';

  // ── Sporcu profili ────────────────────────────────────────────────────────
  const hrv=athlete.hrv_durum||'';
  const hrv7=parseSayi(athlete.hrv_7gun)||0;
  const inj=parseInt(athlete.sakatlık)||1;
  const motiv=parseInt(athlete.motivasyon)||3;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';
  const uzunGun=Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean);
  const kosuGunleri=athlete.kosu_gunleri||[];
  const caprazGunleri=athlete.capraz_gunleri||[];
  const lthr=parseSayi(athlete.lthr)||0;
  const ftp=parseSayi(athlete.ftp)||0;
  const vo2max=parseSayi(athlete.vo2max)||0;
  const zones=calcZones(athlete);
  const band=ctlBand(ctl);

  // ── Yarış bilgileri ───────────────────────────────────────────────────────
  const {primary:nextRace,intermediate}=selectRaces(athlete,races);
  const daysToRace=nextRace?Math.ceil((new Date(nextRace.tarih+'T12:00:00')-today)/864e5):null;

  // ── Bu haftanın yükü ──────────────────────────────────────────────────────
  const wkMetrics=(workoutsThisWeek||[]).map(w=>({w,m:calcMetrics(w,athlete)}));
  const wkLoad=round1(wkMetrics.reduce((s,{m})=>s+(m.yukObj||0),0));
  const wkSessions=(workoutsThisWeek||[]).length;
  const wkKm=round1((workoutsThisWeek||[]).reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
  const targetWeeklyLoad=ctl>0?round1(ctl*7):null;
  const remainingLoad=targetWeeklyLoad?Math.max(0,round1(targetWeeklyLoad-wkLoad)):null;

  // ── IF trendi ─────────────────────────────────────────────────────────────
  const wkIFs=wkMetrics.map(({m})=>m.IF).filter(v=>v>0);
  const meanIF=wkIFs.length?round2(wkIFs.reduce((s,v)=>s+v,0)/wkIFs.length):null;
  const ifOverloaded=meanIF!=null&&meanIF>0.90;

  // ── Güç yükü analizi ─────────────────────────────────────────────────────
  const wkHasPower=wkMetrics.some(({w})=>parseFloat(w.ort_guc)>0);
  const wkPTSS=wkMetrics.reduce((s,{m})=>s+(m.pTSS||0),0);
  const powerOverload=wkHasPower&&wkPTSS>0&&wkLoad>0&&(wkPTSS/wkLoad)>1.30;

  // ── Aerobik verimlilik trendi ─────────────────────────────────────────────
  const recentAerEff=history.slice(-28).filter(d=>d.aerEff!=null).map(d=>d.aerEff);
  const olderAerEff=history.slice(-56,-28).filter(d=>d.aerEff!=null).map(d=>d.aerEff);
  const avgRecent=recentAerEff.length?recentAerEff.reduce((s,v)=>s+v,0)/recentAerEff.length:null;
  const avgOlder=olderAerEff.length?olderAerEff.reduce((s,v)=>s+v,0)/olderAerEff.length:null;
  const aerEffDecline=avgRecent!=null&&avgOlder!=null&&(avgRecent-avgOlder)>5;

  // ── Nöromüsküler yük oranı ────────────────────────────────────────────────
  const mechRatio=ctl>5?(mechCtl/ctl):0;
  const mechOverload=mechRatio>0.18;

  // ── Mekanik ATL/CTL oranı (akut mekanik aşırı yük) ───────────────────────
  const mechAtlCtlRatio=(mechCtl>0)?(mechAtl/mechCtl):1;
  const mechAclOverload=mechAtlCtlRatio>1.3;

  // ── Mekanik/Kardiyovasküler denge ─────────────────────────────────────────
  // Mech CTL / Kardio CTL < 0.6 → kaslar/tendonlar kardiyovasküler sisteme yetişemiyor
  const mechKardioRatio=ctl>5?(mechCtl/ctl):null;
  const mechKardioImbalance=mechKardioRatio!==null&&mechKardioRatio<0.6;

  // ── HRV 7g düşüklüğü ─────────────────────────────────────────────────────
  const hrv7Low=hrv7>0&&hrv7<50;

  // ── VO2max/CTL uyumu ─────────────────────────────────────────────────────
  const ctlVo2Ratio=vo2max>0?ctl/vo2max:0;
  const ctlNearCap=ctlVo2Ratio>1.8;

  // ── Haftalık km hedef ─────────────────────────────────────────────────────
  const weekTargets=calcWeeklyTargets(athlete,races,allWorkouts||[],planMode==='optimize',history||[]);
  const thisWeekTarget=weekTargets.find(wt=>wt.isCurrent);
  const targetKm=thisWeekTarget?.targetKm||0;
  // ── Haftalık km hedefi — ±%15 tolerans penceresi ─────────────────────────
  // Kalan koşu günlerine km'yi dengeli dağıt
  const kmToleransAlt=targetKm*0.85;
  const kmToleransUst=targetKm*1.15;
  const kmDeficit=targetKm>0&&wkKm<kmToleransAlt&&wkSessions>=2;
  const kmFazla=targetKm>0&&wkKm>kmToleransUst;
  // Kalan koşu günü tahmini (bugün dahil)
  const kalanKosuGunSayisi=Math.max(1,wkStats.kalanKosuGun||1);
  const kmHedefKalan=Math.max(0,kmToleransAlt-wkKm); // tolerans altına girmemek için gereken km
  const kmGunBasiHedef=kmHedefKalan/kalanKosuGunSayisi; // her güne düşen ortalama

  // ── Gün belirleme ─────────────────────────────────────────────────────────
  const isKosuGunu=kosuGunleri.includes(dayShort);
  const isCaprazGunu=caprazGunleri.includes(dayShort);
  const isUzunGun=uzunGun.includes(dayShort);
  const isAntrenmanGunu=isKosuGunu||isCaprazGunu;

  // ── Uyarı ve blokerlar ────────────────────────────────────────────────────
  const warnings=[];
  const blockers=[];
  if(inj>=8) blockers.push({icon:'🚑',text:'Sakatlık puanı '+inj+'/10 — antrenman önerilmez.'});
  if(acwr>1.5) blockers.push({icon:'⚠',text:'ACWR '+acwr.toFixed(2)+' — aşırı yük riski. Dinlenme zorunlu.'});
  if(hrv==='düşük') warnings.push({icon:'📉',text:'HRV düşük — hafif toparlanma.'});
  if(hrv==='dengesiz') warnings.push({icon:'📊',text:'HRV dengesiz — Z3 üzerine çıkmayın.'});
  if(hrv7Low) warnings.push({icon:'📉',text:'HRV 7g ortalaması '+hrv7+'ms — kümülatif stres. Yoğunluk sınırlı.'});
  if(inj>=5&&inj<8) warnings.push({icon:'🩹',text:'Sakatlık '+inj+'/10 — yoğunluğu sınırlı tutun.'});
  if(tsb< -20) warnings.push({icon:'✨',text:'TSB '+tsb.toFixed(1)+' — ciddi yorgunluk.'});
  if(acwr>1.3) warnings.push({icon:'📈',text:'ACWR '+acwr.toFixed(2)+' — yük kontrolü.'});
  if(motiv<=2) warnings.push({icon:'✨',text:'Motivasyon düşük — kısa ve keyifli.'});
  if(daysToRace!=null&&daysToRace<=7){
    // Jenerik "taper" yerine planDay'in verdiği spesifik uyarıyı kullan (varsa)
    // planDay kosuUyari → tpl.uyari olarak taşınır; bu zaten antrenmanı tanımlar
    // Eğer tpl.uyari yoksa (ör. override edildi) jenerik mesaj
    const taperMesaj=tpl?.uyari||('Yarışa '+daysToRace+' gün kaldı — taper, yük düşük.');
    warnings.push({icon:'🏁',text:taperMesaj});
  }
  if(ifOverloaded) warnings.push({icon:'⚡',text:'Son hafta IF ortalaması '+meanIF+' — kronik yüksek yoğunluk. Aerobik taban gerekli.'});
  if(powerOverload) warnings.push({icon:'💪',text:'Güç yükü HR yükünden orantısız yüksek — nöromüsküler aşırı yük riski.'});
  if(aerEffDecline) warnings.push({icon:'📉',text:'Aerobik verimlilik son 4 haftada kötüleşiyor (aynı nabızda daha yavaş) — yorgunluk birikimi işareti.'});
  if(mechOverload) warnings.push({icon:'🏔',text:'Mekanik yük oranı yüksek (%'+Math.round(mechRatio*100)+') — düz antrenman önerilir.'});
  if(mechAclOverload) warnings.push({icon:'🦵',text:'Akut mekanik yük kronik ortalamanın çok üzerinde (ATL/CTL: '+round1(mechAtlCtlRatio)+') — tendon/kas dokusu aşırı yük riski.'});
  if(mechKardioImbalance) warnings.push({icon:'🫀',text:'Kardiyovasküler kondisyon mekanik kondisyonun önünde (Mech/Kardio: '+round1(mechKardioRatio)+') — bu hafta mekanik yük yerine aerobik öncelikli.'});
  if(ctlNearCap) warnings.push({icon:'🔝',text:'CTL/VO2max oranı yüksek ('+ctlVo2Ratio.toFixed(2)+') — fitness tavan yakın. Hacmi koruyun.'});
  if(kmDeficit) warnings.push({icon:'📏',text:`Km hedefinin gerisinde (${wkKm}/${targetKm}km, -%${Math.round((1-wkKm/targetKm)*100)}). Süre ayarlandı.`});
  if(kmFazla) warnings.push({icon:'📏',text:`Km hedefini aştı (${wkKm}/${targetKm}km, +%${Math.round((wkKm/targetKm-1)*100)}). Süre kısaltılabilir.`});

  if(blockers.length>0||!isAntrenmanGunu){
    return{tip:'dinlenme',baslik:'Dinlenme',aciklama:blockers.length>0?blockers[0].text:'Bugün antrenman programında yok.',sure_dk:0,yapilar:[],warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1};
  }

  // ── yMod: tüm toparlanma sinyalleri birleşik ─────────────────────────────
  let yMod=hrvMod(hrv);
  if(inj>=5)        yMod=Math.min(yMod,0.80);
  if(tsb< -20)      yMod=Math.min(yMod,0.80);
  else if(tsb< -15) yMod=Math.min(yMod,0.85);
  if(acwr>1.4)      yMod=Math.min(yMod,0.80);
  else if(acwr>1.3) yMod=Math.min(yMod,0.88);
  if(motiv<=2)      yMod=Math.min(yMod,0.85);
  if(hrv7Low)       yMod=Math.min(yMod,0.85);
  if(aerEffDecline) yMod=Math.min(yMod,0.90);
  if(powerOverload) yMod=Math.min(yMod,0.88);
  if(mechAclOverload) yMod=Math.min(yMod,0.82); // akut mekanik aşırı yük → belirgin düşüş

  const kaliteliYapildi=(workoutsThisWeek||[]).some(w=>['interval','esik','tempo','yokus_kisa','yokus_uzun'].includes(w.tur));
  const uzunYapildi=(workoutsThisWeek||[]).some(w=>['uzun','tirmanis'].includes(w.tur));

  const athAllWorkouts=(allWorkouts||[]).filter(w=>w.athleteId===athlete.id);
  const zoneDist4w=calcPeriodZoneDist(athAllWorkouts,athlete,4);
  const zoneStatus=zoneDist4w?zoneDist_status(zoneDist4w):null;
  if(zoneStatus){
    zoneStatus.issues.forEach(i=>warnings.push({icon:'📊',text:i.msg}));
    if(zoneStatus.flags.length>0) warnings.push({icon:'💡',text:zoneStatus.flags[0].msg});
  }
  const anaPctHigh=zoneDist4w&&zoneDist4w.anaPct>15;
  const lowPctLow=zoneDist4w&&zoneDist4w.lowPct<65;
  const dpHedefGun=thisWeekTarget&&!uzunYapildi?Math.round(thisWeekTarget.targetDp*0.6):0;

  // ── Disiplin bayrakları ───────────────────────────────────────────────────
  const isYol=disiplin==='yol';
  const isUltra=disiplin==='ultra';
  const isKarma=disiplin==='karma';
  const isPatika=disiplin==='patika';
  const b2bYapildi=(workoutsThisWeek||[]).filter(w=>w.tur==='uzun').length>=2;
  const karmaYolYapildi=(workoutsThisWeek||[]).some(w=>w.spor==='kosu'&&!w.yapi_notu?.includes('arazi')&&['aerobik','tempo','esik','interval'].includes(w.tur));

  // Zorunlu toparlanma sinyalleri
  // mechAclOverload: akut mekanik aşırı yük → yoğun/mekanik antrenman iptal
  // mechKardioImbalance: kaslar kardiyoya yetişemiyor → mekanik yük yerine aerobik
  const acwrOverload=acwr>1.3; // ACWR 1.3+ → yoğun antrenman engelle
  const forceEasy=anaPctHigh||ifOverloaded||mechOverload||mechAclOverload||acwrOverload||(powerOverload&&wkSessions>=2);
  // Zone dağılımı kritik bozuksa (lowPct<%65) kaliteliYapildi'ye bakmaksızın yoğun antrenman engelle
  // Bir günlük aerobik 4 haftalık dengesizliği telafi edemez
  const zoneCritical=lowPctLow&&(zoneDist4w?.lowPct||100)<55; // %55 altı kritik eşik
  const forceLow=(lowPctLow&&!kaliteliYapildi&&wkSessions>=1)||mechKardioImbalance||zoneCritical;

  // ── planDay'den bugünün temel önerisini al ───────────────────────────────
  // wkStats: planDay'in ihtiyacı olan haftalık durum
  // Son uzun koşular — tplUzun progresyon hesabı için
  // Etiketten bağımsız, her haftanın en uzun koşusu
  const recentLongRunsForPlan = (()=>{
    const kosuWks = (allWorkouts||[]).filter(w=>w.athleteId===athlete.id&&w.date&&(w.spor==='kosu'||!w.spor));
    const byWeek = {};
    kosuWks.forEach(w=>{
      const d = new Date(w.date+'T12:00:00');
      const day = d.getDay();
      const diffToMon = day===0?-6:1-day;
      const mon = new Date(d); mon.setDate(d.getDate()+diffToMon);
      const wk = mon.toISOString().split('T')[0];
      const sureDk = Math.round((toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0)/60);
      const km = parseFloat(w.mesafe)||0;
      const efektifDk = sureDk || Math.round(km*5);
      if(!byWeek[wk]||efektifDk>byWeek[wk].sure_dk){
        byWeek[wk]={date:w.date, sure_dk:efektifDk, km};
      }
    });
    return Object.values(byWeek)
      .filter(w=>w.sure_dk>30)
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
      .slice(0,6);
  })();

  const wkStatsForPlan={
    count:wkSessions,
    kaliteliYok:!kaliteliYapildi,
    uzunYapildi,
    wkLoad,
    dpHedefHafta:thisWeekTarget?.targetDp||0,
    weekOff: Math.floor((history.length||0)/7),
    isFutureWeek: false,
    recentLongRuns: recentLongRunsForPlan,
  };
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const simStateToday={
    atl:last?.atl||0, ctl:last?.ctl||0,
    tsb:last?.tsb||0, acwr:last?.acwr||1.0,
    mechCtl:last?.mechCtl||0, mechAtl:last?.mechAtl||0
  };
  const {primary:nextRaceForPlan,intermediate:intermediateForPlan}=selectRaces(athlete,races);
  const daysToIntermediate=intermediateForPlan.length
    ?Math.ceil((new Date(intermediateForPlan[0].tarih+'T12:00:00')-today)/864e5):null;

  // planTodayDay varsa (generateTwoWeekPlan'dan geldi) onu kullan — haftalık planla tutarlılık
  // yoksa planDay'i doğrudan çağır (fallback)
  let tpl=planTodayDay||planDay(todayStr,athlete,simStateToday,phase,daysToRace,daysToIntermediate,
    wkStatsForPlan,kosuGunleri,caprazGunleri);

  // Dinlenme veya antrenman günü değilse hemen dön
  if(tpl.tip==='dinlenme'||!isAntrenmanGunu){
    return{...tpl,warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,
      phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1,
      zoneDist4w,zoneStatus};
  }

  // ── Güncel durum override'ları ────────────────────────────────────────────
  // Bloker varsa dinlenmeye zorla
  if(blockers.length>0){
    return{tip:'dinlenme',baslik:'Dinlenme',
      aciklama:blockers[0].text,sure_dk:0,yapilar:[],
      warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,
      phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1,
      zoneDist4w,zoneStatus};
  }

  // yMod ile süreyi güncelle — planDay kendi yMod'unu kullandı, biz güncel sinyallerle yeniden uygularız
  tpl={...tpl, sure_dk:Math.round((tpl.sure_dk||45)*yMod)};

  // Tüm yoğun antrenman türleri
  const YOGUN_TURLER=['interval','esik','tempo','yokus_kisa','yokus_uzun',
    'piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','tirmanis'];

  // ── Toparlanma süresi kontrolü ───────────────────────────────────────────
  // O günün sabahı 06:00'da recovery_hedef'e hâlâ 24+ saat kalıyorsa süre kısalt
  const gun6am=new Date(date+'T06:00:00'); // antrenman gününün sabahı 06:00
  const recoveryKalanSaat=wkStats.sonRecoveryHedef
    ?Math.max(0,Math.round((wkStats.sonRecoveryHedef-gun6am)/3600000))
    :0;
  const henuzToparlanmadi=recoveryKalanSaat>=24&&!isPast&&!isToday;
  if(henuzToparlanmadi&&!forceEasy){
    // 06:00'da hâlâ 24+ saat toparlanma kalmış — süre kısalt
    const kalanOran=Math.min(1,(recoveryKalanSaat-24)/24); // 24sa üzerindeki kısım
    tpl={...tpl,sure_dk:Math.round(tpl.sure_dk*(1-kalanOran*0.35))};
    warnings.push({icon:'⏱',text:`Sabah 06:00'da ~${recoveryKalanSaat}sa toparlanma kaldı (24sa üzeri) — süre kısaltıldı.`});
  }

  // ── İdeal antrenman tipi kararı: yük/yorgunluk/toparlanmaya göre ─────────
  if(forceEasy&&!['dinlenme','kolay','capraz'].includes(tpl.tip)){
    const orijinalTip=tpl.tip;
    const gunSirasi=wkStats.count||0;
    let nedenler=[];
    let secilenTip='kolay';
    let secilenSure=Math.round(40*yMod);

    if(tsb< -20){nedenler.push('TSB '+tsb.toFixed(1)+' (çok yorgun)');secilenSure=Math.round(30*yMod);}
    else if(acwr>1.4){nedenler.push('ACWR '+acwr.toFixed(2)+' (yük yüksek)');secilenSure=Math.round(35*yMod);}
    else if(acwr>1.3){nedenler.push('ACWR '+acwr.toFixed(2)+' (yük biraz yüksek)');secilenSure=Math.round(45*yMod);}
    if(henuzToparlanmadi){nedenler.push('toparlanma bitmedi ('+recoveryKalanSaat+'sa)');secilenSure=Math.round(secilenSure*0.8);}
    if(inj>=5){nedenler.push('sakatlık puanı '+inj+'/10');secilenSure=Math.round(secilenSure*0.85);}

    // Haftanın ilk günü kolay, ikinci gün aerobik (çeşitlilik)
    if(gunSirasi===0||tsb< -20){
      secilenTip='kolay';
      tpl={...tplKolay(band,secilenSure,zones),sure_dk:secilenSure,_downgraded:true,_originalTip:orijinalTip};
    } else if(gunSirasi===1&&tsb>-15&&acwr<1.4){
      secilenTip='aerobik';
      secilenSure=Math.round(50*yMod);
      tpl={...tplAerobik(band,secilenSure,zones,disiplin),sure_dk:secilenSure,_downgraded:true,_originalTip:orijinalTip};
    } else {
      // 3. gün veya daha fazla — çok kısa kolay
      secilenSure=Math.round(35*yMod);
      tpl={...tplKolay(band,secilenSure,zones),sure_dk:secilenSure,_downgraded:true,_originalTip:orijinalTip};
    }
    // tpl.uyari'yi yeni antrenmanla eşleştir — eski planDay uyarısı artık geçersiz
    tpl.uyari=`${orijinalTip} → ${secilenTip} (${nedenler.join(', ')}) · Önerilen: ${secilenSure} dk ${secilenTip}`;
    warnings.push({icon:'🔄',text:`"${TUR_LABELS[orijinalTip]||orijinalTip}" → ${TUR_LABELS[secilenTip]||secilenTip} (${secilenSure}dk): ${nedenler.join(', ')}`});
  } else if(forceLow&&YOGUN_TURLER.includes(tpl.tip)){
    const orijinalTip=tpl.tip;
    const gunSirasi=wkStats.count||0;
    const sureDk=Math.round([55,60,50][gunSirasi%3]*yMod);
    let nedenler=[];
    if(mechKardioImbalancePlan)nedenler.push('mekanik/kardio oranı düşük');
    if(henuzToparlanmadi)nedenler.push('toparlanma bitmedi');
    tpl={...tplAerobik(band,sureDk,zones,disiplin),sure_dk:sureDk,_downgraded:true,_originalTip:orijinalTip};
    // tpl.uyari'yi yeni antrenmanla eşleştir
    tpl.uyari=`${orijinalTip} → aerobik (${nedenler.join(', ')||'aerobik taban öncelikli'}) · Önerilen: ${sureDk} dk aerobik`;
    warnings.push({icon:'🔄',text:`"${TUR_LABELS[orijinalTip]||orijinalTip}" → Aerobik (${sureDk}dk): ${nedenler.join(', ')||'aerobik taban öncelikli'}`});
  }

  // ── Süre artırımı: toparlanma tamamsa ve TSB iyiyse ──────────────────────
  if(!forceEasy&&!forceLow&&!isPast&&tsb>5&&acwr<1.1&&recoveryKalanSaat===0
    &&['aerobik','uzun','kolay'].includes(tpl.tip)){
    const bonus=tsb>15?10:5;
    const eskiSure=tpl.sure_dk;
    tpl={...tpl,sure_dk:Math.min(tpl.sure_dk+bonus,Math.round(130*yMod))};
    if(tpl.sure_dk>eskiSure){
      warnings.push({icon:'📈',text:`TSB ${tsb.toFixed(1)} iyi, ACWR ${acwr?.toFixed(2)||'—'} düşük — süre ${eskiSure}dk→${tpl.sure_dk}dk artırıldı`});
    }
  }

  // ── Km hedefine göre süre düzeltmesi ─────────────────────────────────────
  // Km hedef ayarı — tolerans penceresine göre süre düzenle
  if(targetKm>0&&!forceEasy&&['aerobik','uzun','kolay'].includes(tpl.tip)){
    if(kmDeficit&&kmGunBasiHedef>0){
      // Geride — süre artır (max +25dk, pace*kmGunBasiHedef)
      const extraMin=Math.min(25,Math.round(kmGunBasiHedef*6));
      if(extraMin>3){
        tpl.sure_dk=Math.min(tpl.sure_dk+extraMin,Math.round(120*yMod));
        tpl.yapilar=tpl.yapilar.map((y,i)=>i===1?{...y,detay:y.detay+` (+${extraMin}dk · km hedefi için)`}:y);
      }
    } else if(kmFazla&&!['uzun'].includes(tpl.tip)){
      // Fazla — süre hafifçe kıs (max -%15)
      const reduceMin=Math.min(15,Math.round(tpl.sure_dk*0.10));
      if(reduceMin>3){
        tpl.sure_dk=Math.max(25,tpl.sure_dk-reduceMin);
        tpl.yapilar=tpl.yapilar.map((y,i)=>i===1?{...y,detay:y.detay+` (-${reduceMin}dk · haftalık km aşıldı)`}:y);
      }
    }
  }

  // ── FTP varsa güç hedeflerini yapıya ekle ────────────────────────────────
  if(ftp>0&&['esik','tempo','interval'].includes(tpl.tip)){
    const powerTargets={esik:`${Math.round(ftp*0.88)}–${Math.round(ftp*0.95)}W`,tempo:`${Math.round(ftp*0.76)}–${Math.round(ftp*0.90)}W`,interval:`${Math.round(ftp*1.00)}–${Math.round(ftp*1.20)}W`};
    const pTarget=powerTargets[tpl.tip];
    if(pTarget) tpl.yapilar=tpl.yapilar.map((y,i)=>i===1?{...y,detay:y.detay+' · Güç hedefi: '+pTarget}:y);
  }

  const TIP_NAMES_LOCAL={kolay:'Kolay Koşu',aerobik:'Aerobik Koşu',uzun:'Uzun Koşu',tempo:'Tempo',esik:'Eşik',interval:'İnterval',piramit:'İnterval Piramit',kesintisiz_piramit:'Kesintisiz Piramit',yokus_kisa:'Kısa Yokuş Tekrarı',yokus_uzun:'Uzun Yokuş',tirmanis:'Tırmanış Koşusu',teknik:'Teknik İniş',acici:'Açıcı',capraz:'Çapraz Antrenman',dinlenme:'Dinlenme'};
  // Eski snapshot'larda tip değeri baslik olarak saklı olabilir → normalize et
  const fixBaslik=(b,tip)=>TIP_NAMES_LOCAL[b]||b;
  return{
    ...tpl,baslik:TIP_NAMES_LOCAL[tpl.tip]||tpl.tip,
    aciklama:tpl.yapilar.map(y=>y.baslik).join(' → '),
    warnings,blockers:[],
    isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,phase,acwr,tsb,hrv,
    wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod,
    zoneDist4w,zoneStatus,
    meanIF,mechRatio:round2(mechRatio),aerEffDecline,forceEasy,forceLow,
  };
}

function simulateFuture(lastHistory, plannedLoads){
  // lastHistory: mevcut history dizisinin son elemanı
  // plannedLoads: [{date, load}] — planlanan günlük yükler
  let atl=lastHistory?.atl||0;
  let ctl=lastHistory?.ctl||0;
  return plannedLoads.map(p=>{
    atl=p.load*λ_atl+atl*(1-λ_atl);
    ctl=p.load*λ_ctl+ctl*(1-λ_ctl);
    return{date:p.date,atl:round1(atl),ctl:round1(ctl),tsb:round1(ctl-atl),acwr:ctl>1?round2(atl/ctl):null};
  });
}

// Yarış zorluğu skoru
function raceDiffScore(r){
  const km=parseFloat(r.mesafe)||0;
  const dp=parseFloat(r.d_plus)||0;
  const iklim=parseInt(r.iklim_zorluk)||1;
  const altAvg=(parseFloat(r.maks_irtifa||0)+parseFloat(r.min_irtifa||0))/2;
  return km+(dp/100)+(iklim-1)*5+(altAvg>800?(altAvg-800)/200:0);
}

// Hedef yarış seçimi: en zor upcoming → birincil, öncesindekiler → ara
function selectRaces(athlete, races){
  const today=new Date();
  // Geriye dönük uyumluluk: yarıslar string[] veya {id,oncelik}[] olabilir
  const athRaces=(athlete.yarıslar||[]).map(x=>typeof x==='string'?{id:x,oncelik:'A'}:x);
  const athIds=athRaces.map(x=>x.id);
  const oncelikMap=Object.fromEntries(athRaces.map(x=>[x.id,x.oncelik||'A']));

  const upcoming=(races||[])
    .filter(r=>athIds.includes(r.id)&&new Date(r.tarih+'T12:00:00')>today)
    .sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));
  if(!upcoming.length)return{primary:null,intermediate:[]};

  // __force ile manuel override
  const forced=upcoming.find(r=>r.__force);
  if(forced){
    const intermediate=upcoming.filter(r=>r.id!==forced.id&&new Date(r.tarih)<new Date(forced.tarih));
    return{primary:forced,intermediate};
  }

  // A/B/C öncelik: en yakın A → en yakın B → fallback en zor
  const aRaces=upcoming.filter(r=>oncelikMap[r.id]==='A');
  const bRaces=upcoming.filter(r=>oncelikMap[r.id]==='B');
  const primary=aRaces.length>0 ? aRaces[0]
    : bRaces.length>0 ? bRaces[0]
    : [...upcoming].sort((a,b)=>raceDiffScore(b)-raceDiffScore(a))[0];

  const intermediate=upcoming.filter(r=>
    r.id!==primary.id && new Date(r.tarih)<new Date(primary.tarih)
  );
  return{primary,intermediate};
}

// Tek gün için plan üret (şablon motoru ile)
// ── Yarış Günü Hedef Pace Hesaplayıcı ────────────────────────────────────────
// "Yarış Durumu" sekmesiyle aynı mantık: calcTargetTime + hazırlık iyileşme %'si → tHedef
function raceHedefSure(race, athlete, ctl, acwr, athWorkouts){
  if(!race||!athlete)return null;
  const km=parseFloat(race.mesafe)||0;
  if(km<=0)return null;
  // Mevcut tahmin (VO2max + CTL tabanlı)
  const target=calcTargetTime(race,athlete,ctl||0,acwr||1.0,athWorkouts||[]);
  if(!target||!target.totalMin||target.totalMin<=0)return null;

  // ── Hazırlık iyileşme yüzdesi (Yarış Durumu sekmesiyle birebir) ──────────
  const prepWeeks=parseInt(race.prep_weeks)||12;
  const taperW=parseInt(race.taper_w)||(km>42?3:km>21?2:1);
  const daysLeft=race.tarih?Math.ceil((new Date(race.tarih+'T12:00:00')-new Date())/864e5):999;
  const trainingDaysLeft=Math.max(0,daysLeft-taperW*7);
  const totalTrainingDays=Math.max(1,(prepWeeks-taperW)*7);
  const prepPct=Math.min(1,(totalTrainingDays-trainingDaysLeft)/totalTrainingDays);

  const dpPerKm=km>0?(parseFloat(race.d_plus)||0)/km:0;
  let maxIyiPct=km<=5?6.0:km<=10?5.0:km<=21?4.0:km<=42?3.0:km<=60?2.5:2.0;
  if(dpPerKm>100)maxIyiPct+=1.0;
  else if(dpPerKm>50)maxIyiPct+=0.5;

  const realizePct=prepPct<0.1?0.05:prepPct<0.3?0.15+(prepPct-0.1)*0.5:
    prepPct<0.7?0.25+(prepPct-0.3)*1.5:prepPct<0.9?0.85+(prepPct-0.7)*0.5:0.95;
  const expectedIyi=round1(maxIyiPct*realizePct);
  const tHedef=round1(target.totalMin*(1-expectedIyi/100)); // dakika cinsinden hedef süre

  // Pace hesapla
  const paceSec=(tHedef*60)/km; // saniye/km
  const pm=Math.floor(paceSec/60);
  const ps=Math.round(paceSec%60);
  return{
    tHedefMin:tHedef,
    totalSec:Math.round(tHedef*60),
    paceSec,
    paceStr:`${pm}:${String(ps).padStart(2,'0')}`,
    expectedIyi,
  };
}

// Hedef pace'e göre yarış zone tahmini
function raceZoneFromPace(paceSec,zones){
  if(!zones?.paceZones||!paceSec)return 3; // Z4 default
  const paceMs=1000/paceSec;
  for(let i=zones.paceZones.length-1;i>=0;i--){
    const z=zones.paceZones[i];
    if(z&&z.lo_ms&&paceMs>=z.lo_ms)return i;
  }
  return 3;
}

function planDay(date, athlete, simState, phase, daysToRace, daysToIntermediate, wkStats, kosuGunleri, caprazGunleri, race=null){
  if(!athlete)return{tip:'dinlenme',baslik:'Dinlenme',sure_dk:0,yukHedef:0,yapilar:[],isPast:false,isToday:false};
  const today=new Date();
  const d=new Date(date+'T12:00:00');
  const dayShort=DAYS_SHORT[d.getDay()];
  const dayTR=DAYS_TR[d.getDay()];
  const localToday=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const isPast=date<localToday; // tarih karşılaştırması — saat farkından etkilenmesin
  const isToday=date===localToday;
  const isKosu=kosuGunleri.includes(dayShort);
  const isCapraz=caprazGunleri.includes(dayShort);
  const isUzunGun=(Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean)).includes(dayShort);
  const isAntrenman=isKosu||isCapraz;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';
  const zones=calcZones(athlete);
  const band=ctlBand(simState.ctl||0);
  const acwr=simState.acwr||1.0;
  const tsb=simState.tsb||0;
  const hrv=athlete.hrv_durum||'';
  const inj=parseInt(athlete.sakatlık)||1;
  const yMod=Math.min(hrvMod(hrv),inj>=5?0.80:tsb< -15?0.85:acwr>1.3?0.85:1.0);

  const REST={date,dayTR,dayShort,tip:'dinlenme',baslik:'Dinlenme',sure_dk:0,yukHedef:0,yapilar:[],isPast,isToday,simState,phase};
  // Seçili antrenman günü değilse kesinlikle dinlenme
  if(!isAntrenman) return REST;

  const isSimulatedFuture=!isPast&&(wkStats.isFutureWeek===true);
  // Çapraz günler ACWR bloğundan muaf
  const acwrEsik=isCapraz&&!isKosu?99:(isSimulatedFuture?2.0:1.5);

  // Sakatlık >=8 — tek zorunlu dinlenme durumu
  if(inj>=8) return{...REST,baslik:'Zorunlu Dinlenme',uyari:'Sakatlık puanı yüksek ('+inj+'/10)',yapilar:[{baslik:'Dinlenme',detay:'Sakatlık nedeniyle zorunlu dinlenme'}]};

  const uzunGunTanimli=(Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean)).length>0;
  const dpGun=wkStats.uzunYapildi&&phase!=='Zirve'?0:Math.round((wkStats.dpHedefHafta||0)*0.6);
  const sonYogunGun=wkStats.sonYogunGun||false;
  const haftaGunTipi=wkStats.haftaGunTipi||null;

  // ── targetKm → günlük süre ölçekleme ─────────────────────────────────────
  // Haftalık km hedefini koşu günü sayısına bölerek tahmini günlük km hedefi
  const targetKmHafta=wkStats.targetKmHafta||0;
  const kosuGunSayisi=Math.max(1,(athlete.kosu_gunleri||[]).length);
  const gunlukKmHedef=targetKmHafta>0?targetKmHafta/kosuGunSayisi:0;
  // Varsayılan pace tahmini: band'a göre (dk/km) — süre = km * pace
  const tahminiPace=band<=1?7.5:band===2?7.0:band===3?6.5:band===4?6.0:5.5;
  // Hedef süre (dk) — band tabanlı varsayılandan sapma oranı
  const bandBaseSure=band<=1?45:band===2?50:band===3?55:band===4?60:65;
  const kmSureMod=gunlukKmHedef>0?Math.min(1.4,Math.max(0.65,(gunlukKmHedef*tahminiPace)/bandBaseSure)):1.0;

  // ── Test günü kontrolü — test planlanmışsa test antrenmanını ver ──────────
  const testPlan=wkStats.testPlanlar&&wkStats.testPlanlar.find(p=>p.athId===athlete.id&&p.date===date);
  if(testPlan&&isKosu){
    const testTur=TEST_TURLERI[testPlan.testTur];
    if(testTur){
      const yukFactor={interval:2.1,esik:1.7,aerobik:1.1,kolay:0.8}[testTur.tip]||1.1;
      const sure=Math.round((testTur.sure_dk||45)*yMod);
      const yukHedef=Math.round(sure*yukFactor);
      return{
        tip:testTur.tip,
        baslik:testTur.icon+' '+testTur.ad,
        sure_dk:sure,yukHedef,
        yapilar:testTur.yapilar||[],
        aciklama:testTur.amac,
        isTest:true, testTur:testPlan.testTur,
        isPast,isToday,simState,phase,yMod,date,dayTR,dayShort
      };
    }
  }

  // TSB/ACWR durumuna göre zorunlu indirim flag'leri
  const cokYorgun=tsb< -25;
  const yorgun=tsb< -15;
  const yukYuksek=isSimulatedFuture?(acwr>1.8):(acwr>1.5);
  // Ek güvenlik kontrolleri (recommendWorkout ile senkronize)
  const acwrOverloadPlan=isSimulatedFuture?(acwr>1.6):(acwr>1.3);
  const mechCtlPlan=simState.mechCtl||0;
  const mechAclPlan=simState.mechAtl||simState.atl||0;
  const mechKardioImbalancePlan=simState.ctl>5?(mechCtlPlan/(simState.ctl||1))<0.6:false;
  const YOGUN_TURLER_PLAN=['interval','esik','tempo','yokus_kisa','yokus_uzun',
    'piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','tirmanis'];

  // HRV'ye göre yaptırım flag'leri
  const hrvDusuk=hrv==='düşük';   // yMod=0.70, kaliteli → kolay
  const hrvDengesiz=hrv==='dengesiz'; // yMod=0.85, kaliteli → aerobik

  // ── Koşu antrenmanı planla ──────────────────────────────────────────────
  // sureMod: aerobik/kolay/uzun antrenman sürelerini hem toparlanma hem haftalık km hedefine göre ölçekler
  // Kaliteli antrenmanlar (interval, tempo vb.) kmSureMod'dan etkilenmez
  const sureMod=Math.min(1.35,Math.max(0.60,yMod*kmSureMod));
  const warnings=[]; // planDay içi uyarılar
  let kosuTpl=null;
  let kosuUyari=null;
  if(isKosu){
    // ── YARIŞ GÜNÜ: antrenman önerilmez, yarış bilgisi döndürülür ────────────
    // Birincil yarış günü (daysToRace===0) veya ara yarış günü (daysToIntermediate===0)
    const isAnaYaris=daysToRace===0&&race;
    const isAraYaris=daysToIntermediate===0; // ara yarış günü
    if(isAnaYaris||isAraYaris){
      // Hangi yarış?
      const yarisObj=isAnaYaris?race:null; // ara yarış bilgisi race param'da yok
      const yarisAd=yarisObj?.ad||'Yarış';
      const yarisMesafe=parseFloat(yarisObj?.mesafe)||0;
      // "Yarış Durumu" sekmesiyle aynı hesap: calcTargetTime + hazırlık iyileşme %'si
      const hedefData=yarisObj?raceHedefSure(
        yarisObj, athlete,
        simState.ctl||0, simState.acwr||1.0,
        wkStats.athWorkouts||[]
      ):null;
      const targetPaceSec=hedefData?.paceSec||null;
      const paceStr=hedefData?.paceStr||null;
      const estSec=hedefData?.totalSec||(yarisMesafe>0?Math.round(yarisMesafe*360):3600);
      const estHr=Math.floor(estSec/3600);
      const estMn=Math.floor((estSec%3600)/60);
      const sureDk=Math.round(estSec/60);
      // Zone tespiti (pace'e göre)
      const zonesDyn=calcZones(athlete);
      const zIdx=targetPaceSec?raceZoneFromPace(targetPaceSec,zonesDyn):3;
      // Aşama satırı için _rows oluştur
      const yarisRows=yarisMesafe>0&&targetPaceSec?[{
        label:'🏁 '+yarisAd+(yarisMesafe?' — '+yarisMesafe+' km':''),
        sure_sn:estSec,
        zIdx,
        pSec:targetPaceSec,
        rpe:'7–10',
        type:'single'
      }]:[{
        label:'🏁 '+yarisAd+(yarisMesafe?' — '+yarisMesafe+' km':''),
        sure_sn:estSec||3600,
        zIdx:3,
        type:'single'
      }];
      const yarisDetay=[
        yarisMesafe?`Mesafe: ${yarisMesafe} km`:'',
        paceStr?`Hedef Pace: ${paceStr} /km`:'',
        estSec>0?`Tahmini Süre: ${estHr?estHr+'sa ':''}`+estMn+'dk':'',
        hedefData?.expectedIyi?`(−${hedefData.expectedIyi}% iyileşme dahil)`:'',
        'Bugün antrenman yok — yarış günü 🎯'
      ].filter(Boolean).join(' · ');
      const yarisYapilir=[{
        baslik:'🏁 '+yarisAd,
        detay:yarisDetay,
        // _yaris* alanlar primitif — JSON serileştirmeden (overrideMap) sağ çıkar
        // adimToRowsFallback bu alanları okuyarak doğru aşama satırı üretir
        _yaris:true,
        _yarisMesafe:yarisMesafe||0,
        _yarisPaceSec:targetPaceSec||null,
        _yarisEstSec:estSec||3600,
        _yarisPaceStr:paceStr||null,
        _rows:yarisRows
      }];
      return{
        tip:'yaris', baslik:yarisAd,
        yapi_notu:'Yarış Günü'+(isAraYaris?' (Ara Yarış)':''),
        sure_dk:sureDk,
        yukHedef:Math.round(sureDk*1.8), // yarış yük tahmini
        yapilar:yarisYapilir,
        isYarisGunu:true,
        isPast,isToday,simState,phase,yMod:1,
        date,dayTR,dayShort
      };
    }

    // Hafta iskeleti: 'aerobik' günse yoğun antrenman verme
    const iskeleteGoreAerobik=(haftaGunTipi==='aerobik'||haftaGunTipi==='kolay')&&!isUzunGun;
    const iskeleteGoreKolay=haftaGunTipi==='kolay';


    // Çok yorgun veya yük çok yüksekse → kolay koşuya indir (sureMod uygulanmaz — güvenlik sınırı)
    if(cokYorgun||yukYuksek||acwrOverloadPlan){
      const sure=Math.round((cokYorgun?30:40)*yMod);
      kosuTpl=tplKolay(band,sure,zones);
      kosuUyari=yukYuksek||acwrOverloadPlan?'ACWR '+acwr.toFixed(2)+' — yük yüksek, kolay koşuya indirildi':
        'TSB '+tsb.toFixed(1)+' — çok yorgun, kolay koşuya indirildi';
    } else if(daysToIntermediate!==null&&daysToIntermediate<=2){
      kosuTpl=tplAcici(25,phase);
    } else if(daysToIntermediate!==null&&daysToIntermediate<=7){
      kosuTpl=tplKolay(band,Math.round(35*sureMod),zones);
    } else if(phase==='Taper'||(daysToRace!==null&&daysToRace<=7)){
      // ── TAPER PERİYODU — Antrenman Bilimi Prensipleri ─────────────────────
      // Taper'ın amacı: fitness'i korurken yorgunluğu süperkompanzasyon için boşaltmak.
      // Hacim %40-60 düşer, yoğunluk korunur (nöromüsküler stimülasyon için).
      // Hata: tüm günlere tempo vermek → yorgunluk boşalmaz.
      // Doğru: 1 kaliteli (kısa tempo), 1 aktivasyon (strides/açıcı), geri kalan kolay Z1.
      const isTaperFirstWeek=daysToRace!==null&&daysToRace>14;
      const taperPeakMissed=isTaperFirstWeek&&daysToRace<=21
        &&isUzunGun&&!wkStats.uzunYapildi
        &&(wkStats.recentLongRuns||[]).filter(r=>(r?.km||0)>=(parseFloat(race?.mesafe||0)*0.30)).length===0;
      if(isUzunGun&&isTaperFirstWeek&&!cokYorgun){
        // Taper ilk haftası: uzun koşu günü → hafifletilmiş uzun koşu
        const isIkinciUzun=wkStats.uzunYapildi;
        const uzunYMod=Math.min(yMod,taperPeakMissed?0.75:isIkinciUzun?0.55:0.65);
        kosuTpl=isTrail&&dpGun>200
          ?tplTirmanisAcik(band,Math.round(70*uzunYMod),zones,dpGun)
          :tplUzun(band,simState.ctl||0,zones,disiplin,dpGun,wkStats.recentLongRuns);
        kosuUyari=taperPeakMissed
          ?'Zirve antrenmanı eksik — taper\'da hafifletilmiş uzun koşu (%75 yoğunluk)'
          :isIkinciUzun?'Taper 2. uzun koşusu — yorgun bacak, %55 yoğunluk'
          :'Taper uzun koşusu — hacim düşük (%65), form koruma odaklı';
      } else if(daysToRace!==null&&daysToRace<=2){
        // Yarışa 0-2 gün: sadece açıcı veya tam dinlenme
        const aciciSure=Math.round(20*yMod);
        kosuTpl=tplAcici(aciciSure,phase);
        kosuUyari='Yarışa '+daysToRace+' gün — kısa açıcı, sinir-kas aktivasyonu';
      } else if(daysToRace!==null&&daysToRace===3){
        // Yarışa 3 gün: hafif strides ile aktivasyon
        const sure=Math.round(30*yMod);
        kosuTpl=tplStrides(band,sure,zones,phase);
        kosuUyari='Yarışa 3 gün — kısa strides ile nöromüsküler aktivasyon, form koruma';
      } else if(haftaGunTipi==='kaliteli'&&daysToRace!==null&&daysToRace>=4){
        // Kaliteli gün (iskelet atadı): kısa tempo blokları — hız hissini korumak için
        // Hacim düşük (%40), yoğunluk korunuyor
        const taperKaliteliSira=wkStats.kaliteliSayisi||0;
        if(taperKaliteliSira===0){
          // İlk kaliteli gün: kısa tempo
          const taperSure=Math.round(35*yMod);
          kosuTpl=tplTempo(band,taperSure,zones,phase);
          kosuUyari='Taper kaliteli antrenman — kısa tempo blokları, hız hissini koru';
        } else {
          // İkinci kaliteli gün (varsa): açıcı/strides
          const sure=Math.round(25*yMod);
          kosuTpl=daysToRace<=5?tplAcici(sure,phase):tplStrides(band,sure,zones,phase);
          kosuUyari='Taper 2. kaliteli gün — aktivasyon odaklı, yarışa hazırlık';
        }
      } else if(haftaGunTipi==='kolay'||haftaGunTipi==='aerobik'||(daysToRace!==null&&daysToRace>=4)){
        // Aerobik/kolay günler VEYA iskelet tipi olmayan günler: hafif toparlanma koşusu
        // Taper'da bu günler çok kısa ve çok kolay olmalı — süperkompanzasyon için
        const kolayTaperSure=Math.round(((daysToRace!==null&&daysToRace<=5)?25:30)*yMod);
        kosuTpl=tplKolay(band,kolayTaperSure,zones);
        kosuTpl.baslik='Taper Toparlanma';
        kosuTpl.yapi_notu='Taper Toparlanma';
        kosuTpl.yapilar=[{baslik:'Kolay Toparlanma',detay:`${kolayTaperSure} dk — Z1 çok kolay · Kan dolaşımını artırarak kasların dinlenmesini hızlandır · Pace önemsiz`}];
        kosuUyari='Taper toparlanma — Z1 çok kolay, süperkompanzasyon için hacim düşük';
        if(isUzunGun)kosuUyari='Son taper haftası (yarışa '+daysToRace+' gün) — uzun koşu yerine kısa toparlanma. Kaslar dinlenmeli, form zirveye çıkmalı.';
      } else {
        // Fallback (normalde buraya düşmemeli)
        kosuTpl=tplKolay(band,Math.round(25*yMod),zones);
        kosuUyari='Taper dönemi — kolay toparlanma';
      }
    } else if((isUzunGun||(haftaGunTipi==='uzun'&&!uzunGunTanimli))&&(!wkStats.uzunYapildi||isUzunGun)){
      const isIkinciUzun=wkStats.uzunYapildi&&isUzunGun;
      const uzunYMod=cokYorgun?0.65:yorgun?0.80:isIkinciUzun?Math.min(sureMod,0.65):sureMod;
      kosuTpl=isTrail&&dpGun>200
        ?tplTirmanisAcik(band,Math.round(70*uzunYMod),zones,dpGun)
        :tplUzun(band,simState.ctl||0,zones,disiplin,dpGun,wkStats.recentLongRuns);
      if(cokYorgun)kosuUyari='TSB '+tsb.toFixed(1)+' — çok yorgun, uzun koşu süresi %35 kısaltıldı';
      else if(yorgun)kosuUyari='TSB '+tsb.toFixed(1)+' — yorgun, uzun koşu süresi %20 kısaltıldı';
    } else if((isUzunGun||(haftaGunTipi==='uzun'&&!uzunGunTanimli))&&wkStats.uzunYapildi&&!isUzunGun){
      const ikincıUzunUygun=!cokYorgun&&acwr<1.3&&['Zirve','Gelişme'].includes(phase)&&band>=3;
      if(ikincıUzunUygun){
        const uzunYMod2=yorgun?0.55:0.65;
        const tpl2=tplUzun(band,simState.ctl||0,zones,disiplin,0,wkStats.recentLongRuns);
        tpl2.sure_dk=Math.round(tpl2.sure_dk*uzunYMod2);
        tpl2.baslik='Yorgun Bacak Uzun Koşusu (B2B 2. Gün)';
        tpl2.yapilar=[
          {baslik:'Yorgun Bacak Koşusu',detay:`${tpl2.sure_dk} dk — Z1-Z2 çok kolay · Pace önemsiz, bitiş önemli · Glikojen depolarının boşalmış haliyle aerobik stimülüs`},
          {baslik:'Toparlanma',detay:'Bitişte: karbonhidrat + protein, sonraki gün dinlenme zorunlu'}
        ];
        kosuTpl=tpl2;
        kosuUyari='Haftanın ikinci uzun koşusu (B2B 2. gün) — süre ilk günün %65\'i';
      } else {
        kosuTpl=tplAerobik(band,Math.round(50*sureMod),zones,disiplin);
        kosuUyari='Bu hafta uzun koşu yapıldı — bugün aerobik toparlanma';
      }
    } else if(iskeleteGoreKolay||sonYogunGun){
      if(sonYogunGun){
        const kolaySure=Math.round(35*yMod); // toparlanma → yMod, hedeften bağımsız
        kosuTpl=tplKolay(band,kolaySure,zones);
        kosuTpl.baslik='Toparlanma Koşusu';
        kosuTpl.yapi_notu='Toparlanma Koşusu';
        kosuTpl.yapilar=[{baslik:'Aktif Toparlanma',detay:`${kolaySure} dk — Z1 çok kolay · Dün yoğun antrenman yapıldı, bugün kan dolaşımını artırarak kasların toparlanmasını hızlandır`}];
        kosuUyari='Dün yoğun antrenman — aktif toparlanma (Z1, düşük tempo)';
      } else {
        const hazirlikSure=Math.round(40*sureMod);
        kosuTpl=tplKolay(band,hazirlikSure,zones);
        kosuTpl.baslik='Hazırlık Koşusu';
        kosuTpl.yapi_notu='Hazırlık Koşusu';
        kosuTpl.yapilar=[
          {baslik:'Z1 Kolay Koşu',detay:`${Math.round(hazirlikSure*0.85)} dk — Z1-Z2 · Kasları ısıt, esnekliği koru`},
          {baslik:'Hazırlık Süratlenmesi',detay:`Son ${Math.round(hazirlikSure*0.15)} dk içinde 3×15 sn süratlenmesi (Z4 pace), aralarında 45 sn kolay · Sinir-kas aktivasyonu — yarınki kaliteli antrenman için hazırlık`}
        ];
        kosuUyari='Yarınki kaliteli antrenman öncesi hazırlık — Z1-Z2, kısa süratlenmelerle aktivasyon';
      }
    } else if(iskeleteGoreAerobik){
      const aeroIdx=wkStats.aerobikSayisi||0;
      const aeroSure=Math.round(55*sureMod);
      if(aeroIdx===0){
        kosuTpl=tplAerobik(band,aeroSure,zones,disiplin);
      } else if(aeroIdx===1){
        const z2Sure=Math.round(aeroSure*0.75);
        const z3Sure=Math.round(aeroSure*0.25);
        kosuTpl=tplAerobik(band,aeroSure,zones,disiplin);
        kosuTpl.baslik='Progressive Aerobik';
        kosuTpl.yapi_notu='Progressive Aerobik';
        kosuTpl.tip='aerobik';
        kosuTpl.yapilar=[
          {baslik:'Z2 Aerobik Taban',detay:`${z2Sure} dk — Z2 rahat tempo · Nefes konuş testi: cümleler kurabilmeli`},
          {baslik:'Z3 Progressive Çıkış',detay:`${z3Sure} dk — Z3\'e kademeli çıkış · Tempoyu doğal hissettir, zorlanma yok · Laktat temizleme kapasitesini geliştirir`}
        ];
      } else {
        const baseS=Math.round(aeroSure*0.85);
        kosuTpl=tplAerobik(band,aeroSure,zones,disiplin);
        kosuTpl.baslik='Aerobik Koşu + Strides';
        kosuTpl.yapi_notu='Aerobik Koşu + Strides';
        kosuTpl.tip='aerobik';
        kosuTpl.yapilar=[
          {baslik:'Z2 Aerobik Koşu',detay:`${baseS} dk — Z2 rahat tempo`},
          {baslik:'Strides',detay:`4×20 sn süratlenme (Z4 pace), aralarında 60 sn kolay yürüyüş · Koşu ekonomisini geliştirir, yorgunluk yaratmaz`}
        ];
      }
    } else if(mechKardioImbalancePlan){
      kosuTpl=tplAerobik(band,Math.round(55*sureMod),zones,disiplin);
      kosuUyari='Mech/Kardio dengesi bozuk — aerobik öncelikli, yoğun antrenman ertelendi';
    } else if(haftaGunTipi==='kaliteli'&&(!yorgun||isSimulatedFuture)){
      // İskelet kaliteli atadı — faz + hafta rotasyonu ile çeşitlendir
      // Not: isSimulatedFuture (gelecek hafta) için yorgunluk kontrolü gevşetilir
      // çünkü simüle edilen TSB gerçek olmayan yüklere dayanır ve iskeletin
      // oluşturduğu hard/easy yapısına güvenmek daha sağlıklıdır
      const wk=wkStats.weekOff||0;
      const recent=wkStats.recentKaliteli||[];
      const buHaftaKaliteli=wkStats.buHaftaKaliteli||[]; // Bu haftanın kaliteli tipleri
      const haftaIciSira=wkStats.kaliteliSayisi||0; // Bu haftanın kaçıncı kaliteli antrenmanı
      // Aynı haftada tekrar vermeme: recent + buHaftaKaliteli birleştir
      const pickSeq=(seq)=>{
        const startIdx=(wk+haftaIciSira)%seq.length;
        const yasak=[...recent.slice(0,2),...buHaftaKaliteli];
        for(let i=0;i<seq.length;i++){
          const tpl=seq[(startIdx+i)%seq.length]();
          if(!yasak.includes(tpl.tip)) return tpl;
        }
        // Tümü yasaksa en az kullanılanı ver
        return seq[startIdx]();
      };
      if(daysToRace!==null&&daysToRace<=14){
        // Yarışa 8-14 gün (phase henüz Taper değil ama yakın): kaliteli sırasına göre farklılaştır
        const kalSira=wkStats.kaliteliSayisi||0;
        if(kalSira===0){
          // İlk kaliteli: kısa tempo veya yarış temposu — hız hissini koru
          kosuTpl=daysToRace<=10?tplTempo(band,Math.round(40*yMod),zones,phase):tplYarisTempo(band,Math.round(45*yMod),zones,phase);
          kosuUyari='Yarışa '+daysToRace+' gün — kaliteli antrenman, yoğunluk korunur, hacim düşük';
        } else {
          // 2. kaliteli: açıcı veya strides — aktivasyon
          kosuTpl=daysToRace<=10?tplAcici(Math.round(25*yMod),phase):tplStrides(band,Math.round(35*yMod),zones,phase);
          kosuUyari='Yarışa '+daysToRace+' gün — 2. kaliteli, aktivasyon odaklı';
        }
      } else if(phase==='Taper'){
        // Taper ama daysToRace>14 (geniş taper) — kaliteli sırasına göre farklılaştır
        const kalSira=wkStats.kaliteliSayisi||0;
        kosuTpl=kalSira===0?tplYarisTempo(band,Math.round(45*yMod),zones,phase):tplStrides(band,Math.round(35*yMod),zones,phase);
      } else if(phase==='Zirve'){
        const zirveSeq=[
          ()=>isTrail&&band>=3?tplYokusUzun(band,zones,phase):tplInterval(band,phase,zones),
          ()=>tplPiramit(band,zones,phase),
          ()=>tplKesintisizPiramit(band,zones,phase),
          ()=>tplCruise(band,Math.round(55*yMod),zones,phase),
          ()=>isTrail?tplHillSprint(band,zones,phase):tplOnOff(band,zones,phase),
        ];
        kosuTpl=pickSeq(zirveSeq);
      } else if(phase==='Gelişme'){
        const gelismeSeq=[
          ()=>isTrail&&band>=3?tplYokusKisa(band,zones,phase):tplInterval(band,phase,zones),
          ()=>tplTempoInterval(band,Math.round(50*yMod),zones,phase),
          ()=>tplPiramit(band,zones,phase),
          ()=>tplKesintisizPiramit(band,zones,phase),
          ()=>tplCruise(band,Math.round(50*yMod),zones,phase),
          ()=>tplOnOff(band,zones,phase),
          ()=>isTrail?tplHillSprint(band,zones,phase):tplYarisTempo(band,Math.round(48*yMod),zones,phase),
        ];
        kosuTpl=pickSeq(gelismeSeq);
      } else {
        const temelSeq=[
          ()=>tplTempo(band,Math.round(45*yMod),zones,phase),
          ()=>tplProgressive(band,Math.round(50*yMod),zones,phase),
          ()=>tplStrides(band,Math.round(50*yMod),zones,phase),
          ()=>tplCruise(band,Math.round(45*yMod),zones,phase),
        ];
        kosuTpl=pickSeq(temelSeq);
      }
    } else if(phase==='Temel'&&!iskeleteGoreAerobik&&!sonYogunGun&&wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)){
      // Temel fazda aerobik günlere zaman zaman strides ekle
      const wk=wkStats.weekOff||0;
      kosuTpl=wk%3===0
        ?tplStrides(band,Math.round(50*yMod),zones,phase)
        :tplAerobik(band,Math.round(55*yMod),zones,disiplin);
    } else {
      // Varsayılan faz mantığı — haftaGunTipi atanmamış veya kaliteli koşul sağlanmadı
      const wk=(wkStats.weekOff||0)+(wkStats.kaliteliSayisi||0)+(wkStats.count||0);
      // Fallback pickSeq — buHaftaKaliteli ve recentKaliteli ile tekrar önleme
      const fallbackPick=(seq)=>{
        const startIdx=wk%seq.length;
        const yasak=[...(wkStats.recentKaliteli||[]).slice(0,2),...(wkStats.buHaftaKaliteli||[])];
        for(let i=0;i<seq.length;i++){
          const tpl=seq[(startIdx+i)%seq.length]();
          if(!yasak.includes(tpl.tip)) return tpl;
        }
        return seq[startIdx]();
      };
      if(daysToRace!==null&&daysToRace<=14&&haftaGunTipi==='kaliteli'){
        // Yarışa yakın taper: 1. kaliteli gün=tempo, 2. kaliteli gün=strides/açıcı
        const hIS=wkStats.kaliteliSayisi||0;
        if(hIS===0){
          const taperSure=Math.max(35,Math.round(40*yMod));
          kosuTpl=tplTempo(band,taperSure,zones,phase);
        } else {
          kosuTpl=daysToRace<=7?tplAcici(Math.round(25*yMod),phase):tplStrides(band,Math.round(35*yMod),zones,phase);
        }
      } else if(phase==='Zirve'){
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)&&(acwr<1.2||isSimulatedFuture)){
          const zirveSeq=[
            ()=>isTrail&&band>=3?tplYokusUzun(band,zones,phase):tplInterval(band,phase,zones),
            ()=>tplPiramit(band,zones,phase),
          ()=>tplKesintisizPiramit(band,zones,phase),
            ()=>tplCruise(band,Math.round(55*yMod),zones,phase),
            ()=>isTrail?tplHillSprint(band,zones,phase):tplOnOff(band,zones,phase),
          ];
          kosuTpl=fallbackPick(zirveSeq);
        } else if(!wkStats.uzunYapildi&&(!uzunGunTanimli||isUzunGun)){
          kosuTpl=isTrail?tplTirmanisAcik(band,Math.round(75*yMod),zones,dpGun):tplUzun(band,simState.ctl||0,zones,disiplin,dpGun,wkStats.recentLongRuns);
        } else {
          kosuTpl=tplEsik(band,Math.round(55*yMod),zones,phase);
        }
      } else if(phase==='Gelişme'){
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)&&(acwr<1.2||isSimulatedFuture)){
          const gelismeSeq=[
            ()=>isTrail&&band>=3?tplYokusKisa(band,zones,phase):tplInterval(band,phase,zones),
            ()=>tplTempoInterval(band,Math.round(50*yMod),zones,phase),
            ()=>tplPiramit(band,zones,phase),
          ()=>tplKesintisizPiramit(band,zones,phase),
            ()=>tplCruise(band,Math.round(50*yMod),zones,phase),
            ()=>tplOnOff(band,zones,phase),
            ()=>isTrail?tplHillSprint(band,zones,phase):tplYarisTempo(band,Math.round(48*yMod),zones,phase),
          ];
          kosuTpl=fallbackPick(gelismeSeq);
        } else if(isTrail&&band>=2&&!wkStats.kaliteliYok){
          kosuTpl=tplTeknikInis(band,40,zones);
        } else {
          kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
        }
      } else {
        // Temel faz
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)){
          const temelSeq=[
            ()=>tplTempo(band,Math.round(45*yMod),zones,phase),
            ()=>tplProgressive(band,Math.round(50*yMod),zones,phase),
            ()=>tplStrides(band,Math.round(50*yMod),zones,phase),
            ()=>tplCruise(band,Math.round(45*yMod),zones,phase),
          ];
          kosuTpl=fallbackPick(temelSeq);
        } else {
          kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
        }
      }
    }
    // ── HRV'ye göre yoğunluk indirimi ────────────────────────────────────────
    if(kosuTpl&&!kosuTpl._downgraded&&YOGUN_TURLER_PLAN.includes(kosuTpl.tip)){
      if(hrvDusuk){
        const orijinalTip=kosuTpl.tip;
        const sure=Math.round(35*yMod);
        kosuTpl={...tplKolay(band,sure,zones),sure_dk:sure,_downgraded:true,_originalTip:orijinalTip};
        kosuUyari=`HRV düşük — ${orijinalTip} yerine kolay koşu (sinir sistemi toparlanmadı)`;
      } else if(hrvDengesiz&&haftaGunTipi==='kaliteli'){
        const orijinalTip=kosuTpl.tip;
        const sure=Math.round(55*yMod);
        kosuTpl={...tplAerobik(band,sure,zones,disiplin),sure_dk:sure,_downgraded:true,_originalTip:orijinalTip};
        kosuUyari=`HRV dengesiz — ${orijinalTip} yerine aerobik (Z3 üzeri önerilmez)`;
      }
    }

    kosuTpl.sure_dk=Math.round((kosuTpl.sure_dk||45)*yMod);
    if(!kosuUyari&&acwr>1.3&&acwr<=1.5)
      kosuUyari='ACWR '+acwr.toFixed(2)+' — yük biraz yüksek, süre kısaltıldı';
    if(kosuUyari)kosuTpl.uyari=kosuUyari;
    // forceEasy/toparlanma warnings'leri de ekle
    if(warnings.length>0){
      const extraUyari=warnings.map(w=>w.icon+' '+w.text).join(' · ');
      kosuTpl.uyari=kosuTpl.uyari?kosuTpl.uyari+' · '+extraUyari:extraUyari;
    }
  }

  // ── Çapraz antrenman planla ─────────────────────────────────────────────
  let caprazTpl=null;
  if(isCapraz){
    caprazTpl={
      tip:'capraz',sure_dk:0,
      yapilar:[] // Çapraz antrenman için aşama satırı yok
    };
  }

  // ── Sonuç ───────────────────────────────────────────────────────────────
  const TIP_LABELS={kolay:'Kolay Koşu',aerobik:'Aerobik Koşu',uzun:'Uzun Koşu',tempo:'Tempo',esik:'Eşik',interval:'İnterval',yokus_kisa:'Kısa Yokuş',yokus_uzun:'Uzun Yokuş',tirmanis:'Tırmanış',teknik:'Teknik İniş',acici:'Açıcı',capraz:'Çapraz',dinlenme:'Dinlenme'};
  const yukHesapla=(tpl)=>{
    if(!tpl) return 0;
    const kisisel=wkStats.athWorkouts?calcPersonalYukFactor(tpl.tip,wkStats.athWorkouts,athlete):null;
    const kat=kisisel||({kolay:0.8,aerobik:1.1,uzun:1.25,tempo:1.55,esik:1.7,interval:2.1,yokus_kisa:2.1,yokus_uzun:2.0,tirmanis:2.0,teknik:1.3,acici:1.0,capraz:0.8,progressive:1.4,cruise:1.65,yaris_tempo:1.8,on_off:1.9,piramit:1.9,kesintisiz_piramit:1.7,hill_sprint:2.2,strides:0.9,back_to_back:1.2}[tpl.tip]||6);
    return Math.round((tpl.sure_dk||45)*kat);
  };

  // Antrenman ismini yapi_notu'ndan türet — seviye bilgisi dahil
  const tplBaslik=(tpl)=>tpl?.yapi_notu?tpl.yapi_notu.split(' — ')[0]:(TIP_LABELS[tpl?.tip]||tpl?.tip||'');

  if(kosuTpl&&caprazTpl){
    // Hem koşu hem çapraz — koşu aşamaları normal, çapraz sadece not
    const yapilar=[
      ...kosuTpl.yapilar,
      {baslik:'➕ Çapraz Antrenman',detay:'Koşu antrenmanından bağımsız — bisiklet / yüzme / kürek / kuvvet (süre ve içerik serbest)',_caprazNot:true}
    ];
    // Çapraz için varsayılan süre ve katsayı ekle
    const caprazVarsayilanSure=45; // sabit — yMod'dan bağımsız
    const caprazYuk=Math.round(caprazVarsayilanSure*0.6); // yoga/bisiklet düşük yük
    const yukHedef=yukHesapla(kosuTpl)+caprazYuk;
    return{...kosuTpl,baslik:tplBaslik(kosuTpl),yapilar,yukHedef,
      caprazTpl,isKosuCapraz:true,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort};
  } else if(kosuTpl){
    const yukHedef=yukHesapla(kosuTpl);
    return{...kosuTpl,baslik:tplBaslik(kosuTpl),yukHedef,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort};
  } else if(caprazTpl){
    const yukHedef=0;
    return{...caprazTpl,baslik:'Çapraz Antrenman',yukHedef,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort,
      yapilar:[{baslik:'➕ Çapraz Antrenman',detay:'Bisiklet / yüzme / kürek / kuvvet — süre ve içerik serbest',_caprazNot:true}]};
  }
  return REST;
}

// 2 haftalık plan üret

// Öğrenme motoru: geçmiş antrenmanlardan kişisel yük katsayısı hesapla
function calcPersonalYukFactor(tip, athWorkouts, ath){
  const VARSAYILAN={kolay:0.8,aerobik:1.1,uzun:1.25,tempo:1.55,esik:1.7,interval:2.1,
    yokus_kisa:2.1,yokus_uzun:2.0,tirmanis:2.0,teknik:1.3,acici:1.0,capraz:0.8,
    progressive:1.4,cruise:1.65,yaris_tempo:1.8,on_off:1.9,tempo_interval:1.6,
    piramit:1.9,kesintisiz_piramit:1.7,hill_sprint:2.2,strides:0.9,back_to_back:1.2};
  const varsayilan=VARSAYILAN[tip]||1.0;
  if(!athWorkouts||athWorkouts.length<3) return varsayilan;
  // Bu tipe ait son 20 antrenmanı al
  const tipWks=athWorkouts
    .filter(w=>(w.tur||w.spor||'aerobik')===tip&&w.sure_dk>0)
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,20);
  if(tipWks.length<2) return varsayilan;
  // Her antrenman için gerçek katsayı: yukObj / sure_dk
  const katsayilar=tipWks.map(w=>{
    const m=calcMetrics(w,ath);
    const sureDk=Math.round((toSec(w.sure_sa,w.sure_dk||0,w.sure_sn)||0)/60);
    if(sureDk<10||!m.yukObj) return null;
    return m.yukObj/sureDk;
  }).filter(k=>k!==null&&k>0&&k<5);
  if(katsayilar.length<2) return varsayilan;
  // Ağırlıklı ortalama: son antrenmanlar daha fazla ağırlık
  let sum=0,weight=0;
  katsayilar.forEach((k,i)=>{const w=katsayilar.length-i;sum+=k*w;weight+=w;});
  const kisisel=sum/weight;
  // Varsayılan ile %40/%60 blend — aşırı sapmaları önle
  return round2(varsayilan*0.4+kisisel*0.6);
}


function generateTwoWeekPlan(athlete, history, races, actualWorkouts, testPlanlar=[], optimizeMode=false){
  const today=new Date();
  const last=history[history.length-1];
  const {primary,intermediate}=selectRaces(athlete,races);
  const kosuGunleri=athlete.kosu_gunleri||[];
  const caprazGunleri=athlete.capraz_gunleri||[];
  const athWorkouts=actualWorkouts.filter(w=>w.athleteId===athlete.id);
  const weekTargets=calcWeeklyTargets(athlete,races,actualWorkouts||[],optimizeMode,history);

  const weeks=[];
  let simAtl=last?.atl||0, simCtl=last?.ctl||0;
  let sonYogunGunGlobal=false; // Haftalar arası korunur
  let plannedKaliteliCarry=[]; // Hafta 0'da planlanan kaliteli tipler → hafta 1'de tekrar önleme

  for(let weekOff=0;weekOff<2;weekOff++){
    const {start}=getWeekBounds(weekOff);
    const days=[];
    const wt=weekTargets.find(t=>{
      const ws=new Date(start);
      return t.weekStart.toDateString()===ws.toDateString();
    });
    // Rotasyon indeksi: sporcu ID hash'i + history uzunluğu
    // → her sporcu farklı sekans noktasından başlar, benzer history'ye rağmen farklı antrenman alır
    const athHash = (athlete.id||'').split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0, 0);
    const rotIdx = Math.abs(athHash % 97) + Math.floor((history.length||0)/7) + weekOff;
    
    // Son 4 haftada yapılan kaliteli antrenman tiplerini bul (tekrar önleme)
    // weekOff=1 ise önceki haftanın PLANLANAN kaliteli tiplerini de dahil et
    const recentKaliteliBase = athWorkouts
      .filter(w=>['interval','esik','tempo','piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','yokus_kisa','yokus_uzun'].includes(w.tur))
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
      .slice(0,4)
      .map(w=>w.tur);
    const recentKaliteli = weekOff>0
      ? [...plannedKaliteliCarry, ...recentKaliteliBase].slice(0,6)
      : recentKaliteliBase;
    
    // Son uzun koşular — tplUzun için progresyon hesabında kullanılır
    // Yaklaşım: etiketten bağımsız, her haftanın EN UZUN koşusunu al
    // (sporcu aerobik etiketiyle de uzun mesafe koşabilir; etikete güvenmemek daha sağlıklı)
    const recentLongRuns = (()=>{
      const kosuWks = athWorkouts.filter(w=>w.date&&(w.spor==='kosu'||!w.spor));
      const byWeek = {};
      kosuWks.forEach(w=>{
        const d = new Date(w.date+'T12:00:00');
        const day = d.getDay();
        const diffToMon = day===0?-6:1-day;
        const mon = new Date(d); mon.setDate(d.getDate()+diffToMon);
        const wk = mon.toISOString().split('T')[0];
        const sureDk = Math.round((toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0)/60);
        const km = parseFloat(w.mesafe)||0;
        // Süre yoksa mesafeden tahmin (yaklaşık 5dk/km)
        const efektifDk = sureDk || Math.round(km*5);
        if(!byWeek[wk]||efektifDk>byWeek[wk].sure_dk){
          byWeek[wk]={date:w.date, sure_dk:efektifDk, km};
        }
      });
      // Son 6 haftanın en uzun koşuları, yeniden eskiye, >30dk olanlar
      return Object.values(byWeek)
        .filter(w=>w.sure_dk>30)
        .sort((a,b)=>new Date(b.date)-new Date(a.date))
        .slice(0,6);
    })();

    // Son antrenmanın toparlanma bilgisini hesapla
    const sonAntrenman=athWorkouts.filter(w=>w.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const sonRecoveryHedef=sonAntrenman?.recovery_hedef?new Date(sonAntrenman.recovery_hedef):null;
    const sonRecoverySaatler=sonAntrenman?.recovery_saatler||0;

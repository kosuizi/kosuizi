    let wkStats={count:0,kaliteliYok:true,uzunYapildi:false,wkLoad:0,dpHedefHafta:wt?.targetDp||0,targetKmHafta:wt?.targetKm||0,weekOff:rotIdx,isFutureWeek:weekOff>0,recentKaliteli,recentLongRuns,sonYogunGun:sonYogunGunGlobal,testPlanlar:testPlanlar||[],sonAntrenmanDate:sonAntrenman?.date||null,sonRecoveryHedef,sonRecoverySaatler,athWorkouts,buHaftaKaliteli:[],kaliteliSayisi:0,aerobikSayisi:0};

    // ── Hafta İskeleti — Antrenman Bilimi Prensipleri ─────────────────────────
    // Temel prensipler:
    // 1. HARD/EASY: Kaliteli gün sonrası mutlaka en az 1 kolay/aerobik gün
    // 2. 80/20 KURALI: Haftalık koşu hacminin max %20'si yoğun
    // 3. KALİTELİ GÜN SAYISI: Temel=1, Gelişme=2, Zirve=2(max3 ileri), Taper=1
    // 4. UZUN KOŞU: Kaliteli günle bitişik olamaz, öncesi/sonrası kolay
    // 5. ART ARDA YOĞUN: Kesinlikle yasak
    const haftaIskeleti={}; // dateStr → 'kaliteli'|'uzun'|'aerobik'|'kolay'
    if(weekOff===0||weekOff===1){
      const lastEntry=history[history.length-1];
      const band=ctlBand(lastEntry?.ctl||simCtl||0); // haftaIskeleti için band
      const fazPhase=primary?calcPhase(new Date(start.getTime()+3*864e5).toISOString().split('T')[0],primary.tarih,primary.prep_weeks,primary):'Temel';
      
      // Faza göre max kaliteli gün sayısı
      const maxKaliteli={
        'Temel':1, 'Gelişme':2, 'Zirve':2, 'Taper':1, 'Yarış Sonrası':0
      }[fazPhase]||1;

      // Tüm koşu günlerini topla (geçmiş+gelecek)
      const kosuGunleriHafta=[];
      let tmpAtl=simAtl, tmpCtl=simCtl;
      for(let di=0;di<7;di++){
        const d=new Date(start);d.setDate(start.getDate()+di);
        const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dd2=String(d.getDate()).padStart(2,'0');
        const ds=`${y}-${mo}-${dd2}`;
        const dShort=DAYS_SHORT[d.getDay()];
        const isPastDay=d<today;
        const isKosuDay=kosuGunleri.includes(dShort);
        const isUzunDay=(Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean)).includes(dShort);
        const estTsb=round1(tmpCtl-tmpAtl);
        if(isKosuDay)kosuGunleriHafta.push({ds,di,estTsb,isUzunDay,isPast:isPastDay});
        const estLoad=isKosuDay?80:20;
        tmpAtl=estLoad*λ_atl+tmpAtl*(1-λ_atl);
        tmpCtl=estLoad*λ_ctl+tmpCtl*(1-λ_ctl);
      }

      // Adım 1: Uzun koşu günlerini kilitle
      const uzunDays=new Set();
      kosuGunleriHafta.forEach(g=>{
        if(g.isUzunDay){haftaIskeleti[g.ds]='uzun';uzunDays.add(g.di);}
      });

      // Adım 1b: Geçmiş günlerde gerçek antrenmanları iskelete yansıt
      kosuGunleriHafta.filter(g=>g.isPast).forEach(g=>{
        const gercekler=athWorkouts.filter(w=>w.date===g.ds);
        if(gercekler.length===0){
          haftaIskeleti[g.ds]='atlandı'; // yapılmamış
          return;
        }
        const yapilan=gercekler.map(w=>w.tur||w.spor||'aerobik');
        const kaliteliYapildi=yapilan.some(t=>['interval','esik','tempo','yokus_kisa','yokus_uzun',
          'piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint'].includes(t));
        const uzunYapildi=yapilan.some(t=>['uzun','tirmanis'].includes(t));
        if(uzunYapildi) haftaIskeleti[g.ds]='uzun';
        else if(kaliteliYapildi) haftaIskeleti[g.ds]='kaliteli';
        else haftaIskeleti[g.ds]='aerobik';
      });

      // Adım 2: Kaliteli gün adaylarını belirle — geçmişte yapılanları say
      const gecmisKaliteliSayisi=kosuGunleriHafta.filter(g=>
        g.isPast&&['kaliteli','uzun'].includes(haftaIskeleti[g.ds])
      ).length;
      const kalanKaliteliKota=Math.max(0,maxKaliteli-gecmisKaliteliSayisi);

      // Kural: uzun koşuya bitişik olamaz, art arda olamaz
      const kalanlar=kosuGunleriHafta.filter(g=>!haftaIskeleti[g.ds]&&!g.isPast);
      kalanlar.sort((a,b)=>b.estTsb-a.estTsb); // En yüksek TSB önce

      const kaliteliAtanan=[]; // di (gün indeksi) listesi
      // Geçmiş kaliteli günlerin indekslerini de dikkate al
      const gecmisKaliteliDi=kosuGunleriHafta
        .filter(g=>g.isPast&&haftaIskeleti[g.ds]==='kaliteli')
        .map(g=>g.di);
      const gecmisUzunDi=kosuGunleriHafta
        .filter(g=>g.isPast&&haftaIskeleti[g.ds]==='uzun')
        .map(g=>g.di);

      for(const g of kalanlar){
        if(kaliteliAtanan.length>=kalanKaliteliKota) break;
        
        // Hard/Easy: geçmiş ve gelecek kaliteli/uzun günlerle bitişik olamaz
        const oncekiYogun=
          kaliteliAtanan.some(di=>Math.abs(di-g.di)===1)||
          [...uzunDays].some(di=>Math.abs(di-g.di)===1)||
          gecmisKaliteliDi.some(di=>Math.abs(di-g.di)===1)||
          gecmisUzunDi.some(di=>Math.abs(di-g.di)===1);
        if(oncekiYogun) continue;

        haftaIskeleti[g.ds]='kaliteli';
        kaliteliAtanan.push(g.di);
      }

      // Adım 3: Kalan günleri aerobik/kolay olarak doldur
      // Geçmiş ve gelecek kaliteli/uzun günlerin ertesi → kolay
      const tumYogunDi=[...kaliteliAtanan,...gecmisKaliteliDi,...gecmisUzunDi,...uzunDays];
      kosuGunleriHafta.forEach(g=>{
        if(haftaIskeleti[g.ds]) return; // zaten atanmış (geçmiş gerçek dahil)
        if(g.isPast) return; // geçmiş günler zaten 1b'de işlendi
        const sonrakiGunKaliteli=kaliteliAtanan.some(di=>di-g.di===1);
        const oncekiGunYogun=tumYogunDi.some(di=>g.di-di===1);
        if(oncekiGunYogun){
          haftaIskeleti[g.ds]='kolay'; // Yoğun sonrası aktif toparlanma
        } else if(sonrakiGunKaliteli){
          haftaIskeleti[g.ds]='kolay'; // Kaliteli öncesi hazırlık
        } else {
          haftaIskeleti[g.ds]='aerobik';
        }
      });
    }

    let _b2bNextDate=null; // OP-3: B2B Gün 1 tespit edilince ertesi günü işaretle
    for(let di=0;di<7;di++){
      const d=new Date(start);d.setDate(start.getDate()+di);
      // toISOString() UTC kullanır — yerel tarih bileşenlerini al
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,'0');
      const d2=String(d.getDate()).padStart(2,'0');
      const dateStr=`${y}-${m}-${d2}`;
      const isToday=dateStr===`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      // Bugün için simState: gerçek history son değerini kullan (simülasyon değil)
      // Geçmiş günler için simüle edilen değerleri kullan (simAtl/simCtl)
      const simState=isToday&&last
        ?{atl:round1(last.atl||0),ctl:round1(last.ctl||0),tsb:round1((last.ctl||0)-(last.atl||0)),acwr:last.acwr||null,mechCtl:round1(last.mechCtl||0),mechAtl:round1(last.mechAtl||0)}
        :{atl:round1(simAtl),ctl:round1(simCtl),tsb:round1(simCtl-simAtl),acwr:simCtl>1?round2(simAtl/simCtl):null,mechCtl:round1(last?.mechCtl||0),mechAtl:round1(last?.mechAtl||0)};
      // isPast: sadece tarih karşılaştırması — saat farkından etkilenmesin
      const isPast=dateStr<`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const dtR=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-d)/864e5):null;
      const nextInt=intermediate.filter(r=>new Date(r.tarih+'T12:00:00')>=d).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih))[0];
      const dtInt=nextInt?Math.ceil((new Date(nextInt.tarih+'T12:00:00')-d)/864e5):null;
      const phase=primary?calcPhase(dateStr,primary.tarih,primary.prep_weeks,primary):'Temel';
      const actual=athWorkouts.filter(w=>w.date===dateStr);
      let actualLoad=0,actualKm=0,actualDp=0;
      actual.forEach(w=>{
        const m=calcMetrics(w,athlete);
        actualLoad+=m.yukObj||0;
        actualKm+=parseFloat(w.mesafe)||0;
        actualDp+=parseFloat(w.irtifa)||0;
      });
      let planned=planDay(dateStr,athlete,simState,phase,dtR,dtInt,
        {...wkStats, haftaGunTipi:haftaIskeleti[dateStr]||null,
          kalanKosuGun:kosuGunleri.filter(g=>{
            const gunler=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
            const bugunIdx=d.getDay();
            return kosuGunleri.some(kg=>{
              const kIdx=gunler.indexOf(kg);
              return kIdx>bugunIdx||(kIdx===bugunIdx);
            });
          }).length||1},
        kosuGunleri,caprazGunleri,primary||null);
      // ── OP-3: Back-to-Back Gün 2 oto-enjeksiyonu ──
      if(_b2bNextDate===dateStr&&!(isPast&&actual.length>0)){
        const _b2bZones=calcZones(athlete);
        const _b2bBand=ctlBand(simState.ctl||0);
        const _b2bDp=planned.dpHedef||0;
        planned=tplBackToBackGun2(_b2bBand,_b2bZones,_b2bDp);
        planned.date=dateStr;
        planned.yukHedef=Math.round(planned.sure_dk*0.8);
        planned._b2bAutoAssigned=true;
      }
      _b2bNextDate=null; // reset
      if(planned.tip==='back_to_back'&&planned.b2bGun===1){
        // Ertesi günü B2B Gün 2 olarak işaretle
        const _nextD=new Date(d);_nextD.setDate(_nextD.getDate()+1);
        _b2bNextDate=`${_nextD.getFullYear()}-${String(_nextD.getMonth()+1).padStart(2,'0')}-${String(_nextD.getDate()).padStart(2,'0')}`;
      }
      // kaliteliSayisi artırımı: SADECE aşağıdaki isPast/!isPast bloklarında yapılır
      // (satır 6134'teki eski artırım kaldırıldı — çift sayımı önlemek için)
      // wkStats güncelleme — geçmiş günlerde gerçek antrenman varsa onu kullan
      const isTestDay=(testPlanlar||[]).some(p=>p.athId===athlete.id&&p.date===dateStr);
      // Geçmiş günlerde + bugün antrenman yapıldıysa gerçek veriyi kullan
      const primaryActual = actual.length > 0 ? actual[0] : null;
      const treatAsActual = (isPast || (isToday && actual.length > 0)) && primaryActual;
      const effectiveTip = treatAsActual
        ? (primaryActual.tur || primaryActual.spor || 'aerobik')
        : planned.tip;
      // Geçmiş günlerde + bugün tüm antrenmanları başlıkta göster
      const effectiveBaslik = (isPast || (isToday && actual.length > 0)) && actual.length > 0
        ? actual.map(w => {
            const t = w.tur || w.spor || 'aerobik';
            const sporlbl = SPOR_MAP[w.spor]?.l || '';
            const turlbl = TUR_LABELS[t] || t;
            return w.spor === 'kosu' ? turlbl : sporlbl || turlbl;
          }).join(' + ')
        : planned.baslik;
      const effectiveSureDk = (isPast || (isToday && actual.length > 0)) && actual.length > 0
        ? Math.round(actual.reduce((s,w) => s + (toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0), 0) / 60)
        : planned.sure_dk;

      // wkStats: geçmiş + bugün antrenman yapıldıysa gerçek veriyi kullan
      if((isPast || (isToday && actual.length > 0)) && actual.length > 0){
        actual.forEach(w => {
          const t = w.tur || w.spor || 'aerobik';
          if(t === 'dinlenme') return;
          wkStats.count++;
          const isKaliteli=['interval','esik','tempo','yokus_kisa','yokus_uzun','piramit',
            'kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint'].includes(t);
          if(isKaliteli){
            wkStats.kaliteliYok=false;
            wkStats.kaliteliSayisi=(wkStats.kaliteliSayisi||0)+1;
            // Bu haftanın gerçek kaliteli antrenmanlarını da takip et
            wkStats.buHaftaKaliteli=[...(wkStats.buHaftaKaliteli||[]),t];
            // recentKaliteli'ye de ekle — gelecek günlerde tekrar önleme
            wkStats.recentKaliteli=[t,...(wkStats.recentKaliteli||[])];
          }
          if(['uzun','tirmanis'].includes(t)) wkStats.uzunYapildi=true;
          wkStats.wkLoad += calcMetrics(w,athlete).yukObj||0;
          // Geçmiş günde yoğun antrenman — sonraki gün planını etkile
          wkStats.sonYogunGun=['interval','esik','yokus_kisa','yokus_uzun','tirmanis'].includes(t);
        });
      } else if(!isPast){
        const t = planned.tip;
        if(t !== 'dinlenme'){
          wkStats.count++;
          const isKaliteli=['interval','esik','tempo','yokus_kisa','yokus_uzun','piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','progressive','strides'].includes(t);
          if(isKaliteli){
            wkStats.kaliteliYok=false;
            wkStats.kaliteliSayisi=(wkStats.kaliteliSayisi||0)+1;
            wkStats.buHaftaKaliteli=[...(wkStats.buHaftaKaliteli||[]),t];
          }
          if(['uzun','tirmanis'].includes(t)) wkStats.uzunYapildi=true;
          wkStats.wkLoad += planned.yukHedef||0;
        }
      }

      // Aerobik/kolay gün sayacı — planDay'de çeşitlendirme için
      if(!isPast && ['aerobik','kolay'].includes(haftaIskeleti[dateStr])){
        wkStats.aerobikSayisi=(wkStats.aerobikSayisi||0)+1;
      }

      const isYogunTip=['interval','esik','yokus_kisa','yokus_uzun','tirmanis'].includes(effectiveTip);
      // Ard arda yoğun gün takibi — haftalar arası korunur
      wkStats.sonYogunGun=isYogunTip;
      sonYogunGunGlobal=isYogunTip;
      // Kaliteli antrenman simülasyon yükünü yumuşat
      const rawLoad=isPast?(actualLoad||0):(planned.yukHedef||0);
      const hasKaliteliActual=isPast&&actual.some(w=>['interval','esik','yokus_kisa','yokus_uzun'].includes(w.tur||w.spor));
      const isKaliteliTip=hasKaliteliActual||['interval','esik','yokus_kisa','yokus_uzun'].includes(effectiveTip);
      const simFactor=isTestDay?0.4:isKaliteliTip?0.75:1.0;
      const loadForSim=Math.round(rawLoad*simFactor);
      simAtl=loadForSim*λ_atl+simAtl*(1-λ_atl);
      simCtl=loadForSim*λ_ctl+simCtl*(1-λ_ctl);
      let comparison=null;
      if((isPast||isToday)&&actual.length>0){
        const YUKKAT={kolay:0.8,aerobik:1.1,uzun:1.25,tempo:1.55,esik:1.7,interval:2.1,
          yokus_kisa:2.1,yokus_uzun:2.0,tirmanis:2.0,teknik:1.3,acici:1.0,capraz:0.6,
          progressive:1.4,cruise:1.65,yaris_tempo:1.8,on_off:1.9,piramit:1.9,
          kesintisiz_piramit:1.7,hill_sprint:2.2,strides:0.9,back_to_back:1.2};

        // Gerçek antrenmanları tip bazında ayır
        const gercekKosu=actual.find(w=>w.spor==='kosu'||!w.spor);
        const gercekCapraz=actual.find(w=>w.spor&&w.spor!=='kosu');
        const gercekKosuSure=gercekKosu?Math.round((toSec(gercekKosu.sure_sa,gercekKosu.sure_dk,gercekKosu.sure_sn)||0)/60):0;
        const gercekCaprazSure=gercekCapraz?Math.round((toSec(gercekCapraz.sure_sa,gercekCapraz.sure_dk,gercekCapraz.sure_sn)||0)/60):0;

        // Plan tipi: planned'dan al (overrideMap varsa oradan geliyor)
        const refTip=planned.tip||'aerobik';
        const planKat=YUKKAT[refTip]||1.1;

        // Plan süresi: gerçek koşu süresi kullan (forceEasy'nin kısalttığı değeri değil)
        // Böylece "o tip antrenman için beklenen yük" doğru hesaplanır
        const refSure=gercekKosuSure>0?gercekKosuSure:(planned.sure_dk||45);

        // Çapraz yük: gerçek çapraz süresi varsa onu kullan
        const caprazSure=gercekCaprazSure>0?gercekCaprazSure:(planned.isKosuCapraz?45:0);
        const caprazEkYuk=caprazSure>0?Math.round(caprazSure*(YUKKAT.capraz||0.6)):0;

        const planYuk=Math.round(refSure*planKat)+caprazEkYuk;
        if(planYuk>0){
          const diff=round1(actualLoad-planYuk);
          const pct=Math.round(actualLoad/planYuk*100);
          comparison={actual:round1(actualLoad),planned:planYuk,diff,pct,actualKm:round1(actualKm),actualDp:Math.round(actualDp),status:pct>=80&&pct<=120?'ok':pct<80?'eksik':'fazla'};
        }
      } else if(isPast&&actual.length===0&&planned.tip!=='dinlenme'){
        comparison={actual:0,planned:planned.yukHedef,diff:-planned.yukHedef,pct:0,actualKm:0,actualDp:0,status:'atlandı'};
      }
      // Geçmiş günlerde + bugün yapılan antrenmanlar: gerçek türe göre doğru şablon
      let effectiveYapilar=planned.yapilar;
      if((isPast || (isToday && actual.length > 0)) && actual.length>0){
        const w=actual[0];
        const gercekTur=w.tur||w.spor||'aerobik';
        const gercekBand=ctlBand(simState.ctl||0);
        const gercekZones=calcZones(athlete);
        const gercekSure=Math.round((toSec(w.sure_sa,w.sure_dk||0,w.sure_sn)||0)/60)||planned.sure_dk||45;
        const gercekPhase=phase||'Temel';
        try{
          let gercekTpl=null;
          if(w.yapi_notu){
            gercekTpl=tplFromYapiNotu(gercekTur,w.yapi_notu,gercekBand,gercekSure,gercekZones,athlete.disiplin||'karma',gercekPhase,simState.ctl||0);
          }
          if(!gercekTpl){
            if(gercekTur==='kolay') gercekTpl=tplKolay(gercekBand,gercekSure,gercekZones);
            else if(gercekTur==='aerobik') gercekTpl=tplAerobik(gercekBand,gercekSure,gercekZones,athlete.disiplin||'karma');
            else if(gercekTur==='uzun') gercekTpl=tplUzun(gercekBand,simState.ctl||0,gercekZones,athlete.disiplin||'karma',0,[]);
            else if(gercekTur==='tempo') gercekTpl=tplTempo(gercekBand,gercekSure,gercekZones,gercekPhase);
            else if(gercekTur==='esik') gercekTpl=tplEsik(gercekBand,gercekSure,gercekZones,gercekPhase);
            else if(gercekTur==='interval') gercekTpl=tplInterval(gercekBand,gercekPhase,gercekZones);
            else if(gercekTur==='piramit') gercekTpl=tplPiramit(gercekBand,gercekZones,gercekPhase);
            else if(gercekTur==='kesintisiz_piramit') gercekTpl=tplKesintisizPiramit(gercekBand,gercekZones,gercekPhase);
            else if(gercekTur==='yokus_kisa') gercekTpl=tplYokusKisa(gercekBand,gercekZones,gercekPhase);
            else if(gercekTur==='yokus_uzun') gercekTpl=tplYokusUzun(gercekBand,gercekZones,gercekPhase);
            else if(gercekTur==='cruise') gercekTpl=tplCruise(gercekBand,gercekSure,gercekZones,gercekPhase);
            else if(gercekTur==='on_off') gercekTpl=tplOnOff(gercekBand,gercekZones,gercekPhase);
            else if(gercekTur==='tempo_interval') gercekTpl=tplTempoInterval(gercekBand,gercekSure,gercekZones,gercekPhase);
            else if(gercekTur==='progressive') gercekTpl=tplProgressive(gercekBand,gercekSure,gercekZones,gercekPhase);
            else if(gercekTur==='tirmanis') gercekTpl=tplTirmanisAcik(gercekBand,gercekSure,gercekZones,0);
            else if(gercekTur==='acici') gercekTpl=tplAcici(gercekSure,gercekPhase);
            else if(gercekTur==='strides') gercekTpl=tplStrides(gercekBand,gercekSure,gercekZones,gercekPhase);
            else if(gercekTur==='hill_sprint') gercekTpl=tplHillSprint(gercekBand,gercekZones,gercekPhase);
          }
          if(gercekTpl?.yapilar?.length>0) effectiveYapilar=gercekTpl.yapilar;
        }catch(e){ /* hata olursa plan yapilarını kullan */ }
      }

      days.push({
        ...planned,
        tip:effectiveTip,
        baslik:effectiveBaslik,
        sure_dk:effectiveSureDk,
        yapilar:effectiveYapilar,
        actual,actualLoad:round1(actualLoad),actualKm:round1(actualKm),actualDp:Math.round(actualDp),comparison,nextInt:nextInt||null
      });
    }
    // Haftalık gerçekleşen toplam
    const wkActualKm=round1(days.reduce((s,d2)=>s+d2.actualKm,0));
    const wkActualDp=Math.round(days.reduce((s,d2)=>s+d2.actualDp,0));
    weeks.push({weekOff,start,days,primary,intermediate,wkStats,wt,wkActualKm,wkActualDp});

    // Bu haftanın planlanan kaliteli tiplerini bir sonraki haftaya taşı
    // (gerçek antrenman verisine dayanmayan, sadece bu hafta planlanan tipler)
    if(weekOff===0){
      plannedKaliteliCarry=[...(wkStats.buHaftaKaliteli||[])];
    }
  }
  return{weeks,primary,intermediate};
}

// ── Plan Snapshot Sistemi ─────────────────────────────────────────────────────
// Haftalık plan Firebase'e dondurulur. Yalnızca 22:00'da sapma varsa güncellenir.
// Firebase key: plan_snapshots/{athId}/{weekKey}
// Snapshot: {weekKey, athId, generatedAt, lastReviewAt, overrideMap, reviewLog}

function generatePlanSnapshot(athlete,history,races,workouts,testPlanlar,targetWeekKey=null){
  const now=new Date();
  const todayStr=localDateStr(now);
  const plan=generateTwoWeekPlan(athlete,history,races,workouts,testPlanlar||[]);
  const overrideMap={};

  const targetKey=targetWeekKey||getWeekKey(0);
  const targetWeekStart=new Date(targetKey+'T00:00:00');
  const targetWeekEnd=new Date(targetWeekStart);targetWeekEnd.setDate(targetWeekStart.getDate()+6);targetWeekEnd.setHours(23,59,59,999);
  const targetWeekStartStr=targetKey;
  const targetWeekEndStr=localDateStr(targetWeekEnd);

  const athWorkoutsToday=(workouts||[]).filter(w=>w.athleteId===athlete.id&&w.date===todayStr);
  const athWorkoutDates=new Set((workouts||[]).filter(w=>w.athleteId===athlete.id).map(w=>w.date));
  plan.weeks.forEach(wk=>wk.days.forEach(day=>{
    const inTargetWeek=day.date>=targetWeekStartStr&&day.date<=targetWeekEndStr;
    // Bugün veya geçmişte gerçek antrenman yapıldıysa overrideMap'e yazma — eski snap korunacak
    const isTodayWithActual=day.date===todayStr&&athWorkoutsToday.length>0;
    const isPastWithActual=day.date<todayStr&&athWorkoutDates.has(day.date);
    const inThisWeek=!targetWeekKey&&day.date>todayStr; // bugün hariç (>)
    if((inTargetWeek||inThisWeek)&&!isTodayWithActual&&!isPastWithActual){
      overrideMap[day.date]={
        tip:day.tip,baslik:day.baslik,
        sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,
        isKosuCapraz:day.isKosuCapraz||false,
        approved:false,
        yapilar:(day.yapilar||[]).map(y=>({
          baslik:y.baslik,detay:y.detay||'',_caprazNot:y._caprazNot||false,
          // Yarış günü özel alanları — primitif olduğu için JSON'da korunur
          ...(y._yaris?{_yaris:true,_yarisMesafe:y._yarisMesafe||0,_yarisPaceSec:y._yarisPaceSec||null,_yarisEstSec:y._yarisEstSec||3600,_yarisPaceStr:y._yarisPaceStr||null}:{})
        }))
      };
    }
  }));
  return{
    weekKey:targetKey,athId:athlete.id,
    generatedAt:now.toISOString(),
    lastSavedAt:now.toISOString(),
    lastReviewAt:now.toISOString(),
    overrideMap,
    b2bCompensationAdded:false,
    athleteProfile:{kosu_gunleri:athlete.kosu_gunleri,capraz_gunleri:athlete.capraz_gunleri,disiplin:athlete.disiplin,uzun_gun:athlete.uzun_gun},
    reviewLog:[{at:now.toISOString(),reason:'Plan oluşturuldu'}]
  };
}

function reviewPlanSnapshot(snapshot,athlete,history,races,workouts,testPlanlar){
  const now=new Date();
  const todayStr=localDateStr(now);
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete.id);

  let reason=null;

  // ── Uzun koşu telafisi: bu hafta uzun koşu atlandıysa bir sonraki haftaya B2B ekle ──
  // Bugün Pazar veya Cumartesi → haftanın sonu, uzun koşu denetimi yapılabilir
  const dayOfWeek=now.getDay(); // 0=Paz, 6=Cmt
  const isWeekEnd=(dayOfWeek===0||dayOfWeek===6);
  let b2bCompensationReason=null;
  if(isWeekEnd||true){ // Her gece kontrol et, çünkü uzun koşu herhangi bir gün olabilir
    const thisWeekStart=getWeekBounds(0).start;
    const thisWeekEnd=getWeekBounds(0).end;
    // Bu hafta uzun koşu yapılmış mı?
    const longRunDone=athWks.some(w=>{
      const d=new Date(w.date+'T12:00:00');
      return d>=thisWeekStart&&d<=thisWeekEnd&&['uzun','back_to_back','tirmanis'].includes(w.tur||'');
    });
    // Bu haftanın planında uzun koşu var mıydı?
    const longRunPlanned=Object.values(snapshot.overrideMap||{}).some(day=>{
      return ['uzun','back_to_back'].includes(day.tip);
    });
    // Uzun koşu planlanmış ama yapılmamış → bir sonraki haftanın ilk uygun koşu gününe B2B yerleştir
    if(longRunPlanned&&!longRunDone&&!snapshot.b2bCompensationAdded){
      const nextWeekDays=[];
      for(let i=1;i<=7;i++){
        const d=new Date(now);d.setDate(now.getDate()+i);
        nextWeekDays.push(localDateStr(d));
      }
      // Sporcu koşu günleri
      const kosuGunleri=athlete.kosu_gunleri||[];
      const DAYS_SHORT_LOCAL=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
      const b2bDay=nextWeekDays.find(dateStr=>{
        const d=new Date(dateStr+'T12:00:00');
        const dayShort=DAYS_SHORT_LOCAL[d.getDay()];
        return kosuGunleri.includes(dayShort);
      })||nextWeekDays[0];
      b2bCompensationReason=`Bu hafta uzun koşu tamamlanamadı — ${b2bDay} tarihine B2B telafi antrenmanı eklendi`;
    }
  }

  const updatedTs={...snapshot,lastReviewAt:now.toISOString()};
  if(!reason&&!b2bCompensationReason) return{updated:false,snap:updatedTs};

  // Yarın ve sonrasını yeniden üret
  const tomorrowStr=localDateStr(new Date(now.getFullYear(),now.getMonth(),now.getDate()+1));
  const newPlan=generateTwoWeekPlan(athlete,history,races,workouts,testPlanlar||[]);
  const newMap={...snapshot.overrideMap};
  // Atlandı durumunda bugünü de Manuel iptal gibi işaretle (üzeri çizili görünsün)
  if(reason&&reason.includes('atlandı')&&snapToday){
    newMap[todayStr]={tip:'dinlenme',baslik:'İptal Edildi',sure_dk:0,yukHedef:0,
      yapilar:[{baslik:'İptal',detay:'Antrenman yapılmadı (otomatik)'}]};
  }
  newPlan.weeks.forEach(wk=>wk.days.forEach(day=>{
    if(day.date>=tomorrowStr){
      // Manuel atanmış veya pace/mesafe düzenlenmiş günleri koruyarak geç
      const isManual=snapshot.manualOverrides?.[day.date];
      const hasRowOv=snapshot.rowOverrides?.[day.date];
      if(isManual||hasRowOv) return; // korunan gün — üzerine yazma
      newMap[day.date]={
        tip:day.tip,baslik:day.baslik,
        sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,
        approved:false,
        yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))
      };
    }
  }));

  // B2B telafisi — ilk uygun koşu gününe yerleştir
  if(b2bCompensationReason){
    const nextWeekDays=[];
    for(let i=1;i<=7;i++){
      const d=new Date(now);d.setDate(now.getDate()+i);
      nextWeekDays.push(localDateStr(d));
    }
    const kosuGunleri=athlete.kosu_gunleri||[];
    const DAYS_SHORT_LOCAL=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
    const b2bDay=nextWeekDays.find(dateStr=>{
      const d=new Date(dateStr+'T12:00:00');
      const dayShort=DAYS_SHORT_LOCAL[d.getDay()];
      return kosuGunleri.includes(dayShort);
    })||nextWeekDays[0];
    const last=history[history.length-1];
    const band=ctlBand(last?.ctl||0);
    const zones=calcZones(athlete);
    const b2bTpl=tplBackToBack(band,zones,0);
    newMap[b2bDay]={
      tip:'uzun',
      baslik:'B2B Telafi — Kaçırılan Uzun Koşu',
      sure_dk:b2bTpl.sure_dk,
      yukHedef:Math.round(b2bTpl.sure_dk*0.8),
      approved:false,
      yapilar:b2bTpl.yapilar.map(y=>({baslik:y.baslik,detay:y.detay||''})),
      isB2bCompensation:true
    };
  }

  const finalReason=[reason,b2bCompensationReason].filter(Boolean).join(' · ');
  return{
    updated:true,reason:finalReason,
    snap:{
      ...snapshot,
      lastReviewAt:now.toISOString(),
      overrideMap:newMap,
      cancelledDays:snapshot.cancelledDays||{},
      b2bCompensationAdded:b2bCompensationReason?true:snapshot.b2bCompensationAdded,
      reviewLog:[...(snapshot.reviewLog||[]),{at:now.toISOString(),reason:finalReason}].slice(-10)
    }
  };
}


// Koşu yapılarını al — çapraz aşama satırlarını tamamen dışla
function kosuYapilarAl(day){
  if(!day||day.tip==='capraz') return [];
  const yapilar=day.yapilar||[];
  if(!day.isKosuCapraz) return yapilar;
  // Birleşik gün: ➕ veya 🚴 ayracından önceki yapılar koşuya ait
  const sepIdx=yapilar.findIndex(y=>{
    const b=(y.baslik||'');
    return b.startsWith('➕')||b.startsWith('🚴')||y._caprazNot;
  });
  if(sepIdx>0) return yapilar.slice(0,sepIdx);
  if(sepIdx===0) return []; // Tüm yapılar çapraz ait
  // Ayraç yok — 🏃 ile başlayan bloğun yapılarını bul
  const kosutIdx=yapilar.findIndex(y=>(y.baslik||'').startsWith('🏃'));
  if(kosutIdx>=0){
    const endIdx=yapilar.findIndex((y,i)=>i>kosutIdx&&((y.baslik||'').startsWith('🚴')||(y.baslik||'').startsWith('➕')));
    return endIdx>0?yapilar.slice(kosutIdx+1,endIdx):yapilar.slice(kosutIdx+1);
  }
  return yapilar;
}

function AntrenmanlarTab({athlete}){
  const [filterTur,setFilterTur]=useState('');
  const [filterFaz,setFilterFaz]=useState('Gelişme');
  const [filterBand,setFilterBand]=useState(3);
  const [expandedKey,setExpandedKey]=useState(null);
  const [showOnlyGaps,setShowOnlyGaps]=useState(false);

  // Sporcunun zones'u — yoksa boş
  const zones=useMemo(()=>{
    if(!athlete) return {hrZones:[],paceZones:[]};
    try{return calcZones(athlete)||{hrZones:[],paceZones:[]};}catch(e){return{hrZones:[],paceZones:[]};}
  },[athlete]);
  const dis=athlete?.disiplin||'karma';
  const ctl=50;

  // Sadece koşu türleri
  const kosuTurler=ANTRENMAN_TURLERI.filter(t=>t.v&&t.spor==='kosu');

  // Bir (tur, yapiNotu) ikilisi için şablonu üret
  const buildTpl=(tur,yapiNotu)=>{
    const dk=50;
    let base=null;
    try{
      if(tur==='kolay')base=tplKolay(filterBand,dk,zones);
      else if(tur==='aerobik')base=tplAerobik(filterBand,dk,zones,dis);
      else if(tur==='uzun')base=tplUzun(filterBand,ctl,zones,dis,0,[]);
      else if(tur==='tempo')base=tplTempo(filterBand,dk,zones,filterFaz);
      else if(tur==='esik')base=tplEsik(filterBand,dk,zones,filterFaz);
      else if(tur==='interval')base=tplInterval(filterBand,filterFaz,zones);
      else if(tur==='yokus_kisa')base=tplYokusKisa(filterBand,zones,filterFaz);
      else if(tur==='yokus_uzun')base=tplYokusUzun(filterBand,zones,filterFaz);
      else if(tur==='tirmanis')base=tplTirmanisAcik(filterBand,dk,zones,0);
      else if(tur==='acici')base=tplAcici(dk,filterFaz);
      else if(tur==='piramit')base=tplPiramit(filterBand,zones,filterFaz);
      else if(tur==='kesintisiz_piramit')base=tplKesintisizPiramit(filterBand,zones,filterFaz);
      else if(tur==='cruise')base=tplCruise(filterBand,dk,zones,filterFaz);
      else if(tur==='progressive')base=tplProgressive(filterBand,dk,zones,filterFaz);
      else if(tur==='on_off')base=tplOnOff(filterBand,zones,filterFaz);
      else if(tur==='tempo_interval')base=tplTempoInterval(filterBand,dk,zones,filterFaz);
      else if(tur==='yaris_tempo')base=tplYarisTempo(filterBand,dk,zones,filterFaz);
      else if(tur==='hill_sprint')base=tplHillSprint(filterBand,zones,filterFaz);
      else if(tur==='strides')base=tplStrides(filterBand,dk,zones,filterFaz);
      else if(tur==='teknik'||tur==='teknik_inis')base=tplTeknikInis(filterBand,dk,zones);
      else if(tur==='back_to_back')base=tplBackToBack(filterBand,zones,0);
      else if(tur==='power_hiking')base=tplPowerHiking(filterBand,zones,0);
      else if(tur==='karma_yol')base=tplKarmaYol(filterBand,dk,zones);
    }catch(e){return{__error:e.message};}

    // Yapı notu özelleşmesi varsa tplFromYapiNotu ile yeniden üret
    if(yapiNotu&&base){
      try{
        const spec=tplFromYapiNotu(tur,yapiNotu,filterBand,base.sure_dk||dk,zones,dis,filterFaz,ctl);
        if(spec) return {...spec,__matched:true};
      }catch(e){}
      return{...base,__matched:false,yapi_notu:yapiNotu};
    }
    return base;
  };

  // Tüm satırları oluştur
  const rows=useMemo(()=>{
    const out=[];
    kosuTurler.forEach(t=>{
      const notlar=YAPI_NOTLARI[t.v]||[];
      if(notlar.length===0){
        const tpl=buildTpl(t.v,'');
        out.push({
          tur:t.v,turLabel:t.l,yapiNotu:'(varsayılan)',
          tpl,
          gapNotlar:true,gapTpl:!tpl||tpl.__error,gapMatch:false
        });
      } else {
        notlar.forEach(n=>{
          const tpl=buildTpl(t.v,n);
          out.push({
            tur:t.v,turLabel:t.l,yapiNotu:n,
            tpl,
            gapNotlar:false,
            gapTpl:!tpl||tpl.__error,
            gapMatch:tpl&&tpl.__matched===false
          });
        });
      }
    });
    return out;
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[filterFaz,filterBand,athlete]);

  const filteredRows=rows.filter(r=>{
    if(filterTur&&r.tur!==filterTur)return false;
    if(showOnlyGaps&&!(r.gapNotlar||r.gapTpl||r.gapMatch))return false;
    return true;
  });

  // İstatistikler
  const stats=useMemo(()=>{
    const turSet=new Set(rows.map(r=>r.tur));
    const missingNotlar=[...new Set(rows.filter(r=>r.gapNotlar).map(r=>r.tur))];
    const missingTpl=[...new Set(rows.filter(r=>r.gapTpl).map(r=>r.tur))];
    const missingMatch=[...new Set(rows.filter(r=>r.gapMatch).map(r=>r.tur))];
    return{
      turCount:turSet.size,
      variantCount:rows.length,
      missingNotlar,missingTpl,missingMatch,
    };
  },[rows]);

  const e=React.createElement;

  return e('div',null,
    e('div',{className:'card'},
      e('div',{className:'card-title'},'Antrenman Kütüphanesi'),
      e('div',{style:{fontSize:13,color:'var(--text-secondary)',marginBottom:12}},
        'Sistemde tanımlı tüm koşu antrenmanları. Her yapı notu varyantı için aşama satırları burada görünür. Kırmızı rozetli satırlar, sistem önerisiyle eşleştirmenin kırık olduğu noktalardır.'
      ),
      e('div',{className:'grid4',style:{marginBottom:12}},
        e('div',{className:'metric'},
          e('div',{className:'metric-label'},'Toplam Tür'),
          e('div',{className:'metric-val'},stats.turCount)
        ),
        e('div',{className:'metric'},
          e('div',{className:'metric-label'},'Toplam Varyant'),
          e('div',{className:'metric-val'},stats.variantCount)
        ),
        e('div',{className:'metric',style:{borderLeft:'3px solid var(--warn)'}},
          e('div',{className:'metric-label'},'Yapı Notu Eksik'),
          e('div',{className:'metric-val',style:{color:'var(--warn)'}},stats.missingNotlar.length),
          stats.missingNotlar.length>0&&e('div',{className:'metric-sub'},stats.missingNotlar.join(', '))
        ),
        e('div',{className:'metric',style:{borderLeft:'3px solid var(--danger)'}},
          e('div',{className:'metric-label'},'Eşleşme Kırık'),
          e('div',{className:'metric-val',style:{color:'var(--danger)'}},stats.missingMatch.length),
          stats.missingMatch.length>0&&e('div',{className:'metric-sub'},stats.missingMatch.join(', '))
        )
      ),
      e('div',{className:'form-grid'},
        e('div',{className:'form-group'},
          e('label',null,'Tür Filtre'),
          e('select',{value:filterTur,onChange:ev=>setFilterTur(ev.target.value)},
            e('option',{value:''},'— Tümü —'),
            kosuTurler.map(t=>e('option',{key:t.v,value:t.v},t.l))
          )
        ),
        e('div',{className:'form-group'},
          e('label',null,'Faz'),
          e('select',{value:filterFaz,onChange:ev=>setFilterFaz(ev.target.value)},
            ['Temel','Gelişme','Zirve','Taper'].map(f=>e('option',{key:f,value:f},f))
          )
        ),
        e('div',{className:'form-group'},
          e('label',null,'Bant (1-5)'),
          e('select',{value:filterBand,onChange:ev=>setFilterBand(parseInt(ev.target.value))},

        e('div',{className:'form-group'},
          e('label',null,'Görünüm'),
          e('label',{style:{display:'flex',alignItems:'center',gap:6,fontSize:12,cursor:'pointer',padding:'7px 0'}},
            e('input',{type:'checkbox',checked:showOnlyGaps,onChange:ev=>setShowOnlyGaps(ev.target.checked)}),
            'Sadece eksikleri göster'
          )
        )
      )
    ),

    filteredRows.length===0
      ?e('div',{className:'empty'},'Filtreye uyan antrenman yok.')
      :filteredRows.map((r,i)=>{
        const key=r.tur+'|'+i;
        const isOpen=expandedKey===key;
        const hasGap=r.gapNotlar||r.gapTpl||r.gapMatch;
        return e('div',{key,className:'card',style:{
          padding:'10px 14px',marginBottom:6,
          borderLeft:hasGap?'3px solid var(--danger)':'3px solid var(--success)'
        }},
          e('div',{
            style:{display:'flex',alignItems:'center',gap:10,cursor:'pointer',flexWrap:'wrap'},
            onClick:()=>setExpandedKey(isOpen?null:key)
          },
            e('span',{style:{fontSize:18}},tipEmoji(r.tur)),
            e('div',{style:{flex:1,minWidth:0}},
              e('div',{style:{fontSize:13,fontWeight:600}},r.turLabel),
              e('div',{style:{fontSize:11,color:'var(--text-secondary)'}},r.yapiNotu)
            ),
            r.gapNotlar&&e('span',{style:_antBadgeStyle('warn')},'YAPI NOTU YOK'),
            r.gapTpl&&e('span',{style:_antBadgeStyle('danger')},'ÜRETECİ YOK'),
            r.gapMatch&&e('span',{style:_antBadgeStyle('danger')},'EŞLEŞMEZ'),
            !hasGap&&e('span',{style:_antBadgeStyle('success')},'✓'),
            e('span',{style:{fontSize:11,color:'var(--text-tertiary)'}},isOpen?'▼':'▶')
          ),
          isOpen&&e('div',{style:{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}},
            r.tpl&&r.tpl.__error
              ?e('div',{style:{fontSize:12,color:'var(--danger)'}},'Hata: '+r.tpl.__error)
              :r.tpl&&r.tpl.yapilar&&r.tpl.yapilar.length>0
                ?e(ReceteTablosu,{
                    yapilar:r.tpl.yapilar,
                    zones,
                    tip:r.tpl.tip,
                    readOnly:true,
                    originalCueOnly:true
                  })
                :e('div',{style:{fontSize:12,color:'var(--text-tertiary)',fontStyle:'italic'}},'Aşama satırı üretilemedi.')
          )
        );
      })
  );
}

function HaftalikPlanTab({athlete,history,races,workouts,testPlanlar,planSnapInit,onPlanSnapChange,onSaveWorkout}){  const [showLoading,setShowLoading]=useState(false);
  const [selectedPrimary,setSelectedPrimary]=useState(null);
  const [planMode,setPlanModeLocal]=useState('optimize');
  const [expandDay,setExpandDay]=useState(null);
  const [manuelAtaGun,setManuelAtaGun]=useState(null);
  const [showNextWeek,setShowNextWeek]=useState(false);
  const [swapSource,setSwapSource]=useState(null); // {date, tip, baslik, sure_dk, yukHedef, yapilar, isKosuCapraz}

  // ── Plan Snapshot ─────────────────────────────────────────────────────────
  const [planSnap,setPlanSnapLocal]=useState(planSnapInit||null);
  const planSnapRef=useRef(planSnapInit||null);
  const setPlanSnap=(snap)=>{setPlanSnapLocal(snap);planSnapRef.current=snap;if(onPlanSnapChange)onPlanSnapChange(snap);};

  const [snapReady,setSnapReady]=useState(!!planSnapInit);
  const snapFetchOkRef=useRef(false);
  const [reviewMsg,setReviewMsg]=useState(null);
  const weekKey=getWeekKey(0);


  // 1. Snapshot yükle — sporcu değişince önce sıfırla
  useEffect(()=>{
    if(!athlete){setSnapReady(true);return;}
    setPlanSnap(null);
    setSnapReady(false);
    snapFetchOkRef.current=false;
    fbGet(`plan_snapshots/${athlete.id}/${weekKey}`).then(stored=>{
      const snap=stored||null;
      snapFetchOkRef.current=true; // Firebase erişimi başarılı (veri olsun olmasın)
      if(snap){
        setPlanSnap(snap);
        if(snap.selectedPrimary!==undefined) setSelectedPrimary(snap.selectedPrimary||null);
        if(snap.planMode) setPlanModeLocal(snap.planMode);
      }
      setSnapReady(true);
    }).catch(()=>{
      snapFetchOkRef.current=false; // Firebase erişimi başarısız — yeni snap üretme!
      setSnapReady(true);
    });
  },[athlete?.id,weekKey]);

  // 2. Snap yoksa bilgi ver — artık otomatik üretilmiyor, buton gerekli
  // (eski snap'ler için athleteProfile ekleme korunuyor)
  useEffect(()=>{
    if(!snapReady||!athlete||!history.length) return;
    const snap=planSnapRef.current;
    if(snap?.lastSavedAt) return; // Kilitli snap — dokunma
    // Snap var ama athleteProfile yok (eski snap) — sadece profil ekle, planı yeniden üretme
    if(snap&&!snap.athleteProfile){
      const withProfile={...snap,athleteProfile:{kosu_gunleri:athlete.kosu_gunleri,capraz_gunleri:athlete.capraz_gunleri,disiplin:athlete.disiplin,uzun_gun:athlete.uzun_gun}};
      setPlanSnap(withProfile);
      fbSet(`plan_snapshots/${athlete.id}/${weekKey}`,withProfile).catch(()=>{});
    }
  },[snapReady,athlete?.id]);

  // Yarış seçici için mevcut upcoming yarışlar
  const athRaceIds=(athlete?.yarıslar||[]).map(x=>typeof x==='string'?x:x.id);
  const today=new Date();
  const upcomingRaces=(races||[]).filter(r=>athRaceIds.includes(r.id)&&new Date(r.tarih+'T12:00:00')>today).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));

  const racesForPlan=React.useMemo(()=>{
    if(!selectedPrimary)return races;
    return races;
  },[races,selectedPrimary]);

  const plan=React.useMemo(()=>{
    if(!athlete)return null;
    try{
    // Snapshot varsa (lastSavedAt ile kilitli): generateTwoWeekPlan çağırma
    // Sadece geçmiş günler + overrideMap'ten geleceği göster
    if(planSnap?.lastSavedAt&&planSnap?.overrideMap){
      const racesOverride=selectedPrimary?races.map(r=>({...r,__force:r.id===selectedPrimary})):races;
      // Iskelet hâlâ gerekli (simState, phase vb. için) ama bağımlılıkları azalt
      const generated=generateTwoWeekPlan(athlete,history,racesOverride,workouts,testPlanlar||[],planMode==='optimize');
      const todayStr=localDateStr(new Date());
      const manualOvMap=planSnap.manualOverrides||{};
      const manualDates=new Set(Object.keys(manualOvMap));
      generated.weeks.forEach(wk=>{
        wk.days=wk.days.map(day=>{
          if(day.isPast||day.date===todayStr){
            // Tamamlanmış günde ata ile değişiklik yapıldıysa yapilar'ı overrideMap'ten al
            const ov=planSnap.overrideMap?.[day.date];
            if(ov?.yapilar?.length>0) return{...day,yapilar:ov.yapilar,tip:ov.tip||day.tip,baslik:ov.baslik||day.baslik};
            return day;
          }
          // Gelecek: her zaman overrideMap'ten
          const ov=planSnap.overrideMap[day.date];
          if(ov) return{...day,tip:ov.tip,baslik:ov.baslik,sure_dk:ov.sure_dk,yukHedef:ov.yukHedef,isKosuCapraz:ov.isKosuCapraz||false,yapilar:ov.yapilar||[]};
          // Manuel atama
          const mo=manualDates.has(day.date)?manualOvMap[day.date]:null;
          if(mo?.tip) return{...day,tip:mo.tip,baslik:mo.baslik||day.baslik};
          return day;
        });
      });
      return generated;
    }
    // Snapshot yok: taze üret
    const racesOverride=selectedPrimary?races.map(r=>({...r,__force:r.id===selectedPrimary})):races;
    return generateTwoWeekPlan(athlete,history,racesOverride,workouts,testPlanlar||[],planMode==='optimize');
    }catch(e){console.error('plan useMemo error:',e);return{_error:e.message};}
  },[athlete,history,races,workouts,selectedPrimary,planSnap]);

  const weekTargets=React.useMemo(()=>{
    if(!athlete)return[];
    const racesOverride=selectedPrimary
      ?races.map(r=>({...r,__force:r.id===selectedPrimary}))
      :races;
    return calcWeeklyTargets(athlete,racesOverride,workouts||[],planMode==='optimize',history||[]);
  },[athlete,history,races,selectedPrimary,workouts,planMode]);

  // Gerçekleşen haftalık km+D+ hesapla
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete?.id);
  const weekActuals=React.useMemo(()=>{
    return weekTargets.map(wt=>{
      const ws=wt.weekStart;const we=wt.weekEnd;
      const wWks=athWks.filter(w=>{
        const d=new Date(w.date+'T12:00:00');return d>=ws&&d<=we;
      });
      return{
        km:round1(wWks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0)),
        dp:Math.round(wWks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0)),
      };
    });
  },[weekTargets,athWks]);

  // ── İptal edilen günler ───────────────────────────────────────────────────
  // cancelledDays: planSnap'ten türetilir — ayrı state yok, sporcu değişince otomatik temizlenir
  const cancelledDays = React.useMemo(()=>planSnap?.cancelledDays||{},[planSnap]);




  const handleManuelAta=(dateStr,tpl)=>{
    const now=new Date();
    const curSnap=planSnapRef.current;
    const baslik=tpl.baslik||(tpl.yapi_notu?tpl.yapi_notu.split(' — ')[0]:'')||(TIP_NAMES[tpl.tip]||tpl.tip||'');
    const newMap={...(curSnap?.overrideMap||{}),[dateStr]:{
      tip:tpl.tip,baslik,sure_dk:tpl.sure_dk||50,
      yukHedef:Math.round((tpl.sure_dk||50)*({kolay:0.8,aerobik:1.1,uzun:1.25,tempo:1.55,esik:1.7,interval:2.1,yokus_kisa:2.1,yokus_uzun:2.0,tirmanis:2.0,teknik:1.3,acici:1.0,capraz:0.8,progressive:1.4,cruise:1.65,yaris_tempo:1.8}[tpl.tip]||1.1)),
      yapi_notu:tpl.yapi_notu||'',
      approved:false,
      yapilar:(tpl.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||'',_caprazNot:y._caprazNot}))
    }};
    const newManualOverrides={...(curSnap?.manualOverrides||{}),[dateStr]:{tip:tpl.tip,baslik,atAt:now.toISOString()}};
    // ── OP-3: Back-to-Back Gün 2 oto-enjeksiyonu (manuel atama) ──
    if(tpl.tip==='back_to_back'&&(!tpl.b2bGun||tpl.b2bGun===1)){
      const _nextD=new Date(dateStr+'T12:00:00');_nextD.setDate(_nextD.getDate()+1);
      const _nextStr=localDateStr(_nextD);
      const _b2bZones=calcZones(athlete);
      const _b2bBand=ctlBand(history[history.length-1]?.ctl||0);
      const _gun2=tplBackToBackGun2(_b2bBand,_b2bZones,tpl.dpHedef||0);
      const _gun2Baslik=_gun2.baslik||'B2B Gün 2 — Yorgun Bacak';
      newMap[_nextStr]={tip:_gun2.tip,baslik:_gun2Baslik,sure_dk:_gun2.sure_dk,
        yukHedef:Math.round(_gun2.sure_dk*0.8),yapi_notu:_gun2.yapi_notu||'',approved:false,
        yapilar:(_gun2.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))};
      newManualOverrides[_nextStr]={tip:_gun2.tip,baslik:_gun2Baslik,atAt:now.toISOString(),b2bAutoGun2:true};
    }
    const newSnap={...(curSnap||{}),weekKey,athId:athlete.id,lastReviewAt:now.toISOString(),
      lastSavedAt:new Date().toISOString(),
      cancelledDays:{...(curSnap?.cancelledDays||{})},
      selectedPrimary:selectedPrimary||null,
      overrideMap:newMap,
      manualOverrides:newManualOverrides,
      reviewLog:[...(curSnap?.reviewLog||[]),{at:now.toISOString(),reason:`${dateStr} manuel: ${baslik}${tpl.tip==='back_to_back'?' + ertesi gün B2B Gün 2':''}`}].slice(-10)
    };
    setPlanSnap(newSnap);
    setManuelAtaGun(null);
    setReviewMsg(`${dateStr} — ${baslik} atandı${tpl.tip==='back_to_back'?' (ertesi gün de B2B Gün 2 eklendi)':''}`);
    // Otomatik Firebase kaydı
    if(db||initFirebase()){
      const _ataSnap=stripUndefined(newSnap);
      db.ref(`plan_snapshots/${athlete.id}/${weekKey}`).set(_ataSnap)
        .then(()=>{ _planSnapsCache[athlete.id]=_ataSnap; })
        .catch(e=>console.error('Ata kayıt hatası:',e));
    }
  };

  // ── Madde 2: Antrenman Onay Kutusu ──────────────────────────────────────────
  const handleToggleApproved=(dateStr)=>{
    const curSnap=planSnapRef.current||{};
    const ov=curSnap.overrideMap?.[dateStr];
    if(!ov) return;
    const newApproved=!ov.approved;
    const newMap={...(curSnap.overrideMap||{}),[dateStr]:{...ov,approved:newApproved}};
    const newSnap={...curSnap,overrideMap:newMap,lastSavedAt:new Date().toISOString()};
    setPlanSnap(newSnap);
    if(db||initFirebase()){
      const _appSnap=stripUndefined(newSnap);
      db.ref(`plan_snapshots/${athlete.id}/${weekKey}`).set(_appSnap)
        .then(()=>{ _planSnapsCache[athlete.id]=_appSnap; })
        .catch(e=>console.error('Onay kayıt hatası:',e));
    }
  };

    const handleCancelDay=async(dateStr)=>{
    const newCancelled={...cancelledDays,[dateStr]:true};
    const todayStr=localDateStr(new Date());
    const now=new Date();
    const racesOv=selectedPrimary?races.map(r=>({...r,__force:r.id===selectedPrimary})):races;
    const newPlan=generateTwoWeekPlan(athlete,history,racesOv,workouts,testPlanlar||[]);
    // ── OP-6: İptal edilen günün yükünü hesapla ──
    const iptalEdilen=planSnap?.overrideMap?.[dateStr];
    const iptalYuk=iptalEdilen?.yukHedef||0;
    const iptalSure=iptalEdilen?.sure_dk||0;
    const iptalTip=iptalEdilen?.tip||'bilinmiyor';
    const newMap={...(planSnap?.overrideMap||{}),[dateStr]:{tip:'dinlenme',baslik:'İptal Edildi',sure_dk:0,yukHedef:0,approved:true,yapilar:[{baslik:'İptal',detay:`Antrenman iptal edildi (${TIP_NAMES[iptalTip]||iptalTip}, ${iptalSure}dk, yük:${iptalYuk})`}]}};
    // Yeni planı uygula
    const kalanGunler=[]; // yük dağıtılacak günler
    newPlan.weeks.forEach(wk=>wk.days.forEach(day=>{
      if(day.date>dateStr&&day.date>=todayStr&&!newCancelled[day.date]&&day.tip!=='dinlenme'){
        // Mevcut onay durumunu koru: aynı tip ise approved'u taşı, farklıysa sıfırla
        const eskiOv=planSnap?.overrideMap?.[day.date];
        const eskiApproved=(eskiOv?.approved===true&&eskiOv?.tip===day.tip);
        newMap[day.date]={tip:day.tip,baslik:day.baslik,sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,approved:eskiApproved,yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))};
        kalanGunler.push(day.date);
      } else if(day.date>dateStr&&day.date>=todayStr&&!newCancelled[day.date]){
        const eskiOv2=planSnap?.overrideMap?.[day.date];
        const eskiApproved2=(eskiOv2?.approved===true&&eskiOv2?.tip===day.tip);
        newMap[day.date]={tip:day.tip,baslik:day.baslik,sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,approved:eskiApproved2,yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))};
      }
    }));
    // ── OP-6: Yük redistribüsyonu ── iptal yükünü kalan günlere orantılı dağıt
    let redistMsg='';
    if(iptalYuk>0&&kalanGunler.length>0){
      const yukPerGun=Math.round(iptalYuk/kalanGunler.length);
      const YOGUN_TIPLER=['tempo','esik','interval','piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','yokus_kisa','yokus_uzun'];
      kalanGunler.forEach(ds=>{
        const ov=newMap[ds];
        if(!ov) return;
        // Yoğun antrenman süresini artma, sadece yük hedefini artır
        // Kolay/aerobik/uzun antrenmanların süresini ufak artır
        const isYogun=YOGUN_TIPLER.includes(ov.tip);
        if(!isYogun){
          const ekSure=Math.min(15,Math.round(yukPerGun/1.1)); // maks 15dk ekle
          ov.sure_dk=(ov.sure_dk||45)+ekSure;
          ov.yukHedef=(ov.yukHedef||0)+yukPerGun;
          ov._redistNote=`+${ekSure}dk (iptal telafisi)`;
        } else {
          // Yoğun antrenmanda sadece yük hedefini artır, süre değişmez
          ov.yukHedef=(ov.yukHedef||0)+Math.round(yukPerGun*0.5);
        }
      });
      redistMsg=` · ${iptalYuk} yük ${kalanGunler.length} güne dağıtıldı`;
    }
    const cancelReason=`${dateStr} iptal (${TIP_NAMES[iptalTip]||iptalTip}, ${iptalSure}dk)${redistMsg}`;
    const newSnap={...(planSnapRef.current||{}),weekKey,athId:athlete.id,lastReviewAt:now.toISOString(),lastSavedAt:now.toISOString(),cancelledDays:newCancelled,selectedPrimary:selectedPrimary||null,overrideMap:newMap,manualOverrides:{...(planSnapRef.current?.manualOverrides||{}),[dateStr]:{tip:'dinlenme',baslik:'İptal',atAt:now.toISOString()}},reviewLog:[...(planSnapRef.current?.reviewLog||[]),{at:now.toISOString(),reason:cancelReason}].slice(-10)};
    setPlanSnap(newSnap);
    setReviewMsg(`${dateStr} antrenmanı iptal edildi${redistMsg}`);
    if(db||initFirebase()){
      const _cancelSnap=stripUndefined(newSnap);
      db.ref(`plan_snapshots/${athlete.id}/${weekKey}`).set(_cancelSnap)
        .then(()=>{ _planSnapsCache[athlete.id]=_cancelSnap; })
        .catch(e=>console.error('Cancel kayıt hatası:',e));
    }
  };

  const handleUncancelDay=async(dateStr)=>{
    const newCancelled={...cancelledDays};delete newCancelled[dateStr];
    const todayStr=localDateStr(new Date());
    const now=new Date();
    const racesOv=selectedPrimary?races.map(r=>({...r,__force:r.id===selectedPrimary})):races;
    const newPlan=generateTwoWeekPlan(athlete,history,racesOv,workouts,testPlanlar||[]);
    const newMap={...(planSnap?.overrideMap||{})};
    newPlan.weeks.forEach(wk=>wk.days.forEach(day=>{
      if(day.date>=dateStr&&day.date>=todayStr&&!newCancelled[day.date])
        newMap[day.date]={tip:day.tip,baslik:day.baslik,sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,approved:false,yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))};
    }));
    const newSnap={...(planSnapRef.current||{}),weekKey,athId:athlete.id,lastReviewAt:now.toISOString(),lastSavedAt:now.toISOString(),cancelledDays:newCancelled,selectedPrimary:selectedPrimary||null,overrideMap:newMap,reviewLog:[...(planSnapRef.current?.reviewLog||[]),{at:now.toISOString(),reason:`${dateStr} iptali geri alındı`}].slice(-10)};
    setPlanSnap(newSnap);
    setReviewMsg(`${dateStr} iptali geri alındı`);
    if(db||initFirebase()){
      const _uncancelSnap=stripUndefined(newSnap);
      db.ref(`plan_snapshots/${athlete.id}/${weekKey}`).set(_uncancelSnap)
        .then(()=>{ _planSnapsCache[athlete.id]=_uncancelSnap; })
        .catch(e=>console.error('Uncancel kayıt hatası:',e));
    }
  };

  // ── Antrenman Yer Değiştirme (Swap) ──────────────────────────────────────
  const handleSwapDays=(sourceDateStr, targetDateStr)=>{
    if(sourceDateStr===targetDateStr){setSwapSource(null);return;}
    const now=new Date();
    const todayStr=localDateStr(now);

    // Her iki günün mevcut antrenman verilerini bul
    const allDays=(plan?.weeks||[]).flatMap(wk=>wk.days);
    const sourceDay=allDays.find(d=>d.date===sourceDateStr);
    const targetDay=allDays.find(d=>d.date===targetDateStr);
    if(!sourceDay||!targetDay){setSwapSource(null);return;}

    // Geçmiş günleri swap'a izin verme
    if(sourceDateStr<todayStr||targetDateStr<todayStr){
      setReviewMsg('Geçmiş günlerde değişiklik yapılamaz');
      setSwapSource(null);
      return;
    }

    // Dinlenme günleriyle swap'a izin ver (iptal edilmiş günler dahil)
    // Antrenman verilerini ayıkla
    const extractData=(day)=>({
      tip:day.tip, baslik:day.baslik, sure_dk:day.sure_dk,
      yukHedef:day.yukHedef||0, isKosuCapraz:day.isKosuCapraz||false,
      yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||'',_caprazNot:y._caprazNot})),
      yapi_notu:day.yapi_notu||''
    });
    const srcData=extractData(sourceDay);
    const tgtData=extractData(targetDay);

    // OverrideMap güncelle: iki günün verisini çapraz ata
    const curSnap=planSnapRef.current||{};
    const newMap={...(curSnap.overrideMap||{})};
    newMap[sourceDateStr]={...tgtData};
    newMap[targetDateStr]={...srcData};

    // ManualOverrides güncelle
    const newManualOverrides={...(curSnap.manualOverrides||{})};
    newManualOverrides[sourceDateStr]={tip:tgtData.tip,baslik:tgtData.baslik,atAt:now.toISOString(),swappedFrom:targetDateStr};
    newManualOverrides[targetDateStr]={tip:srcData.tip,baslik:srcData.baslik,atAt:now.toISOString(),swappedFrom:sourceDateStr};

    // İptal durumlarını da swap et
    const newCancelled={...(curSnap.cancelledDays||{})};
    const srcCancelled=!!newCancelled[sourceDateStr];
    const tgtCancelled=!!newCancelled[targetDateStr];
    if(srcCancelled&&!tgtCancelled){delete newCancelled[sourceDateStr];newCancelled[targetDateStr]=true;}
    else if(!srcCancelled&&tgtCancelled){delete newCancelled[targetDateStr];newCancelled[sourceDateStr]=true;}

    // Swap sonrası gelecek günleri yeniden hesapla (yük sıralaması değişti → TSB/ACWR etkilenir)
    const laterDate=sourceDateStr>targetDateStr?sourceDateStr:targetDateStr;
    const racesOv=selectedPrimary?races.map(r=>({...r,__force:r.id===selectedPrimary})):races;
    const freshPlan=generateTwoWeekPlan(athlete,history,racesOv,workouts,testPlanlar||[]);

    // Swap edilen günlerden SONRAKİ manuel atanmamış günleri taze planla güncelle
    freshPlan.weeks.forEach(wk=>wk.days.forEach(day=>{
      if(day.date>laterDate&&day.date>=todayStr&&!newCancelled[day.date]){

            React.createElement(ReadinessBar,{score:readiness?.score??readiness,detaylar:readiness?.detaylar})
          )
        ),

        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:8,marginBottom:14}},
          [

            race.kontrol_noktasi&&{l:'Kontrol Nokt.',v:race.kontrol_noktasi+' adet'},
            race.ekipman_kg&&{l:'Ekipman',v:race.ekipman_kg+' kg'},
          ].filter(Boolean).map((item,i)=>React.createElement('div',{key:i,className:'metric',style:{padding:'8px 12px'}},
            React.createElement('div',{className:'metric-label'},item.l),
            React.createElement('div',{style:{fontSize:14,fontWeight:600}},item.v)
          ))
        ),

        // Tahmini süre
        React.createElement('div',null,
          React.createElement('div',{className:'divider'}),
          React.createElement('div',{className:'card-title'},'Tahmini Bitirme Süresi'),
          !target&&React.createElement('div',{style:{fontSize:12,color:'var(--text-tertiary)',padding:'8px 0'}},
            'Tahmin hesaplanamadı. Eksik bilgi: ',
            'CTL:'+round1(last?.ctl||0)+' · ',
            'VO₂max:'+athlete?.vo2max+' · ',
            'km:'+race?.mesafe,
            React.createElement('br',null),
            'Sporcular sekmesinden VO₂max değerini kontrol edin.'
          ),
          target&&(()=>{
            // ── İyileştirme Potansiyeli ──────────────────────────────────────
            // Yarışa ve hazırlık durumuna göre gerçekçi iyileştirme aralığı
            const km=parseFloat(race.mesafe)||0;
            const dp=parseFloat(race.d_plus)||0;
            const prepWeeks=parseInt(race.prep_weeks)||12;
            const taperW=parseInt(race.taper_w)||(km>42?3:km>21?2:1);
            const daysLeft=race.tarih?Math.ceil((new Date(race.tarih+'T12:00:00')-new Date())/864e5):999;
            const trainingDaysLeft=Math.max(0,daysLeft-taperW*7);
            const totalTrainingDays=Math.max(1,(prepWeeks-taperW)*7);
            const prepPct=Math.min(1,(totalTrainingDays-trainingDaysLeft)/totalTrainingDays);

            // Mesafe & D+ bazlı max iyileştirme potansiyeli (hazırlık döngüsü başında)
            // Kısa mesafe → daha fazla iyileşme mümkün
            // Ultra/trail → teknik + D+ verimi önemli
            const dpPerKm=km>0?dp/km:0;
            let maxIyiPct;
            if(km<=5)       maxIyiPct=6.0;
            else if(km<=10) maxIyiPct=5.0;
            else if(km<=21) maxIyiPct=4.0;
            else if(km<=42) maxIyiPct=3.0;
            else if(km<=60) maxIyiPct=2.5;
            else            maxIyiPct=2.0;

            // D+ >50m/km → trail teknik verimi ekler
            if(dpPerKm>100) maxIyiPct+=1.0;
            else if(dpPerKm>50) maxIyiPct+=0.5;

            // Hazırlık tamamlanma oranına göre gerçekleşecek iyileşme tahmini
            // Erken dönem → potansiyelin az bir kısmı gerçekleşti
            // Geç dönem → potansiyelin büyük kısmı gerçekleşti
            // S-eğrisi: orta dönemde hızlı, başta ve sonda yavaş
            const realizePct=prepPct<0.1?0.05:prepPct<0.3?0.15+(prepPct-0.1)*0.5:
              prepPct<0.7?0.25+(prepPct-0.3)*1.5:prepPct<0.9?0.85+(prepPct-0.7)*0.5:0.95;

            const expectedIyi=round1(maxIyiPct*realizePct);
            const minIyi=round1(expectedIyi*0.6);
            const maxIyi=round1(Math.min(maxIyiPct,expectedIyi*1.4));

            // İyileştirilmiş hedef süre aralığı
            const tMin=round1(target.totalMin*(1-maxIyi/100));
            const tMax=round1(target.totalMin*(1-minIyi/100));
            const tHedef=round1(target.totalMin*(1-expectedIyi/100));

            return React.createElement('div',null,
              React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:12}},
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Mevcut Tahmin'),
                  React.createElement('div',{style:{fontSize:20,fontWeight:600,color:'var(--info)'}},fmtHMS(target.totalMin))
                ),
                React.createElement('div',{className:'metric',style:{border:'1px solid var(--success)',background:'var(--success-bg)'}},
                  React.createElement('div',{className:'metric-label'},'Hazırlık Sonrası Hedef'),
                  React.createElement('div',{style:{fontSize:18,fontWeight:700,color:'var(--success)'}},fmtHMS(tHedef)),
                  React.createElement('div',{style:{fontSize:11,color:'var(--success)',marginTop:2}},'−'+expectedIyi+'% iyileştirme')
                ),
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Ort. Pace (Tahmin)'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:600}},fmtPaceStr(target.totalMin,parseFloat(race.mesafe)))

// Test zamanlama: Bu sporcu için şu an test önerilmeli mi?
// Belirli bir tarih için test uygunluğunu değerlendir
function calcTestDayUygunluk(testDate, athlete, history, races, workouts, dunkuYogunPlanlanan=false){
  if(!testDate||!athlete)return null;
  const testD=new Date(testDate+'T12:00:00');
  const {primary}=selectRaces(athlete,races);
  const daysToRace=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-testD)/864e5):999;

  // Önceki günü kontrol et — kayıtlı antrenman
  const oncekiGun=new Date(testD);oncekiGun.setDate(testD.getDate()-1);
  const oncekiGunStr=`${oncekiGun.getFullYear()}-${String(oncekiGun.getMonth()+1).padStart(2,'0')}-${String(oncekiGun.getDate()).padStart(2,'0')}`;
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete.id);
  const oncekiAntrenman=athWks.find(w=>w.date===oncekiGunStr);
  const dunkuYogunKayitli=oncekiAntrenman&&['interval','esik','yokus_kisa','yokus_uzun','tirmanis'].includes(oncekiAntrenman.tur);
  const dunkuYogun=dunkuYogunKayitli||dunkuYogunPlanlanan;

  // O güne yakın geçmişteki TSB tahmini
  const last=history[history.length-1];
  const tsb=last?.tsb||0;
  const acwr=last?.acwr||1;

  const sorunlar=[];
  if(dunkuYogun)sorunlar.push('Önceki gün yoğun antrenman var ('+oncekiAntrenman.tur+') — toparlanma yetersiz');
  if(daysToRace<14)sorunlar.push('Yarışa '+daysToRace+' gün kaldı — test yorgunluğu yarışı etkileyebilir');
  if(acwr>1.3)sorunlar.push('ACWR '+acwr.toFixed(2)+' — yük birikimi yüksek');
  if(tsb< -15)sorunlar.push('TSB '+tsb.toFixed(1)+' — yorgunluk fazla, test sonuçları güvenilmez');
  if(athlete.hrv_durum==='düşük')sorunlar.push('HRV düşük — toparlanma yetersiz');

  // Önerilen alternatif günler (önümüzdeki 14 gün, uygunluk sırasıyla)
  const oneriler=[];
  const kosuGunleri=athlete.kosu_gunleri||[];
  for(let i=1;i<=14;i++){
    const d=new Date(testD);d.setDate(testD.getDate()+i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    const ds=`${y}-${m}-${dd}`;
    const dayShort=DAYS_SHORT[d.getDay()];
    if(!kosuGunleri.includes(dayShort))continue;
    const dr=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-d)/864e5):999;
    if(dr<7)continue;
    const phase=primary?calcPhase(ds,primary.tarih,primary.prep_weeks,primary):'Temel';
    if(phase==='Taper')continue;
    // Önceki günü kontrol et — kayıtlı veya planlı
    const prevD=new Date(d);prevD.setDate(d.getDate()-1);
    const prevDs=`${prevD.getFullYear()}-${String(prevD.getMonth()+1).padStart(2,'0')}-${String(prevD.getDate()).padStart(2,'0')}`;
    const prevYogun=athWks.some(w=>w.date===prevDs&&['interval','esik','yokus_kisa','yokus_uzun'].includes(w.tur));
    if(prevYogun)continue;
    const label=d.toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'});
    oneriler.push({dateStr:ds,label,dr});
    if(oneriler.length>=3)break;
  }

  return{uygun:sorunlar.length===0,sorunlar,oneriler};
}

function calcTestTiming(athlete, history, races, workouts){
  if(!athlete)return[];
  const last=history[history.length-1];
  const ctl=last?.ctl||0;
  const phase=last?.phase||'Temel';
  const today=new Date();

  // Yarışa kaç gün kaldı
  const {primary}=selectRaces(athlete,races);
  const daysToRace=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-today)/864e5):999;

  // Son testleri bul
  const athTests=(workouts||[]).filter(w=>w.athleteId===athlete.id&&w._isTest&&w._testTur);
  const lastTestByType={};
  athTests.forEach(w=>{
    const prev=lastTestByType[w._testTur];
    if(!prev||new Date(w.date)>new Date(prev.date))lastTestByType[w._testTur]=w;
  });

  const oneriler=[];
  Object.values(TEST_TURLERI).forEach(t=>{
    // Min CTL kontrolü
    if(ctl<t.min_ctl){oneriler.push({...t,durum:'bekle',neden:'CTL ('+ctl.toFixed(0)+') yeterli değil — en az '+t.min_ctl+' olmalı'});return;}
    // Faz kontrolü
    if(!t.uygun_faz.includes(phase)&&phase!=='Temel'){oneriler.push({...t,durum:'uygun_degil',neden:phase+' fazında bu test önerilmez'});return;}
    // Yarış yakınlık kontrolü
    if(daysToRace<14){oneriler.push({...t,durum:'yakin_yaris',neden:'Yarışa '+daysToRace+' gün kaldı — test riskli'});return;}
    // Frekans kontrolü
    const lastTest=lastTestByType[t.id];
    if(lastTest){
      const haftalar=Math.round((today-new Date(lastTest.date+'T12:00:00'))/(7*864e5));
      if(haftalar<t.freq_hafta){oneriler.push({...t,durum:'erken',neden:'Son testten '+haftalar+' hafta geçti — '+t.freq_hafta+' hafta beklenmeli',sonTest:lastTest});return;}
    }
    // Her şey uygun
    const vadeli=!lastTest?'İlk kez':Math.round((today-new Date(lastTest.date+'T12:00:00'))/(7*864e5))+' hafta önce yapıldı';
    oneriler.push({...t,durum:'onerilir',neden:vadeli,sonTest:lastTest||null});
  });

  return oneriler;
}

// Koşu dinamikleri analizi
function analyzeDynamics(workouts, athleteId){
  // Sabit tempolu antrenman tespiti — iki yol:
  // 1. Antrenman türü bilgisi varsa onu kullan
  // 2. Yoksa veri bazlı otomatik tespit
  const STEADY_TYPES=['kolay','aerobik','uzun'];
  const YOĞUN_TYPES=['interval','esik','tempo','yokus_kisa','yokus_uzun','tirmanis','teknik','acici','depar','yaris'];

  function isSteady(w){
    // Tür bilgisi varsa öncelikle onu kullan
    if(w.tur&&STEADY_TYPES.includes(w.tur)) return true;
    if(w.tur&&YOĞUN_TYPES.includes(w.tur)) return false;

    // Tür bilgisi yok — veri bazlı otomatik tespit
    const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
    const durMin=durSec/60;
    const avgHR=parseFloat(w.ort_nabiz)||0;
    const maxHR=parseFloat(w.maks_nabiz)||0;
    const rpe=parseFloat(w.rpe)||0;
    const mesafe=parseFloat(w.mesafe)||0;

    // Çok kısa antrenmanlar hariç
    if(durMin<15) return false;

    // RPE varsa: ≤6 = sabit tempo
    if(rpe>0&&rpe>7) return false;
    if(rpe>0&&rpe<=6) return true;

    // Nabız farkı: maks-ort < 25 bpm → sabit tempo
    if(avgHR>0&&maxHR>0){
      const hrRange=maxHR-avgHR;
      if(hrRange>35) return false; // Yoğun antrenman
      if(hrRange<=25) return true;  // Sabit tempo
    }

    // Pace tutarlılığı: pace/km makul aralıkta
    if(mesafe>2&&durMin>0){
      const paceSecKm=(durMin*60)/mesafe;
      // 4:00–9:00 /km arası sabit tempo koşusu
      if(paceSecKm>=240&&paceSecKm<=540) return true;
    }

    // Yeterli sinyal yoksa dahil et — daha fazla veri daha iyi
    return durMin>=20;
  }

  const athWks=(workouts||[]).filter(w=>{
    if(w.athleteId!==athleteId) return false;
    if(!isSteady(w)) return false;
    // Dinamik verisi olan antrenmanlar
    return parseFloat(w.kadans)>0||parseFloat(w.yer_kontak)>0||parseFloat(w.dikey_salinim)>0;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  if(!athWks.length)return null;

  // Kaç tanesi otomatik tespit edildi vs tür bilgisiyle?
  const autoDetected=athWks.filter(w=>!w.tur||!STEADY_TYPES.includes(w.tur)).length;

  const refs={
    kadans:{iyi:180,kabul:170,birim:'spm',yuksek_iyi:true},
    yer_kontak:{iyi:250,kabul:300,birim:'ms',yuksek_iyi:false},
    dikey_salinim:{iyi:7,kabul:9,birim:'cm',yuksek_iyi:false},
  };

  const sonuc={};
  ['kadans','yer_kontak','dikey_salinim'].forEach(k=>{
    const vals=athWks.map(w=>parseFloat(w[k])).filter(v=>v>0);
    if(!vals.length){sonuc[k]=null;return;}
    const avg=round1(vals.reduce((s,v)=>s+v,0)/vals.length);
    const son=vals[vals.length-1];
    const ref=refs[k];
    let seviye;
    if(ref.yuksek_iyi){seviye=avg>=ref.iyi?'iyi':avg>=ref.kabul?'kabul':'gelistir';}
    else{seviye=avg<=ref.iyi?'iyi':avg<=ref.kabul?'kabul':'gelistir';}
    const trend=vals.length>=3?(()=>{
      const n=Math.min(5,vals.length);
      const son5=vals.slice(-n);
      const ilk5=vals.slice(0,n);
      const avgSon=son5.reduce((s,v)=>s+v,0)/son5.length;
      const avgIlk=ilk5.reduce((s,v)=>s+v,0)/ilk5.length;
      const fark=ref.yuksek_iyi?avgSon-avgIlk:avgIlk-avgSon;
      return fark>1?'iyilesiyor':fark<-1?'kötülessiyor':'sabit';
    })():'yetersiz_veri';
    sonuc[k]={avg,son,seviye,trend,vals,birim:ref.birim,ref};
  });
  return{sonuc,wkCount:athWks.length,autoDetected};
}

// ── Son 24 Hafta Özet Tablosu ────────────────────────────────────────────────
function Hafta24Karti({workouts,athlete}){
  const KOSU_SPORLAR=['kosu','trail','yol','ultra'];
  const rows=React.useMemo(()=>{
    const out=[];
    for(let i=0;i<24;i++){
      const {start,end}=getWeekBounds(-i);
      const inWeek=(workouts||[]).filter(w=>{
        const d=new Date(w.date);
        return d>=start&&d<=end;
      });
      const kosular=inWeek.filter(w=>KOSU_SPORLAR.includes(w.spor||'kosu'));
      let km=0,dakKosu=0,dPlus=0;
      kosular.forEach(w=>{
        km+=parseFloat(w.mesafe)||0;
        dakKosu+=(toSec(w.sure_sa,w.sure_dk,w.sure_sn)/60);
        dPlus+=parseFloat(w.irtifa)||0;
      });
      let yuk=0;
      inWeek.forEach(w=>{
        const m=calcMetrics(w,athlete);
        yuk+=(m.yukObj||0);
      });
      const paceSec=(km>0&&dakKosu>0)?(dakKosu/km)*60:null;
      const label=`${start.getDate()} ${['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'][start.getMonth()]} - ${end.getDate()} ${['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'][end.getMonth()]}`;
      out.push({label,km:round1(km),dak:round1(dakKosu),paceSec,yuk:round1(yuk),dPlus:Math.round(dPlus),kosuCount:kosular.length,toplamCount:inWeek.length});
    }
    return out.reverse(); // En eski → en yeni
  },[workouts,athlete]);

  const maxKm=Math.max(1,...rows.map(r=>r.km));
  const maxDak=Math.max(1,...rows.map(r=>r.dak));
  const maxYuk=Math.max(1,...rows.map(r=>r.yuk));
  const maxDPlus=Math.max(1,...rows.map(r=>r.dPlus));
  // Pace için: küçük = hızlı (iyi). Bar boyutu hızlı olanlar daha uzun olsun.
  const valid=rows.filter(r=>r.paceSec).map(r=>r.paceSec);
  const minPace=valid.length?Math.min(...valid):0;
  const maxPace=valid.length?Math.max(...valid):1;
  const paceRange=Math.max(1,maxPace-minPace);

  const Bar=({val,max,color,text,reverse=false,minVal=0,range=1})=>{
    let pct;
    if(reverse){
      // Pace: hızlı (küçük değer) = uzun bar
      pct=val?100-((val-minVal)/range)*70:0; // 30-100% aralığı
      pct=Math.max(30,Math.min(100,pct));
    }else{
      pct=max>0?(val/max)*100:0;
    }
    return React.createElement('div',{style:{position:'relative',height:22,background:'var(--bg-secondary)',borderRadius:4,overflow:'hidden'}},
      val>0&&React.createElement('div',{style:{position:'absolute',top:0,left:0,bottom:0,width:pct+'%',background:color,opacity:.85,transition:'width .3s'}}),
      React.createElement('div',{style:{position:'relative',zIndex:1,fontSize:11,fontWeight:600,color:'var(--text-primary)',padding:'3px 8px',textShadow:'0 0 2px var(--bg-primary)'}},text)
    );
  };

  const totals=rows.reduce((a,r)=>({km:a.km+r.km,dak:a.dak+r.dak,yuk:a.yuk+r.yuk,dPlus:a.dPlus+r.dPlus}),{km:0,dak:0,yuk:0,dPlus:0});

  return React.createElement('div',{className:'card',style:{marginTop:12}},
    React.createElement('div',{className:'card-title'},'📊 Son 24 Hafta Özeti'),
    React.createElement('div',{style:{fontSize:12,color:'var(--text-secondary)',marginBottom:10}},
      'Mesafe, süre, ortalama tempo ve D+ sadece koşu antrenmanlarına aittir. Yük tüm antrenmanları kapsar. ',
      React.createElement('strong',null,'Toplam: ',round1(totals.km),' km · ',fmtHMS(totals.dak),' · D+ ',Math.round(totals.dPlus),' m · Yük ',round1(totals.yuk))
    ),
    React.createElement('div',{style:{overflowX:'auto'}},
      React.createElement('table',{style:{width:'100%',minWidth:780,borderCollapse:'collapse',fontSize:12,tableLayout:'fixed'}},
        React.createElement('colgroup',null,
          React.createElement('col',{style:{width:'130px'}}),
          React.createElement('col',{style:{width:'calc((100% - 130px) / 5)'}}),
          React.createElement('col',{style:{width:'calc((100% - 130px) / 5)'}}),
          React.createElement('col',{style:{width:'calc((100% - 130px) / 5)'}}),
          React.createElement('col',{style:{width:'calc((100% - 130px) / 5)'}}),
          React.createElement('col',{style:{width:'calc((100% - 130px) / 5)'}})
        ),
        React.createElement('thead',null,
          React.createElement('tr',{style:{borderBottom:'1px solid var(--border)'}},
            React.createElement('th',{style:{textAlign:'left',padding:'6px 8px',fontWeight:600,color:'var(--text-secondary)'}},'Hafta'),
            React.createElement('th',{style:{textAlign:'left',padding:'6px 8px',fontWeight:600,color:'var(--text-secondary)'}},'Mesafe (km)'),
            React.createElement('th',{style:{textAlign:'left',padding:'6px 8px',fontWeight:600,color:'var(--text-secondary)'}},'Süre'),
            React.createElement('th',{style:{textAlign:'left',padding:'6px 8px',fontWeight:600,color:'var(--text-secondary)'}},'Ort. Tempo'),
            React.createElement('th',{style:{textAlign:'left',padding:'6px 8px',fontWeight:600,color:'var(--text-secondary)'}},'D+ (m)'),
            React.createElement('th',{style:{textAlign:'left',padding:'6px 8px',fontWeight:600,color:'var(--text-secondary)'}},'Yük')
          )
        ),
        React.createElement('tbody',null,
          rows.map((r,i)=>React.createElement('tr',{key:i,style:{borderBottom:'1px solid var(--border)'}},
            React.createElement('td',{style:{padding:'5px 8px',color:'var(--text-secondary)',whiteSpace:'nowrap',fontSize:11}},r.label),
            React.createElement('td',{style:{padding:'5px 8px'}},
              React.createElement(Bar,{val:r.km,max:maxKm,color:'#60a5fa',text:r.km>0?r.km+' km':'—'})
            ),
            React.createElement('td',{style:{padding:'5px 8px'}},
              React.createElement(Bar,{val:r.dak,max:maxDak,color:'#34d399',text:r.dak>0?fmtHMS(r.dak):'—'})
            ),
            React.createElement('td',{style:{padding:'5px 8px'}},
              React.createElement(Bar,{val:r.paceSec||0,max:maxPace,color:'#fbbf24',
                text:r.paceSec?`${Math.floor(r.paceSec/60)}:${String(Math.round(r.paceSec%60)).padStart(2,'0')} /km`:'—',
                reverse:true,minVal:minPace,range:paceRange})
            ),
            React.createElement('td',{style:{padding:'5px 8px'}},
              React.createElement(Bar,{val:r.dPlus,max:maxDPlus,color:'#f87171',text:r.dPlus>0?r.dPlus+' m':'—'})
            ),
            React.createElement('td',{style:{padding:'5px 8px'}},
              React.createElement(Bar,{val:r.yuk,max:maxYuk,color:'#a78bfa',text:r.yuk>0?r.yuk:'—'})
            )
          ))
        )
      )
    )
  );
}

// Haftalık plandaki antrenman tipini → ANTRENMAN_TURLERI v değerine çevir
function planTipToTur(planTip, baslik=''){
  const b=(baslik||'').toLowerCase();
  // Başlıktan önce eşleştir — daha spesifik
  if(b.includes('piramit'))   return 'piramit';
  if(b.includes('kesintisiz')) return 'kesintisiz_piramit';
  if(b.includes('cruise'))    return 'cruise';
  if(b.includes('progressive'))return 'progressive';
  if(b.includes('on-off')||b.includes('fartlek')) return 'on_off';
  if(b.includes('tempo interval')) return 'tempo_interval';
  if(b.includes('yarış temposu')||b.includes('race pace')) return 'yaris_tempo';
  if(b.includes('hill sprint')) return 'hill_sprint';
  if(b.includes('strides')||b.includes('açıcı')) return 'strides';
  if(b.includes('kısa yokuş')) return 'yokus_kisa';
  if(b.includes('uzun yokuş')) return 'yokus_uzun';
  // Sonra tip'ten eşleştir
  const map={
    kolay:'kolay',aerobik:'aerobik',uzun:'uzun',
    tempo:'tempo',esik:'esik',interval:'interval',
    yokus_kisa:'yokus_kisa',yokus_uzun:'yokus_uzun',
    tirmanis:'tirmanis',teknik:'teknik',acici:'strides',
    capraz:'capraz',dinlenme:'',
  };
  return map[planTip]||planTip||'';
}

// Plan gününden tur ve yapi_notu çıkar
function planDayToForm(day){
  if(!day||day.tip==='dinlenme')return{tur:'',yapi_notu:''};
  const tur=planTipToTur(day.tip, day.baslik||'');

  // Şablon doğrudan yapi_notu döndürdüyse onu kullan (seviye bilgisi dahil)
  if(day.yapi_notu) return{tur,yapi_notu:day.yapi_notu};

  // yapilar içinden ana antrenman bloğunu bul (ısınma/soğuma hariç)
  const mainBlok=(day.yapilar||[]).find(y=>{
    const d=(y.detay||'').toLowerCase();
    const b=(y.baslik||'').toLowerCase();
    return !b.includes('ısınma')&&!b.includes('soğuma')&&!b.includes('dinlenme')&&d.length>5;
  });

  let yapi_notu='';
  if(mainBlok){
    const detay=mainBlok.detay||'';
    // Piramit: "1–2–3–2–1 dk" veya "2–3–4–5–4–3–2 dk"
    const pir=detay.match(/(\d+[–\-])+\d+\s*dk/);
    if(pir){yapi_notu=pir[0].trim();}
    // NxM pattern: "4×3 dk", "6×4 dk + 6×2 dk", "2×15 dk"
    else {
      const nx=detay.match(/(\d+[×x]\d+(?:\s*dk)?(?:\s*[+]\s*\d+[×x]\d+\s*dk)?)/);
      if(nx) yapi_notu=nx[0].replace(/\s+/g,' ').trim();
    }
    // Süre: "20 dk sürekli" gibi
    if(!yapi_notu){
      const s=detay.match(/(\d+)\s*dk/);
      if(s) yapi_notu=s[1]+' dk';
    }
  }

  // Eşleşen yapi_notu yoksa — YAPI_NOTLARI listesinden ilkini ver
  if(!yapi_notu){
    const notlar=YAPI_NOTLARI[tur]||[];
    if(notlar.length) yapi_notu=notlar[0];
  }

  return{tur,yapi_notu};
}

  const [selTur,setSelTur]=useState('');
  const [selYapi,setSelYapi]=useState('');
  const chartRef=useRef();
  const chartInst=useRef();

  // Seçili sporcunun antrenmanları
  const athWorkouts=useMemo(()=>{
    if(!selAth)return[];
    return (workouts||[]).filter(w=>w.athleteId===selAth&&w.date).sort((a,b)=>new Date(a.date)-new Date(b.date));
  },[workouts,selAth]);

  // Mevcut tur seçenekleri — sporcunun gerçek antrenmanlarından
  const turSecenekleri=useMemo(()=>{
    const set=new Set(athWorkouts.map(w=>w.tur).filter(Boolean));
    return [...set].map(v=>({v,l:TUR_LABELS[v]||v}));
  },[athWorkouts]);

  // Seçili tur için yapi_notu seçenekleri
  const yapiSecenekleri=useMemo(()=>{
    const set=new Set(athWorkouts.filter(w=>w.tur===selTur).map(w=>w.yapi_notu).filter(Boolean));
    return [...set];
  },[athWorkouts,selTur]);

  // Filtrelenmiş antrenmanlar
  const filtered=useMemo(()=>{
    return athWorkouts.filter(w=>
      w.tur===selTur&&
      (!selYapi||w.yapi_notu===selYapi)
    );
  },[athWorkouts,selTur,selYapi]);

  // Metrik hesapla — her antrenman için
  const ath=athletes.find(a=>a.id===selAth);
  const dataPoints=useMemo(()=>{
    return filtered.map(w=>{
      const m=calcMetrics(w,ath);
      const durMin=(toSec(w.sure_sa,w.sure_dk,w.sure_sn)/60)||0;
      const km=parseFloat(w.mesafe)||0;
      const paceSecKm=durMin>0&&km>0?Math.round(durMin/km*60):0;
      return{
        date:w.date,
        label:new Date(w.date+'T12:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'}),
        durMin:round1(durMin),
        km:round1(km),
        pace:paceSecKm>0?secToPace(paceSecKm):null,
        paceSec:paceSecKm,
        ort_nabiz:parseInt(w.ort_nabiz)||null,
        rpe:parseInt(w.rpe)||null,
        trimp:m.trimp||null,
        yuk:m.yukObj||null,
        kadans:parseInt(w.kadans)||null,
        irtifa:parseInt(w.irtifa)||null,
      };
    });
  },[filtered,ath]);

  // Grafik
  useEffect(()=>{
    if(!chartRef.current||dataPoints.length<2)return;
    if(chartInst.current)chartInst.current.destroy();
    const labels=dataPoints.map(d=>d.label);
    const datasets=[
      dataPoints[0].paceSec>0&&{
        label:'Pace (sn/km)',yAxisID:'y',
        data:dataPoints.map(d=>d.paceSec),
        borderColor:'#3b82f6',backgroundColor:'#3b82f620',
        tension:.3,fill:true,pointRadius:5,
      },
      dataPoints[0].ort_nabiz&&{
        label:'Ort. Nabız (bpm)',yAxisID:'y2',
        data:dataPoints.map(d=>d.ort_nabiz),
        borderColor:'#ef4444',backgroundColor:'transparent',
        tension:.3,borderDash:[5,3],pointRadius:5,
      },
      {
        label:'Süre (dk)',yAxisID:'y3',
        data:dataPoints.map(d=>d.durMin),
        borderColor:'#10b981',backgroundColor:'transparent',
        tension:.3,borderDash:[3,3],pointRadius:5,
      },
    ].filter(Boolean);

    chartInst.current=new Chart(chartRef.current,{
      type:'line',
      data:{labels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'top'},tooltip:{
          callbacks:{label:(ctx)=>{
            const d=dataPoints[ctx.dataIndex];
            if(ctx.dataset.label.includes('Pace'))return 'Pace: '+(d.pace||'—');
            return ctx.dataset.label+': '+ctx.parsed.y;
          }}
        }},
        scales:{
          y:{position:'left',title:{display:true,text:'Pace (sn/km)'},reverse:true},
          y2:{position:'right',title:{display:true,text:'Nabız (bpm)'},grid:{drawOnChartArea:false}},
          y3:{display:false},
        }
      }
    });
    return()=>{if(chartInst.current)chartInst.current.destroy();};
  },[dataPoints]);

  // Trend hesabı — ilk vs son
  const trend=(key)=>{
    const vals=dataPoints.map(d=>d[key]).filter(v=>v!=null);
    if(vals.length<2)return null;
    const diff=vals[vals.length-1]-vals[0];
    const pct=round1(diff/vals[0]*100);
    return{first:vals[0],last:vals[vals.length-1],diff:round1(diff),pct};
  };

  const metrikler=[
    {k:'paceSec',l:'Pace',fmt:(v)=>v?secToPace(v):'—',iyi:'azalma'},
    {k:'ort_nabiz',l:'Ort. Nabız',fmt:(v)=>v?v+' bpm':'—',iyi:'azalma'},
    {k:'durMin',l:'Süre',fmt:(v)=>v?v+' dk':'—',iyi:'artma'},
    {k:'km',l:'Mesafe',fmt:(v)=>v?v+' km':'—',iyi:'artma'},
    {k:'rpe',l:'RPE',fmt:(v)=>v?v+'/10':'—',iyi:'azalma'},
    {k:'yuk',l:'Yük',fmt:(v)=>v?String(v):'—',iyi:'artma'},
  ];

  if(!athletes.length)return React.createElement('div',{className:'empty'},'Henüz sporcu eklenmedi.');

  return React.createElement('div',null,
    React.createElement('div',{className:'card',style:{marginBottom:12}},
      React.createElement('div',{className:'card-title'},'Antrenman Karşılaştırma Analizi'),
      React.createElement('div',{className:'form-grid'},
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Sporcu'),
          React.createElement('select',{value:selAth,onChange:e=>{setSelAth(e.target.value);setSelTur('');setSelYapi('');}},
            React.createElement('option',{value:''},'— Seçin —'),
            athletes.map(a=>React.createElement('option',{key:a.id,value:a.id},(a.ad||'')+' '+(a.soyad||'')))
          )
        ),
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Antrenman Türü'),
          React.createElement('select',{value:selTur,onChange:e=>{setSelTur(e.target.value);setSelYapi('');}},
            React.createElement('option',{value:''},'— Seçin —'),
            turSecenekleri.map(t=>React.createElement('option',{key:t.v,value:t.v},t.l))
          )
        ),
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Yapı Notu (opsiyonel filtre)'),
          React.createElement('select',{value:selYapi,onChange:e=>setSelYapi(e.target.value)},
            React.createElement('option',{value:''},'Tümü'),
            yapiSecenekleri.map((y,i)=>React.createElement('option',{key:i,value:y},y))
          )
        )
      )
    ),

    !selTur&&React.createElement('div',{className:'empty'},'Sporcu ve antrenman türü seçin.'),

    selTur&&filtered.length===0&&React.createElement('div',{className:'empty'},
      'Bu türde kayıtlı antrenman bulunamadı.'+(selYapi?' Yapı notu filtresini kaldırın.':'')
    ),

    selTur&&filtered.length>0&&React.createElement('div',null,

      // Trend özet kartları
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:8,marginBottom:12}},
        metrikler.map(({k,l,fmt,iyi})=>{
          const t=trend(k);
          if(!t)return null;
          const better=(iyi==='azalma'?t.diff<0:t.diff>0);
          const worse=(iyi==='azalma'?t.diff>0:t.diff<0);
          const cls=better?'success':worse?'danger':'text-secondary';
          return React.createElement('div',{key:k,className:'metric',style:{padding:'10px 12px'}},
            React.createElement('div',{className:'metric-label'},l),
            React.createElement('div',{style:{fontSize:13,fontWeight:700}},fmt(t.last)),
            React.createElement('div',{style:{fontSize:11,color:`var(--${cls})`,marginTop:2}},
              (t.diff>0?'+':'')+fmt(t.diff)+' ('+t.pct+'%)'
            ),
            React.createElement('div',{style:{fontSize:10,color:'var(--text-tertiary)'}},
              fmt(t.first)+' → '+fmt(t.last)
            )
          );
        }).filter(Boolean)
      ),

      // Grafik
      dataPoints.length>=2&&React.createElement('div',{className:'card',style:{marginBottom:12}},
        React.createElement('div',{className:'card-title'},
          (TUR_LABELS[selTur]||selTur)+(selYapi?' — '+selYapi:'')+ ' · '+filtered.length+' antrenman'
        ),
        React.createElement('div',{style:{height:280,position:'relative'}},
          React.createElement('canvas',{ref:chartRef})
        )
      ),

      // Tablo
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-title'},'Detay Tablosu'),
        React.createElement('div',{style:{overflowX:'auto'}},
          React.createElement('table',{className:'table'},
            React.createElement('thead',null,
              React.createElement('tr',null,
                ['Tarih','Süre','Km','Pace','Ort. Nabız','RPE','Yük','Kadans','İrtifa'].map(h=>
                  React.createElement('th',{key:h},h)
                )
              )
            ),
            React.createElement('tbody',null,
              dataPoints.map((d,i)=>React.createElement('tr',{key:i},
                React.createElement('td',null,d.date),
                React.createElement('td',null,d.durMin?d.durMin+' dk':'—'),
                React.createElement('td',null,d.km?d.km+' km':'—'),
                React.createElement('td',null,d.pace||'—'),
                React.createElement('td',null,d.ort_nabiz?d.ort_nabiz+' bpm':'—'),
                React.createElement('td',null,d.rpe?d.rpe+'/10':'—'),
                React.createElement('td',null,d.yuk||'—'),
                React.createElement('td',null,d.kadans?d.kadans+' spm':'—'),
                React.createElement('td',null,d.irtifa?d.irtifa+' m':'—')
              ))
            )
          )
        )
      )
    )
  );
}

function Gecmis({workouts,athletes,onDelete,onBulkDelete,onUpdate}){
  const [filter,setFilter]=useState('');
  const [turFilter,setTurFilter]=useState('');
  const [bulkMode,setBulkMode]=useState(false);
  const [bulkAction,setBulkAction]=useState('tur');
  const [selected,setSelected]=useState({});
  const [bulkTur,setBulkTur]=useState('');
  const [editW,setEditW]=useState(null); // düzenlenen antrenman
  const [editForm,setEditForm]=useState({});
  const athMap=Object.fromEntries(athletes.map(a=>[a.id,a]));
  const sorted=[...workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const orphanIds=workouts.filter(w=>!athMap[w.athleteId]).map(w=>w.id);
  const filtered=sorted.filter(w=>{
    if(filter&&w.athleteId!==filter)return false;
    if(turFilter&&w.tur!==turFilter)return false;
    return true;
  });
  const allSel=filtered.length>0&&filtered.every(w=>selected[w.id]);
  const selCount=Object.values(selected).filter(Boolean).length;
  const toggleSel=(id)=>setSelected(s=>({...s,[id]:!s[id]}));
  const toggleAll=()=>{
    if(allSel)setSelected({});
    else{const s={};filtered.forEach(w=>s[w.id]=true);setSelected(s);}
  };
  const applyBulk=()=>{
    const ids=Object.entries(selected).filter(([,v])=>v).map(([k])=>k);
    if(!ids.length)return alert('Antrenman seçin!');
    if(bulkAction==='delete'){
      if(!confirm(ids.length+' antrenman silinecek. Emin misin?'))return;
      onBulkDelete(ids);
    } else {
      if(!bulkTur)return alert('Bir tür seçin!');
      ids.forEach(id=>onUpdate(id,{tur:bulkTur}));
    }
    setSelected({});setBulkMode(false);setBulkTur('');
  };

  // Düzenleme modal aç
  const openEdit=(w)=>{setEditW(w);setEditForm({...w});};
  const setF=(k,v)=>setEditForm(f=>({...f,[k]:v}));
  const saveEdit=()=>{
    if(!editW)return;
    onUpdate(editW.id,editForm);
    setEditW(null);setEditForm({});
  };

  const fgi=(label,key,type='text',opts={})=>React.createElement('div',{className:'form-group'},
    React.createElement('label',null,label),
    React.createElement('input',{type,value:editForm[key]??'',min:opts.min,max:opts.max,step:opts.step,
      placeholder:opts.ph||'',onChange:e=>setF(key,e.target.value)})
  );

  if(!workouts.length)return React.createElement('div',{className:'empty'},'Henüz kayıt yok.');
  return React.createElement('div',null,
    // Sahipsiz antrenman uyarısı
    orphanIds.length>0&&React.createElement('div',{className:'alert alert-warn',style:{marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
      React.createElement('span',{style:{fontSize:13}},
        orphanIds.length+' antrenman kaydı eşleşen sporcu bulunamadı. Bu kayıtlar "Silinmiş sporcu" olarak görünür ve hesaplamalara dahil edilmez.'
      ),
      React.createElement('button',{
        className:'btn btn-sm btn-danger',
        onClick:()=>{
          if(confirm(orphanIds.length+' sahipsiz antrenman kalıcı olarak silinecek. Devam edilsin mi?'))
            onBulkDelete(orphanIds);
        }
      },'Tümünü Temizle')
    ),
    React.createElement('div',{className:'flex-gap',style:{marginBottom:12}},
      React.createElement('select',{value:filter,onChange:e=>setFilter(e.target.value)},
        React.createElement('option',{value:''},'Tüm sporcular'),
        athletes.map(a=>React.createElement('option',{key:a.id,value:a.id},(a.ad||'')+' '+(a.soyad||'')))
      ),
      React.createElement('select',{value:turFilter,onChange:e=>setTurFilter(e.target.value)},
        React.createElement('option',{value:''},'Tüm türler'),
        ANTRENMAN_TURLERI.filter(t=>t.v).map(t=>React.createElement('option',{key:t.v,value:t.v},t.l))
      ),
      React.createElement('span',{style:{fontSize:12,color:'var(--text-tertiary)'}},filtered.length+' kayıt'),
      React.createElement('button',{
        className:'btn btn-sm'+(bulkMode?' btn-primary':''),
        style:{marginLeft:'auto'},
        onClick:()=>{setBulkMode(b=>!b);setSelected({});setBulkAction('tur');}
      },bulkMode?'Toplu İşlem: Aktif':'Toplu İşlem')
    ),
    bulkMode&&React.createElement('div',{className:'card',style:{marginBottom:12,padding:'12px 14px'}},
      React.createElement('div',{className:'flex-gap',style:{flexWrap:'wrap',gap:8}},
        React.createElement('span',{style:{fontSize:13,fontWeight:600}},'Toplu İşlem'),
        React.createElement('span',{style:{fontSize:12,color:'var(--text-tertiary)'}},(selCount)+' seçili'),
        // İşlem türü seçici
        React.createElement('select',{value:bulkAction,onChange:e=>{setBulkAction(e.target.value);setBulkTur('');},style:{fontSize:13,padding:'5px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg-primary)',color:'var(--text-primary)'}},
          React.createElement('option',{value:'tur'},'Tür Ata'),
          React.createElement('option',{value:'delete'},'Sil')
        ),
        // Tür ata ise dropdown
        bulkAction==='tur'&&React.createElement('select',{value:bulkTur,onChange:e=>setBulkTur(e.target.value),style:{fontSize:13,padding:'5px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius)',background:'var(--bg-primary)',color:'var(--text-primary)'}},
          React.createElement('option',{value:''},'— Tür seçin —'),
          ANTRENMAN_TURLERI.filter(t=>t.v).map(t=>React.createElement('option',{key:t.v,value:t.v},t.l))
        ),
        React.createElement('button',{
          className:'btn btn-sm '+(bulkAction==='delete'?'btn-danger':'btn-primary'),
          onClick:applyBulk
        },(bulkAction==='delete'?'Sil':'Uygula')+' ('+selCount+')'),
        React.createElement('button',{className:'btn btn-sm',onClick:()=>setSelected({})},'Seçimi Temizle')
      )
    ),
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'table-wrap'},
        React.createElement('table',null,
          React.createElement('thead',null,React.createElement('tr',null,
            [bulkMode&&React.createElement('th',{key:'chk'},React.createElement('input',{type:'checkbox',checked:allSel,onChange:toggleAll})),
             'Tarih','Sporcu','Tür','Yapı','Mesafe','Süre','Ort HR','RPE','Güç (W)','Yük','İrtifa','Toparlanma',''].filter(Boolean).map((h,i)=>
              typeof h==='string'?React.createElement('th',{key:i},h):h
            )
          )),
          React.createElement('tbody',null,
            filtered.map(w=>{
              const ath=athMap[w.athleteId];
              const m=calcMetrics(w,ath);
              const turLabel=TUR_LABELS[w.tur||'']||'—';
              const turBadge=w.tur?{kolay:'badge-good',aerobik:'badge-good',uzun:'badge-info',tempo:'badge-warn',esik:'badge-warn',interval:'badge-danger',depar:'badge-danger',tirmanma:'badge-info',teknik:'badge-info',kuvvet:'badge-gray',capraz:'badge-gray',test:'badge-warn',yaris:'badge-danger'}[w.tur]||'badge-gray':'';
              return React.createElement('tr',{key:w.id,style:selected[w.id]?{background:'var(--info-bg)'}:{}},
                bulkMode&&React.createElement('td',null,React.createElement('input',{type:'checkbox',checked:!!selected[w.id],onChange:()=>toggleSel(w.id)})),
                React.createElement('td',null,fmtDate(w.date)),
                React.createElement('td',null,
                  ath
                    ?(ath.ad||'')+' '+(ath.soyad||'')
                    :React.createElement('span',{style:{color:'var(--danger)',fontSize:11},title:'athleteId: '+w.athleteId},'Silinmiş sporcu')
                ),
                React.createElement('td',null,w.tur?React.createElement('span',{className:'badge '+turBadge},turLabel):'—'),
                React.createElement('td',null,w.yapi_notu||'—'),
                React.createElement('td',null,w.mesafe?(+w.mesafe).toFixed(2)+' km':'—'),
                React.createElement('td',null,m.durSec>0?fmtDur(m.durSec):'—'),
                React.createElement('td',null,
                  w.ort_nabiz
                    ?w.ort_nabiz
                    :m.hrEstimated
                      ?React.createElement('span',{style:{color:'var(--warn)',fontSize:11}},'~'+m.estAvgHR)
                      :'—'
                ),
                React.createElement('td',null,w.rpe||'—'),
                React.createElement('td',null,
                  w.ort_guc
                    ?React.createElement('span',{style:{fontSize:12}},w.ort_guc+'W'+(w.maks_guc?' / '+w.maks_guc+'W':''))
                    :'—'
                ),
                React.createElement('td',null,m.yukObj||'—'),
                React.createElement('td',null,w.irtifa?w.irtifa+' m':'—'),
                React.createElement('td',null,
                  React.createElement('div',{className:'flex-gap'},
                    React.createElement('button',{className:'btn btn-sm',onClick:()=>openEdit(w)},'Düzenle'),
                    React.createElement('button',{className:'btn btn-sm btn-danger',onClick:()=>{if(confirm('Sil?'))onDelete(w.id)}},'Sil')
                  )
                )
              );
            })
          )
        )
      )
    ),

    // ── Düzenleme Modalı ────────────────────────────────────────────────────
    editW&&React.createElement('div',{className:'modal-bg',onClick:e=>{if(e.target.className==='modal-bg')setEditW(null)}},
      React.createElement('div',{className:'modal',style:{maxWidth:560,maxHeight:'90vh',overflowY:'auto'}},
        React.createElement('div',{className:'modal-title'},
          React.createElement('span',null,'Antrenman Düzenle — '+fmtDate(editW.date)),
          React.createElement('button',{className:'modal-close',onClick:()=>setEditW(null)},'×')
        ),
        React.createElement('div',{className:'form-grid',style:{marginBottom:8}},
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Tarih'),
            React.createElement('input',{type:'date',value:editForm.date||'',onChange:e=>setF('date',e.target.value)})
          ),
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Sporcu'),
            React.createElement('select',{value:editForm.athleteId||'',onChange:e=>setF('athleteId',e.target.value)},
              athletes.map(a=>React.createElement('option',{key:a.id,value:a.id},(a.ad||'')+' '+(a.soyad||'')))
            )
          )
        ),
        React.createElement('div',{className:'card-title',style:{marginTop:8}},'Antrenman Türü'),
        React.createElement('div',{className:'form-grid',style:{marginBottom:8}},
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Spor'),
            React.createElement('select',{value:editForm.spor||'kosu',onChange:e=>setF('spor',e.target.value)},
              SPOR_TURLERI.map(s=>React.createElement('option',{key:s.v,value:s.v},s.emoji+' '+s.l))
            )
          ),
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Antrenman Türü'),
            React.createElement('select',{value:editForm.tur||'',onChange:e=>setF('tur',e.target.value)},
              ANTRENMAN_TURLERI.map(t=>React.createElement('option',{key:t.v,value:t.v},t.l))
            )
          ),
          React.createElement('div',{className:'form-group'},
            React.createElement('label',null,'Yapı Notu'),
            React.createElement('input',{type:'text',value:editForm.yapi_notu||'',
              placeholder:'ör: 6×1km, 4×8dk',onChange:e=>setF('yapi_notu',e.target.value)})
          )
        ),
        React.createElement('div',{className:'card-title',style:{marginTop:8}},'Süre'),
        React.createElement('div',{className:'form-grid'},
          fgi('Saat','sure_sa','number',{min:0,max:23}),
          fgi('Dakika','sure_dk','number',{min:0,max:59}),
          fgi('Saniye','sure_sn','number',{min:0,max:59})
        ),
        React.createElement('div',{className:'card-title',style:{marginTop:8}},'Performans'),
        React.createElement('div',{className:'form-grid'},
          fgi('Mesafe (km)','mesafe','number',{min:0,step:.01}),
          fgi('İrtifa / D+ (m)','irtifa','number',{min:0}),
          fgi('Ort. Nabız (bpm)','ort_nabiz','number',{min:50,max:220}),
          fgi('Maks. Nabız (bpm)','maks_nabiz','number',{min:50,max:240}),
          fgi('RPE (1–10)','rpe','number',{min:1,max:10}),
          fgi('Kadans (spm)','kadans','number',{min:100,max:220}),
          fgi('Ort. Güç (W)','ort_guc','number',{min:0}),
          fgi('Maks. Güç (W)','maks_guc','number',{min:0})
        ),
        React.createElement('div',{className:'card-title',style:{marginTop:8}},'Koşu Dinamikleri (opsiyonel)'),
        React.createElement('div',{className:'form-grid'},
          fgi('Yer Kontak (ms)','yer_kontak','number',{min:0}),

const TRACKED_FIELDS=[
  {k:'kilo',l:'Kilo (kg)',num:true},
  {k:'rhr',l:'Dinlenme Nabzı (RHR)',num:true},
  {k:'mhr',l:'Maksimum Nabız (MHR)',num:true},
  {k:'lthr',l:'Laktat Eşiği (LTHR)',num:true},
  {k:'vo2max',l:'VO₂max',num:true},
  {k:'hrv_durum',l:'HRV Durumu',num:false},
  {k:'hrv_7gun',l:'HRV 7g Ort.',num:true},
  {k:'sakatlık',l:'Sakatlık Puanı',num:true},
  {k:'motivasyon',l:'Motivasyon',num:true},
  {k:'disiplin',l:'Koşu Disiplini',num:false},
  {k:'dinlenme_siklik',l:'Dinlenme Haftası Sıklığı',num:false},
  {k:'pb_5k',l:'En İyi 5K',num:false},
  {k:'pb_10k',l:'En İyi 10K',num:false},
  {k:'pb_hm',l:'En İyi Yarı Maraton',num:false},
  {k:'pb_m',l:'En İyi Maraton',num:false},
];

function detectChanges(oldA,newA){
  const changes=[];
  TRACKED_FIELDS.forEach(({k,l,num})=>{
    const ov=oldA[k],nv=newA[k];
    if(String(ov||'').trim()===String(nv||'').trim())return;
    if(!ov&&!nv)return;
    changes.push({field:k,label:l,oldVal:ov||'—',newVal:nv||'—',num});
  });
  return changes;
}

function generateMessages(changes,newA){
  const msgs=[];
  changes.forEach(({field,oldVal,newVal,num})=>{
    const ov=parseFloat(oldVal),nv=parseFloat(newVal);
    const diff=num?round1(nv-ov):null;
    const pct=num&&ov?round1((nv-ov)/ov*100):null;

    if(field==='kilo'&&num){
      if(diff<0){
        const absPct=Math.abs(pct);
        if(absPct>1)msgs.push({type:'warn',text:`Kilo ${Math.abs(diff)} kg düştü (%${absPct}). Haftada %0.5–1'den fazla kayıp kas kaybına yol açabilir. Beslenmeyi kontrol et.`});
        else msgs.push({type:'good',text:`Kilo ${Math.abs(diff)} kg düştü. Güç/ağırlık oranı iyileşiyor — tırmanma performansına olumlu yansıyabilir.`});
      } else if(diff>0) msgs.push({type:'info',text:`Kilo ${diff} kg arttı. Antrenman yüküyle orantılı mı kontrol et.`});
    }
    if(field==='rhr'&&num){
      if(diff<0)msgs.push({type:'good',text:`RHR ${Math.abs(diff)} bpm düştü → aerobik kapasite ve toparlanma iyileşiyor. Olumlu uyum işareti.`});
      else if(diff>3)msgs.push({type:'warn',text:`RHR ${diff} bpm yükseldi → aşırı antrenman, hastalık başlangıcı veya yetersiz uyku olabilir. Yükü gözden geçir.`});
    }
    if(field==='lthr'&&num){
      if(diff>0)msgs.push({type:'good',text:`LTHR ${diff} bpm yükseldi → laktat eşiği güçleniyor. Tempo ve eşik antrenmanları meşe ediyor.`});
      else if(diff<-3)msgs.push({type:'warn',text:`LTHR ${Math.abs(diff)} bpm düştü. Test koşullarını kontrol et; yorgunluk veya overreaching olabilir.`});
    }
    if(field==='vo2max'&&num){
      if(diff>0)msgs.push({type:'good',text:`VO₂max ${diff} ml/kg/dak arttı → aerobik taban gelişiyor.`});
      else if(diff<-2)msgs.push({type:'warn',text:`VO₂max ${Math.abs(diff)} ml/kg/dak düştü. Toparlanma ve antrenman kalitesi değerlendirilmeli.`});
    }
    if(field==='hrv_7gun'&&num){
      if(diff>3)msgs.push({type:'good',text:`HRV 7g ortalaması ${diff} ms yükseldi → otonom sinir sistemi toparlanıyor. Yük artışı için uygun dönem.`});
      else if(diff<-3)msgs.push({type:'warn',text:`HRV 7g ortalaması ${Math.abs(diff)} ms düştü → toparlanma baskı altında. Bu hafta yoğunluğu düşür.`});
    }
    if(field==='hrv_durum'){
      const skala={düşük:1,dengesiz:2,dengeli:3};
      const os=skala[oldVal]||0,ns=skala[newVal]||0;
      // Bilinmiyor ('') → nötr geçiş, kötüleşme değil
      if(!newVal){
        msgs.push({type:'info',text:`HRV takibi durduruldu. Ölçüm alınamayan sporcular için yük kararları ACWR ve TSB'ye göre alınır.`});
      } else if(!oldVal&&newVal){
        msgs.push({type:'info',text:`HRV takibi başlatıldı: "${newVal}". Sistem artık HRV durumunu dikkate alacak.`});
      } else if(ns>os){
        msgs.push({type:'good',text:`HRV durumu "${oldVal}" → "${newVal}" iyileşti. Kaliteli antrenman için iyi pencere.`});
      } else if(ns<os){
        msgs.push({type:'warn',text:`HRV durumu "${oldVal}" → "${newVal}" kötüleşti. Düşük yoğunluklu gün veya dinlenme planla.`});
      }
    }
    if(field==='sakatlık'&&num){
      if(diff>2)msgs.push({type:'danger',text:`Sakatlık puanı ${ov}→${nv} yükseldi. Yük hemen azaltılmalı; fizyoterapist görüşü önerilir.`});
      else if(diff>0)msgs.push({type:'warn',text:`Sakatlık puanı hafif yükseldi (${ov}→${nv}). Ağrılı bölgeye dikkat et, zorlama.`});
      else if(diff<0)msgs.push({type:'good',text:`Sakatlık puanı ${ov}→${nv} iyileşti. Kademeli yük artışına hazır.`});
    }
    if(field==='motivasyon'&&num){
      if(diff<-1)msgs.push({type:'warn',text:`Motivasyon ${ov}→${nv} düştü. Antrenman çeşitliliği, dinlenme veya hedef netleştirmesi faydalı olabilir.`});
      else if(diff>1)msgs.push({type:'good',text:`Motivasyon ${ov}→${nv} yükseldi. Yüksek motivasyon dönemlerinde hacim artışını dikkatli yönet.`});
    }
    if(['pb_5k','pb_10k','pb_hm','pb_m'].includes(field)){
      const toSecs=s=>{if(!s)return null;const p=s.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1];};
      const os=toSecs(oldVal),ns=toSecs(newVal);
      if(os&&ns&&ns<os)msgs.push({type:'good',text:`Yeni kişisel rekoru! ${({pb_5k:'5K',pb_10k:'10K',pb_hm:'Yarı Maraton',pb_m:'Maraton'})[field]}: ${oldVal} → ${newVal} 🎉`});
    }
  });
  return msgs;
}

// ── Paylaşılabilir Kart Yardımcısı ───────────────────────────────────────────
async function shareCard(el, filename, title, text){
  if(!el)return;
  // html2canvas yükle
  await new Promise((resolve,reject)=>{
    if(window.html2canvas)return resolve();
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=resolve;s.onerror=()=>reject(new Error('html2canvas yüklenemedi'));
    document.head.appendChild(s);
  });
  const isDark=document.body.classList.contains('dark');
  const canvas=await window.html2canvas(el,{
    scale:2,useCORS:true,
    backgroundColor:isDark?'#0a1220':'#f0f4f9',
    width:el.offsetWidth,height:el.offsetHeight
  });
  const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
  const file=new File([blob],filename,{type:'image/png'});
  try{
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({title,text,files:[file]});
    } else {
      const a=document.createElement('a');
      a.download=filename;
      a.href=URL.createObjectURL(file);
      a.click();URL.revokeObjectURL(a.href);
    }
  }catch(e){if(e.name!=='AbortError')throw e;}
}

// Paylaş butonu komponenti — herhangi bir karta eklenebilir
function ShareBtn({elRef,filename,title,text,style}){
  const [busy,setBusy]=useState(false);
  const handle=async()=>{
    if(busy||!elRef?.current)return;
    setBusy(true);
    try{await shareCard(elRef.current,filename,title,text);}
    catch(e){alert('Paylaşım hatası: '+e.message);}
    setBusy(false);
  };
  return React.createElement('button',{
    onClick:handle,disabled:busy,
    style:{background:'none',border:'1px solid var(--border)',borderRadius:6,
      padding:'3px 8px',cursor:'pointer',fontSize:12,color:'var(--text-secondary)',
      display:'flex',alignItems:'center',gap:4,...style},
    title:'Paylaş / İndir'
  },busy?'⏳':(navigator.share?'↗ Paylaş':'⬇ İndir'));
}

function SporcuGecmis({athHistory,athId,onDeleteEntry}){
  const entries=(athHistory||[]).filter(h=>h.athId===athId).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!entries.length)return React.createElement('div',{style:{fontSize:12,color:'var(--text-tertiary)',padding:'8px 0'}},'Henüz değişim kaydı yok.');
  const msgStyle={good:{background:'var(--success-bg)',color:'var(--success)'},warn:{background:'var(--warn-bg)',color:'var(--warn)'},danger:{background:'var(--danger-bg)',color:'var(--danger)'},info:{background:'var(--info-bg)',color:'var(--info)'}};
  return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
    entries.map((entry,i)=>{
      const changes=entry.changes||[];
      const messages=entry.messages||[];
      return React.createElement('div',{key:i,style:{borderLeft:'2px solid var(--border)',paddingLeft:12,position:'relative'}},
        onDeleteEntry&&React.createElement('button',{
          onClick:()=>{if(confirm('Bu kayıt silinsin mi?'))onDeleteEntry(entry)},
          style:{position:'absolute',top:0,right:0,background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text-tertiary)',lineHeight:1,padding:'2px 4px'},
          title:'Bu kaydı sil'
        },'✕'),
        React.createElement('div',{style:{fontSize:11,color:'var(--text-tertiary)',marginBottom:4}},
          entry.date?new Date(entry.date).toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):''
        ),
        changes.map((c,j)=>React.createElement('div',{key:j,style:{fontSize:12,marginBottom:3}},
          React.createElement('span',{style:{color:'var(--text-secondary)'}},(c.label||'')+': '),
          React.createElement('span',{style:{textDecoration:'line-through',color:'var(--text-tertiary)',marginRight:4}},c.oldVal||''),
          React.createElement('span',{style:{fontWeight:600,color:'var(--text-primary)'}},c.newVal||'')
        )),
        messages.length>0&&React.createElement('div',{style:{marginTop:6,display:'flex',flexDirection:'column',gap:4}},
          messages.map((m,j)=>React.createElement('div',{key:j,style:{...(msgStyle[m?.type]||msgStyle.info),fontSize:12,padding:'5px 10px',borderRadius:6}},m?.text||''))
        )
      );
    })
  );
}

// Firebase SDK'larını dinamik yükle, sonra React başlat
function loadScript(src){
  return new Promise((resolve)=>{
    const s=document.createElement('script');
    s.src=src;
    s.onload=()=>resolve(true);
    s.onerror=()=>resolve(false); // hata olsa da devam et
    document.head.appendChild(s);
  });
}

// ── Şifre Koruması ────────────────────────────────────────────────────────────
const AUTH_LS_KEY='kosuizi_auth';
const DEFAULT_PASS='kosuizi2025'; // İlk kurulum şifresi — Firebase'e kaydedilince bu geçersiz olur

function LoginScreen({onLogin}){
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [logo,setLogo]=useState('');
  const [appName,setAppName]=useState('Koşu İzi');

  useEffect(()=>{
    // Logo ve takım adını yükle
    (async()=>{
      try{
        const cfg=await fbGet('app_config');
        if(cfg?.teamLogo)setLogo(cfg.teamLogo);
        if(cfg?.teamName)setAppName(cfg.teamName);
      }catch{}
    })();
  },[]);

  const attempt=async()=>{
    if(!pass.trim())return;
    setLoading(true);setErr('');
    try{
      // Firebase'den şifreyi oku
      let stored=null;
      if(db){
        const snap=await db.ref('app_password').get();
        stored=snap.exists()?snap.val():null;
      }
      // Firebase'de şifre yoksa varsayılanı kullan ve kaydet
      if(!stored){
        stored=DEFAULT_PASS;
        if(db)await db.ref('app_password').set(DEFAULT_PASS);
      }
      if(pass===stored){
        localStorage.setItem(AUTH_LS_KEY,btoa(pass+':'+Date.now()));
        onLogin();
      } else {
        setErr('Şifre yanlış. Tekrar dene.');
        setPass('');
      }
    }catch(e){
      // Offline fallback
      const cached=localStorage.getItem(AUTH_LS_KEY);
      if(cached){onLogin();}
      else if(pass===DEFAULT_PASS){
        localStorage.setItem(AUTH_LS_KEY,btoa(pass+':'+Date.now()));
        onLogin();
      } else {
        setErr('Bağlantı hatası veya şifre yanlış.');
      }
    }
    setLoading(false);
  };

  return React.createElement('div',{style:{
    display:'flex',alignItems:'center',justifyContent:'center',
    minHeight:'100vh',background:'var(--bg-tertiary)'
  }},
    React.createElement('div',{style:{
      background:'var(--bg-primary)',border:'1px solid var(--border)',
      borderRadius:16,padding:'40px 36px',width:'100%',maxWidth:360,
      boxShadow:'0 8px 32px rgba(0,0,0,.12)'
    }},
      React.createElement('div',{style:{textAlign:'center',marginBottom:28}},
        logo
          ?React.createElement('img',{src:logo,style:{width:72,height:72,objectFit:'contain',borderRadius:12,marginBottom:10,border:'1px solid var(--border)',background:'var(--bg-secondary)',padding:4}})
          :React.createElement('div',{style:{fontSize:40,marginBottom:8}},'🏃'),
        React.createElement('div',{style:{fontSize:20,fontWeight:700,marginBottom:4}},appName),
        React.createElement('div',{style:{fontSize:13,color:'var(--text-tertiary)'}},'Antrenman Takip Sistemi')
      ),
      React.createElement('div',{className:'form-group',style:{marginBottom:12}},
        React.createElement('label',{style:{fontSize:13,color:'var(--text-secondary)',marginBottom:6,display:'block'}},'Şifre'),
        React.createElement('input',{
          type:'password',value:pass,
          placeholder:'Şifrenizi girin',
          autoFocus:true,
          style:{fontSize:15,padding:'10px 12px'},
          onChange:e=>setPass(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&attempt()
        })
      ),
      err&&React.createElement('div',{style:{
        fontSize:12,color:'var(--danger)',marginBottom:10,
        padding:'8px 10px',background:'var(--danger-bg)',borderRadius:6
      }},err),
      React.createElement('button',{
        className:'btn btn-primary',
        style:{width:'100%',padding:'10px',fontSize:14,fontWeight:600},
        disabled:loading,
        onClick:attempt
      },loading?'Kontrol ediliyor...':'Giriş')
    )
  );
}

function AppWithAuth(){
  const [authed,setAuthed]=useState(false);
  const [checking,setChecking]=useState(true);

  useEffect(()=>{
    // Daha önce giriş yapılmış mı?
    const cached=localStorage.getItem(AUTH_LS_KEY);
    if(cached){
      try{
        const decoded=atob(cached);
        const ts=parseInt(decoded.split(':')[1]||0);
        // 30 gün geçerliliği var
        if(Date.now()-ts<30*24*3600*1000){
          setAuthed(true);
        } else {
          localStorage.removeItem(AUTH_LS_KEY);
        }
      }catch{localStorage.removeItem(AUTH_LS_KEY);}
    }
    setChecking(false);
  },[]);

  if(checking) return React.createElement('div',{style:{
    display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
    color:'var(--text-tertiary)',fontSize:14
  }},'Yükleniyor...');

  if(!authed) return React.createElement(LoginScreen,{onLogin:()=>setAuthed(true)});
  return React.createElement(App);
}

(async()=>{
  await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js');
  initFirebase();
  ReactDOM.render(React.createElement(AppWithAuth),document.getElementById('root'));
})();
</script>

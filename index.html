// ── Reçete satır şablonu yardımcısı ─────────────────────────────────────────
// Her yapilar adımına _rows eklenir — adimToRows bunu doğrudan kullanır
// row: {label, sure_sn, zIdx, tekrar?, din_sn?, rpe?, isSprint?}
function mkRows(rows){ return rows; } // identity — sadece belgeleme amaçlı

// ── OP-2 Helpers: Yapısal _rows üretimi ──────────────────────────────────────
// Set string parser: "2×8 dk"→{tekrar:2,sure_sn:480}, "30sn"→{tekrar:1,sure_sn:30}
function parseSetsStr(s){
  if(!s)return null;
  let m=s.match(/(\d+)\s*[×x]\s*(\d+)\s*dk/i);
  if(m)return{tekrar:+m[1],sure_sn:+m[2]*60};
  m=s.match(/(\d+)\s*[×x]\s*(\d+)\s*sn/i);
  if(m)return{tekrar:+m[1],sure_sn:+m[2]};
  m=s.match(/(\d+)\s*dk/i);
  if(m)return{tekrar:1,sure_sn:+m[1]*60};
  m=s.match(/(\d+)\s*sn/i);
  if(m)return{tekrar:1,sure_sn:+m[1]};
  return null;
}
// Din string parser: "3 dk"→180, "90 sn"→90, "2.5 dk"→150
function parseDinStr(s){
  if(!s)return 120;
  let m=s.match(/(\d+(?:[.,]\d+)?)\s*dk/i);
  if(m)return Math.round(parseFloat(m[1].replace(',','.'))*60);
  m=s.match(/(\d+)\s*sn/i);
  if(m)return+m[1];
  return 120;
}
// Standart rows üreteçleri
const _R={
  isinma:dk=>([{label:'Isınma',sure_sn:dk*60,zIdx:0}]),
  soguma:dk=>([{label:'Soğuma',sure_sn:dk*60,zIdx:0}]),
  sabit:(label,dk,zIdx)=>([{label,sure_sn:dk*60,zIdx}]),
  blok:(label,setsStr,zIdx,dinStr)=>{
    const p=parseSetsStr(setsStr);if(!p)return[];
    return[{label,sure_sn:p.sure_sn,zIdx,tekrar:p.tekrar,din_sn:parseDinStr(dinStr)}];
  },
  sprint:(label,tekrar,sureSn,dinSn)=>([{label,sure_sn:sureSn,zIdx:5,tekrar,din_sn:dinSn,isSprint:true}]),
  strides:(label,tekrar,sureSn)=>([{label,sure_sn:sureSn,zIdx:4,tekrar,din_sn:45,isSprint:true}]),
  piramitSeq:(label,seqStr,zIdx,dinSn)=>{
    // "1–2–3–2–1" → [60,120,180,120,60]
    const nums=seqStr.split(/[–\-]/).map(n=>parseInt(n)*60).filter(n=>n>0);
    return nums.map((sn,i)=>({label:label+' '+(i+1)+'/'+nums.length,sure_sn:sn,zIdx,din_sn:i<nums.length-1?dinSn:0}));
  },
};


const ZONE_COLORS_INLINE={0:'#34d399',1:'#6ee7b7',2:'#f97316',3:'#fbbf24',4:'#991b1b',5:'#dc2626',6:'#ef4444'}; // SN-10: Z1↔Z2, Z3↔Z4, Z5a↔Z5c renk swap
const TIP_NAMES={kolay:'Kolay Koşu',aerobik:'Aerobik Koşu',uzun:'Uzun Koşu',tempo:'Tempo',esik:'Eşik',interval:'İnterval',piramit:'İnterval Piramit',kesintisiz_piramit:'Kesintisiz Piramit',yokus_kisa:'Kısa Yokuş Tekrarı',yokus_uzun:'Uzun Yokuş',tirmanis:'Tırmanış Koşusu',teknik:'Teknik İniş',acici:'Açıcı',capraz:'Çapraz Antrenman',dinlenme:'Dinlenme'};
const fixBaslik=(b)=>TIP_NAMES[b]||b;
const ZONE_TEXT_COLOR  ={0:'#064e3b',1:'#064e3b',2:'#7c2d12',3:'#78350f',4:'#7f1d1d',5:'#7f1d1d',6:'#7f1d1d'}; // SN-10: Z3↔Z4 text renk swap

function detectZone(text){
  const t=(text||'').toLowerCase();
  // Önce açık zone etiketi ara (yüksekten düşüğe)
  const tags=[['z5c',6],['z5b',5],['z5a',4],['z5',4],['z4',3],['z3',2],['z2',1],['z1',0]];
  for(const [k,i] of tags) if(t.includes(k)) return i;
  // Anahtar kelime fallback
  if(/[iı]sınma|soğuma|toparlanma|dinlenme|yürüyüş|kolay/.test(t)) return 0;
  if(/aerobik|uzun koşu/.test(t)) return 1;
  if(/tempo/.test(t)) return 2;
  if(/eşik|cruise|yarış temposu/.test(t)) return 3;
  if(/interval|piramit|vo2/.test(t)) return 4;
  if(/strides|açıcı|sprint|hill/.test(t)) return 5;
  return 1;
}

function parseSureSn(text){
  const t=text||'';
  let m;
  m=t.match(/(\d+(?:[.,]\d+)?)\s*dk/i);  if(m) return Math.round(parseFloat(m[1].replace(',','.'))*60);
  m=t.match(/(\d+(?:[.,]\d+)?)\s*sn/i);  if(m) return Math.round(parseFloat(m[1].replace(',','.')));
  m=t.match(/(\d+):(\d{2})/);             if(m) return parseInt(m[1])*60+parseInt(m[2]);
  return 0;
}

function getPaceSec(zones, zIdx){
  const pz=zones?.paceZones?.[zIdx];
  if(pz?.lo_ms&&pz?.hi_ms) return Math.round(1000/((pz.lo_ms+pz.hi_ms)/2));
  // Pace yoksa zone'a göre kaba tahmin (600=10dk/km base, Z2≈+30sn, Z3≈-30sn vb.)
  const base=600; // Z1 fallback
  const offsets=[60,30,0,-30,-60,-90,-120];
  return base+(offsets[zIdx]||0);
}

function secToHMS(sec){
  if(!sec||sec<0) sec=0;
  return{h:Math.floor(sec/3600), m:Math.floor((sec%3600)/60), s:Math.round(sec%60)};
}

function adimToRows(adim, zones){
  // _rows varsa doğrudan kullan (yapısal veri) — tekrar ve dinlenme expansion
  if(adim._rows&&adim._rows.length){
    const expanded=[];
    adim._rows.forEach(r=>{
      // SN-11: pSec — ısınma/soğuma satırları için global fonksiyon kullan
      const isIsinmaRow=/[iı]sınma|isinma/i.test(r.label||'');
      const isSogumaRow=/soğuma/i.test(r.label||'');
      const pSec=r.pSec||(isIsinmaRow?getWarmupPace(zones):isSogumaRow?getCooldownPace(zones):getPaceFromZone(r.zIdx,zones));
      const mkRow=(rr,lbl)=>{
        const cr=calcRowM(rr.sure_sn,pSec);
        return{type:rr.type||'run',label:lbl||rr.label,
          color:ZONE_COLORS_INLINE[rr.zIdx]||'#34d399',
          textColor:ZONE_TEXT_COLOR[rr.zIdx]||'#064e3b',
          _origZIdx:rr.zIdx, _origPaceSec:(cr.pm||0)*60+(cr.ps||0), _isSprint:rr.isSprint||false,
          ...cr,rpe:rr.rpe||null};
      };
      if(r.tekrar&&r.tekrar>1){
        // Tekrar header satırı — kendisinden sonraki 2 aşama satırını etkiler
        expanded.push({type:'header',label:`↻ ${r.tekrar} Tekrar`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0,repeatCount:r.tekrar});
        // Koşu aşaması (tek satır, repeatCount ile toplama çarpılır)
        const runRow=mkRow(r);
        runRow.repeatCount=r.tekrar;
        expanded.push(runRow);
        // Dinlenme aşaması
        if(r.din_sn>0){
          const dinZi=r.dinZIdx||0;
          const dinPSec=getPaceFromZone(dinZi,zones);
          const dinCr=calcRowM(r.din_sn,dinPSec);
          expanded.push({type:'rest',label:'Dinlenme',
            color:ZONE_COLORS_INLINE[dinZi]||'#6ee7b7',
            textColor:ZONE_TEXT_COLOR[dinZi]||'#064e3b',
            _origZIdx:dinZi, _origPaceSec:(dinCr.pm||0)*60+(dinCr.ps||0),
            ...dinCr,rpe:null,repeatCount:r.tekrar});
        }
      } else {
        expanded.push(mkRow(r));
      }
    });
    return expanded;
  }
  // Eski snapshot'lardan gelen Tırmanış Koşusu adımlarını dinamik işaretle
  if(!adim._tirmanisAna&&(adim.baslik||'').includes('Tırmanış Koşusu')){
    adim={...adim,_tirmanisAna:true};
  }
  // Fallback: metin parse (eski şablonlar için)
  return adimToRowsFallback(adim,zones);
}

function getPaceFromZone(zi,zones){
  const pz=zones?.paceZones?.[zi];
  if(pz?.lo_ms&&pz?.hi_ms) return Math.round(1000/((pz.lo_ms+pz.hi_ms)/2));
  return [600,540,480,420,375,345,315][zi]||480;
}
// SN-11: Isınma/soğuma pace — global tutarlı formüller
// Isınma  = Z1 ile Z2'nin ağırlıklı ortası (Z2'ye daha yakın) → ~Z1.75
function getWarmupPace(zones){ return Math.round((getPaceFromZone(0,zones)+getPaceFromZone(1,zones)*3)/4); }
// Soğuma  = Z1 ile Z2'nin ortası → ~Z1.5
function getCooldownPace(zones){ return Math.round((getPaceFromZone(0,zones)+getPaceFromZone(1,zones))/2); }
function calcRowM(sec,rawPaceSec){
  if(!sec||!rawPaceSec) return{mesafe:0,pm:0,ps:0,h:0,m:0,s:0};
  // 1. Ham mesafe
  const rawM=sec/rawPaceSec*1000;
  // 2. Mesafeyi yuvarla
  const mesafe=rawM<200?Math.round(rawM/5)*5:Math.round(rawM/100)*100;
  if(!mesafe) return{mesafe:0,pm:0,ps:0,h:0,m:0,s:0};
  // 3. Pace'i 5sn katına yuvarla
  const rawActualPace=sec/(mesafe/1000);
  const pm0=Math.floor(rawActualPace/60);
  const ps0=Math.round((rawActualPace%60)/5)*5;
  const pmF=ps0===60?pm0+1:pm0;
  const psF=ps0===60?0:ps0;
  // 4. Süreyi mesafe × yuvarlanan pace'den hesapla (tutarlılık)
  const finalSec=Math.round(mesafe/1000*(pmF*60+psF));
  const h=Math.floor(finalSec/3600);
  const m=Math.floor((finalSec%3600)/60);
  const s=Math.round(finalSec%60);
  return{mesafe,pm:pmF,ps:psF,h,m,s};
}
function fmtHMS2(sec){sec=Math.max(0,sec||0);return{h:Math.floor(sec/3600),m:Math.floor((sec%3600)/60),s:Math.round(sec%60)};}

function adimToRowsFallback(adim, zones){
  const rows=[];
  const baslik=adim.baslik||'';
  const detay=adim.detay||'';
  const full=baslik+' '+detay;

  // ── YARIŞ GÜNÜ özel satırı ─────────────────────────────────────────────────
  // _yaris:true: planDay'den gelen ve overrideMap'te korunan yarış bilgisi
  // Bu daldan dönünce adimToRowsFallback'in geri kalanı atlanır
  if(adim._yaris){
    const pSec=adim._yarisPaceSec||null;
    const estSec=adim._yarisEstSec||3600;
    const zi=pSec?raceZoneFromPace(pSec,zones):3;
    const rawMesafe=adim._yarisMesafe||0;
    let cr;
    if(pSec){
      cr=calcRowM(estSec,pSec);
      if(rawMesafe>0) cr={...cr,mesafe:Math.round(rawMesafe*1000)};
    } else {
      const h=Math.floor(estSec/3600),m=Math.floor((estSec%3600)/60),s=Math.round(estSec%60);
      cr={h,m,s,mesafe:rawMesafe>0?Math.round(rawMesafe*1000):0,pm:0,ps:0};
    }
    const pm2=pSec?Math.floor(pSec/60):0;
    const ps2=pSec?Math.round(pSec%60):0;
    return[{
      type:'single',label:baslik,
      color:ZONE_COLORS_INLINE[zi]||'#fbbf24',
      textColor:ZONE_TEXT_COLOR[zi]||'#78350f',
      ...cr,
      pm:pm2||cr.pm,ps:ps2||cr.ps,
      rpe:'7–10',
      _origPaceSec:pSec,_origZIdx:zi,
      _isSprint:false
    }];
  }

  const zIdx=detectZone(full);
  const color=ZONE_COLORS_INLINE[zIdx];
  const textColor=ZONE_TEXT_COLOR[zIdx];

  const getPace=(zi)=>getPaceFromZone(zi,zones);
  const roundPaceSec2=(pSec)=>{const m=Math.floor(pSec/60);const s=Math.round((pSec%60)/5)*5;return s===60?{pm:m+1,ps:0}:{pm:m,ps:s};};
  // SN-11: Isınma/soğuma pace — global fonksiyonlar kullanılıyor (tutarlılık)
  const getPaceCooldown2=()=>getCooldownPace(zones);
  const getPaceWarmup2=()=>getWarmupPace(zones);
  const fmtHMS=(sec)=>fmtHMS2(sec);
  const calcRow=(sec,pSec)=>calcRowM(sec,pSec);
  const paceSec=getPace(zIdx);
  const isIsinma=/[iı]sınma/i.test(baslik);
  const isSoguma=/soğuma/i.test(baslik);
  let blokPaceSec=paceSec;
  if(isIsinma) blokPaceSec=getPaceWarmup2();
  else if(isSoguma) blokPaceSec=getPaceCooldown2();

  const ZONE_RPE2=['1–2','3–4','5–6','7–8','8–9','9–10','10'];
  const isSprintType=/strides|depar|sprint|açıcı|hill/i.test(full);

  // 1. Kesintisiz Piramit: "X dk ZY → ..."
  if(detay.includes('→')&&/\d+\s*dk\s+Z\d/i.test(detay)){
    const segs=detay.split('→').map(s=>s.trim()).filter(s=>/^\d+\s*dk\s+Z/i.test(s));
    if(segs.length>=3){
      rows.push({type:'header',label:`↻ ${segs.length} Segment (Kesintisiz)`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0});
      segs.forEach((seg,i)=>{
        const dkM=seg.match(/(\d+)\s*dk/i);
        const zM=seg.match(/Z(\d+[abc]?)/i);
        if(!dkM) return;
        const sn=parseInt(dkM[1])*60;
        const zi=zM?({'1':0,'2':1,'3':2,'4':3,'5a':4,'5b':5,'5c':6}[zM[1].toLowerCase()]||1):1;
        const cr=calcRow(sn,getPace(zi));
        rows.push({type:'run',label:`Segment ${i+1} · ${dkM[1]} dk · Z${zM?zM[1]:'?'}`,
          color:ZONE_COLORS_INLINE[zi],textColor:ZONE_TEXT_COLOR[zi],...cr,rpe:null});
      });
      return rows;
    }
  }

  // 2. İnterval Piramit: "2–3–4–5–4–3–2 dk"
  const seqMatch=detay.match(/([\d]+(?:[\u2013\-][\d]+){2,})\s*dk/i);
  if(seqMatch){
    const seqParts=seqMatch[1].split(/[\u2013\-]/).map(Number).filter(n=>n>0&&n<30);
    if(seqParts.length>=3){
      const afterSeq=detay.replace(seqMatch[0],'');
      let dinSure=90;
      const dkM=afterSeq.match(/(\d+(?:[.,]\d+)?)\s*dk/i);
      const snM=afterSeq.match(/(\d+)\s*sn/i);
      if(dkM) dinSure=Math.round(parseFloat(dkM[1].replace(',','.'))*60);
      else if(snM) dinSure=parseInt(snM[1]);
      const blokZIdx=4;
      const blokPaceSecP=getPace(blokZIdx);
      const dinPaceSec=getPace(0);
      rows.push({type:'header',label:`↻ ${seqParts.length} Blok · ${seqMatch[1]} dk`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0,repeatCount:seqParts.length});
      seqParts.forEach((dk,i)=>{
        const sn=dk*60;
        rows.push({type:'run',label:`Blok ${i+1} · ${dk} dk`,color:ZONE_COLORS_INLINE[blokZIdx],textColor:ZONE_TEXT_COLOR[blokZIdx],...calcRow(sn,blokPaceSecP)});
        if(i<seqParts.length-1){const ds=fmtHMS(dinSure);rows.push({type:'rest',label:'Blok Arası Dinlenme',color:ZONE_COLORS_INLINE[0],textColor:ZONE_TEXT_COLOR[0],...calcRow(dinSure,dinPaceSec)});}
      });
      return rows;
    }
  }

  // 3. Bileşik ısınma: "X dk ... N×Y(sn|dk|m) strides"
  if(isIsinma){
    const strideM=detay.match(/(\d+)\s*[×x]\s*(\d+(?:[.,]\d+)?)\s*(sn|dk|m\b)/i);
    if(strideM){
      const strideStart=detay.indexOf(strideM[0]);
      const kosuPart=detay.slice(0,strideStart).trim().replace(/[+\-–—·,]+$/,'').trim();
      const kosuSn=(() => {
        const m=kosuPart.match(/(\d+(?:[.,]\d+)?)\s*dk/i);
        if(m) return Math.round(parseFloat(m[1].replace(',','.'))*60);
        return 0;
      })();
      if(kosuSn>0){
        rows.push({type:'single',label:'Isınma Koşusu',color:ZONE_COLORS_INLINE[0],textColor:ZONE_TEXT_COLOR[0],...calcRow(kosuSn,blokPaceSec),rpe:null});
      }
      const n=parseInt(strideM[1]);
      const strideUnit=strideM[3].toLowerCase();
      const strideVal=parseFloat(strideM[2].replace(',','.'));
      const strideZIdx=5;
      const sPaceSec=getPace(strideZIdx);
      const birSn=strideUnit==='m'?Math.round(strideVal/1000*sPaceSec):Math.round(strideVal*(strideUnit==='dk'?60:1));
      const stridePart=detay.slice(strideStart);
      const dinM=stridePart.match(/(?:arası)[^\d]*(\d+)\s*(sn|dk)/i);
      const dinSn=dinM?Math.round(parseInt(dinM[1])*(dinM[2].toLowerCase()==='dk'?60:1)):45;
      const {h:sh,m:sm,s:ss}=fmtHMS(birSn);
      const ds=fmtHMS(dinSn);
      rows.push({type:'header',label:`↻ ${n} Strides`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0,repeatCount:n});
      rows.push({type:'run',label:'Strides',color:ZONE_COLORS_INLINE[strideZIdx],textColor:ZONE_TEXT_COLOR[strideZIdx],h:sh,m:sm,s:ss,...calcRow(birSn,sPaceSec),rpe:'8–9',_isSprint:true,repeatCount:n,_origPaceSec:sPaceSec,_origZIdx:strideZIdx});
      rows.push({type:'rest',label:'Strides Arası Dinlenme',color:ZONE_COLORS_INLINE[0],textColor:ZONE_TEXT_COLOR[0],...calcRow(dinSn,getPace(0)),rpe:null,repeatCount:n});
      return rows;
    }
  }

  // 4. Tekrar: "4×8 dk", "6×30sn", "6×8–10sn"
  const rangeM=detay.match(/(\d+)\s*[×x]\s*(\d+)[\u2013\-](\d+)\s*(sn|dk)/i);
  const tekrarM=detay.match(/(\d+)\s*[×x]\s*(\d+(?:[.,]\d+)?)\s*(dk|sn|m\b)/i);
  const match=rangeM||tekrarM;
  if(match){
    const n=parseInt(match[1]);
    let birSn;
    if(rangeM){const lo=parseInt(rangeM[2]),hi=parseInt(rangeM[3]);birSn=Math.round(((lo+hi)/2)*(rangeM[4].toLowerCase()==='dk'?60:1));}
    else{
      const unit=match[3].toLowerCase();
      const val=parseFloat(match[2].replace(',','.'));
      if(unit==='m') birSn=Math.round(val/1000*getPaceFromZone(zIdx,zones));
      else birSn=Math.round(val*(unit==='dk'?60:1));
    }
    let dinSn=120;
    const dinPats=[/(\d+(?:[.,]\d+)?)\s*(dk|sn)\s+(?:yürüyüş|hafif koşu|aktif|tam duruş)/i,/(?:arası|dinlenme)[^\d]*(\d+(?:[.,]\d+)?)\s*(dk|sn)/i];
    for(const p of dinPats){const dm=detay.match(p);if(dm){dinSn=Math.round(parseFloat(dm[1].replace(',','.'))*( dm[2].toLowerCase()==='dk'?60:1));break;}}
    if(detay.toLowerCase().includes('yürüyüş ini')) dinSn=120;
    const rpe=isSprintType?ZONE_RPE2[Math.min(zIdx,6)]||'':null;
    const ctr=calcRow(birSn,paceSec);
    rows.push({type:'header',label:`↻ ${n} Tekrar`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0,repeatCount:n});
    rows.push({type:'run',label:baslik.split('·')[0].trim(),color,textColor,...ctr,rpe,_isSprint:isSprintType,repeatCount:n,_origPaceSec:(ctr.pm||0)*60+(ctr.ps||0),_origZIdx:zIdx});
    const dinCr=calcRow(dinSn,getPaceFromZone(0,zones));
    rows.push({type:'rest',label:'Dinlenme / Toparlanma',color:ZONE_COLORS_INLINE[0],textColor:ZONE_TEXT_COLOR[0],...dinCr,repeatCount:n,_origPaceSec:(dinCr.pm||0)*60+(dinCr.ps||0),_origZIdx:0});
    return rows;
  }

  // 5. Tek blok
  const rpe=isSprintType?ZONE_RPE2[Math.min(zIdx,6)]||'':null;
  let totalSn=adim.sure_dk>0?adim.sure_dk*60:0;
  if(!totalSn){const m=detay.match(/(\d+(?:[.,]\d+)?)\s*dk/i);if(m)totalSn=Math.round(parseFloat(m[1].replace(',','.'))*60);}
  if(!totalSn){const m=detay.match(/(\d+)\s*sn/i);if(m)totalSn=parseInt(m[1]);}
  if(!totalSn) totalSn=60;
  // Tırmanış ana bloğu: tek kaynak — detay metnindeki ortalama pace'i oku
  let effectivePaceSec=blokPaceSec;
  if(adim._tirmanisAna){
    // Önce _tirAvgPaceSec (yeni snapshot), sonra detay metnindeki "(7:30)" formatı (eski snapshot)
    if(adim._tirAvgPaceSec){
      effectivePaceSec=adim._tirAvgPaceSec;
    } else {
      // Detay metninden ortalama tırmanış pace'ini oku: "beklenen pace: X–Y (Z)/km"
      const avgPaceM=detay.match(/beklenen pace:[^(]+\((\d+:\d+)\)/i);
      if(avgPaceM) effectivePaceSec=paceToSec(avgPaceM[1]);
    }
  }
  const csb=calcRow(totalSn,effectivePaceSec);
  const tirLabel=adim._tirmanisAna?baslik+' (tırmanışta)':baslik;
  rows.push({type:'single',label:tirLabel,color,textColor,...csb,rpe,_isSprint:isSprintType,_origPaceSec:(csb.pm||0)*60+(csb.ps||0),_origZIdx:zIdx});
  return rows;
}


// Zone hedef uyum rengi — 4 kademeli gradyan: koyu yeşil → mavi-yeşil → sarı-turuncu → kırmızı
function zoneStatusColor(pct, min, max, idealMin, idealMax){
  // Toleranslı ideal aralık: ±5 puan ek hoşgörü
  const tolMin=idealMin-5, tolMax=idealMax+5;
  
  // Tam hedef aralığında → koyu yeşil
  if(pct>=idealMin&&pct<=idealMax)
    return{bg:'rgba(21,128,61,0.15)',border:'rgba(21,128,61,0.55)',text:'#14532d'};
  
  // Tolerans aralığında → mavi-yeşil (teal)
  if(pct>=tolMin&&pct<=tolMax)
    return{bg:'rgba(13,148,136,0.15)',border:'rgba(13,148,136,0.55)',text:'#0f766e'};
  
  // Hedeften uzak ama kritik değil → sarı-turuncu
  const dist=pct<tolMin?tolMin-pct:pct-tolMax;
  const criticalDist=(idealMax-idealMin)||10;
  if(dist<criticalDist)
    return{bg:'rgba(234,88,12,0.15)',border:'rgba(234,88,12,0.55)',text:'#9a3412'};
  
  // Çok uzak → kırmızı
  return{bg:'rgba(220,38,38,0.15)',border:'rgba(220,38,38,0.55)',text:'#7f1d1d'};
}

// Global plan snap cache — ProgramTab re-render'da kaybolmaz
const _planSnapsCache = {};

function coachingCue(label, tip){
  const l=(label||'').toLowerCase().replace(/i/g,'i').replace(/ı/g,'i');
  // Isınma — 'Isınma' veya 'Isınma' her ikisini de yakala
  if(l.includes('isınma')||l.includes('isinma')||l.includes('ısınma'))
    return 'Nabzı kademeli yükselt. Kaslar ısınmadan hız verme.';
  // Soğuma
  if(l.includes('soğuma')||l.includes('soguma'))
    return 'Nabzı yavaşça düşür. Kasları rahatlatmaya odaklan.';
  // Strides
  if(l.includes('strides')||l.includes('kısa hızlanma'))
    return 'Rahat ama keskin. Bacaklar hafif, adım ritimli. Zorlanma yok.';
  // İnterval / VO2max
  if(l.includes('interval')||l.includes('vo2')||l.includes('tekrar'))
    return 'Maksimal ama kontrollü. Her tekrar önceki kadar güçlü olmalı. Dinlenme tam olsun.';
  // Tempo
  if(l.includes('tempo')&&!l.includes('yarış'))
    return 'Tempolu ama sürdürülebilir. "Konuşabilirsin ama cümleler kurmakta zorlanırsın" hissi.';
  // Eşik
  if(l.includes('eşik')||l.includes('esik')||l.includes('lactate'))
    return 'Rahatsız ama sürdürülebilir. Nefes zorlanıyor, ritim sabit kalmalı.';
  // Cruise
  if(l.includes('cruise'))
    return 'Kısa aralarla birikim. Her blokta daha zor hissedeceksin — bu normal.';
  // Piramit
  if(l.includes('piramit'))
    return 'Yoğunluk kademeli artar ve azalır. Zirveye yakın kendini ver, inişte kontrol et.';
  // On-off
  if(l.includes('on-off')||l.includes('on off'))
    return 'ON: maksimal. OFF: tam toparlanma değil, hareket devam eder. Ritmi koru.';
  // Yokuş
  if(l.includes('yokuş')||l.includes('yokus'))
    return 'Öne eğil, kısa adımlar, yüksek kadans. İniş kadar çıkış da teknik ister.';
  // Hill sprint
  if(l.includes('hill sprint')||l.includes('sprint'))
    return 'Patlayıcı ve maksimal. 10 sn içinde her şeyini ver. Dinlenme tam olsun.';
  // Uzun koşu
  if(l.includes('uzun')||l.includes('long'))
    return 'Konuşabildiğin rahat hız. Bitişte "biraz daha koşabilirdim" hissiyatı hedef.';
  // Aerobik
  if(l.includes('aerobik')||l.includes('z2')||l.includes('aerobic'))
    return 'Rahat ve kontrollü. Yanında biri olsa konuşabilirsin. Nabzı Z2’de tut.';
  // Kolay / Z1
  if(l.includes('kolay')||l.includes('z1')||l.includes('aktif toparlam'))
    return 'Çok rahat. Nefes kesilmemeli. Kaslar rahatlarken hareket devam eder.';
  // Yarış temposu
  if(l.includes('yarış')||l.includes('race'))
    return 'Hedef yarış hissiyatı. Konsantre ve ritmik. Her blok bir yarış simülasyonu.';
  // Tırmanış
  if(l.includes('tırman')||l.includes('tirman'))
    return 'Adım kısalt, kadans yüksek tut. Güç kalçadan gelsin. Düz yerde aynı eforu hedefle.';
  // Teknik
  if(l.includes('teknik')||l.includes('form'))
    return 'Hız ikinci planda. Adım, duruş ve yere basışa odaklan. Kalite > hız.';
  // Progressive
  if(l.includes('progressi')||l.includes('giderek'))
    return 'Her bölümde biraz daha sıkıştır. Son bölüm en zor — ama kontrollü.';
  // Back to back / yorgun bacak
  if(l.includes('yorgun')||l.includes('b2b')||l.includes('back'))
    return 'Kaslar yorgun olacak — bu hedef. Pace önemsiz, tamamlamak önemli.';
  // Toparlanma / dinlenme arası
  if(l.includes('dinlenme')||l.includes('toparlama')||l.includes('ara'))
    return 'Tam nefes al. Bir sonraki tekrar için hazırlan. Oturma, yürü.';
  // Fartlek
  if(l.includes('fartlek'))
    return 'Özgür ama bilinçli. Hızlı bölümlerde kendin zorla, yavaş bölümlerde toparlan.';
  // Negatif split
  if(l.includes('negatif')||l.includes('2. yarı'))
    return 'İlk yarı kontrollü başla. İkinci yarıda kademeli sıkıştır — bitiş en güçlü.';
  return null;
}

// Global coaching cue cache — Firebase'den bir kez yükle, component re-mount'ta kaybolmaz
const _cueCache = {data: null, loaded: false, listeners: []};
async function loadCueCache(){
  if(_cueCache.loaded) return _cueCache.data;
  try{
    // Önce Firebase'den dene
    let jsonStr = null;
    if(db||initFirebase()){
      const snap = await db.ref('coaching_cues/json').get();
      if(snap.exists()) jsonStr = snap.val();
    }
    // Firebase'den gelemediyse localStorage'dan al
    if(!jsonStr) jsonStr = lsGet('coaching_cues/json');
    _cueCache.data = jsonStr ? (typeof jsonStr==='string' ? JSON.parse(jsonStr) : jsonStr) : {};
    _cueCache.loaded = true;
    _cueCache.listeners.forEach(fn=>fn(_cueCache.data));
  }catch(e){ 
    console.warn('loadCueCache error:', e);
    _cueCache.data={}; 
    _cueCache.loaded=true; 
  }
  return _cueCache.data;
}
async function saveCueGlobal(label, text){
  if(!_cueCache.loaded) await loadCueCache();
  _cueCache.data = {...(_cueCache.data||{}), [label]: text};
  _cueCache.listeners.forEach(fn=>fn(_cueCache.data));
  const jsonStr = JSON.stringify(_cueCache.data);
  try{
    // Firebase'e doğrudan yaz — fbSet'i bypass et (stripUndefined string'i bozmaz ama emin olalım)
    if(db||initFirebase()){
      await db.ref('coaching_cues/json').set(jsonStr);
      lsSet('coaching_cues/json', jsonStr); // localStorage backup
    } else {
      lsSet('coaching_cues/json', jsonStr);
    }
  }
  catch(e){
    console.error('cue save error:', e);
    lsSet('coaching_cues/json', jsonStr); // en azından localStorage'a yaz
  }
}

// Aralıklar editörü — tekrarlı antrenmanlarda her bir tekrarın koşu+dinlenme pace'lerini ayrı düzenler
function AralikEditor({headerIdx, repCount, runRow, restRow, overrides, onChange, paceValidation, paceToZoneIdx, readOnly}){
  const [editKey, setEditKey] = React.useState(null); // 'rep:type:field'
  const e = React.createElement;

  // Her tekrar için ayrı override uygula — mesafe, pm, ps ve süre (h/m/s) dahil
  // _origPaceSec base'den korunur ki pace validation doğru hedefle karşılaştırsın
  const getRowData = (rep, type) => {
    const base = type==='run' ? runRow : restRow;
    if(!base) return null;
    const ovr = overrides[rep]?.[type] || {};
    return {
      ...base,
      ...ovr,
      _origPaceSec: base._origPaceSec,
      _origZIdx: base._origZIdx,
    };
  };

  const editableCellAralik = (rep, type, field, displayVal) => {
    if(readOnly) return displayVal;
    const key = `${rep}:${type}:${field}`;
    const isEditing = editKey === key;
    if(isEditing) return e('input',{
      autoFocus:true, type:'number',
      defaultValue:displayVal,
      style:{width:'100%',fontFamily:'monospace',fontSize:11,fontWeight:700,border:'2px solid var(--info)',borderRadius:3,padding:'2px 4px',background:'#fff',color:'#000',textAlign:'center'},
      onBlur:ev=>{onChange(rep,type,field,ev.target.value);setEditKey(null);},
      onKeyDown:ev=>{
        if(ev.key==='Enter'){onChange(rep,type,field,ev.target.value);setEditKey(null);}
        if(ev.key==='Escape')setEditKey(null);
      }
    });
    return e('span',{
      style:{cursor:'pointer',borderBottom:'1px dashed #94a3b8',fontFamily:'monospace',fontSize:11,fontWeight:700,color:'#000'},
      title:'Düzenlemek için tıkla',
      onClick:()=>setEditKey(key)
    },displayVal);
  };

  const cellSt = {padding:'4px 4px',textAlign:'center',fontFamily:'monospace',fontSize:11,fontWeight:700};
  const reps = [];
  for(let r=1;r<=repCount;r++) reps.push(r);

  return e('div',null,
    e('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:10,background:'#1e293b',borderRadius:4,overflow:'hidden'}},
      e('thead',null,
        e('tr',{style:{background:'#0f172a'}},
          ['#','Aşama','Hedef','Sa','Dk','Sn','Mesafe (m)','Pace dk','Pace sn'].map((h,i)=>
            e('th',{key:i,style:{padding:'5px 4px',textAlign:i<2?'left':'center',fontWeight:600,fontSize:9,color:'#94a3b8'}},h)
          )
        )
      ),
      e('tbody',null,
        reps.flatMap(rep=>{
          const out = [];
          // Run satırı
          const runData = getRowData(rep,'run');
          if(runData){
            const pv = paceValidation(runData);
            out.push(e('tr',{key:`r${rep}`,style:{background:runData.color,borderBottom:'1px solid rgba(0,0,0,.1)'}},
              e('td',{style:{...cellSt,color:'#000'}},rep),
              e('td',{style:{...cellSt,textAlign:'left',color:'#000'}},runData.label),
              e('td',{style:{padding:'4px 4px',textAlign:'center'}},
                pv ? e('span',{style:{display:'inline-block',padding:'2px 5px',borderRadius:3,fontSize:8,fontWeight:700,color:pv.color,background:pv.bg,whiteSpace:'nowrap',lineHeight:1.3}},pv.icon+' '+pv.label) : e('span',{style:{color:'#94a3b8',fontSize:9}},'—')
              ),
              e('td',{style:{...cellSt,color:'#000'}},runData.h>0?runData.h:0),
              e('td',{style:{...cellSt,color:'#000'}},runData.m),
              e('td',{style:{...cellSt,color:'#000'}},String(runData.s).padStart(2,'0')),
              e('td',{style:{...cellSt,color:'#000'}},editableCellAralik(rep,'run','mesafe',runData.mesafe>0?runData.mesafe:0)),
              e('td',{style:{...cellSt,color:'#000'}},editableCellAralik(rep,'run','pm',runData.pm!=null?runData.pm:0)),
              e('td',{style:{...cellSt,color:'#000'}},editableCellAralik(rep,'run','ps',runData.ps!=null?String(runData.ps).padStart(2,'0'):'00'))

          }
          // Rest satırı
          const restData = getRowData(rep,'rest');
          if(restData){

            out.push(e('tr',{key:`d${rep}`,style:{background:restData.color,borderBottom:'2px solid rgba(0,0,0,.15)'}},
              e('td',{style:{...cellSt,color:'#000'}},''),
              e('td',{style:{...cellSt,textAlign:'left',color:'#000',fontStyle:'italic',fontSize:10}},'↳ '+restData.label),
              e('td',{style:{padding:'4px 4px',textAlign:'center'}},

              ),
              e('td',{style:{...cellSt,color:'#000'}},restData.h>0?restData.h:0),

              e('td',{style:{...cellSt,color:'#000'}},editableCellAralik(rep,'rest','pm',restData.pm!=null?restData.pm:0)),

    )
  );
}

function ReceteTablosu({yapilar, zones, isYuruyus, tip, savedOverrides, onSaveOverrides, onSaveDetay, readOnly, originalCueOnly}){
  const [customCues, setCustomCues] = useState(_cueCache.data||{});
  const [editingLabel, setEditingLabel] = useState(null);
  const [editText, setEditText] = useState('');
  const [editCell, setEditCell] = useState(null); // {rowIdx, field, aralikKey?}
  // savedOverrides hem satır-düzeyi (sayısal anahtarlar) hem de aralık-düzeyi (__aralik anahtarı) verisi içerebilir
  const _splitOv=(ov)=>{
    if(!ov) return {rowOv:{},aralikOv:{}};
    const {__aralik,...rest}=ov;
    return {rowOv:rest,aralikOv:__aralik||{}};
  };
  const _initial=_splitOv(savedOverrides);
  const [rowOverrides, setRowOverrides] = useState(_initial.rowOv); // {rowIdx: {mesafe,pm,ps,h,m,s,color,textColor}}
  const [repeatOverrides, setRepeatOverrides] = useState({}); // OP-9: {headerRowIdx: newCount}
  const [editingRepeat, setEditingRepeat] = useState(null); // OP-9: headerRowIdx being edited
  const [aralikExpanded, setAralikExpanded] = useState({}); // {headerRowIdx: bool}
  const [aralikOverrides, setAralikOverrides] = useState(_initial.aralikOv); // {headerRowIdx: {repNum: {run:{pm,ps,mesafe,h,m,s}, rest:{...}}}}

  // savedOverrides dışarıdan güncellenirse sync et
  useEffect(()=>{
    if(savedOverrides){
      const {rowOv,aralikOv}=_splitOv(savedOverrides);
      setRowOverrides(rowOv);
      setAralikOverrides(aralikOv);
    }
  },[savedOverrides]);

  // Global cache'ten yükle — bir kez
  useEffect(()=>{
    if(_cueCache.loaded){ setCustomCues(_cueCache.data||{}); return; }
    loadCueCache().then(data=>setCustomCues(data||{}));
    const listener=(data)=>setCustomCues({...data});
    _cueCache.listeners.push(listener);
    return ()=>{ _cueCache.listeners=_cueCache.listeners.filter(fn=>fn!==listener); };
  },[]);

  const saveCue = async(label, text, srcBaslik)=>{
    setEditingLabel(null);
    if(onSaveDetay){
      onSaveDetay(srcBaslik || label, text);
    } else {
      await saveCueGlobal(label, text);
      setCustomCues({..._cueCache.data});
    }
  };

  // originalCueOnly=true ise (yalnızca Antrenmanlar sekmesi) her zaman orijinal otomatik açıklama gösterilir;
  // takvimde ve Koşu İzlerim'de özel düzenlemeler korunur.
  // srcBaslik: o row'u üreten yapilar[i].baslik — label ile farklı olabilir (interval header gibi)
  const getCueForRow = (label, srcBaslik) => {
    if(originalCueOnly) return coachingCue(label, tip);
    if(onSaveDetay) {
      const key = srcBaslik || label;
      const found = (yapilar||[]).find(y => y.baslik === key);
      if(found) return found.detay || null;
    }
    return customCues[label] !== undefined ? customCues[label] : coachingCue(label, tip);
  };
  const getCue = (label) => getCueForRow(label, label);
  // _caprazNot olanlar tablo dışında yazılı gösterilir
  const caprazNotlar=(yapilar||[]).filter(y=>y._caprazNot);
  // Çapraz antrenman adımlarını tamamen filtrele
  const CAPRAZ_KEYWORDS=['bisiklet','yüzme','kürek','kuvvet','çapraz antrenman'];
  yapilar=(yapilar||[]).filter(y=>{
    if(y._caprazNot) return false;
    const b=(y.baslik||'').toLowerCase();
    const d=(y.detay||'').toLowerCase();
    if(b.startsWith('🚴')||b.startsWith('➕')) return false;
    if(CAPRAZ_KEYWORDS.some(k=>b.includes(k)||d.includes(k))) return false;
    return true;
  });

  // 💡 öneri bloklarını ayır — tabloya dahil edilmez
  const oneriYapilar=(yapilar||[]).filter(y=>(y.baslik||'').startsWith('💡'));
  const normalYapilar=(yapilar||[]).filter(y=>!(y.baslik||'').startsWith('💡'));

  // Satırları üret — header satırları toplama dahil edilmez
  const baseRows=normalYapilar.flatMap(y=>{try{return adimToRows(y,zones).map(r=>({...r,_srcBaslik:y.baslik}));}catch(e){console.warn('adimToRows error:',e,y);return[];};});
  if(!baseRows.length&&!oneriYapilar.length) return null;

  // Override'ları uygula + OP-9: repeatOverrides'dan tekrar sayılarını güncelle
  const rows=baseRows.map((r,i)=>{
    let row=rowOverrides[i]?{...r,...rowOverrides[i]}:r;
    // OP-9: Header için repeatOverrides varsa uygula
    if(row.type==='header'&&repeatOverrides[i]){
      row={...row,repeatCount:repeatOverrides[i]};
    }
    return row;
  });

  // ── Aralık ortalaması: per-rep override varsa runRow/restRow'a ortalama yansıt ──
  // Bir header'ın aralikOverrides'ı varsa, sonraki run+rest satırlarının
  // gösterilen mesafe/pace/süre değerleri tüm rep'lerin ortalamasıyla güncellenir.
  // Override edilmemiş rep'ler base satırın (rowOverrides uygulanmış) değerini kullanır.
  rows.forEach((hdr,hi)=>{
    if(hdr.type!=='header') return;
    const ov=aralikOverrides[hi];
    if(!ov||Object.keys(ov).length===0) return;
    const repCount=hdr.repeatCount||1;
    const computeAvg=(baseRow,kind)=>{
      if(!baseRow) return null;
      let totMesafe=0,totPaceSec=0,totDurSec=0,paceN=0,n=0;
      for(let rep=0;rep<repCount;rep++){
        const repOv=ov[rep]?.[kind]||{};
        const m=repOv.mesafe!=null?repOv.mesafe:(baseRow.mesafe||0);
        const pm=repOv.pm!=null?repOv.pm:(baseRow.pm||0);
        const ps=repOv.ps!=null?repOv.ps:(baseRow.ps||0);
        const dh=repOv.h!=null?repOv.h:(baseRow.h||0);
        const dm=repOv.m!=null?repOv.m:(baseRow.m||0);
        const ds=repOv.s!=null?repOv.s:(baseRow.s||0);
        totMesafe+=m;
        totDurSec+=dh*3600+dm*60+ds;
        const pSec=pm*60+ps;
        if(pSec>0){totPaceSec+=pSec;paceN++;}
        n++;
      }
      if(n===0) return null;
      const avgMesafe=Math.round(totMesafe/n);
      const avgDurSec=Math.round(totDurSec/n);
      const avgPaceSec=paceN>0?Math.round(totPaceSec/paceN):0;
      const out={mesafe:avgMesafe,...secToHMS(avgDurSec)};
      if(avgPaceSec>0){
        out.pm=Math.floor(avgPaceSec/60);
        out.ps=avgPaceSec%60;
      }
      return out;
    };
    const runIdx=hi+1,restIdx=hi+2;
    if(rows[runIdx]&&rows[runIdx].type!=='header'){
      const avg=computeAvg(rows[runIdx],'run');
      if(avg) rows[runIdx]={...rows[runIdx],...avg,_aralikAveraged:true};
    }
    if(rows[restIdx]&&rows[restIdx].type!=='header'){
      const avg=computeAvg(rows[restIdx],'rest');
      if(avg) rows[restIdx]={...rows[restIdx],...avg,_aralikAveraged:true};
    }
  });

  // Pace (sn/km) → zone index bul
  const paceToZoneIdx=(paceSec)=>{
    if(!zones?.paceZones||!paceSec) return null;
    const paceMs=1000/paceSec; // m/s
    for(let i=zones.paceZones.length-1;i>=0;i--){
      const z=zones.paceZones[i];
      if(z&&z.lo_ms&&paceMs>=z.lo_ms) return i;
    }
    return 0;
  };

  // ── OP-8: Pace Validation — girilen pace ile hedef zone pace karşılaştır ──
  const paceValidation=(row)=>{
    if(!row||row.type==='header'||row.rpe||row._isSprint) return null;
    const pm=row.pm; const ps=row.ps;
    if(pm==null||pm===0&&(ps==null||ps===0)) return null;
    const enteredSec=pm*60+(ps||0);
    if(enteredSec<=0) return null;
    // Orijinal zone pace
    const origPace=row._origPaceSec;
    if(!origPace||origPace<=0) return null;
    const diff=enteredSec-origPace; // pozitif = yavaş, negatif = hızlı
    const absDiff=Math.abs(diff);
    if(absDiff<=25) return{label:'Hedef Bölge',color:'#22c55e',bg:'#f0fdf4',icon:'✓'};
    if(absDiff<=50){
      return diff>0
        ?{label:'Biraz Yavaş',color:'#f59e0b',bg:'#fffbeb',icon:'▼'}
        :{label:'Biraz Hızlı',color:'#f59e0b',bg:'#fffbeb',icon:'▲'};
    }
    return diff>0
      ?{label:'Çok Yavaş',color:'#ef4444',bg:'#fef2f2',icon:'▼▼'}
      :{label:'Çok Hızlı',color:'#ef4444',bg:'#fef2f2',icon:'▲▲'};
  };

  // ── OP-9: Tekrar sayısı değiştirme ──
  const updateRepeatCount=(headerIdx, newCount)=>{
    if(newCount<1||newCount>30) return;
    const newRepeatOv={...repeatOverrides,[headerIdx]:newCount};
    setRepeatOverrides(newRepeatOv);
    setEditingRepeat(null);
    // Sonraki run ve rest satırlarının repeatCount'ını güncelle
    const newRowOv={...rowOverrides};
    for(let ri=headerIdx+1;ri<baseRows.length;ri++){
      const br=baseRows[ri];
      if(br.type==='header') break; // bir sonraki header'a gelince dur
      if(br.repeatCount){
        newRowOv[ri]={...(newRowOv[ri]||{}),repeatCount:newCount};
      }
    }
    setRowOverrides(newRowOv);
    if(onSaveOverrides) onSaveOverrides({...newRowOv,__aralik:aralikOverrides});
  };

  // Hücre güncelleme: mesafe, pm veya ps değişince diğerlerini hesapla
  const updateCell=(rowIdx, field, rawVal)=>{
    const r=rows[rowIdx];
    if(!r||r.type==='header') return;
    const val=parseInt(rawVal)||0;
    let upd={};
    if(field==='mesafe'){
      const paceSec=(r.pm||0)*60+(r.ps||0);
      if(paceSec>0&&val>0){
        const newSec=Math.round(val/1000*paceSec);
        upd={mesafe:val,...secToHMS(newSec)};
      } else {
        upd={mesafe:val};
      }
    } else if(field==='pm'||field==='ps'){
      const pm=field==='pm'?val:(r.pm||0);
      const ps=field==='ps'?val:(r.ps||0);
      const paceSec=pm*60+ps;
      const mesafe=r.mesafe||0;
      if(paceSec>0&&mesafe>0){
        const newSec=Math.round(mesafe/1000*paceSec);
        upd={pm,ps,...secToHMS(newSec)};
      } else {
        upd={pm,ps};
      }
      // Pace zone rengi güncelle
      if(paceSec>0){
        const zi=paceToZoneIdx(paceSec);
        if(zi!=null){
          upd.color=ZONE_COLORS_INLINE[zi];
          upd.textColor=ZONE_TEXT_COLOR[zi];
        }
      }
    }
    const newOverrides={...rowOverrides,[rowIdx]:{...(rowOverrides[rowIdx]||{}), ...upd}};
    setRowOverrides(newOverrides);
    setEditCell(null);
    if(onSaveOverrides) onSaveOverrides({...newOverrides,__aralik:aralikOverrides});
  };

  // Aralıklar editörü için per-rep cell güncelleme
  // Mesafe↔pace↔süre tutarlılığını korur (updateCell mantığının per-rep versiyonu)
  const updateAralikCell=(headerIdx, rep, type, field, rawVal)=>{
    const val=parseInt(rawVal)||0;
    // Ana satırı bul (runRow = headerIdx+1, restRow = headerIdx+2)
    const base = type==='run' ? rows[headerIdx+1] : rows[headerIdx+2];
    if(!base) return;
    // Mevcut override değerleriyle birleştir
    const curOv = aralikOverrides[headerIdx]?.[rep]?.[type] || {};
    const curPm = curOv.pm != null ? curOv.pm : (base.pm || 0);
    const curPs = curOv.ps != null ? curOv.ps : (base.ps || 0);
    const curMesafe = curOv.mesafe != null ? curOv.mesafe : (base.mesafe || 0);

    let upd = {};
    if(field==='mesafe'){
      const paceSec = curPm*60 + curPs;
      if(paceSec>0 && val>0){
        const newSec = Math.round(val/1000*paceSec);
        upd = {mesafe:val, ...secToHMS(newSec)};
      } else {
        upd = {mesafe:val};
      }
    } else if(field==='pm' || field==='ps'){
      const pm = field==='pm' ? val : curPm;
      const ps = field==='ps' ? val : curPs;
      const paceSec = pm*60 + ps;
      if(paceSec>0 && curMesafe>0){
        const newSec = Math.round(curMesafe/1000*paceSec);
        upd = {pm, ps, ...secToHMS(newSec)};
      } else {
        upd = {pm, ps};
      }
    }

    setAralikOverrides(prev=>{
      const next={...prev};
      if(!next[headerIdx]) next[headerIdx]={};
      if(!next[headerIdx][rep]) next[headerIdx][rep]={};
      if(!next[headerIdx][rep][type]) next[headerIdx][rep][type]={};
      next[headerIdx][rep][type]={...next[headerIdx][rep][type], ...upd};
      // Firebase'e yaz: rowOverrides + __aralik birleşimi
      if(onSaveOverrides) onSaveOverrides({...rowOverrides,__aralik:next});
      return next;
    });
  };

  // Düzenlenebilir hücre render yardımcısı
  const editableCell=(rowIdx, field, displayVal)=>{
    if(readOnly) return displayVal;
    const isEditing=editCell?.rowIdx===rowIdx&&editCell?.field===field;
    if(isEditing) return React.createElement('input',{
      autoFocus:true,
      type:'number',
      defaultValue:displayVal,
      style:{width:'100%',fontFamily:'monospace',fontSize:11,fontWeight:700,border:'2px solid var(--info)',borderRadius:3,padding:'2px 4px',background:'#ffffff',color:'#000',textAlign:'center'},
      onBlur:e=>updateCell(rowIdx,field,e.target.value),
      onKeyDown:e=>{
        if(e.key==='Enter') updateCell(rowIdx,field,e.target.value);
        if(e.key==='Escape') setEditCell(null);
      }
    });
    return React.createElement('span',{
      style:{cursor:'pointer',borderBottom:'1px dashed #888'},
      title:'Düzenlemek için tıkla',
      onClick:()=>setEditCell({rowIdx,field})
    },displayVal);
  };

  // Toplam hesapla (header hariç, repeatCount ile çarp)
  let totSn=0, totMesafe=0, totWeightedPace=0, paceWeight=0;
  rows.forEach(r=>{
    if(r.type==='header') return;
    const rep=r.repeatCount||1;
    const sn=(r.h*3600+r.m*60+r.s)*rep;
    const mesafe=(r.mesafe||0)*rep;
    totSn+=sn; totMesafe+=mesafe;
    if(mesafe>0&&r.pm!=null){
      const pSec=r.pm*60+(r.ps||0);
      totWeightedPace+=pSec*(mesafe/1000);
      paceWeight+=mesafe/1000;
    }
  });
  const avgPaceSec=paceWeight>0?Math.round(totWeightedPace/paceWeight):0;
  const tot=secToHMS(totSn);
  // Yürüyüş dönüşümü — avgPaceSec hesaplandıktan sonra
  if(!['interval','piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','yokus_kisa','yokus_uzun','tirmanis','teknik'].includes(tip)&&avgPaceSec>0&&avgPaceSec>570){
    const kosuDon=(s)=>(s||'').replace(/Kolay Koşu/g,'Kolay Tempolu Yürüyüş').replace(/kolay koşu/gi,'Kolay Tempolu Yürüyüş').replace(/Aerobik Koşu/g,'Aerobik Tempolu Yürüyüş').replace(/aerobik koşu/gi,'Aerobik Tempolu Yürüyüş').replace(/Uzun Koşu/g,'Uzun Tempolu Yürüyüş').replace(/uzun koşu/gi,'Uzun Tempolu Yürüyüş').replace(/\bKoşu\b/g,'Tempolu Yürüyüş').replace(/\bkoşu\b/gi,'Tempolu Yürüyüş');
    rows.forEach(r=>{r.label=kosuDon(r.label);});
  }

  const cell=(val,bold=false)=>({padding:'5px 4px',textAlign:'center',fontFamily:'monospace',fontSize:11,fontWeight:700,color:'#000'});

  return React.createElement('div',{style:{marginTop:10,borderRadius:6,overflow:'hidden',border:'1px solid var(--border)'}},
    React.createElement('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:11}},
      // Başlık
      React.createElement('thead',null,
        React.createElement('tr',{style:{background:'#0f172a'}},
          ['Aşama','Hedef','Sa','Dk','Sn','Mesafe (m)','Pace dk','Pace sn','RPE'].map((h,i)=>
            React.createElement('th',{key:i,style:{
              padding:'5px 4px',textAlign:i===0?'left':'center',
              fontWeight:600,fontSize:10,color:'#94a3b8',
              width:i===0?'auto':[64,32,32,32,64,40,40,40][i-1]
            }},h)
          )
        )
      ),
      // Gövde
      React.createElement('tbody',null,
        rows.map((r,i)=>{
          if(r.type==='header'){
            // OP-9: Tekrar sayısı düzenlenebilir
            const origCount=r.repeatCount||1;
            const effCount=repeatOverrides[i]||origCount;
            const repeatLabel=r.label.replace(/↻ \d+ Tekrar/,`↻ ${effCount} Tekrar`).replace(/↻ \d+ Blok/,`↻ ${effCount} Blok`).replace(/↻ \d+ Strides/,`↻ ${effCount} Strides`);
            const isAralikOpen=!!aralikExpanded[i];
            // Aralıklar tablosu için bu header'ın altındaki run+rest satırlarını bul
            const runRow=rows[i+1];
            const restRow=(rows[i+2]?.type==='rest')?rows[i+2]:null;
            return React.createElement(React.Fragment,{key:'h'+i},
              React.createElement('tr',{style:{background:r.color}},
                React.createElement('td',{colSpan:9,style:{padding:'4px 8px',fontWeight:700,fontSize:11,color:r.textColor,letterSpacing:'.3px',display:'flex',alignItems:'center',gap:6}},
                  readOnly?repeatLabel:React.createElement(React.Fragment,null,
                    repeatLabel.split(/\d+/).shift(),
                    editingRepeat===i
                      ?React.createElement('input',{
                        autoFocus:true,type:'number',min:1,max:30,defaultValue:effCount,
                        style:{width:40,fontFamily:'monospace',fontSize:12,fontWeight:700,border:'2px solid var(--info)',borderRadius:3,padding:'1px 4px',background:'#fff',color:'#000',textAlign:'center'},
                        onBlur:e=>updateRepeatCount(i,parseInt(e.target.value)||origCount),
                        onKeyDown:e=>{if(e.key==='Enter')updateRepeatCount(i,parseInt(e.target.value)||origCount);if(e.key==='Escape')setEditingRepeat(null);}
                      })
                      :React.createElement('span',{
                        style:{cursor:'pointer',borderBottom:'2px dashed #94a3b8',padding:'0 2px',fontSize:12},
                        title:'Tekrar sayısını düzenle',
                        onClick:()=>setEditingRepeat(i)
                      },effCount),
                    ' '+repeatLabel.split(/\d+/).slice(1).join('')
                  ),
                  // Aralıklar butonu — sadece tekrarlı satırlarda
                  origCount>1&&React.createElement('button',{
                    'data-no-export':true,
                    onClick:()=>setAralikExpanded(prev=>({...prev,[i]:!prev[i]})),
                    style:{
                      marginLeft:'auto',fontSize:10,padding:'2px 8px',
                      background:isAralikOpen?'#fbbf24':'rgba(255,255,255,0.1)',

                      border:'1px solid '+(isAralikOpen?'#fbbf24':'rgba(255,255,255,0.3)'),
                      borderRadius:3,cursor:'pointer',fontWeight:700
                    }
                  },isAralikOpen?'▼ Aralıklar':'▶ Aralıklar')
                )
              ),
              // Genişletilmiş aralık editörü
              isAralikOpen&&runRow&&React.createElement('tr',{style:{background:'#0f172a'}},
                React.createElement('td',{colSpan:9,style:{padding:'10px 8px'}},
                  React.createElement(AralikEditor,{
                    headerIdx:i,
                    repCount:effCount,
                    runRow,restRow,
                    overrides:aralikOverrides[i]||{},
                    onChange:(rep,type,field,val)=>updateAralikCell(i,rep,type,field,val),
                    paceValidation,
                    paceToZoneIdx,
                    readOnly
                  })
                )
              )
            );
          }
          return React.createElement('tr',{key:i,style:{background:r.color,borderBottom:'1px solid rgba(0,0,0,.08)'}},
            React.createElement('td',{style:{padding:'5px 6px',fontWeight:700,fontSize:11,color:'#000'}},
              r.label,
              (()=>{
                const src=r._srcBaslik||r.label;
                const cue=getCueForRow(r.label,src);
                const isEditing=editingLabel===r.label;
                if(isEditing) return React.createElement('div',{style:{marginTop:4,display:'flex',gap:4,alignItems:'center'}},
                  React.createElement('input',{
                    autoFocus:true,
                    value:editText,
                    onChange:e=>setEditText(e.target.value),
                    onKeyDown:e=>{if(e.key==='Enter')saveCue(r.label,editText,src);if(e.key==='Escape')setEditingLabel(null);},
                    style:{flex:1,fontSize:10,padding:'2px 4px',borderRadius:3,border:'1px solid var(--info)',background:'var(--bg-primary)',color:'var(--text-primary)'}
                  }),
                  React.createElement('button',{
                    onClick:()=>saveCue(r.label,editText,src),
                    style:{fontSize:9,padding:'1px 6px',background:'var(--info)',color:'#fff',border:'none',borderRadius:3,cursor:'pointer'}
                  },'✓'),
                  React.createElement('button',{
                    onClick:()=>setEditingLabel(null),
                    style:{fontSize:9,padding:'1px 6px',background:'transparent',border:'1px solid var(--border)',borderRadius:3,cursor:'pointer',color:'var(--text-secondary)'}
                  },'✕')
                );
                // readOnly modunda açıklama ekleme/düzenleme butonları gizlenir
                if(!cue) return readOnly?null:React.createElement('button',{

                },'+ açıklama ekle');
                return React.createElement('div',{style:{display:'flex',alignItems:'flex-start',gap:4,marginTop:2}},
                  React.createElement('div',{style:{fontWeight:700,fontStyle:'normal',fontSize:10,color:'#000',lineHeight:1.4,flex:1}},cue),
                  !readOnly&&React.createElement('button',{

                  },'✏️')
                );
              })()
            ),
            // HEDEF — Pace validation badge (sadece pace hedefli satırlarda)
            React.createElement('td',{style:{padding:'4px 4px',textAlign:'center',verticalAlign:'middle'}},
              (()=>{
                const pv=paceValidation(r);
                if(!pv) return React.createElement('span',{style:{color:'#94a3b8',fontSize:9}},'—');
                return React.createElement('span',{
                  style:{display:'inline-block',padding:'2px 5px',borderRadius:3,fontSize:8,fontWeight:700,
                    color:pv.color,background:pv.bg,whiteSpace:'nowrap',lineHeight:1.3}

              })()
            ),
            React.createElement('td',{style:{...cell(),color:'#000'}},r.h>0?r.h:0),
            React.createElement('td',{style:{...cell(),color:'#000'}},r.m),
            React.createElement('td',{style:{...cell(),color:'#000'}},String(r.s).padStart(2,'0')),
            React.createElement('td',{style:{...cell(),color:r.rpe||r._isSprint?'#475569':'#000',fontStyle:r.rpe||r._isSprint?'italic':'normal'}},editableCell(i,'mesafe',r.mesafe>0?r.mesafe:0)),
            React.createElement('td',{style:{...cell(),color:r.rpe||r._isSprint?'#475569':'#000',fontStyle:r.rpe||r._isSprint?'italic':'normal'}},editableCell(i,'pm',r.pm!=null?r.pm:0)),
            React.createElement('td',{style:{...cell(),color:r.rpe||r._isSprint?'#475569':'#000',fontStyle:r.rpe||r._isSprint?'italic':'normal'}},editableCell(i,'ps',r.ps!=null?String(r.ps).padStart(2,'0'):'00')),
            React.createElement('td',{style:{...cell(),color:'#000',fontSize:12}},
              r.rpe?r.rpe:'—'
            )
          );
        }),
        // Toplam satırı
        React.createElement('tr',{style:{background:'#1e293b',borderTop:'2px solid #475569'}},
          React.createElement('td',{style:{padding:'6px 6px',fontWeight:700,fontSize:11,color:'#f1f5f9'}},'TOPLAM'),
          React.createElement('td',{style:{...cell(),color:'#94a3b8'}},'—'),
          React.createElement('td',{style:{...cell(true),color:'#f1f5f9'}},tot.h||0),
          React.createElement('td',{style:{...cell(true),color:'#fbbf24',fontSize:13}},tot.m),
          React.createElement('td',{style:{...cell(),color:'#f1f5f9'}},String(tot.s).padStart(2,'0')),
          React.createElement('td',{style:{...cell(true),color:'#fbbf24',fontSize:12}},totMesafe>0?totMesafe:0),
          React.createElement('td',{style:{...cell(true),color:'#fbbf24',fontSize:13}},avgPaceSec?Math.floor(avgPaceSec/60):0),
          React.createElement('td',{style:{...cell(),color:'#f1f5f9'}},avgPaceSec?String(Math.round(avgPaceSec%60)).padStart(2,'0'):'00'),

        )
      )
    ),
    // 💡 Opsiyonel öneri notları — tablo dışında göster
    oneriYapilar.length>0&&React.createElement('div',{style:{
      marginTop:6,padding:'8px 10px',

      borderRadius:6,fontSize:11,color:'var(--warn)'
    }},
      oneriYapilar.map((o,i)=>React.createElement('div',{key:i,style:{marginBottom:i<oneriYapilar.length-1?4:0}},
        React.createElement('strong',null,o.baslik),': ',o.detay
      ))
    ),

  );
}


function zoneInfo(zones, zIdx, label){
  const zLabel=label||(['Z1','Z2','Z3','Z4','Z5a','Z5b','Z5c'][zIdx]||'Z'+zIdx);
  const hr=zones?.hrZones?.[zIdx];
  const hrStr=hr?.lo_bpm&&hr?.hi_bpm?`${hr.lo_bpm}–${hr.hi_bpm} bpm`:'';
  const pace=zones?.paceZones?.[zIdx];
  const paceStr=pace?.lo_pace&&pace?.hi_pace?pz(zones,zIdx):'';
  const parts=[zLabel,hrStr,paceStr].filter(Boolean);
  return parts.join(' · ');
}

// Z1 spesifik (alt sınır yok)
function zoneInfoZ1(zones){
  const hr=zones?.hrZones?.[0];
  const hrStr=hr?.hi_bpm?`< ${hr.hi_bpm} bpm`:'';
  const pace=zones?.paceZones?.[0];
  const paceStr=pace?.hi_pace?`> ${pace.hi_pace} /km`:'';
  const parts=['Z1',hrStr,paceStr].filter(Boolean);
  return parts.join(' · ');
}


// yapi_notu string'inden şablonu yeniden üret
function tplFromYapiNotu(tur, yapiNotu, band, sure_dk, zones, disiplin, phase, ctl){
  if(!yapiNotu) return null;
  // yapi_notu: "Tempo · S2 — 2×8 dk / 3dk dinlenme" gibi
  // "—" sonrasındaki kısım sets bilgisi
  const dashIdx=yapiNotu.indexOf(' — ');
  const setsStr=dashIdx>=0?yapiNotu.slice(dashIdx+3).trim():'';

  // Tempo: sets'i parse et, şablonu yeniden üret
  if(tur==='tempo'&&setsStr){
    const setsDin=setsStr.split('/').map(s=>s.trim());
    const sets=setsDin[0]||'2×8 dk';
    const din=setsDin[1]?setsDin[1].replace(/\s*dinlenme/,'').trim():'3 dk';
    const extraMap={'S1':'Nefes konuş testi: cümleler kurabilmeli','S2':'Nefes konuş testi','S3':'Ritim sabit','S4':'Ritim sabit, hız artışı yok','S5':'Son blokta biraz sıkıştır','S6':'Ritim sabit','S7':'Sürdürülebilir maksimal tempo','S8':'Son blok en zor','S9':'Kümülatif tempo','S10':'Sürekli — negatif split dene','S11':'Sürekli — son 10dk sıkıştır'};
    const seviyeM=yapiNotu.match(/·s*(Sd+)/);
    const sev=seviyeM?seviyeM[1]:'';
    const extra=extraMap[sev]||'';
    const zT=zoneInfo(zones,2)||'Z3 tempo';
    return{tip:'tempo',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk kolay koşu Z1 + dinamik ısınma'},
      {baslik:'Z3 Tempo Blokları',detay:sets+' '+zT+' · '+din+' dinlenme arası'+(extra?' · '+extra:'')},
      {baslik:'Soğuma',detay:'10 dk Z1 kolay koşu'},
    ]};
  }

  // Eşik
  if(tur==='esik'&&setsStr){
    const setsDin=setsStr.split('/').map(s=>s.trim());
    const sets=setsDin[0]||'2×10 dk';
    const din=setsDin[1]?setsDin[1].replace(/\s*ara/,'').trim():'2 dk';
    const seviyeM=yapiNotu.match(/·s*(Sd+)/);
    const sev=seviyeM?seviyeM[1]:'';
    const zE=zoneInfo(zones,3)||'Z4 eşik';
    return{tip:'esik',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1 kolay koşu'},
      {baslik:'💡 Strides Önerisi',detay:'4×100m ısınma sonu strides (opsiyonel)'},
      {baslik:'Z4 Eşik Blokları',detay:sets+' — '+zE+' · '+din+' dinlenme arası'},
      {baslik:'Soğuma',detay:'10 dk Z1 kolay koşu'},
    ]};
  }

  // İnterval
  if(tur==='interval'&&setsStr){
    const setsDin=setsStr.split('/').map(s=>s.trim());
    const sets=setsDin[0]||'4×3 dk';
    const din=setsDin[1]?setsDin[1].replace(/\s*dinlenme/,'').trim():'3 dk';
    const seviyeM=yapiNotu.match(/·s*(Sd+)/);
    const sev=seviyeM?seviyeM[1]:'';
    const z5=zoneInfo(zones,4)||'Z5a VO₂max';
    return{tip:'interval',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1 kolay koşu'},
      {baslik:'💡 Strides Önerisi',detay:'4×100m ısınma sonu strides'},
      {baslik:'Z5 İnterval Blokları',detay:sets+' '+z5+' · '+din+' dinlenme'},
      {baslik:'Soğuma',detay:'10 dk Z1 kolay koşu'},
    ]};
  }

  // Uzun: özel yapı
  if(tur==='uzun'){
    const uzunSure=sure_dk||90;
    const zU=zoneInfo(zones,1)||'Z2 aerobik';
    const zU3=zoneInfo(zones,2)||'Z3';
    let bloklar=[
      {baslik:'Isınma',detay:'15 dk — '+zoneInfoZ1(zones)},
      {baslik:'Z2 Uzun Koşu',detay:(uzunSure-15)+' dk — '+zU},
    ];
    if(yapiNotu.includes('Son 20') || yapiNotu.includes('tempo artış')){
      bloklar=[
        {baslik:'Isınma',detay:'10 dk — '+zoneInfoZ1(zones)},
        {baslik:'Aerobik Blok',detay:(uzunSure-30)+' dk — '+zU},
        {baslik:'Tempo Finişi',detay:'20 dk — '+zU3+' · Kademeli hız artışı — kontrollü sıkıştırma'},
      ];
    } else if(yapiNotu.includes('Son %25') || yapiNotu.includes('yarış temposu')){
      const yarisBlok=Math.round((uzunSure-15)*0.25);
      const aeroBlok=uzunSure-15-yarisBlok;
      bloklar=[
        {baslik:'Isınma',detay:'10 dk — '+zoneInfoZ1(zones)},
        {baslik:'Aerobik Blok',detay:aeroBlok+' dk — '+zU},
        {baslik:'Yarış Pace Finişi',detay:yarisBlok+' dk — hedef yarış pace · Son '+yarisBlok+' dk yarış simülasyonu'},
      ];
    } else if(yapiNotu.includes('Yürüyüş-koşu') || yapiNotu.includes('9:1') || yapiNotu.includes('4:1')){
      const oran=yapiNotu.includes('9:1')?'9:1':'4:1';
      bloklar=[
        {baslik:'Yürüyüş-Koşu',detay:uzunSure+' dk — '+oran+' dk koşu/yürüyüş karması · Tüm süre boyunca · '+zU},
      ];
    } else if(yapiNotu.includes('Negatif split')){
      const yari=Math.round((uzunSure-10)/2);
      bloklar=[
        {baslik:'Isınma',detay:'10 dk — '+zoneInfoZ1(zones)},
        {baslik:'1. Yarı',detay:yari+' dk — '+zU+' · Kontrollü, rahat'},
        {baslik:'2. Yarı (Negatif Split)',detay:yari+' dk — '+zU3+' · Her km biraz daha hızlı'},
      ];
    }
    return{tip:'uzun',sure_dk,yapi_notu:yapiNotu,yapilar:bloklar};
  }

  // Aerobik
  if(tur==='aerobik'){
    const zA1=zoneInfoZ1(zones);
    const zA2=zoneInfo(zones,1)||'Z2 aerobik';
    const zA3=zoneInfo(zones,2)||'Z3';
    let yapilar=[
      {baslik:'Isınma',detay:'10 dk — '+zA1},
      {baslik:'Aerobik Blok',detay:(sure_dk-15)+' dk — '+zA2},
      {baslik:'Soğuma',detay:'5 dk Z1 kolay koşu'},
    ];
    if(yapiNotu.includes('Negatif split')){
      const yari=Math.round((sure_dk-10)/2);
      yapilar=[
        {baslik:'Isınma',detay:'5 dk — '+zA1},
        {baslik:'1. Yarı',detay:yari+' dk — '+zA2+' · Rahat hızda başla'},
        {baslik:'2. Yarı (Negatif)',detay:yari+' dk — '+zA2+'/'+zA3+' · Yavaşça hızlan'},
        {baslik:'Soğuma',detay:'5 dk Z1'},
      ];
    } else if(yapiNotu.includes('Fartlek')){
      yapilar=[
        {baslik:'Isınma',detay:'10 dk — '+zA1},
        {baslik:'Fartlek Blokları',detay:(sure_dk-15)+' dk — Hisse göre hız değiştir: 2-3dk Z3 → 3-5dk Z2 · Kuralsız ama kontrollü'},
        {baslik:'Soğuma',detay:'5 dk Z1'},
      ];
    } else if(yapiNotu.includes('Z1–Z2 karışık')){
      yapilar=[
        {baslik:'Z1–Z2 Karışık',detay:sure_dk+' dk — Z1 ve Z2 arasında serbest · Nabza bakma, his temelli · Aktif toparlanma niteliği'},
      ];
    }
    return{tip:'aerobik',sure_dk,yapi_notu:yapiNotu,yapilar};
  }

  // Progressive
  if(tur==='progressive'){
    const zP1=zoneInfo(zones,1)||'Z2';
    const zP2=zoneInfo(zones,2)||'Z3';
    const zP3=zoneInfo(zones,3)||'Z4';
    const zP5=zoneInfo(zones,4)||'Z5a';
    const uc=Math.round((sure_dk-10)/3);
    let yapilar=[
      {baslik:'Isınma',detay:'5 dk — '+zoneInfoZ1(zones)},
      {baslik:'Bölüm 1',detay:uc+' dk — '+zP1},
      {baslik:'Bölüm 2',detay:uc+' dk — '+zP2},
      {baslik:'Bölüm 3',detay:uc+' dk — '+zP3},
      {baslik:'Soğuma',detay:'5 dk Z1'},
    ];
    if(yapiNotu.includes('S2') || yapiNotu.includes('serbest sprint')){
      yapilar=[
        {baslik:'Isınma',detay:'5 dk — '+zoneInfoZ1(zones)},
        {baslik:'Bölüm 1',detay:uc+' dk — '+zP1},
        {baslik:'Bölüm 2',detay:uc+' dk — '+zP2},
        {baslik:'Bölüm 3',detay:uc+' dk — '+zP3},
        {baslik:'Sprint Finişi',detay:'5 dk serbest sprint — maksimal efor'},
        {baslik:'Soğuma',detay:'5 dk Z1'},
      ];
    } else if(yapiNotu.includes('S3') || yapiNotu.includes('giderek artan son 10dk')){
      yapilar=[
        {baslik:'Isınma',detay:'5 dk — '+zoneInfoZ1(zones)},
        {baslik:'Bölüm 1',detay:uc+' dk — '+zP1},
        {baslik:'Bölüm 2',detay:uc+' dk — '+zP2},
        {baslik:'Giderek Artan Finiş',detay:'10 dk — '+zP3+' → '+zP5+' · Her 2 dk\u2019da hız artır'},
        {baslik:'Soğuma',detay:'5 dk Z1'},
      ];
    } else if(yapiNotu.includes('S4')){
      const d1=Math.round(sure_dk*0.30);
      const d2=Math.round(sure_dk*0.40);
      const d3=Math.round(sure_dk*0.20);
      const d4=Math.round(sure_dk*0.10);
      yapilar=[
        {baslik:'%30 Z2',detay:d1+' dk — '+zP1},
        {baslik:'%40 Z3',detay:d2+' dk — '+zP2},
        {baslik:'%20 Z4',detay:d3+' dk — '+zP3},
        {baslik:'%10 Z5a',detay:d4+' dk — '+zP5+' · Maksimal sürdürülebilir efor'},
      ];
    }
    return{tip:'progressive',sure_dk,yapi_notu:yapiNotu,yapilar};
  }

  // Tempo Interval
  if(tur==='tempo_interval'&&setsStr){
    const setsDin=setsStr.split('/').map(s=>s.trim());
    const sets=setsDin[0]||'2×10 dk';
    const din=setsDin[1]?setsDin[1].replace(/\s*ara/,'').trim():'3 dk';
    const seviyeM=yapiNotu.match(/·s*(Sd+)/);
    const sev=seviyeM?seviyeM[1]:'';
    const zTI=zoneInfo(zones,3)||'Z4 tempo'; // Z4 (eşik üstü) — düzeltildi (önceki hatalı: zones,2=Z3)
    return{tip:'tempo_interval',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1 kolay koşu'},
      {baslik:'Z4 Tempo Blokları',detay:sets+' — '+zTI+' · '+din+' aktif toparlanma arası'},
      {baslik:'Soğuma',detay:'10 dk Z1'},
    ]};
  }

  // Cruise
  if(tur==='cruise'&&setsStr){
    const setsDin=setsStr.split('/').map(s=>s.trim());
    const sets=setsDin[0]||'4×8 dk';
    const din=setsDin[1]?setsDin[1].replace(/\s*ara/,'').trim():'90sn';
    const seviyeM=yapiNotu.match(/·s*(Sd+)/);
    const sev=seviyeM?seviyeM[1]:'';
    const zC=zoneInfo(zones,3)||'Z4 eşik';
    return{tip:'cruise',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1'},
      {baslik:'Z4 Cruise Blokları',detay:sets+' — '+zC+' · '+din+' aktif toparlanma · Kısa aralar: laktik tamponlama'},
      {baslik:'Soğuma',detay:'10 dk Z1'},
    ]};
  }

  // Yarış Temposu
  if(tur==='yaris_tempo'&&setsStr){
    const setsDin=setsStr.split('/').map(s=>s.trim());
    const sets=setsDin[0]||'3×8 dk';
    const din=setsDin[1]?setsDin[1].replace(/\s*ara/,'').trim():'2 dk';
    const seviyeM=yapiNotu.match(/·s*(Sd+)/);
    const sev=seviyeM?seviyeM[1]:'';
    const zYT=zoneInfo(zones,3)||'Z4 yarış temposu';
    return{tip:'yaris_tempo',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1 + strides'},
      {baslik:'Yarış Pace Blokları',detay:sets+' — '+zYT+' · '+din+' aktif toparlanma · Hedef yarış pace'},
      {baslik:'Soğuma',detay:'10 dk Z1'},
    ]};
  }

  // Piramit — sets string'den yapıyı parse et
  if(tur==='piramit'){
    const sevM=yapiNotu.match(/·\s*(S\d+)/);const sev=sevM?sevM[1]:'';
    const setsM=yapiNotu.match(/—\s*([^/]+)/);const sets=setsM?setsM[1].trim():'1–2–3–2–1 dk';
    const dinM=yapiNotu.match(/\/\s*(.+)/);const din=dinM?dinM[1].trim():'eşit yürüyüş';
    const z5=zoneInfo(zones,4)||'Z5a VO₂max';
    return{tip:'piramit',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1 kolay koşu'},
      {baslik:'Z5 Piramit Blokları',detay:sets+' — '+z5+' · '+din+' arası'},
      {baslik:'Soğuma',detay:'10 dk Z1'},
    ]};
  }

  // Kesintisiz Piramit
  if(tur==='kesintisiz_piramit'){
    const sevM=yapiNotu.match(/·\s*(S\d+)/);const sev=sevM?sevM[1]:'';
    const bolumM=yapiNotu.match(/—\s*(.+?)(?:\s*\(|$)/);const bolum=bolumM?bolumM[1].trim():'Z2→Z3→Z4→Z3→Z2';
    const adetM=yapiNotu.match(/\((\d+) bölüm\)/);const adet=adetM?adetM[1]:'';
    return{tip:'kesintisiz_piramit',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'10 dk Z1 kolay koşu'},
      {baslik:'Sürekli Tempo Değişimi',detay:bolum+(adet?' ('+adet+' bölüm)':'')+' · Durma yok · '+(sure_dk-15)+' dk'},
      {baslik:'Soğuma',detay:'5 dk Z1'},
    ]};
  }

  // On-Off
  if(tur==='on_off'){
    const sevM=yapiNotu.match(/·\s*(S\d+)/);const sev=sevM?sevM[1]:'';
    const yapiM=yapiNotu.match(/—\s*(.+)/);const yapi=yapiM?yapiM[1].trim():'6 set: 30sn/45sn × 2 tur';
    const z5=zoneInfo(zones,4)||'Z5a';const z2=zoneInfo(zones,1)||'Z2';
    return{tip:'on_off',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1 kolay koşu'},
      {baslik:'On Bloku (Z5a)',detay:yapi+' · ON: '+z5+' maksimal · OFF: '+z2+' hafif koşu'},
      {baslik:'Soğuma',detay:'10 dk Z1'},
    ]};
  }

  // Kısa Yokuş
  if(tur==='yokus_kisa'){
    const sevM=yapiNotu.match(/·\s*(S\d+)/);const sev=sevM?sevM[1]:'';
    const yapiM=yapiNotu.match(/—\s*(.+?)(?:\s*\/|$)/);const yapi=yapiM?yapiM[1].trim():'6×30sn';
    const dinM=yapiNotu.match(/\/\s*(.+)/);const din=dinM?dinM[1].trim():'2dk yürüyüş';
    // _rows: sprint zone Z5b ataması — adimToRowsFallback'in Z1'e düşmesini (RPE-pace uyumsuzluğu) önler
    const ps=parseSetsStr(yapi);
    const yapisRows=ps?[{label:'Yokuş Sprint',sure_sn:ps.sure_sn,zIdx:5,tekrar:ps.tekrar,din_sn:parseDinStr(din),isSprint:true}]:[];
    return{tip:'yokus_kisa',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1 + dinamik ısınma',_rows:_R.isinma(15)},
      {baslik:'Maks. Yokuş Çıkışları',detay:yapi+' — maksimal efor · '+din+' · %6-10 eğim',_rows:yapisRows},
      {baslik:'Soğuma',detay:'10 dk Z1',_rows:_R.soguma(10)},
    ]};
  }

  // Uzun Yokuş
  if(tur==='yokus_uzun'){
    const sevM=yapiNotu.match(/·\s*(S\d+)/);const sev=sevM?sevM[1]:'';
    const yapiM=yapiNotu.match(/—\s*(.+?)(?:\s*\/|$)/);const yapi=yapiM?yapiM[1].trim():'3×3 dk';
    const dinM=yapiNotu.match(/\/\s*(.+)/);const din=dinM?dinM[1].trim():'yürüyüş inişi';
    const z4=zoneInfo(zones,3)||'Z4 eşik';
    // _rows: Z4 (zIdx=3) zone — uzun yokuş çıkışları eşik zonunda
    const yusRows=parseSetsStr(yapi)?[{label:'Z4 Yokuş Çıkışı',sure_sn:parseSetsStr(yapi).sure_sn,zIdx:3,tekrar:parseSetsStr(yapi).tekrar,din_sn:parseDinStr(din)}]:[];
    return{tip:'yokus_uzun',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1',_rows:_R.isinma(15)},
      {baslik:'Z4 Yokuş Çıkışları',detay:yapi+' — '+z4+' · '+din,_rows:yusRows},
      {baslik:'Soğuma',detay:'10 dk Z1',_rows:_R.soguma(10)},
    ]};
  }

  // Hill Sprint
  if(tur==='hill_sprint'){
    const sevM=yapiNotu.match(/·\s*(S\d+)/);const sev=sevM?sevM[1]:'';
    const yapiM=yapiNotu.match(/—\s*(.+?)(?:\s*\/|$)/);const yapi=yapiM?yapiM[1].trim():'5×8sn';
    const dinM=yapiNotu.match(/\/\s*(.+)/);const din=dinM?dinM[1].trim():'2dk yürüyüş';
    // _rows: Z5b sprint zone — "Sprintleri" kelimesi adimToRowsFallback'de isSprintType'ı tetikler ama zone Z5b'yi garantilemek için açık atama
    const hsSets=parseSetsStr(yapi);
    const hsRows=hsSets?[{label:'Hill Sprint',sure_sn:hsSets.sure_sn,zIdx:5,tekrar:hsSets.tekrar,din_sn:parseDinStr(din),isSprint:true}]:[];
    return{tip:'hill_sprint',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1 + strides',_rows:_R.isinma(15)},
      {baslik:'Maks. Yokuş Sprintleri',detay:yapi+' — patlayıcı maksimal efor · '+din,_rows:hsRows},
      {baslik:'Soğuma',detay:'10 dk Z1',_rows:_R.soguma(10)},
    ]};
  }

  // Strides
  if(tur==='strides'){
    const yapiM=yapiNotu.match(/·\s*(.+?)(?:\s*\(|$)/);const yapi=yapiM?yapiM[1].trim():'4×100m';
    const fazM=yapiNotu.match(/\((.+)\)/);const faz=fazM?fazM[1]:'';
    // Mesafe veya süre parse: "4×100m" → metre→sn; "4×25sn"
    const strParse=(s)=>{
      let m=s.match(/(\d+)\s*[×x]\s*(\d+)\s*m\b/i);if(m){const pSec=getPaceFromZone(4,zones);return{n:+m[1],sn:Math.round(+m[2]/1000*pSec),unit:'m'};}
      m=s.match(/(\d+)\s*[×x]\s*(\d+)\s*sn/i);if(m)return{n:+m[1],sn:+m[2],unit:'sn'};
      return null;
    };
    const sp=strParse(yapi);
    const strRows=sp?_R.strides('Strides',sp.n,sp.sn):[];
    return{tip:'strides',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1',_rows:_R.isinma(15)},
      {baslik:'Strides',detay:yapi+' — kontrollü hızlanma, son 20m rahat · 45-60sn yürüyüş arası',_rows:strRows},
      {baslik:'Soğuma',detay:'10 dk Z1',_rows:_R.soguma(10)},
    ]};
  }

  // Açıcı
  if(tur==='acici'){
    const yapiM=yapiNotu.match(/·\s*(.+?)(?:\s*\(|$)/);const yapi=yapiM?yapiM[1].trim():'4×100m';
    // _rows: Z5b sprint zone (aktivasyon hızlanmaları = sub-max sprint)
    const acParse=(s)=>{
      let m=s.match(/(\d+)\s*[×x]\s*(\d+)\s*m\b/i);if(m){const pSec=getPaceFromZone(5,zones);return{n:+m[1],sn:Math.round(+m[2]/1000*pSec)};}
      m=s.match(/(\d+)\s*[×x]\s*(\d+)\s*sn/i);if(m)return{n:+m[1],sn:+m[2]};
      return null;
    };
    const ap=acParse(yapi);
    const acRows=ap?[{label:'Açıcı Sprint',sure_sn:ap.sn,zIdx:5,tekrar:ap.n,din_sn:60,isSprint:true}]:[];
    return{tip:'acici',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'15 dk Z1',_rows:_R.isinma(15)},
      {baslik:'Yarış Hızlanmaları',detay:yapi+' — yarış temposu · 60sn tam dinlenme arası',_rows:acRows},
      {baslik:'Soğuma',detay:'10 dk Z1',_rows:_R.soguma(5)},
    ]};
  }

  // Teknik
  if(tur==='teknik'){
    const yapiM=yapiNotu.match(/·\s*(.+)/);const yapi=yapiM?yapiM[1].trim():'Patika';
    return{tip:'teknik',sure_dk,yapi_notu:yapiNotu,yapilar:[
      {baslik:'Isınma',detay:'10 dk Z1',_rows:_R.isinma(10)},
      {baslik:'Teknik Çalışma',detay:yapi+' · Form, adım ve yere basış odaklı · '+sure_dk+' dk',_rows:_R.sabit('Teknik Koşu',sure_dk-15,1)},
      {baslik:'Soğuma',detay:'5 dk Z1',_rows:_R.soguma(5)},
    ]};
  }

  return null;
}

function tplUzun(band, ctl, zones, disiplin, dpHedef, recentLongRuns){
  const isUltra=disiplin==='ultra';
  const isPatika=disiplin==='patika'||disiplin==='ultra'||disiplin==='karma';

  // ── Band bazlı maksimum tavan (faz/band sınırı) ──────────────────────────
  const bandMax=isUltra
    ?(band<=1?80:band===2?100:band===3?130:band===4?160:200)
    :(band<=1?60:band===2?75:band===3?90:band===4?110:130);

  // ── Son uzun koşulardan progresyon hesapla ───────────────────────────────
  // recentLongRuns: son 6 haftanın uzun koşuları [{date, sure_dk}], yeniden eskiye
  let dk = bandMax; // veri yoksa band tablosunu kullan
  let progressNote = '';

  if(recentLongRuns && recentLongRuns.length > 0){
    const sonUzun = recentLongRuns[0].sure_dk || 0;

    if(sonUzun > 0){
      // Geri çekme haftası: son 3 ardışık haftada artış varsa
      const son3 = recentLongRuns.slice(0, 3);
      const ardiArdina = son3.length >= 3 &&
        son3[0].sure_dk > son3[1].sure_dk &&
        son3[1].sure_dk > son3[2].sure_dk;

      if(ardiArdina){
        // 3 ardışık artış → geri çekme: son uzunun %72'si
        dk = Math.round(sonUzun * 0.72);
        progressNote = `⬇ Geri çekme haftası (3 ardışık artış sonrası) — ${sonUzun}dk × 0.72`;
      } else {
        // Normal: son uzun + %8-12 artış
        // Faza göre artış oranı: Zirve daha agresif, Taper sıfır
        const artisOran = 0.10; // sabit %10
        const artis = Math.max(10, Math.round(sonUzun * artisOran));
        dk = Math.min(bandMax, sonUzun + artis);
        progressNote = `⬆ Son: ${sonUzun}dk + ${artis}dk artış`;
      }

      // Tavan kontrolü
      if(dk > bandMax){
        dk = bandMax;
        progressNote += ` (tavan: ${bandMax}dk)`;
      }
      // Alt sınır: son uzunun %65'inden düşme
      const minDk = Math.round(sonUzun * 0.65);
      if(dk < minDk){
        dk = minDk;
        progressNote += ` (alt sınır koruması)`;
      }
    }
  }

  const parts=[
    {baslik:'Isınma',detay:`15 dk — ${zoneInfoZ1(zones)||'Z1 kolay'}`,_rows:_R.isinma(15)},
    {baslik:'Z2 Uzun Koşu',detay:`${dk-15} dk — ${zoneInfo(zones,1)||'Z2 aerobik'}${isPatika?' — arazi tercihli':''}${dpHedef>0?' · Hedef D+: ~'+dpHedef+'m':''}${isUltra?' · Dik tırmanışlarda yürüyüş stratejisi uygula':''}${progressNote?' · '+progressNote:''}`.trim(),_rows:_R.sabit('Z2 Uzun Koşu',dk-15,1)},
    {baslik:'Soğuma',detay:`5 dk — ${zoneInfoZ1(zones)||'Z1'}`,_rows:_R.soguma(5)},
  ];
  if(band>=4&&disiplin!=='yol') parts.splice(2,0,{baslik:'Ek Tırmanış',detay:`Son 20 dk içinde ${dpHedef>0?'en az '+Math.round(dpHedef*0.3)+'m tırmanış':'mümkün olduğunca tırmanış'} ekle — nabız ${zoneInfo(zones,2)||'Z3'} bandına çıkabilir`,_rows:_R.sabit('Z3 Tırmanış',20,2)});
  return{tip:'uzun',sure_dk:dk,yapilar:parts,dpHedef};
}

// ── OP-3: Back-to-Back Tur Antrenmanları — Gün 1 ve Gün 2 ayrı şablonlar ──
// Gün 1: Uzun Z2 koşu (ana yük)
function tplBackToBack(band, zones, dpHedef){
  const gun1=band<=2?70:band===3?90:band===4?110:130;
  const dpGun1=dpHedef>0?Math.round(dpHedef*0.6):0;
  return{
    tip:'back_to_back', sure_dk:gun1,
    baslik:'Back-to-Back Gün 1 — Uzun Koşu',
    yapi_notu:'Back-to-Back · Gün 1 — Uzun Z2 arazi koşusu',
    yapilar:[
      {baslik:'Isınma',detay:`10 dk — ${zoneInfoZ1(zones)||'Z1'} kolay koşu`,_rows:_R.isinma(10)},

function calcGAP(dpM, distKm, sure_dk){
  if(!dpM||!distKm||dpM<=0||distKm<=0)return null;
  // Ortalama eğim %
  const grade=Math.min(40,(dpM/(distKm*1000))*100);
  if(grade<2)return null; // %2 altı düzeltme gerekmiyor
  // Minetti simplified: GAP_factor = 1 + 0.033*grade (yokuş yukarı için)
  // Daha doğru versiyon (Strava benzeri):
  // factor = 0.033*g + 0.00055*g^2 (g = grade %)
  const factor=1+(0.033*grade+0.00055*grade*grade)/100*100;
  return{grade:Math.round(grade*10)/10, factor:Math.round(factor*100)/100};
}

// Flat pace (sn/km) → beklenen gerçek tırmanış pace'i (sn/km)
function gapToActualPace(flatPaceSec, gapFactor){
  if(!flatPaceSec||!gapFactor)return null;
  const actualSec=flatPaceSec*gapFactor;
  const m=Math.floor(actualSec/60);
  const s=Math.round(actualSec%60);
  return`${m}:${String(s).padStart(2,'0')}`;
}

// Tırmanış antrenmanı için GAP bilgisi üret
function gapInfo(dpHedef, sure_dk, zones, zone_idx){
  if(!dpHedef||dpHedef<=0)return'';
  const estDistKm=Math.max(2,(sure_dk||60)/9);
  const gap=calcGAP(dpHedef,estDistKm,sure_dk);
  if(!gap)return'';
  const flatPace=zones?.paceZones?.[zone_idx];
  if(flatPace){
    const loSec=paceToSec(flatPace.lo_pace);
    const hiSec=paceToSec(flatPace.hi_pace);
    if(loSec&&hiSec){
      const actLo=gapToActualPace(loSec,gap.factor);
      const actHi=gapToActualPace(hiSec,gap.factor);
      const actAvg=actLo&&actHi?secToPace((paceToSec(actLo)+paceToSec(actHi))/2):null;
      return` · Tırmanışta beklenen pace: ${actLo}–${actHi}${actAvg?` (${actAvg})`:''}/km (ort. %${gap.grade} eğim, GAP ×${gap.factor})`;
    }
  }
  return` · Ort. eğim: ~%${gap.grade} → Flat pace hedefini ×${gap.factor} ile çarp`;
}



function tplTirmanisAcik(band, sure_dk, zones, dpHedef){
  // Gerçekçi D+ cap: antrenman süresinin %55'i tırmanışta geçse ulaşılabilecek max
  const maxDpForSure=Math.round(realisticClimbRate(band)/60*(sure_dk*0.55));
  if(dpHedef>0) dpHedef=Math.min(dpHedef,maxDpForSure);

  // ── Gerçekçi süre hesabı ──────────────────────────────────────────────────
  let adjustedSure=sure_dk;
  let durationNote='';
  if(dpHedef>0){
    const climbRatePerMin=realisticClimbRate(band)/60;
    const minDkForDp=Math.ceil(dpHedef/climbRatePerMin);
    const minTotal=Math.ceil(minDkForDp/0.70);
    if(minTotal>sure_dk){
      adjustedSure=minTotal;
      durationNote=` (D+ hedefi için süre ${sure_dk}dk'dan ${minTotal}dk'ya ayarlandı — Band ${band} için tırmanış hızı ~${realisticClimbRate(band)}m/sa)`;
    }
  }

  // Nabız hedefi — Z2–Z3
  const hrZ2=zones?.hrZones?.[1];
  const hrZ3=zones?.hrZones?.[2];
  const hrStr=hrZ2?.lo_bpm&&hrZ3?.hi_bpm?`${hrZ2.lo_bpm}–${hrZ3.hi_bpm} bpm (Z2–Z3)`:'Z2–Z3 nabız';

  // Pace hedefi (GAP ile)
  const flatPaceStr=pz(zones,2)||pz(zones,1)||'Z2–Z3 pace';
  const gap=dpHedef>0?calcGAP(dpHedef,Math.max(2,(adjustedSure||60)/9),adjustedSure):null;
  let paceDetay;
  if(gap&&zones?.paceZones){
    const z2lo=paceToSec(zones.paceZones[1]?.lo_pace);
    const z3hi=paceToSec(zones.paceZones[2]?.hi_pace);
    const actLo=z2lo?gapToActualPace(z2lo,gap.factor):null;
    const actHi=z3hi?gapToActualPace(z3hi,gap.factor):null;
    const actAvg=actLo&&actHi?secToPace((paceToSec(actLo)+paceToSec(actHi))/2):null;
    const actAvgSec=actLo&&actHi?Math.round((paceToSec(actLo)+paceToSec(actHi))/2):null;
    paceDetay=actLo&&actHi
      ?`Flat eşdeğer: ${flatPaceStr} — Tırmanışta beklenen pace: ${actLo}–${actHi}${actAvg?` (${actAvg})`:''}/km (ort. %${gap.grade} eğim)`
      :`${flatPaceStr} efor hissiyle · %${gap.grade} ort. eğimde pace daha yavaş olacak`;
  } else if(dpHedef>0){
    paceDetay=`${flatPaceStr} efor hissiyle — yokuşta gerçek pace daha yavaş olacak`;
  } else {
    paceDetay=`${flatPaceStr} efor hissiyle`;
  }

  // Ortalama tırmanış pace saniyesi — tablo için
  const tirAvgPaceSec=(()=>{
    if(gap&&zones?.paceZones){
      const z2lo=paceToSec(zones.paceZones[1]?.lo_pace);
      const z3hi=paceToSec(zones.paceZones[2]?.hi_pace);
      const actLo2=z2lo?gapToActualPace(z2lo,gap.factor):null;
      const actHi2=z3hi?gapToActualPace(z3hi,gap.factor):null;
      if(actLo2&&actHi2) return Math.round((paceToSec(actLo2)+paceToSec(actHi2))/2);
    }
    return null;
  })();

  return{
    tip:'tirmanis', sure_dk:adjustedSure,
    yapilar:[
      {baslik:'Isınma',detay:`10 dk — ${zoneInfoZ1(zones)||'Z1 kolay'} düz`,_rows:_R.isinma(10)},
      {baslik:'Z2–Z3 Tırmanış Koşusu',detay:`${adjustedSure-10} dk — Nabız: ${hrStr} · ${paceDetay} · Hedef D+: ${dpHedef>0?'~'+dpHedef+'m':'maksimum'} · Tırmanışta güç adımı, inişte kontrollü teknik${durationNote}`,_tirmanisAna:true,_tirAvgPaceSec:tirAvgPaceSec,_rows:_R.sabit('Z2-Z3 Tırmanış',adjustedSure-10,2)},
      {baslik:'Soğuma',detay:`5 dk — ${zoneInfoZ1(zones)||'Z1'}`,_rows:_R.soguma(5)},
      {baslik:'💡 Isınma/Soğuma Notu',detay:'Isınma ve soğuma düzde koşulmuyorsa (patika/yokuş) nabız hedeflerine dikkat edin — Z1 bandında kalmak zor olabilir, tempo yerine nabzı baz alın'},
    ],
    dpHedef, gap
  };
}

// ── Piramit İnterval ──────────────────────────────────────────────────────────
// Klasik piramit: yükselen + alçalan süreler. Motor: aerobik kapasite + mental direnç.

// ── Cruise Intervals ─────────────────────────────────────────────────────────
// Eşik hızında kısa aralarla tekrarlanan bloklar. Laktat toleransı + tempo dayanıklılığı.

// ── Progressive Run ──────────────────────────────────────────────────────────
// Her segmentte tempo artar. Aerobik verimlilik + pace farkındalığı.

// ── On-Off (Fartlek) ─────────────────────────────────────────────────────────
// 30sn hızlı – 30sn yavaş ritmi. Nöromüsküler aktivasyon + VO2max geliştirme.

// ── Tempo Intervals ──────────────────────────────────────────────────────────
// Tempo'dan daha uzun bloklar, aralarında kısa dinlenme. Yarış spesifik dayanıklılık.

// ── Yarış Temposu (Race Pace) ─────────────────────────────────────────────────
// Hedef yarış temposunda spesifik çalışma. Metabolik ve nöromüsküler adaptasyon.

// ── Hill Sprints ─────────────────────────────────────────────────────────────
// 8–10sn maksimal yokuş koşusu. Nöromüsküler güç + ekonomi. Az yorgunluk, büyük etki.

// ── Strides (Açıcılar + Nöromüsküler) ────────────────────────────────────────
// Kolay koşuya eklenebilen 20–30sn hızlanmalar. Form + verimlilik geliştirme.

// ── Grade Adjusted Pace (GAP) ─────────────────────────────────────────────────

function calcWeeklyTargets(athlete, races, workouts, optimizeMode=false, history=[]){
  if(!athlete)return[];
  const {primary}=selectRaces(athlete,races);
  if(!primary||!primary.prep_weeks)return[];

  // ── Optimize mod: tüm yarışları entegre et ─────────────────────────────
  const orijinalPlan=calcWeeklyTargetsCore(athlete,races,workouts,primary,history);

  if(!optimizeMode)return orijinalPlan;

  const today=new Date();
  const athIds=(athlete.yarıslar||[]).map(x=>typeof x==='string'?x:x.id);
  const digerYarislar=(races||[]).filter(r=>
    athIds.includes(r.id)&&
    r.id!==primary.id&&
    new Date(r.tarih+'T12:00:00')>today&&
    r.prep_weeks
  ).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));

  if(!digerYarislar.length)return orijinalPlan;

  const digerPlanlar=digerYarislar.map(r=>({
    race:r,
    plan:calcWeeklyTargetsCore(athlete,races.map(x=>({...x,__force:x.id===r.id})),workouts,r,history)
  }));

  // Orijinal planın her haftasını diğer yarışlarla entegre et
  return orijinalPlan.map(wk=>{
    // YARIŞ HAFTASI: Optimizasyonu atla. Yarışın kesin koşulacağı varsayılır,
    // dolayısıyla yarış mesafesi + açıcı hacim bir TABAN olmalıdır, diğer
    // yarışların ağırlıklı ortalamasıyla sulandırılmamalıdır.
    if(wk.isRaceWeek){
      return {...wk, _optimize:false, _origKm:wk.targetKm, _origDp:wk.targetDp};
    }
    // Diğer yarışların bu haftaya ağırlıklı katkısı
    // Ağırlık = yarışa kalan süreye ters orantılı (yakın yarış daha ağır)
    let kmSum=wk.targetKm, dpSum=wk.targetDp, weightSum=1;
    const daysToMain=Math.ceil((new Date(primary.tarih+'T12:00:00')-wk.weekStart)/864e5);

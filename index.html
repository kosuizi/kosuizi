      else if(tur==='tempo_interval')tpl=tplTempoInterval(band,dk,zones,phase);
      else if(tur==='yaris_tempo')tpl=tplYarisTempo(band,dk,zones,phase);
      else if(tur==='hill_sprint')tpl=tplHillSprint(band,zones,phase);
      else if(tur==='strides')tpl=tplStrides(band,dk,zones,phase);
      else if(tur==='teknik')tpl=tplTeknikInis(band,dk,zones);
      setPreview(tpl);
      setYapiNotu(tpl&&tpl.yapi_notu?tpl.yapi_notu:'');
    }catch(e){setPreview(null);}
  },[tur,phase,band]);
  var gunLabel=new Date(date+'T12:00:00').toLocaleDateString('tr-TR',{weekday:'long',day:'2-digit',month:'long'});
  var handleAta=function(){
    if(!preview)return;
    var final=yapiNotu&&yapiNotlari.length>0?Object.assign({},preview,{yapi_notu:yapiNotu}):preview;
    onSave(date,final);
  };
  var e=React.createElement;
  var bodyEl=e('div',{style:{background:'var(--bg-primary)',borderRadius:'var(--radius-lg)',border:'1px solid var(--border)',padding:20,width:'100%',maxWidth:500,margin:'auto',maxHeight:'90vh',overflowY:'auto'}},
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
      e('div',null,
        e('div',{style:{fontWeight:700,fontSize:15}},'Antrenman Ata'),
        e('div',{style:{fontSize:12,color:'var(--text-secondary)',marginTop:2}},gunLabel)
      ),
      e('button',{className:'btn btn-sm',onClick:onClose},'X')
    ),
    e('div',{className:'form-grid',style:{marginBottom:12}},
      e('div',{className:'form-group'},
        e('label',null,'TГјr'),
        e('select',{value:tur,onChange:function(ev){setTur(ev.target.value);setYapiNotu('');}},
          turler.map(function(t){return e('option',{key:t.v,value:t.v},t.l);})
        )
      ),
      e('div',{className:'form-group'},
        e('label',null,'Faz'),
        e('select',{value:phase,onChange:function(ev){setPhase(ev.target.value);}},
          FAZLAR.map(function(f){return e('option',{key:f,value:f},f);})
        )
      ),
      yapiNotlari.length>0&&e('div',{className:'form-group'},
        e('label',null,'Seviye'),
        e('select',{value:yapiNotu,onChange:function(ev){setYapiNotu(ev.target.value);}},
          yapiNotlari.map(function(n,i){return e('option',{key:i,value:n},n);})
        )
      )
    ),
    preview&&e('div',{style:{background:'var(--bg-secondary)',borderRadius:'var(--radius)',padding:'10px 12px',marginBottom:12,fontSize:12}},
      e('div',{style:{fontWeight:700,fontSize:13,marginBottom:6,color:'var(--info)'}},preview.baslik||tur),
      e('div',{style:{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}},
        e('span',{className:'badge badge-info'},preview.sure_dk+' dk'),
        e('span',{className:'badge badge-gray'},'Band '+band),
        preview.yapi_notu&&e('span',{className:'badge badge-good'},preview.yapi_notu.split(' - ')[0])
      ),
      e('div',{style:{display:'flex',flexDirection:'column',gap:3}},
        (preview.yapilar||[]).filter(function(y){return !y._caprazNot;}).map(function(y,i){
          return e('div',{key:i,style:{display:'flex',gap:6,padding:'3px 6px',background:'var(--bg-primary)',borderRadius:4}},
            e('span',{style:{color:'var(--info)',fontWeight:700,fontSize:10,marginTop:2}},i+1+'.'),
            e('div',null,
              e('div',{style:{fontWeight:600,fontSize:11}},y.baslik),
              y.detay&&e('div',{style:{fontSize:10,color:'var(--text-secondary)'}},y.detay)
            )
          );
        })
      )
    ),
    e('div',{className:'flex-gap'},
      e('button',{className:'btn btn-primary',onClick:handleAta,disabled:!preview},'Bu Antrenman Atasin'),
      e('button',{className:'btn',onClick:onClose},'Iptal')
    )
  );
  return e('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}},
    bodyEl
  );
}


function HaftalikPlanTab({athlete,history,races,workouts,planMode,setPlanMode,testPlanlar,planSnapInit,onPlanSnapChange,onSaveWorkout}){
  const [showLoading,setShowLoading]=useState(false);
  const [selectedPrimary,setSelectedPrimary]=useState(null);
  const [expandDay,setExpandDay]=useState(null);
  const [hizliEkleGun,setHizliEkleGun]=useState(null);
  const [manuelAtaGun,setManuelAtaGun]=useState(null);
  const [showNextWeek,setShowNextWeek]=useState(false);
  const [planSaving,setPlanSaving]=useState(false);
  const [planSaved,setPlanSaved]=useState(false);

  // в”Җв”Җ Plan Snapshot в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const [planSnap,setPlanSnapLocal]=useState(planSnapInit||null);
  const planSnapRef=useRef(planSnapInit||null);
  const setPlanSnap=(snap)=>{setPlanSnapLocal(snap);planSnapRef.current=snap;if(onPlanSnapChange)onPlanSnapChange(snap);};
  const [snapReady,setSnapReady]=useState(!!planSnapInit);
  const [reviewMsg,setReviewMsg]=useState(null);
  const weekKey=getWeekKey(0);


  // 1. Snapshot yГјkle вҖ” sporcu deДҹiЕҹince Г¶nce sДұfДұrla
  useEffect(()=>{
    if(!athlete){setSnapReady(true);return;}
    setPlanSnap(null);
    setSnapReady(false);
    fbGet(`plan_snapshots/${athlete.id}/${weekKey}`).then(stored=>{
      const snap=stored&&stored.weekKey===weekKey?stored:null;
      if(snap?.lastSavedAt){
        // KullanДұcДұ tarafДұndan kaydedilmiЕҹ snap var
        setPlanSnap(snap);
        if(snap?.selectedPrimary!==undefined)setSelectedPrimary(snap.selectedPrimary||null);
      } else if(snap){
        // Sistem tarafДұndan ГјretilmiЕҹ snap вҖ” overrideMap korunur ama
        setPlanSnap(snap);
        if(snap?.selectedPrimary!==undefined)setSelectedPrimary(snap.selectedPrimary||null);
      } else {
        setPlanSnap(null);
      }
      setSnapReady(true);
    });
  },[athlete?.id,weekKey]);

  useEffect(()=>{
    if(!snapReady||!athlete||!history.length)return;
    const now=new Date();
    const t22=turkey22Today();
    (async()=>{
      const snap=planSnapRef.current;
      if(!snap){
        // HiГ§ snap yok вҖ” ilk kez Гјret
        const newSnap=generatePlanSnapshot(athlete,history,races,workouts||[],testPlanlar||[]);
        newSnap.athleteProfile={kosu_gunleri:athlete.kosu_gunleri,capraz_gunleri:athlete.capraz_gunleri,disiplin:athlete.disiplin,uzun_gun:athlete.uzun_gun};
        setPlanSnap(newSnap);
        await fbSet(`plan_snapshots/${athlete.id}/${weekKey}`,newSnap);
        return;
      }
      // KullanДұcДұ tarafДұndan kaydedilmiЕҹse (lastSavedAt var) вҖ” profil kontrolГј atla
      // Sadece athleteProfile kaydedilmiЕҹse ve gerГ§ekten deДҹiЕҹtiyse tetikle
      const savedProfile=snap.athleteProfile;
      const profileChanged = savedProfile && (
        JSON.stringify(athlete.kosu_gunleri||[])!==JSON.stringify(savedProfile.kosu_gunleri||[])||
        JSON.stringify(athlete.capraz_gunleri||[])!==JSON.stringify(savedProfile.capraz_gunleri||[])||
        (athlete.disiplin||'')!==(savedProfile.disiplin||'')||
        JSON.stringify((Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean)).sort())!==JSON.stringify((Array.isArray(savedProfile.uzun_gun)?savedProfile.uzun_gun:[savedProfile.uzun_gun].filter(Boolean)).sort())
      );
      if(profileChanged){
        // GerГ§ek profil deДҹiЕҹikliДҹi вҖ” kullanДұcДұ deДҹiЕҹikliklerini koru, sadece yeni gГјnleri ekle
        const freshSnap=generatePlanSnapshot(athlete,history,races,workouts||[],testPlanlar||[]);
        freshSnap.athleteProfile={kosu_gunleri:athlete.kosu_gunleri,capraz_gunleri:athlete.capraz_gunleri,disiplin:athlete.disiplin,uzun_gun:athlete.uzun_gun};
        // KullanДұcДұnДұn dokunduДҹu gГјnleri koru вҖ” snap.overrideMap Г¶ncelikli
        const mergedOverride={...freshSnap.overrideMap,...(snap.overrideMap||{})};
        const newSnap={
          ...freshSnap,
          overrideMap:mergedOverride,
          cancelledDays:snap.cancelledDays||{},
          selectedPrimary:snap.selectedPrimary||null,
          lastSavedAt:snap.lastSavedAt||null,
          reviewLog:[...(snap.reviewLog||[]),{at:now.toISOString(),reason:'Profil deДҹiЕҹti вҖ” plan gГјncellendi'}].slice(-10)
        };
        setPlanSnap(newSnap);
        await fbSet(`plan_snapshots/${athlete.id}/${weekKey}`,newSnap);
        return;
      }
      // athleteProfile yoksa snap'e ekle (eski snap'ler iГ§in geriye dГ¶nГјk fix)
      if(!snap.athleteProfile){
        const withProfile={...snap,athleteProfile:{kosu_gunleri:athlete.kosu_gunleri,capraz_gunleri:athlete.capraz_gunleri,disiplin:athlete.disiplin,uzun_gun:athlete.uzun_gun}};
        setPlanSnap(withProfile);
        await fbSet(`plan_snapshots/${athlete.id}/${weekKey}`,withProfile);
        // return etme вҖ” 22:00 kontrolГј devam etsin
      }
      // GГјnde 1 kez: saat 22:00 sonrasДұ review вҖ” yine de overrideMap koru
      const lastRev=snap.lastReviewAt?new Date(snap.lastReviewAt):new Date(0);
      if(now>=t22&&lastRev<t22){
        const currentSnap=planSnapRef.current||snap;
        const{updated,reason,snap:reviewedSnap}=reviewPlanSnapshot(currentSnap,athlete,history,races,workouts||[],testPlanlar||[]);
        const safeSnap={
          ...reviewedSnap,
          overrideMap:{...(reviewedSnap.overrideMap||{}),...(currentSnap.overrideMap||{})},
          cancelledDays:currentSnap.cancelledDays||{},
          selectedPrimary:currentSnap.selectedPrimary||null,
          lastSavedAt:currentSnap.lastSavedAt||null,
        };
        setPlanSnap(safeSnap);
        if(updated)setReviewMsg(reason);
        await fbSet(`plan_snapshots/${athlete.id}/${weekKey}`,safeSnap);
      }
    })();
  },[snapReady,athlete?.id,athlete?.kosu_gunleri,athlete?.capraz_gunleri,athlete?.disiplin,athlete?.uzun_gun]);

  // YarДұЕҹ seГ§ici iГ§in mevcut upcoming yarДұЕҹlar
  const athRaceIds=(athlete?.yarДұslar||[]).map(x=>typeof x==='string'?x:x.id);
  const today=new Date();
  const upcomingRaces=(races||[]).filter(r=>athRaceIds.includes(r.id)&&new Date(r.tarih+'T12:00:00')>today).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));

  const racesForPlan=React.useMemo(()=>{
    if(!selectedPrimary)return races;
    return races;
  },[races,selectedPrimary]);

  const plan=React.useMemo(()=>{
    if(!athlete)return null;
    try{
    const racesOverride=selectedPrimary
      ?races.map(r=>({...r,__force:r.id===selectedPrimary}))
      :races;
    const generated=generateTwoWeekPlan(athlete,history,racesOverride,workouts,testPlanlar||[]);
    // Snapshot override: geГ§miЕҹ gГјnler gerГ§ek veriyi korur, gelecek gГјnler snapshot'tan gelir
    if(planSnap?.overrideMap){
      const todayStr=localDateStr(new Date());
      generated.weeks.forEach(wk=>{
        wk.days=wk.days.map(day=>{
          const ov=planSnap.overrideMap[day.date];
          if(!ov) return day;
          // GeГ§miЕҹ gГјnlerde sadece yukHedef ve yapilar al вҖ” tip/baslik/sure_dk gerГ§ek antrenmanДұ bozmasДұn
          if(day.isPast||day.date===todayStr)
            return{...day, yukHedef:ov.yukHedef||day.yukHedef};
          return{...day,tip:ov.tip,baslik:ov.baslik,sure_dk:ov.sure_dk,yukHedef:ov.yukHedef,yapilar:ov.yapilar};
        });
      });
    }
    return generated;
    }catch(e){console.error('plan useMemo error:',e);return{_error:e.message};}
  },[athlete,history,races,workouts,selectedPrimary,planSnap]);

  const weekTargets=React.useMemo(()=>{
    if(!athlete)return[];
    const racesOverride=selectedPrimary
      ?races.map(r=>({...r,__force:r.id===selectedPrimary}))
      :races;
    return calcWeeklyTargets(athlete,racesOverride,workouts||[],planMode==='optimize');
  },[athlete,races,selectedPrimary,workouts,planMode]);

  // GerГ§ekleЕҹen haftalДұk km+D+ hesapla
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete?.id);
  const weekActuals=React.useMemo(()=>{
    return weekTargets.map(wt=>{
      const ws=wt.weekStart;const we=wt.weekEnd;
      const wWks=athWks.filter(w=>{
        const d=new Date(w.date+'T12:00:00');return d>=ws&&d<=we;
      });
      return{
        km:round1(wWks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0)),
        dp:Math.round(wWks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0)),
      };
    });
  },[weekTargets,athWks]);

  // в”Җв”Җ Д°ptal edilen gГјnler в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // cancelledDays: planSnap'ten tГјretilir вҖ” ayrДұ state yok, sporcu deДҹiЕҹince otomatik temizlenir
  const cancelledDays = React.useMemo(()=>planSnap?.cancelledDays||{},[planSnap]);


  const savePlan=async()=>{
    const snap=planSnapRef.current;
    if(!snap||!athlete){alert('Snap veya sporcu yok!');return;}
    setPlanSaving(true);
    try{
      const toSave={...snap,weekKey,athId:athlete.id,selectedPrimary:selectedPrimary||null,lastSavedAt:new Date().toISOString()};
      const fbKey=`plan_snapshots/${athlete.id}/${weekKey}`;
      // Г–nce Firebase'e direkt yaz
      let fbSuccess=false;
      if(db||initFirebase()){
        try{
          await db.ref(fbKey).set(stripUndefined(toSave));
          fbSuccess=true;
        }catch(e){
          alert('Firebase yazma hatasДұ: '+e.message+'\n\nKod: '+(e.code||'?')+'\nBu hata genellikle Firebase gГјvenlik kurallarДұndan kaynaklanДұr.');
          setPlanSaving(false);
          return;
        }
      }
      if(!fbSuccess){
        alert('Firebase baДҹlantДұsДұ yok вҖ” plan kaydedilemedi.');
        setPlanSaving(false);
        return;
      }
      lsSet(fbKey,toSave);
      planSnapRef.current=toSave;
      setPlanSnapLocal(toSave);
      setPlanSaved(true);
      setTimeout(()=>setPlanSaved(false),2500);
    }catch(e){alert('KayДұt hatasДұ: '+e.message);}
    finally{setPlanSaving(false);}
  };

  const handleManuelAta=(dateStr,tpl)=>{
    const now=new Date();
    const curSnap=planSnapRef.current;
    const baslik=tpl.baslik||(tpl.yapi_notu?tpl.yapi_notu.split(' вҖ” ')[0]:'')||(TIP_NAMES[tpl.tip]||tpl.tip||'');
    const newMap={...(curSnap?.overrideMap||{}),[dateStr]:{
      tip:tpl.tip,baslik,sure_dk:tpl.sure_dk||50,
      yukHedef:Math.round((tpl.sure_dk||50)*1.2),
      yapi_notu:tpl.yapi_notu||'',
      yapilar:(tpl.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||'',_caprazNot:y._caprazNot}))
    }};
    const newSnap={...(curSnap||{}),weekKey,athId:athlete.id,lastReviewAt:now.toISOString(),
      cancelledDays:{...(curSnap?.cancelledDays||{})},
      selectedPrimary:selectedPrimary||null,
      overrideMap:newMap,
      reviewLog:[...(curSnap?.reviewLog||[]),{at:now.toISOString(),reason:`${dateStr} manuel: ${baslik}`}].slice(-10)
    };
    setPlanSnap(newSnap);
    setManuelAtaGun(null);
    setReviewMsg(`${dateStr} вҖ” ${baslik} atandДұ`);
  };

    const handleCancelDay=async(dateStr)=>{
    const newCancelled={...cancelledDays,[dateStr]:true};
    const todayStr=localDateStr(new Date());
    const now=new Date();
    const racesOv=selectedPrimary?races.map(r=>({...r,__force:r.id===selectedPrimary})):races;
    const newPlan=generateTwoWeekPlan(athlete,history,racesOv,workouts,testPlanlar||[]);
    const newMap={...(planSnap?.overrideMap||{}),[dateStr]:{tip:'dinlenme',baslik:'Д°ptal Edildi',sure_dk:0,yukHedef:0,yapilar:[{baslik:'Д°ptal',detay:'Antrenman iptal edildi'}]}};
    newPlan.weeks.forEach(wk=>wk.days.forEach(day=>{
      if(day.date>dateStr&&day.date>=todayStr&&!newCancelled[day.date])
        newMap[day.date]={tip:day.tip,baslik:day.baslik,sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))};
    }));
    const newSnap={...(planSnapRef.current||{}),weekKey,athId:athlete.id,lastReviewAt:now.toISOString(),cancelledDays:newCancelled,selectedPrimary:selectedPrimary||null,overrideMap:newMap,reviewLog:[...(planSnapRef.current?.reviewLog||[]),{at:now.toISOString(),reason:`${dateStr} iptal`}].slice(-10)};
    setPlanSnap(newSnap);setReviewMsg(`${dateStr} antrenmanДұ iptal edildi вҖ” Kaydetmek iГ§in рҹ’ҫ PlanДұ Kaydet butonuna bas`);
  };

  const handleUncancelDay=async(dateStr)=>{
    const newCancelled={...cancelledDays};delete newCancelled[dateStr];
    const todayStr=localDateStr(new Date());
    const now=new Date();
    const racesOv=selectedPrimary?races.map(r=>({...r,__force:r.id===selectedPrimary})):races;
    const newPlan=generateTwoWeekPlan(athlete,history,racesOv,workouts,testPlanlar||[]);
    const newMap={...(planSnap?.overrideMap||{})};
    newPlan.weeks.forEach(wk=>wk.days.forEach(day=>{
      if(day.date>=dateStr&&day.date>=todayStr&&!newCancelled[day.date])
        newMap[day.date]={tip:day.tip,baslik:day.baslik,sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))};
    }));
    const newSnap={...(planSnapRef.current||{}),weekKey,athId:athlete.id,lastReviewAt:now.toISOString(),cancelledDays:newCancelled,selectedPrimary:selectedPrimary||null,overrideMap:newMap,reviewLog:[...(planSnapRef.current?.reviewLog||[]),{at:now.toISOString(),reason:`${dateStr} iptali geri alДұndДұ`}].slice(-10)};
    setPlanSnap(newSnap);setReviewMsg(`${dateStr} iptali geri alДұndДұ вҖ” Kaydetmek iГ§in рҹ’ҫ PlanДұ Kaydet butonuna bas`);
  };

  if(!athlete)return React.createElement('div',{className:'empty'},'Sporcu seГ§ilmedi.');
  if(!plan||plan._error)return React.createElement('div',{className:'empty'},'Plan hatasДұ: '+(plan?._error||'bilinmiyor'));

  // Snapshot bilgi bandДұ
  const snapBanner=reviewMsg&&React.createElement('div',{
    style:{marginBottom:10,padding:'10px 14px',borderRadius:'var(--radius)',
      background:'var(--warn-bg)',border:'1px solid var(--warn)',
      display:'flex',alignItems:'center',gap:10,fontSize:12}},
    React.createElement('span',null,'рҹ”„'),
    React.createElement('span',null,reviewMsg),
    React.createElement('button',{className:'btn btn-sm',style:{marginLeft:'auto'},
      onClick:()=>setReviewMsg(null)},'вң•')
  );
  const snapInfo=planSnap?.lastReviewAt&&React.createElement('div',{
    style:{fontSize:10,color:'var(--text-tertiary)',marginTop:4}},
    'рҹ“Ң Plan sabitlendi В· Son inceleme: '+new Date(planSnap.lastReviewAt).toLocaleString('tr-TR')
  );

  const tipColor=(tip)=>({
    dinlenme:'var(--border)',kolay:'var(--success)',aerobik:'var(--success)',
    uzun:'var(--info)',tempo:'var(--warn)',esik:'var(--warn)',interval:'var(--danger)',
    acici:'var(--warn)',capraz:'#38bdf8',yokus_kisa:'var(--warn)',yokus_uzun:'var(--warn)',
    tirmanis:'var(--info)',teknik:'var(--info)',
    yoga:'#db2777',pilates:'#ec4899',kuvvet:'#7c3aed',bisiklet:'#0284c7',
    yuzme:'#0891b2',kuerek:'#0369a1',futbol:'#15803d',basketbol:'#ea580c',
    progressive:'var(--warn)',tempo_interval:'var(--warn)',cruise:'var(--warn)',
    piramit:'var(--danger)',on_off:'var(--danger)',yaris_tempo:'var(--danger)',
    hill_sprint:'var(--warn)',yokus:'var(--warn)',strides:'var(--success)',
  }[tip]||'var(--text-tertiary)');
  const tipEmoji=(tip)=>({
    kolay:'рҹҡ¶',aerobik:'рҹҸғ',uzun:'рҹӣӨ',tempo:'рҹ’Ё',esik:'рҹ”Ҙ',interval:'вҡЎ',
    acici:'рҹҺҜ',capraz:'вһ•',dinlenme:'вңЁ',yokus_kisa:'вӣ°',yokus_uzun:'рҹҸ”',
    tirmanis:'рҹ“Ҳ',teknik:'рҹҺҜ',

function ChartATLCTL({history}){
  const ref=useRef();const inst=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    const data=history.slice(-90);
    const labels=data.map(d=>fmtShort(d.date));
    const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    const gridColor=isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)';
    const tickColor=isDark?'#777':'#888';
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{
      type:'bar',
      data:{
        labels,
        datasets:[
          {type:'bar',label:'GГјnlГјk yГјk',data:data.map(d=>d.load),backgroundColor:'rgba(37,99,235,.18)',borderRadius:2,order:2},
          {type:'line',label:'CTL',data:data.map(d=>d.ctl),borderColor:'#2563eb',borderWidth:2,pointRadius:0,tension:.3,order:1},
          {type:'line',label:'ATL',data:data.map(d=>d.atl),borderColor:'#d97706',borderWidth:2,pointRadius:0,tension:.3,order:1}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+(ctx.raw!=null?ctx.raw.toFixed(1):'вҖ”')}}},
        scales:{
          x:{ticks:{color:tickColor,font:{size:10},maxTicksLimit:8},grid:{color:gridColor},border:{display:false}},
          y:{ticks:{color:tickColor,font:{size:10}},grid:{color:gridColor},border:{display:false}}
        }
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[history]);
  return React.createElement('div',{style:{position:'relative',height:210}},React.createElement('canvas',{ref}));
}

          ].filter(Boolean).map((item,i)=>React.createElement('div',{key:i,className:'metric',style:{padding:'8px 12px'}},

            React.createElement('div',{style:{fontSize:14,fontWeight:600}},item.v)
          ))
        ),

        // Tahmini sГјre
        React.createElement('div',null,
          React.createElement('div',{className:'divider'}),
          React.createElement('div',{className:'card-title'},'Tahmini Bitirme SГјresi'),

            React.createElement('br',null),
            'Sporcular sekmesinden VOвӮӮmax deДҹerini kontrol edin.'
          ),
          target&&(()=>{
            // в”Җв”Җ Д°yileЕҹtirme Potansiyeli в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
            // YarДұЕҹa ve hazДұrlДұk durumuna gГ¶re gerГ§ekГ§i iyileЕҹtirme aralДұДҹДұ
            const km=parseFloat(race.mesafe)||0;
            const dp=parseFloat(race.d_plus)||0;
            const prepWeeks=parseInt(race.prep_weeks)||12;
            const taperW=parseInt(race.taper_w)||(km>42?3:km>21?2:1);
            const daysLeft=race.tarih?Math.ceil((new Date(race.tarih+'T12:00:00')-new Date())/864e5):999;
            const trainingDaysLeft=Math.max(0,daysLeft-taperW*7);
            const totalTrainingDays=Math.max(1,(prepWeeks-taperW)*7);
            const prepPct=Math.min(1,(totalTrainingDays-trainingDaysLeft)/totalTrainingDays);

            // Mesafe & D+ bazlДұ max iyileЕҹtirme potansiyeli (hazДұrlДұk dГ¶ngГјsГј baЕҹДұnda)
            // KДұsa mesafe вҶ’ daha fazla iyileЕҹme mГјmkГјn
            // Ultra/trail вҶ’ teknik + D+ verimi Г¶nemli
            const dpPerKm=km>0?dp/km:0;
            let maxIyiPct;
            if(km<=5)       maxIyiPct=6.0;
            else if(km<=10) maxIyiPct=5.0;
            else if(km<=21) maxIyiPct=4.0;
            else if(km<=42) maxIyiPct=3.0;
            else if(km<=60) maxIyiPct=2.5;
            else            maxIyiPct=2.0;

            // D+ >50m/km вҶ’ trail teknik verimi ekler
            if(dpPerKm>100) maxIyiPct+=1.0;
            else if(dpPerKm>50) maxIyiPct+=0.5;

            // HazДұrlДұk tamamlanma oranДұna gГ¶re gerГ§ekleЕҹecek iyileЕҹme tahmini
            // Erken dГ¶nem вҶ’ potansiyelin az bir kДұsmДұ gerГ§ekleЕҹti
            // GeГ§ dГ¶nem вҶ’ potansiyelin bГјyГјk kДұsmДұ gerГ§ekleЕҹti
            // S-eДҹrisi: orta dГ¶nemde hДұzlДұ, baЕҹta ve sonda yavaЕҹ
            const realizePct=prepPct<0.1?0.05:prepPct<0.3?0.15+(prepPct-0.1)*0.5:
              prepPct<0.7?0.25+(prepPct-0.3)*1.5:prepPct<0.9?0.85+(prepPct-0.7)*0.5:0.95;

            const expectedIyi=round1(maxIyiPct*realizePct);
            const minIyi=round1(expectedIyi*0.6);
            const maxIyi=round1(Math.min(maxIyiPct,expectedIyi*1.4));

            // Д°yileЕҹtirilmiЕҹ hedef sГјre aralДұДҹДұ
            const tMin=round1(target.totalMin*(1-maxIyi/100));
            const tMax=round1(target.totalMin*(1-minIyi/100));
            const tHedef=round1(target.totalMin*(1-expectedIyi/100));

            return React.createElement('div',null,
              React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:10,marginBottom:12}},
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Mevcut Tahmin'),
                  React.createElement('div',{style:{fontSize:20,fontWeight:600,color:'var(--info)'}},fmtHMS(target.totalMin))
                ),
                React.createElement('div',{className:'metric',style:{border:'1px solid var(--success)',background:'var(--success-bg)'}},
                  React.createElement('div',{className:'metric-label'},'HazДұrlДұk SonrasДұ Hedef'),
                  React.createElement('div',{style:{fontSize:18,fontWeight:700,color:'var(--success)'}},fmtHMS(tHedef)),
                  React.createElement('div',{style:{fontSize:11,color:'var(--success)',marginTop:2}},'вҲ’'+expectedIyi+'% iyileЕҹtirme')
                ),
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Ort. Pace (Tahmin)'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:600}},fmtPaceStr(target.totalMin,parseFloat(race.mesafe)))
                ),
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Hedef Pace'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:600,color:'var(--success)'}},fmtPaceStr(tHedef,parseFloat(race.mesafe)))
                ),
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'TДұrmanДұЕҹ Ek SГјre'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:500}},fmtHMS(target.climbMin))
                ),
                target.idleMin>0&&React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'DuruЕҹ SГјreleri'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:500}},fmtHMS(target.idleMin))

// Test zamanlama: Bu sporcu iГ§in Еҹu an test Г¶nerilmeli mi?
// Belirli bir tarih iГ§in test uygunluДҹunu deДҹerlendir
function calcTestDayUygunluk(testDate, athlete, history, races, workouts, dunkuYogunPlanlanan=false){
  if(!testDate||!athlete)return null;
  const testD=new Date(testDate+'T12:00:00');
  const {primary}=selectRaces(athlete,races);
  const daysToRace=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-testD)/864e5):999;

  // Г–nceki gГјnГј kontrol et вҖ” kayДұtlДұ antrenman
  const oncekiGun=new Date(testD);oncekiGun.setDate(testD.getDate()-1);
  const oncekiGunStr=`${oncekiGun.getFullYear()}-${String(oncekiGun.getMonth()+1).padStart(2,'0')}-${String(oncekiGun.getDate()).padStart(2,'0')}`;
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete.id);
  const oncekiAntrenman=athWks.find(w=>w.date===oncekiGunStr);
  const dunkuYogunKayitli=oncekiAntrenman&&['interval','esik','yokus_kisa','yokus_uzun','tirmanis'].includes(oncekiAntrenman.tur);
  const dunkuYogun=dunkuYogunKayitli||dunkuYogunPlanlanan;

  // O gГјne yakДұn geГ§miЕҹteki TSB tahmini
  const last=history[history.length-1];
  const tsb=last?.tsb||0;
  const acwr=last?.acwr||1;

  const sorunlar=[];
  if(dunkuYogun)sorunlar.push('Г–nceki gГјn yoДҹun antrenman var ('+oncekiAntrenman.tur+') вҖ” toparlanma yetersiz');
  if(daysToRace<14)sorunlar.push('YarДұЕҹa '+daysToRace+' gГјn kaldДұ вҖ” test yorgunluДҹu yarДұЕҹДұ etkileyebilir');
  if(acwr>1.3)sorunlar.push('ACWR '+acwr.toFixed(2)+' вҖ” yГјk birikimi yГјksek');
  if(tsb< -15)sorunlar.push('TSB '+tsb.toFixed(1)+' вҖ” yorgunluk fazla, test sonuГ§larДұ gГјvenilmez');
  if(athlete.hrv_durum==='dГјЕҹГјk')sorunlar.push('HRV dГјЕҹГјk вҖ” toparlanma yetersiz');

  // Г–nerilen alternatif gГјnler (Г¶nГјmГјzdeki 14 gГјn, uygunluk sДұrasДұyla)
  const oneriler=[];
  const kosuGunleri=athlete.kosu_gunleri||[];
  for(let i=1;i<=14;i++){
    const d=new Date(testD);d.setDate(testD.getDate()+i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    const ds=`${y}-${m}-${dd}`;
    const dayShort=DAYS_SHORT[d.getDay()];
    if(!kosuGunleri.includes(dayShort))continue;
    const dr=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-d)/864e5):999;
    if(dr<7)continue;
    const phase=primary?calcPhase(ds,primary.tarih,primary.prep_weeks,primary):'Temel';
    if(phase==='Taper')continue;
    // Г–nceki gГјnГј kontrol et вҖ” kayДұtlДұ veya planlДұ
    const prevD=new Date(d);prevD.setDate(d.getDate()-1);
    const prevDs=`${prevD.getFullYear()}-${String(prevD.getMonth()+1).padStart(2,'0')}-${String(prevD.getDate()).padStart(2,'0')}`;
    const prevYogun=athWks.some(w=>w.date===prevDs&&['interval','esik','yokus_kisa','yokus_uzun'].includes(w.tur));
    if(prevYogun)continue;
    const label=d.toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'});
    oneriler.push({dateStr:ds,label,dr});
    if(oneriler.length>=3)break;
  }

  return{uygun:sorunlar.length===0,sorunlar,oneriler};
}

function calcTestTiming(athlete, history, races, workouts){
  if(!athlete)return[];
  const last=history[history.length-1];
  const ctl=last?.ctl||0;
  const phase=last?.phase||'Temel';
  const today=new Date();

  // YarДұЕҹa kaГ§ gГјn kaldДұ
  const {primary}=selectRaces(athlete,races);
  const daysToRace=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-today)/864e5):999;

  // Son testleri bul
  const athTests=(workouts||[]).filter(w=>w.athleteId===athlete.id&&w._isTest&&w._testTur);
  const lastTestByType={};
  athTests.forEach(w=>{
    const prev=lastTestByType[w._testTur];
    if(!prev||new Date(w.date)>new Date(prev.date))lastTestByType[w._testTur]=w;
  });

  const oneriler=[];
  Object.values(TEST_TURLERI).forEach(t=>{
    // Min CTL kontrolГј
    if(ctl<t.min_ctl){oneriler.push({...t,durum:'bekle',neden:'CTL ('+ctl.toFixed(0)+') yeterli deДҹil вҖ” en az '+t.min_ctl+' olmalДұ'});return;}
    // Faz kontrolГј
    if(!t.uygun_faz.includes(phase)&&phase!=='Temel'){oneriler.push({...t,durum:'uygun_degil',neden:phase+' fazДұnda bu test Г¶nerilmez'});return;}
    // YarДұЕҹ yakДұnlДұk kontrolГј
    if(daysToRace<14){oneriler.push({...t,durum:'yakin_yaris',neden:'YarДұЕҹa '+daysToRace+' gГјn kaldДұ вҖ” test riskli'});return;}
    // Frekans kontrolГј
    const lastTest=lastTestByType[t.id];
    if(lastTest){
      const haftalar=Math.round((today-new Date(lastTest.date+'T12:00:00'))/(7*864e5));
      if(haftalar<t.freq_hafta){oneriler.push({...t,durum:'erken',neden:'Son testten '+haftalar+' hafta geГ§ti вҖ” '+t.freq_hafta+' hafta beklenmeli',sonTest:lastTest});return;}
    }
    // Her Еҹey uygun
    const vadeli=!lastTest?'Д°lk kez':Math.round((today-new Date(lastTest.date+'T12:00:00'))/(7*864e5))+' hafta Г¶nce yapДұldДұ';
    oneriler.push({...t,durum:'onerilir',neden:vadeli,sonTest:lastTest||null});
  });

  return oneriler;
}

// KoЕҹu dinamikleri analizi
function analyzeDynamics(workouts, athleteId){
  // Sabit tempolu antrenman tespiti вҖ” iki yol:
  // 1. Antrenman tГјrГј bilgisi varsa onu kullan
  // 2. Yoksa veri bazlДұ otomatik tespit
  const STEADY_TYPES=['kolay','aerobik','uzun'];
  const YOДһUN_TYPES=['interval','esik','tempo','yokus_kisa','yokus_uzun','tirmanis','teknik','acici','depar','yaris'];

  function isSteady(w){
    // TГјr bilgisi varsa Г¶ncelikle onu kullan
    if(w.tur&&STEADY_TYPES.includes(w.tur)) return true;
    if(w.tur&&YOДһUN_TYPES.includes(w.tur)) return false;

    // TГјr bilgisi yok вҖ” veri bazlДұ otomatik tespit
    const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
    const durMin=durSec/60;
    const avgHR=parseFloat(w.ort_nabiz)||0;
    const maxHR=parseFloat(w.maks_nabiz)||0;
    const rpe=parseFloat(w.rpe)||0;
    const mesafe=parseFloat(w.mesafe)||0;

    // ГҮok kДұsa antrenmanlar hariГ§
    if(durMin<15) return false;

    // RPE varsa: вүӨ6 = sabit tempo
    if(rpe>0&&rpe>7) return false;
    if(rpe>0&&rpe<=6) return true;

    // NabДұz farkДұ: maks-ort < 25 bpm вҶ’ sabit tempo
    if(avgHR>0&&maxHR>0){
      const hrRange=maxHR-avgHR;
      if(hrRange>35) return false; // YoДҹun antrenman
      if(hrRange<=25) return true;  // Sabit tempo
    }

    // Pace tutarlДұlДұДҹДұ: pace/km makul aralДұkta
    if(mesafe>2&&durMin>0){
      const paceSecKm=(durMin*60)/mesafe;
      // 4:00вҖ“9:00 /km arasДұ sabit tempo koЕҹusu
      if(paceSecKm>=240&&paceSecKm<=540) return true;
    }

    // Yeterli sinyal yoksa dahil et вҖ” daha fazla veri daha iyi
    return durMin>=20;
  }

  const athWks=(workouts||[]).filter(w=>{
    if(w.athleteId!==athleteId) return false;
    if(!isSteady(w)) return false;
    // Dinamik verisi olan antrenmanlar
    return parseFloat(w.kadans)>0||parseFloat(w.yer_kontak)>0||parseFloat(w.dikey_salinim)>0;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  if(!athWks.length)return null;

  // KaГ§ tanesi otomatik tespit edildi vs tГјr bilgisiyle?
  const autoDetected=athWks.filter(w=>!w.tur||!STEADY_TYPES.includes(w.tur)).length;

  const refs={
    kadans:{iyi:180,kabul:170,birim:'spm',yuksek_iyi:true},
    yer_kontak:{iyi:250,kabul:300,birim:'ms',yuksek_iyi:false},
    dikey_salinim:{iyi:7,kabul:9,birim:'cm',yuksek_iyi:false},
  };

  const sonuc={};
  ['kadans','yer_kontak','dikey_salinim'].forEach(k=>{
    const vals=athWks.map(w=>parseFloat(w[k])).filter(v=>v>0);
    if(!vals.length){sonuc[k]=null;return;}
    const avg=round1(vals.reduce((s,v)=>s+v,0)/vals.length);
    const son=vals[vals.length-1];
    const ref=refs[k];
    let seviye;
    if(ref.yuksek_iyi){seviye=avg>=ref.iyi?'iyi':avg>=ref.kabul?'kabul':'gelistir';}
    else{seviye=avg<=ref.iyi?'iyi':avg<=ref.kabul?'kabul':'gelistir';}
    const trend=vals.length>=3?(()=>{
      const n=Math.min(5,vals.length);
      const son5=vals.slice(-n);
      const ilk5=vals.slice(0,n);
      const avgSon=son5.reduce((s,v)=>s+v,0)/son5.length;
      const avgIlk=ilk5.reduce((s,v)=>s+v,0)/ilk5.length;
      const fark=ref.yuksek_iyi?avgSon-avgIlk:avgIlk-avgSon;
      return fark>1?'iyilesiyor':fark<-1?'kГ¶tГјlessiyor':'sabit';
    })():'yetersiz_veri';
    sonuc[k]={avg,son,seviye,trend,vals,birim:ref.birim,ref};
  });
  return{sonuc,wkCount:athWks.length,autoDetected};
}

// HaftalДұk plandaki antrenman tipini вҶ’ ANTRENMAN_TURLERI v deДҹerine Г§evir
function planTipToTur(planTip, baslik=''){
  const b=(baslik||'').toLowerCase();
  // BaЕҹlДұktan Г¶nce eЕҹleЕҹtir вҖ” daha spesifik
  if(b.includes('piramit'))   return 'piramit';
  if(b.includes('kesintisiz')) return 'kesintisiz_piramit';
  if(b.includes('cruise'))    return 'cruise';
  if(b.includes('progressive'))return 'progressive';
  if(b.includes('on-off')||b.includes('fartlek')) return 'on_off';
  if(b.includes('tempo interval')) return 'tempo_interval';
  if(b.includes('yarДұЕҹ temposu')||b.includes('race pace')) return 'yaris_tempo';
  if(b.includes('hill sprint')) return 'hill_sprint';
  if(b.includes('strides')||b.includes('aГ§ДұcДұ')) return 'strides';
  if(b.includes('kДұsa yokuЕҹ')) return 'yokus_kisa';
  if(b.includes('uzun yokuЕҹ')) return 'yokus_uzun';
  // Sonra tip'ten eЕҹleЕҹtir
  const map={
    kolay:'kolay',aerobik:'aerobik',uzun:'uzun',
    tempo:'tempo',esik:'esik',interval:'interval',
    yokus_kisa:'yokus_kisa',yokus_uzun:'yokus_uzun',
    tirmanis:'tirmanis',teknik:'teknik',acici:'strides',
    capraz:'capraz',dinlenme:'',
  };
  return map[planTip]||planTip||'';
}

// Plan gГјnГјnden tur ve yapi_notu Г§Дұkar
function planDayToForm(day){
  if(!day||day.tip==='dinlenme')return{tur:'',yapi_notu:''};
  const tur=planTipToTur(day.tip, day.baslik||'');

  // Еһablon doДҹrudan yapi_notu dГ¶ndГјrdГјyse onu kullan (seviye bilgisi dahil)
  if(day.yapi_notu) return{tur,yapi_notu:day.yapi_notu};

  // yapilar iГ§inden ana antrenman bloДҹunu bul (ДұsДұnma/soДҹuma hariГ§)
  const mainBlok=(day.yapilar||[]).find(y=>{
    const d=(y.detay||'').toLowerCase();
    const b=(y.baslik||'').toLowerCase();
    return !b.includes('ДұsДұnma')&&!b.includes('soДҹuma')&&!b.includes('dinlenme')&&d.length>5;
  });

  let yapi_notu='';
  if(mainBlok){
    const detay=mainBlok.detay||'';
    // Piramit: "1вҖ“2вҖ“3вҖ“2вҖ“1 dk" veya "2вҖ“3вҖ“4вҖ“5вҖ“4вҖ“3вҖ“2 dk"
    const pir=detay.match(/(\d+[вҖ“\-])+\d+\s*dk/);
    if(pir){yapi_notu=pir[0].trim();}
    // NxM pattern: "4Г—3 dk", "6Г—4 dk + 6Г—2 dk", "2Г—15 dk"
    else {
      const nx=detay.match(/(\d+[Г—x]\d+(?:\s*dk)?(?:\s*[+]\s*\d+[Г—x]\d+\s*dk)?)/);
      if(nx) yapi_notu=nx[0].replace(/\s+/g,' ').trim();
    }
    // SГјre: "20 dk sГјrekli" gibi
    if(!yapi_notu){
      const s=detay.match(/(\d+)\s*dk/);
      if(s) yapi_notu=s[1]+' dk';
    }
  }

  // EЕҹleЕҹen yapi_notu yoksa вҖ” YAPI_NOTLARI listesinden ilkini ver
  if(!yapi_notu){
    const notlar=YAPI_NOTLARI[tur]||[];
    if(notlar.length) yapi_notu=notlar[0];
  }

  return{tur,yapi_notu};
}

function AntrenmanEkle({onSave,athlete,athletes,selId,onSelChange,allHistory,workouts,races,testPlanlar}){
  const [form,setForm]=useState({...EMPTY_W});
  const [saved,setSaved]=useState(false);
  const [lastRec,setLastRec]=useState(null);
  const [planOneri,setPlanOneri]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const durSec=toSec(form.sure_sa,form.sure_dk,form.sure_sn);
  const selectedAth=athletes.find(a=>a.id===selId)||null;
  const history=allHistory?.[selId]||[];

  // Sporcu veya tarih deДҹiЕҹince вҶ’ o gГјnГјn Г¶nerilen antrenmanДұnДұ Г§ek
  React.useEffect(()=>{
    if(!selId||!form.date)return;
    const selAth=athletes.find(a=>a.id===selId);
    if(!selAth)return;
    if(!selAth.kosu_gunleri||selAth.kosu_gunleri.length===0){setPlanOneri(null);return;}
    try{
      const athWorkouts=(workouts||[]).filter(w=>w.athleteId===selId);
      const athHistory=(allHistory&&allHistory[selId])||[];
      const athRaceIds=(selAth.yarДұslar||[]).map(x=>typeof x==='string'?x:x.id);
      const athRaces=(races||[]).filter(r=>athRaceIds.includes(r.id));

      // SeГ§ilen tarih iГ§in gГјnГјn planДұnДұ bul
      // generateTwoWeekPlan'dan o gГјnГј Г§ek вҖ” en gГјvenilir yol
      const plan=generateTwoWeekPlan(selAth,athHistory,athRaces,athWorkouts,testPlanlar||[]);
      if(!plan?.weeks){setPlanOneri(null);return;}

      const allDays=plan.weeks.flatMap(w=>w.days);
      const gunPlan=allDays.find(d=>d.date===form.date);

      if(!gunPlan||gunPlan.tip==='dinlenme'||!gunPlan.yapilar?.length){
        // Plan bulunamadДұysa veya dinlenmeyse вҶ’ recommendWorkout ile dene (bugГјn iГ§in)
        const today=new Date();
        const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
        if(form.date===todayStr){
          const thisWeekWks=athWorkouts.filter(w=>{
            const d=new Date(w.date+'T12:00:00');
            const mon=new Date(today);mon.setDate(today.getDate()-today.getDay()+1);
            return d>=mon&&d<=today;

          const rec=recommendWorkout(selAth,athHistory,athRaces,thisWeekWks,athWorkouts);
          if(rec&&rec.tip!=='dinlenme'&&rec.yapilar?.length>0){
            setPlanOneri({baslik:rec.baslik,tip:rec.tip,sure_dk:rec.sure_dk,
              tur:planTipToTur(rec.tip),yapi_notu:planDayToForm(rec)?.yapi_notu||''});
            return;
          }
        }
        setPlanOneri(null);return;
      }

      const oneri=planDayToForm(gunPlan);
      setPlanOneri({baslik:gunPlan.baslik,tip:gunPlan.tip,sure_dk:gunPlan.sure_dk,
        tur:oneri.tur,yapi_notu:oneri.yapi_notu});
    }catch(e){
      console.warn('Plan Г¶nerisi:',e.message);
      setPlanOneri(null);
    }
  },[selId,form.date]);

  // Г–neri uygula
  const applyOneri=()=>{
    if(!planOneri)return;

// в”Җв”Җ Antrenman Analizi: AynДұ yapДұdaki antrenmanlarДұ zaman iГ§inde karЕҹДұlaЕҹtДұr в”Җв”Җ
function AntrenmanAnalizTab({workouts,athletes}){
  const [selAth,setSelAth]=useState('');
  const [selTur,setSelTur]=useState('');
  const [selYapi,setSelYapi]=useState('');
  const chartRef=useRef();
  const chartInst=useRef();

  // SeГ§ili sporcunun antrenmanlarДұ
  const athWorkouts=useMemo(()=>{
    if(!selAth)return[];
    return (workouts||[]).filter(w=>w.athleteId===selAth&&w.date).sort((a,b)=>new Date(a.date)-new Date(b.date));
  },[workouts,selAth]);

  // Mevcut tur seГ§enekleri вҖ” sporcunun gerГ§ek antrenmanlarДұndan
  const turSecenekleri=useMemo(()=>{
    const set=new Set(athWorkouts.map(w=>w.tur).filter(Boolean));
    return [...set].map(v=>({v,l:TUR_LABELS[v]||v}));
  },[athWorkouts]);

  // SeГ§ili tur iГ§in yapi_notu seГ§enekleri
  const yapiSecenekleri=useMemo(()=>{
    const set=new Set(athWorkouts.filter(w=>w.tur===selTur).map(w=>w.yapi_notu).filter(Boolean));
    return [...set];
  },[athWorkouts,selTur]);

  // FiltrelenmiЕҹ antrenmanlar
  const filtered=useMemo(()=>{
    return athWorkouts.filter(w=>
      w.tur===selTur&&
      (!selYapi||w.yapi_notu===selYapi)
    );
  },[athWorkouts,selTur,selYapi]);

  // Metrik hesapla вҖ” her antrenman iГ§in
  const ath=athletes.find(a=>a.id===selAth);
  const dataPoints=useMemo(()=>{
    return filtered.map(w=>{
      const m=calcMetrics(w,ath);
      const durMin=(toSec(w.sure_sa,w.sure_dk,w.sure_sn)/60)||0;
      const km=parseFloat(w.mesafe)||0;
      const paceSecKm=durMin>0&&km>0?Math.round(durMin/km*60):0;
      return{
        date:w.date,
        label:new Date(w.date+'T12:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'}),
        durMin:round1(durMin),
        km:round1(km),
        pace:paceSecKm>0?secToPace(paceSecKm):null,
        paceSec:paceSecKm,
        ort_nabiz:parseInt(w.ort_nabiz)||null,
        rpe:parseInt(w.rpe)||null,
        trimp:m.trimp||null,
        yuk:m.yukObj||null,
        kadans:parseInt(w.kadans)||null,
        irtifa:parseInt(w.irtifa)||null,
      };
    });
  },[filtered,ath]);

  // Grafik
  useEffect(()=>{
    if(!chartRef.current||dataPoints.length<2)return;
    if(chartInst.current)chartInst.current.destroy();
    const labels=dataPoints.map(d=>d.label);
    const datasets=[
      dataPoints[0].paceSec>0&&{
        label:'Pace (sn/km)',yAxisID:'y',
        data:dataPoints.map(d=>d.paceSec),
        borderColor:'#3b82f6',backgroundColor:'#3b82f620',
        tension:.3,fill:true,pointRadius:5,
      },
      dataPoints[0].ort_nabiz&&{
        label:'Ort. NabДұz (bpm)',yAxisID:'y2',
        data:dataPoints.map(d=>d.ort_nabiz),
        borderColor:'#ef4444',backgroundColor:'transparent',
        tension:.3,borderDash:[5,3],pointRadius:5,
      },
      {
        label:'SГјre (dk)',yAxisID:'y3',
        data:dataPoints.map(d=>d.durMin),
        borderColor:'#10b981',backgroundColor:'transparent',
        tension:.3,borderDash:[3,3],pointRadius:5,
      },
    ].filter(Boolean);

    chartInst.current=new Chart(chartRef.current,{
      type:'line',
      data:{labels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'top'},tooltip:{
          callbacks:{label:(ctx)=>{
            const d=dataPoints[ctx.dataIndex];
            if(ctx.dataset.label.includes('Pace'))return 'Pace: '+(d.pace||'вҖ”');
            return ctx.dataset.label+': '+ctx.parsed.y;
          }}
        }},
        scales:{
          y:{position:'left',title:{display:true,text:'Pace (sn/km)'},reverse:true},
          y2:{position:'right',title:{display:true,text:'NabДұz (bpm)'},grid:{drawOnChartArea:false}},
          y3:{display:false},
        }
      }
    });
    return()=>{if(chartInst.current)chartInst.current.destroy();};
  },[dataPoints]);

  // Trend hesabДұ вҖ” ilk vs son
  const trend=(key)=>{
    const vals=dataPoints.map(d=>d[key]).filter(v=>v!=null);
    if(vals.length<2)return null;
    const diff=vals[vals.length-1]-vals[0];
    const pct=round1(diff/vals[0]*100);
    return{first:vals[0],last:vals[vals.length-1],diff:round1(diff),pct};
  };

  const metrikler=[
    {k:'paceSec',l:'Pace',fmt:(v)=>v?secToPace(v):'вҖ”',iyi:'azalma'},
    {k:'ort_nabiz',l:'Ort. NabДұz',fmt:(v)=>v?v+' bpm':'вҖ”',iyi:'azalma'},
    {k:'durMin',l:'SГјre',fmt:(v)=>v?v+' dk':'вҖ”',iyi:'artma'},
    {k:'km',l:'Mesafe',fmt:(v)=>v?v+' km':'вҖ”',iyi:'artma'},
    {k:'rpe',l:'RPE',fmt:(v)=>v?v+'/10':'вҖ”',iyi:'azalma'},
    {k:'yuk',l:'YГјk',fmt:(v)=>v?String(v):'вҖ”',iyi:'artma'},
  ];

  if(!athletes.length)return React.createElement('div',{className:'empty'},'HenГјz sporcu eklenmedi.');

  return React.createElement('div',null,
    React.createElement('div',{className:'card',style:{marginBottom:12}},
      React.createElement('div',{className:'card-title'},'Antrenman KarЕҹДұlaЕҹtДұrma Analizi'),
      React.createElement('div',{className:'form-grid'},
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Sporcu'),

          w.date||'',

// в”Җв”Җ Sporcu geГ§miЕҹ takibi в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

const TRACKED_FIELDS=[
  {k:'kilo',l:'Kilo (kg)',num:true},
  {k:'rhr',l:'Dinlenme NabzДұ (RHR)',num:true},
  {k:'mhr',l:'Maksimum NabДұz (MHR)',num:true},
  {k:'lthr',l:'Laktat EЕҹiДҹi (LTHR)',num:true},
  {k:'vo2max',l:'VOвӮӮmax',num:true},
  {k:'hrv_durum',l:'HRV Durumu',num:false},
  {k:'hrv_7gun',l:'HRV 7g Ort.',num:true},
  {k:'sakatlДұk',l:'SakatlДұk PuanДұ',num:true},
  {k:'motivasyon',l:'Motivasyon',num:true},
  {k:'disiplin',l:'KoЕҹu Disiplini',num:false},
  {k:'dinlenme_siklik',l:'Dinlenme HaftasДұ SДұklДұДҹДұ',num:false},
  {k:'pb_5k',l:'En Д°yi 5K',num:false},
  {k:'pb_10k',l:'En Д°yi 10K',num:false},
  {k:'pb_hm',l:'En Д°yi YarДұ Maraton',num:false},
  {k:'pb_m',l:'En Д°yi Maraton',num:false},
];

function detectChanges(oldA,newA){
  const changes=[];
  TRACKED_FIELDS.forEach(({k,l,num})=>{
    const ov=oldA[k],nv=newA[k];
    if(String(ov||'').trim()===String(nv||'').trim())return;
    if(!ov&&!nv)return;
    changes.push({field:k,label:l,oldVal:ov||'вҖ”',newVal:nv||'вҖ”',num});
  });
  return changes;
}

function generateMessages(changes,newA){
  const msgs=[];
  changes.forEach(({field,oldVal,newVal,num})=>{
    const ov=parseFloat(oldVal),nv=parseFloat(newVal);
    const diff=num?round1(nv-ov):null;
    const pct=num&&ov?round1((nv-ov)/ov*100):null;

    if(field==='kilo'&&num){
      if(diff<0){
        const absPct=Math.abs(pct);
        if(absPct>1)msgs.push({type:'warn',text:`Kilo ${Math.abs(diff)} kg dГјЕҹtГј (%${absPct}). Haftada %0.5вҖ“1'den fazla kayДұp kas kaybДұna yol aГ§abilir. Beslenmeyi kontrol et.`});
        else msgs.push({type:'good',text:`Kilo ${Math.abs(diff)} kg dГјЕҹtГј. GГјГ§/aДҹДұrlДұk oranДұ iyileЕҹiyor вҖ” tДұrmanma performansДұna olumlu yansДұyabilir.`});
      } else if(diff>0) msgs.push({type:'info',text:`Kilo ${diff} kg arttДұ. Antrenman yГјkГјyle orantДұlДұ mДұ kontrol et.`});
    }
    if(field==='rhr'&&num){
      if(diff<0)msgs.push({type:'good',text:`RHR ${Math.abs(diff)} bpm dГјЕҹtГј вҶ’ aerobik kapasite ve toparlanma iyileЕҹiyor. Olumlu uyum iЕҹareti.`});
      else if(diff>3)msgs.push({type:'warn',text:`RHR ${diff} bpm yГјkseldi вҶ’ aЕҹДұrДұ antrenman, hastalДұk baЕҹlangДұcДұ veya yetersiz uyku olabilir. YГјkГј gГ¶zden geГ§ir.`});
    }
    if(field==='lthr'&&num){
      if(diff>0)msgs.push({type:'good',text:`LTHR ${diff} bpm yГјkseldi вҶ’ laktat eЕҹiДҹi gГјГ§leniyor. Tempo ve eЕҹik antrenmanlarДұ meЕҹe ediyor.`});
      else if(diff<-3)msgs.push({type:'warn',text:`LTHR ${Math.abs(diff)} bpm dГјЕҹtГј. Test koЕҹullarДұnДұ kontrol et; yorgunluk veya overreaching olabilir.`});
    }
    if(field==='vo2max'&&num){
      if(diff>0)msgs.push({type:'good',text:`VOвӮӮmax ${diff} ml/kg/dak arttДұ вҶ’ aerobik taban geliЕҹiyor.`});
      else if(diff<-2)msgs.push({type:'warn',text:`VOвӮӮmax ${Math.abs(diff)} ml/kg/dak dГјЕҹtГј. Toparlanma ve antrenman kalitesi deДҹerlendirilmeli.`});
    }
    if(field==='hrv_7gun'&&num){
      if(diff>3)msgs.push({type:'good',text:`HRV 7g ortalamasДұ ${diff} ms yГјkseldi вҶ’ otonom sinir sistemi toparlanДұyor. YГјk artДұЕҹДұ iГ§in uygun dГ¶nem.`});
      else if(diff<-3)msgs.push({type:'warn',text:`HRV 7g ortalamasДұ ${Math.abs(diff)} ms dГјЕҹtГј вҶ’ toparlanma baskДұ altДұnda. Bu hafta yoДҹunluДҹu dГјЕҹГјr.`});
    }
    if(field==='hrv_durum'){
      const skala={dГјЕҹГјk:1,dengesiz:2,dengeli:3};
      const os=skala[oldVal]||0,ns=skala[newVal]||0;
      // Bilinmiyor ('') вҶ’ nГ¶tr geГ§iЕҹ, kГ¶tГјleЕҹme deДҹil
      if(!newVal){
        msgs.push({type:'info',text:`HRV takibi durduruldu. Г–lГ§Гјm alДұnamayan sporcular iГ§in yГјk kararlarДұ ACWR ve TSB'ye gГ¶re alДұnДұr.`});
      } else if(!oldVal&&newVal){
        msgs.push({type:'info',text:`HRV takibi baЕҹlatДұldДұ: "${newVal}". Sistem artДұk HRV durumunu dikkate alacak.`});
      } else if(ns>os){
        msgs.push({type:'good',text:`HRV durumu "${oldVal}" вҶ’ "${newVal}" iyileЕҹti. Kaliteli antrenman iГ§in iyi pencere.`});
      } else if(ns<os){
        msgs.push({type:'warn',text:`HRV durumu "${oldVal}" вҶ’ "${newVal}" kГ¶tГјleЕҹti. DГјЕҹГјk yoДҹunluklu gГјn veya dinlenme planla.`});
      }
    }
    if(field==='sakatlДұk'&&num){
      if(diff>2)msgs.push({type:'danger',text:`SakatlДұk puanДұ ${ov}вҶ’${nv} yГјkseldi. YГјk hemen azaltДұlmalДұ; fizyoterapist gГ¶rГјЕҹГј Г¶nerilir.`});
      else if(diff>0)msgs.push({type:'warn',text:`SakatlДұk puanДұ hafif yГјkseldi (${ov}вҶ’${nv}). AДҹrДұlДұ bГ¶lgeye dikkat et, zorlama.`});
      else if(diff<0)msgs.push({type:'good',text:`SakatlДұk puanДұ ${ov}вҶ’${nv} iyileЕҹti. Kademeli yГјk artДұЕҹДұna hazДұr.`});
    }
    if(field==='motivasyon'&&num){
      if(diff<-1)msgs.push({type:'warn',text:`Motivasyon ${ov}вҶ’${nv} dГјЕҹtГј. Antrenman Г§eЕҹitliliДҹi, dinlenme veya hedef netleЕҹtirmesi faydalДұ olabilir.`});
      else if(diff>1)msgs.push({type:'good',text:`Motivasyon ${ov}вҶ’${nv} yГјkseldi. YГјksek motivasyon dГ¶nemlerinde hacim artДұЕҹДұnДұ dikkatli yГ¶net.`});
    }
    if(['pb_5k','pb_10k','pb_hm','pb_m'].includes(field)){
      const toSecs=s=>{if(!s)return null;const p=s.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1];};
      const os=toSecs(oldVal),ns=toSecs(newVal);
      if(os&&ns&&ns<os)msgs.push({type:'good',text:`Yeni kiЕҹisel rekoru! ${({pb_5k:'5K',pb_10k:'10K',pb_hm:'YarДұ Maraton',pb_m:'Maraton'})[field]}: ${oldVal} вҶ’ ${newVal} рҹҺү`});
    }
  });
  return msgs;
}

// в”Җв”Җ PaylaЕҹДұlabilir Kart YardДұmcДұsДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function shareCard(el, filename, title, text){
  if(!el)return;
  // html2canvas yГјkle
  await new Promise((resolve,reject)=>{
    if(window.html2canvas)return resolve();
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=resolve;s.onerror=()=>reject(new Error('html2canvas yГјklenemedi'));
    document.head.appendChild(s);
  });
  const isDark=document.body.classList.contains('dark');
  const canvas=await captureElement(el,isDark?'#0a1220':'#f0f4f9');
  const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
  const file=new File([blob],filename,{type:'image/png'});
  try{
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({title,text,files:[file]});
    } else {
      const a=document.createElement('a');
      a.download=filename;
      a.href=URL.createObjectURL(file);
      a.click();URL.revokeObjectURL(a.href);
    }
  }catch(e){if(e.name!=='AbortError')throw e;}
}

function ShareBtn({elRef,filename,title,text,style}){
  const [busy,setBusy]=useState(false);
  const handle=async()=>{

function MetrikGrafikKarti({profHist,metrikList}){
  const [aktif,setAktif]=useState(metrikList[0]?.key||'kilo');
  const canvasRef=useRef(null);
  const instRef=useRef(null);
  const metrik=metrikList.find(m=>m.key===aktif)||metrikList[0];
  const veriler=profHist.filter(s=>s[aktif]!=null&&s[aktif]!=='');

  useEffect(()=>{
    if(!canvasRef.current||!metrik||!veriler.length)return;
    if(instRef.current){instRef.current.destroy();}
    const labels=veriler.map(s=>new Date(s.date+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'short'}));
    const data=veriler.map(s=>parseFloat(s[aktif])||null);
    instRef.current=new Chart(canvasRef.current,{
      type:'line',
      data:{
        labels,
        datasets:[{
          label:metrik.label,
          data,
          borderColor:metrik.color,
          backgroundColor:metrik.color+'22',
          borderWidth:2,
          pointBackgroundColor:metrik.color,
          pointRadius:4,
          tension:0.3,
          fill:true
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.parsed.y+' '+metrik.unit;}}}},
        scales:{
          x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#94a3b8',font:{size:10}}},
          y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#94a3b8',font:{size:10}},
             title:{display:true,text:metrik.unit,color:'#64748b',font:{size:10}}}
        }
      }
    });
    return()=>{if(instRef.current)instRef.current.destroy();};
  },[aktif,profHist]);

  if(!metrikList.length)return null;

  return React.createElement('div',{className:'card',style:{marginBottom:12}},
    React.createElement('div',{className:'card-title',style:{marginBottom:10}},'рҹ“Ҳ Sporcu Metrikleri'),
    // Tab seГ§ici
    React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:4,marginBottom:12}},
      metrikList.map(m=>React.createElement('button',{
        key:m.key,
        onClick:()=>setAktif(m.key),
        style:{
          fontSize:11,padding:'4px 10px',borderRadius:99,cursor:'pointer',
          fontWeight:aktif===m.key?700:400,
          background:aktif===m.key?m.color+'33':'var(--bg-secondary)',
          border:'1px solid '+(aktif===m.key?m.color:'var(--border)'),
          color:aktif===m.key?m.color:'var(--text-secondary)'
        }
      },m.label))
    ),
    // Grafik
    veriler.length<2
      ?React.createElement('div',{style:{textAlign:'center',color:'var(--text-tertiary)',fontSize:12,padding:'20px 0'}},
        veriler.length===1?'Grafik iГ§in en az 2 kayДұt gerekiyor':'HenГјz veri yok'
      )
      :React.createElement('div',{style:{height:180,position:'relative'}},
        React.createElement('canvas',{ref:canvasRef})
      ),
    // Son deДҹer
    veriler.length>0&&React.createElement('div',{style:{
      marginTop:8,display:'flex',justifyContent:'space-between',
      fontSize:12,color:'var(--text-secondary)'
    }},
      React.createElement('span',null,'Son: '+React.createElement('strong',null,veriler[veriler.length-1][aktif]+' '+metrik.unit)),
      React.createElement('span',null,veriler[veriler.length-1].date)
    )
  );
}


function SporcuGecmis({athHistory,athId,onDeleteEntry}){
  const entries=(athHistory||[]).filter(h=>h.athId===athId).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!entries.length)return React.createElement('div',{style:{fontSize:12,color:'var(--text-tertiary)',padding:'8px 0'}},'HenГјz deДҹiЕҹim kaydДұ yok.');
  const msgStyle={good:{background:'var(--success-bg)',color:'var(--success)'},warn:{background:'var(--warn-bg)',color:'var(--warn)'},danger:{background:'var(--danger-bg)',color:'var(--danger)'},info:{background:'var(--info-bg)',color:'var(--info)'}};
  return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
    entries.map((entry,i)=>{

          title:'Bu kaydДұ sil'
        },'вң•'),
        React.createElement('div',{style:{fontSize:11,color:'var(--text-tertiary)',marginBottom:4}},
          entry.date?new Date(entry.date).toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):''
        ),
        changes.map((c,j)=>React.createElement('div',{key:j,style:{fontSize:12,marginBottom:3}},
          React.createElement('span',{style:{color:'var(--text-secondary)'}},(c.label||'')+': '),
          React.createElement('span',{style:{textDecoration:'line-through',color:'var(--text-tertiary)',marginRight:4}},c.oldVal||''),
          React.createElement('span',{style:{fontWeight:600,color:'var(--text-primary)'}},c.newVal||'')
        )),

// Firebase SDK'larДұnДұ dinamik yГјkle, sonra React baЕҹlat
function loadScript(src){
  return new Promise((resolve)=>{
    const s=document.createElement('script');
    s.src=src;
    s.onload=()=>resolve(true);
    s.onerror=()=>resolve(false); // hata olsa da devam et
    document.head.appendChild(s);
  });
}

const AUTH_LS_KEY='kosuizi_auth';
const DEFAULT_PASS='kosuizi2025'; // Д°lk kurulum Еҹifresi вҖ” Firebase'e kaydedilince bu geГ§ersiz olur

function LoginScreen({onLogin}){
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [logo,setLogo]=useState('');
  const [appName,setAppName]=useState('KoЕҹu Д°zi');

  useEffect(()=>{
    // Logo ve takДұm adДұnДұ yГјkle
    (async()=>{
      try{
        const cfg=await fbGet('app_config');
        if(cfg?.teamLogo)setLogo(cfg.teamLogo);
        if(cfg?.teamName)setAppName(cfg.teamName);
      }catch{}
    })();
  },[]);

  const attempt=async()=>{
    if(!pass.trim())return;
    setLoading(true);setErr('');
    try{
      // Firebase'den Еҹifreyi oku
      let stored=null;
      if(db){
        const snap=await db.ref('app_password').get();
        stored=snap.exists()?snap.val():null;
      }
      // Firebase'de Еҹifre yoksa varsayДұlanДұ kullan ve kaydet
      if(!stored){
        stored=DEFAULT_PASS;
        if(db)await db.ref('app_password').set(DEFAULT_PASS);
      }
      if(pass===stored){
        localStorage.setItem(AUTH_LS_KEY,btoa(pass+':'+Date.now()));
        onLogin();
      } else {
        setErr('Еһifre yanlДұЕҹ. Tekrar dene.');
        setPass('');
      }
    }catch(e){
      // Offline fallback
      const cached=localStorage.getItem(AUTH_LS_KEY);
      if(cached){onLogin();}
      else if(pass===DEFAULT_PASS){
        localStorage.setItem(AUTH_LS_KEY,btoa(pass+':'+Date.now()));
        onLogin();
      } else {
        setErr('BaДҹlantДұ hatasДұ veya Еҹifre yanlДұЕҹ.');
      }
    }
    setLoading(false);
  };

  return React.createElement('div',{style:{
    display:'flex',alignItems:'center',justifyContent:'center',
    minHeight:'100vh',background:'var(--bg-tertiary)'
  }},
    React.createElement('div',{style:{
      background:'var(--bg-primary)',border:'1px solid var(--border)',
      borderRadius:16,padding:'40px 36px',width:'100%',maxWidth:360,
      boxShadow:'0 8px 32px rgba(0,0,0,.12)'

      React.createElement('div',{style:{textAlign:'center',marginBottom:28}},
        logo
          ?React.createElement('img',{src:logo,style:{width:72,height:72,objectFit:'contain',borderRadius:12,marginBottom:10,border:'1px solid var(--border)',background:'var(--bg-secondary)',padding:4}})
          :React.createElement('div',{style:{fontSize:40,marginBottom:8}},'рҹҸғ'),
        React.createElement('div',{style:{fontSize:20,fontWeight:700,marginBottom:4}},appName),
        React.createElement('div',{style:{fontSize:13,color:'var(--text-tertiary)'}},'Antrenman Takip Sistemi')
      ),
      React.createElement('div',{className:'form-group',style:{marginBottom:12}},
        React.createElement('label',{style:{fontSize:13,color:'var(--text-secondary)',marginBottom:6,display:'block'}},'Еһifre'),
        React.createElement('input',{
          type:'password',value:pass,
          placeholder:'Еһifrenizi girin',
          autoFocus:true,
          style:{fontSize:15,padding:'10px 12px'},
          onChange:e=>setPass(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&attempt()
        })
      ),
      err&&React.createElement('div',{style:{

        style:{width:'100%',padding:'10px',fontSize:14,fontWeight:600},

function AppWithAuth(){
  const [authed,setAuthed]=useState(false);
  const [checking,setChecking]=useState(true);

  useEffect(()=>{
    // Daha Г¶nce giriЕҹ yapДұlmДұЕҹ mДұ?
    const cached=localStorage.getItem(AUTH_LS_KEY);
    if(cached){
      try{
        const decoded=atob(cached);
        const ts=parseInt(decoded.split(':')[1]||0);
        // 30 gГјn geГ§erliliДҹi var
        if(Date.now()-ts<30*24*3600*1000){
          setAuthed(true);
        } else {
          localStorage.removeItem(AUTH_LS_KEY);
        }
      }catch{localStorage.removeItem(AUTH_LS_KEY);}
    }
    setChecking(false);
  },[]);

  if(checking) return React.createElement('div',{style:{
    display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
    color:'var(--text-tertiary)',fontSize:14
  }},'YГјkleniyor...');

  if(!authed) return React.createElement(LoginScreen,{onLogin:()=>setAuthed(true)});
  return React.createElement(App);
}

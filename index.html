// EЕҹik hДұzДұnda kДұsa aralarla tekrarlanan bloklar. Laktat toleransДұ + tempo dayanДұklДұlДұДҹДұ.

// в”Җв”Җ Progressive Run в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Her segmentte tempo artar. Aerobik verimlilik + pace farkДұndalДұДҹДұ.

// в”Җв”Җ On-Off (Fartlek) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// 30sn hДұzlДұ вҖ“ 30sn yavaЕҹ ritmi. NГ¶romГјskГјler aktivasyon + VO2max geliЕҹtirme.

// в”Җв”Җ Tempo Intervals в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Tempo'dan daha uzun bloklar, aralarДұnda kДұsa dinlenme. YarДұЕҹ spesifik dayanДұklДұlДұk.

// в”Җв”Җ YarДұЕҹ Temposu (Race Pace) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Hedef yarДұЕҹ temposunda spesifik Г§alДұЕҹma. Metabolik ve nГ¶romГјskГјler adaptasyon.

// в”Җв”Җ Hill Sprints в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// 8вҖ“10sn maksimal yokuЕҹ koЕҹusu. NГ¶romГјskГјler gГјГ§ + ekonomi. Az yorgunluk, bГјyГјk etki.

// в”Җв”Җ Strides (AГ§ДұcДұlar + NГ¶romГјskГјler) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Kolay koЕҹuya eklenebilen 20вҖ“30sn hДұzlanmalar. Form + verimlilik geliЕҹtirme.

// в”Җв”Җ Grade Adjusted Pace (GAP) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function calcWeeklyTargets(athlete, races, workouts, optimizeMode=false){
  if(!athlete)return[];
  const {primary}=selectRaces(athlete,races);
  if(!primary||!primary.prep_weeks)return[];

  // в”Җв”Җ Optimize mod: tГјm yarДұЕҹlarДұ entegre et в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Г–nce orijinal planДұ hesapla
  const orijinalPlan=calcWeeklyTargetsCore(athlete,races,workouts,primary);

  if(!optimizeMode)return orijinalPlan;

  // DiДҹer yaklaЕҹan yarДұЕҹlarДұ bul
  const today=new Date();
  const athIds=(athlete.yarДұslar||[]).map(x=>typeof x==='string'?x:x.id);
  const digerYarislar=(races||[]).filter(r=>
    athIds.includes(r.id)&&
    r.id!==primary.id&&
    new Date(r.tarih+'T12:00:00')>today&&
    r.prep_weeks
  ).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));

  if(!digerYarislar.length)return orijinalPlan; // Tek yarДұЕҹ вҖ” optimize gerekmez

  // Her yarДұЕҹ iГ§in plan hesapla
  const digerPlanlar=digerYarislar.map(r=>({
    race:r,
    plan:calcWeeklyTargetsCore(athlete,races.map(x=>({...x,__force:x.id===r.id})),workouts,r)
  }));

  // Orijinal planДұn her haftasДұnДұ diДҹer yarДұЕҹlarla entegre et
  return orijinalPlan.map(wk=>{
    // DiДҹer yarДұЕҹlarДұn bu haftaya aДҹДұrlДұklДұ katkДұsДұ
    // AДҹДұrlДұk = yarДұЕҹa kalan sГјreye ters orantДұlДұ (yakДұn yarДұЕҹ daha aДҹДұr)
    let kmSum=wk.targetKm, dpSum=wk.targetDp, weightSum=1;
    const daysToMain=Math.ceil((new Date(primary.tarih+'T12:00:00')-wk.weekStart)/864e5);
    const mainWeight=Math.max(0.3,1-(daysToMain>365?1:daysToMain/365)*0.5);

    digerPlanlar.forEach(({race:r,plan:dp2})=>{
      // Bu hafta diДҹer yarДұЕҹДұn planДұnda karЕҹДұlДұk geldiДҹi haftayДұ bul
      const match=dp2.find(w2=>{
        const diff=Math.abs(w2.weekStart-wk.weekStart);
        return diff<7*864e5;
      });
      if(!match||match.targetKm<=0)return;
      // Uzak yarДұЕҹlar daha az aДҹДұrlДұk
      const daysToOther=Math.ceil((new Date(r.tarih+'T12:00:00')-wk.weekStart)/864e5);
      if(daysToOther<0)return; // GeГ§miЕҹ yarДұЕҹ
      const otherWeight=Math.max(0.1,0.5*(1-(daysToOther>365?1:daysToOther/365)*0.7));
      kmSum+=match.targetKm*otherWeight;
      dpSum+=match.targetDp*otherWeight;
      weightSum+=otherWeight;
    });

    const optKm=round1(kmSum/weightSum);
    const optDp=Math.round(dpSum/weightSum);

    // En kДұsДұtlayДұcДұ fazДұ seГ§ (Taper > Zirve > GeliЕҹme > Temel)
    const fazOnc={Taper:4,Zirve:3,GeliЕҹme:2,Temel:1,'YarДұЕҹ SonrasДұ':0};
    let enKДұsДұtlayДұcДұFaz=wk.phase;
    digerPlanlar.forEach(({plan:dp2})=>{
      const match=dp2.find(w2=>Math.abs(w2.weekStart-wk.weekStart)<7*864e5);
      if(match&&(fazOnc[match.phase]||0)>(fazOnc[enKДұsДұtlayДұcДұFaz]||0))
        enKДұsДұtlayДұcДұFaz=match.phase;
    });

    // Faz Taper ise km'yi orijinal taper hedefine sДұnДұrla
    const finalKm=enKДұsДұtlayДұcДұFaz==='Taper'?Math.min(optKm,wk.targetKm):optKm;
    const finalDp=enKДұsДұtlayДұcДұFaz==='Taper'?Math.min(optDp,wk.targetDp):optDp;

    const changed=Math.abs(finalKm-wk.targetKm)>0.5||Math.abs(finalDp-wk.targetDp)>50;
    return{
      ...wk,
      targetKm:finalKm, targetDp:finalDp,
      phase:enKДұsДұtlayДұcДұFaz,
      _optimize:changed,
      _origKm:wk.targetKm, _origDp:wk.targetDp
    };
  });
}

function calcWeeklyTargetsCore(athlete, races, workouts, primary){
  if(!athlete||!primary)return[];
  const today=new Date();
  const raceDate=new Date(primary.tarih+'T12:00:00');
  const prepWeeks=parseInt(primary.prep_weeks)||16;
  const km=parseFloat(primary.mesafe)||0;
  const dp=parseFloat(primary.d_plus)||0;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';

  const taperW=parseInt(primary.taper_w)||(km>42?3:km>21?2:1);
  const peakW=parseInt(primary.peak_w)||(km>42?4:km>21?3:2);
  const buildW=prepWeeks-taperW-peakW;

  const siklikStr=athlete.dinlenme_siklik||'3x1';
  const [siklikBlok,siklikDin]=(siklikStr.split('x').map(Number));

  // GeГ§miЕҹ haftalarДұn gerГ§ekleЕҹme durumunu hesapla вҖ” telafi iГ§in
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete.id);

  // Г–nce tГјm haftalarДұ hesapla (telafi iГ§in Г¶nce plan gerekli)
  const baseWeeks=[];
  for(let w=0;w<prepWeeks;w++){
    const weekStart=new Date(raceDate);
    weekStart.setDate(raceDate.getDate()-(prepWeeks-w)*7);
    const dow=weekStart.getDay();
    const diffToMon=dow===0?-6:1-dow;
    weekStart.setDate(weekStart.getDate()+diffToMon);
    weekStart.setHours(0,0,0,0);
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);weekEnd.setHours(23,59,59,999);
    const daysToRace=Math.ceil((raceDate-weekStart)/864e5);
    const isCurrent=weekStart<=today&&weekEnd>=today;
    const isPast=weekEnd<today;

    let phase;
    if(w>=prepWeeks-taperW)phase='Taper';
    else if(w>=prepWeeks-taperW-peakW)phase='Zirve';
    else if(w>=buildW*0.5)phase='GeliЕҹme';
    else phase='Temel';

    const isRecovery=(()=>{
      if(phase==='Taper'||phase==='Zirve')return false;
      const posInBlock=(w%siklikBlok);
      return posInBlock>=(siklikBlok-siklikDin);
    })();

    let kmPct;
    if(phase==='Taper'){
      const taperIdx=w-buildW-peakW;
      // Zirve haftasДұnda yeterli uzun koЕҹu yapДұlmДұЕҹ mДұ?
      // Son 2 haftadaki en uzun koЕҹuya bak (athWks mevcut deДҹilse gГјvenli fallback)
      let peakMissed=false;
      try{
        const targetLongKm=(km||0)*0.32;
        const twoWeeksAgo=new Date(today);twoWeeksAgo.setDate(today.getDate()-14);
        const bestPeakKm=(athWks||[]).filter(w=>{
          const d=new Date(w.date+'T12:00:00');
          return d>=twoWeeksAgo&&['uzun','tirmanis','back_to_back'].includes(w.tur||'');
        }).reduce((mx,w)=>Math.max(mx,parseFloat(w.mesafe)||0),0);
        peakMissed=taperIdx===0&&targetLongKm>0&&bestPeakKm<targetLongKm*0.7;
      }catch(e){}
      kmPct=peakMissed?0.70:(taperIdx===0?0.6:taperIdx===1?0.45:0.30);
    } else if(phase==='Zirve'){
      kmPct=isRecovery?0.65:0.85+0.05*(w-buildW);
    } else {
      const prog=Math.min(1,(w+1)/buildW);
      kmPct=isRecovery?prog*0.5:0.40+prog*0.40;
    }

    const baseKm=km<=21?km*0.8:km<=42?km*0.7:km*0.55;
    const targetKm=round1(baseKm*kmPct);
    const baseDp=isTrail?dp*0.6:dp*0.2;
    const targetDp=Math.round(baseDp*kmPct*(isRecovery?0.5:1));

    // GeГ§miЕҹ hafta gerГ§ekleЕҹen km ve dp
    let actualKm=0, actualDp=0;
    if(isPast){
      const wWks=athWks.filter(w=>{const d=new Date(w.date+'T12:00:00');return d>=weekStart&&d<=weekEnd;});
      actualKm=round1(wWks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
      actualDp=Math.round(wWks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0));
    }

    // GerГ§ekleЕҹme durumu
    const kmRatio=targetKm>0?(actualKm/targetKm):null;
    let weekStatus='normal'; // normal | dinlenme_otomatik | eksik | yeterli
    if(isPast&&kmRatio!==null){
      if(kmRatio<0.40)weekStatus='dinlenme_otomatik';
      else if(kmRatio<0.70)weekStatus='eksik';
      else weekStatus='yeterli';
    }

    baseWeeks.push({
      weekIdx:w+1,weekStart,weekEnd,phase,isRecovery,
      targetKm,targetDp,daysToRace,
      isPast,isCurrent:weekStart<=today&&weekEnd>=today,
      actualKm,actualDp,kmRatio,weekStatus,
      _kmPct:kmPct,_baseKm:baseKm,_baseDp:baseDp,_isRecovery:isRecovery
    });
  }

  // Telafi mantДұДҹДұ: geГ§miЕҹ haftalara gГ¶re gelecek hafta hedeflerini dГјzelt
  // KГјmГјlatif telafi faktГ¶rГј вҖ” birden fazla eksik hafta birikebilir (max Вұ%20)
  let telafiKm=0, telafiDp=0;
  const weeks=baseWeeks.map((wk,i)=>{
    if(wk.isPast){
      // GeГ§miЕҹ hafta bitti вҖ” telafi birikimini gГјncelle
      if(wk.weekStatus==='dinlenme_otomatik'){
        // Kaybedilen yГјkГј sonraki 3 haftaya yay (%10 artДұЕҹ)
        telafiKm+=wk.targetKm*0.10;
        telafiDp+=wk.targetDp*0.10;
      } else if(wk.weekStatus==='eksik'){
        // Eksik yГјkГј sonraki 2 haftaya yay (%5 artДұЕҹ)
        telafiKm+=wk.targetKm*0.05;
        telafiDp+=wk.targetDp*0.05;
      }
      return{...wk,telafiUygulandДұ:false};
    }

    // Gelecek/mevcut hafta вҖ” birikmiЕҹ telafiyi uygula
    // Taper ve Zirve haftalarДұnda telafi yok
    if(wk.phase==='Taper'||wk.phase==='Zirve'||telafiKm<=0){
      return{...wk,telafiUygulandДұ:false};
    }

    // Bu haftaya max %15 telafi uygula, kalanДұ sonraya bДұrak
    const buHaftaTelafi=Math.min(telafiKm,wk.targetKm*0.15);
    const buHaftaTelafiDp=Math.min(telafiDp,wk.targetDp*0.15);
    telafiKm=Math.max(0,telafiKm-buHaftaTelafi);
    telafiDp=Math.max(0,telafiDp-buHaftaTelafiDp);

    return{
      ...wk,
      targetKm:round1(wk.targetKm+buHaftaTelafi),
      targetDp:Math.round(wk.targetDp+buHaftaTelafiDp),
      telafiUygulandДұ:buHaftaTelafi>0,
      telafiKm:round1(buHaftaTelafi),
      telafiDp:Math.round(buHaftaTelafiDp),
      // Dinlenme otomatik iЕҹaretliyse planДұ dinlenme haftasДұna Г§evir
      isRecovery:wk.weekStatus==='dinlenme_otomatik'?true:wk.isRecovery
    };
  });

  return weeks;
}

// в”Җв”Җ GГјnГјn AntrenmanДұ Motoru (yeniden yazДұldДұ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function recommendWorkout(athlete, history, races, workoutsThisWeek, allWorkouts, planMode='optimize', planTodayDay=null){
  if(!athlete) return null;
  const last=history[history.length-1];
  const today=new Date();
  const dayShort=DAYS_SHORT[today.getDay()];
  const dayOfWeek=DAYS_TR[today.getDay()];

  // в”Җв”Җ Temel fitness metrikleri в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const ctl=last?.ctl||0;
  const tsb=last?.tsb||0;
  const acwr=last?.acwr||1.0;
  const mechCtl=last?.mechCtl||0;
  const mechAtl=last?.mechAtl||0;
  const phase=last?.phase||'Temel';

  // в”Җв”Җ Sporcu profili в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const hrv=athlete.hrv_durum||'';
  const hrv7=parseFloat(athlete.hrv_7gun)||0;
  const inj=parseInt(athlete.sakatlДұk)||1;
  const motiv=parseInt(athlete.motivasyon)||3;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';
  const uzunGun=Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean);
  const kosuGunleri=athlete.kosu_gunleri||[];
  const caprazGunleri=athlete.capraz_gunleri||[];
  const lthr=parseFloat(athlete.lthr)||0;
  const ftp=parseFloat(athlete.ftp)||0;
  const vo2max=parseFloat(athlete.vo2max)||0;
  const zones=calcZones(athlete);
  const band=ctlBand(ctl);

  // в”Җв”Җ YarДұЕҹ bilgileri в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const {primary:nextRace,intermediate}=selectRaces(athlete,races);
  const daysToRace=nextRace?Math.ceil((new Date(nextRace.tarih+'T12:00:00')-today)/864e5):null;

  // в”Җв”Җ Bu haftanДұn yГјkГј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const wkMetrics=(workoutsThisWeek||[]).map(w=>({w,m:calcMetrics(w,athlete)}));
  const wkLoad=round1(wkMetrics.reduce((s,{m})=>s+(m.yukObj||0),0));
  const wkSessions=(workoutsThisWeek||[]).length;
  const wkKm=round1((workoutsThisWeek||[]).reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
  const targetWeeklyLoad=ctl>0?round1(ctl*7):null;
  const remainingLoad=targetWeeklyLoad?Math.max(0,round1(targetWeeklyLoad-wkLoad)):null;

  // в”Җв”Җ IF trendi в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const wkIFs=wkMetrics.map(({m})=>m.IF).filter(v=>v>0);
  const meanIF=wkIFs.length?round2(wkIFs.reduce((s,v)=>s+v,0)/wkIFs.length):null;
  const ifOverloaded=meanIF!=null&&meanIF>0.90;

  // в”Җв”Җ GГјГ§ yГјkГј analizi в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const wkHasPower=wkMetrics.some(({w})=>parseFloat(w.ort_guc)>0);
  const wkPTSS=wkMetrics.reduce((s,{m})=>s+(m.pTSS||0),0);
  const powerOverload=wkHasPower&&wkPTSS>0&&wkLoad>0&&(wkPTSS/wkLoad)>1.30;

  // в”Җв”Җ Aerobik verimlilik trendi в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const recentAerEff=history.slice(-28).filter(d=>d.aerEff!=null).map(d=>d.aerEff);
  const olderAerEff=history.slice(-56,-28).filter(d=>d.aerEff!=null).map(d=>d.aerEff);
  const avgRecent=recentAerEff.length?recentAerEff.reduce((s,v)=>s+v,0)/recentAerEff.length:null;
  const avgOlder=olderAerEff.length?olderAerEff.reduce((s,v)=>s+v,0)/olderAerEff.length:null;
  const aerEffDecline=avgRecent!=null&&avgOlder!=null&&(avgRecent-avgOlder)>5;

  // в”Җв”Җ NГ¶romГјskГјler yГјk oranДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const mechRatio=ctl>5?(mechCtl/ctl):0;
  const mechOverload=mechRatio>0.18;

  // в”Җв”Җ Mekanik ATL/CTL oranДұ (akut mekanik aЕҹДұrДұ yГјk) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const mechAtlCtlRatio=(mechCtl>0)?(mechAtl/mechCtl):1;
  const mechAclOverload=mechAtlCtlRatio>1.3;

  // в”Җв”Җ Mekanik/KardiyovaskГјler denge в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Mech CTL / Kardio CTL < 0.6 вҶ’ kaslar/tendonlar kardiyovaskГјler sisteme yetiЕҹemiyor
  const mechKardioRatio=ctl>5?(mechCtl/ctl):null;
  const mechKardioImbalance=mechKardioRatio!==null&&mechKardioRatio<0.6;

  // в”Җв”Җ HRV 7g dГјЕҹГјklГјДҹГј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const hrv7Low=hrv7>0&&hrv7<50;

  // в”Җв”Җ VO2max/CTL uyumu в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const ctlVo2Ratio=vo2max>0?ctl/vo2max:0;
  const ctlNearCap=ctlVo2Ratio>1.8;

  // в”Җв”Җ HaftalДұk km hedef в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const weekTargets=calcWeeklyTargets(athlete,races,allWorkouts||[],planMode==='optimize');
  const thisWeekTarget=weekTargets.find(wt=>wt.isCurrent);
  const targetKm=thisWeekTarget?.targetKm||0;
  const kmDeficit=targetKm>0&&wkKm<targetKm*0.5&&wkSessions>=2;

  // в”Җв”Җ GГјn belirleme в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const isKosuGunu=kosuGunleri.includes(dayShort);
  const isCaprazGunu=caprazGunleri.includes(dayShort);
  const isUzunGun=uzunGun.includes(dayShort);
  const isAntrenmanGunu=isKosuGunu||isCaprazGunu;

  // в”Җв”Җ UyarДұ ve blokerlar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const warnings=[];
  const blockers=[];
  if(inj>=8) blockers.push({icon:'рҹҡ‘',text:'SakatlДұk puanДұ '+inj+'/10 вҖ” antrenman Г¶nerilmez.'});
  if(acwr>1.5) blockers.push({icon:'вҡ ',text:'ACWR '+acwr.toFixed(2)+' вҖ” aЕҹДұrДұ yГјk riski. Dinlenme zorunlu.'});
  if(hrv==='dГјЕҹГјk') warnings.push({icon:'рҹ“ү',text:'HRV dГјЕҹГјk вҖ” hafif toparlanma.'});
  if(hrv==='dengesiz') warnings.push({icon:'рҹ“Ҡ',text:'HRV dengesiz вҖ” Z3 Гјzerine Г§ДұkmayДұn.'});
  if(hrv7Low) warnings.push({icon:'рҹ“ү',text:'HRV 7g ortalamasДұ '+hrv7+'ms вҖ” kГјmГјlatif stres. YoДҹunluk sДұnДұrlДұ.'});
  if(inj>=5&&inj<8) warnings.push({icon:'рҹ©№',text:'SakatlДұk '+inj+'/10 вҖ” yoДҹunluДҹu sДұnДұrlДұ tutun.'});
  if(tsb< -20) warnings.push({icon:'вңЁ',text:'TSB '+tsb.toFixed(1)+' вҖ” ciddi yorgunluk.'});
  if(acwr>1.3) warnings.push({icon:'рҹ“Ҳ',text:'ACWR '+acwr.toFixed(2)+' вҖ” yГјk kontrolГј.'});
  if(motiv<=2) warnings.push({icon:'вңЁ',text:'Motivasyon dГјЕҹГјk вҖ” kДұsa ve keyifli.'});
  if(daysToRace!=null&&daysToRace<=7) warnings.push({icon:'рҹҸҒ',text:'YarДұЕҹa '+daysToRace+' gГјn kaldДұ вҖ” taper.'});
  if(ifOverloaded) warnings.push({icon:'вҡЎ',text:'Son hafta IF ortalamasДұ '+meanIF+' вҖ” kronik yГјksek yoДҹunluk. Aerobik taban gerekli.'});
  if(powerOverload) warnings.push({icon:'рҹ’Ә',text:'GГјГ§ yГјkГј HR yГјkГјnden orantДұsДұz yГјksek вҖ” nГ¶romГјskГјler aЕҹДұrДұ yГјk riski.'});
  if(aerEffDecline) warnings.push({icon:'рҹ“ү',text:'Aerobik verimlilik son 4 haftada kГ¶tГјleЕҹiyor (aynДұ nabДұzda daha yavaЕҹ) вҖ” yorgunluk birikimi iЕҹareti.'});
  if(mechOverload) warnings.push({icon:'рҹҸ”',text:'Mekanik yГјk oranДұ yГјksek (%'+Math.round(mechRatio*100)+') вҖ” dГјz antrenman Г¶nerilir.'});
  if(mechAclOverload) warnings.push({icon:'рҹҰө',text:'Akut mekanik yГјk kronik ortalamanДұn Г§ok Гјzerinde (ATL/CTL: '+round1(mechAtlCtlRatio)+') вҖ” tendon/kas dokusu aЕҹДұrДұ yГјk riski.'});
  if(mechKardioImbalance) warnings.push({icon:'рҹ«Җ',text:'KardiyovaskГјler kondisyon mekanik kondisyonun Г¶nГјnde (Mech/Kardio: '+round1(mechKardioRatio)+') вҖ” bu hafta mekanik yГјk yerine aerobik Г¶ncelikli.'});
  if(ctlNearCap) warnings.push({icon:'рҹ”қ',text:'CTL/VO2max oranДұ yГјksek ('+ctlVo2Ratio.toFixed(2)+') вҖ” fitness tavan yakДұn. Hacmi koruyun.'});
  if(kmDeficit) warnings.push({icon:'рҹ“Ҹ',text:'HaftalДұk km hedefinin gerisinde ('+wkKm+'/'+targetKm+'km). SГјre artДұrДұlabilir.'});

  if(blockers.length>0||!isAntrenmanGunu){
    return{tip:'dinlenme',baslik:'Dinlenme',aciklama:blockers.length>0?blockers[0].text:'BugГјn antrenman programДұnda yok.',sure_dk:0,yapilar:[],warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1};
  }

  // в”Җв”Җ yMod: tГјm toparlanma sinyalleri birleЕҹik в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let yMod=hrvMod(hrv);
  if(inj>=5)        yMod=Math.min(yMod,0.80);
  if(tsb< -20)      yMod=Math.min(yMod,0.80);
  else if(tsb< -15) yMod=Math.min(yMod,0.85);
  if(acwr>1.4)      yMod=Math.min(yMod,0.80);
  else if(acwr>1.3) yMod=Math.min(yMod,0.88);
  if(motiv<=2)      yMod=Math.min(yMod,0.85);
  if(hrv7Low)       yMod=Math.min(yMod,0.85);
  if(aerEffDecline) yMod=Math.min(yMod,0.90);
  if(powerOverload) yMod=Math.min(yMod,0.88);
  if(mechAclOverload) yMod=Math.min(yMod,0.82); // akut mekanik aЕҹДұrДұ yГјk вҶ’ belirgin dГјЕҹГјЕҹ

  const kaliteliYapildi=(workoutsThisWeek||[]).some(w=>['interval','esik','tempo','yokus_kisa','yokus_uzun'].includes(w.tur));
  const uzunYapildi=(workoutsThisWeek||[]).some(w=>['uzun','tirmanis'].includes(w.tur));

  const athAllWorkouts=(allWorkouts||[]).filter(w=>w.athleteId===athlete.id);
  const zoneDist4w=calcPeriodZoneDist(athAllWorkouts,athlete,4);
  const zoneStatus=zoneDist4w?zoneDist_status(zoneDist4w):null;
  if(zoneStatus){
    zoneStatus.issues.forEach(i=>warnings.push({icon:'рҹ“Ҡ',text:i.msg}));
    if(zoneStatus.flags.length>0) warnings.push({icon:'рҹ’Ў',text:zoneStatus.flags[0].msg});
  }
  const anaPctHigh=zoneDist4w&&zoneDist4w.anaPct>15;
  const lowPctLow=zoneDist4w&&zoneDist4w.lowPct<65;
  const dpHedefGun=thisWeekTarget&&!uzunYapildi?Math.round(thisWeekTarget.targetDp*0.6):0;

  // в”Җв”Җ Disiplin bayraklarДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const isYol=disiplin==='yol';
  const isUltra=disiplin==='ultra';
  const isKarma=disiplin==='karma';
  const isPatika=disiplin==='patika';
  const b2bYapildi=(workoutsThisWeek||[]).filter(w=>w.tur==='uzun').length>=2;
  const karmaYolYapildi=(workoutsThisWeek||[]).some(w=>w.spor==='kosu'&&!w.yapi_notu?.includes('arazi')&&['aerobik','tempo','esik','interval'].includes(w.tur));

  // Zorunlu toparlanma sinyalleri
  // mechAclOverload: akut mekanik aЕҹДұrДұ yГјk вҶ’ yoДҹun/mekanik antrenman iptal
  // mechKardioImbalance: kaslar kardiyoya yetiЕҹemiyor вҶ’ mekanik yГјk yerine aerobik
  const acwrOverload=acwr>1.3; // ACWR 1.3+ вҶ’ yoДҹun antrenman engelle
  const forceEasy=anaPctHigh||ifOverloaded||mechOverload||mechAclOverload||acwrOverload||(powerOverload&&wkSessions>=2);
  // Zone daДҹДұlДұmДұ kritik bozuksa (lowPct<%65) kaliteliYapildi'ye bakmaksДұzДұn yoДҹun antrenman engelle
  // Bir gГјnlГјk aerobik 4 haftalДұk dengesizliДҹi telafi edemez
  const zoneCritical=lowPctLow&&(zoneDist4w?.lowPct||100)<55; // %55 altДұ kritik eЕҹik
  const forceLow=(lowPctLow&&!kaliteliYapildi&&wkSessions>=1)||mechKardioImbalance||zoneCritical;

  // в”Җв”Җ planDay'den bugГјnГјn temel Г¶nerisini al в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // wkStats: planDay'in ihtiyacДұ olan haftalДұk durum
  // Son uzun koЕҹular вҖ” tplUzun progresyon hesabДұ iГ§in
  // Etiketten baДҹДұmsДұz, her haftanДұn en uzun koЕҹusu
  const recentLongRunsForPlan = (()=>{
    const kosuWks = (allWorkouts||[]).filter(w=>w.athleteId===athlete.id&&w.date&&(w.spor==='kosu'||!w.spor));
    const byWeek = {};
    kosuWks.forEach(w=>{
      const d = new Date(w.date+'T12:00:00');
      const day = d.getDay();
      const diffToMon = day===0?-6:1-day;
      const mon = new Date(d); mon.setDate(d.getDate()+diffToMon);
      const wk = mon.toISOString().split('T')[0];
      const sureDk = Math.round((toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0)/60);
      const km = parseFloat(w.mesafe)||0;
      const efektifDk = sureDk || Math.round(km*5);
      if(!byWeek[wk]||efektifDk>byWeek[wk].sure_dk){
        byWeek[wk]={date:w.date, sure_dk:efektifDk, km};
      }
    });
    return Object.values(byWeek)
      .filter(w=>w.sure_dk>30)
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
      .slice(0,6);
  })();

  const wkStatsForPlan={
    count:wkSessions,
    kaliteliYok:!kaliteliYapildi,
    uzunYapildi,
    wkLoad,
    dpHedefHafta:thisWeekTarget?.targetDp||0,
    weekOff: Math.floor((history.length||0)/7),
    isFutureWeek: false,
    recentLongRuns: recentLongRunsForPlan,
  };
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const simStateToday={
    atl:last?.atl||0, ctl:last?.ctl||0,
    tsb:last?.tsb||0, acwr:last?.acwr||1.0,
    mechCtl:last?.mechCtl||0, mechAtl:last?.mechAtl||0
  };
  const {primary:nextRaceForPlan,intermediate:intermediateForPlan}=selectRaces(athlete,races);
  const daysToIntermediate=intermediateForPlan.length
    ?Math.ceil((new Date(intermediateForPlan[0].tarih+'T12:00:00')-today)/864e5):null;

  // planTodayDay varsa (generateTwoWeekPlan'dan geldi) onu kullan вҖ” haftalДұk planla tutarlДұlДұk
  // yoksa planDay'i doДҹrudan Г§aДҹДұr (fallback)
  let tpl=planTodayDay||planDay(todayStr,athlete,simStateToday,phase,daysToRace,daysToIntermediate,
    wkStatsForPlan,kosuGunleri,caprazGunleri);

  // Dinlenme veya antrenman gГјnГј deДҹilse hemen dГ¶n
  if(tpl.tip==='dinlenme'||!isAntrenmanGunu){
    return{...tpl,warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,
      phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1,
      zoneDist4w,zoneStatus};
  }

  // в”Җв”Җ GГјncel durum override'larДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Bloker varsa dinlenmeye zorla
  if(blockers.length>0){
    return{tip:'dinlenme',baslik:'Dinlenme',
      aciklama:blockers[0].text,sure_dk:0,yapilar:[],
      warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,
      phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1,
      zoneDist4w,zoneStatus};
  }

  // yMod ile sГјreyi gГјncelle вҖ” planDay kendi yMod'unu kullandДұ, biz gГјncel sinyallerle yeniden uygularДұz
  tpl={...tpl, sure_dk:Math.round((tpl.sure_dk||45)*yMod)};

  // TГјm yoДҹun antrenman tГјrleri
  const YOGUN_TURLER=['interval','esik','tempo','yokus_kisa','yokus_uzun',
    'piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','tirmanis'];

  // в”Җв”Җ Toparlanma sГјresi kontrolГј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Son antrenmanДұn recovery_hedef'i geГ§mediyse yГјkГј azalt
  const now_plan=new Date();
  const recoveryKalanSaat=wkStats.sonRecoveryHedef
    ?Math.max(0,Math.round((wkStats.sonRecoveryHedef-now_plan)/3600000))
    :0;
  const henuzToparlanmadi=recoveryKalanSaat>0&&!isPast&&!isToday;
  if(henuzToparlanmadi&&!forceEasy){
    // Toparlanma bitmemiЕҹ вҖ” yГјkГј %20-40 azalt, uyarДұ ver
    const kalanOran=Math.min(1,recoveryKalanSaat/24);
    tpl={...tpl,sure_dk:Math.round(tpl.sure_dk*(1-kalanOran*0.35))};
    warnings.push({icon:'вҸұ',text:`Toparlanma sГјresi devam ediyor вҖ” ~${recoveryKalanSaat}sa kaldДұ. SГјre kДұsaltДұldДұ.`});
  }

  // в”Җв”Җ Д°deal antrenman tipi kararДұ: yГјk/yorgunluk/toparlanmaya gГ¶re в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(forceEasy&&!['dinlenme','kolay','capraz'].includes(tpl.tip)){
    const orijinalTip=tpl.tip;
    const gunSirasi=wkStats.count||0;
    let nedenler=[];
    let secilenTip='kolay';
    let secilenSure=Math.round(40*yMod);

    if(tsb< -20){nedenler.push('TSB '+tsb.toFixed(1)+' (Г§ok yorgun)');secilenSure=Math.round(30*yMod);}
    else if(acwr>1.4){nedenler.push('ACWR '+acwr.toFixed(2)+' (yГјk yГјksek)');secilenSure=Math.round(35*yMod);}
    else if(acwr>1.3){nedenler.push('ACWR '+acwr.toFixed(2)+' (yГјk biraz yГјksek)');secilenSure=Math.round(45*yMod);}
    if(henuzToparlanmadi){nedenler.push('toparlanma bitmedi ('+recoveryKalanSaat+'sa)');secilenSure=Math.round(secilenSure*0.8);}
    if(inj>=5){nedenler.push('sakatlДұk puanДұ '+inj+'/10');secilenSure=Math.round(secilenSure*0.85);}

    // HaftanДұn ilk gГјnГј kolay, ikinci gГјn aerobik (Г§eЕҹitlilik)
    if(gunSirasi===0||tsb< -20){
      secilenTip='kolay';
      tpl={...tplKolay(band,secilenSure,zones),sure_dk:secilenSure,_downgraded:true,_originalTip:orijinalTip};
    } else if(gunSirasi===1&&tsb>-15&&acwr<1.4){
      secilenTip='aerobik';
      secilenSure=Math.round(50*yMod);
      tpl={...tplAerobik(band,secilenSure,zones,disiplin),sure_dk:secilenSure,_downgraded:true,_originalTip:orijinalTip};
    } else {
      // 3. gГјn veya daha fazla вҖ” Г§ok kДұsa kolay
      secilenSure=Math.round(35*yMod);
      tpl={...tplKolay(band,secilenSure,zones),sure_dk:secilenSure,_downgraded:true,_originalTip:orijinalTip};
    }
    warnings.push({icon:'рҹ”„',text:`"${orijinalTip}" вҶ’ ${secilenTip} (${secilenSure}dk): ${nedenler.join(', ')}`});
  } else if(forceLow&&YOGUN_TURLER.includes(tpl.tip)){
    const orijinalTip=tpl.tip;
    const gunSirasi=wkStats.count||0;
    const sureDk=Math.round([55,60,50][gunSirasi%3]*yMod);
    let nedenler=[];
    if(mechKardioImbalancePlan)nedenler.push('mekanik/kardio oranДұ dГјЕҹГјk');
    if(henuzToparlanmadi)nedenler.push('toparlanma bitmedi');
    tpl={...tplAerobik(band,sureDk,zones,disiplin),sure_dk:sureDk,_downgraded:true,_originalTip:orijinalTip};
    warnings.push({icon:'рҹ”„',text:`"${orijinalTip}" вҶ’ aerobik (${sureDk}dk): ${nedenler.join(', ')||'aerobik taban Г¶ncelikli'}`});
  }

  // в”Җв”Җ SГјre artДұrДұmДұ: toparlanma tamamsa ve TSB iyiyse в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(!forceEasy&&!forceLow&&!isPast&&tsb>5&&acwr<1.1&&recoveryKalanSaat===0
    &&['aerobik','uzun','kolay'].includes(tpl.tip)){
    const bonus=tsb>15?10:5;
    const eskiSure=tpl.sure_dk;
    tpl={...tpl,sure_dk:Math.min(tpl.sure_dk+bonus,Math.round(130*yMod))};
    if(tpl.sure_dk>eskiSure){
      warnings.push({icon:'рҹ“Ҳ',text:`TSB ${tsb.toFixed(1)} iyi, ACWR ${acwr?.toFixed(2)||'вҖ”'} dГјЕҹГјk вҖ” sГјre ${eskiSure}dkвҶ’${tpl.sure_dk}dk artДұrДұldДұ`});
    }
  }

  // в”Җв”Җ Km hedefine gГ¶re sГјre dГјzeltmesi в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(kmDeficit&&tpl.tip==='aerobik'&&targetKm>0){
    const extraMin=Math.min(20,Math.round((targetKm-wkKm)*6));
    if(extraMin>5){
      tpl.sure_dk=Math.min(tpl.sure_dk+extraMin,Math.round(120*yMod));
      tpl.yapilar=tpl.yapilar.map((y,i)=>i===1?{...y,detay:y.detay+' (+'+extraMin+'dk km hedefi iГ§in)'}:y);
    }
  }

  // в”Җв”Җ FTP varsa gГјГ§ hedeflerini yapДұya ekle в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(ftp>0&&['esik','tempo','interval'].includes(tpl.tip)){
    const powerTargets={esik:`${Math.round(ftp*0.88)}вҖ“${Math.round(ftp*0.95)}W`,tempo:`${Math.round(ftp*0.76)}вҖ“${Math.round(ftp*0.90)}W`,interval:`${Math.round(ftp*1.00)}вҖ“${Math.round(ftp*1.20)}W`};
    const pTarget=powerTargets[tpl.tip];
    if(pTarget) tpl.yapilar=tpl.yapilar.map((y,i)=>i===1?{...y,detay:y.detay+' В· GГјГ§ hedefi: '+pTarget}:y);
  }

  const TIP_NAMES_LOCAL={kolay:'Kolay KoЕҹu',aerobik:'Aerobik KoЕҹu',uzun:'Uzun KoЕҹu',tempo:'Tempo',esik:'EЕҹik',interval:'Д°nterval',piramit:'Д°nterval Piramit',kesintisiz_piramit:'Kesintisiz Piramit',yokus_kisa:'KДұsa YokuЕҹ TekrarДұ',yokus_uzun:'Uzun YokuЕҹ',tirmanis:'TДұrmanДұЕҹ KoЕҹusu',teknik:'Teknik Д°niЕҹ',acici:'AГ§ДұcДұ',capraz:'ГҮapraz Antrenman',dinlenme:'Dinlenme'};
  // Eski snapshot'larda tip deДҹeri baslik olarak saklДұ olabilir вҶ’ normalize et
  const fixBaslik=(b,tip)=>TIP_NAMES_LOCAL[b]||b;
  return{
    ...tpl,baslik:TIP_NAMES_LOCAL[tpl.tip]||tpl.tip,
    aciklama:tpl.yapilar.map(y=>y.baslik).join(' вҶ’ '),
    warnings,blockers:[],
    isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,phase,acwr,tsb,hrv,
    wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod,
    zoneDist4w,zoneStatus,
    meanIF,mechRatio:round2(mechRatio),aerEffDecline,forceEasy,forceLow,
  };
}

function simulateFuture(lastHistory, plannedLoads){
  // lastHistory: mevcut history dizisinin son elemanДұ
  // plannedLoads: [{date, load}] вҖ” planlanan gГјnlГјk yГјkler
  let atl=lastHistory?.atl||0;
  let ctl=lastHistory?.ctl||0;
  return plannedLoads.map(p=>{
    atl=p.load*О»_atl+atl*(1-О»_atl);
    ctl=p.load*О»_ctl+ctl*(1-О»_ctl);
    return{date:p.date,atl:round1(atl),ctl:round1(ctl),tsb:round1(ctl-atl),acwr:ctl>1?round2(atl/ctl):null};
  });
}

// YarДұЕҹ zorluДҹu skoru
function raceDiffScore(r){
  const km=parseFloat(r.mesafe)||0;
  const dp=parseFloat(r.d_plus)||0;
  const iklim=parseInt(r.iklim_zorluk)||1;
  const altAvg=(parseFloat(r.maks_irtifa||0)+parseFloat(r.min_irtifa||0))/2;
  return km+(dp/100)+(iklim-1)*5+(altAvg>800?(altAvg-800)/200:0);
}

// Hedef yarДұЕҹ seГ§imi: en zor upcoming вҶ’ birincil, Г¶ncesindekiler вҶ’ ara
function selectRaces(athlete, races){
  const today=new Date();
  // Geriye dГ¶nГјk uyumluluk: yarДұslar string[] veya {id,oncelik}[] olabilir
  const athRaces=(athlete.yarДұslar||[]).map(x=>typeof x==='string'?{id:x,oncelik:'A'}:x);
  const athIds=athRaces.map(x=>x.id);
  const oncelikMap=Object.fromEntries(athRaces.map(x=>[x.id,x.oncelik||'A']));

  const upcoming=(races||[])
    .filter(r=>athIds.includes(r.id)&&new Date(r.tarih+'T12:00:00')>today)
    .sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));
  if(!upcoming.length)return{primary:null,intermediate:[]};

  // __force ile manuel override
  const forced=upcoming.find(r=>r.__force);
  if(forced){
    const intermediate=upcoming.filter(r=>r.id!==forced.id&&new Date(r.tarih)<new Date(forced.tarih));
    return{primary:forced,intermediate};
  }

  // A/B/C Г¶ncelik: en yakДұn A вҶ’ en yakДұn B вҶ’ fallback en zor
  const aRaces=upcoming.filter(r=>oncelikMap[r.id]==='A');
  const bRaces=upcoming.filter(r=>oncelikMap[r.id]==='B');
  const primary=aRaces.length>0 ? aRaces[0]
    : bRaces.length>0 ? bRaces[0]
    : [...upcoming].sort((a,b)=>raceDiffScore(b)-raceDiffScore(a))[0];

  const intermediate=upcoming.filter(r=>
    r.id!==primary.id && new Date(r.tarih)<new Date(primary.tarih)
  );
  return{primary,intermediate};
}

// Tek gГјn iГ§in plan Гјret (Еҹablon motoru ile)
function planDay(date, athlete, simState, phase, daysToRace, daysToIntermediate, wkStats, kosuGunleri, caprazGunleri, race=null){
  if(!athlete)return{tip:'dinlenme',baslik:'Dinlenme',sure_dk:0,yukHedef:0,yapilar:[],isPast:false,isToday:false};
  const today=new Date();
  const d=new Date(date+'T12:00:00');
  const dayShort=DAYS_SHORT[d.getDay()];
  const dayTR=DAYS_TR[d.getDay()];
  const localToday=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const isPast=date<localToday; // tarih karЕҹДұlaЕҹtДұrmasДұ вҖ” saat farkДұndan etkilenmesin
  const isToday=date===localToday;
  const isKosu=kosuGunleri.includes(dayShort);
  const isCapraz=caprazGunleri.includes(dayShort);
  const isUzunGun=(Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean)).includes(dayShort);
  const isAntrenman=isKosu||isCapraz;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';
  const zones=calcZones(athlete);
  const band=ctlBand(simState.ctl||0);
  const acwr=simState.acwr||1.0;
  const tsb=simState.tsb||0;
  const hrv=athlete.hrv_durum||'';
  const inj=parseInt(athlete.sakatlДұk)||1;
  const yMod=Math.min(hrvMod(hrv),inj>=5?0.80:tsb< -15?0.85:acwr>1.3?0.85:1.0);

  const REST={date,dayTR,dayShort,tip:'dinlenme',baslik:'Dinlenme',sure_dk:0,yukHedef:0,yapilar:[],isPast,isToday,simState,phase};
  // SeГ§ili antrenman gГјnГј deДҹilse kesinlikle dinlenme
  if(!isAntrenman) return REST;

  const isSimulatedFuture=!isPast&&(wkStats.isFutureWeek===true);
  // ГҮapraz gГјnler ACWR bloДҹundan muaf
  const acwrEsik=isCapraz&&!isKosu?99:(isSimulatedFuture?99:1.5);

  // SakatlДұk >=8 вҖ” tek zorunlu dinlenme durumu
  if(inj>=8) return{...REST,baslik:'Zorunlu Dinlenme',uyari:'SakatlДұk puanДұ yГјksek ('+inj+'/10)',yapilar:[{baslik:'Dinlenme',detay:'SakatlДұk nedeniyle zorunlu dinlenme'}]};

  const uzunGunTanimli=(Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean)).length>0;
  const dpGun=wkStats.uzunYapildi&&phase!=='Zirve'?0:Math.round((wkStats.dpHedefHafta||0)*0.6);
  const sonYogunGun=wkStats.sonYogunGun||false;
  const haftaGunTipi=wkStats.haftaGunTipi||null;

  // в”Җв”Җ Test gГјnГј kontrolГј вҖ” test planlanmДұЕҹsa test antrenmanДұnДұ ver в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const testPlan=wkStats.testPlanlar&&wkStats.testPlanlar.find(p=>p.athId===athlete.id&&p.date===date);
  if(testPlan&&isKosu){
    const testTur=TEST_TURLERI[testPlan.testTur];
    if(testTur){
      const yukFactor={interval:2.1,esik:1.7,aerobik:1.1,kolay:0.8}[testTur.tip]||1.1;
      const sure=Math.round((testTur.sure_dk||45)*yMod);
      const yukHedef=Math.round(sure*yukFactor);
      return{
        tip:testTur.tip,
        baslik:testTur.icon+' '+testTur.ad,
        sure_dk:sure,yukHedef,
        yapilar:testTur.yapilar||[],
        aciklama:testTur.amac,
        isTest:true, testTur:testPlan.testTur,
        isPast,isToday,simState,phase,yMod,date,dayTR,dayShort
      };
    }
  }

  // TSB/ACWR durumuna gГ¶re zorunlu indirim flag'leri
  const cokYorgun=tsb< -25;
  const yorgun=tsb< -15;
  const yukYuksek=acwr>1.5&&!isSimulatedFuture;
  // Ek gГјvenlik kontrolleri (recommendWorkout ile senkronize)
  const acwrOverloadPlan=acwr>1.3&&!isSimulatedFuture;
  const mechCtlPlan=simState.mechCtl||0;
  const mechAclPlan=simState.mechAtl||simState.atl||0;
  const mechKardioImbalancePlan=simState.ctl>5?(mechCtlPlan/(simState.ctl||1))<0.6:false;
  const YOGUN_TURLER_PLAN=['interval','esik','tempo','yokus_kisa','yokus_uzun',
    'piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','tirmanis'];

  // в”Җв”Җ KoЕҹu antrenmanДұ planla в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let kosuTpl=null;
  let kosuUyari=null;
  if(isKosu){
    // Hafta iskeleti: 'aerobik' gГјnse yoДҹun antrenman verme
    const iskeleteGoreAerobik=haftaGunTipi==='aerobik'&&!isUzunGun;

    // ГҮok yorgun veya yГјk Г§ok yГјksekse вҶ’ kolay koЕҹuya indir
    if((cokYorgun||yukYuksek||acwrOverloadPlan)&&!isSimulatedFuture){
      const sure=Math.round((cokYorgun?30:40)*yMod);
      kosuTpl=tplKolay(band,sure,zones);
      kosuUyari=yukYuksek||acwrOverloadPlan?'ACWR '+acwr.toFixed(2)+' вҖ” yГјk yГјksek, kolay koЕҹuya indirildi':
        'TSB '+tsb.toFixed(1)+' вҖ” Г§ok yorgun, kolay koЕҹuya indirildi';
    } else if(daysToIntermediate!==null&&daysToIntermediate<=2){
      kosuTpl=tplAcici(25,phase);
    } else if(daysToIntermediate!==null&&daysToIntermediate<=7){
      kosuTpl=tplKolay(band,Math.round(35*yMod),zones);
    } else if(phase==='Taper'||(daysToRace!==null&&daysToRace<=7)){
      // Taper'da uzun koЕҹu gГјnГј seГ§ilmiЕҹse:
      // - Д°lk taper haftasДұ (daysToRace > 14): hafifletilmiЕҹ uzun koЕҹu
      // - Son taper haftasДұ (daysToRace <= 14): taper protokolГј (tempo/aГ§ДұcДұ)
      const isTaperFirstWeek=daysToRace!==null&&daysToRace>14;
      const taperPeakMissed=isTaperFirstWeek&&daysToRace<=21
        &&isUzunGun&&!wkStats.uzunYapildi
        &&(wkStats.recentLongRuns||[]).filter(r=>(r?.km||0)>=(parseFloat(race?.mesafe||0)*0.30)).length===0;
      if(isUzunGun&&isTaperFirstWeek&&!cokYorgun){
        // KullanДұcДұ bu gГјnГј uzun koЕҹu gГјnГј olarak seГ§miЕҹ вҖ” hafifletilmiЕҹ uzun koЕҹu ver
        // uzunYapildi olsa bile (Pazartesi yapДұldДұ) seГ§ili uzun koЕҹu gГјnlerine saygДұ gГ¶ster
        const isIkinciUzun=wkStats.uzunYapildi;
        const uzunYMod=Math.min(yMod,taperPeakMissed?0.75:isIkinciUzun?0.55:0.65);
        kosuTpl=isTrail&&dpGun>200
          ?tplTirmanisAcik(band,Math.round(70*uzunYMod),zones,dpGun)
          :tplUzun(band,simState.ctl||0,zones,disiplin,dpGun,wkStats.recentLongRuns);
        kosuUyari=taperPeakMissed
          ?'Zirve antrenmanДұ eksik вҖ” taper\'da hafifletilmiЕҹ uzun koЕҹu (%75 yoДҹunluk)'
          :isIkinciUzun?'Taper 2. uzun koЕҹusu вҖ” yorgun bacak, %55 yoДҹunluk'
          :'Taper uzun koЕҹusu вҖ” hacim dГјЕҹГјk (%65), form koruma odaklДұ';
      } else {
        kosuTpl=daysToRace<=3?tplAcici(25,phase):tplTempo(band,Math.round(40*yMod),zones,phase);
        if(isUzunGun)kosuUyari='Son taper haftasДұ (yarДұЕҹa '+daysToRace+' gГјn) вҖ” uzun koЕҹu antrenman bilimi aГ§ДұsДұndan Г¶nerilmez. Kaslar dinlenmeli, form zirveye Г§ДұkmalДұ.';
      }
    } else if((isUzunGun||(haftaGunTipi==='uzun'&&!uzunGunTanimli))&&(!wkStats.uzunYapildi||isUzunGun)){
      // Uzun koЕҹu TSB'den baДҹДұmsДұz вҖ” her koЕҹulda uzun koЕҹu ver, sadece sГјre kДұsalДұr
      // isUzunGun ise uzunYapildi olsa bile ver (birden fazla uzun koЕҹu gГјnГј seГ§ilmiЕҹ)
      const isIkinciUzun=wkStats.uzunYapildi&&isUzunGun;
      const uzunYMod=cokYorgun?0.65:yorgun?0.80:isIkinciUzun?Math.min(yMod,0.65):yMod;
      kosuTpl=isTrail&&dpGun>200
        ?tplTirmanisAcik(band,Math.round(70*uzunYMod),zones,dpGun)
        :tplUzun(band,simState.ctl||0,zones,disiplin,dpGun,wkStats.recentLongRuns);
      if(cokYorgun)kosuUyari='TSB '+tsb.toFixed(1)+' вҖ” Г§ok yorgun, uzun koЕҹu sГјresi %35 kДұsaltДұldДұ';
      else if(yorgun)kosuUyari='TSB '+tsb.toFixed(1)+' вҖ” yorgun, uzun koЕҹu sГјresi %20 kДұsaltДұldДұ';
    } else if((isUzunGun||(haftaGunTipi==='uzun'&&!uzunGunTanimli))&&wkStats.uzunYapildi&&!isUzunGun){
      // Д°kinci uzun koЕҹu: B2B veya zirve/geliЕҹme fazДұnda uygun koЕҹullar varsa izin ver
      // KoЕҹullar: ACWR < 1.3, TSB > -20, taper deДҹil, band >= 3
      const ikincДұUzunUygun=!cokYorgun&&acwr<1.3&&['Zirve','GeliЕҹme'].includes(phase)&&band>=3;
      if(ikincДұUzunUygun){
        // Д°kinci uzun koЕҹu: ilkinin %60-65'i вҖ” yorgun bacak adaptasyonu
        const uzunYMod2=yorgun?0.55:0.65;
        const tpl2=tplUzun(band,simState.ctl||0,zones,disiplin,0,wkStats.recentLongRuns);
        tpl2.sure_dk=Math.round(tpl2.sure_dk*uzunYMod2);
        tpl2.baslik='Yorgun Bacak Uzun KoЕҹusu (B2B 2. GГјn)';
        tpl2.yapilar=[
          {baslik:'Yorgun Bacak KoЕҹusu',detay:`${tpl2.sure_dk} dk вҖ” Z1-Z2 Г§ok kolay В· Pace Г¶nemsiz, bitiЕҹ Г¶nemli В· Glikojen depolarДұnДұn boЕҹalmДұЕҹ haliyle aerobik stimГјlГјs`},
          {baslik:'Toparlanma',detay:'BitiЕҹte: karbonhidrat + protein, sonraki gГјn dinlenme zorunlu'}
        ];
        kosuTpl=tpl2;
        kosuUyari='HaftanДұn ikinci uzun koЕҹusu (B2B 2. gГјn) вҖ” sГјre ilk gГјnГјn %65\'i';
      } else {
        // Uygun deДҹil вҶ’ aerobik'e dГјЕҹГјr
        kosuTpl=tplAerobik(band,Math.round(50*yMod),zones,disiplin);
        kosuUyari='Bu hafta uzun koЕҹu yapДұldДұ вҖ” bugГјn aerobik toparlanma';
      }
    } else if(iskeleteGoreAerobik||sonYogunGun){
      // Д°skelet bu gГјnГј aerobik olarak atadДұ VEYA dГјn yoДҹundu
      kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
      if(sonYogunGun)kosuUyari='DГјn yoДҹun antrenman vardДұ вҖ” bugГјn aerobik';
    } else if(mechKardioImbalancePlan&&!isSimulatedFuture){
      // Mekanik/kardiyovaskГјler denge bozuk вҶ’ yoДҹun antrenman yerine aerobik
      kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
      kosuUyari='Mech/Kardio dengesi bozuk вҖ” aerobik Г¶ncelikli, yoДҹun antrenman ertelendi';
    } else if(haftaGunTipi==='kaliteli'&&!yorgun){
      // Д°skelet kaliteli atadДұ вҖ” faz + hafta rotasyonu ile Г§eЕҹitlendir
      const wk=wkStats.weekOff||0;
      const recent=wkStats.recentKaliteli||[];
      // Son 2 haftada yapДұlan tipi tekrar vermeme вҖ” sekansДұ ilerlet
      const pickSeq=(seq)=>{
        for(let i=0;i<seq.length;i++){
          const tpl=seq[(wk+i)%seq.length]();
          if(!recent.slice(0,2).includes(tpl.tip)) return tpl;
        }
        return seq[wk%seq.length]();
      };
      if(daysToRace!==null&&daysToRace<=14){
        kosuTpl=tplAcici(Math.round(30*yMod),phase);
      } else if(phase==='Taper'){
        kosuTpl=tplYarisTempo(band,Math.round(45*yMod),zones,phase);
      } else if(phase==='Zirve'){
        const zirveSeq=[
          ()=>isTrail&&band>=3?tplYokusUzun(band,zones,phase):tplInterval(band,phase,zones),
          ()=>tplPiramit(band,zones,phase),
          ()=>tplKesintisizPiramit(band,zones,phase),
          ()=>tplCruise(band,Math.round(55*yMod),zones,phase),
          ()=>isTrail?tplHillSprint(band,zones,phase):tplOnOff(band,zones,phase),
        ];
        kosuTpl=pickSeq(zirveSeq);
      } else if(phase==='GeliЕҹme'){
        const gelismeSeq=[
          ()=>isTrail&&band>=3?tplYokusKisa(band,zones,phase):tplInterval(band,phase,zones),
          ()=>tplTempoInterval(band,Math.round(50*yMod),zones,phase),
          ()=>tplPiramit(band,zones,phase),
          ()=>tplKesintisizPiramit(band,zones,phase),
          ()=>tplCruise(band,Math.round(50*yMod),zones,phase),
          ()=>tplOnOff(band,zones,phase),
          ()=>isTrail?tplHillSprint(band,zones,phase):tplYarisTempo(band,Math.round(48*yMod),zones,phase),
        ];
        kosuTpl=pickSeq(gelismeSeq);
      } else {
        const temelSeq=[
          ()=>tplTempo(band,Math.round(45*yMod),zones,phase),
          ()=>tplProgressive(band,Math.round(50*yMod),zones,phase),
          ()=>tplStrides(band,Math.round(50*yMod),zones,phase),
          ()=>tplCruise(band,Math.round(45*yMod),zones,phase),
        ];
        kosuTpl=pickSeq(temelSeq);
      }
    } else if(phase==='Temel'&&!iskeleteGoreAerobik&&!sonYogunGun&&wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)){
      // Temel fazda aerobik gГјnlere zaman zaman strides ekle
      const wk=wkStats.weekOff||0;
      kosuTpl=wk%3===0
        ?tplStrides(band,Math.round(50*yMod),zones,phase)
        :tplAerobik(band,Math.round(55*yMod),zones,disiplin);
    } else {
      // VarsayДұlan faz mantДұДҹДұ вҖ” haftaGunTipi atanmamДұЕҹ veya kaliteli koЕҹul saДҹlanmadДұ
      const wk=wkStats.weekOff||0;
      if(daysToRace!==null&&daysToRace<=14){
        kosuTpl=tplTempo(band,Math.round(40*yMod),zones,phase);
      } else if(phase==='Zirve'){
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)&&(acwr<1.2||isSimulatedFuture)){
          // Kaliteli henГјz yapДұlmadДұysa вҖ” rotasyonlu kaliteli ver
          const zirveSeq=[
            ()=>isTrail&&band>=3?tplYokusUzun(band,zones,phase):tplInterval(band,phase,zones),
            ()=>tplPiramit(band,zones,phase),
          ()=>tplKesintisizPiramit(band,zones,phase),
            ()=>tplCruise(band,Math.round(55*yMod),zones,phase),
            ()=>isTrail?tplHillSprint(band,zones,phase):tplOnOff(band,zones,phase),
          ];
          kosuTpl=zirveSeq[wk%zirveSeq.length]();
        } else if(!wkStats.uzunYapildi&&(!uzunGunTanimli||isUzunGun)){
          kosuTpl=isTrail?tplTirmanisAcik(band,Math.round(75*yMod),zones,dpGun):tplUzun(band,simState.ctl||0,zones,disiplin,dpGun,wkStats.recentLongRuns);
        } else {
          kosuTpl=tplEsik(band,Math.round(55*yMod),zones,phase);
        }
      } else if(phase==='GeliЕҹme'){
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)&&(acwr<1.2||isSimulatedFuture)){
          // Kaliteli henГјz yapДұlmadДұysa вҖ” rotasyonlu kaliteli ver
          const gelismeSeq=[
            ()=>isTrail&&band>=3?tplYokusKisa(band,zones,phase):tplInterval(band,phase,zones),
            ()=>tplTempoInterval(band,Math.round(50*yMod),zones,phase),
            ()=>tplPiramit(band,zones,phase),
          ()=>tplKesintisizPiramit(band,zones,phase),
            ()=>tplCruise(band,Math.round(50*yMod),zones,phase),
            ()=>tplOnOff(band,zones,phase),
            ()=>isTrail?tplHillSprint(band,zones,phase):tplYarisTempo(band,Math.round(48*yMod),zones,phase),
          ];
          kosuTpl=gelismeSeq[wk%gelismeSeq.length]();
        } else if(isTrail&&band>=2&&!wkStats.kaliteliYok){
          kosuTpl=tplTeknikInis(band,40,zones);
        } else {
          kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
        }
      } else {
        // Temel faz
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)){
          const temelSeq=[
            ()=>tplTempo(band,Math.round(45*yMod),zones,phase),
            ()=>tplProgressive(band,Math.round(50*yMod),zones,phase),
            ()=>tplStrides(band,Math.round(50*yMod),zones,phase),
            ()=>tplCruise(band,Math.round(45*yMod),zones,phase),
          ];
          kosuTpl=temelSeq[wk%temelSeq.length]();
        } else {
          kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
        }
      }
    }
    kosuTpl.sure_dk=Math.round((kosuTpl.sure_dk||45)*yMod);
    if(!kosuUyari&&acwr>1.3&&acwr<=1.5&&!isSimulatedFuture)
      kosuUyari='ACWR '+acwr.toFixed(2)+' вҖ” yГјk biraz yГјksek, sГјre kДұsaltДұldДұ';
    if(kosuUyari)kosuTpl.uyari=kosuUyari;
    // forceEasy/toparlanma warnings'leri de ekle
    if(warnings.length>0){
      const extraUyari=warnings.map(w=>w.icon+' '+w.text).join(' В· ');
      kosuTpl.uyari=kosuTpl.uyari?kosuTpl.uyari+' В· '+extraUyari:extraUyari;
    }
  }

  // в”Җв”Җ ГҮapraz antrenman planla в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let caprazTpl=null;
  if(isCapraz){
    caprazTpl={
      tip:'capraz',sure_dk:0,
      yapilar:[] // ГҮapraz antrenman iГ§in aЕҹama satДұrДұ yok
    };
  }

  // в”Җв”Җ SonuГ§ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const TIP_LABELS={kolay:'Kolay KoЕҹu',aerobik:'Aerobik KoЕҹu',uzun:'Uzun KoЕҹu',tempo:'Tempo',esik:'EЕҹik',interval:'Д°nterval',yokus_kisa:'KДұsa YokuЕҹ',yokus_uzun:'Uzun YokuЕҹ',tirmanis:'TДұrmanДұЕҹ',teknik:'Teknik Д°niЕҹ',acici:'AГ§ДұcДұ',capraz:'ГҮapraz',dinlenme:'Dinlenme'};
  const yukHesapla=(tpl)=>tpl?Math.round((tpl.sure_dk||45)*({kolay:0.8,aerobik:1.1,uzun:1.1,tempo:1.55,esik:1.7,interval:2.1,yokus_kisa:2.1,yokus_uzun:2.0,tirmanis:2.0,teknik:1.4,acici:1.2,capraz:0.8}[tpl.tip]||6)):0;

  // Antrenman ismini yapi_notu'ndan tГјret вҖ” seviye bilgisi dahil
  const tplBaslik=(tpl)=>tpl?.yapi_notu?tpl.yapi_notu.split(' вҖ” ')[0]:(TIP_LABELS[tpl?.tip]||tpl?.tip||'');

  if(kosuTpl&&caprazTpl){
    // Hem koЕҹu hem Г§apraz вҖ” koЕҹu aЕҹamalarДұ normal, Г§apraz sadece not
    const yapilar=[
      ...kosuTpl.yapilar,
      {baslik:'вһ• ГҮapraz Antrenman',detay:'KoЕҹu antrenmanДұndan baДҹДұmsДұz вҖ” bisiklet / yГјzme / kГјrek / kuvvet (sГјre ve iГ§erik serbest)',_caprazNot:true}
    ];
    const yukHedef=yukHesapla(kosuTpl);
    return{...kosuTpl,baslik:tplBaslik(kosuTpl)+' + ГҮapraz',yapilar,yukHedef,
      caprazTpl,isKosuCapraz:true,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort};
  } else if(kosuTpl){
    const yukHedef=yukHesapla(kosuTpl);
    return{...kosuTpl,baslik:tplBaslik(kosuTpl),yukHedef,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort};
  } else if(caprazTpl){
    const yukHedef=0;
    return{...caprazTpl,baslik:'ГҮapraz Antrenman',yukHedef,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort,
      yapilar:[{baslik:'вһ• ГҮapraz Antrenman',detay:'Bisiklet / yГјzme / kГјrek / kuvvet вҖ” sГјre ve iГ§erik serbest',_caprazNot:true}]};
  }
  return REST;
}

// 2 haftalДұk plan Гјret
function generateTwoWeekPlan(athlete, history, races, actualWorkouts, testPlanlar=[]){
  const today=new Date();
  const last=history[history.length-1];
  const {primary,intermediate}=selectRaces(athlete,races);
  const kosuGunleri=athlete.kosu_gunleri||[];
  const caprazGunleri=athlete.capraz_gunleri||[];
  const athWorkouts=actualWorkouts.filter(w=>w.athleteId===athlete.id);
  const weekTargets=calcWeeklyTargets(athlete,races,actualWorkouts||[]);

  const weeks=[];
  let simAtl=last?.atl||0, simCtl=last?.ctl||0;
  let sonYogunGunGlobal=false; // Haftalar arasДұ korunur

  for(let weekOff=0;weekOff<2;weekOff++){
    const {start}=getWeekBounds(weekOff);
    const days=[];
    const wt=weekTargets.find(t=>{
      const ws=new Date(start);
      return t.weekStart.toDateString()===ws.toDateString();
    });
    // Rotasyon indeksi: sporcu ID hash'i + history uzunluДҹu
    // вҶ’ her sporcu farklДұ sekans noktasДұndan baЕҹlar, benzer history'ye raДҹmen farklДұ antrenman alДұr
    const athHash = (athlete.id||'').split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0, 0);
    const rotIdx = Math.abs(athHash % 97) + Math.floor((history.length||0)/7) + weekOff;
    
    // Son 4 haftada yapДұlan kaliteli antrenman tiplerini bul (tekrar Г¶nleme)
    const recentKaliteli = athWorkouts
      .filter(w=>['interval','esik','tempo','piramit','kesintisiz_piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','yokus_kisa','yokus_uzun'].includes(w.tur))
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
      .slice(0,4)
      .map(w=>w.tur);
    
    // Son uzun koЕҹular вҖ” tplUzun iГ§in progresyon hesabДұnda kullanДұlДұr
    // YaklaЕҹДұm: etiketten baДҹДұmsДұz, her haftanДұn EN UZUN koЕҹusunu al
    // (sporcu aerobik etiketiyle de uzun mesafe koЕҹabilir; etikete gГјvenmemek daha saДҹlДұklДұ)
    const recentLongRuns = (()=>{
      const kosuWks = athWorkouts.filter(w=>w.date&&(w.spor==='kosu'||!w.spor));
      const byWeek = {};
      kosuWks.forEach(w=>{
        const d = new Date(w.date+'T12:00:00');
        const day = d.getDay();
        const diffToMon = day===0?-6:1-day;
        const mon = new Date(d); mon.setDate(d.getDate()+diffToMon);
        const wk = mon.toISOString().split('T')[0];
        const sureDk = Math.round((toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0)/60);
        const km = parseFloat(w.mesafe)||0;
        // SГјre yoksa mesafeden tahmin (yaklaЕҹДұk 5dk/km)
        const efektifDk = sureDk || Math.round(km*5);
        if(!byWeek[wk]||efektifDk>byWeek[wk].sure_dk){
          byWeek[wk]={date:w.date, sure_dk:efektifDk, km};
        }
      });
      // Son 6 haftanДұn en uzun koЕҹularДұ, yeniden eskiye, >30dk olanlar
      return Object.values(byWeek)
        .filter(w=>w.sure_dk>30)
        .sort((a,b)=>new Date(b.date)-new Date(a.date))
        .slice(0,6);
    })();

    // Son antrenmanДұn toparlanma bilgisini hesapla
    const sonAntrenman=athWorkouts.filter(w=>w.date).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const sonRecoveryHedef=sonAntrenman?.recovery_hedef?new Date(sonAntrenman.recovery_hedef):null;
    const sonRecoverySaatler=sonAntrenman?.recovery_saatler||0;
    let wkStats={count:0,kaliteliYok:true,uzunYapildi:false,wkLoad:0,dpHedefHafta:wt?.targetDp||0,weekOff:rotIdx,isFutureWeek:weekOff>0,recentKaliteli,recentLongRuns,sonYogunGun:sonYogunGunGlobal,testPlanlar:testPlanlar||[],sonAntrenmanDate:sonAntrenman?.date||null,sonRecoveryHedef,sonRecoverySaatler,athWorkouts};

    // в”Җв”Җ Hafta Д°skeleti: Kaliteli antrenmanДұ en iyi TSB gГјnГјne ata в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Sadece gelecek/mevcut haftalar iГ§in (geГ§miЕҹ haftada gerГ§ek veri var)
    // 1. Her koЕҹu gГјnГјnГјn tahmini TSB'sini hesapla
    // 2. En yГјksek TSB вҶ’ kaliteli antrenman gГјnГј
    // 3. uzun_gun вҶ’ uzun koЕҹu (eДҹer varsa)
    // 4. Geri kalanlar вҶ’ aerobik
    const haftaIskeleti={}; // dateStr вҶ’ 'kaliteli'|'uzun'|'aerobik'|null
    if(weekOff===0||weekOff===1){
      const kosuGunleriHafta=[];
      let tmpAtl=simAtl, tmpCtl=simCtl;
      for(let di=0;di<7;di++){
        const d=new Date(start);d.setDate(start.getDate()+di);
        const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dd2=String(d.getDate()).padStart(2,'0');
        const ds=`${y}-${mo}-${dd2}`;
        const dShort=DAYS_SHORT[d.getDay()];
        const isPastDay=d<today;
        const isKosuDay=kosuGunleri.includes(dShort);
        const isUzunDay=(Array.isArray(athlete.uzun_gun)?athlete.uzun_gun:[athlete.uzun_gun].filter(Boolean)).includes(dShort);
        const estTsb=round1(tmpCtl-tmpAtl);
        if(isKosuDay&&!isPastDay)kosuGunleriHafta.push({ds,di,estTsb,isUzunDay});
        // Tahmini yГјk: aerobik varsayДұmДұyla simГјle et
        const estLoad=isKosuDay?80:20;
        tmpAtl=estLoad*О»_atl+tmpAtl*(1-О»_atl);
        tmpCtl=estLoad*О»_ctl+tmpCtl*(1-О»_ctl);
      }
      // uzun_gun'u kilitle
      kosuGunleriHafta.forEach(g=>{if(g.isUzunDay)haftaIskeleti[g.ds]='uzun';});
      // Kalan gГјnleri TSB'ye gГ¶re sДұrala вҖ” en yГјksek TSB вҶ’ kaliteli
      const kalanlar=kosuGunleriHafta.filter(g=>!haftaIskeleti[g.ds]);
      kalanlar.sort((a,b)=>b.estTsb-a.estTsb);
      // Haftada en az 1 kaliteli antrenman вҖ” TSB eЕҹiДҹi yok, planDay zaten kontrol eder
      if(kalanlar.length>0){
        haftaIskeleti[kalanlar[0].ds]='kaliteli';
        // GeliЕҹme/Zirve fazДұnda 2. en iyi gГјnde de kaliteli olabilir
        if(kalanlar.length>2&&['GeliЕҹme','Zirve'].includes(
          calcPhase(kalanlar[1].ds, primary?.tarih||'', parseInt(primary?.prep_weeks||16), primary)
        )){
          haftaIskeleti[kalanlar[1].ds]='kaliteli';
        }
      }
      // Geri kalanlar aerobik
      kalanlar.slice(1).forEach(g=>{if(!haftaIskeleti[g.ds])haftaIskeleti[g.ds]='aerobik';});
    }

    for(let di=0;di<7;di++){
      const d=new Date(start);d.setDate(start.getDate()+di);
      // toISOString() UTC kullanДұr вҖ” yerel tarih bileЕҹenlerini al
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,'0');
      const d2=String(d.getDate()).padStart(2,'0');
      const dateStr=`${y}-${m}-${d2}`;
      const isToday=dateStr===`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      // BugГјn iГ§in simState: gerГ§ek history son deДҹerini kullan (simГјlasyon deДҹil)
      // GeГ§miЕҹ gГјnler iГ§in simГјle edilen deДҹerleri kullan (simAtl/simCtl)
      const simState=isToday&&last
        ?{atl:round1(last.atl||0),ctl:round1(last.ctl||0),tsb:round1((last.ctl||0)-(last.atl||0)),acwr:last.acwr||null,mechCtl:round1(last.mechCtl||0),mechAtl:round1(last.mechAtl||0)}
        :{atl:round1(simAtl),ctl:round1(simCtl),tsb:round1(simCtl-simAtl),acwr:simCtl>1?round2(simAtl/simCtl):null,mechCtl:round1(last?.mechCtl||0),mechAtl:round1(last?.mechAtl||0)};
      // isPast: sadece tarih karЕҹДұlaЕҹtДұrmasДұ вҖ” saat farkДұndan etkilenmesin
      const isPast=dateStr<`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const dtR=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-d)/864e5):null;
      const nextInt=intermediate.filter(r=>new Date(r.tarih+'T12:00:00')>=d).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih))[0];
      const dtInt=nextInt?Math.ceil((new Date(nextInt.tarih+'T12:00:00')-d)/864e5):null;
      const phase=primary?calcPhase(dateStr,primary.tarih,primary.prep_weeks,primary):'Temel';
      const actual=athWorkouts.filter(w=>w.date===dateStr);
      let actualLoad=0,actualKm=0,actualDp=0;
      actual.forEach(w=>{
        const m=calcMetrics(w,athlete);
        actualLoad+=m.yukObj||0;
        actualKm+=parseFloat(w.mesafe)||0;
        actualDp+=parseFloat(w.irtifa)||0;
      });
      const planned=planDay(dateStr,athlete,simState,phase,dtR,dtInt,
        {...wkStats, haftaGunTipi:haftaIskeleti[dateStr]||null},
        kosuGunleri,caprazGunleri,primary||null);
      // wkStats gГјncelleme вҖ” geГ§miЕҹ gГјnlerde gerГ§ek antrenman varsa onu kullan
      const isTestDay=(testPlanlar||[]).some(p=>p.athId===athlete.id&&p.date===dateStr);
      // GeГ§miЕҹ gГјnlerde tГјm gerГ§ek antrenmanlarДұ al
      const primaryActual = actual.length > 0 ? actual[0] : null;
      const effectiveTip = isPast && primaryActual
        ? (primaryActual.tur || primaryActual.spor || 'aerobik')
        : planned.tip;
      // GeГ§miЕҹ gГјnlerde tГјm antrenmanlarДұ baЕҹlДұkta gГ¶ster
      const effectiveBaslik = isPast && actual.length > 0
        ? actual.map(w => {
            const t = w.tur || w.spor || 'aerobik';
            const sporlbl = SPOR_MAP[w.spor]?.l || '';
            const turlbl = TUR_LABELS[t] || t;
            return w.spor === 'kosu' ? turlbl : sporlbl || turlbl;
          }).join(' + ')
        : planned.baslik;
      const effectiveSureDk = isPast && actual.length > 0
        ? Math.round(actual.reduce((s,w) => s + (toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0), 0) / 60)
        : planned.sure_dk;

      // wkStats: tГјm gerГ§ek antrenmanlarДұ ayrДұ ayrДұ deДҹerlendir
      if(isPast && actual.length > 0){
        actual.forEach(w => {
          const t = w.tur || w.spor || 'aerobik';
          if(t === 'dinlenme') return;
          wkStats.count++;
          if(['interval','esik','tempo','yokus_kisa','yokus_uzun'].includes(t)) wkStats.kaliteliYok=false;
          if(['uzun','tirmanis'].includes(t)) wkStats.uzunYapildi=true;
          wkStats.wkLoad += calcMetrics(w,athlete).yukObj||0;
        });
      } else if(!isPast){
        const t = planned.tip;
        if(t !== 'dinlenme'){
          wkStats.count++;
          if(['interval','esik','tempo','yokus_kisa','yokus_uzun'].includes(t)) wkStats.kaliteliYok=false;
          if(['uzun','tirmanis'].includes(t)) wkStats.uzunYapildi=true;
          wkStats.wkLoad += planned.yukHedef||0;
        }
      }

      const isYogunTip=['interval','esik','yokus_kisa','yokus_uzun','tirmanis'].includes(effectiveTip);
      // Ard arda yoДҹun gГјn takibi вҖ” haftalar arasДұ korunur
      wkStats.sonYogunGun=isYogunTip;
      sonYogunGunGlobal=isYogunTip;
      // Kaliteli antrenman simГјlasyon yГјkГјnГј yumuЕҹat
      const rawLoad=isPast?(actualLoad||0):(planned.yukHedef||0);
      const hasKaliteliActual=isPast&&actual.some(w=>['interval','esik','yokus_kisa','yokus_uzun'].includes(w.tur||w.spor));
      const isKaliteliTip=hasKaliteliActual||['interval','esik','yokus_kisa','yokus_uzun'].includes(effectiveTip);
      const simFactor=isTestDay?0.4:isKaliteliTip?0.75:1.0;
      const loadForSim=Math.round(rawLoad*simFactor);
      simAtl=loadForSim*О»_atl+simAtl*(1-О»_atl);
      simCtl=loadForSim*О»_ctl+simCtl*(1-О»_ctl);
      let comparison=null;
      if((isPast||isToday)&&actual.length>0&&planned.yukHedef>0){
        const diff=round1(actualLoad-planned.yukHedef);
        const pct=Math.round(actualLoad/planned.yukHedef*100);
        comparison={actual:round1(actualLoad),planned:planned.yukHedef,diff,pct,actualKm:round1(actualKm),actualDp:Math.round(actualDp),status:pct>=80&&pct<=120?'ok':pct<80?'eksik':'fazla'};
      } else if(isPast&&actual.length===0&&planned.tip!=='dinlenme'){
        comparison={actual:0,planned:planned.yukHedef,diff:-planned.yukHedef,pct:0,actualKm:0,actualDp:0,status:'atlandДұ'};
      }
      days.push({
        ...planned,
        tip:effectiveTip,
        baslik:effectiveBaslik,
        sure_dk:effectiveSureDk,
        actual,actualLoad:round1(actualLoad),actualKm:round1(actualKm),actualDp:Math.round(actualDp),comparison,nextInt:nextInt||null
      });
    }
    // HaftalДұk gerГ§ekleЕҹen toplam
    const wkActualKm=round1(days.reduce((s,d2)=>s+d2.actualKm,0));
    const wkActualDp=Math.round(days.reduce((s,d2)=>s+d2.actualDp,0));
    weeks.push({weekOff,start,days,primary,intermediate,wkStats,wt,wkActualKm,wkActualDp});
  }
  return{weeks,primary,intermediate};
}

// в”Җв”Җ Plan Snapshot Sistemi в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// HaftalДұk plan Firebase'e dondurulur. YalnДұzca 22:00'da sapma varsa gГјncellenir.
// Firebase key: plan_snapshots/{athId}/{weekKey}
// Snapshot: {weekKey, athId, generatedAt, lastReviewAt, overrideMap, reviewLog}

function generatePlanSnapshot(athlete,history,races,workouts,testPlanlar){
  const now=new Date();
  const todayStr=localDateStr(now);
  const plan=generateTwoWeekPlan(athlete,history,races,workouts,testPlanlar||[]);
  const overrideMap={};
  plan.weeks.forEach(wk=>wk.days.forEach(day=>{
    // BugГјn dahil tГјm gelecek gГјnleri sakla
    if(day.date>=todayStr){
      overrideMap[day.date]={
        tip:day.tip,baslik:day.baslik,
        sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,
        yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))
      };
    }
  }));
  return{
    weekKey:getWeekKey(0),athId:athlete.id,
    generatedAt:now.toISOString(),lastReviewAt:now.toISOString(),
    overrideMap,
    b2bCompensationAdded:false,
    athleteProfile:{kosu_gunleri:athlete.kosu_gunleri,capraz_gunleri:athlete.capraz_gunleri,disiplin:athlete.disiplin,uzun_gun:athlete.uzun_gun},
    reviewLog:[{at:now.toISOString(),reason:'HaftalДұk plan oluЕҹturuldu'}]
  };
}

function reviewPlanSnapshot(snapshot,athlete,history,races,workouts,testPlanlar){
  const now=new Date();
  const todayStr=localDateStr(now);
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete.id);

  let reason=null;

  // в”Җв”Җ Uzun koЕҹu telafisi: bu hafta uzun koЕҹu atlandДұysa bir sonraki haftaya B2B ekle в”Җв”Җ
  // BugГјn Pazar veya Cumartesi вҶ’ haftanДұn sonu, uzun koЕҹu denetimi yapДұlabilir
  const dayOfWeek=now.getDay(); // 0=Paz, 6=Cmt
  const isWeekEnd=(dayOfWeek===0||dayOfWeek===6);
  let b2bCompensationReason=null;
  if(isWeekEnd||true){ // Her gece kontrol et, Г§ГјnkГј uzun koЕҹu herhangi bir gГјn olabilir
    const thisWeekStart=getWeekBounds(0).start;
    const thisWeekEnd=getWeekBounds(0).end;
    // Bu hafta uzun koЕҹu yapДұlmДұЕҹ mДұ?
    const longRunDone=athWks.some(w=>{
      const d=new Date(w.date+'T12:00:00');
      return d>=thisWeekStart&&d<=thisWeekEnd&&['uzun','back_to_back','tirmanis'].includes(w.tur||'');
    });
    // Bu haftanДұn planДұnda uzun koЕҹu var mДұydДұ?
    const longRunPlanned=Object.values(snapshot.overrideMap||{}).some(day=>{
      return ['uzun','back_to_back'].includes(day.tip);
    });
    // Uzun koЕҹu planlanmДұЕҹ ama yapДұlmamДұЕҹ вҶ’ bir sonraki haftanДұn ilk uygun koЕҹu gГјnГјne B2B yerleЕҹtir
    if(longRunPlanned&&!longRunDone&&!snapshot.b2bCompensationAdded){
      const nextWeekDays=[];
      for(let i=1;i<=7;i++){
        const d=new Date(now);d.setDate(now.getDate()+i);
        nextWeekDays.push(localDateStr(d));
      }
      // Sporcu koЕҹu gГјnleri
      const kosuGunleri=athlete.kosu_gunleri||[];
      const DAYS_SHORT_LOCAL=['Paz','Pzt','Sal','ГҮar','Per','Cum','Cmt'];
      const b2bDay=nextWeekDays.find(dateStr=>{
        const d=new Date(dateStr+'T12:00:00');
        const dayShort=DAYS_SHORT_LOCAL[d.getDay()];
        return kosuGunleri.includes(dayShort);
      })||nextWeekDays[0];
      b2bCompensationReason=`Bu hafta uzun koЕҹu tamamlanamadДұ вҖ” ${b2bDay} tarihine B2B telafi antrenmanДұ eklendi`;
    }
  }

  const updatedTs={...snapshot,lastReviewAt:now.toISOString()};
  if(!reason&&!b2bCompensationReason) return{updated:false,snap:updatedTs};

  // YarДұn ve sonrasДұnДұ yeniden Гјret
  const tomorrowStr=localDateStr(new Date(now.getFullYear(),now.getMonth(),now.getDate()+1));
  const newPlan=generateTwoWeekPlan(athlete,history,races,workouts,testPlanlar||[]);
  const newMap={...snapshot.overrideMap};
  // AtlandДұ durumunda bugГјnГј de Manuel iptal gibi iЕҹaretle (Гјzeri Г§izili gГ¶rГјnsГјn)
  if(reason&&reason.includes('atlandДұ')&&snapToday){
    newMap[todayStr]={tip:'dinlenme',baslik:'Д°ptal Edildi',sure_dk:0,yukHedef:0,
      yapilar:[{baslik:'Д°ptal',detay:'Antrenman yapДұlmadДұ (otomatik)'}]};
  }
  newPlan.weeks.forEach(wk=>wk.days.forEach(day=>{
    if(day.date>=tomorrowStr){
      newMap[day.date]={
        tip:day.tip,baslik:day.baslik,
        sure_dk:day.sure_dk,yukHedef:day.yukHedef||0,
        yapilar:(day.yapilar||[]).map(y=>({baslik:y.baslik,detay:y.detay||''}))
      };
    }
  }));

  // B2B telafisi вҖ” ilk uygun koЕҹu gГјnГјne yerleЕҹtir
  if(b2bCompensationReason){
    const nextWeekDays=[];
    for(let i=1;i<=7;i++){
      const d=new Date(now);d.setDate(now.getDate()+i);
      nextWeekDays.push(localDateStr(d));
    }
    const kosuGunleri=athlete.kosu_gunleri||[];
    const DAYS_SHORT_LOCAL=['Paz','Pzt','Sal','ГҮar','Per','Cum','Cmt'];
    const b2bDay=nextWeekDays.find(dateStr=>{
      const d=new Date(dateStr+'T12:00:00');
      const dayShort=DAYS_SHORT_LOCAL[d.getDay()];
      return kosuGunleri.includes(dayShort);
    })||nextWeekDays[0];
    const last=history[history.length-1];
    const band=ctlBand(last?.ctl||0);
    const zones=calcZones(athlete);
    const b2bTpl=tplBackToBack(band,zones,0);
    newMap[b2bDay]={
      tip:'uzun',
      baslik:'B2B Telafi вҖ” KaГ§ДұrДұlan Uzun KoЕҹu',
      sure_dk:b2bTpl.sure_dk,
      yukHedef:Math.round(b2bTpl.sure_dk*0.8),
      yapilar:b2bTpl.yapilar.map(y=>({baslik:y.baslik,detay:y.detay||''})),
      isB2bCompensation:true
    };
  }

  const finalReason=[reason,b2bCompensationReason].filter(Boolean).join(' В· ');
  return{
    updated:true,reason:finalReason,
    snap:{
      ...snapshot,
      lastReviewAt:now.toISOString(),
      overrideMap:newMap,
      cancelledDays:snapshot.cancelledDays||{},
      b2bCompensationAdded:b2bCompensationReason?true:snapshot.b2bCompensationAdded,
      reviewLog:[...(snapshot.reviewLog||[]),{at:now.toISOString(),reason:finalReason}].slice(-10)
    }
  };
}


// KoЕҹu yapДұlarДұnДұ al вҖ” Г§apraz aЕҹama satДұrlarДұnДұ tamamen dДұЕҹla
function kosuYapilarAl(day){
  if(!day||day.tip==='capraz') return [];
  const yapilar=day.yapilar||[];
  if(!day.isKosuCapraz) return yapilar;
  // BirleЕҹik gГјn: вһ• veya рҹҡҙ ayracДұndan Г¶nceki yapДұlar koЕҹuya ait
  const sepIdx=yapilar.findIndex(y=>{
    const b=(y.baslik||'');
    return b.startsWith('вһ•')||b.startsWith('рҹҡҙ')||y._caprazNot;
  });
  if(sepIdx>0) return yapilar.slice(0,sepIdx);
  if(sepIdx===0) return []; // TГјm yapДұlar Г§apraz ait
  // AyraГ§ yok вҖ” рҹҸғ ile baЕҹlayan bloДҹun yapДұlarДұnДұ bul
  const kosutIdx=yapilar.findIndex(y=>(y.baslik||'').startsWith('рҹҸғ'));
  if(kosutIdx>=0){
    const endIdx=yapilar.findIndex((y,i)=>i>kosutIdx&&((y.baslik||'').startsWith('рҹҡҙ')||(y.baslik||'').startsWith('вһ•')));
    return endIdx>0?yapilar.slice(kosutIdx+1,endIdx):yapilar.slice(kosutIdx+1);
  }
  return yapilar;
}

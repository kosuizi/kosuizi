<body>
<div id="root"></div>
<script>
const {useState,useEffect,useMemo,useRef,useCallback}=React;

const uid=()=>Math.random().toString(36).slice(2,10);

// React class component — ErrorBoundary (hooks ile yapılamaz)
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error('Render hatası:',e,info);}
  render(){
    if(this.state.err)return React.createElement('div',{style:{padding:16,color:'var(--danger)',fontSize:13,background:'var(--danger-bg)',borderRadius:8,margin:8}},
      '⚠ Görüntüleme hatası: '+this.state.err.message,
      React.createElement('button',{style:{marginLeft:12,fontSize:12,cursor:'pointer'},onClick:()=>this.setState({err:null})},'Yenile')
    );
    return this.props.children;
  }
}

// ── Genel Paylaş Butonu ───────────────────────────────────────────────────────
async function shareElement(el, filename, shareText){
  if(!el)return;
  // html2canvas yükle
  await new Promise((resolve,reject)=>{
    if(window.html2canvas)return resolve();
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=resolve;s.onerror=()=>reject(new Error('Yüklenemedi'));
    document.head.appendChild(s);
  });
  const bgColor=document.body.classList.contains('dark')?'#0a1220':'#f0f4f9';
  const canvas=await window.html2canvas(el,{scale:2,useCORS:true,backgroundColor:bgColor});
  const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
  const file=new File([blob],filename,{type:'image/png'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    await navigator.share({title:filename.replace('.png','').replace(/_/g,' '),text:shareText||'',files:[file]});
  } else {
    const a=document.createElement('a');
    a.download=filename;a.href=URL.createObjectURL(file);a.click();URL.revokeObjectURL(a.href);
  }
}

function ShareButton({targetRef, filename, title, style}){
  const [busy,setBusy]=useState(false);
  const handle=async()=>{
    if(!targetRef?.current)return;
    setBusy(true);
    try{await shareElement(targetRef.current,filename||'kosuizi_paylasim.png',title);}
    catch(e){if(e.name!=='AbortError')alert('Paylaşım hatası: '+e.message);}
    setBusy(false);
  };
  return React.createElement('button',{
    onClick:handle,disabled:busy,
    className:'btn btn-sm',
    style:{fontSize:13,padding:'3px 8px',...(style||{})},
    title:'Paylaş veya indir'
  },busy?'⏳':'↗ Paylaş');
}
const GUNLER=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const toSec=(sa,dk,sn)=>(parseInt(sa)||0)*3600+(parseInt(dk)||0)*60+(parseInt(sn)||0);
const fmtDur=(s)=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}s ${m}dk`:`${m}dk`};
const fmtDate=(d)=>{if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'short',year:'2-digit'})}catch{return d}};
const fmtShort=(d)=>{if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'short'})}catch{return d}};
const round1=(v)=>Math.round(v*10)/10;
const round2=(v)=>Math.round(v*100)/100;

// ── Hesap Motoru (TrainingPeaks referanslı) ──────────────────────────────────

// TRIMP: Banister (1991) — doğru versiyon, cinsiyet katsayısı dahil
function calcTRIMP(durMin,avgHR,rhr,mhr,cinsiyet){
  if(!avgHR||!rhr||!mhr||durMin<=0)return 0;
  const hrr=(avgHR-rhr)/(mhr-rhr);
  if(hrr<=0||hrr>1.2)return 0;
  const b=cinsiyet==='Kadın'?1.67:1.92;
  const y=cinsiyet==='Kadın'?0.86:0.64;  // ← eksik olan katsayı eklendi
  return round1(durMin*hrr*y*Math.exp(b*hrr));
}

// hrTSS: Coggan (TrainingPeaks)
function calcHrTSS(durSec,avgHR,lthr){
  if(!avgHR||!lthr||durSec<=0)return 0;
  const IF=avgHR/lthr;
  return round1((durSec/3600)*IF*IF*100);
}

// Mekanik Yük (AU): Trail/ultra için zemin + irtifa tabanlı stres
// Referans: Gabbett 2016 — muskuloskeletal yük modeli
const TERRAIN_MULT={1:1.00,2:1.12,3:1.28,4:1.50,5:1.78};
function calcMechLoad(mesafe,irtifa,zemin_zorluk){
  const km=parseFloat(mesafe)||0;
  const dp=parseFloat(irtifa)||0;
  const z=parseInt(zemin_zorluk)||1;
  if(km<=0&&dp<=0)return 0;
  const equiv_km=km+(dp/100);           // irtifa ceza dönüşümü
  return round1(equiv_km*(TERRAIN_MULT[z]||1.0));
}

// Yük (Objektif): hrTSS öncelikli; zemin ve eğim modifiyeli
// Eğim faktörü: Minetti 2002 eğimi simüle eden linear yaklaşım
function calcObjLoad(durSec,avgHR,lthr,rhr,mhr,cinsiyet,mesafe,irtifa,zemin_zorluk){
  const km=parseFloat(mesafe)||0;
  const dp=parseFloat(irtifa)||0;
  const z=parseInt(zemin_zorluk)||1;
  const durH=durSec/3600;
  if(durSec<=0)return 0;
  if(!avgHR)return 0; // HR yoksa calcMetrics zaten RPE'den tahmin edip tekrar çağırır

  // terrain modifier — patika ve tırmanış metabolik maliyeti artırır
  const t_mod=TERRAIN_MULT[z]||1.0;
  // eğim modifier — mesafe varsa eğim oranına bakıyoruz
  let grade_mod=1.0;
  if(km>0&&dp>0){
    const avg_grade_pct=(dp/km)/10;
    grade_mod=1+Math.min(avg_grade_pct*0.12,0.28); // maks %28 artış
  }
  const combined_mod=Math.min(t_mod*grade_mod,1.60); // üst sınır

  if(lthr&&avgHR){
    const base=calcHrTSS(durSec,avgHR,lthr);
    return round1(base*combined_mod);
  } else {
    const base=calcTRIMP(durSec/60,avgHR,rhr,mhr,cinsiyet);
    return round1(base*combined_mod);
  }
}

// RPE → tahmini nabız (Foster 2001 + Borg literatürü)
// rhr ve mhr biliniyorsa HRR bazlı, bilinmiyorsa MHR bazlı yaklaşım
function estimateHR(rpe,rhr,mhr){
  if(!rpe||rpe<=0)return{avgHR:null,maxHR:null,estimated:false};
  const rpeN=(parseFloat(rpe)-1)/9; // 1-10 → 0-1
  // %HRR = 0.15 + 0.75×RPE_normalized (Foster et al.)
  const hrrPct=0.15+0.75*rpeN;
  let avgHR,maxHR;
  if(rhr>0&&mhr>0){
    avgHR=Math.round(rhr+(mhr-rhr)*hrrPct);
    maxHR=Math.min(mhr,Math.round(avgHR*1.08));
  } else if(mhr>0){
    avgHR=Math.round(mhr*(0.50+0.42*rpeN));
    maxHR=Math.min(mhr,Math.round(avgHR*1.08));
  } else {
    return{avgHR:null,maxHR:null,estimated:false};
  }
  return{avgHR,maxHR,estimated:true};
}

// Normalized Power tahmini (gerçek 30sn örnekleri olmadan)
// NP ≈ avgPower × katsayı (yoğunluk türüne göre variability tahmini)
function calcNP(ort_guc, maks_guc, tur){
  if(!ort_guc||parseFloat(ort_guc)<=0)return null;
  const avg=parseFloat(ort_guc);
  const maks=parseFloat(maks_guc)||avg*1.5;
  // Variability Index tahmini: steady → düşük, interval → yüksek
  const viEst={kolay:1.01,aerobik:1.03,uzun:1.04,tempo:1.06,
    esik:1.08,interval:1.12,yokus_kisa:1.15,yokus_uzun:1.10,
    tirmanis:1.07,capraz:1.05}[tur]||1.05;
  // NP ≈ avgPower × VI
  return Math.round(avg*viEst);
}

// Intensity Factor (IF): güç varsa NP/FTP, yoksa avgHR/LTHR
function calcIF(np, ftp, avgHR, lthr){
  if(np>0&&ftp>0)return round2(np/ftp);
  if(avgHR>0&&lthr>0)return round2(avgHR/lthr);
  return null;
}

function calcMetrics(w,ath){
  const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
  const durMin=durSec/60;
  const rpe=parseFloat(w.rpe)||0;
  let avgHR=parseFloat(w.ort_nabiz)||0;
  let hrEstimated=false;

  if(!avgHR&&rpe>0){
    const est=estimateHR(rpe,parseFloat(ath?.rhr)||0,parseFloat(ath?.mhr)||0);
    if(est.avgHR){avgHR=est.avgHR;hrEstimated=true;}
  }

  // Güç metrikleri
  const ortGuc=parseFloat(w.ort_guc)||0;
  const maksGuc=parseFloat(w.maks_guc)||0;
  const ftp=parseFloat(ath?.ftp)||0;
  const np=ortGuc>0?calcNP(w.ort_guc,w.maks_guc,w.tur):null;
  const IF_v=calcIF(np||0,ftp,avgHR,parseFloat(ath?.lthr)||0);

  // Yük metrikleri
  const trimp=calcTRIMP(durMin,avgHR,ath?.rhr,ath?.mhr,ath?.cinsiyet);
  const hrTSS=calcHrTSS(durSec,avgHR,ath?.lthr);
  // Güç bazlı TSS (pTSS) — FTP ve NP varsa
  const pTSS=(np&&ftp>0&&durSec>0)?round1((durSec/3600)*(IF_v**2)*100):null;
  const yukObj=calcObjLoad(durSec,avgHR,ath?.lthr,ath?.rhr,ath?.mhr,ath?.cinsiyet,w.mesafe,w.irtifa,w.zemin_zorluk);
  // Excel X: RPE × süre(dk) — Subjektif yük
  const yukSubj=rpe>0?round1(rpe*durMin):0;
  const yukFinal=yukObj>0?yukObj:yukSubj;
  const mechLoad=calcMechLoad(w.mesafe,w.irtifa,w.zemin_zorluk);

  // Excel Y: Temel Yük — hrTSS > TRIMP > HR-based
  const temelYuk=hrTSS>0?round1(hrTSS):(trimp>0?round1(trimp):yukFinal);

  return{
    durSec,durMin,trimp,hrTSS,yukObj:yukFinal,yukSubj,mechLoad,
    IF:IF_v,np,pTSS,temelYuk,
    hrEstimated,estAvgHR:hrEstimated?avgHR:null
  };
}

// ── Toparlanma Süresi Hesabı ──────────────────────────────────────────────────
// Bilimsel referans: Kenttä & Hassmén (1998), Mujika & Padilla (2000)
// Döner: { saatler, kategori, renk, detay }
function calcRecovery(w, ath, yukObj){
  const yuk=yukObj||0;
  const tur=w.tur||'aerobik';
  const rpe=parseFloat(w.rpe)||0;
  const durMin=toSec(w.sure_sa,w.sure_dk,w.sure_sn)/60;
  const irtifa=parseFloat(w.irtifa)||0;
  const band=ctlBand(parseFloat(ath?.ctl)||0); // CTL bandı daha doğru, yoksa basit tahmin

  // 1. Temel toparlanma: yük bazlı (TSS/yük)
  // <30 → 12s, 30-60 → 18s, 60-100 → 24s, 100-150 → 36s, >150 → 48s
  let bazSaat=yuk<30?12:yuk<60?18:yuk<100?24:yuk<150?36:48;

  // 2. Tür modifikatörü
  const turMod={
    kolay:0.7, aerobik:1.0, uzun:1.4,
    tempo:1.2, esik:1.3, interval:1.5,
    yokus_kisa:1.4, yokus_uzun:1.5, tirmanis:1.4,
    teknik:1.0, acici:0.8, capraz:0.8, dinlenme:0
  }[tur]||1.0;

  // 3. İrtifa modifikatörü (D+ > 500m → ekstra nöromüsküler stres)
  const irtifaMod=irtifa>2000?1.3:irtifa>1000?1.15:irtifa>500?1.08:1.0;

  // 4. Sporcu CTL bandı — daha deneyimli sporcu daha hızlı toparlar
  const bandMod=[1.3,1.15,1.0,0.9,0.85][Math.min(4,Math.max(0,(band||1)-1))];

  let saatler=Math.round(bazSaat*turMod*irtifaMod*bandMod);

  // 5. Min/max sınırlar
  saatler=Math.max(8,Math.min(72,saatler));

  // Kategori
  let kategori,renk;
  if(saatler<=12){kategori='Hafif';renk='success';}
  else if(saatler<=24){kategori='Orta';renk='info';}
  else if(saatler<=36){kategori='Ağır';renk='warn';}
  else{kategori='Çok Ağır';renk='danger';}

  // Önerilen aktiviteler
  const aktivite=saatler<=12
    ?'Yürüyüş veya hafif esneme yapılabilir'
    :saatler<=24
    ?'Aktif toparlanma (yürüyüş, hafif bisiklet) önerilir'
    :saatler<=36
    ?'Tam dinlenme veya çok hafif yürüyüş'
    :'Tam dinlenme — kas glikojeni yenilenmesi öncelik';

  // Hedef zaman
  const hedef=new Date();
  hedef.setHours(hedef.getHours()+saatler);
  const hedefStr=hedef.toLocaleString('tr-TR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  return{saatler,kategori,renk,aktivite,hedefStr};
}
// Referans: Banister 1991, Morton 1997
const λ_atl=1-Math.exp(-1/7);   // τ=7 gün (akut/yorgunluk)
const λ_ctl=1-Math.exp(-1/42);  // τ=42 gün (kronik/fitness)

// Faz hesabı — yarış tarihine ve hazırlık süresine göre
function calcPhase(dateStr,raceDate,prepWeeks,raceInfo){
  if(!raceDate||!prepWeeks)return'Temel';
  const d=new Date(dateStr+'T12:00:00');
  const rd=new Date(raceDate+'T12:00:00');
  const daysToRace=(rd-d)/864e5;
  if(daysToRace<-3)return'Yarış Sonrası';
  const dist=parseFloat(raceInfo?.dist||raceInfo?.mesafe||0);
  // Manuel ayarlar varsa kullan, yoksa otomatik
  const taperW=parseInt(raceInfo?.taper_w)||( dist>42?3:dist>21?2:1);
  const peakW=parseInt(raceInfo?.peak_w)||( dist>42?4:dist>21?3:2);
  if(daysToRace<=taperW*7)return'Taper';
  if(daysToRace<=(taperW+peakW)*7)return'Zirve';
  if(daysToRace<=prepWeeks*7)return'Gelişme';
  return'Temel';
}

// Öneri hazırlık süresi — yarış metriklerine göre
function suggestPrepWeeks(mesafe,d_plus,iklim_zorluk){
  const km=parseFloat(mesafe)||0;
  const dp=parseFloat(d_plus)||0;
  const iz=parseInt(iklim_zorluk)||1;
  let base=km<10?8:km<21?10:km<42?14:km<60?20:km<90?24:28;
  const dp_bonus=Math.floor(dp/500);
  const terrain_bonus=(iz-1);
  return Math.min(base+dp_bonus+terrain_bonus,36);
}

// Yük artış çarpanı — Gabbett (2016), Hulin (2015) tabanlı
// HRV yoğunluk katsayısı — bilinmiyorsa nötr (1.0), bonus/ceza yok
function hrvMod(hrv_durum){
  return{dengeli:1.0,dengesiz:0.85,düşük:0.70}[hrv_durum]??1.0;
}
// HRV hazırlık skoru katkısı — bilinmiyorsa 0 (ne artı ne eksi)
function hrvReadinessBonus(hrv_durum){
  return{dengeli:5,dengesiz:0,düşük:-5}[hrv_durum]??0;
}

function calcLoadMultiplier(acwr,phase,hrv_durum,sakatlık){
  if(!acwr)return{mult:1.0,label:'Veri yok',cls:''};
  // ACWR tabanlı baz
  let base=acwr<0.8?1.15:acwr<1.0?1.08:acwr<1.15?1.03:acwr<1.3?1.0:acwr<1.5?0.90:0.80;
  // Faz modifikatörü
  const pmod={Temel:1.06,Gelişme:1.0,Zirve:0.96,Taper:0.58,'Yarış Sonrası':0.70}[phase]||1.0;
  // HRV modifikatörü — bilinmiyorsa nötr (1.0)
  const hmod={dengeli:1.0,dengesiz:0.95,düşük:0.88}[hrv_durum]??1.0;
  // Sakatlık modifikatörü
  const inj=parseInt(sakatlık)||1;
  const imod=inj<=2?1.0:inj<=4?0.95:inj<=6?0.87:inj<=8?0.77:0.60;
  const mult=Math.min(1.25,Math.max(0.50,base*pmod*hmod*imod));
  const label=mult>=1.1?'Yük artır':mult>=1.0?'Kademeli artış':mult>=0.9?'Koru':mult>=0.7?'Azalt':'Önemli ölçüde azalt';
  const cls=mult>=1.1?'good':mult>=0.95?'info':mult>=0.8?'warn':'danger';
  return{mult:round2(mult),label,cls};
}

function buildHistory(wks,ath,races){
  if(!wks.length)return[];
  const sorted=[...wks].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const today=new Date();
  // En zor yarışı birincil olarak seç (selectRaces ile tutarlı)
  const {primary:nextRace}=selectRaces(ath,races);

  const byDay={};
  sorted.forEach(w=>{
    const m=calcMetrics(w,ath);
    const day=(w.date||'').split('T')[0];
    const km=parseFloat(w.mesafe)||0;
    const hr=parseFloat(w.ort_nabiz)||0;
    const durMin=m.durSec/60;
    // Aerobik verimlilik: pace (sn/km) normalised to 140 bpm
    // Yalnızca Z2 benzeri antrenmanlar için — HR 120-160 arası, mesafe>2km
    let aerEff=null;
    const hrMax=parseFloat(w.maks_nabiz)||0;
    const hrRange=hrMax>0&&hr>0?hrMax-hr:0;
    const tur=w.tur||'';
    const YAPILI=['interval','esik','tempo','yokus_kisa','yokus_uzun','tirmanis','teknik','depar','yaris'];
    const isSteady=!YAPILI.includes(tur)&&(hrRange===0||hrRange<=25)&&(parseFloat(w.rpe)||0)<=7;
    if(km>2&&hr>120&&hr<165&&durMin>15&&isSteady){
      const paceSec=(durMin*60)/km;
      aerEff=round1(paceSec*(hr/140));
    }
    if(day){
      byDay[day]=byDay[day]||{load:0,mech:0,aerEffSum:0,aerEffCount:0};
      byDay[day].load+=(m.yukObj||0);
      byDay[day].mech+=(m.mechLoad||0);
      if(aerEff){byDay[day].aerEffSum+=aerEff;byDay[day].aerEffCount++;}
    }
  });
  const first=new Date(sorted[0].date+'T12:00:00');
  const days=[];
  for(let d=new Date(first);d<=today;d.setDate(d.getDate()+1)){
    const y=d.getFullYear();const mo=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');
    days.push(`${y}-${mo}-${dd}`);
  }

  let atl=0,ctl=0,mAtl=0,mCtl=0;
  return days.map(day=>{
    const {load=0,mech=0,aerEffSum=0,aerEffCount=0}=byDay[day]||{};
    atl=load*λ_atl+atl*(1-λ_atl);
    ctl=load*λ_ctl+ctl*(1-λ_ctl);
    mAtl=mech*λ_atl+mAtl*(1-λ_atl);
    mCtl=mech*λ_ctl+mCtl*(1-λ_ctl);
    const acwr=ctl>1?round2(atl/ctl):null;
    const phase=calcPhase(day,nextRace?.tarih,nextRace?.prep_weeks,nextRace||{});
    const aerEff=aerEffCount>0?round1(aerEffSum/aerEffCount):null;
    return{
      date:day,load:round1(load),mech:round1(mech),
      atl:round1(atl),ctl:round1(ctl),tsb:round1(ctl-atl),acwr,
      mechAtl:round1(mAtl),mechCtl:round1(mCtl),phase,aerEff
    };
  });
}

// ── Hedef Süre Motoru (Excel modelinden port edildi) ─────────────────────────

function fmtHMS(totalMin){
  if(!totalMin||totalMin<=0)return'—';
  const h=Math.floor(totalMin/60);
  const m=Math.floor(totalMin%60);
  const s=Math.round((totalMin*60)%60);
  return h>0?`${h}s ${String(m).padStart(2,'0')}dk ${String(s).padStart(2,'0')}sn`:`${m}dk ${String(s).padStart(2,'0')}sn`;
}

function fmtPaceStr(totalMin,km){
  if(!totalMin||!km)return'—';
  const paceSec=(totalMin/km)*60;
  const pm=Math.floor(paceSec/60);
  const ps=Math.round(paceSec%60);
  return`${pm}:${String(ps).padStart(2,'0')} /km`;
}

function pbToMin(pbStr){
  if(!pbStr)return null;
  const parts=pbStr.split(':').map(Number);
  if(parts.length===3)return parts[0]*60+parts[1]+parts[2]/60;
  if(parts.length===2)return parts[0]+parts[1]/60;
  return null;
}


// Yarış hazırlık skoru (0-100) — CTL, ACWR, sakatlık, faz
function raceReadinessScore(ctl,acwr,phase,sakatlık,hrv_durum,daysLeft,race,athlete,workouts){
  if(!acwr||!athlete)return null;
  // ── 6 BAĞIMSIZ FAKTÖR — SAF TOPLAÇI SİSTEM (max=100) ────────────────────
  //
  //  Faktör                      Max  Boyut               Kaynak
  //  Fitness-Talep Dengesi        30  Kondisyon/yarış      Banister 1991
  //  Yük Dengesi (ACWR)           22  Akut/kronik denge    Gabbett 2016
  //  Sağlık & Sakatlık            20  Fiziksel müsaitlik   Gate-keeper
  //  Döngü İlerlemesi             14  Periodizasyon        Mujika 2009
  //  Plan Tutarlılığı             10  Uygulama kalitesi    Foster 1998
  //  HRV & Toparlanma              4  Kısa vade toparlanma Kiviniemi 2007
  //  TOPLAM                      100
  //
  //  CTL+ZorlukUyumu → birleştirildi (aynı ctlRatio'yu ölçüyordu)
  //  HazırlıkTamamlanma+Faz → birleştirildi (aynı döngü ilerlemesini ölçüyordu)
  // ─────────────────────────────────────────────────────────────────────────
  const detaylar=[];
  const km=parseFloat(race?.mesafe)||0;
  const dp=parseFloat(race?.d_plus)||0;
  const safeCtl=ctl||0;
  const targetCTL=km<=5?25:km<=10?35:km<=21?45:km<=42?60:km<=60?75:km<=90?90:105;
  const ctlRatio=targetCTL>0?Math.min(safeCtl/targetCTL,1.0):0;
  const ctlPct=Math.round(ctlRatio*100);

  // ── 1. Fitness-Talep Dengesi (0-30) ─────────────────────────────────────
  // CTL / yarışın gerektirdiği CTL — spesifik hazırlık prensibi burada
  // targetCTL mesafe+D+ bazlı belirlendiğinden yarış zorluğu zaten içinde
  const fitPuan=Math.round(ctlRatio*30);
  detaylar.push({
    baslik:'Fitness-Talep Dengesi',puan:fitPuan,max:30,
    yon:fitPuan>=24?'iyi':fitPuan>=15?'nötr':'kotu',
    aciklama:`CTL ${round1(safeCtl)} / ${race?.ad||'Yarış'} için gereken ${targetCTL} (%${ctlPct}) — ${
      ctlRatio>=1.0?'Yarışın talebi karşılanıyor ✓':
      ctlRatio>=0.8?'İyi seviye, son rötuşlar':
      ctlRatio>=0.6?'Gelişiyor, artış devam etmeli':
      ctlRatio>=0.3?'Kondisyon yetersiz':
      'Çok düşük, uzun hazırlık gerekli'}`
  });

  // ── 2. Yük Dengesi ACWR (0-22) ──────────────────────────────────────────
  // Hem akut hazırlık hem yaralanma riski — üçgen peak 1.05'te
  let acwrPuan;
  if(acwr>=0.8&&acwr<=1.3){
    acwrPuan=Math.round(22*Math.max(0,1-Math.abs(acwr-1.05)/0.25));
  } else if(acwr<0.8){
    acwrPuan=Math.round(Math.max(0,22*acwr/0.8));
  } else {
    acwrPuan=Math.round(Math.max(0,22*Math.max(0,1-(acwr-1.3)/0.5)));
  }
  detaylar.push({
    baslik:'Yük Dengesi (ACWR)',puan:acwrPuan,max:22,
    yon:acwrPuan>=17?'iyi':acwrPuan>=10?'nötr':'kotu',
    aciklama:`ACWR ${acwr.toFixed(2)} — ${
      acwr>=0.95&&acwr<=1.15?'İdeal yük dengesi ✓':
      acwr>=0.8&&acwr<=1.3?'Kabul edilebilir aralık':
      acwr<0.8?'Düşük yük — form kaybı riski':
      acwr<=1.5?'Yüksek yük — toparlanma gerekli':
      'Aşırı yük — zorunlu dinlenme'}`
  });

  // ── 3. Sağlık & Sakatlık (0-20) — gate-keeper faktör ───────────────────
  // Sakatlık diğer tüm faktörleri geçersiz kılabilir
  const inj=parseInt(sakatlık)||1;
  const injPuan=Math.round(Math.max(0,20-(inj-1)*20/9));
  detaylar.push({
    baslik:'Sağlık & Sakatlık',puan:injPuan,max:20,
    yon:injPuan>=16?'iyi':injPuan>=10?'nötr':'kotu',
    aciklama:`Sakatlık ${inj}/10 — ${
      inj===1?'Tam sağlıklı ✓':
      inj<=3?'Hafif şikayet, takip et':
      inj<=5?'Orta şikayet, yükü sınırla':
      inj<=7?'Ciddi şikayet, risk var':
      'Yüksek risk, yarış sorgulanmalı'}`
  });

  // ── 4. Döngü İlerlemesi (0-18) ──────────────────────────────────────────
  // Hazırlık tamamlanma + faz birleşimi — aynı boyutu ölçüyorlar
  // Faz: döngünün nerede olduğu (0-10)
  // Tamamlanma: döngünün yüzde kaçı geçildi (0-8 ek puan)
  const racePhase=race?.tarih&&race?.prep_weeks
    ?calcPhase(new Date().toISOString().split('T')[0],race.tarih,race.prep_weeks,race)
    :phase;
  const fazS={Taper:10,Zirve:8,Gelişme:5,Temel:2,'Yarış Sonrası':0}[racePhase]??2;
  let compS=0;
  let dongüAciklama=racePhase;
  if(daysLeft>0&&race?.prep_weeks){
    const prepWeeks=parseInt(race.prep_weeks)||12;
    const taperW=parseInt(race?.taper_w)||(km>42?3:km>21?2:1);
    const totalDays=Math.max(1,(prepWeeks-taperW)*7);
    const doneDays=Math.max(0,totalDays-(Math.max(0,daysLeft-taperW*7)));
    const pct=Math.min(1,doneDays/totalDays);
    const pctR=Math.round(pct*100);
    compS=pct>=0.90?4:pct>=0.75?3:pct>=0.60?2:pct>=0.40?1:0;
    dongüAciklama=`${racePhase}, %${pctR} tamamlandı`;
  }
  const dongüPuan=Math.min(14,fazS+compS);
  detaylar.push({
    baslik:'Döngü İlerlemesi',puan:dongüPuan,max:14,
    yon:dongüPuan>=11?'iyi':dongüPuan>=6?'nötr':'kotu',
    aciklama:`${dongüAciklama} — ${
      racePhase==='Taper'?'Form zirvede, yarışa hazır ✓':
      racePhase==='Zirve'?'Son yüksek yük haftaları':
      racePhase==='Gelişme'?'İyi ilerleme, devam':
      racePhase==='Temel'?'Temel faz, uzun süreç önde':
      'Yarış sonrası toparlanma'}`
  });

  // ── 5. Plan Tutarlılığı (0-6) ────────────────────────────────────────────
  let planPuan=5; // veri yoksa orta puan
  let planAciklama='Geçmiş hafta verisi yok';
  if(workouts?.length&&race?.prep_weeks&&race?.tarih){
    const weekTargets=calcWeeklyTargets(athlete,[race],workouts||[]);
    const athWks=(workouts||[]).filter(w=>w.athleteId===athlete?.id);
    const pastTargets=weekTargets.filter(wt=>wt.isPast&&(wt.targetKm>0||wt.targetDp>0));
    if(pastTargets.length>0){
      let ts=0;
      pastTargets.forEach(wt=>{
        const ws=wt.weekStart,we=wt.weekEnd;
        const wWks=athWks.filter(w=>{const d=new Date(w.date+'T12:00:00');return d>=ws&&d<=we;});
        const aKm=round1(wWks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
        const aDp=Math.round(wWks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0));
        const kR=wt.targetKm>0?Math.min(1.1,aKm/wt.targetKm):1;
        const dR=wt.targetDp>0?Math.min(1.1,aDp/wt.targetDp):kR;
        ts+=kR*0.6+dR*0.4;
      });
      const avg=ts/pastTargets.length;
      const avgPct=Math.round(avg*100);
      planPuan=avg>=0.90?10:avg>=0.75?8:avg>=0.60?6:avg>=0.40?3:avg>=0.20?1:0;
      planAciklama=`%${avgPct} ortalama uyum (${pastTargets.length} hafta) — ${
        avg>=0.90?'Mükemmel disiplin ✓':
        avg>=0.75?'İyi tutarlılık':
        avg>=0.60?'Orta düzey':
        avg>=0.40?'Tutarsız':
        'Ciddi eksiklik'}`;
    }
  }
  detaylar.push({
    baslik:'Plan Tutarlılığı',puan:planPuan,max:10,
    yon:planPuan>=8?'iyi':planPuan>=4?'nötr':'kotu',
    aciklama:planAciklama
  });

  // ── 6. HRV & Toparlanma (0-4) ─────────────────────────────────────────
  const hrvPuan={dengeli:4,dengesiz:2,'düşük':0}[hrv_durum]??2;
  detaylar.push({
    baslik:'HRV & Toparlanma',puan:hrvPuan,max:4,
    yon:hrvPuan>=3?'iyi':hrvPuan>=1?'nötr':'kotu',
    aciklama:`HRV: ${hrv_durum||'bilinmiyor'} — ${
      hrv_durum==='dengeli'?'Sinir sistemi dinlenmiş ✓':
      hrv_durum==='dengesiz'?'Orta toparlanma':
      hrv_durum==='düşük'?'Yorgunluk yüksek':
      'Veri yok'}`
  });

  // ── TOPLAM ────────────────────────────────────────────────────────────────
  const rawScore=fitPuan+acwrPuan+injPuan+dongüPuan+planPuan+hrvPuan;
  // rawScore her zaman 0-100 — floor/cap hack gerekmez

  let finalScore=rawScore;
  let tavanNot=null;
  if(daysLeft>0&&daysLeft<7){finalScore=Math.min(rawScore,80);tavanNot=`Yarışa ${daysLeft} gün kaldı — form tam açığa çıkmamış olabilir`;}
  else if(daysLeft>0&&daysLeft<14){finalScore=Math.min(rawScore,90);tavanNot=`Yarışa ${daysLeft} gün kaldı`;}
  if(tavanNot) detaylar.push({baslik:'Yarış Yakınlığı',puan:null,max:null,yon:'nötr',aciklama:tavanNot});

  return{score:finalScore,rawScore,detaylar};
}
// ── Bölgeler Motoru (Friel + Daniels) ────────────────────────────────────────

// Daniels VDOT tablosundan pace → VDOT (basit lineer interpolasyon)
// vdot = 0.000104 * dist + 0.182258 * pace + ... (tam formül)
// Daha temiz: Daniels formülünü tersine çevirerek PB'den vLT türetiyoruz
function pbToVlt(pbStr, distKm){
  const mins = pbToMin(pbStr);
  if(!mins || !distKm) return null;
  const paceMinKm = mins / distKm;
  const paceMS = 1000 / (paceMinKm * 60);
  // Daniels: VDOT ≈ yarış hızı / eşik yüzdesi
  // Eşik yaklaşık %86 of VO2max pace
  // Riegel zinciri: vLT ≈ maraton pace * 1.07 ≈ HM pace * 0.99 ≈ 10K pace * 0.92
  const LTHR_RATIO = distKm >= 42 ? 1.08 : distKm >= 20 ? 1.00 : distKm >= 9 ? 0.93 : 0.87;
  return round2(paceMS * LTHR_RATIO);
}

// ── vLT Otomatik Kalibrasyon (Antrenman Verilerinden) ─────────────────────────
// Metodoloji: Sabit tempolu aerobik antrenmanlarda pace-HR doğrusal regresyonu
// Referans: Conconi 1982, Carter 1999 — submaksimal HR-pace ilişkisi

function calibrateVlt(workouts, ath){
  const lthr=parseFloat(ath?.lthr)||0;
  const mhr=parseFloat(ath?.mhr)||0;
  const rhr=parseFloat(ath?.rhr)||0;
  if(!mhr||!rhr)return{error:'MHR ve RHR bilgisi gereklidir.'};

  // Eşik nabız — LTHR varsa onu kullan, yoksa %85 MHR
  const thresholdHR=lthr>0?lthr:Math.round(mhr*0.85);

  // Uygun antrenmanları filtrele
  // Yapısal olarak sabit tempolu sayılan türler
  const STEADY_TURLERI=['kolay','aerobik','uzun',''];

  const eligible=workouts.filter(w=>{
    const km=parseFloat(w.mesafe)||0;
    const hr=parseFloat(w.ort_nabiz)||0;
    const hrMax=parseFloat(w.maks_nabiz)||0;
    const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
    const rpe=parseFloat(w.rpe)||0;
    const zemin=parseInt(w.zemin_zorluk)||1;
    const spor=w.spor||'kosu';
    const tur=w.tur||'';

    // 1. Temel koşullar
    if(spor!=='kosu') return false;
    if(km<3) return false;
    if(durSec<1200) return false;   // en az 20dk
    if(hr<115||hr>165) return false; // aerobik bölge
    if(zemin>2) return false;        // düz/hafif arazi

    // 2. Antrenman türü — interval/esik/tempo/yokuş kesinlikle dışla
    const YAPILI=['interval','esik','tempo','yokus_kisa','yokus_uzun','tirmanis','teknik','depar','yaris'];
    if(YAPILI.includes(tur)) return false;

    // 3. Nabız değişkenliği — maks ve ortalama arasındaki fark
    // Interval/fartlek'te fark büyük olur (>25 bpm)
    // Sabit tempolu koşuda fark küçük olur (<20 bpm)
    if(hrMax>0&&hr>0){
      const hrRange=hrMax-hr;
      if(hrRange>25) return false; // çok değişken — sabit tempo değil
    }

    // 4. RPE kontrolü — yüksek RPE yapısal antrenmanı işaret eder
    if(rpe>7) return false;

    // 5. Pace tutarlılığı proxy — pace/hr oranı makul aralıkta mı?
    // Çok kısa mesafe + uzun süre = muhtemelen interval (dinlenme dahil)
    const durMin=durSec/60;
    const pace=km>0?durMin/km:0; // dk/km
    if(pace<3.0||pace>10.0) return false; // gerçekdışı pace

    return true;
  });

  if(eligible.length<3)return{
    error:`Yeterli veri yok. ${eligible.length} uygun sabit tempolu antrenman bulundu (en az 3 gerekli). İpucu: kolay/aerobik/uzun türündeki antrenmanlara tür atayın.`,
    count:eligible.length
  };

  // Her antrenman için pace (m/s) ve HR çifti
  const points=eligible.map(w=>{
    const km=parseFloat(w.mesafe);
    const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
    const hr=parseFloat(w.ort_nabiz);
    const pace=km*1000/durSec; // m/s
    return{pace,hr,date:w.date};
  }).filter(p=>p.pace>1&&p.pace<8);

  if(points.length<3)return{error:'Geçerli pace-HR çifti yeterli değil.',count:points.length};

  // Doğrusal regresyon: HR = a + b*pace
  const n=points.length;
  const sumX=points.reduce((s,p)=>s+p.pace,0);
  const sumY=points.reduce((s,p)=>s+p.hr,0);
  const sumXY=points.reduce((s,p)=>s+p.pace*p.hr,0);
  const sumX2=points.reduce((s,p)=>s+p.pace*p.pace,0);
  const b=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
  const a=sumY/n-b*(sumX/n);

  // R² güven skoru
  const yMean=sumY/n;
  const ssTot=points.reduce((s,p)=>s+(p.hr-yMean)**2,0);
  const ssRes=points.reduce((s,p)=>s+(p.hr-(a+b*p.pace))**2,0);
  const r2=ssTot>0?Math.max(0,1-ssRes/ssTot):0;

  if(b<=0)return{error:'Pace-HR ilişkisi ters çıktı. Daha fazla sabit tempolu koşu verisi gerekiyor.',count:n};

  // vLT = (thresholdHR - a) / b
  const vlt=(thresholdHR-a)/b;

  if(vlt<1.5||vlt>7)return{
    error:`Hesaplanan vLT (${round2(vlt)} m/s) makul aralık dışında. Veri kalitesi yetersiz.`,
    count:n,r2:round2(r2)
  };

  // Son 30 gün ve tüm zaman verisi ayrı göster
  const recent=points.filter(p=>(new Date()-new Date(p.date+'T12:00:00'))<30*864e5);
  let vltRecent=null;
  if(recent.length>=3){
    const rn=recent.length;
    const rX=recent.reduce((s,p)=>s+p.pace,0);
    const rY=recent.reduce((s,p)=>s+p.hr,0);
    const rXY=recent.reduce((s,p)=>s+p.pace*p.hr,0);
    const rX2=recent.reduce((s,p)=>s+p.pace*p.pace,0);
    const rb=(rn*rXY-rX*rY)/(rn*rX2-rX*rX);
    const ra=rY/rn-rb*(rX/rn);
    if(rb>0){const v=(thresholdHR-ra)/rb;if(v>1.5&&v<7)vltRecent=round2(v);}
  }

  return{
    vlt:round2(vlt),
    vltRecent,
    r2:round2(r2),
    count:n,
    recentCount:recent.length,
    thresholdHR,
    points,
    confidence:r2>=0.7?'Yüksek':r2>=0.5?'Orta':'Düşük',
    confidenceCls:r2>=0.7?'good':r2>=0.5?'warn':'danger',
  };
}

const HR_ZONES_HRR = [
  {id:'Z1', label:'Z1 — Toparlanma',    lo:0.50, hi:0.60},

// Pace bölgeleri — %vLT bazlı (Friel/Coggan)
const PACE_ZONES_VLT = [
  // lo=0.60: fizyolojik alt sınır (yürüyüş üstü koşu) — hedef pace anlamlı kalır
  // lo=0 olsaydı hedef=(0+0.75)/2=0.375×vLT → nonsens (12+ dk/km)
  {id:'Z1', lo:0.60, hi:0.75},
  {id:'Z2', lo:0.75, hi:0.85},
  {id:'Z3', lo:0.85, hi:0.90},
  {id:'Z4', lo:0.90, hi:0.97},
  {id:'Z5a',lo:0.97, hi:1.00},
  {id:'Z5b',lo:1.00, hi:1.05},
  {id:'Z5c',lo:1.05, hi:1.15},
];

function calcZones(ath){
  const rhr = parseFloat(ath.rhr)||0;
  const mhr = parseFloat(ath.mhr)||0;
  const lthr = parseFloat(ath.lthr)||0;
  const vlt = calcVlt(ath); // m/s

  let hrZones = null;
  if(lthr > 0 && mhr > 0){
    // %LTHR yöntemi
    hrZones = HR_ZONES_LTHR.map(z=>({
      ...z,
      lo_bpm: Math.round(lthr * z.lo),
      hi_bpm: Math.round(lthr * z.hi),
      method:'%LTHR'
    }));
  } else if(rhr > 0 && mhr > 0){
    // Karvonen %HRR yöntemi
    hrZones = HR_ZONES_HRR.map(z=>({
      ...z,
      lo_bpm: Math.round(rhr + (mhr-rhr)*z.lo),
      hi_bpm: Math.round(rhr + (mhr-rhr)*z.hi),
      method:'%HRR'
    }));
  }

  let paceZones = null;
  if(vlt && vlt > 0){
    paceZones = PACE_ZONES_VLT.map(z=>({
      ...z,
      lo_ms: round2(vlt * z.lo),
      hi_ms: round2(vlt * z.hi),
      lo_pace: fmtPaceFromMS(vlt * z.lo),
      hi_pace: fmtPaceFromMS(vlt * z.hi),
      target_pace: fmtPaceFromMS(vlt * (z.lo + z.hi) / 2),
    }));
  }

  return {hrZones, paceZones, vlt, lthr, rhr, mhr};
}

function fmtPaceFromMS(ms){
  if(!ms || ms <= 0) return '—';
  const secPerKm = 1000 / ms;
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ── Düzeltilmiş Hedef Süre Motoru ────────────────────────────────────────────
// Metodoloji: Excel Bilgi!C40 formülünün tam port'u
// Temel fark: vLT'yi doğru hesaplıyoruz, PROGRESS ile dinamik ağırlık kullanıyoruz

function calcTargetTime(race, ath, ctl, acwr, workouts){
  const km   = parseFloat(race.mesafe)||0;
  const dp   = parseFloat(race.d_plus)||0;
  const altMax = parseFloat(race.maks_irtifa)||0;
  const altMin = parseFloat(race.min_irtifa)||0;
  const temp = parseFloat(race.sicaklik)||15;
  const nem  = parseFloat(race.nem)||50;
  const diff = parseInt(race.iklim_zorluk)||1;
  const gear = parseFloat(race.ekipman_kg)||0;
  const cp   = parseInt(race.kontrol_noktasi)||0;
  const heatAdapt = parseFloat(ath.isi_aklimasyon)||0;

  const vo2  = parseFloat(ath.vo2max)||0;
  const rhr  = parseFloat(ath.rhr)||0;
  const mhr  = parseFloat(ath.mhr)||0;
  const lthr = parseFloat(ath.lthr)||0;
  const kilo = parseFloat(ath.kilo)||70;
  const boy  = parseFloat(ath.boy)||170;
  const yas  = ath.dogum?new Date().getFullYear()-new Date(ath.dogum).getFullYear():35;
  const bmi  = kilo/((boy/100)**2);
  const hrv_status = {dengeli:3,dengesiz:2,düşük:1}[ath.hrv_durum]??2.5;
  const sakatlık = parseInt(ath.sakatlık)||1;
  const motiv = parseInt(ath.motivasyon)||3;
  const prepWeeks = parseInt(race.prep_weeks)||16;

  if(km<=0||vo2<=0) return null;

  // ── 1. VDOT SİSTEMİ (Jack Daniels) ────────────────────────────────────────
  // VO2 tüketimi: Daniels exact formula (ml/kg/min at v m/min)
  const vo2AtV=(v)=>-4.60+0.182258*v+0.000104*v*v;
  // vVO2max: binary search
  let lo=100,hi=600;
  for(let i=0;i<50;i++){const mid=(lo+hi)/2;vo2AtV(mid)<vo2?lo=mid:hi=mid;}
  const vVO2max=(lo+hi)/2; // m/min

  // %VO2max kullanım oranı süreye göre (Daniels performans tablosu)
  const pctVo2=(t)=>{
    if(t<10)  return 0.95;
    if(t<20)  return 0.92;
    if(t<30)  return 0.89;
    if(t<45)  return 0.86;
    if(t<60)  return 0.83;
    if(t<90)  return 0.80;
    if(t<120) return 0.77;
    if(t<180) return 0.73;
    if(t<240) return 0.70;
    if(t<360) return 0.64;
    if(t<480) return 0.59;
    if(t<600) return 0.54;
    if(t<900) return 0.48;
    if(t<1200)return 0.43;
    return 0.38;
  };
  // İteratif çözüm
  const predictVo2=(distKm)=>{
    let t=distKm*6; // başlangıç tahmini
    for(let i=0;i<20;i++){
      const newT=(distKm*1000)/(vVO2max*pctVo2(t));
      if(Math.abs(newT-t)<0.1){t=newT;break;}
      t=0.6*newT+0.4*t;
    }
    return t;
  };

  // ── 2. RİEGEL FORMÜLÜ (mesafe-ayarlı üs) ──────────────────────────────────
  // Ultra mesafelerde yorgunluk etkisi üssü artırır
  const riegelExp=(d)=>{
    if(d<=10) return 1.06;
    if(d<=21) return 1.07;
    if(d<=42) return 1.08;
    if(d<=60) return 1.10;
    if(d<=80) return 1.12;
    if(d<=100)return 1.15;
    return 1.17;
  };
  const riegelPred=(pbDist,pbMin)=>pbMin>0?pbMin*Math.pow(km/pbDist,riegelExp(km)):null;

  // PB'leri parse et
  const pbs=[
    {d:5,      t:pbToMin(ath.pb_5k),  w:0.10},
    {d:10,     t:pbToMin(ath.pb_10k), w:0.15},
    {d:21.097, t:pbToMin(ath.pb_hm),  w:0.30},
    {d:42.195, t:pbToMin(ath.pb_m),   w:0.30},
  ].filter(p=>p.t&&p.t>0);

  // ── 3. AĞIRLIKLI BLEND ────────────────────────────────────────────────────
  // VO2max tahmini + PB Riegel ağırlıklı ortalama
  // PB'ler hedefe yakın olduğu ölçüde daha güvenilir
  const vo2Pred = vo2>0 ? predictVo2(km) : null;
  const sources = [];

  pbs.forEach(p=>{
    const pred = riegelPred(p.d, p.t);
    if(pred) sources.push({pred, w:p.w});
  });
  if(vo2Pred) sources.push({pred:vo2Pred, w:0.15});

  if(sources.length===0) return null;

  const totalW = sources.reduce((s,x)=>s+x.w, 0);
  const baseDk = sources.reduce((s,x)=>s+x.pred*x.w, 0) / totalW;

  // ── 4. TERSİYEL FAKTÖRLER ─────────────────────────────────────────────────
  // Fizyolojik kalitatör (küçük düzeltmeler — taban zaten VO2/PB'den geliyor)
  const lthrRatio = lthr>0&&mhr>0 ? lthr/mhr : 0.85;
  const fAge  = Math.max(0.92, Math.min(1.12, 1+Math.max(0,yas-40)*0.004));
  const fBmi  = Math.min(1.15, 1+Math.max(0,bmi-22)*0.008);
  const fRhr  = Math.min(1.15, Math.max(0.88, 1-0.003*(50-rhr)));
  const fLthr = lthr>0&&mhr>0?Math.min(1.10,Math.max(0.90,1-0.3*(lthrRatio-0.85))):1.0;
  const fVo2  = vo2>0?Math.min(1.06,Math.max(0.94,1-0.004*(vo2-50))):1.0;
  const hrv_f = hrv_status===1?1.015:hrv_status===2?1.008:0.995;
  const fHrv  = Math.min(1.03, Math.max(0.97, hrv_f));
  const fSak  = Math.min(1.20, Math.max(0.90, 1+(sakatlık-1)*0.02));
  const fMot  = Math.min(1.04, Math.max(0.96, 1-(motiv-3)*0.02));
  const haf   = Math.max(0.85,1-0.15*(heatAdapt/100));
  const tEff  = temp<=12?0:temp<=22?0.002*(temp-12):0.02+0.004*(temp-22);
  const hEff  = temp>20&&nem>60?Math.min(0.025,0.0007*(nem-60)*Math.min(1,(temp-20)/10)):0;
  const fClim = (1+haf*(tEff+hEff));
  const fGear = gear>0?Math.min(1.10,1+0.6*(gear/kilo)*(1+0.3*Math.min(1,km/42))):1.0;

  // CTL bazlı hazırlık düzeltmesi — mevcut forma göre küçük ince ayar
  // Büyük etki yaratmaz çünkü taban zaten VO2max+PB'den geliyor
  const daysToRace = race.tarih?Math.ceil((new Date(race.tarih+'T12:00:00')-new Date())/864e5):999;
  const remainingWk = Math.max(0,daysToRace/7);
  const PROGRESS = 1-Math.min(1,Math.max(0,remainingWk/prepWeeks));
  const targetCtl = km<=10?50:km<=21?70:km<=42?80:km<=80?95:110;
  let fCtl = 1.0; // taban tahmine dokunma

  // ACWR düzeltmesi
  const acwrVal = acwr||1.0;
  const fAcwr = daysToRace<=14
    ? Math.max(0.97,Math.min(1.04,acwrVal<=1?1-0.015*(1-acwrVal):1+0.02*(acwrVal-1)))
    : 1.0;

  const allFactors = fAge*fBmi*fRhr*fLthr*fVo2*fHrv*fSak*fMot*fClim*fGear*fCtl*fAcwr;

  // ── 5. TIRMANIŞ (Naismith revised, zemin bazlı) ───────────────────────────
  const dn = dp * 0.9; // iniş ≈ tırmanışın %90'ı (yaklaşık)
  const climbRate   = {1:0.8,2:1.0,3:1.3,4:1.6,5:2.0}[diff]||1.0;
  const descentRate = {1:0.5,2:0.6,3:0.75,4:0.9,5:1.1}[diff]||0.6;
  const climbMin = (dp/100)*climbRate + (dn/100)*descentRate;

  // ── 6. KONTROL NOKTASI DURUŞLARI ──────────────────────────────────────────
  const idlePerCp = Math.min(3,Math.max(1,1.5*(1+0.02*(diff-1))*(1+0.05*Math.max(0,dp/1000))*(1+0.01*Math.max(0,(km-30)/30))));
  const idleMin   = cp*idlePerCp;

  // ── 7. SONUÇ ──────────────────────────────────────────────────────────────
  const total = baseDk*allFactors + climbMin + idleMin;

  return{
    totalMin:round1(total), baseDk:round1(baseDk),
    vVO2max:round1(vVO2max), vo2Pred:vo2Pred?round1(vo2Pred):null,
    PROGRESS:round2(PROGRESS), targetCtl,
    factors:{fAge,fBmi,fRhr,fLthr,fVo2,fHrv,fSak,fMot,fClim,fGear,fCtl,fAcwr},
    climbMin:round1(climbMin), idleMin:round1(idleMin),
    pbSources:sources.filter(s=>s.pred).map(s=>round1(s.pred)),
  };
}

// MHR tahminleri — birden fazla formül
function predictMHR(yas, cinsiyet){
  if(!yas)return null;
  const y=parseFloat(yas);
  return{
    tanaka: Math.round(208-0.7*y),          // Tanaka 2001 — en doğru, unisex
    fox:    Math.round(220-y),               // Fox 1971 — klasik
    gender: cinsiyet==='Kadın'
      ? Math.round(206-0.88*y)              // Gulati 2010 — kadın
      : Math.round(208-0.7*y),              // erkek = Tanaka
    önerilen: cinsiyet==='Kadın'
      ? Math.round(206-0.88*y)
      : Math.round(208-0.7*y),
  };
}

// RHR tahmini — yaş + cinsiyet bazlı popülasyon ortalaması
// Aktif sporcular için düşük taraf alınır
function predictRHR(yas, cinsiyet){
  if(!yas)return null;
  const y=parseFloat(yas);
  // AHA popülasyon ortalaması, aktif sporcu için %15 indirim
  let base;
  if(y<30)     base=cinsiyet==='Kadın'?72:70;
  else if(y<40)base=cinsiyet==='Kadın'?74:72;
  else if(y<50)base=cinsiyet==='Kadın'?75:72;
  else if(y<60)base=cinsiyet==='Kadın'?76:74;
  else         base=cinsiyet==='Kadın'?78:75;
  // Sporcu düzeltmesi
  const sporcu=Math.round(base*0.82);
  return{ortalama:base,sporcu,önerilen:sporcu};
}

// BMI hesaplama ve kategori
function calcBMI(kilo,boy,cinsiyet){
  if(!kilo||!boy)return null;
  const k=parseFloat(kilo);
  const b=parseFloat(boy);
  const bmi=k/((b/100)**2);
  let kategori,renk;
  if(bmi<18.5){kategori='Zayıf';renk='info';}
  else if(bmi<25){kategori='Normal';renk='success';}
  else if(bmi<30){kategori='Fazla Kilolu';renk='warn';}
  else{kategori='Obez';renk='danger';}
  // Koşucu için ideal kilo — Stillman formülü + cinsiyet
  // Erkek: 52kg + 1.9kg/2.54cm (152.4cm üzeri her cm için)
  // Kadın: 49kg + 1.7kg/2.54cm
  let idealKilo=null;
  if(b>0){
    const base=cinsiyet==='Kadın'?49:52;
    const perCm=cinsiyet==='Kadın'?1.70:1.90;
    const stillman=base+((b-152.4)/2.54)*perCm;
    // Koşucu için BMI 20-22 aralığı hedef (düzeltme)
    const runnerBMI=cinsiyet==='Kadın'?20.5:21.0;
    const runnerKilo=runnerBMI*((b/100)**2);
    // İkisinin ortalaması
    idealKilo=round1((stillman+runnerKilo)/2);
  }
  const fark=idealKilo?round1(k-idealKilo):null;
  return{bmi:round2(bmi),kategori,renk,idealKilo,fark};
}

// VO₂max tahmini — Tanaka/Fick + LTHR/MHR oranı
function predictVO2max(mhr,rhr,lthr){
  if(!mhr||!rhr)return null;
  // Fick denkleminden: VO2max ≈ 15 × MHR/RHR (Fox 1973)
  const fick=round1(15*(parseFloat(mhr)/parseFloat(rhr)));
  // LTHR tabanlı (daha doğru, LTHR girilmişse)
  const lthrBazli=lthr?round1(15.3*(parseFloat(mhr)/parseFloat(rhr))*(parseFloat(lthr)/parseFloat(mhr)*1.1)):null;
  return{fick, lthrBazli, önerilen:lthrBazli||fick};
}

const LS_WARN_THRESHOLD=0.80;
let _lsWarnShown=false;
function lsCheckUsage(){
  try{
    let used=0;
    for(let k in localStorage)if(localStorage.hasOwnProperty(k))used+=localStorage[k].length*2;
    const total=5*1024*1024; // 5MB tahmini limit
    const pct=used/total;
    if(pct>=LS_WARN_THRESHOLD&&!_lsWarnShown){
      _lsWarnShown=true;
      const usedKB=Math.round(used/1024);
      const pctStr=Math.round(pct*100);
      // Banner göster
      const banner=document.createElement('div');
      banner.id='ls-warn-banner';
      banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#b45309;color:#fff;padding:10px 16px;font-size:13px;display:flex;align-items:center;justify-content:space-between;z-index:9999;gap:12px;';
      banner.innerHTML=`<span>⚠ Depolama %${pctStr} dolu (${usedKB}KB / ~5MB). Dışa Aktar ile yedek al, ardından eski antrenmanları temizle.</span><button onclick="document.getElementById('ls-warn-banner').remove();_lsWarnShown=false;" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;">Kapat</button>`;
      document.body.appendChild(banner);
    }
    return pct;
  }catch{return 0;}
}
const lsSet=(k,v)=>{
  try{
    localStorage.setItem(k,JSON.stringify(v));
    lsCheckUsage();
  }catch(e){
    if(e.name==='QuotaExceededError'||e.code===22){
      alert('Depolama alanı tamamen doldu! Dışa Aktar ile yedek alıp eski antrenmanları temizleyin.');
    }
  }
};

// Görsel sıkıştırıcı — canvas ile yeniden boyutlandırır ve JPEG olarak kaydeder
// maxW/maxH: max piksel, quality: 0–1 JPEG kalitesi
function compressImage(file,{maxW=800,maxH=800,quality=0.75,onDone,onError}){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW||h>maxH){
        const ratio=Math.min(maxW/w,maxH/h);
        w=Math.round(w*ratio);h=Math.round(h*ratio);
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',quality);
      const kb=Math.round(dataUrl.length*0.75/1024);
      console.log(`Gorsel sıkıştırıldı: ${Math.round(file.size/1024)}KB → ${kb}KB (${w}×${h}px)`);
      onDone(dataUrl);
    };
    img.onerror=()=>onError&&onError('Gorsel okunamadi');
    img.src=e.target.result;
  };
  reader.onerror=()=>onError&&onError('Dosya okunamadi');
  reader.readAsDataURL(file);
}

// En yakın katsayıya sahip spor türünü döndürür
function katsayiToSpor(k){
  if(!k||k===''||k===null)return'kosu';
  const val=parseFloat(k);
  if(isNaN(val))return'kosu';
  let best='kosu',bestDiff=Infinity;
  SPOR_TURLERI.forEach(s=>{
    const diff=Math.abs(s.k-val);
    if(diff<bestDiff){bestDiff=diff;best=s.v;}
  });
  return best;
}

function SporcularTab({athletes,races,athHistory,allHistory,onAdd,onUpdate,onDelete,onAddRace,onUpdateRace,onDeleteRace,onDeleteHistoryEntry}){
  const [subTab,setSubTab]=useState('sporcular');
  const [showA,setShowA]=useState(false);
  const [showR,setShowR]=useState(false);
  const [editA,setEditA]=useState(null);
  const [editR,setEditR]=useState(null);
  const [expandHist,setExpandHist]=useState({});
  const rMap=Object.fromEntries(races.map(r=>[r.id,r]));
  const hrv_colors={düşük:'badge-danger',dengesiz:'badge-warn',dengeli:'badge-good'};

  // Sporcuları CTL'e göre sırala (yüksekten düşüğe)
  const sortedAthletes=useMemo(()=>[...athletes].sort((a,b)=>{
    const ha=allHistory?.[a.id]||[];
    const hb=allHistory?.[b.id]||[];
    const ctlA=ha[ha.length-1]?.ctl||0;
    const ctlB=hb[hb.length-1]?.ctl||0;
    return ctlB-ctlA;
  }),[athletes,allHistory]);

  // Yarışları zorluk skoruna göre sırala (yüksekten düşüğe)
  // Zorluk = mesafe + D+/100 + iklim_zorluk×5 + irtifa faktörü
  const sortedRaces=useMemo(()=>[...races].sort((a,b)=>{
    const score=(r)=>{
      const km=parseFloat(r.mesafe)||0;
      const dp=parseFloat(r.d_plus)||0;
      const iklim=parseInt(r.iklim_zorluk)||1;
      const altAvg=(parseFloat(r.maks_irtifa||0)+parseFloat(r.min_irtifa||0))/2;
      return km+(dp/100)+(iklim-1)*5+(altAvg>800?(altAvg-800)/200:0);
    };
    return score(b)-score(a);
  }),[races]);

  const subTabStyle=(id)=>({
    padding:'8px 14px',fontSize:13,cursor:'pointer',

// Hedef süre trendi grafiği
function ChartTargetTrend({history,race,ath,results,workouts}){
  const ref=useRef();const inst=useRef();

  const chartData=useMemo(()=>{
    if(!history.length||!race||!ath)return null;
    // Her 7 günde bir nokta hesapla (her gün hesaplamak çok ağır)
    const points=[];
    for(let i=0;i<history.length;i+=7){
      const day=history[i];
      if(!day.ctl||day.ctl<1)continue;
      let t=null;try{t=calcTargetTime(race,ath,day.ctl,day.acwr,workouts);}catch(e){console.error("calcTargetTime err:",e.message);}
      if(t&&t.totalMin>0)points.push({date:day.date,min:round1(t.totalMin)});
    }
    // Son günü de ekle
    const last=history[history.length-1];
    if(last&&last.ctl>1){
      let t=null;try{t=calcTargetTime(race,ath,last.ctl,last.acwr,workouts);}catch(e){console.error("calcTargetTime err:",e.message);}
      if(t&&t.totalMin>0){
        const already=points.find(p=>p.date===last.date);
        if(!already)points.push({date:last.date,min:round1(t.totalMin)});
      }
    }

    // Her nokta için hedef CTL'ye göre dinamik ölçeklendirme
    // Bu trendin CTL arttıkça düşmesini sağlar (mor çizgi)
    const km=parseFloat(race?.mesafe)||0;
    const dp=parseFloat(race?.d_plus)||0;
    const prepWeeks=parseInt(race?.prep_weeks)||12;
    const taperW=parseInt(race?.taper_w)||(km>42?3:km>21?2:1);
    const raceDate=race?.tarih?new Date(race.tarih+'T12:00:00'):null;
    const trendTargetCtl=km<=10?50:km<=21?70:km<=42?80:km<=80?95:110;

    // Son noktanın tahmini = referans (değiştirme)
    const lastPoint=points[points.length-1];
    points.forEach(p=>{
      // O günkü CTL'yi tarihten bul
      const dayData=history.find(h=>h.date===p.date)||history[history.length-1];
      const dayCtl=dayData?.ctl||trendTargetCtl;
      if(trendTargetCtl>0&&dayCtl>0&&lastPoint){
        // CTL ne kadar düşükse o kadar yavaş — son günden geriye doğru ölçeklendir
        const ratio=dayCtl/trendTargetCtl;
        // ratio=1 → 1.0, ratio=0.5 → 1.18, ratio=1.2 → 0.94
        const ctlScale=Math.max(0.88,Math.min(1.30,1+0.35*(1-ratio)));
        // Son noktayı temel al ve CTL farkını uygula
        const lastDayData=history.find(h=>h.date===lastPoint.date)||history[history.length-1];
        const lastCtl=lastDayData?.ctl||trendTargetCtl;
        const lastScale=Math.max(0.88,Math.min(1.30,1+0.35*(1-lastCtl/trendTargetCtl)));
        p.min=round1(lastPoint.min*(ctlScale/lastScale));
      }
    });

    const dpPerKm=km>0?dp/km:0;
    let maxIyiPct=km<=5?6:km<=10?5:km<=21?4:km<=42?3:km<=60?2.5:2;
    if(dpPerKm>100)maxIyiPct+=1; else if(dpPerKm>50)maxIyiPct+=0.5;

    points.forEach(p=>{
      if(!raceDate)return;
      const daysLeft=Math.ceil((raceDate-new Date(p.date+'T12:00:00'))/864e5);
      const trainingDaysLeft=Math.max(0,daysLeft-taperW*7);
      const totalTrainingDays=Math.max(1,(prepWeeks-taperW)*7);
      const prepPct=Math.min(1,(totalTrainingDays-trainingDaysLeft)/totalTrainingDays);
      const realizePct=prepPct<0.1?0.05:prepPct<0.3?0.15+(prepPct-0.1)*0.5:
        prepPct<0.7?0.25+(prepPct-0.3)*1.5:prepPct<0.9?0.85+(prepPct-0.7)*0.5:0.95;
      const expectedIyi=maxIyiPct*realizePct;
      p.minTarget=round1(p.min*(1-expectedIyi/100));
    });

    return points;
  },[history,race,ath]);

  useEffect(()=>{
    if(!ref.current||!chartData?.length)return;
    const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    const gridColor=isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)';
    const tickColor=isDark?'#777':'#888';
    if(inst.current)inst.current.destroy();

    // Gerçek sonuçları scatter noktası olarak ekle
    const resultPoints=(results||[]).map(r=>({
      x:r.date,y:round1(r.durSec/60)
    }));

    inst.current=new Chart(ref.current,{
      type:'line',
      data:{
        labels:chartData.map(d=>fmtShort(d.date)),
        datasets:[
          {
            label:'Tahmini Süre',
            data:chartData.map(d=>d.min),
            borderColor:'#7c3aed',borderWidth:2,
            pointRadius:3,pointBackgroundColor:'#7c3aed',
            tension:.4,fill:false
          },
          {
            label:'Hedef Süre (İyileştirme)',
            data:chartData.map(d=>d.minTarget||null),
            borderColor:'#16a34a',borderWidth:2,borderDash:[5,4],
            pointRadius:2,pointBackgroundColor:'#16a34a',
            tension:.4,fill:false,spanGaps:false
          },
          resultPoints.length>0&&{
            label:'Gerçekleşen',
            data:chartData.map(d=>{
              const r=resultPoints.find(p=>p.x===d.date)||
                (resultPoints.length>0?resultPoints.reduce((a,b)=>
                  Math.abs(new Date(b.x)-new Date(d.date))<Math.abs(new Date(a.x)-new Date(d.date))?b:a
                ):null);
              if(!r)return null;
              const diff=Math.abs(new Date(r.x)-new Date(d.date));
              return diff<4*864e5?r.y:null;
            }),
            borderColor:'#f59e0b',backgroundColor:'#f59e0b',
            pointRadius:8,pointStyle:'star',
            showLine:false,spanGaps:false
          }
        ].filter(Boolean)
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            callbacks:{
              label:ctx=>{
                const v=ctx.raw;
                if(v==null)return null;
                return ctx.dataset.label+': '+fmtHMS(v);
              }
            }
          }
        },
        scales:{
          x:{ticks:{color:tickColor,font:{size:10},maxTicksLimit:8},grid:{color:gridColor},border:{display:false}},
          y:{
            reverse:true,
            ticks:{color:tickColor,font:{size:10},callback:v=>fmtHMS(v)},
            grid:{color:gridColor},border:{display:false},
            title:{display:true,text:'↑ Hızlı (daha iyi)',color:tickColor,font:{size:10}}
          }
        }
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[chartData,results]);

  if(!chartData||chartData.length<2)return React.createElement('div',{style:{fontSize:12,color:'var(--text-tertiary)',padding:'16px 0',textAlign:'center'}},'Trend için en az 2 haftalik antrenman verisi gerekiyor.');
  return React.createElement('div',{style:{position:'relative',height:200}},
    React.createElement('canvas',{ref}),
    React.createElement('div',{style:{display:'flex',gap:16,fontSize:11,color:'var(--text-secondary)',marginTop:4,justifyContent:'center'}},
      React.createElement('span',null,React.createElement('span',{style:{color:'#7c3aed',fontWeight:700}},'━ '),'Tahmini süre'),
      React.createElement('span',null,React.createElement('span',{style:{color:'#16a34a',fontWeight:700}},'╌ '),'Hedef (iyileştirme)'),
      React.createElement('span',null,React.createElement('span',{style:{color:'#f59e0b',fontWeight:700}},'★ '),'Gerçekleşen')
    )
  );
}

// ── Haftalık Liderlik Tablosu ─────────────────────────────────────────────────

function getWeekBounds(offset=0){
  const now=new Date();
  const day=now.getDay();
  const diffToMon=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diffToMon+offset*7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return{start:mon,end:sun};
}

function weekLabel(offset){
  if(offset===0)return'Bu Hafta';
  if(offset===-1)return'Geçen Hafta';
  const {start,end}=getWeekBounds(offset);
  return start.toLocaleDateString('tr-TR',{day:'2-digit',month:'short'})+' – '+end.toLocaleDateString('tr-TR',{day:'2-digit',month:'short'});
}

function calcWeeklyStats(workouts,athletes,weekOffset=0){
  const {start,end}=getWeekBounds(weekOffset);
  return athletes.map(a=>{
    const wks=workouts.filter(w=>{
      if(w.athleteId!==a.id)return false;
      const d=new Date(w.date+'T12:00:00');
      return d>=start&&d<=end;
    });
    const mesafe=round1(wks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
    const irtifa=Math.round(wks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0));
    const sureSn=wks.reduce((s,w)=>s+toSec(w.sure_sa,w.sure_dk,w.sure_sn),0);
    const count=wks.length;
    // Skor = Σ (yukObj × spor_katsayisi)
    // yukObj = hrTSS veya TRIMP (süre+nabız bazlı gerçek antrenman yükü)
    // Spor katsayısı ile düzeltilerek farklı sporlar adil karşılaştırılır
    const athObj=athletes.find(a2=>a2.id===a.id);
    const sporSkoru=round1(wks.reduce((s,w)=>{
      const m=calcMetrics(w,athObj);
      const yuk=m.yukObj||m.yukSubj||0;
      const k=SPOR_MAP[w.spor||'kosu']?.k||1.0;
      return s+yuk*k;
    },0));
    // Spor dağılımı
    const sporDagilim={};
    wks.forEach(w=>{
      const s=w.spor||'kosu';
      sporDagilim[s]=(sporDagilim[s]||0)+1;
    });
    return{ath:a,mesafe,irtifa,sureSn,count,sporSkoru,sporDagilim,wks};
  }).sort((a,b)=>b.sporSkoru-a.sporSkoru);
}

// ── Bölge Dağılım Motoru ─────────────────────────────────────────────────────

// Antrenman türüne göre tahmini bölge dağılımı (%)
const TUR_ZONE_DIST={
  kolay:     {low:92,high:8, ana:0},
  aerobik:   {low:72,high:26,ana:2},
  uzun:      {low:80,high:18,ana:2},
  tempo:     {low:18,high:68,ana:14},
  esik:      {low:12,high:62,ana:26},
  interval:  {low:22,high:28,ana:50},
  yokus_kisa:{low:18,high:30,ana:52},
  yokus_uzun:{low:20,high:48,ana:32},
  tirmanis:  {low:28,high:48,ana:24},
  teknik:    {low:50,high:40,ana:10},
  acici:     {low:40,high:35,ana:25},
  capraz:    {low:70,high:28,ana:2},
  yaris:     {low:10,high:35,ana:55},
};

// Nabız bazlı tahmin (tür yoksa)
function hrBasedZoneDist(avgHR,lthr,mhr,rhr){
  if(!avgHR||!lthr)return null;
  // %LTHR
  const pct=avgHR/lthr;
  if(pct<0.78)       return{low:95,high:5, ana:0};
  if(pct<0.87)       return{low:80,high:18,ana:2};
  if(pct<0.95)       return{low:35,high:55,ana:10};
  if(pct<1.00)       return{low:12,high:62,ana:26};
  if(pct<1.05)       return{low:10,high:30,ana:60};
  return              {low:8, high:22,ana:70};
}

// Tek antrenman için bölge dağılımı — dakika cinsinden
function calcWorkoutZoneDist(w,athlete){
  const durMin=(()=>{
    const s=parseInt(w.sure_sa||0)*3600+parseInt(w.sure_dk||0)*60+parseInt(w.sure_sn||0);
    return s/60;
  })();
  if(durMin<5)return null;
  const spor=w.spor||'kosu';
  if(spor!=='kosu'&&spor!=='yuruyus')return null;

  const tur=w.tur||'';
  const avgHR=parseFloat(w.ort_nabiz)||0;
  const lthr=parseFloat(athlete?.lthr)||0;
  const mhr=parseFloat(athlete?.mhr)||0;
  const rhr=parseFloat(athlete?.rhr)||0;

  // Kaynak seçimi: tür > nabız > varsayılan
  let dist=TUR_ZONE_DIST[tur]||null;
  if(!dist&&avgHR>0&&lthr>0) dist=hrBasedZoneDist(avgHR,lthr,mhr,rhr);
  if(!dist) dist={low:80,high:18,ana:2}; // varsayılan

  return{
    lowMin: round1(durMin*dist.low/100),
    highMin:round1(durMin*dist.high/100),
    anaMin: round1(durMin*dist.ana/100),
    totalMin:round1(durMin),
    lowPct:dist.low, highPct:dist.high, anaPct:dist.ana,
  };
}

// N haftalık bölge dağılımı toplamı
function calcPeriodZoneDist(workouts,athlete,weeks=4){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-weeks*7);
  const wks=workouts.filter(w=>new Date(w.date+'T12:00:00')>=cutoff);
  let low=0,high=0,ana=0,total=0;
  wks.forEach(w=>{
    const d=calcWorkoutZoneDist(w,athlete);
    if(!d)return;
    low+=d.lowMin;high+=d.highMin;ana+=d.anaMin;total+=d.totalMin;
  });
  if(total<1)return null;
  return{
    lowMin:round1(low),highMin:round1(high),anaMin:round1(ana),totalMin:round1(total),
    lowPct:Math.round(low/total*100),
    highPct:Math.round(high/total*100),
    anaPct:Math.round(ana/total*100),
    weeks,
  };
}

// Dağılım durumu — Seiler 80/20 modeli referans
function zoneDist_status(dist){
  if(!dist)return null;
  const {lowPct,highPct,anaPct}=dist;
  const issues=[];
  const flags=[];

  // Düşük aerobik fazla mı az?
  if(lowPct<65) issues.push({type:'low_eksik',msg:'Düşük aerobik yetersiz ('+lowPct+'%). Kolay koşu hacmi artırılmalı.'});
  if(lowPct>90) flags.push({type:'low_fazla',msg:'Çok düşük yoğunluk. Kaliteli antrenman eksik.'});

  // Yüksek aerobik
  if(highPct>25) issues.push({type:'high_fazla',msg:'Yüksek aerobik fazla ('+highPct+'%). Tempo/eşik yoğunluğu azaltılabilir.'});

  // Anaerobik
  if(anaPct>15) issues.push({type:'ana_fazla',msg:'Anaerobik yük yüksek ('+anaPct+'%). Dinlenme veya kolay antrenman gerekli.'});
  if(anaPct<3&&lowPct<85) flags.push({type:'ana_eksik',msg:'Anaerobik stimulus düşük. Kaliteli antrenman eklenebilir.'});

  // Genel durum
  const isOk=issues.length===0;
  const score= isOk?100:Math.max(0,100-issues.length*20-flags.length*5);
  return{issues,flags,isOk,score,
    label:isOk?'Dengeli':issues.length===1?'İyileştirilebilir':'Dengesiz',
    cls:isOk?'badge-good':issues.length===1?'badge-warn':'badge-danger'};
}

// ── Progresif Antrenman Şablon Motoru ────────────────────────────────────────

const DAYS_TR=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const DAYS_SHORT=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];

// CTL bandına göre hacim/yoğunluk seviyesi: 1(düşük)→5(elit)
function ctlBand(ctl){
  if(ctl<25)return 1;
  if(ctl<40)return 2;
  if(ctl<60)return 3;
  if(ctl<80)return 4;
  return 5;
}

// Blok sayısı — CTL bandı + faz
function blockCount(band,phase){
  if(phase==='Taper')return 1;
  if(band<=2)return 1;
  if(band===3)return phase==='Zirve'?2:1;
  if(band===4)return phase==='Zirve'?3:2;
  return phase==='Zirve'?3:2; // band 5
}

// Pace string helper
// Pace string (MM:SS) → saniye
const paceToSec=p=>{if(!p)return 0;const[m,s]=(p+'').split(':');return parseInt(m||0)*60+parseInt(s||0);};
// Saniye → pace string
const secToPace=s=>{const m=Math.floor(s/60);const sc=Math.round(s%60);return`${m}:${String(sc).padStart(2,'0')}`;};
// İki pace arasındaki ortalama
const avgPace=(lo,hi)=>{const ls=paceToSec(lo),hs=paceToSec(hi);return(ls&&hs)?secToPace((ls+hs)/2):null;};

// Pace zone string: "5:30–6:15 (5:52) /km"
const pz=(zones,i)=>{
  if(!zones?.paceZones)return'';
  const z=zones.paceZones[i];
  if(!z?.lo_pace||!z?.hi_pace)return'';
  const avg=avgPace(z.lo_pace,z.hi_pace);
  return`${z.lo_pace}–${z.hi_pace}${avg?` (${avg})`:''} /km`;
};
const pzT=(zones,i)=>{
  if(!zones?.paceZones)return'';
  const t=zones.paceZones[i]?.target_pace;
  return t?`${t} /km`:'';
};

// Tırmanış için gerçekçi D+ hızı (m/saat) — CTL bandına göre
// Trail koşucusu için tipik değerler
function realisticClimbRate(band){
  // m/saat: Band 1→400, 2→550, 3→700, 4→850, 5→1000
  return [400,550,700,850,1000][Math.max(0,Math.min(4,(band||1)-1))];
}

// ── Şablon üreticileri ─────────────────────────────────────────────────────

// ── Zone bilgisi formatı ─────────────────────────────────────────────────────
// Her aşama için "Z2 · 145–158 bpm · 5:30–6:15 (5:52) /km" formatı
function zoneInfo(zones, zIdx, label){
  const zLabel=label||(['Z1','Z2','Z3','Z4','Z5a','Z5b','Z5c'][zIdx]||'Z'+zIdx);
  const hr=zones?.hrZones?.[zIdx];
  const hrStr=hr?.lo_bpm&&hr?.hi_bpm?`${hr.lo_bpm}–${hr.hi_bpm} bpm`:'';
  const pace=zones?.paceZones?.[zIdx];
  const paceStr=pace?.lo_pace&&pace?.hi_pace?pz(zones,zIdx):'';
  const parts=[zLabel,hrStr,paceStr].filter(Boolean);
  return parts.join(' · ');
}

// Z1 spesifik (alt sınır yok)
function zoneInfoZ1(zones){
  const hr=zones?.hrZones?.[0];
  const hrStr=hr?.hi_bpm?`< ${hr.hi_bpm} bpm`:'';
  const pace=zones?.paceZones?.[0];
  const paceStr=pace?.hi_pace?`> ${pace.hi_pace} /km`:'';
  const parts=['Z1',hrStr,paceStr].filter(Boolean);
  return parts.join(' · ');
}

function tplKolay(band, sure_dk, zones){

  };
}

function tplAerobik(band, sure_dk, zones, disiplin){

function tplUzun(band, ctl, zones, disiplin, dpHedef){
  const isUltra=disiplin==='ultra';
  const isPatika=disiplin==='patika'||disiplin==='ultra'||disiplin==='karma';
  const dk=isUltra
    ?(band<=1?70:band===2?90:band===3?110:band===4?130:150)
    :(band<=1?50:band===2?65:band===3?80:band===4?95:110);
  const parts=[
    {baslik:'Isınma',detay:`15 dk — ${zoneInfoZ1(zones)||'Z1 kolay'}`},
    {baslik:'Uzun Koşu',detay:`${dk-15} dk — ${zoneInfo(zones,1)||'Z2 aerobik'}${isPatika?' — arazi tercihli':''}${dpHedef>0?' · Hedef D+: ~'+dpHedef+'m':''}${isUltra?' · Dik tırmanışlarda yürüyüş stratejisi uygula':''}`.trim()},
    {baslik:'Soğuma',detay:`5 dk — ${zoneInfoZ1(zones)||'Z1'}`},
  ];
  if(band>=4&&disiplin!=='yol') parts.splice(2,0,{baslik:'Ek Tırmanış',detay:`Son 20 dk içinde ${dpHedef>0?'en az '+Math.round(dpHedef*0.3)+'m tırmanış':'mümkün olduğunca tırmanış'} ekle — nabız ${zoneInfo(zones,2)||'Z3'} bandına çıkabilir`});
  return{tip:'uzun',sure_dk:dk,yapilar:parts,dpHedef};
}

// Ultra Trail: back-to-back uzun koşu (cumartesi-pazar tipi)
function tplBackToBack(band, zones, dpHedef){
  const gun1=band<=2?70:band===3?90:band===4?110:130;
  const gun2=Math.round(gun1*0.65);
  const dpGun1=dpHedef>0?Math.round(dpHedef*0.6):0;
  const dpGun2=dpHedef>0?Math.round(dpHedef*0.4):0;
  return{
    tip:'uzun', sure_dk:gun1,
    yapilar:[
      {baslik:'1. Gün — Uzun Koşu',detay:`${gun1-10} dk — ${zoneInfo(zones,1)||'Z1–Z2 aerobik'} arazi${dpGun1>0?' · Hedef D+: ~'+dpGun1+'m':''} · Tırmanışlarda koşu/yürüyüş karması — efor hissini Z2'de tut`},
      {baslik:'2. Gün — Yorgun Bacak Koşusu',detay:`${gun2} dk — ${zoneInfoZ1(zones)||'Z1 çok kolay'}${dpGun2>0?' · Hedef D+: ~'+dpGun2+'m':''} · Pace önemsiz, bitiş önemli`},

  };
}

function tplStrides(band, sure_dk, zones, phase='Temel'){
  const cfg={
    'Temel':   {sets:band<=2?'4':'6',   sure:25, extra:'Kademeli hızlanma → zirve 5sn → kademeli yavaşlama'},
    'Gelişme': {sets:band<=2?'6':'8',   sure:sure_dk, extra:'Son strideda yüksek kadans hissi — hafif, elastik'},
    'Zirve':   {sets:band<=2?'8':'10',  sure:sure_dk, extra:'Hız değil form: omuz düşük, nefes serbest, adım hafif'},
  }[phase]||{sets:'6',sure:sure_dk,extra:''};
  return{
    tip:'aerobik', sure_dk:cfg.sure,
    yapilar:[
      {baslik:'Aerobik Koşu',detay:`${Math.round((cfg.sure||50)*0.7)} dk — ${zoneInfo(zones,1)||'Z2'} sabit tempo`},
      {baslik:`Strides · ${phase}`,detay:`${cfg.sets}×25sn kademeli hızlanma · 45sn yürüyüş arası · ${cfg.extra}`},
      {baslik:'Soğuma',detay:`5 dk hafif yürüyüş`},
    ]
  };
}

function calcGAP(dpM, distKm, sure_dk){
  if(!dpM||!distKm||dpM<=0||distKm<=0)return null;
  // Ortalama eğim %
  const grade=Math.min(40,(dpM/(distKm*1000))*100);
  if(grade<2)return null; // %2 altı düzeltme gerekmiyor
  // Minetti simplified: GAP_factor = 1 + 0.033*grade (yokuş yukarı için)
  // Daha doğru versiyon (Strava benzeri):
  // factor = 0.033*g + 0.00055*g^2 (g = grade %)
  const factor=1+(0.033*grade+0.00055*grade*grade)/100*100;
  return{grade:Math.round(grade*10)/10, factor:Math.round(factor*100)/100};
}

// Flat pace (sn/km) → beklenen gerçek tırmanış pace'i (sn/km)
function gapToActualPace(flatPaceSec, gapFactor){
  if(!flatPaceSec||!gapFactor)return null;
  const actualSec=flatPaceSec*gapFactor;
  const m=Math.floor(actualSec/60);
  const s=Math.round(actualSec%60);
  return`${m}:${String(s).padStart(2,'0')}`;
}

// Tırmanış antrenmanı için GAP bilgisi üret
function gapInfo(dpHedef, sure_dk, zones, zone_idx){
  if(!dpHedef||dpHedef<=0)return'';
  const estDistKm=Math.max(2,(sure_dk||60)/9);
  const gap=calcGAP(dpHedef,estDistKm,sure_dk);
  if(!gap)return'';
  const flatPace=zones?.paceZones?.[zone_idx];
  if(flatPace){
    const loSec=paceToSec(flatPace.lo_pace);
    const hiSec=paceToSec(flatPace.hi_pace);
    if(loSec&&hiSec){
      const actLo=gapToActualPace(loSec,gap.factor);
      const actHi=gapToActualPace(hiSec,gap.factor);
      const actAvg=actLo&&actHi?secToPace((paceToSec(actLo)+paceToSec(actHi))/2):null;
      return` · Tırmanışta beklenen pace: ${actLo}–${actHi}${actAvg?` (${actAvg})`:''}/km (ort. %${gap.grade} eğim, GAP ×${gap.factor})`;
    }
  }
  return` · Ort. eğim: ~%${gap.grade} → Flat pace hedefini ×${gap.factor} ile çarp`;
}



function tplTirmanisAcik(band, sure_dk, zones, dpHedef){
  // ── Gerçekçi süre hesabı ──────────────────────────────────────────────────
  let adjustedSure=sure_dk;
  let durationNote='';
  if(dpHedef>0){
    const climbRatePerMin=realisticClimbRate(band)/60;
    const minDkForDp=Math.ceil(dpHedef/climbRatePerMin);
    const minTotal=Math.ceil(minDkForDp/0.70);
    if(minTotal>sure_dk){
      adjustedSure=minTotal;
      durationNote=` (D+ hedefi için süre ${sure_dk}dk'dan ${minTotal}dk'ya ayarlandı — Band ${band} için tırmanış hızı ~${realisticClimbRate(band)}m/sa)`;
    }
  }

  // Nabız hedefi — Z2–Z3
  const hrZ2=zones?.hrZones?.[1];
  const hrZ3=zones?.hrZones?.[2];
  const hrStr=hrZ2?.lo_bpm&&hrZ3?.hi_bpm?`${hrZ2.lo_bpm}–${hrZ3.hi_bpm} bpm (Z2–Z3)`:'Z2–Z3 nabız';

  // Pace hedefi (GAP ile)
  const flatPaceStr=pz(zones,2)||pz(zones,1)||'Z2–Z3 pace';
  const gap=dpHedef>0?calcGAP(dpHedef,Math.max(2,(adjustedSure||60)/9),adjustedSure):null;
  let paceDetay;
  if(gap&&zones?.paceZones){
    const z2lo=paceToSec(zones.paceZones[1]?.lo_pace);
    const z3hi=paceToSec(zones.paceZones[2]?.hi_pace);
    const actLo=z2lo?gapToActualPace(z2lo,gap.factor):null;
    const actHi=z3hi?gapToActualPace(z3hi,gap.factor):null;
    const actAvg=actLo&&actHi?secToPace((paceToSec(actLo)+paceToSec(actHi))/2):null;
    paceDetay=actLo&&actHi
      ?`Flat eşdeğer: ${flatPaceStr} — Tırmanışta beklenen pace: ${actLo}–${actHi}${actAvg?` (${actAvg})`:''}/km (ort. %${gap.grade} eğim)`
      :`${flatPaceStr} efor hissiyle · %${gap.grade} ort. eğimde pace daha yavaş olacak`;
  } else if(dpHedef>0){
    paceDetay=`${flatPaceStr} efor hissiyle — yokuşta gerçek pace daha yavaş olacak`;
  } else {
    paceDetay=`${flatPaceStr} efor hissiyle`;
  }

  return{
    tip:'tirmanis', sure_dk:adjustedSure,
    yapilar:[
      {baslik:'Isınma',detay:`10 dk — ${zoneInfoZ1(zones)||'Z1 kolay'} düz`},
      {baslik:'Tırmanış Koşusu',detay:`${adjustedSure-10} dk — Nabız: ${hrStr} · ${paceDetay} · Hedef D+: ${dpHedef>0?'~'+dpHedef+'m':'maksimum'} · Tırmanışta güç adımı, inişte kontrollü teknik${durationNote}`},
      {baslik:'Soğuma',detay:`5 dk — ${zoneInfoZ1(zones)||'Z1'}`},
    ],
    dpHedef, gap
  };
}

// 30sn hızlı – 30sn yavaş ritmi. Nöromüsküler aktivasyon + VO2max geliştirme.

// ── Tempo Intervals ──────────────────────────────────────────────────────────
// Tempo'dan daha uzun bloklar, aralarında kısa dinlenme. Yarış spesifik dayanıklılık.

// ── Yarış Temposu (Race Pace) ─────────────────────────────────────────────────
// Hedef yarış temposunda spesifik çalışma. Metabolik ve nöromüsküler adaptasyon.

// ── Hill Sprints ─────────────────────────────────────────────────────────────
// 8–10sn maksimal yokuş koşusu. Nöromüsküler güç + ekonomi. Az yorgunluk, büyük etki.

// ── Strides (Açıcılar + Nöromüsküler) ────────────────────────────────────────

// ── Antrenman Analizi: Aynı yapıdaki antrenmanları zaman içinde karşılaştır ──
function AntrenmanAnalizTab({workouts,athletes}){
  const [selAth,setSelAth]=useState('');
  const [selTur,setSelTur]=useState('');
  const [selYapi,setSelYapi]=useState('');
  const chartRef=useRef();
  const chartInst=useRef();

  // Seçili sporcunun antrenmanları
  const athWorkouts=useMemo(()=>{
    if(!selAth)return[];
    return (workouts||[]).filter(w=>w.athleteId===selAth&&w.date).sort((a,b)=>new Date(a.date)-new Date(b.date));
  },[workouts,selAth]);

  // Mevcut tur seçenekleri — sporcunun gerçek antrenmanlarından
  const turSecenekleri=useMemo(()=>{
    const set=new Set(athWorkouts.map(w=>w.tur).filter(Boolean));
    return [...set].map(v=>({v,l:TUR_LABELS[v]||v}));
  },[athWorkouts]);

  // Seçili tur için yapi_notu seçenekleri
  const yapiSecenekleri=useMemo(()=>{
    const set=new Set(athWorkouts.filter(w=>w.tur===selTur).map(w=>w.yapi_notu).filter(Boolean));
    return [...set];
  },[athWorkouts,selTur]);

  // Filtrelenmiş antrenmanlar
  const filtered=useMemo(()=>{
    return athWorkouts.filter(w=>
      w.tur===selTur&&
      (!selYapi||w.yapi_notu===selYapi)
    );
  },[athWorkouts,selTur,selYapi]);

  // Metrik hesapla — her antrenman için
  const ath=athletes.find(a=>a.id===selAth);
  const dataPoints=useMemo(()=>{
    return filtered.map(w=>{
      const m=calcMetrics(w,ath);
      const durMin=(toSec(w.sure_sa,w.sure_dk,w.sure_sn)/60)||0;
      const km=parseFloat(w.mesafe)||0;
      const paceSecKm=durMin>0&&km>0?Math.round(durMin/km*60):0;
      return{
        date:w.date,
        label:new Date(w.date+'T12:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'}),
        durMin:round1(durMin),
        km:round1(km),
        pace:paceSecKm>0?secToPace(paceSecKm):null,
        paceSec:paceSecKm,
        ort_nabiz:parseInt(w.ort_nabiz)||null,
        rpe:parseInt(w.rpe)||null,
        trimp:m.trimp||null,
        yuk:m.yukObj||null,
        kadans:parseInt(w.kadans)||null,
        irtifa:parseInt(w.irtifa)||null,
      };
    });
  },[filtered,ath]);

  // Grafik
  useEffect(()=>{
    if(!chartRef.current||dataPoints.length<2)return;
    if(chartInst.current)chartInst.current.destroy();
    const labels=dataPoints.map(d=>d.label);
    const datasets=[
      dataPoints[0].paceSec>0&&{
        label:'Pace (sn/km)',yAxisID:'y',
        data:dataPoints.map(d=>d.paceSec),
        borderColor:'#3b82f6',backgroundColor:'#3b82f620',
        tension:.3,fill:true,pointRadius:5,
      },
      dataPoints[0].ort_nabiz&&{
        label:'Ort. Nabız (bpm)',yAxisID:'y2',
        data:dataPoints.map(d=>d.ort_nabiz),
        borderColor:'#ef4444',backgroundColor:'transparent',
        tension:.3,borderDash:[5,3],pointRadius:5,
      },
      {
        label:'Süre (dk)',yAxisID:'y3',
        data:dataPoints.map(d=>d.durMin),
        borderColor:'#10b981',backgroundColor:'transparent',
        tension:.3,borderDash:[3,3],pointRadius:5,
      },
    ].filter(Boolean);

    chartInst.current=new Chart(chartRef.current,{
      type:'line',
      data:{labels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'top'},tooltip:{
          callbacks:{label:(ctx)=>{
            const d=dataPoints[ctx.dataIndex];
            if(ctx.dataset.label.includes('Pace'))return 'Pace: '+(d.pace||'—');
            return ctx.dataset.label+': '+ctx.parsed.y;
          }}
        }},
        scales:{
          y:{position:'left',title:{display:true,text:'Pace (sn/km)'},reverse:true},
          y2:{position:'right',title:{display:true,text:'Nabız (bpm)'},grid:{drawOnChartArea:false}},
          y3:{display:false},
        }
      }
    });
    return()=>{if(chartInst.current)chartInst.current.destroy();};
  },[dataPoints]);

  // Trend hesabı — ilk vs son
  const trend=(key)=>{
    const vals=dataPoints.map(d=>d[key]).filter(v=>v!=null);
    if(vals.length<2)return null;
    const diff=vals[vals.length-1]-vals[0];
    const pct=round1(diff/vals[0]*100);
    return{first:vals[0],last:vals[vals.length-1],diff:round1(diff),pct};
  };

  const metrikler=[
    {k:'paceSec',l:'Pace',fmt:(v)=>v?secToPace(v):'—',iyi:'azalma'},
    {k:'ort_nabiz',l:'Ort. Nabız',fmt:(v)=>v?v+' bpm':'—',iyi:'azalma'},
    {k:'durMin',l:'Süre',fmt:(v)=>v?v+' dk':'—',iyi:'artma'},
    {k:'km',l:'Mesafe',fmt:(v)=>v?v+' km':'—',iyi:'artma'},
    {k:'rpe',l:'RPE',fmt:(v)=>v?v+'/10':'—',iyi:'azalma'},
    {k:'yuk',l:'Yük',fmt:(v)=>v?String(v):'—',iyi:'artma'},
  ];

  if(!athletes.length)return React.createElement('div',{className:'empty'},'Henüz sporcu eklenmedi.');

  return React.createElement('div',null,
    React.createElement('div',{className:'card',style:{marginBottom:12}},
      React.createElement('div',{className:'card-title'},'Antrenman Karşılaştırma Analizi'),
      React.createElement('div',{className:'form-grid'},
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Sporcu'),
          React.createElement('select',{value:selAth,onChange:e=>{setSelAth(e.target.value);setSelTur('');setSelYapi('');}},
            React.createElement('option',{value:''},'— Seçin —'),
            [...athletes].sort((a,b)=>((a.ad||'')+' '+(a.soyad||'')).toLocaleLowerCase('tr').localeCompare(((b.ad||'')+' '+(b.soyad||'')).toLocaleLowerCase('tr'),'tr')).map(a=>React.createElement('option',{key:a.id,value:a.id},(a.ad||'')+' '+(a.soyad||'')))
          )
        ),
        React.createElement('div',{className:'form-group'},
          React.createElement('label',null,'Antrenman Türü'),
          React.createElement('select',{value:selTur,onChange:e=>{setSelTur(e.target.value);setSelYapi('');}},

  const [bulkAction,setBulkAction]=useState('tur');

  const athMap=Object.fromEntries(athletes.map(a=>[a.id,a]));
  const sorted=[...workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const orphanIds=workouts.filter(w=>!athMap[w.athleteId]).map(w=>w.id);
  const filtered=sorted.filter(w=>{
    if(filter&&w.athleteId!==filter)return false;
    if(turFilter&&w.tur!==turFilter)return false;
    return true;
  });
  const allSel=filtered.length>0&&filtered.every(w=>selected[w.id]);
  const selCount=Object.values(selected).filter(Boolean).length;

  const toggleAll=()=>{
    if(allSel)setSelected({});

    const ids=Object.entries(selected).filter(([,v])=>v).map(([k])=>k);

function ExcelYukle({onImport,athletes,selId,onSelChange,workouts}){
  const [preview,setPreview]=useState(null);
  const [msg,setMsg]=useState('');
  const fileRef=useRef();

  // ── Dışa Aktar ───────────────────────────────────────────────────────────
  const doExport=()=>{
    if(!athletes.length){alert('Aktarılacak sporcu yok.');return;}
    const wb=XLSX.utils.book_new();

    // Her sporcu için ayrı sayfa
    athletes.forEach(ath=>{
      const athWks=workouts.filter(w=>w.athleteId===ath.id)
        .sort((a,b)=>new Date(a.date)-new Date(b.date));
      if(!athWks.length)return;

      // Başlık satırı — orijinal Excel ile aynı sütun sırası
      const header=[
        'Tarih','Mesafe (km)','Süre Sa','Süre Dk','Süre Sn',
        'İrtifa (m)','Ort. Nabız','Maks. Nabız','RPE',
        'Kadans','Yer Kontağı','Dikey Salınım','Zemin Dengesi','Zemin Zorluğu',
        '','','','','','','','','','','','','','',  // O-AB boş
        'Ort. Güç (W) (R)','Maks. Güç (W) (S)',
        'Katsayı (AC)'
      ];

      const rows=athWks.map(w=>{
        const spor=SPOR_MAP[w.spor||'kosu'];
        const katsayi=spor?spor.k:1.00;
        return[
          w.date||'',
          w.mesafe!==''&&w.mesafe!=null?parseFloat(w.mesafe)||0:'',
          parseInt(w.sure_sa)||0,
          parseInt(w.sure_dk)||0,
          parseInt(w.sure_sn)||0,
          w.irtifa!==''&&w.irtifa!=null?parseFloat(w.irtifa)||0:'',
          w.ort_nabiz!==''&&w.ort_nabiz!=null?parseInt(w.ort_nabiz)||0:'',
          w.maks_nabiz!==''&&w.maks_nabiz!=null?parseInt(w.maks_nabiz)||0:'',
          w.rpe!==''&&w.rpe!=null?parseFloat(w.rpe)||0:'',
          w.kadans!==''&&w.kadans!=null?parseInt(w.kadans)||0:'',
          w.yer_kontak!==''&&w.yer_kontak!=null?parseFloat(w.yer_kontak)||0:'',
          w.dikey_salinim!==''&&w.dikey_salinim!=null?parseFloat(w.dikey_salinim)||0:'',
          w.zemin_dengesi!==''&&w.zemin_dengesi!=null?parseFloat(w.zemin_dengesi)||0:'',
          parseInt(w.zemin_zorluk)||1,
          '','','','',  // O-R'den önce boş (O,P,Q hesaplamalı)
          w.ort_guc!==''&&w.ort_guc!=null?parseInt(w.ort_guc)||0:'',
          w.maks_guc!==''&&w.maks_guc!=null?parseInt(w.maks_guc)||0:'',
          '','','','','','','','','',  // T-AB boş
          katsayi
        ];
      });

      const wsData=[header,...rows];
      const ws=XLSX.utils.aoa_to_sheet(wsData);

      // Sütun genişlikleri
      ws['!cols']=[
        {wch:12},{wch:10},{wch:8},{wch:8},{wch:8},
        {wch:10},{wch:10},{wch:12},{wch:6},
        {wch:8},{wch:10},{wch:14},{wch:14},{wch:14}
      ];

      const sheetName=((ath.ad||'')+'_'+(ath.soyad||'')).slice(0,31).replace(/[\\\/\?\*\[\]]/g,'');
      XLSX.utils.book_append_sheet(wb,ws,sheetName||'Sporcu');
    });

    // Tüm sporcular tek sayfa — "Tamamlanan" formatı
    const allRows=[];

const TRACKED_FIELDS=[
  {k:'kilo',l:'Kilo (kg)',num:true},
  {k:'rhr',l:'Dinlenme Nabzı (RHR)',num:true},
  {k:'mhr',l:'Maksimum Nabız (MHR)',num:true},
  {k:'lthr',l:'Laktat Eşiği (LTHR)',num:true},
  {k:'vo2max',l:'VO₂max',num:true},
  {k:'hrv_durum',l:'HRV Durumu',num:false},
  {k:'hrv_7gun',l:'HRV 7g Ort.',num:true},
  {k:'sakatlık',l:'Sakatlık Puanı',num:true},
  {k:'motivasyon',l:'Motivasyon',num:true},
  {k:'disiplin',l:'Koşu Disiplini',num:false},
  {k:'dinlenme_siklik',l:'Dinlenme Haftası Sıklığı',num:false},
  {k:'pb_5k',l:'En İyi 5K',num:false},
  {k:'pb_10k',l:'En İyi 10K',num:false},
  {k:'pb_hm',l:'En İyi Yarı Maraton',num:false},
  {k:'pb_m',l:'En İyi Maraton',num:false},
];

function detectChanges(oldA,newA){
  const changes=[];
  TRACKED_FIELDS.forEach(({k,l,num})=>{
    const ov=oldA[k],nv=newA[k];
    if(String(ov||'').trim()===String(nv||'').trim())return;
    if(!ov&&!nv)return;
    changes.push({field:k,label:l,oldVal:ov||'—',newVal:nv||'—',num});
  });
  return changes;
}

function generateMessages(changes,newA){
  const msgs=[];
  changes.forEach(({field,oldVal,newVal,num})=>{
    const ov=parseFloat(oldVal),nv=parseFloat(newVal);
    const diff=num?round1(nv-ov):null;
    const pct=num&&ov?round1((nv-ov)/ov*100):null;

    if(field==='kilo'&&num){
      if(diff<0){
        const absPct=Math.abs(pct);
        if(absPct>1)msgs.push({type:'warn',text:`Kilo ${Math.abs(diff)} kg düştü (%${absPct}). Haftada %0.5–1'den fazla kayıp kas kaybına yol açabilir. Beslenmeyi kontrol et.`});
        else msgs.push({type:'good',text:`Kilo ${Math.abs(diff)} kg düştü. Güç/ağırlık oranı iyileşiyor — tırmanma performansına olumlu yansıyabilir.`});
      } else if(diff>0) msgs.push({type:'info',text:`Kilo ${diff} kg arttı. Antrenman yüküyle orantılı mı kontrol et.`});
    }
    if(field==='rhr'&&num){
      if(diff<0)msgs.push({type:'good',text:`RHR ${Math.abs(diff)} bpm düştü → aerobik kapasite ve toparlanma iyileşiyor. Olumlu uyum işareti.`});
      else if(diff>3)msgs.push({type:'warn',text:`RHR ${diff} bpm yükseldi → aşırı antrenman, hastalık başlangıcı veya yetersiz uyku olabilir. Yükü gözden geçir.`});
    }
    if(field==='lthr'&&num){
      if(diff>0)msgs.push({type:'good',text:`LTHR ${diff} bpm yükseldi → laktat eşiği güçleniyor. Tempo ve eşik antrenmanları meşe ediyor.`});
      else if(diff<-3)msgs.push({type:'warn',text:`LTHR ${Math.abs(diff)} bpm düştü. Test koşullarını kontrol et; yorgunluk veya overreaching olabilir.`});
    }
    if(field==='vo2max'&&num){
      if(diff>0)msgs.push({type:'good',text:`VO₂max ${diff} ml/kg/dak arttı → aerobik taban gelişiyor.`});
      else if(diff<-2)msgs.push({type:'warn',text:`VO₂max ${Math.abs(diff)} ml/kg/dak düştü. Toparlanma ve antrenman kalitesi değerlendirilmeli.`});
    }
    if(field==='hrv_7gun'&&num){
      if(diff>3)msgs.push({type:'good',text:`HRV 7g ortalaması ${diff} ms yükseldi → otonom sinir sistemi toparlanıyor. Yük artışı için uygun dönem.`});
      else if(diff<-3)msgs.push({type:'warn',text:`HRV 7g ortalaması ${Math.abs(diff)} ms düştü → toparlanma baskı altında. Bu hafta yoğunluğu düşür.`});
    }
    if(field==='hrv_durum'){
      const skala={düşük:1,dengesiz:2,dengeli:3};
      const os=skala[oldVal]||0,ns=skala[newVal]||0;
      // Bilinmiyor ('') → nötr geçiş, kötüleşme değil
      if(!newVal){
        msgs.push({type:'info',text:`HRV takibi durduruldu. Ölçüm alınamayan sporcular için yük kararları ACWR ve TSB'ye göre alınır.`});
      } else if(!oldVal&&newVal){
        msgs.push({type:'info',text:`HRV takibi başlatıldı: "${newVal}". Sistem artık HRV durumunu dikkate alacak.`});
      } else if(ns>os){
        msgs.push({type:'good',text:`HRV durumu "${oldVal}" → "${newVal}" iyileşti. Kaliteli antrenman için iyi pencere.`});
      } else if(ns<os){
        msgs.push({type:'warn',text:`HRV durumu "${oldVal}" → "${newVal}" kötüleşti. Düşük yoğunluklu gün veya dinlenme planla.`});
      }
    }
    if(field==='sakatlık'&&num){
      if(diff>2)msgs.push({type:'danger',text:`Sakatlık puanı ${ov}→${nv} yükseldi. Yük hemen azaltılmalı; fizyoterapist görüşü önerilir.`});
      else if(diff>0)msgs.push({type:'warn',text:`Sakatlık puanı hafif yükseldi (${ov}→${nv}). Ağrılı bölgeye dikkat et, zorlama.`});
      else if(diff<0)msgs.push({type:'good',text:`Sakatlık puanı ${ov}→${nv} iyileşti. Kademeli yük artışına hazır.`});
    }
    if(field==='motivasyon'&&num){
      if(diff<-1)msgs.push({type:'warn',text:`Motivasyon ${ov}→${nv} düştü. Antrenman çeşitliliği, dinlenme veya hedef netleştirmesi faydalı olabilir.`});
      else if(diff>1)msgs.push({type:'good',text:`Motivasyon ${ov}→${nv} yükseldi. Yüksek motivasyon dönemlerinde hacim artışını dikkatli yönet.`});
    }
    if(['pb_5k','pb_10k','pb_hm','pb_m'].includes(field)){
      const toSecs=s=>{if(!s)return null;const p=s.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1];};
      const os=toSecs(oldVal),ns=toSecs(newVal);
      if(os&&ns&&ns<os)msgs.push({type:'good',text:`Yeni kişisel rekoru! ${({pb_5k:'5K',pb_10k:'10K',pb_hm:'Yarı Maraton',pb_m:'Maraton'})[field]}: ${oldVal} → ${newVal} 🎉`});
    }
  });
  return msgs;
}

// ── Paylaşılabilir Kart Yardımcısı ───────────────────────────────────────────
async function shareCard(el, filename, title, text){
  if(!el)return;
  // html2canvas yükle
  await new Promise((resolve,reject)=>{
    if(window.html2canvas)return resolve();
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=resolve;s.onerror=()=>reject(new Error('html2canvas yüklenemedi'));
    document.head.appendChild(s);
  });
  const isDark=document.body.classList.contains('dark');
  const canvas=await captureElement(el,isDark?'#0a1220':'#f0f4f9');
  const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
  const file=new File([blob],filename,{type:'image/png'});
  try{
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({title,text,files:[file]});
    } else {
      const a=document.createElement('a');
      a.download=filename;
      a.href=URL.createObjectURL(file);
      a.click();URL.revokeObjectURL(a.href);
    }
  }catch(e){if(e.name!=='AbortError')throw e;}
}

// Paylaş butonu komponenti — herhangi bir karta eklenebilir
function ShareBtn({elRef,filename,title,text,style}){
  const [busy,setBusy]=useState(false);
  const handle=async()=>{
    if(busy||!elRef?.current)return;
    setBusy(true);
    try{await shareCard(elRef.current,filename,title,text);}
    catch(e){alert('Paylaşım hatası: '+e.message);}
    setBusy(false);
  };
  return React.createElement('button',{
    onClick:handle,disabled:busy,
    style:{background:'none',border:'1px solid var(--border)',borderRadius:6,
      padding:'3px 8px',cursor:'pointer',fontSize:12,color:'var(--text-secondary)',
      display:'flex',alignItems:'center',gap:4,...style},
    title:'Paylaş / İndir'
  },busy?'⏳':(navigator.share?'↗ Paylaş':'⬇ İndir'));
}

    const labels=veriler.map(s=>new Date(s.date+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'short'}));

// Firebase SDK'larını dinamik yükle, sonra React başlat
function loadScript(src){
  return new Promise((resolve)=>{
    const s=document.createElement('script');
    s.src=src;
    s.onload=()=>resolve(true);
    s.onerror=()=>resolve(false); // hata olsa da devam et
    document.head.appendChild(s);
  });
}

  useEffect(()=>{
    // Logo ve takım adını yükle
    (async()=>{
      try{
        const cfg=await fbGet('app_config');
        if(cfg?.teamLogo)setLogo(cfg.teamLogo);
        if(cfg?.teamName)setAppName(cfg.teamName);
      }catch{}
    })();
  },[]);

  const attempt=async()=>{
    if(!pass.trim())return;
    setLoading(true);setErr('');
    try{
      // Firebase'den şifreyi oku
      let stored=null;
      if(db){
        const snap=await db.ref('app_password').get();
        stored=snap.exists()?snap.val():null;
      }
      // Firebase'de şifre yoksa varsayılanı kullan ve kaydet
      if(!stored){
        stored=DEFAULT_PASS;
        if(db)await db.ref('app_password').set(DEFAULT_PASS);
      }
      if(pass===stored){
        localStorage.setItem(AUTH_LS_KEY,btoa(pass+':'+Date.now()));
        onLogin();
      } else {
        setErr('Şifre yanlış. Tekrar dene.');
        setPass('');
      }
    }catch(e){
      // Offline fallback
      const cached=localStorage.getItem(AUTH_LS_KEY);
      if(cached){onLogin();}
      else if(pass===DEFAULT_PASS){
        localStorage.setItem(AUTH_LS_KEY,btoa(pass+':'+Date.now()));
        onLogin();
      } else {
        setErr('Bağlantı hatası veya şifre yanlış.');
      }
    }
    setLoading(false);
  };

  return React.createElement('div',{style:{
    display:'flex',alignItems:'center',justifyContent:'center',
    minHeight:'100vh',background:'var(--bg-tertiary)'
  }},
    React.createElement('div',{style:{
      background:'var(--bg-primary)',border:'1px solid var(--border)',
      borderRadius:16,padding:'40px 36px',width:'100%',maxWidth:360,
      boxShadow:'0 8px 32px rgba(0,0,0,.12)'
    }},
      React.createElement('div',{style:{textAlign:'center',marginBottom:28}},
        logo
          ?React.createElement('img',{src:logo,style:{width:72,height:72,objectFit:'contain',borderRadius:12,marginBottom:10,border:'1px solid var(--border)',background:'var(--bg-secondary)',padding:4}})
          :React.createElement('div',{style:{fontSize:40,marginBottom:8}},'🏃'),
        React.createElement('div',{style:{fontSize:20,fontWeight:700,marginBottom:4}},appName),
        React.createElement('div',{style:{fontSize:13,color:'var(--text-tertiary)'}},'Antrenman Takip Sistemi')
      ),
      React.createElement('div',{className:'form-group',style:{marginBottom:12}},
        React.createElement('label',{style:{fontSize:13,color:'var(--text-secondary)',marginBottom:6,display:'block'}},'Şifre'),
        React.createElement('input',{
          type:'password',value:pass,
          placeholder:'Şifrenizi girin',
          autoFocus:true,
          style:{fontSize:15,padding:'10px 12px'},
          onChange:e=>setPass(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&attempt()
        })
      ),
      err&&React.createElement('div',{style:{
        fontSize:12,color:'var(--danger)',marginBottom:10,
        padding:'8px 10px',background:'var(--danger-bg)',borderRadius:6
      }},err),
      React.createElement('button',{
        className:'btn btn-primary',
        style:{width:'100%',padding:'10px',fontSize:14,fontWeight:600},
        disabled:loading,
        onClick:attempt
      },loading?'Kontrol ediliyor...':'Giriş')
    )
  );
}

function AppWithAuth(){
  const [authed,setAuthed]=useState(false);
  const [checking,setChecking]=useState(true);

  useEffect(()=>{
    // Daha önce giriş yapılmış mı?
    const cached=localStorage.getItem(AUTH_LS_KEY);
    if(cached){
      try{
        const decoded=atob(cached);
        const ts=parseInt(decoded.split(':')[1]||0);
        // 30 gün geçerliliği var
        if(Date.now()-ts<30*24*3600*1000){
          setAuthed(true);
        } else {
          localStorage.removeItem(AUTH_LS_KEY);
        }
      }catch{localStorage.removeItem(AUTH_LS_KEY);}
    }
    setChecking(false);
  },[]);

  if(checking) return React.createElement('div',{style:{
    display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',
    color:'var(--text-tertiary)',fontSize:14
  }},'Yükleniyor...');

  if(!authed) return React.createElement(LoginScreen,{onLogin:()=>setAuthed(true)});
  return React.createElement(App);
}

  const [pinOk,setPinOk]=useState(false);
  const [pinErr,setPinErr]=useState('');

  useEffect(()=>{
    (async()=>{
      try{

        if(cfg&&cfg.teamName)setAppName(cfg.teamName);
        if(cfg&&cfg.teamLogo)setLogo(cfg.teamLogo);

        setRaces(rcs||[]);
      }catch(e){console.warn(e);}
      setLoading(false);
    })();
  },[]);

  const selectAthlete=(id)=>{
    setSelId(id);
    setSaved(false);
    setPinInput('');
    setPinOk(false);
    setPinErr('');
    const a=athletes.find(function(x){return x.id===id;});
    if(!a){setForm(null);return;}
    setForm({
      foto:a.foto||'',
      kilo:a.kilo||'',
      boy:a.boy||'',
      rhr:a.rhr||'',
      mhr:a.mhr||'',
      lthr:a.lthr||'',
      vo2max:a.vo2max||'',
      hrv_durum:a.hrv_durum||'',
      hrv_7gun:a.hrv_7gun||'',
      sakatlık:a.sakatlık||'1',
      kosu_gunleri:a.kosu_gunleri||[],
      capraz_gunleri:a.capraz_gunleri||[],
      uzun_gun:Array.isArray(a.uzun_gun)?a.uzun_gun:[a.uzun_gun].filter(Boolean),
    });
  };

  // Madde 1: Bu haftaki yarış günlerini hesapla
  const buHaftaYarisGunleriAnket=React.useMemo(function(){
    const ath=athletes.find(function(x){return x.id===selId;});
    if(!ath)return{};
    const athRaceIds=(ath.yarıslar||[]).map(function(x){return typeof x==='string'?x:x.id;});
    const wb=getWeekBounds(0);
    const wkStartStr=localDateStr(wb.start);
    const wkEndStr=localDateStr(wb.end);
    const result={};
    (races||[]).forEach(function(r){
      if(athRaceIds.indexOf(r.id)<0||!r.tarih)return;
      if(r.tarih>=wkStartStr&&r.tarih<=wkEndStr){
        result[DAYS_SHORT[new Date(r.tarih+'T12:00:00').getDay()]]=r.ad||'Yarış';
      }
    });
    return result;
  },[selId,athletes,races]);

  const toggleGun=(field,gun)=>{
    if(field==='kosu_gunleri'&&buHaftaYarisGunleriAnket[gun]){
      const currentArr=form?form[field]||[]:[];
      if(currentArr.indexOf(gun)<0){
        alert('⚠️ '+gun+' günü bu hafta yarış günü ('+buHaftaYarisGunleriAnket[gun]+'). Yarış günü koşu günü olarak seçilemez.');
        return;
      }
    }
    setForm(function(f){
      const arr=f[field]||[];
      return Object.assign({},f,{[field]:arr.includes(gun)?arr.filter(function(x){return x!==gun;}):[...arr,gun]});
    });
  };

  const checkPin=()=>{
    const a=athletes.find(function(x){return x.id===selId;});
    if(!a||!a.anket_pin){setPinErr('PIN tanımlı değil. Antrenörünüze danışın.');return;}
    if(pinInput===a.anket_pin){setPinOk(true);setPinErr('');}
    else{setPinErr('Yanlış PIN. Tekrar dene.');setPinInput('');}
  };

  const handleSave=async()=>{
    if(!selId||!form)return;
    setSaving(true);
    try{
      const mevcut=athletes.find(function(a){return a.id===selId;})||{};

      const ANKET_SNAP_FIELDS=['kilo','boy','rhr','mhr','lthr','vo2max','hrv_7gun','sakatlık'];

      const updated=athletes.map(function(a){return a.id===selId?Object.assign({},a,formWithSnap,{anket_guncelleme:new Date().toISOString()}):a;});
      await fbSet('ath2',updated);

      setAthletes(updated);
      setSaved(true);
      setTimeout(function(){setSaved(false);},3000);

        display:'inline-block',padding:'12px 24px',
        background:'var(--info)',color:'#fff',
        borderRadius:'var(--radius)',fontSize:13,fontWeight:600,
        textDecoration:'none',boxShadow:'0 2px 8px rgba(0,0,0,0.12)'
      }
    },'🏃 Koşu İzlerim')
  ):null;

  return React.createElement('div',{style:{minHeight:'100vh',background:'var(--bg-tertiary)',padding:'20px 16px',overflowX:'hidden'}},
    React.createElement('div',{style:{maxWidth:480,margin:'0 auto',width:'100%'}},
      headerEl,
      selectEl,
      pinEl,
      formEl,
      planLinkEl
    )
  );
}


// ── Sporcu Haftalık Plan Görünümü (public link) ───────────────────────────────
function SporcuPlanView(){
  const [athlete,setAthlete]=useState(null);
  const [planSnap,setPlanSnap]=useState(null);
  const [workouts,setWorkouts]=useState([]);
  const [allWorkouts,setAllWorkouts]=useState([]);
  const [allAthletes,setAllAthletes]=useState([]);
  const [races,setRaces]=useState([]);
  const [history,setHistory]=useState([]);
  const [loading,setLoading]=useState(true);
  const [appName,setAppName]=useState('Koşu İzi');
  const [logo,setLogo]=useState('');
  const athId=new URLSearchParams(window.location.search).get('id');

  useEffect(()=>{
    if(!athId){setLoading(false);return;}
    (async()=>{
      try{
        const cfg=await fbGet('app_config');
        if(cfg?.teamName) setAppName(cfg.teamName);
        if(cfg?.teamLogo) setLogo(cfg.teamLogo);
        const aths=await fbGet('ath2');
        const ath=(aths||[]).find(a=>a.id===athId);
        setAthlete(ath||null);
        setAllAthletes(aths||[]);
        if(ath){
          const [snap,wks,rcs,hist]=await Promise.all([
            fbGet('plan_snapshots/'+athId+'/'+getWeekKey(0)),
            fbGet('wks'),
            fbGet('races'),
            fbGet('ath_history'),
          ]);
          setPlanSnap(snap||null);
          setAllWorkouts(wks||[]);
          setWorkouts((wks||[]).filter(w=>w.athleteId===athId));
          setRaces(rcs||[]);
          setHistory((hist||[]).filter(h=>h.athId===athId));
        }
      }catch(e){console.warn(e);}
      setLoading(false);
    })();
  },[athId]);

  if(loading) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text-tertiary)',fontSize:14}},'Yükleniyor...');
  if(!athlete) return React.createElement('div',{style:{textAlign:'center',padding:40,color:'var(--text-secondary)'}},'Sporcu bulunamadı.');
  if(!planSnap?.overrideMap) return React.createElement('div',{style:{textAlign:'center',padding:40,color:'var(--text-secondary)'}},'Bu hafta için henüz plan oluşturulmadı.');

  try{

  const todayStr=localDateStr(new Date());
  const zones=calcZones(athlete);
  const {start:wkStart,end:wkEnd}=getWeekBounds(0);

  const fmtDate=(ds)=>{
    const d=new Date(ds+'T12:00:00');
    const gunler=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
    return gunler[d.getDay()]+', '+d.getDate()+' '+['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'][d.getMonth()];
  };
  const fmtSure=(dk)=>dk>=60?Math.floor(dk/60)+'s'+(dk%60?' '+dk%60+'dk':''):dk+' dk';
  const turAd=(w)=>TUR_LABELS[w.tur||'']||SPOR_MAP[w.spor]?.l||w.tur||w.spor||'Antrenman';

  // ── Gün bilgilerini topla: bu hafta içindeki tüm anlamlı günler ───────────
  // Bu hafta için tarih dizisini üret
  const weekDateStrs=[];
  for(let d=new Date(wkStart);d<=wkEnd;d.setDate(d.getDate()+1)){
    weekDateStrs.push(localDateStr(d));
  }
  // Tarihe göre gerçekleşen antrenmanları grupla (sadece bu hafta)
  const actualsByDate={};
  workouts.forEach(w=>{
    if(weekDateStrs.includes(w.date)){
      if(!actualsByDate[w.date]) actualsByDate[w.date]=[];
      actualsByDate[w.date].push(w);
    }
  });
  // Her gün için karar ver
  const dayInfos=[];
  weekDateStrs.forEach(date=>{
    const ov=planSnap.overrideMap[date]||null;
    const actuals=actualsByDate[date]||[];
    const isPast=date<todayStr;
    const isToday=date===todayStr;
    const hasNonRestPlan=ov&&ov.tip!=='dinlenme';
    const hasActuals=actuals.length>0;
    // Madde 2: Onaylanmamış antrenmanlar Koşu İzlerim'de gösterilmez (tamamlanmış hariç)
    // Geriye dönük uyumluluk: approved alanı yoksa (eski planlar) onaylı say
    const isApproved=ov?.approved!==false;

    if(isPast){
      // Geçmiş: gerçekleşen antrenman varsa veya planda yarış varsa göster
      if(hasActuals){
        dayInfos.push({date,status:'completed',ov,actuals});
      } else if(ov&&ov.tip==='yaris'){
        // Yapılmamış yarış (kayıt yok ama planda var) — yine de göster
        dayInfos.push({date,status:'completed',ov,actuals:[]});
      }
    } else if(isToday){
      // Bugün: tamamlanan her zaman gösterilir; tamamlanmamışsa sadece onaylı göster
      if(hasActuals){
        dayInfos.push({date,status:'today_done',ov,actuals});
      } else if(hasNonRestPlan&&isApproved){
        dayInfos.push({date,status:'today',ov,actuals});
      }
    }
  });

  // Gelecek antrenman: TEK BİR tane göster — sadece onaylı
  // Kural: bugünün antrenmanı yapılmamış (today) varsa, gelecek antrenman gösterme
  // Bugün yapıldıysa (today_done) veya bugün hiç antrenman yoksa → ilk yaklaşan onaylı antrenmanı göster
  const hasUnfinishedToday=dayInfos.some(d=>d.status==='today');
  if(!hasUnfinishedToday){
    for(const date of weekDateStrs){
      if(date<=todayStr) continue;
      const ov=planSnap.overrideMap[date]||null;
      const hasNonRestPlan=ov&&ov.tip!=='dinlenme';
      const isApprovedFuture=ov?.approved!==false;
      if(hasNonRestPlan&&isApprovedFuture){
        const status=ov.tip==='yaris'?'race_upcoming':'next';
        dayInfos.push({date,status,ov,actuals:[]});
        break;
      }
    }
  }

  // Tek bir günü Haftalık Plan stilinde render et
  const renderDayCard=(info,idx)=>{
    const ov=info.ov;
    const isCompleted=info.status==='completed'||info.status==='today_done';
    const isToday=info.status==='today'||info.status==='today_done';
    const isNext=info.status==='next';
    const isRaceUpcoming=info.status==='race_upcoming';
    const isRace=ov?.tip==='yaris';
    // Çapraz mı? — planda capraz veya gerçekleşen koşu dışı bir spor
    const isCaprazPlan=ov?.tip==='capraz';
    const isCaprazActual=info.actuals.length>0&&info.actuals[0].spor&&info.actuals[0].spor!=='kosu';
    const isCapraz=isCaprazPlan||(isCompleted&&isCaprazActual&&!ov);

    // Başlık ve emoji
    let title,emoji,titleColor;
    if(ov){
      title=isRace?'🏁 '+ov.baslik:fixBaslik(ov.baslik);
      // Eğer fixBaslik eşleşme bulamazsa orijinal baslik döner
      if(title===ov.baslik&&ov.baslik) title=ov.baslik;
      emoji=tipEmoji(ov.tip);
      titleColor=isRace?'var(--danger)':'var(--text-primary)';
    } else if(info.actuals.length>0){
      const w=info.actuals[0];
      const t=w.tur||w.spor||'aerobik';
      title=TUR_LABELS[t]||SPOR_MAP[w.spor]?.l||t;
      emoji=SPOR_MAP[w.spor]?.emoji||tipEmoji(t);
      titleColor='var(--text-primary)';
    } else {
      title='Antrenman';emoji='🏃';titleColor='var(--text-primary)';
    }

    // Sol kenar rengi — yarış kırmızı, tamamlanan yeşil, bugün/sıradaki mavi
    const borderColor=isRace?'var(--danger)':isCompleted?'var(--success)':isToday?'var(--info)':isNext?'var(--info)':(ov?tipColor(ov.tip):'var(--border)');

    // Durum rozeti
    let statusLabel,statusBg,statusFg;
    if(isRace&&isCompleted){statusLabel='YARIŞ · TAMAMLANDI';statusBg='var(--danger-bg)';statusFg='var(--danger)';}
    else if(isRaceUpcoming){statusLabel='YARIŞ';statusBg='var(--danger-bg)';statusFg='var(--danger)';}
    else if(info.status==='completed'){statusLabel='TAMAMLANDI';statusBg='var(--success-bg)';statusFg='var(--success)';}
    else if(info.status==='today_done'){statusLabel='BUGÜN · TAMAMLANDI';statusBg='var(--success-bg)';statusFg='var(--success)';}
    else if(info.status==='today'){statusLabel='BUGÜN';statusBg='var(--info-bg)';statusFg='var(--info)';}
    else {statusLabel='SIRADAKİ';statusBg='var(--info-bg)';statusFg='var(--info)';}

    // Çapraz notları (planda çapraz işaretli yapılar)
    const caprazNotlar=(ov?.yapilar||[]).filter(y=>y._caprazNot);

    return React.createElement('div',{
      key:info.date+'_'+idx,
      style:{
        borderLeft:'3px solid '+borderColor,
        paddingLeft:12,
        paddingTop:10,paddingBottom:10,
        marginBottom:4,
        background:isToday?'var(--info-bg)':isRaceUpcoming?'var(--danger-bg)':'transparent',
        borderRadius:isToday||isRaceUpcoming?'0 var(--radius) var(--radius) 0':0
      }
    },
      // Üst satır: durum rozeti + tarih + ✔
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:6,flexWrap:'wrap'}},
        React.createElement('span',{style:{
          fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:99,
          background:statusBg,color:statusFg,
          textTransform:'uppercase',letterSpacing:0.3,whiteSpace:'nowrap'
        }},statusLabel),
        React.createElement('span',{style:{fontSize:11,color:'var(--text-tertiary)',flex:1}},fmtDate(info.date)),
        isCompleted&&React.createElement('span',{style:{fontSize:18,color:'var(--success)',fontWeight:900,lineHeight:1}},'✔')
      ),
      // Başlık satırı: emoji + isim + süre
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:8}},
        React.createElement('span',{style:{fontSize:18}},emoji),
        React.createElement('div',{style:{flex:1,minWidth:0}},
          React.createElement('div',{style:{fontWeight:700,fontSize:13,color:titleColor}},title),
          ov?.sure_dk>0&&React.createElement('div',{style:{fontSize:11,color:'var(--text-secondary)',marginTop:1}},'⏱ '+fmtSure(ov.sure_dk))
        )
      ),
      // İçerik: çapraz ise sade görünüm, değilse ReceteTablosu
      isCapraz
        ?React.createElement('div',{style:{fontSize:12,color:'var(--text-secondary)',paddingLeft:26}},
            // Tamamlandıysa: gerçekleşen detaylar
            info.actuals.length>0
              ?info.actuals.map((w,wi)=>{
                  const t=w.tur||w.spor||'aerobik';
                  const sporlbl=SPOR_MAP[w.spor]?.emoji||tipEmoji(t);
                  const turlbl=TUR_LABELS[t]||SPOR_MAP[w.spor]?.l||t;
                  const sureDk=Math.round((toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0)/60);
                  return React.createElement('div',{key:wi,style:{marginTop:wi===0?0:3}},
                    sporlbl+' '+turlbl+(sureDk>0?' · '+sureDk+' dk':'')+(w.mesafe?' · '+parseFloat(w.mesafe)+' km':'')
                  );
                })
              // Planlı çapraz: çapraz notlarını göster
              :caprazNotlar.length>0
                ?caprazNotlar.map((y,yi)=>React.createElement('div',{key:yi,style:{marginTop:yi===0?0:3}},
                    (y.baslik||'')+(y.detay?' — '+y.detay:'')))
                :React.createElement('div',{style:{fontStyle:'italic',color:'var(--text-tertiary)'}},'Çapraz antrenman')
          )
        :ov?.yapilar?.length>0
          ?React.createElement(ReceteTablosu,{
              yapilar:kosuYapilarAl({tip:ov.tip,yapilar:ov.yapilar,isKosuCapraz:ov.isKosuCapraz}),
              zones,tip:ov.tip,readOnly:true,
              savedOverrides:(planSnap?.rowOverrides||{})[info.date]
            })
          :info.actuals.length>0
            ?React.createElement('div',{style:{fontSize:12,color:'var(--text-secondary)',paddingLeft:26,fontStyle:'italic'}},'Bu güne ait planlı reçete bulunamadı.')
            :null,
      // Tamamlanmış koşu antrenmanları için: gerçekleşen toplam istatistikler
      isCompleted&&!isCapraz&&info.actuals.length>0&&React.createElement('div',{style:{
        fontSize:11,color:'var(--success)',marginTop:8,paddingLeft:26,fontWeight:600
      }},
        info.actuals.map((w,wi)=>{
          const km=parseFloat(w.mesafe)||0;
          const sureDk=Math.round((toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0)/60);
          const parts=['✓'];
          if(km>0)parts.push(km+' km');
          if(sureDk>0)parts.push(fmtSure(sureDk));
          if(w.irtifa>0)parts.push('D+'+w.irtifa+'m');
          return React.createElement('span',{key:wi,style:{marginRight:10}},parts.join(' · '));
        })
      )
    );
  };

  return React.createElement('div',{style:{minHeight:'100vh',background:'var(--bg-tertiary)',padding:'20px 16px'}},
    React.createElement('style',null,
      '@media (max-width: 900px){.plan-3col{grid-template-columns:1fr !important;}}'
    ),
    React.createElement('div',{style:{maxWidth:1200,margin:'0 auto'}},

      // Header
      React.createElement('div',{style:{textAlign:'center',marginBottom:20}},
        logo?React.createElement('img',{src:logo,style:{width:52,height:52,objectFit:'contain',borderRadius:10,marginBottom:8,border:'1px solid var(--border)',padding:3,background:'var(--bg-secondary)'}}):
          React.createElement('div',{style:{fontSize:32,marginBottom:6}},'🏃'),
        React.createElement('div',{style:{fontSize:17,fontWeight:700}},appName),
        React.createElement('div',{style:{fontSize:13,color:'var(--text-secondary)',marginTop:2,fontWeight:600}},(athlete.ad||'')+' '+(athlete.soyad||'')),
        React.createElement('div',{style:{fontSize:11,color:'var(--text-tertiary)',marginTop:2}},
          wkStart.toLocaleDateString('tr-TR',{day:'2-digit',month:'long'})+' – '+wkEnd.toLocaleDateString('tr-TR',{day:'2-digit',month:'long',year:'numeric'})
        )
      ),

      // 3-sütun: [Durumum] [Antrenmanlarım] [Liderlik]
      (()=>{
        // History'i yerel olarak hesapla — Firebase'deki snapshot stale olabilir
        const localHistory=workouts.length>0?buildHistory(workouts,athlete,races):[];
        const last=localHistory[localHistory.length-1]||{};

        // ── SOL: Durumum (Toparlanma + Form + Haftalık Hedef) ────────────────
        // 1) Toparlanma — son antrenmandan
        const sortedW=[...workouts].sort((a,b)=>new Date(b.date)-new Date(a.date));
        const lastWorkout=sortedW[0]||null;
        let recoveryInfo=null;
        if(lastWorkout){
          try{
            const m=calcMetrics(lastWorkout,athlete);
            const rec=calcRecovery(lastWorkout,athlete,m.yukObj);
            const hedef=new Date(rec.hedefISO);
            const now=new Date();
            const kalanSaat=Math.max(0,Math.round((hedef-now)/3600000));
            recoveryInfo={...rec,kalanSaat,tamamlandi:now>=hedef};
          }catch(e){console.warn('recovery err:',e);}
        }

        // 2) Form — CTL/ATL/TSB (history.last)
        const ctl=last.ctl;const atl=last.atl;const tsb=last.tsb;const acwr=last.acwr;
        const tsbS=tsbStatus(tsb);
        const acwrS=acwrStatus(acwr);

        // 3) Haftalık Hedef İlerlemesi
        const wkTargets=calcWeeklyTargets(athlete,races,workouts,false,localHistory);
        const thisWk=wkTargets.find(wt=>wt.isCurrent)||null;
        const {start:wkS,end:wkE}=getWeekBounds(0);
        const wkW=workouts.filter(w=>{
          const d=new Date(w.date+'T12:00:00');
          return d>=wkS&&d<=wkE;
        });
        const actualKm=round1(wkW.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
        const actualDp=Math.round(wkW.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0));
        const actualLoad=round1(wkW.reduce((s,w)=>s+(calcMetrics(w,athlete).yukObj||0),0));
        // Haftalık yük hedefi: CTL × 7 (Banister/Coggan basit yaklaşım)
        const targetLoad=ctl>0?round1(ctl*7):null;
        const targetKm=thisWk?.targetKm||0;
        const targetDp=thisWk?.targetDp||0;

        const ProgressBar=({val,max,color,label,unit=''})=>{
          const pct=max>0?Math.min(110,(val/max)*100):0;
          const isOver=pct>100;
          return React.createElement('div',{style:{marginBottom:9}},
            React.createElement('div',{style:{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text-tertiary)',marginBottom:3}},
              React.createElement('span',null,label),
              React.createElement('span',{style:{fontWeight:600,color:'var(--text-secondary)'}},
                val+unit+' / '+max+unit+(max>0?` (${Math.round((val/max)*100)}%)`:'')
              )
            ),
            React.createElement('div',{style:{position:'relative',height:8,background:'var(--bg-secondary)',borderRadius:4,overflow:'hidden'}},
              React.createElement('div',{style:{
                position:'absolute',top:0,left:0,bottom:0,
                width:Math.min(100,pct)+'%',
                background:isOver?'var(--success)':color,
                transition:'width .3s'
              }})
            )
          );
        };

        const durumKart=React.createElement('div',{className:'card',style:{padding:'14px 16px',height:'100%'}},
          React.createElement('div',{style:{fontSize:11,fontWeight:700,color:'var(--text-secondary)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.5px'}},'📊 Durumum'),

          // Toparlanma
          recoveryInfo&&React.createElement('div',{style:{marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--border)'}},
            React.createElement('div',{style:{fontSize:10,color:'var(--text-tertiary)',marginBottom:3}},'💪 Toparlanma'),
            recoveryInfo.tamamlandi
              ?React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'var(--success)'}},'✓ Hazırsın')
              :React.createElement('div',null,
                  React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'var(--'+recoveryInfo.renk+')'}},
                    recoveryInfo.kalanSaat+' saat kaldı'
                  ),
                  React.createElement('div',{style:{fontSize:10,color:'var(--text-tertiary)',marginTop:1}},
                    recoveryInfo.kategori+' yorgunluk · Toplam '+recoveryInfo.saatler+' sa'
                  )
                )
          ),

          // Form (CTL/ATL/TSB)
          (ctl!=null||atl!=null||tsb!=null)&&React.createElement('div',{style:{marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--border)'}},
            React.createElement('div',{style:{fontSize:10,color:'var(--text-tertiary)',marginBottom:5}},'📈 Form Durumu'),
            React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:5}},
              React.createElement('div',{style:{textAlign:'center'}},
                React.createElement('div',{style:{fontSize:9,color:'var(--text-tertiary)'}},'CTL'),
                React.createElement('div',{style:{fontSize:14,fontWeight:700,color:'var(--info)'}},ctl!=null?ctl.toFixed(1):'—')
              ),
              React.createElement('div',{style:{textAlign:'center'}},
                React.createElement('div',{style:{fontSize:9,color:'var(--text-tertiary)'}},'ATL'),
                React.createElement('div',{style:{fontSize:14,fontWeight:700,color:'var(--warn)'}},atl!=null?atl.toFixed(1):'—')
              ),
              React.createElement('div',{style:{textAlign:'center'}},
                React.createElement('div',{style:{fontSize:9,color:'var(--text-tertiary)'}},'TSB'),
                React.createElement('div',{style:{fontSize:14,fontWeight:700,color:'var(--'+(tsbS.cls==='good'?'success':tsbS.cls==='warn'?'warn':tsbS.cls==='danger'?'danger':'info')+')'}},tsb!=null?(tsb>0?'+':'')+tsb.toFixed(1):'—')
              )
            ),
            React.createElement('div',{style:{fontSize:10,textAlign:'center',color:'var(--text-tertiary)'}},
              tsbS.label,acwr!=null?' · ACWR '+acwr.toFixed(2):''
            )
          ),

          // Haftalık Hedef İlerlemesi
          React.createElement('div',null,
            React.createElement('div',{style:{fontSize:10,color:'var(--text-tertiary)',marginBottom:6}},'🎯 Bu Hafta'),
            targetKm>0
              ?React.createElement(ProgressBar,{val:actualKm,max:round1(targetKm),color:'#60a5fa',label:'Mesafe',unit:' km'})
              :React.createElement('div',{style:{fontSize:10,color:'var(--text-tertiary)',marginBottom:6}},'Mesafe: ',actualKm,' km'),
            targetDp>0
              ?React.createElement(ProgressBar,{val:actualDp,max:targetDp,color:'#f87171',label:'D+',unit:' m'})
              :actualDp>0&&React.createElement('div',{style:{fontSize:10,color:'var(--text-tertiary)',marginBottom:6}},'D+: ',actualDp,' m'),
            targetLoad>0
              ?React.createElement(ProgressBar,{val:actualLoad,max:targetLoad,color:'#a78bfa',label:'Yük',unit:''})
              :React.createElement('div',{style:{fontSize:10,color:'var(--text-tertiary)'}},'Yük: ',actualLoad)
          )
        );

        // Sağ: Bu haftanın liderlik tablosu
        const stats=calcWeeklyStats(allWorkouts,allAthletes,0);
        const top=stats.slice(0,5);
        const myRank=stats.findIndex(s=>s.ath.id===athlete.id);
        const liderCard=React.createElement('div',{className:'card',style:{padding:'14px 16px',height:'100%'}},
          React.createElement('div',{style:{fontSize:11,fontWeight:700,color:'var(--text-secondary)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.5px'}},'🏆 Bu Hafta Liderlik'),
          React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:5}},
            top.map((s,i)=>{
              const isMe=s.ath.id===athlete.id;
              const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
              return React.createElement('div',{key:s.ath.id,style:{
                display:'flex',alignItems:'center',gap:6,
                padding:'5px 7px',borderRadius:6,
                background:isMe?'var(--info-bg)':'transparent',
                fontSize:11
              }},
                React.createElement('span',{style:{minWidth:18,textAlign:'center',fontSize:i<3?14:11}},medal),
                React.createElement('span',{style:{flex:1,fontWeight:isMe?700:500,color:isMe?'var(--info)':'var(--text-primary)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},(s.ath.ad||'')+' '+(s.ath.soyad||'').substring(0,1)+'.'),
                React.createElement('span',{style:{fontSize:10,color:'var(--text-tertiary)',fontWeight:600}},Math.round(s.sporSkoru))
              );
            }),
            myRank>=5&&React.createElement('div',{style:{
              borderTop:'1px dashed var(--border)',marginTop:4,paddingTop:5,
              display:'flex',alignItems:'center',gap:6,
              padding:'5px 7px',background:'var(--info-bg)',borderRadius:6,fontSize:11
            }},
              React.createElement('span',{style:{minWidth:18,textAlign:'center'}},(myRank+1)+'.'),
              React.createElement('span',{style:{flex:1,fontWeight:700,color:'var(--info)'}},'Sen'),
              React.createElement('span',{style:{fontSize:10,color:'var(--text-tertiary)',fontWeight:600}},Math.round(stats[myRank].sporSkoru))
            )
          )
        );

        // Orta: Antrenmanlarım
        const isSunday=new Date().getDay()===0;
        const antrenmanCard=dayInfos.length>0
          ?React.createElement('div',{className:'card',style:{padding:'14px 16px',height:'100%'}},
              React.createElement('div',{style:{fontSize:12,fontWeight:700,color:'var(--text-secondary)',marginBottom:12,textTransform:'uppercase',letterSpacing:'0.5px'}},'Antrenmanlarım'),
              React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:2}},
                dayInfos.map((info,i)=>renderDayCard(info,i))
              )
            )
          :isSunday
            ?React.createElement('div',{className:'card',style:{padding:'20px',textAlign:'center',color:'var(--text-tertiary)',fontSize:13,height:'100%'}},
                '🎉 Bu haftanın tüm antrenmanları tamamlandı!'
              )
            :React.createElement('div',{className:'card',style:{padding:'20px',textAlign:'center',color:'var(--text-tertiary)',fontSize:13,height:'100%'}},
                '—'
              );

        return React.createElement('div',{style:{
          display:'grid',
          gridTemplateColumns:'minmax(0,1fr) minmax(0,2fr) minmax(0,1fr)',
          gap:12,marginBottom:12,alignItems:'stretch'
        },className:'plan-3col'},
          durumKart,
          antrenmanCard,
          liderCard
        );
      })(),

      // SN-5: Kuvvet antrenmanı önerisi linkleri + açıklama
      (athlete.kuvvet_link||athlete.kuvvet_link2||athlete.kuvvet_link3||athlete.kuvvet_aciklama)&&React.createElement('div',{className:'card',style:{marginBottom:12,padding:'14px 16px'}},
        React.createElement('div',{style:{fontSize:12,fontWeight:700,color:'var(--text-secondary)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.5px'}},'💪 Kuvvet Antrenman Programı'),
        athlete.kuvvet_aciklama&&React.createElement('div',{style:{fontSize:13,color:'var(--text-primary)',marginBottom:10,lineHeight:1.5,whiteSpace:'pre-wrap'}},athlete.kuvvet_aciklama),
        React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:8}},
          [athlete.kuvvet_link,athlete.kuvvet_link2,athlete.kuvvet_link3].filter(Boolean).map((link,li)=>
            React.createElement('a',{
              key:li,
              href:link,target:'_blank',rel:'noopener noreferrer',
              style:{display:'inline-block',padding:'8px 16px',background:'var(--success-bg)',color:'var(--success)',borderRadius:'var(--radius)',fontSize:13,fontWeight:600,textDecoration:'none'}
            },'Program '+(li+1)+' →')
          )
        )
      ),

      // SN-6: Yarışlar listesi
      (()=>{
        const athRaceIds=(athlete.yarıslar||[]).map(x=>typeof x==='string'?x:x?.id).filter(Boolean);
        const athRaces=(races||[]).filter(r=>athRaceIds.includes(r.id)&&r.tarih)
          .sort((a,b)=>a.tarih.localeCompare(b.tarih));
        const upcoming=athRaces.filter(r=>r.tarih>=localDateStr(new Date()));
        if(!upcoming.length) return null;
        // History'i süre tahmini için yerel hesapla
        const localHist=workouts.length>0?buildHistory(workouts,athlete,races):[];
        const lastH=localHist[localHist.length-1]||{};
        return React.createElement('div',{className:'card',style:{marginBottom:12,padding:'14px 16px'}},
          React.createElement('div',{style:{fontSize:12,fontWeight:700,color:'var(--text-secondary)',marginBottom:10,textTransform:'uppercase',letterSpacing:'0.5px'}},'🏁 Yarışlarım'),
          upcoming.map((r,i)=>{
            const gunKaldi=Math.ceil((new Date(r.tarih+'T12:00:00')-new Date())/864e5);
            // Süre aralığı: mevcut tahmin → hazırlık sonrası hedef
            let mevcutMin=null,hedefMin=null;
            try{
              const target=calcTargetTime(r,athlete,lastH.ctl||0,lastH.acwr||1.0,workouts);
              if(target?.totalMin>0) mevcutMin=target.totalMin;
              const hedef=raceHedefSure(r,athlete,lastH.ctl||0,lastH.acwr||1.0,workouts);
              if(hedef?.tHedefMin>0) hedefMin=hedef.tHedefMin;
            }catch(e){}
            return React.createElement('div',{key:i,style:{
              display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'10px 0',
              borderBottom:i<upcoming.length-1?'1px solid var(--border)':'none',
              flexWrap:'wrap',gap:6
            }},
              React.createElement('div',{style:{flex:1,minWidth:0}},
                React.createElement('div',{style:{fontSize:13,fontWeight:600}},r.ad||'Yarış'),
                React.createElement('div',{style:{fontSize:11,color:'var(--text-tertiary)'}},
                  fmtDate(r.tarih)+(r.mesafe?' · '+r.mesafe+'km':'')+(r.d_plus?' · D+ '+r.d_plus+'m':'')
                ),
                (mevcutMin&&hedefMin)&&React.createElement('div',{style:{fontSize:11,color:'var(--info)',marginTop:3,fontWeight:600}},
                  '⏱ ',fmtHMS(mevcutMin),' – ',fmtHMS(hedefMin),
                  React.createElement('span',{style:{fontSize:9,color:'var(--text-tertiary)',fontWeight:400,marginLeft:4}},
                    '(mevcut → hazırlık sonrası)'
                  )
                )
              ),
              React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
                React.createElement('span',{style:{
                  fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99,
                  background:gunKaldi<=14?'var(--danger-bg)':gunKaldi<=30?'var(--warn-bg)':'var(--info-bg)',
                  color:gunKaldi<=14?'var(--danger)':gunKaldi<=30?'var(--warn)':'var(--info)'
                }},gunKaldi+' gün'),
                r.url&&React.createElement('a',{
                  href:r.url,target:'_blank',rel:'noopener noreferrer',
                  style:{fontSize:11,color:'var(--info)',textDecoration:'none'}
                },'🔗')
              )
            );
          })
        );
      })(),

      // Son 24 Hafta Özeti
      React.createElement(Hafta24Karti,{workouts,athlete}),

      // Tüm Sporcular bağlantısı
      React.createElement('a',{
        href:'?form=sporcular',
        style:{
          display:'block',textAlign:'center',
          padding:'12px 24px',marginTop:16,marginBottom:8,
          background:'var(--info)',color:'#fff',
          borderRadius:'var(--radius)',fontSize:14,fontWeight:600,
          textDecoration:'none',boxShadow:'0 2px 8px rgba(0,0,0,0.12)'
        }
      },'🏃🏻‍♀️🏃🏻 Tüm Sporcuları Gör'),

      // Güncelleme tarihi
      planSnap.lastSavedAt&&React.createElement('div',{style:{textAlign:'center',fontSize:10,color:'var(--text-tertiary)',marginTop:8,paddingBottom:20}},
        'Plan güncellendi: '+(()=>{
          const d=new Date(planSnap.lastSavedAt);
          return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
        })()
      )
    )
  );
  }catch(err){
    return React.createElement('div',{style:{padding:20,color:'red',fontSize:12,fontFamily:'monospace',whiteSpace:'pre-wrap'}},
      'Hata: '+err.message+'\n\n'+err.stack
    );
  }
}

// ── SN-8: Koşu İzi Sporcular Listesi ─────────────────────────────────────────
function SporcuListView(){
  const [athletes,setAthletes]=useState([]);
  const [races,setRaces]=useState([]);
  const [loading,setLoading]=useState(true);
  const [appName,setAppName]=useState('Koşu İzi');
  const [logo,setLogo]=useState('');

  useEffect(()=>{
    (async()=>{
      try{
        const cfg=await fbGet('app_config');
        if(cfg?.teamName)setAppName(cfg.teamName);
        if(cfg?.teamLogo)setLogo(cfg.teamLogo);
        const [aths,rcs]=await Promise.all([fbGet('ath2'),fbGet('races')]);
        const sorted=(aths||[]).sort((a,b)=>((a.ad||'')+' '+(a.soyad||'')).toLocaleLowerCase('tr').localeCompare(((b.ad||'')+' '+(b.soyad||'')).toLocaleLowerCase('tr'),'tr'));
        setAthletes(sorted);
        setRaces(rcs||[]);
      }catch(e){console.warn(e);}
      setLoading(false);
    })();
  },[]);

  if(loading) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text-tertiary)',fontSize:14}},'Yükleniyor...');

  return React.createElement('div',{style:{minHeight:'100vh',background:'var(--bg-tertiary)',padding:'20px 16px'}},
    React.createElement('div',{style:{maxWidth:480,margin:'0 auto'}},
      React.createElement('div',{style:{textAlign:'center',marginBottom:20}},
        logo?React.createElement('img',{src:logo,style:{width:52,height:52,objectFit:'contain',borderRadius:10,marginBottom:8,border:'1px solid var(--border)',padding:3,background:'var(--bg-secondary)'}}):
          React.createElement('div',{style:{fontSize:32,marginBottom:6}},'🏃'),
        React.createElement('div',{style:{fontSize:17,fontWeight:700}},appName),
        React.createElement('div',{style:{fontSize:12,color:'var(--text-tertiary)',marginTop:2}},'Koşu İzi Sporcuları · '+(athletes.length)+' sporcu'),
        React.createElement('div',{style:{fontSize:11,color:'var(--text-tertiary)',marginTop:4,opacity:0.7}},'Kendi antrenman planına ulaşmak için antrenörünüzden gönderilen linki kullanın.')
      ),
      athletes.length===0&&React.createElement('div',{style:{textAlign:'center',padding:40,color:'var(--text-tertiary)',fontSize:13}},'Henüz sporcu kaydı yok.'),
      athletes.map((a,i)=>{
        const athRaceIds=(a.yarıslar||[]).map(x=>typeof x==='string'?x:x?.id).filter(Boolean);
        const today=localDateStr(new Date());
        const athRaces=(races||[]).filter(r=>athRaceIds.includes(r.id)&&r.tarih&&r.tarih>=today)
          .sort((a,b)=>a.tarih.localeCompare(b.tarih));
        return React.createElement('div',{key:i,className:'card',style:{marginBottom:10,padding:'14px 16px'}},
          React.createElement('div',{style:{display:'flex',alignItems:'center',gap:12}},
            React.createElement('div',{style:{width:44,height:44,borderRadius:'50%',overflow:'hidden',border:'2px solid var(--border)',flexShrink:0,background:'var(--bg-secondary)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700,color:'var(--info)'}},
              a.foto?React.createElement('img',{src:a.foto,style:{width:'100%',height:'100%',objectFit:'cover'}}):
                React.createElement('span',null,(a.ad||'?').charAt(0).toUpperCase())
            ),
            React.createElement('div',{style:{flex:1}},
              React.createElement('div',{style:{fontSize:14,fontWeight:600,marginBottom:6}},(a.ad||'')+' '+(a.soyad||'')),
              a.strava&&React.createElement('div',{style:{marginBottom:6}},
                React.createElement('a',{
                  href:a.strava,target:'_blank',rel:'noopener noreferrer',
                  style:{fontSize:12,color:'#fc4c02',textDecoration:'none',fontWeight:600}
                },'🟠 Strava')
              ),
              athRaces.length>0&&React.createElement('div',{style:{marginTop:6,display:'flex',flexWrap:'wrap',gap:4}},
                athRaces.map((r,ri)=>{
                  const gunKaldi=Math.ceil((new Date(r.tarih+'T12:00:00')-new Date())/864e5);
                  return React.createElement('span',{key:ri,style:{
                    display:'inline-flex',alignItems:'center',gap:3,fontSize:10,fontWeight:600,
                    padding:'2px 8px',borderRadius:99,
                    background:gunKaldi<=14?'var(--danger-bg)':gunKaldi<=30?'var(--warn-bg)':'var(--info-bg)',
                    color:gunKaldi<=14?'var(--danger)':gunKaldi<=30?'var(--warn)':'var(--info)'
                  }},
                    r.url
                      ?React.createElement('a',{href:r.url,target:'_blank',rel:'noopener noreferrer',style:{color:'inherit',textDecoration:'none'}},r.ad)
                      :r.ad,
                    ' · '+gunKaldi+'g'
                  );
                })
              )
            )
          )
        );
      })
    )
  );
}

(async()=>{
  await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js');
  initFirebase();
  // URL routing
  const urlParams=new URLSearchParams(window.location.search);
  const formParam=urlParams.get('form');
  const component=formParam==='sporcu'
    ?React.createElement(SporcuAnketi)
    :formParam==='plan'
      ?React.createElement(SporcuPlanView)
      :formParam==='sporcular'
        ?React.createElement(SporcuListView)
        :React.createElement(AppWithAuth);
  ReactDOM.render(component,document.getElementById('root'));
})();
</script>
</body>

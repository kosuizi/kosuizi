<body>
<div id="root"></div>
<script>
const {useState,useEffect,useMemo,useRef,useCallback}=React;

const uid=()=>Math.random().toString(36).slice(2,10);

// React class component вҖ” ErrorBoundary (hooks ile yapДұlamaz)
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error('Render hatasДұ:',e,info);}
  render(){
    if(this.state.err)return React.createElement('div',{style:{padding:16,color:'var(--danger)',fontSize:13,background:'var(--danger-bg)',borderRadius:8,margin:8}},
      'вҡ  GГ¶rГјntГјleme hatasДұ: '+this.state.err.message,
      React.createElement('button',{style:{marginLeft:12,fontSize:12,cursor:'pointer'},onClick:()=>this.setState({err:null})},'Yenile')
    );
    return this.props.children;
  }
}

// в”Җв”Җ Genel PaylaЕҹ Butonu в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadHtml2CanvasLib(){
  return new Promise((resolve,reject)=>{
    if(window.html2canvas)return resolve();
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload=resolve;s.onerror=()=>reject(new Error('YГјklenemedi'));
    document.head.appendChild(s);
  });
}

async function captureElement(el, bgColor){
  // html2canvas Г¶ncesi tГјm kritik stilleri kaydet
  const saved={
    bodyCSS: document.body.getAttribute('style')||'',
    htmlCSS: document.documentElement.getAttribute('style')||'',
    bodyTransform: document.body.style.transform,
    bodyOverflow: document.body.style.overflow,
    bodyWidth: document.body.style.width,
    bodyHeight: document.body.style.height,
    scrollX: window.scrollX||0,
    scrollY: window.scrollY||0,
  };
  let canvas;
  try{
    canvas=await window.html2canvas(el,{
      scale:2,useCORS:true,backgroundColor:bgColor||'#ffffff',
      logging:false,allowTaint:false,
      windowWidth:document.documentElement.scrollWidth,
      windowHeight:document.documentElement.scrollHeight,
    });
  }finally{
    // Agresif temizlik вҖ” html2canvas'Дұn bДұraktДұДҹДұ tГјm izleri sil
    document.body.setAttribute('style', saved.bodyCSS);
    document.documentElement.setAttribute('style', saved.htmlCSS);
    // Ekstra gГјvenlik: kritik stilleri zorla sДұfДұrla
    document.body.style.transform='';
    document.body.style.overflow='';
    document.body.style.width='';
    document.body.style.height='';
    document.documentElement.style.transform='';
    document.documentElement.style.overflow='';
    window.scrollTo(saved.scrollX, saved.scrollY);
  }
  return canvas;
}

async function shareElement(el, filename, shareText){
  if(!el)return;
  await loadHtml2CanvasLib();
  // data-no-export elementlerini geГ§ici gizle
  const noExport=el.querySelectorAll('[data-no-export]');
  noExport.forEach(e=>{e._prevDisplay=e.style.display;e.style.display='none';});
  const bgColor=document.body.classList.contains('dark')?'#0a1220':'#f0f4f9';
  let canvas;
  try{ canvas=await captureElement(el, bgColor); }
  finally{ noExport.forEach(e=>{e.style.display=e._prevDisplay||'';}); }
  if(!canvas) return;
  const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
  const file=new File([blob],filename,{type:'image/png'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    await navigator.share({title:filename.replace('.png','').replace(/_/g,' '),text:shareText||'',files:[file]});
  } else {
    const a=document.createElement('a');
    a.download=filename;a.href=URL.createObjectURL(file);a.click();URL.revokeObjectURL(a.href);
  }
}

function ShareButton({targetRef, filename, title, style}){
  const [busy,setBusy]=useState(false);
  const handle=async()=>{
    if(!targetRef?.current)return;
    setBusy(true);
    try{await shareElement(targetRef.current,filename||'kosuizi_paylasim.png',title);}
    catch(e){if(e.name!=='AbortError')alert('PaylaЕҹДұm hatasДұ: '+e.message);}
    setBusy(false);
  };
  return React.createElement('button',{
    onClick:handle,disabled:busy,
    className:'btn btn-sm',
    style:{fontSize:13,padding:'3px 8px',...(style||{})},
    title:'PaylaЕҹ veya indir'
  },busy?'вҸі':'вҶ— PaylaЕҹ');
}
const GUNLER=['Pzt','Sal','ГҮar','Per','Cum','Cmt','Paz'];
const toSec=(sa,dk,sn)=>(parseInt(sa)||0)*3600+(parseInt(dk)||0)*60+(parseInt(sn)||0);
const fmtDur=(s)=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}s ${m}dk`:`${m}dk`};
const fmtDate=(d)=>{if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'short',year:'2-digit'})}catch{return d}};
const fmtShort=(d)=>{if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('tr-TR',{day:'2-digit',month:'short'})}catch{return d}};
const round1=(v)=>Math.round(v*10)/10;
const round2=(v)=>Math.round(v*100)/100;

// в”Җв”Җ Hesap Motoru (TrainingPeaks referanslДұ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// TRIMP: Banister (1991) вҖ” doДҹru versiyon, cinsiyet katsayДұsДұ dahil
function calcTRIMP(durMin,avgHR,rhr,mhr,cinsiyet){
  if(!avgHR||!rhr||!mhr||durMin<=0)return 0;
  const hrr=(avgHR-rhr)/(mhr-rhr);
  if(hrr<=0||hrr>1.2)return 0;
  const b=cinsiyet==='KadДұn'?1.67:1.92;
  const y=cinsiyet==='KadДұn'?0.86:0.64;  // вҶҗ eksik olan katsayДұ eklendi
  return round1(durMin*hrr*y*Math.exp(b*hrr));
}

// hrTSS: Coggan (TrainingPeaks)
function calcHrTSS(durSec,avgHR,lthr){
  if(!avgHR||!lthr||durSec<=0)return 0;
  const IF=avgHR/lthr;
  return round1((durSec/3600)*IF*IF*100);
}

// Mekanik YГјk (AU): Trail/ultra iГ§in zemin + irtifa tabanlДұ stres
// Referans: Gabbett 2016 вҖ” muskuloskeletal yГјk modeli
const TERRAIN_MULT={1:1.00,2:1.12,3:1.28,4:1.50,5:1.78};
function calcMechLoad(mesafe,irtifa,zemin_zorluk){
  const km=parseFloat(mesafe)||0;
  const dp=parseFloat(irtifa)||0;
  const z=parseInt(zemin_zorluk)||1;
  if(km<=0&&dp<=0)return 0;
  const equiv_km=km+(dp/100);           // irtifa ceza dГ¶nГјЕҹГјmГј
  return round1(equiv_km*(TERRAIN_MULT[z]||1.0));
}

// YГјk (Objektif): hrTSS Г¶ncelikli; zemin ve eДҹim modifiyeli
// EДҹim faktГ¶rГј: Minetti 2002 eДҹimi simГјle eden linear yaklaЕҹДұm
function calcObjLoad(durSec,avgHR,lthr,rhr,mhr,cinsiyet,mesafe,irtifa,zemin_zorluk){
  const km=parseFloat(mesafe)||0;
  const dp=parseFloat(irtifa)||0;
  const z=parseInt(zemin_zorluk)||1;
  const durH=durSec/3600;
  if(durSec<=0)return 0;
  if(!avgHR)return 0; // HR yoksa calcMetrics zaten RPE'den tahmin edip tekrar Г§aДҹДұrДұr

  // terrain modifier вҖ” patika ve tДұrmanДұЕҹ metabolik maliyeti artДұrДұr
  const t_mod=TERRAIN_MULT[z]||1.0;
  // eДҹim modifier вҖ” mesafe varsa eДҹim oranДұna bakДұyoruz
  let grade_mod=1.0;
  if(km>0&&dp>0){
    const avg_grade_pct=(dp/km)/10;
    grade_mod=1+Math.min(avg_grade_pct*0.12,0.28); // maks %28 artДұЕҹ
  }
  const combined_mod=Math.min(t_mod*grade_mod,1.60); // Гјst sДұnДұr

  if(lthr&&avgHR){
    const base=calcHrTSS(durSec,avgHR,lthr);
    return round1(base*combined_mod);
  } else {
    const base=calcTRIMP(durSec/60,avgHR,rhr,mhr,cinsiyet);
    return round1(base*combined_mod);
  }
}

// RPE вҶ’ tahmini nabДұz (Foster 2001 + Borg literatГјrГј)
// rhr ve mhr biliniyorsa HRR bazlДұ, bilinmiyorsa MHR bazlДұ yaklaЕҹДұm
function estimateHR(rpe,rhr,mhr){
  if(!rpe||rpe<=0)return{avgHR:null,maxHR:null,estimated:false};
  const rpeN=(parseFloat(rpe)-1)/9; // 1-10 вҶ’ 0-1
  // %HRR = 0.15 + 0.75Г—RPE_normalized (Foster et al.)
  const hrrPct=0.15+0.75*rpeN;
  let avgHR,maxHR;
  if(rhr>0&&mhr>0){
    avgHR=Math.round(rhr+(mhr-rhr)*hrrPct);
    maxHR=Math.min(mhr,Math.round(avgHR*1.08));
  } else if(mhr>0){
    avgHR=Math.round(mhr*(0.50+0.42*rpeN));
    maxHR=Math.min(mhr,Math.round(avgHR*1.08));
  } else {
    return{avgHR:null,maxHR:null,estimated:false};
  }
  return{avgHR,maxHR,estimated:true};
}

// Normalized Power tahmini (gerГ§ek 30sn Г¶rnekleri olmadan)
// NP вүҲ avgPower Г— katsayДұ (yoДҹunluk tГјrГјne gГ¶re variability tahmini)
function calcNP(ort_guc, maks_guc, tur){
  if(!ort_guc||parseFloat(ort_guc)<=0)return null;
  const avg=parseFloat(ort_guc);
  const maks=parseFloat(maks_guc)||avg*1.5;
  // Variability Index tahmini: steady вҶ’ dГјЕҹГјk, interval вҶ’ yГјksek
  const viEst={kolay:1.01,aerobik:1.03,uzun:1.04,tempo:1.06,
    esik:1.08,interval:1.12,yokus_kisa:1.15,yokus_uzun:1.10,
    tirmanis:1.07,capraz:1.05}[tur]||1.05;
  // NP вүҲ avgPower Г— VI
  return Math.round(avg*viEst);
}

// Intensity Factor (IF): gГјГ§ varsa NP/FTP, yoksa avgHR/LTHR
function calcIF(np, ftp, avgHR, lthr){
  if(np>0&&ftp>0)return round2(np/ftp);
  if(avgHR>0&&lthr>0)return round2(avgHR/lthr);
  return null;
}

function calcMetrics(w,ath){
  const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
  const durMin=durSec/60;
  const rpe=parseFloat(w.rpe)||0;
  let avgHR=parseFloat(w.ort_nabiz)||0;
  let hrEstimated=false;

  if(!avgHR&&rpe>0){
    const est=estimateHR(rpe,parseFloat(ath?.rhr)||0,parseFloat(ath?.mhr)||0);
    if(est.avgHR){avgHR=est.avgHR;hrEstimated=true;}
  }

  // GГјГ§ metrikleri
  const ortGuc=parseFloat(w.ort_guc)||0;
  const maksGuc=parseFloat(w.maks_guc)||0;
  const ftp=parseFloat(ath?.ftp)||0;
  const np=ortGuc>0?calcNP(w.ort_guc,w.maks_guc,w.tur):null;
  const IF_v=calcIF(np||0,ftp,avgHR,parseFloat(ath?.lthr)||0);

  // YГјk metrikleri
  const trimp=calcTRIMP(durMin,avgHR,ath?.rhr,ath?.mhr,ath?.cinsiyet);
  const hrTSS=calcHrTSS(durSec,avgHR,ath?.lthr);
  // GГјГ§ bazlДұ TSS (pTSS) вҖ” FTP ve NP varsa
  const pTSS=(np&&ftp>0&&durSec>0)?round1((durSec/3600)*(IF_v**2)*100):null;
  const yukObj=calcObjLoad(durSec,avgHR,ath?.lthr,ath?.rhr,ath?.mhr,ath?.cinsiyet,w.mesafe,w.irtifa,w.zemin_zorluk);
  // Excel X: RPE Г— sГјre(dk) вҖ” Subjektif yГјk
  const yukSubj=rpe>0?round1(rpe*durMin):0;
  const yukFinal=yukObj>0?yukObj:yukSubj;
  const mechLoad=calcMechLoad(w.mesafe,w.irtifa,w.zemin_zorluk);

  // Excel Y: Temel YГјk вҖ” hrTSS > TRIMP > HR-based
  const temelYuk=hrTSS>0?round1(hrTSS):(trimp>0?round1(trimp):yukFinal);

  return{
    durSec,durMin,trimp,hrTSS,yukObj:yukFinal,yukSubj,mechLoad,
    IF:IF_v,np,pTSS,temelYuk,
    hrEstimated,estAvgHR:hrEstimated?avgHR:null
  };
}

// в”Җв”Җ Toparlanma SГјresi HesabДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Bilimsel referans: KenttГӨ & HassmГ©n (1998), Mujika & Padilla (2000)
// DГ¶ner: { saatler, kategori, renk, detay }
function calcRecovery(w, ath, yukObj){
  const yuk=yukObj||0;
  const tur=w.tur||'aerobik';
  const rpe=parseFloat(w.rpe)||0;
  const durMin=toSec(w.sure_sa,w.sure_dk,w.sure_sn)/60;
  const irtifa=parseFloat(w.irtifa)||0;
  const band=ctlBand(parseFloat(ath?.ctl)||0); // CTL bandДұ daha doДҹru, yoksa basit tahmin

  // 1. Temel toparlanma: yГјk bazlДұ (TSS/yГјk)
  // <30 вҶ’ 12s, 30-60 вҶ’ 18s, 60-100 вҶ’ 24s, 100-150 вҶ’ 36s, >150 вҶ’ 48s
  let bazSaat=yuk<30?12:yuk<60?18:yuk<100?24:yuk<150?36:48;

  // 2. TГјr modifikatГ¶rГј
  const turMod={
    kolay:0.7, aerobik:1.0, uzun:1.4,
    tempo:1.2, esik:1.3, interval:1.5,
    yokus_kisa:1.4, yokus_uzun:1.5, tirmanis:1.4,
    teknik:1.0, acici:0.8, capraz:0.8, dinlenme:0
  }[tur]||1.0;

  // 3. Д°rtifa modifikatГ¶rГј (D+ > 500m вҶ’ ekstra nГ¶romГјskГјler stres)
  const irtifaMod=irtifa>2000?1.3:irtifa>1000?1.15:irtifa>500?1.08:1.0;

  // 4. Sporcu CTL bandДұ вҖ” daha deneyimli sporcu daha hДұzlДұ toparlar
  const bandMod=[1.3,1.15,1.0,0.9,0.85][Math.min(4,Math.max(0,(band||1)-1))];

  let saatler=Math.round(bazSaat*turMod*irtifaMod*bandMod);

  // 5. Min/max sДұnДұrlar
  saatler=Math.max(8,Math.min(72,saatler));

  // Kategori
  let kategori,renk;
  if(saatler<=12){kategori='Hafif';renk='success';}
  else if(saatler<=24){kategori='Orta';renk='info';}
  else if(saatler<=36){kategori='AДҹДұr';renk='warn';}
  else{kategori='ГҮok AДҹДұr';renk='danger';}

  // Г–nerilen aktiviteler
  const aktivite=saatler<=12
    ?'YГјrГјyГјЕҹ veya hafif esneme yapДұlabilir'
    :saatler<=24
    ?'Aktif toparlanma (yГјrГјyГјЕҹ, hafif bisiklet) Г¶nerilir'
    :saatler<=36
    ?'Tam dinlenme veya Г§ok hafif yГјrГјyГјЕҹ'
    :'Tam dinlenme вҖ” kas glikojeni yenilenmesi Г¶ncelik';

  // Hedef zaman вҖ” antrenman baЕҹlangДұГ§ saati + sГјre + toparlanma sГјresi
  const hedef=new Date();
  if(w.date&&w.time){
    const [yr,mo,dy]=w.date.split('-').map(Number);
    const [h,m]=(w.time||'00:00').split(':').map(Number);
    hedef.setFullYear(yr,mo-1,dy);
    hedef.setHours(h,m,0,0);
    hedef.setMinutes(hedef.getMinutes()+Math.round(durMin)); // antrenman sГјresi ekle
  } else if(w.date){
    // Saat yoksa gГјn ortasДұ (12:00) baz al
    const [yr,mo,dy]=w.date.split('-').map(Number);
    hedef.setFullYear(yr,mo-1,dy);
    hedef.setHours(12,0,0,0);
  }
  hedef.setHours(hedef.getHours()+saatler);
  const hedefStr=hedef.toLocaleString('tr-TR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  return{saatler,kategori,renk,aktivite,hedefStr,hedefISO:hedef.toISOString()};
}
// Referans: Banister 1991, Morton 1997
const О»_atl=1-Math.exp(-1/7);   // П„=7 gГјn (akut/yorgunluk)
const О»_ctl=1-Math.exp(-1/42);  // П„=42 gГјn (kronik/fitness)

// Faz hesabДұ вҖ” yarДұЕҹ tarihine ve hazДұrlДұk sГјresine gГ¶re
function calcPhase(dateStr,raceDate,prepWeeks,raceInfo){
  if(!raceDate||!prepWeeks)return'Temel';
  const d=new Date(dateStr+'T12:00:00');
  const rd=new Date(raceDate+'T12:00:00');
  const daysToRace=(rd-d)/864e5;
  if(daysToRace<-3)return'YarДұЕҹ SonrasДұ';
  const dist=parseFloat(raceInfo?.dist||raceInfo?.mesafe||0);
  // Manuel ayarlar varsa kullan, yoksa otomatik
  const taperW=parseInt(raceInfo?.taper_w)||( dist>42?3:dist>21?2:1);
  const peakW=parseInt(raceInfo?.peak_w)||( dist>42?4:dist>21?3:2);
  if(daysToRace<=taperW*7)return'Taper';
  if(daysToRace<=(taperW+peakW)*7)return'Zirve';
  if(daysToRace<=prepWeeks*7)return'GeliЕҹme';
  return'Temel';
}

// Г–neri hazДұrlДұk sГјresi вҖ” yarДұЕҹ metriklerine gГ¶re
function suggestPrepWeeks(mesafe,d_plus,iklim_zorluk,zemin_zorluk){
  const km=parseFloat(mesafe)||0;
  const dp=parseFloat(d_plus)||0;
  const iz=parseInt(iklim_zorluk)||1;
  const zz=parseInt(zemin_zorluk)||1;
  let base=km<10?8:km<21?10:km<42?14:km<60?20:km<90?24:28;
  const dp_bonus=Math.floor(dp/500);
  const iklim_bonus=(iz-1);
  const zemin_bonus=Math.floor((zz-1)/2); // zemin 1вҶ’+0, 2-3вҶ’+1, 4-5вҶ’+2
  return Math.min(base+dp_bonus+iklim_bonus+zemin_bonus,36);
}

// YГјk artДұЕҹ Г§arpanДұ вҖ” Gabbett (2016), Hulin (2015) tabanlДұ
// HRV yoДҹunluk katsayДұsДұ вҖ” bilinmiyorsa nГ¶tr (1.0), bonus/ceza yok
function hrvMod(hrv_durum){
  return{dengeli:1.0,dengesiz:0.85,dГјЕҹГјk:0.70}[hrv_durum]??1.0;
}
// HRV hazДұrlДұk skoru katkДұsДұ вҖ” bilinmiyorsa 0 (ne artДұ ne eksi)
function hrvReadinessBonus(hrv_durum){
  return{dengeli:5,dengesiz:0,dГјЕҹГјk:-5}[hrv_durum]??0;
}

function calcLoadMultiplier(acwr,phase,hrv_durum,sakatlДұk){
  if(!acwr)return{mult:1.0,label:'Veri yok',cls:''};
  // ACWR tabanlДұ baz
  let base=acwr<0.8?1.15:acwr<1.0?1.08:acwr<1.15?1.03:acwr<1.3?1.0:acwr<1.5?0.90:0.80;
  // Faz modifikatГ¶rГј
  const pmod={Temel:1.06,GeliЕҹme:1.0,Zirve:0.96,Taper:0.58,'YarДұЕҹ SonrasДұ':0.70}[phase]||1.0;
  // HRV modifikatГ¶rГј вҖ” bilinmiyorsa nГ¶tr (1.0)
  const hmod={dengeli:1.0,dengesiz:0.95,dГјЕҹГјk:0.88}[hrv_durum]??1.0;
  // SakatlДұk modifikatГ¶rГј
  const inj=parseInt(sakatlДұk)||1;
  const imod=inj<=2?1.0:inj<=4?0.95:inj<=6?0.87:inj<=8?0.77:0.60;
  const mult=Math.min(1.25,Math.max(0.50,base*pmod*hmod*imod));
  const label=mult>=1.1?'YГјk artДұr':mult>=1.0?'Kademeli artДұЕҹ':mult>=0.9?'Koru':mult>=0.7?'Azalt':'Г–nemli Г¶lГ§Гјde azalt';
  const cls=mult>=1.1?'good':mult>=0.95?'info':mult>=0.8?'warn':'danger';
  return{mult:round2(mult),label,cls};
}

function buildHistory(wks,ath,races){
  if(!wks.length)return[];
  const sorted=[...wks].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const today=new Date();
  // En zor yarДұЕҹДұ birincil olarak seГ§ (selectRaces ile tutarlДұ)
  const {primary:nextRace}=selectRaces(ath,races);

  const byDay={};
  sorted.forEach(w=>{
    const m=calcMetrics(w,ath);
    const day=(w.date||'').split('T')[0];
    const km=parseFloat(w.mesafe)||0;
    const hr=parseFloat(w.ort_nabiz)||0;
    const durMin=m.durSec/60;
    // Aerobik verimlilik: pace (sn/km) normalised to 140 bpm
    // YalnДұzca koЕҹu antrenmanlarДұ вҖ” yГјzme, bisiklet, pilates vb. dahil edilmez
    const KРһSU_SPORLAR=['kosu','trail','yol','ultra'];
    const isKosu=KРһSU_SPORLAR.includes(w.spor||'kosu');
    let aerEff=null;
    const hrMax=parseFloat(w.maks_nabiz)||0;
    const hrRange=hrMax>0&&hr>0?hrMax-hr:0;
    const tur=w.tur||'';
    const YAPILI=['interval','esik','tempo','yokus_kisa','yokus_uzun','tirmanis','teknik','depar','yaris'];
    const isSteady=!YAPILI.includes(tur)&&(hrRange===0||hrRange<=25)&&(parseFloat(w.rpe)||0)<=7;
    if(isKosu&&km>2&&hr>120&&hr<165&&durMin>15&&isSteady){
      const paceSec=(durMin*60)/km;
      aerEff=round1(paceSec*(hr/140));
    }
    if(day){
      byDay[day]=byDay[day]||{load:0,mech:0,aerEffSum:0,aerEffCount:0};
      byDay[day].load+=(m.yukObj||0);
      byDay[day].mech+=(m.mechLoad||0);
      if(aerEff){byDay[day].aerEffSum+=aerEff;byDay[day].aerEffCount++;}
    }
  });
  const first=new Date(sorted[0].date+'T12:00:00');
  const days=[];
  for(let d=new Date(first);d<=today;d.setDate(d.getDate()+1)){
    const y=d.getFullYear();const mo=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');
    days.push(`${y}-${mo}-${dd}`);
  }

  let atl=0,ctl=0,mAtl=0,mCtl=0;
  return days.map(day=>{
    const {load=0,mech=0,aerEffSum=0,aerEffCount=0}=byDay[day]||{};
    atl=load*О»_atl+atl*(1-О»_atl);
    ctl=load*О»_ctl+ctl*(1-О»_ctl);
    mAtl=mech*О»_atl+mAtl*(1-О»_atl);
    mCtl=mech*О»_ctl+mCtl*(1-О»_ctl);
    const acwr=ctl>1?round2(atl/ctl):null;
    const phase=calcPhase(day,nextRace?.tarih,nextRace?.prep_weeks,nextRace||{});
    const aerEff=aerEffCount>0?round1(aerEffSum/aerEffCount):null;
    return{
      date:day,load:round1(load),mech:round1(mech),
      atl:round1(atl),ctl:round1(ctl),tsb:round1(ctl-atl),acwr,
      mechAtl:round1(mAtl),mechCtl:round1(mCtl),phase,aerEff
    };
  });
}

// в”Җв”Җ Hedef SГјre Motoru (Excel modelinden port edildi) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function fmtHMS(totalMin){
  if(!totalMin||totalMin<=0)return'вҖ”';
  const h=Math.floor(totalMin/60);
  const m=Math.floor(totalMin%60);
  const s=Math.round((totalMin*60)%60);
  return h>0?`${h}s ${String(m).padStart(2,'0')}dk ${String(s).padStart(2,'0')}sn`:`${m}dk ${String(s).padStart(2,'0')}sn`;
}

function fmtPaceStr(totalMin,km){
  if(!totalMin||!km)return'вҖ”';
  const paceSec=(totalMin/km)*60;
  const pm=Math.floor(paceSec/60);
  const ps=Math.round(paceSec%60);
  return`${pm}:${String(ps).padStart(2,'0')} /km`;
}

function pbToMin(pbStr){
  if(!pbStr)return null;
  const parts=pbStr.split(':').map(Number);
  if(parts.length===3)return parts[0]*60+parts[1]+parts[2]/60;
  if(parts.length===2)return parts[0]+parts[1]/60;
  return null;
}


// YarДұЕҹ hazДұrlДұk skoru (0-100) вҖ” CTL, ACWR, sakatlДұk, faz
function raceReadinessScore(ctl,acwr,phase,sakatlДұk,hrv_durum,daysLeft,race,athlete,workouts){
  if(!acwr||!athlete)return null;
  // в”Җв”Җ 6 BAДһIMSIZ FAKTГ–R вҖ” SAF TOPLAГҮI SД°STEM (max=100) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  //
  //  FaktГ¶r                      Max  Boyut               Kaynak
  //  Fitness-Talep Dengesi        30  Kondisyon/yarДұЕҹ      Banister 1991
  //  YГјk Dengesi (ACWR)           22  Akut/kronik denge    Gabbett 2016
  //  SaДҹlДұk & SakatlДұk            20  Fiziksel mГјsaitlik   Gate-keeper
  //  DГ¶ngГј Д°lerlemesi             14  Periodizasyon        Mujika 2009
  //  Plan TutarlДұlДұДҹДұ             10  Uygulama kalitesi    Foster 1998
  //  HRV & Toparlanma              4  KДұsa vade toparlanma Kiviniemi 2007
  //  TOPLAM                      100
  //
  //  CTL+ZorlukUyumu вҶ’ birleЕҹtirildi (aynДұ ctlRatio'yu Г¶lГ§Гјyordu)
  //  HazДұrlДұkTamamlanma+Faz вҶ’ birleЕҹtirildi (aynДұ dГ¶ngГј ilerlemesini Г¶lГ§Гјyordu)
  // в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const detaylar=[];
  const km=parseFloat(race?.mesafe)||0;
  const dp=parseFloat(race?.d_plus)||0;
  const safeCtl=ctl||0;
  const targetCTL=km<=5?25:km<=10?35:km<=21?45:km<=42?60:km<=60?75:km<=90?90:105;
  const ctlRatio=targetCTL>0?Math.min(safeCtl/targetCTL,1.0):0;
  const ctlPct=Math.round(ctlRatio*100);

  // в”Җв”Җ 1. Fitness-Talep Dengesi (0-30) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // CTL / yarДұЕҹДұn gerektirdiДҹi CTL вҖ” spesifik hazДұrlДұk prensibi burada
  // targetCTL mesafe+D+ bazlДұ belirlendiДҹinden yarДұЕҹ zorluДҹu zaten iГ§inde
  const fitPuan=Math.round(ctlRatio*30);
  detaylar.push({
    baslik:'Fitness-Talep Dengesi',puan:fitPuan,max:30,
    yon:fitPuan>=24?'iyi':fitPuan>=15?'nГ¶tr':'kotu',
    aciklama:`CTL ${round1(safeCtl)} / ${race?.ad||'YarДұЕҹ'} iГ§in gereken ${targetCTL} (%${ctlPct}) вҖ” ${
      ctlRatio>=1.0?'YarДұЕҹДұn talebi karЕҹДұlanДұyor вң“':
      ctlRatio>=0.8?'Д°yi seviye, son rГ¶tuЕҹlar':
      ctlRatio>=0.6?'GeliЕҹiyor, artДұЕҹ devam etmeli':
      ctlRatio>=0.3?'Kondisyon yetersiz':
      'ГҮok dГјЕҹГјk, uzun hazДұrlДұk gerekli'}`
  });

  // в”Җв”Җ 2. YГјk Dengesi ACWR (0-22) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Hem akut hazДұrlДұk hem yaralanma riski вҖ” ГјГ§gen peak 1.05'te
  let acwrPuan;
  if(acwr>=0.8&&acwr<=1.3){
    acwrPuan=Math.round(22*Math.max(0,1-Math.abs(acwr-1.05)/0.25));
  } else if(acwr<0.8){
    acwrPuan=Math.round(Math.max(0,22*acwr/0.8));
  } else {
    acwrPuan=Math.round(Math.max(0,22*Math.max(0,1-(acwr-1.3)/0.5)));
  }
  detaylar.push({
    baslik:'YГјk Dengesi (ACWR)',puan:acwrPuan,max:22,
    yon:acwrPuan>=17?'iyi':acwrPuan>=10?'nГ¶tr':'kotu',
    aciklama:`ACWR ${acwr.toFixed(2)} вҖ” ${
      acwr>=0.95&&acwr<=1.15?'Д°deal yГјk dengesi вң“':
      acwr>=0.8&&acwr<=1.3?'Kabul edilebilir aralДұk':
      acwr<0.8?'DГјЕҹГјk yГјk вҖ” form kaybДұ riski':
      acwr<=1.5?'YГјksek yГјk вҖ” toparlanma gerekli':
      'AЕҹДұrДұ yГјk вҖ” zorunlu dinlenme'}`
  });

  // в”Җв”Җ 3. SaДҹlДұk & SakatlДұk (0-20) вҖ” gate-keeper faktГ¶r в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // SakatlДұk diДҹer tГјm faktГ¶rleri geГ§ersiz kДұlabilir
  const inj=parseInt(sakatlДұk)||1;
  const injPuan=Math.round(Math.max(0,20-(inj-1)*20/9));
  detaylar.push({
    baslik:'SaДҹlДұk & SakatlДұk',puan:injPuan,max:20,
    yon:injPuan>=16?'iyi':injPuan>=10?'nГ¶tr':'kotu',
    aciklama:`SakatlДұk ${inj}/10 вҖ” ${
      inj===1?'Tam saДҹlДұklДұ вң“':
      inj<=3?'Hafif Еҹikayet, takip et':
      inj<=5?'Orta Еҹikayet, yГјkГј sДұnДұrla':
      inj<=7?'Ciddi Еҹikayet, risk var':
      'YГјksek risk, yarДұЕҹ sorgulanmalДұ'}`
  });

  // в”Җв”Җ 4. DГ¶ngГј Д°lerlemesi (0-18) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // HazДұrlДұk tamamlanma + faz birleЕҹimi вҖ” aynДұ boyutu Г¶lГ§Гјyorlar
  // Faz: dГ¶ngГјnГјn nerede olduДҹu (0-10)
  // Tamamlanma: dГ¶ngГјnГјn yГјzde kaГ§Дұ geГ§ildi (0-8 ek puan)
  const racePhase=race?.tarih&&race?.prep_weeks
    ?calcPhase(new Date().toISOString().split('T')[0],race.tarih,race.prep_weeks,race)
    :phase;
  const fazS={Taper:10,Zirve:8,GeliЕҹme:5,Temel:2,'YarДұЕҹ SonrasДұ':0}[racePhase]??2;
  let compS=0;
  let dongГјAciklama=racePhase;
  if(daysLeft>0&&race?.prep_weeks){
    const prepWeeks=parseInt(race.prep_weeks)||12;
    const taperW=parseInt(race?.taper_w)||(km>42?3:km>21?2:1);
    const totalDays=Math.max(1,(prepWeeks-taperW)*7);
    const doneDays=Math.max(0,totalDays-(Math.max(0,daysLeft-taperW*7)));
    const pct=Math.min(1,doneDays/totalDays);
    const pctR=Math.round(pct*100);
    compS=pct>=0.90?4:pct>=0.75?3:pct>=0.60?2:pct>=0.40?1:0;
    dongГјAciklama=`${racePhase}, %${pctR} tamamlandДұ`;
  }
  const dongГјPuan=Math.min(14,fazS+compS);
  detaylar.push({
    baslik:'DГ¶ngГј Д°lerlemesi',puan:dongГјPuan,max:14,
    yon:dongГјPuan>=11?'iyi':dongГјPuan>=6?'nГ¶tr':'kotu',
    aciklama:`${dongГјAciklama} вҖ” ${
      racePhase==='Taper'?'Form zirvede, yarДұЕҹa hazДұr вң“':
      racePhase==='Zirve'?'Son yГјksek yГјk haftalarДұ':
      racePhase==='GeliЕҹme'?'Д°yi ilerleme, devam':
      racePhase==='Temel'?'Temel faz, uzun sГјreГ§ Г¶nde':
      'YarДұЕҹ sonrasДұ toparlanma'}`
  });

  // в”Җв”Җ 5. Plan TutarlДұlДұДҹДұ (0-6) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let planPuan=5; // veri yoksa orta puan
  let planAciklama='GeГ§miЕҹ hafta verisi yok';
  if(workouts?.length&&race?.prep_weeks&&race?.tarih){
    const weekTargets=calcWeeklyTargets(athlete,[race],workouts||[]);
    const athWks=(workouts||[]).filter(w=>w.athleteId===athlete?.id);
    const pastTargets=weekTargets.filter(wt=>wt.isPast&&(wt.targetKm>0||wt.targetDp>0));
    if(pastTargets.length>0){
      let ts=0;
      pastTargets.forEach(wt=>{
        const ws=wt.weekStart,we=wt.weekEnd;
        const wWks=athWks.filter(w=>{const d=new Date(w.date+'T12:00:00');return d>=ws&&d<=we;});
        const aKm=round1(wWks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
        const aDp=Math.round(wWks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0));
        const kR=wt.targetKm>0?Math.min(1.1,aKm/wt.targetKm):1;
        const dR=wt.targetDp>0?Math.min(1.1,aDp/wt.targetDp):kR;
        ts+=kR*0.6+dR*0.4;
      });
      const avg=ts/pastTargets.length;
      const avgPct=Math.round(avg*100);
      planPuan=avg>=0.90?10:avg>=0.75?8:avg>=0.60?6:avg>=0.40?3:avg>=0.20?1:0;
      planAciklama=`%${avgPct} ortalama uyum (${pastTargets.length} hafta) вҖ” ${
        avg>=0.90?'MГјkemmel disiplin вң“':
        avg>=0.75?'Д°yi tutarlДұlДұk':
        avg>=0.60?'Orta dГјzey':
        avg>=0.40?'TutarsДұz':
        'Ciddi eksiklik'}`;
    }
  }
  detaylar.push({
    baslik:'Plan TutarlДұlДұДҹДұ',puan:planPuan,max:10,
    yon:planPuan>=8?'iyi':planPuan>=4?'nГ¶tr':'kotu',
    aciklama:planAciklama
  });

  // в”Җв”Җ 6. HRV & Toparlanma (0-4) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const hrvPuan={dengeli:4,dengesiz:2,'dГјЕҹГјk':0}[hrv_durum]??2;
  detaylar.push({
    baslik:'HRV & Toparlanma',puan:hrvPuan,max:4,
    yon:hrvPuan>=3?'iyi':hrvPuan>=1?'nГ¶tr':'kotu',
    aciklama:`HRV: ${hrv_durum||'bilinmiyor'} вҖ” ${
      hrv_durum==='dengeli'?'Sinir sistemi dinlenmiЕҹ вң“':
      hrv_durum==='dengesiz'?'Orta toparlanma':
      hrv_durum==='dГјЕҹГјk'?'Yorgunluk yГјksek':
      'Veri yok'}`
  });

  // в”Җв”Җ TOPLAM в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const rawScore=fitPuan+acwrPuan+injPuan+dongГјPuan+planPuan+hrvPuan;
  // rawScore her zaman 0-100 вҖ” floor/cap hack gerekmez

  let finalScore=rawScore;
  let tavanNot=null;
  if(daysLeft>0&&daysLeft<7){finalScore=Math.min(rawScore,80);tavanNot=`YarДұЕҹa ${daysLeft} gГјn kaldДұ вҖ” form tam aГ§ДұДҹa Г§ДұkmamДұЕҹ olabilir`;}
  else if(daysLeft>0&&daysLeft<14){finalScore=Math.min(rawScore,90);tavanNot=`YarДұЕҹa ${daysLeft} gГјn kaldДұ`;}
  if(tavanNot) detaylar.push({baslik:'YarДұЕҹ YakДұnlДұДҹДұ',puan:null,max:null,yon:'nГ¶tr',aciklama:tavanNot});

  return{score:finalScore,rawScore,detaylar};
}
// в”Җв”Җ BГ¶lgeler Motoru (Friel + Daniels) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// Daniels VDOT tablosundan pace вҶ’ VDOT (basit lineer interpolasyon)
// vdot = 0.000104 * dist + 0.182258 * pace + ... (tam formГјl)
// Daha temiz: Daniels formГјlГјnГј tersine Г§evirerek PB'den vLT tГјretiyoruz
function pbToVlt(pbStr, distKm){
  const mins = pbToMin(pbStr);
  if(!mins || !distKm) return null;
  const paceMinKm = mins / distKm;
  const paceMS = 1000 / (paceMinKm * 60);
  // Daniels: VDOT вүҲ yarДұЕҹ hДұzДұ / eЕҹik yГјzdesi
  // EЕҹik yaklaЕҹДұk %86 of VO2max pace
  // Riegel zinciri: vLT вүҲ maraton pace * 1.07 вүҲ HM pace * 0.99 вүҲ 10K pace * 0.92
  const LTHR_RATIO = distKm >= 42 ? 1.08 : distKm >= 20 ? 1.00 : distKm >= 9 ? 0.93 : 0.87;
  return round2(paceMS * LTHR_RATIO);
}

// в”Җв”Җ vLT Otomatik Kalibrasyon (Antrenman Verilerinden) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Metodoloji: Sabit tempolu aerobik antrenmanlarda pace-HR doДҹrusal regresyonu
// Referans: Conconi 1982, Carter 1999 вҖ” submaksimal HR-pace iliЕҹkisi

function calibrateVlt(workouts, ath){
  const lthr=parseFloat(ath?.lthr)||0;
  const mhr=parseFloat(ath?.mhr)||0;
  const rhr=parseFloat(ath?.rhr)||0;
  if(!mhr||!rhr)return{error:'MHR ve RHR bilgisi gereklidir.'};

  // EЕҹik nabДұz вҖ” LTHR varsa onu kullan, yoksa %85 MHR
  const thresholdHR=lthr>0?lthr:Math.round(mhr*0.85);

  // Uygun antrenmanlarДұ filtrele
  // Sabit tempolu sayДұlan tГјrler вҖ” bu listede olmayan tГјrler dahil edilmez
  const STEADY_TURLERI=['kolay','aerobik','uzun'];

  const eligible=workouts.filter(w=>{
    const km=parseFloat(w.mesafe)||0;
    const hr=parseFloat(w.ort_nabiz)||0;
    const hrMax=parseFloat(w.maks_nabiz)||0;
    const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
    const rpe=parseFloat(w.rpe)||0;
    const zemin=parseInt(w.zemin_zorluk)||1;
    const spor=w.spor||'kosu';
    const tur=w.tur||'';

    // 0. "Analiz iГ§in kullan" iЕҹareti вҖ” tГјm diДҹer kriterleri bypass eder
    //    (koГ§ manuel olarak dahil etmek istediДҹi antrenmanlar iГ§in)
    if(w.analiz_icin===true){
      return spor==='kosu'&&km>=3&&durSec>=1200&&hr>=100&&hr<=185;
    }

    // 1. Temel koЕҹullar
    if(spor!=='kosu') return false;
    if(km<3) return false;
    if(durSec<1200) return false;   // en az 20dk
    if(hr<115||hr>165) return false; // aerobik bГ¶lge

    // 2. Antrenman tГјrГј вҖ” ZORUNLU: sadece sabit tempolu tГјrler dahil
    //    TГјr girilmemiЕҹse veya yapДұsal tГјrse dДұЕҹla
    if(!STEADY_TURLERI.includes(tur)) return false;

    // 3. Zemin вҖ” Г§ok zor arazi dДұЕҹla (pace gГјvenilirliДҹi dГјЕҹer)
    if(zemin>2) return false;

    // 4. NabДұz deДҹiЕҹkenliДҹi вҖ” maks-ort farkДұ >25 bpm ise interval/fartlek
    if(hrMax>0&&hr>0){
      const hrRange=hrMax-hr;
      if(hrRange>25) return false;
    }

    // 5. RPE вҖ” yГјksek RPE yapДұsal antrenmanДұ iЕҹaret eder
    if(rpe>0&&rpe>7) return false;

    // 6. Pace makul aralДұkta
    const durMin=durSec/60;
    const pace=km>0?durMin/km:0;
    if(pace<3.0||pace>10.0) return false;

    return true;
  });

  if(eligible.length<3)return{
    error:`Yeterli veri yok. ${eligible.length} uygun sabit tempolu antrenman bulundu (en az 3 gerekli). Д°pucu: Kolay, Aerobik veya Uzun KoЕҹu tГјrГјndeki antrenmanlara tГјr atayДұn, ya da "Analize Dahil Et" kutusunu iЕҹaretleyin.`,
    count:eligible.length
  };

  // Her antrenman iГ§in pace (m/s) ve HR Г§ifti
  const points=eligible.map(w=>{
    const km=parseFloat(w.mesafe);
    const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
    const hr=parseFloat(w.ort_nabiz);
    const pace=km*1000/durSec; // m/s
    return{pace,hr,date:w.date};
  }).filter(p=>p.pace>1&&p.pace<8);

  if(points.length<3)return{error:'GeГ§erli pace-HR Г§ifti yeterli deДҹil.',count:points.length};

  // DoДҹrusal regresyon: HR = a + b*pace
  const n=points.length;
  const sumX=points.reduce((s,p)=>s+p.pace,0);
  const sumY=points.reduce((s,p)=>s+p.hr,0);
  const sumXY=points.reduce((s,p)=>s+p.pace*p.hr,0);
  const sumX2=points.reduce((s,p)=>s+p.pace*p.pace,0);
  const b=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
  const a=sumY/n-b*(sumX/n);

  // RВІ gГјven skoru
  const yMean=sumY/n;
  const ssTot=points.reduce((s,p)=>s+(p.hr-yMean)**2,0);
  const ssRes=points.reduce((s,p)=>s+(p.hr-(a+b*p.pace))**2,0);
  const r2=ssTot>0?Math.max(0,1-ssRes/ssTot):0;

  if(b<=0)return{error:'Pace-HR iliЕҹkisi ters Г§ДұktДұ. Daha fazla sabit tempolu koЕҹu verisi gerekiyor.',count:n};

  // vLT = (thresholdHR - a) / b
  const vlt=(thresholdHR-a)/b;

  if(vlt<1.5||vlt>7)return{
    error:`Hesaplanan vLT (${round2(vlt)} m/s) makul aralДұk dДұЕҹДұnda. Veri kalitesi yetersiz.`,
    count:n,r2:round2(r2)
  };

  // Son 30 gГјn ve tГјm zaman verisi ayrДұ gГ¶ster
  const recent=points.filter(p=>(new Date()-new Date(p.date+'T12:00:00'))<30*864e5);
  let vltRecent=null;
  if(recent.length>=3){
    const rn=recent.length;
    const rX=recent.reduce((s,p)=>s+p.pace,0);
    const rY=recent.reduce((s,p)=>s+p.hr,0);
    const rXY=recent.reduce((s,p)=>s+p.pace*p.hr,0);
    const rX2=recent.reduce((s,p)=>s+p.pace*p.pace,0);
    const rb=(rn*rXY-rX*rY)/(rn*rX2-rX*rX);
    const ra=rY/rn-rb*(rX/rn);
    if(rb>0){const v=(thresholdHR-ra)/rb;if(v>1.5&&v<7)vltRecent=round2(v);}
  }

  return{
    vlt:round2(vlt),
    vltRecent,
    r2:round2(r2),
    count:n,
    recentCount:recent.length,
    thresholdHR,
    points,
    confidence:r2>=0.7?'YГјksek':r2>=0.5?'Orta':'DГјЕҹГјk',
    confidenceCls:r2>=0.7?'good':r2>=0.5?'warn':'danger',
  };
}
  // Г–ncelik: manuel giriЕҹ вҶ’ PB zinciri
function calcVlt(ath){
  if(ath.vlt && parseFloat(ath.vlt) > 0) return parseFloat(ath.vlt);
  // PB'den tГјret вҖ” en isabetli mesafe Г¶nce
  const pbs = [
    {dist:42.195, pb:ath.pb_m},
    {dist:21.0975, pb:ath.pb_hm},
    {dist:10, pb:ath.pb_10k},
    {dist:5, pb:ath.pb_5k},
  ];
  for(const {dist,pb} of pbs){
    const v = pbToVlt(pb, dist);
    if(v && v > 1 && v < 8) return v;
  }
  // Yoksa VO2max tabanlДұ tahmini
  const vo2 = parseFloat(ath.vo2max) || 0;
  if(vo2 > 0) return round2(vo2 * 0.01408); // Daniels sabiti
  return null;
}

// Friel nabДұz bГ¶lgeleri вҖ” %LTHR bazlДұ (birincil), %HRR bazlДұ (yedek)
const HR_ZONES_LTHR = [
  {id:'Z1', label:'Z1 вҖ” Toparlanma',    lo:0,    hi:0.85},
  {id:'Z2', label:'Z2 вҖ” Aerobik Taban', lo:0.85, hi:0.89},

  {id:'Z5c',label:'Z5c вҖ” Maksimal',     lo:1.06, hi:1.15},
];

const HR_ZONES_HRR = [
  {id:'Z1', label:'Z1 вҖ” Toparlanma',    lo:0.50, hi:0.60},
  {id:'Z2', label:'Z2 вҖ” Aerobik Taban', lo:0.60, hi:0.70},
  {id:'Z3', label:'Z3 вҖ” Tempo',         lo:0.70, hi:0.80},
  {id:'Z4', label:'Z4 вҖ” EЕҹik',          lo:0.80, hi:0.90},
  {id:'Z5a',label:'Z5a вҖ” VOвӮӮmax',       lo:0.90, hi:0.95},
  {id:'Z5b',label:'Z5b вҖ” Anaerobik',    lo:0.95, hi:1.00},
  {id:'Z5c',label:'Z5c вҖ” Maksimal',     lo:1.00, hi:1.10},
];

// Pace bГ¶lgeleri вҖ” %vLT bazlДұ (Friel/Coggan)
const PACE_ZONES_VLT = [
  // lo=0.60: fizyolojik alt sДұnДұr (yГјrГјyГјЕҹ ГјstГј koЕҹu) вҖ” hedef pace anlamlДұ kalДұr
  // lo=0 olsaydДұ hedef=(0+0.75)/2=0.375Г—vLT вҶ’ nonsens (12+ dk/km)
  {id:'Z1', lo:0.60, hi:0.75},
  {id:'Z2', lo:0.75, hi:0.85},
  {id:'Z3', lo:0.85, hi:0.90},
  {id:'Z4', lo:0.90, hi:0.97},
  {id:'Z5a',lo:0.97, hi:1.00},
  {id:'Z5b',lo:1.00, hi:1.05},
  {id:'Z5c',lo:1.05, hi:1.15},
];

function calcZones(ath){
  const rhr = parseFloat(ath.rhr)||0;
  const mhr = parseFloat(ath.mhr)||0;
  const lthr = parseFloat(ath.lthr)||0;
  const vlt = calcVlt(ath); // m/s

  let hrZones = null;
  if(lthr > 0 && mhr > 0){
    // %LTHR yГ¶ntemi
    hrZones = HR_ZONES_LTHR.map(z=>({
      ...z,
      lo_bpm: Math.round(lthr * z.lo),
      hi_bpm: Math.round(lthr * z.hi),
      method:'%LTHR'
    }));
  } else if(rhr > 0 && mhr > 0){
    // Karvonen %HRR yГ¶ntemi
    hrZones = HR_ZONES_HRR.map(z=>({
      ...z,
      lo_bpm: Math.round(rhr + (mhr-rhr)*z.lo),
      hi_bpm: Math.round(rhr + (mhr-rhr)*z.hi),
      method:'%HRR'
    }));
  }

  let paceZones = null;
  if(vlt && vlt > 0){
    paceZones = PACE_ZONES_VLT.map(z=>({
      ...z,
      lo_ms: round2(vlt * z.lo),
      hi_ms: round2(vlt * z.hi),
      lo_pace: fmtPaceFromMS(vlt * z.lo),
      hi_pace: fmtPaceFromMS(vlt * z.hi),
      target_pace: fmtPaceFromMS(vlt * (z.lo + z.hi) / 2),
    }));
  }

  return {hrZones, paceZones, vlt, lthr, rhr, mhr};
}

function fmtPaceFromMS(ms){
  if(!ms || ms <= 0) return 'вҖ”';
  const secPerKm = 1000 / ms;
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

// в”Җв”Җ DГјzeltilmiЕҹ Hedef SГјre Motoru в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// Metodoloji: Excel Bilgi!C40 formГјlГјnГјn tam port'u
// Temel fark: vLT'yi doДҹru hesaplДұyoruz, PROGRESS ile dinamik aДҹДұrlДұk kullanДұyoruz

function calcTargetTime(race, ath, ctl, acwr, workouts){
  const km   = parseFloat(race.mesafe)||0;
  const dp   = parseFloat(race.d_plus)||0;
  const altMax = parseFloat(race.maks_irtifa)||0;
  const altMin = parseFloat(race.min_irtifa)||0;
  const temp = parseFloat(race.sicaklik)||15;
  const nem  = parseFloat(race.nem)||50;
  const diff = parseInt(race.iklim_zorluk)||1;  // iklim zorluДҹu (1-3)
  const zemin = parseInt(race.zemin_zorluk)||1;  // zemin zorluДҹu (1-5): tДұrmanДұЕҹ/iniЕҹ hДұzДұnДұ etkiler
  const gear = parseFloat(race.ekipman_kg)||0;
  const cp   = parseInt(race.kontrol_noktasi)||0;
  const heatAdapt = parseFloat(ath.isi_aklimasyon)||0;

  const vo2  = parseFloat(ath.vo2max)||0;
  const rhr  = parseFloat(ath.rhr)||0;
  const mhr  = parseFloat(ath.mhr)||0;
  const lthr = parseFloat(ath.lthr)||0;
  const kilo = parseFloat(ath.kilo)||70;
  const boy  = parseFloat(ath.boy)||170;
  const yas  = ath.dogum?new Date().getFullYear()-new Date(ath.dogum).getFullYear():35;
  const bmi  = kilo/((boy/100)**2);
  const hrv_status = {dengeli:3,dengesiz:2,dГјЕҹГјk:1}[ath.hrv_durum]??2.5;
  const sakatlДұk = parseInt(ath.sakatlДұk)||1;
  const motiv = parseInt(ath.motivasyon)||3;
  const prepWeeks = parseInt(race.prep_weeks)||16;

  if(km<=0||vo2<=0) return null;

  // в”Җв”Җ 1. VDOT SД°STEMД° (Jack Daniels) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // VO2 tГјketimi: Daniels exact formula (ml/kg/min at v m/min)
  const vo2AtV=(v)=>-4.60+0.182258*v+0.000104*v*v;
  // vVO2max: binary search
  let lo=100,hi=600;
  for(let i=0;i<50;i++){const mid=(lo+hi)/2;vo2AtV(mid)<vo2?lo=mid:hi=mid;}
  const vVO2max=(lo+hi)/2; // m/min

  // %VO2max kullanДұm oranДұ sГјreye gГ¶re (Daniels performans tablosu)
  const pctVo2=(t)=>{
    if(t<10)  return 0.95;
    if(t<20)  return 0.92;
    if(t<30)  return 0.89;
    if(t<45)  return 0.86;
    if(t<60)  return 0.83;
    if(t<90)  return 0.80;
    if(t<120) return 0.77;
    if(t<180) return 0.73;
    if(t<240) return 0.70;
    if(t<360) return 0.64;
    if(t<480) return 0.59;
    if(t<600) return 0.54;
    if(t<900) return 0.48;
    if(t<1200)return 0.43;
    return 0.38;
  };
  // Д°teratif Г§Г¶zГјm
  const predictVo2=(distKm)=>{
    let t=distKm*6; // baЕҹlangДұГ§ tahmini
    for(let i=0;i<20;i++){
      const newT=(distKm*1000)/(vVO2max*pctVo2(t));
      if(Math.abs(newT-t)<0.1){t=newT;break;}
      t=0.6*newT+0.4*t;
    }
    return t;
  };

  // в”Җв”Җ 2. RД°EGEL FORMГңLГң (mesafe-ayarlДұ Гјs) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Ultra mesafelerde yorgunluk etkisi ГјssГј artДұrДұr
  const riegelExp=(d)=>{
    if(d<=10) return 1.06;
    if(d<=21) return 1.07;
    if(d<=42) return 1.08;
    if(d<=60) return 1.10;
    if(d<=80) return 1.12;
    if(d<=100)return 1.15;
    return 1.17;
  };
  const riegelPred=(pbDist,pbMin)=>pbMin>0?pbMin*Math.pow(km/pbDist,riegelExp(km)):null;

  // PB'leri parse et
  const pbs=[
    {d:5,      t:pbToMin(ath.pb_5k),  w:0.10},
    {d:10,     t:pbToMin(ath.pb_10k), w:0.15},
    {d:21.097, t:pbToMin(ath.pb_hm),  w:0.30},
    {d:42.195, t:pbToMin(ath.pb_m),   w:0.30},
  ].filter(p=>p.t&&p.t>0);

  // в”Җв”Җ 3. AДһIRLIKLI BLEND в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // VO2max tahmini + PB Riegel aДҹДұrlДұklДұ ortalama
  // PB'ler hedefe yakДұn olduДҹu Г¶lГ§Гјde daha gГјvenilir
  const vo2Pred = vo2>0 ? predictVo2(km) : null;
  const sources = [];

  pbs.forEach(p=>{
    const pred = riegelPred(p.d, p.t);
    if(pred) sources.push({pred, w:p.w});
  });
  if(vo2Pred) sources.push({pred:vo2Pred, w:0.15});

  // PB yoksa ve vo2Pred varsa, vo2Pred'i tam aДҹДұrlДұkla kullan
  if(sources.length===0){
    if(vo2>0&&vo2Pred){sources.push({pred:vo2Pred, w:1.0});}
    else return null;
  }

  const totalW = sources.reduce((s,x)=>s+x.w, 0);
  const baseDk = sources.reduce((s,x)=>s+x.pred*x.w, 0) / totalW;

  // в”Җв”Җ 4. TERSД°YEL FAKTГ–RLER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // Fizyolojik kalitatГ¶r (kГјГ§Гјk dГјzeltmeler вҖ” taban zaten VO2/PB'den geliyor)
  const lthrRatio = lthr>0&&mhr>0 ? lthr/mhr : 0.85;
  const fAge  = Math.max(0.92, Math.min(1.12, 1+Math.max(0,yas-40)*0.004));
  const fBmi  = Math.min(1.15, 1+Math.max(0,bmi-22)*0.008);
  const fRhr  = Math.min(1.15, Math.max(0.88, 1-0.003*(50-rhr)));
  const fLthr = lthr>0&&mhr>0?Math.min(1.10,Math.max(0.90,1-0.3*(lthrRatio-0.85))):1.0;
  const fVo2  = vo2>0?Math.min(1.06,Math.max(0.94,1-0.004*(vo2-50))):1.0;
  const hrv_f = hrv_status===1?1.015:hrv_status===2?1.008:0.995;
  const fHrv  = Math.min(1.03, Math.max(0.97, hrv_f));
  const fSak  = Math.min(1.20, Math.max(0.90, 1+(sakatlДұk-1)*0.02));
  const fMot  = Math.min(1.04, Math.max(0.96, 1-(motiv-3)*0.02));
  const haf   = Math.max(0.85,1-0.15*(heatAdapt/100));
  const tEff  = temp<=12?0:temp<=22?0.002*(temp-12):0.02+0.004*(temp-22);
  const hEff  = temp>20&&nem>60?Math.min(0.025,0.0007*(nem-60)*Math.min(1,(temp-20)/10)):0;
  const fClim = (1+haf*(tEff+hEff));
  const fGear = gear>0?Math.min(1.10,1+0.6*(gear/kilo)*(1+0.3*Math.min(1,km/42))):1.0;

  // CTL bazlДұ hazДұrlДұk dГјzeltmesi вҖ” mevcut forma gГ¶re kГјГ§Гјk ince ayar
  // BГјyГјk etki yaratmaz Г§ГјnkГј taban zaten VO2max+PB'den geliyor
  const daysToRace = race.tarih?Math.ceil((new Date(race.tarih+'T12:00:00')-new Date())/864e5):999;
  const remainingWk = Math.max(0,daysToRace/7);
  const PROGRESS = 1-Math.min(1,Math.max(0,remainingWk/prepWeeks));
  const targetCtl = km<=10?50:km<=21?70:km<=42?80:km<=80?95:110;
  const fCtl = 1.0;

  // ACWR dГјzeltmesi
  const acwrVal = acwr||1.0;
  const fAcwr = daysToRace<=14
    ? Math.max(0.97,Math.min(1.04,acwrVal<=1?1-0.015*(1-acwrVal):1+0.02*(acwrVal-1)))
    : 1.0;

  // Zemin zorluДҹu faktГ¶rГј вҖ” dГјz kДұsДұmlardaki zemin sГјrtГјnmesi ve teknik talep
  // Kaynak: Minetti 2002 (metabolik maliyet), Vernillo 2017 (trail ekonomisi)
  // zemin=1 yol: baz, zemin=5 kaya/kar/Г§amur: %25 daha yavaЕҹ dГјz tempo
  // Sadece dГјz bГ¶lГјmlerin tempo cezasДұ вҖ” tДұrmanДұЕҹ/iniЕҹ etkisi climbRate/descentRate'ten geliyor
  const fZemin = {1:1.00, 2:1.02, 3:1.05, 4:1.10, 5:1.15}[zemin]||1.00;

  const allFactors = fAge*fBmi*fRhr*fLthr*fVo2*fHrv*fSak*fMot*fClim*fGear*fCtl*fAcwr*fZemin;

  // в”Җв”Җ 5. TIRMANIЕһ (Naismith revised, zemin bazlДұ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const dn = dp * 0.9; // iniЕҹ вүҲ tДұrmanДұЕҹДұn %90'Дұ (yaklaЕҹДұk)
  const climbRate   = {1:0.8,2:1.0,3:1.3,4:1.6,5:2.0}[zemin]||1.0;
  const descentRate = {1:0.5,2:0.6,3:0.75,4:0.9,5:1.1}[zemin]||0.6;
  const climbMin = (dp/100)*climbRate + (dn/100)*descentRate;

  // в”Җв”Җ 6. KONTROL NOKTASI DURUЕһLARI в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const idlePerCp = Math.min(3,Math.max(1,1.5*(1+0.02*(zemin-1))*(1+0.05*Math.max(0,dp/1000))*(1+0.01*Math.max(0,(km-30)/30))));
  const idleMin   = cp*idlePerCp;

  // в”Җв”Җ 7. SONUГҮ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const total = baseDk*allFactors + climbMin + idleMin;

  return{
    totalMin:round1(total), baseDk:round1(baseDk),
    vVO2max:round1(vVO2max), vo2Pred:vo2Pred?round1(vo2Pred):null,
    PROGRESS:round2(PROGRESS), targetCtl,
    factors:{fAge,fBmi,fRhr,fLthr,fVo2,fHrv,fSak,fMot,fClim,fGear,fCtl,fAcwr,fZemin},
    climbMin:round1(climbMin), idleMin:round1(idleMin),
    pbSources:sources.filter(s=>s.pred).map(s=>round1(s.pred)),
  };
}
  // в”Җв”Җ PROGRESS (Excel B78): kalan hafta oranДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// MHR tahminleri вҖ” birden fazla formГјl
function predictMHR(yas, cinsiyet){
  if(!yas)return null;
  const y=parseFloat(yas);
  return{
    tanaka: Math.round(208-0.7*y),          // Tanaka 2001 вҖ” en doДҹru, unisex
    fox:    Math.round(220-y),               // Fox 1971 вҖ” klasik
    gender: cinsiyet==='KadДұn'
      ? Math.round(206-0.88*y)              // Gulati 2010 вҖ” kadДұn
      : Math.round(208-0.7*y),              // erkek = Tanaka
    Г¶nerilen: cinsiyet==='KadДұn'
      ? Math.round(206-0.88*y)
      : Math.round(208-0.7*y),
  };
}

// RHR tahmini вҖ” yaЕҹ + cinsiyet bazlДұ popГјlasyon ortalamasДұ
// Aktif sporcular iГ§in dГјЕҹГјk taraf alДұnДұr
function predictRHR(yas, cinsiyet){
  if(!yas)return null;
  const y=parseFloat(yas);
  // AHA popГјlasyon ortalamasДұ, aktif sporcu iГ§in %15 indirim
  let base;
  if(y<30)     base=cinsiyet==='KadДұn'?72:70;
  else if(y<40)base=cinsiyet==='KadДұn'?74:72;
  else if(y<50)base=cinsiyet==='KadДұn'?75:72;
  else if(y<60)base=cinsiyet==='KadДұn'?76:74;
  else         base=cinsiyet==='KadДұn'?78:75;
  // Sporcu dГјzeltmesi
  const sporcu=Math.round(base*0.82);
  return{ortalama:base,sporcu,Г¶nerilen:sporcu};
}

// BMI hesaplama ve kategori
function calcBMI(kilo,boy,cinsiyet){
  if(!kilo||!boy)return null;
  const k=parseFloat(kilo);
  const b=parseFloat(boy);
  const bmi=k/((b/100)**2);
  let kategori,renk;
  if(bmi<18.5){kategori='ZayДұf';renk='info';}
  else if(bmi<25){kategori='Normal';renk='success';}
  else if(bmi<30){kategori='Fazla Kilolu';renk='warn';}
  else{kategori='Obez';renk='danger';}
  // KoЕҹucu iГ§in ideal kilo вҖ” Stillman formГјlГј + cinsiyet
  // Erkek: 52kg + 1.9kg/2.54cm (152.4cm Гјzeri her cm iГ§in)
  // KadДұn: 49kg + 1.7kg/2.54cm
  let idealKilo=null;
  if(b>0){
    const base=cinsiyet==='KadДұn'?49:52;
    const perCm=cinsiyet==='KadДұn'?1.70:1.90;
    const stillman=base+((b-152.4)/2.54)*perCm;
    // KoЕҹucu iГ§in BMI 20-22 aralДұДҹДұ hedef (dГјzeltme)
    const runnerBMI=cinsiyet==='KadДұn'?20.5:21.0;
    const runnerKilo=runnerBMI*((b/100)**2);
    // Д°kisinin ortalamasДұ
    idealKilo=round1((stillman+runnerKilo)/2);
  }
  const fark=idealKilo?round1(k-idealKilo):null;
  return{bmi:round2(bmi),kategori,renk,idealKilo,fark};
}

// VOвӮӮmax tahmini вҖ” Tanaka/Fick + LTHR/MHR oranДұ
function predictVO2max(mhr,rhr,lthr){
  if(!mhr||!rhr)return null;
  // Fick denkleminden: VO2max вүҲ 15 Г— MHR/RHR (Fox 1973)
  const fick=round1(15*(parseFloat(mhr)/parseFloat(rhr)));
  // LTHR tabanlДұ (daha doДҹru, LTHR girilmiЕҹse)
  const lthrBazli=lthr?round1(15.3*(parseFloat(mhr)/parseFloat(rhr))*(parseFloat(lthr)/parseFloat(mhr)*1.1)):null;
  return{fick, lthrBazli, Г¶nerilen:lthrBazli||fick};
}

// undefined iГ§eren alanlarДұ Firebase iГ§in temizle
function stripUndefined(obj){
  if(Array.isArray(obj)) return obj.map(stripUndefined);
  if(obj&&typeof obj==='object'){
    const out={};
    for(const k of Object.keys(obj)){
      if(obj[k]!==undefined) out[k]=stripUndefined(obj[k]);
    }
    return out;
  }
  return obj;
}

// Firebase yazma вҖ” yoksa localStorage fallback
async function fbSet(key,val){
  if(!db&&!initFirebase()){
    lsSet(key,val);return;
  }
  const clean=stripUndefined(val);
  try{
    await db.ref(key).set(clean);
    lsSet(key,clean);
  }catch(e){
    console.warn('fbSet error',key,e);
    lsSet(key,clean);
    if(key.includes('plan_snapshots')){
      console.error('PLAN KAYIT HATASI:',e.message,e.code);
    }
  }
}

const LS_WARN_THRESHOLD=0.80;

function lsCheckUsage(){
  try{
    let used=0;
    for(let k in localStorage)if(localStorage.hasOwnProperty(k))used+=localStorage[k].length*2;
    const total=5*1024*1024; // 5MB tahmini limit
    const pct=used/total;
    if(pct>=LS_WARN_THRESHOLD&&!_lsWarnShown){
      _lsWarnShown=true;
      const usedKB=Math.round(used/1024);
      const pctStr=Math.round(pct*100);
      // Banner gГ¶ster
      const banner=document.createElement('div');
      banner.id='ls-warn-banner';
      banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#b45309;color:#fff;padding:10px 16px;font-size:13px;display:flex;align-items:center;justify-content:space-between;z-index:9999;gap:12px;';
      banner.innerHTML=`<span>вҡ  Depolama %${pctStr} dolu (${usedKB}KB / ~5MB). DДұЕҹa Aktar ile yedek al, ardДұndan eski antrenmanlarДұ temizle.</span><button onclick="document.getElementById('ls-warn-banner').remove();_lsWarnShown=false;" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;">Kapat</button>`;
      document.body.appendChild(banner);
    }
    return pct;
  }catch{return 0;}
}

// GГ¶rsel sДұkДұЕҹtДұrДұcДұ вҖ” canvas ile yeniden boyutlandДұrДұr ve JPEG olarak kaydeder
// maxW/maxH: max piksel, quality: 0вҖ“1 JPEG kalitesi
function compressImage(file,{maxW=800,maxH=800,quality=0.75,onDone,onError}){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW||h>maxH){
        const ratio=Math.min(maxW/w,maxH/h);
        w=Math.round(w*ratio);h=Math.round(h*ratio);
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',quality);
      const kb=Math.round(dataUrl.length*0.75/1024);
      console.log(`Gorsel sДұkДұЕҹtДұrДұldДұ: ${Math.round(file.size/1024)}KB вҶ’ ${kb}KB (${w}Г—${h}px)`);
      onDone(dataUrl);
    };
    img.onerror=()=>onError&&onError('Gorsel okunamadi');
    img.src=e.target.result;
  };
  reader.onerror=()=>onError&&onError('Dosya okunamadi');
  reader.readAsDataURL(file);
}

// En yakДұn katsayДұya sahip spor tГјrГјnГј dГ¶ndГјrГјr
function katsayiToSpor(k){
  if(!k||k===''||k===null)return'kosu';
  const val=parseFloat(k);
  if(isNaN(val))return'kosu';
  let best='kosu',bestDiff=Infinity;
  SPOR_TURLERI.forEach(s=>{
    const diff=Math.abs(s.k-val);
    if(diff<bestDiff){bestDiff=diff;best=s.v;}
  });
  return best;
}

// Hedef sГјre trendi grafiДҹi
function ChartTargetTrend({history,race,ath,results,workouts}){
  const ref=useRef();const inst=useRef();

  useEffect(()=>{
    if(!ref.current||!history?.length||!race||!ath)return;
    const km=parseFloat(race?.mesafe)||0;
    if(km<=0||!race?.tarih)return;

    const raceDate=new Date(race.tarih+'T12:00:00');
    const prepWeeks=parseInt(race?.prep_weeks)||12;
    const taperW=parseInt(race?.taper_w)||(km>42?3:km>21?2:1);
    const today=new Date();
    const todayStr=localDateStr(today);

    const last=history[history.length-1];
    if(!last?.ctl||last.ctl<1)return;
    const ctlRef=last.ctl;

    // в”Җв”Җ 4. Profil snapshot geГ§miЕҹi в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Bir tarihteki profil: o tarihe kadar en son snapshot
    const profileHistory=(ath.profileHistory||[]).sort((a,b)=>a.date.localeCompare(b.date));
    const profileAt=(dateStr)=>{
      if(!profileHistory.length)return ath;
      const snap=profileHistory.filter(s=>s.date<=dateStr).slice(-1)[0];
      if(!snap)return ath; // gГјncelleme Г¶ncesi = mevcut profil (muhafazakГўr)
      return {...ath,...snap};
    };

    // в”Җв”Җ Anchor: bugГјnkГј profil + CTL ile tahmin в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    let anchorMin=null;
    try{const t=calcTargetTime(race,ath,last.ctl,last.acwr||1.0,workouts);if(t?.totalMin>0)anchorMin=t.totalMin;}catch(e){}
    if(!anchorMin)return;

    // в”Җв”Җ 2+3. CTL+TSB birleЕҹik faktГ¶r в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // CTL: kondisyon. TSB: form = CTL-ATL. Taper'da CTL dГјЕҹer ama TSB yГјkselir.
    // Her ikisi anchor noktasДұna (bugГјn) gГ¶reli.
    const tsbRef=last.tsb||0;
    const ctlTsbFactor=(ctl,tsb)=>{
      const fCtl=Math.max(0.90,Math.min(1.15,1+0.18*(1-ctl/ctlRef)));
      // TSB etkisi: +10 ГјstГј form iГ§in hafif bonus, -20 altДұ yorgunluk iГ§in ceza
      const tsbDelta=(tsb??tsbRef)-tsbRef;
      const fTsb=Math.max(0.97,Math.min(1.03,1-tsbDelta/300));
      return fCtl*fTsb;
    };

    // в”Җв”Җ 1. Plan fazДұna gГ¶re CTL bГјyГјme tahmini в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // Taper haftalarДұnda CTL azalДұr ama TSB artar вҶ’ net etki pozitif (daha hДұzlДұ)
    const daysToRace=Math.ceil((raceDate-today)/864e5);
    const taperStartDay=daysToRace-taperW*7;
    const projCtlTsb=(dayOffset)=>{
      const recentH=history.slice(-28);
      const ctlGrowthPerDay=recentH.length>7?(last.ctl-(recentH[0]?.ctl||last.ctl))/recentH.length:0;
      const inTaper=dayOffset>taperStartDay;
      if(inTaper){
        // Taper: CTL gГјnde ~0.5% azalДұr, TSB gГјnde +0.8 artar (haftalДұk ~5.6)
        const taperDays=dayOffset-taperStartDay;
        const projCtl=Math.max(ctlRef*0.85,ctlRef-ctlRef*0.005*taperDays);
        const projTsb=Math.min(20,tsbRef+0.8*taperDays);
        return{ctl:projCtl,tsb:projTsb};
      }
      // Normal hafta: CTL bГјyГјme trendi devam eder, TSB yaklaЕҹДұk sabit
      const projCtl=Math.max(1,Math.min(ctlRef*1.5,ctlRef+ctlGrowthPerDay*dayOffset));
      return{ctl:projCtl,tsb:tsbRef};
    };

    // в”Җв”Җ GeГ§miЕҹ noktalar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const pts=[];
    for(let i=0;i<history.length;i+=7){
      const d=history[i];
      if(!d?.ctl||d.ctl<1)continue;
      // Profil o tarihte ne durumdaydДұ?
      const prof=profileAt(d.date);
      let dayAnchor=anchorMin;
      if(prof!==ath){
        // O tarihteki profille calcTargetTime Г§alДұЕҹtДұr
        try{const t=calcTargetTime(race,prof,last.ctl,last.acwr||1.0,workouts);if(t?.totalMin>0)dayAnchor=t.totalMin;}catch(e){}
      }
      const f=ctlTsbFactor(d.ctl,d.tsb??tsbRef);
      pts.push({x:fmtShort(d.date),y:round1(dayAnchor*f)});
    }
    // BugГјnГјn noktasДұ = anchor deДҹeri (karttaki ile eЕҹleЕҹir)
    if(!pts.find(p=>p.x===fmtShort(last.date)))
      pts.push({x:fmtShort(last.date),y:round1(anchorMin)});
    if(pts.length<2)return;

    // в”Җв”Җ Projeksiyon noktalarДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const projPts=[];
    if(daysToRace>0&&daysToRace<400){
      projPts.push({x:fmtShort(todayStr),y:round1(anchorMin)});
      const steps=Math.min(Math.ceil(daysToRace/7),24);
      for(let i=1;i<=steps;i++){
        const d=new Date(today);d.setDate(today.getDate()+i*7);
        if(d>raceDate)break;
        const{ctl,tsb}=projCtlTsb(i*7);
        projPts.push({x:fmtShort(localDateStr(d)),y:round1(anchorMin*ctlTsbFactor(ctl,tsb))});
      }
      // YarДұЕҹ gГјnГј
      const{ctl:rCtl,tsb:rTsb}=projCtlTsb(daysToRace);
      projPts.push({x:fmtShort(race.tarih),y:round1(anchorMin*ctlTsbFactor(rCtl,rTsb)),race:true});
    }

    const allLabels=[...pts.map(p=>p.x),...projPts.slice(1).map(p=>p.x)];
    const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    const gc=isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)';
    const tc=isDark?'#777':'#888';
    if(inst.current){try{inst.current.destroy();}catch(e){}}

    const resPts=(results||[]).map(r=>({x:fmtShort(r.date),y:round1(r.durSec/60)}));
    try{
      inst.current=new Chart(ref.current,{
        type:'line',
        data:{
          labels:allLabels,
          datasets:[
            {label:'Antrenman etkisi',
              data:allLabels.map(l=>{const p=pts.find(p=>p.x===l);return p?p.y:null;}),
              borderColor:'#7c3aed',borderWidth:2.5,
              pointRadius:allLabels.map(l=>pts.find(p=>p.x===l)?3:0),
              pointBackgroundColor:'#7c3aed',
              tension:.4,fill:false,spanGaps:false},

// в”Җв”Җ HaftalДұk Liderlik Tablosu в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function getWeekBounds(offset=0){
  const now=new Date();
  const day=now.getDay();
  const diffToMon=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diffToMon+offset*7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return{start:mon,end:sun};
}
// Tarihi YYYY-MM-DD formatДұnda dГ¶ndГјr (yerel saat)
function localDateStr(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// HaftanДұn Pazartesi tarihini anahtar olarak ver
function getWeekKey(offset=0){ return localDateStr(getWeekBounds(offset).start); }
// TГјrkiye 22:00 = UTC 19:00 вҖ” bugГјnkГј dondurma zamanДұ
function turkey22Today(){ const s=localDateStr(new Date()); return new Date(s+'T19:00:00Z'); } // yerel tarihin 22:00 TR'si (UTC+3 вҶ’ T19:00Z)

function weekLabel(offset){
  if(offset===0)return'Bu Hafta';
  if(offset===-1)return'GeГ§en Hafta';
  const {start,end}=getWeekBounds(offset);
  return start.toLocaleDateString('tr-TR',{day:'2-digit',month:'short'})+' вҖ“ '+end.toLocaleDateString('tr-TR',{day:'2-digit',month:'short'});
}

function calcWeeklyStats(workouts,athletes,weekOffset=0){
  const {start,end}=getWeekBounds(weekOffset);
  return athletes.map(a=>{
    const wks=workouts.filter(w=>{
      if(w.athleteId!==a.id)return false;
      const d=new Date(w.date+'T12:00:00');
      return d>=start&&d<=end;
    });
    const mesafe=round1(wks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
    const irtifa=Math.round(wks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0));
    const sureSn=wks.reduce((s,w)=>s+toSec(w.sure_sa,w.sure_dk,w.sure_sn),0);
    const count=wks.length;
    // Skor = ОЈ (yukObj Г— spor_katsayisi)
    // yukObj = hrTSS veya TRIMP (sГјre+nabДұz bazlДұ gerГ§ek antrenman yГјkГј)
    // Spor katsayДұsДұ ile dГјzeltilerek farklДұ sporlar adil karЕҹДұlaЕҹtДұrДұlДұr
    const athObj=athletes.find(a2=>a2.id===a.id);
    const sporSkoru=round1(wks.reduce((s,w)=>{
      const m=calcMetrics(w,athObj);
      const yuk=m.yukObj||m.yukSubj||0;
      const k=SPOR_MAP[w.spor||'kosu']?.k||1.0;
      return s+yuk*k;
    },0));
    // Spor daДҹДұlДұmДұ
    const sporDagilim={};
    wks.forEach(w=>{
      const s=w.spor||'kosu';
      sporDagilim[s]=(sporDagilim[s]||0)+1;
    });
    return{ath:a,mesafe,irtifa,sureSn,count,sporSkoru,sporDagilim,wks};
  }).sort((a,b)=>b.sporSkoru-a.sporSkoru);
}

// Antrenman tГјrГјne gГ¶re tahmini bГ¶lge daДҹДұlДұmДұ (%)
const TUR_ZONE_DIST={
  kolay:     {low:92,high:8, ana:0},
  aerobik:   {low:72,high:26,ana:2},
  uzun:      {low:80,high:18,ana:2},
  tempo:     {low:18,high:68,ana:14},
  esik:      {low:12,high:62,ana:26},
  interval:  {low:22,high:28,ana:50},
  yokus_kisa:{low:18,high:30,ana:52},
  yokus_uzun:{low:20,high:48,ana:32},
  tirmanis:  {low:28,high:48,ana:24},
  teknik:    {low:50,high:40,ana:10},
  acici:     {low:40,high:35,ana:25},
  capraz:    {low:70,high:28,ana:2},
  yaris:     {low:10,high:35,ana:55},
};

// NabДұz bazlДұ tahmin (tГјr yoksa)
function hrBasedZoneDist(avgHR,lthr,mhr,rhr){
  if(!avgHR||!lthr)return null;
  // %LTHR
  const pct=avgHR/lthr;
  if(pct<0.78)       return{low:95,high:5, ana:0};
  if(pct<0.87)       return{low:80,high:18,ana:2};
  if(pct<0.95)       return{low:35,high:55,ana:10};
  if(pct<1.00)       return{low:12,high:62,ana:26};
  if(pct<1.05)       return{low:10,high:30,ana:60};
  return              {low:8, high:22,ana:70};
}

// Tek antrenman iГ§in bГ¶lge daДҹДұlДұmДұ вҖ” dakika cinsinden
function calcWorkoutZoneDist(w,athlete){
  const durMin=(()=>{
    const s=parseInt(w.sure_sa||0)*3600+parseInt(w.sure_dk||0)*60+parseInt(w.sure_sn||0);
    return s/60;
  })();
  if(durMin<5)return null;
  const spor=w.spor||'kosu';
  if(spor!=='kosu'&&spor!=='yuruyus')return null;

  const tur=w.tur||'';
  const avgHR=parseFloat(w.ort_nabiz)||0;
  const lthr=parseFloat(athlete?.lthr)||0;
  const mhr=parseFloat(athlete?.mhr)||0;
  const rhr=parseFloat(athlete?.rhr)||0;

  // Kaynak seГ§imi: tГјr > nabДұz > varsayДұlan
  let dist=TUR_ZONE_DIST[tur]||null;
  if(!dist&&avgHR>0&&lthr>0) dist=hrBasedZoneDist(avgHR,lthr,mhr,rhr);
  if(!dist) dist={low:80,high:18,ana:2}; // varsayДұlan

  return{
    lowMin: round1(durMin*dist.low/100),
    highMin:round1(durMin*dist.high/100),
    anaMin: round1(durMin*dist.ana/100),
    totalMin:round1(durMin),
    lowPct:dist.low, highPct:dist.high, anaPct:dist.ana,
  };
}

// N haftalДұk bГ¶lge daДҹДұlДұmДұ toplamДұ
function calcPeriodZoneDist(workouts,athlete,weeks=4){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-weeks*7);
  const wks=workouts.filter(w=>new Date(w.date+'T12:00:00')>=cutoff);
  let low=0,high=0,ana=0,total=0;
  wks.forEach(w=>{
    const d=calcWorkoutZoneDist(w,athlete);
    if(!d)return;
    low+=d.lowMin;high+=d.highMin;ana+=d.anaMin;total+=d.totalMin;
  });
  if(total<1)return null;
  return{
    lowMin:round1(low),highMin:round1(high),anaMin:round1(ana),totalMin:round1(total),
    lowPct:Math.round(low/total*100),
    highPct:Math.round(high/total*100),
    anaPct:Math.round(ana/total*100),
    weeks,
  };
}

// DaДҹДұlДұm durumu вҖ” Seiler 80/20 modeli referans
function zoneDist_status(dist){
  if(!dist)return null;
  const {lowPct,highPct,anaPct}=dist;
  const issues=[];
  const flags=[];

  // DГјЕҹГјk aerobik fazla mДұ az?
  if(lowPct<65) issues.push({type:'low_eksik',msg:'DГјЕҹГјk aerobik yetersiz ('+lowPct+'%). Kolay koЕҹu hacmi artДұrДұlmalДұ.'});
  if(lowPct>90) flags.push({type:'low_fazla',msg:'ГҮok dГјЕҹГјk yoДҹunluk. Kaliteli antrenman eksik.'});

  // YГјksek aerobik
  if(highPct>25) issues.push({type:'high_fazla',msg:'YГјksek aerobik fazla ('+highPct+'%). Tempo/eЕҹik yoДҹunluДҹu azaltДұlabilir.'});

  // Anaerobik
  if(anaPct>15) issues.push({type:'ana_fazla',msg:'Anaerobik yГјk yГјksek ('+anaPct+'%). Dinlenme veya kolay antrenman gerekli.'});
  if(anaPct<3&&lowPct<85) flags.push({type:'ana_eksik',msg:'Anaerobik stimulus dГјЕҹГјk. Kaliteli antrenman eklenebilir.'});

  // Genel durum
  const isOk=issues.length===0;
  const score= isOk?100:Math.max(0,100-issues.length*20-flags.length*5);
  return{issues,flags,isOk,score,
    label:isOk?'Dengeli':issues.length===1?'Д°yileЕҹtirilebilir':'Dengesiz',
    cls:isOk?'badge-good':issues.length===1?'badge-warn':'badge-danger'};
}

// CTL bandДұna gГ¶re hacim/yoДҹunluk seviyesi: 1(dГјЕҹГјk)вҶ’5(elit)
function ctlBand(ctl){
  if(ctl<25)return 1;
  if(ctl<40)return 2;
  if(ctl<60)return 3;
  if(ctl<80)return 4;
  return 5;
}

function blockCount(band,phase){
  if(phase==='Taper')return 1;

// Д°ki pace arasДұndaki ortalama
const avgPace=(lo,hi)=>{const ls=paceToSec(lo),hs=paceToSec(hi);return(ls&&hs)?secToPace((ls+hs)/2):null;};

// Pace zone string: "5:30вҖ“6:15 (5:52) /km"

const TIP_NAMES={kolay:'Kolay KoЕҹu',aerobik:'Aerobik KoЕҹu',uzun:'Uzun KoЕҹu',tempo:'Tempo',esik:'EЕҹik',interval:'Д°nterval',piramit:'Д°nterval Piramit',kesintisiz_piramit:'Kesintisiz Piramit',yokus_kisa:'KДұsa YokuЕҹ TekrarДұ',yokus_uzun:'Uzun YokuЕҹ',tirmanis:'TДұrmanДұЕҹ KoЕҹusu',teknik:'Teknik Д°niЕҹ',acici:'AГ§ДұcДұ',capraz:'ГҮapraz Antrenman',dinlenme:'Dinlenme'};

function detectZone(text){
  const t=(text||'').toLowerCase();
  // Г–nce aГ§Дұk zone etiketi ara (yГјksekten dГјЕҹГјДҹe)
  const tags=[['z5c',6],['z5b',5],['z5a',4],['z5',4],['z4',3],['z3',2],['z2',1],['z1',0]];
  for(const [k,i] of tags) if(t.includes(k)) return i;
  // Anahtar kelime fallback
  if(/[iДұ]sДұnma|soДҹuma|toparlanma|dinlenme|yГјrГјyГјЕҹ|kolay/.test(t)) return 0;
  if(/aerobik|uzun koЕҹu/.test(t)) return 1;
  if(/tempo/.test(t)) return 2;
  if(/eЕҹik|cruise|yarДұЕҹ temposu/.test(t)) return 3;
  if(/interval|piramit|vo2/.test(t)) return 4;
  if(/strides|aГ§ДұcДұ|sprint|hill/.test(t)) return 5;
  return 1;
}

function parseSureSn(text){
  const t=text||'';
  let m;
  m=t.match(/(\d+(?:[.,]\d+)?)\s*dk/i);  if(m) return Math.round(parseFloat(m[1].replace(',','.'))*60);
  m=t.match(/(\d+(?:[.,]\d+)?)\s*sn/i);  if(m) return Math.round(parseFloat(m[1].replace(',','.')));
  m=t.match(/(\d+):(\d{2})/);             if(m) return parseInt(m[1])*60+parseInt(m[2]);
  return 0;
}

function getPaceSec(zones, zIdx){
  const pz=zones?.paceZones?.[zIdx];
  if(pz?.lo_ms&&pz?.hi_ms) return Math.round(1000/((pz.lo_ms+pz.hi_ms)/2));
  // Pace yoksa zone'a gГ¶re kaba tahmin (600=10dk/km base, Z2вүҲ+30sn, Z3вүҲ-30sn vb.)
  const base=600; // Z1 fallback
  const offsets=[60,30,0,-30,-60,-90,-120];
  return base+(offsets[zIdx]||0);
}

function secToHMS(sec){
  if(!sec||sec<0) sec=0;
  return{h:Math.floor(sec/3600), m:Math.floor((sec%3600)/60), s:Math.round(sec%60)};
}

function adimToRows(adim, zones){
  // _rows varsa doДҹrudan kullan (yapДұsal veri)
  if(adim._rows&&adim._rows.length){
    return adim._rows.map(r=>{
      const pSec=r.pSec||getPaceFromZone(r.zIdx,zones);
      const cr=r.rpe||r.isSprint?{...calcRowM(r.sure_sn,pSec),pm:null,ps:null}:calcRowM(r.sure_sn,pSec);
      return{type:r.type||'run',label:r.label,
        color:ZONE_COLORS_INLINE[r.zIdx]||'#34d399',
        textColor:ZONE_TEXT_COLOR[r.zIdx]||'#064e3b',
        ...cr,rpe:r.rpe||null};
    });
  }
  // Eski snapshot'lardan gelen TДұrmanДұЕҹ KoЕҹusu adДұmlarДұnДұ dinamik iЕҹaretle
  if(!adim._tirmanisAna&&(adim.baslik||'').includes('TДұrmanДұЕҹ KoЕҹusu')){
    adim={...adim,_tirmanisAna:true};
  }
  // Fallback: metin parse (eski Еҹablonlar iГ§in)
  return adimToRowsFallback(adim,zones);
}

function getPaceFromZone(zi,zones){
  const pz=zones?.paceZones?.[zi];
  if(pz?.lo_ms&&pz?.hi_ms) return Math.round(1000/((pz.lo_ms+pz.hi_ms)/2));
  return [600,540,480,420,375,345,315][zi]||480;
}
function calcRowM(sec,rawPaceSec){
  if(!sec||!rawPaceSec) return{mesafe:0,pm:0,ps:0,h:0,m:0,s:0};
  // 1. Ham mesafe
  const rawM=sec/rawPaceSec*1000;
  // 2. Mesafeyi yuvarla
  const mesafe=rawM<200?Math.round(rawM/5)*5:Math.round(rawM/100)*100;
  if(!mesafe) return{mesafe:0,pm:0,ps:0,h:0,m:0,s:0};
  // 3. Pace'i 5sn katДұna yuvarla
  const rawActualPace=sec/(mesafe/1000);
  const pm0=Math.floor(rawActualPace/60);
  const ps0=Math.round((rawActualPace%60)/5)*5;
  const pmF=ps0===60?pm0+1:pm0;
  const psF=ps0===60?0:ps0;
  // 4. SГјreyi mesafe Г— yuvarlanan pace'den hesapla (tutarlДұlДұk)
  const finalSec=Math.round(mesafe/1000*(pmF*60+psF));
  const h=Math.floor(finalSec/3600);
  const m=Math.floor((finalSec%3600)/60);
  const s=Math.round(finalSec%60);
  return{mesafe,pm:pmF,ps:psF,h,m,s};
}
function fmtHMS2(sec){sec=Math.max(0,sec||0);return{h:Math.floor(sec/3600),m:Math.floor((sec%3600)/60),s:Math.round(sec%60)};}

function adimToRowsFallback(adim, zones){
  const rows=[];
  const baslik=adim.baslik||'';
  const detay=adim.detay||'';
  const full=baslik+' '+detay;
  const zIdx=detectZone(full);
  const color=ZONE_COLORS_INLINE[zIdx];
  const textColor=ZONE_TEXT_COLOR[zIdx];

  const getPace=(zi)=>getPaceFromZone(zi,zones);
  const roundPaceSec2=(pSec)=>{const m=Math.floor(pSec/60);const s=Math.round((pSec%60)/5)*5;return s===60?{pm:m+1,ps:0}:{pm:m,ps:s};};
  // SoДҹuma = (Z1+Z2)/2  вҶ’ Г¶rn. Z1=6:58, Z2=5:53 вҶ’ 6:25
  // IsДұnma  = (soДҹuma+Z2)/2 = (Z1+3Г—Z2)/4 вҶ’ Г¶rn. вҶ’ 6:09
  const getPaceCooldown2=()=>Math.round((getPace(0)+getPace(1))/2);
  const getPaceWarmup2=()=>Math.round((getPace(0)+getPace(1)*3)/4);
  const fmtHMS=(sec)=>fmtHMS2(sec);
  const calcRow=(sec,pSec)=>calcRowM(sec,pSec);
  const paceSec=getPace(zIdx);
  const isIsinma=/[iДұ]sДұnma/i.test(baslik);
  const isSoguma=/soДҹuma/i.test(baslik);
  let blokPaceSec=paceSec;
  if(isIsinma) blokPaceSec=getPaceWarmup2();
  else if(isSoguma) blokPaceSec=getPaceCooldown2();

  const ZONE_RPE2=['1вҖ“2','3вҖ“4','5вҖ“6','7вҖ“8','8вҖ“9','9вҖ“10','10'];
  const isSprintType=/strides|depar|sprint|aГ§ДұcДұ|hill/i.test(full);

  // 1. Kesintisiz Piramit: "X dk ZY вҶ’ ..."
  if(detay.includes('вҶ’')&&/\d+\s*dk\s+Z\d/i.test(detay)){
    const segs=detay.split('вҶ’').map(s=>s.trim()).filter(s=>/^\d+\s*dk\s+Z/i.test(s));
    if(segs.length>=3){
      rows.push({type:'header',label:`вҶ» ${segs.length} Segment (Kesintisiz)`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0});
      segs.forEach((seg,i)=>{
        const dkM=seg.match(/(\d+)\s*dk/i);
        const zM=seg.match(/Z(\d+[abc]?)/i);
        if(!dkM) return;
        const sn=parseInt(dkM[1])*60;
        const zi=zM?({'1':0,'2':1,'3':2,'4':3,'5a':4,'5b':5,'5c':6}[zM[1].toLowerCase()]||1):1;
        const cr=calcRow(sn,getPace(zi));
        rows.push({type:'run',label:`Segment ${i+1} В· ${dkM[1]} dk В· Z${zM?zM[1]:'?'}`,
          color:ZONE_COLORS_INLINE[zi],textColor:ZONE_TEXT_COLOR[zi],...cr,rpe:null});
      });
      return rows;
    }
  }

  // 2. Д°nterval Piramit: "2вҖ“3вҖ“4вҖ“5вҖ“4вҖ“3вҖ“2 dk"
  const seqMatch=detay.match(/([\d]+(?:[\u2013\-][\d]+){2,})\s*dk/i);
  if(seqMatch){
    const seqParts=seqMatch[1].split(/[\u2013\-]/).map(Number).filter(n=>n>0&&n<30);
    if(seqParts.length>=3){
      const afterSeq=detay.replace(seqMatch[0],'');
      let dinSure=90;
      const dkM=afterSeq.match(/(\d+(?:[.,]\d+)?)\s*dk/i);
      const snM=afterSeq.match(/(\d+)\s*sn/i);
      if(dkM) dinSure=Math.round(parseFloat(dkM[1].replace(',','.'))*60);
      else if(snM) dinSure=parseInt(snM[1]);
      const blokZIdx=4;
      const blokPaceSecP=getPace(blokZIdx);
      const dinPaceSec=getPace(0);
      rows.push({type:'header',label:`вҶ» ${seqParts.length} Blok В· ${seqMatch[1]} dk`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0,repeatCount:seqParts.length});
      seqParts.forEach((dk,i)=>{
        const sn=dk*60;
        rows.push({type:'run',label:`Blok ${i+1} В· ${dk} dk`,color:ZONE_COLORS_INLINE[blokZIdx],textColor:ZONE_TEXT_COLOR[blokZIdx],...calcRow(sn,blokPaceSecP)});
        if(i<seqParts.length-1){const ds=fmtHMS(dinSure);rows.push({type:'rest',label:'Blok ArasДұ Dinlenme',color:ZONE_COLORS_INLINE[0],textColor:ZONE_TEXT_COLOR[0],...calcRow(dinSure,dinPaceSec)});}
      });
      return rows;
    }
  }

  // 3. BileЕҹik ДұsДұnma: "X dk ... NГ—Y(sn|dk|m) strides"
  if(isIsinma){
    const strideM=detay.match(/(\d+)\s*[Г—x]\s*(\d+(?:[.,]\d+)?)\s*(sn|dk|m\b)/i);
    if(strideM){
      const strideStart=detay.indexOf(strideM[0]);
      const kosuPart=detay.slice(0,strideStart).trim().replace(/[+\-вҖ“вҖ”В·,]+$/,'').trim();
      const kosuSn=(() => {
        const m=kosuPart.match(/(\d+(?:[.,]\d+)?)\s*dk/i);
        if(m) return Math.round(parseFloat(m[1].replace(',','.'))*60);
        return 0;
      })();
      if(kosuSn>0){
        rows.push({type:'single',label:'IsДұnma KoЕҹusu',color:ZONE_COLORS_INLINE[0],textColor:ZONE_TEXT_COLOR[0],...calcRow(kosuSn,blokPaceSec),rpe:null});
      }
      const n=parseInt(strideM[1]);
      const strideUnit=strideM[3].toLowerCase();
      const strideVal=parseFloat(strideM[2].replace(',','.'));
      const strideZIdx=5;
      const sPaceSec=getPace(strideZIdx);
      const birSn=strideUnit==='m'?Math.round(strideVal/1000*sPaceSec):Math.round(strideVal*(strideUnit==='dk'?60:1));
      const stridePart=detay.slice(strideStart);
      const dinM=stridePart.match(/(?:arasДұ)[^\d]*(\d+)\s*(sn|dk)/i);
      const dinSn=dinM?Math.round(parseInt(dinM[1])*(dinM[2].toLowerCase()==='dk'?60:1)):45;
      const {h:sh,m:sm,s:ss}=fmtHMS(birSn);
      const ds=fmtHMS(dinSn);
      rows.push({type:'header',label:`вҶ» ${n} Strides`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0,repeatCount:n});
      rows.push({type:'run',label:'Strides',color:ZONE_COLORS_INLINE[strideZIdx],textColor:ZONE_TEXT_COLOR[strideZIdx],h:sh,m:sm,s:ss,...calcRow(birSn,sPaceSec),pm:null,ps:null,rpe:'8вҖ“9',repeatCount:n});
      rows.push({type:'rest',label:'Strides ArasДұ Dinlenme',color:ZONE_COLORS_INLINE[0],textColor:ZONE_TEXT_COLOR[0],...calcRow(dinSn,getPace(0)),rpe:null,repeatCount:n});
      return rows;
    }
  }

  // 4. Tekrar: "4Г—8 dk", "6Г—30sn", "6Г—8вҖ“10sn"
  const rangeM=detay.match(/(\d+)\s*[Г—x]\s*(\d+)[\u2013\-](\d+)\s*(sn|dk)/i);
  const tekrarM=detay.match(/(\d+)\s*[Г—x]\s*(\d+(?:[.,]\d+)?)\s*(dk|sn|m\b)/i);
  const match=rangeM||tekrarM;
  if(match){
    const n=parseInt(match[1]);
    let birSn;
    if(rangeM){const lo=parseInt(rangeM[2]),hi=parseInt(rangeM[3]);birSn=Math.round(((lo+hi)/2)*(rangeM[4].toLowerCase()==='dk'?60:1));}
    else{
      const unit=match[3].toLowerCase();
      const val=parseFloat(match[2].replace(',','.'));
      if(unit==='m') birSn=Math.round(val/1000*getPaceFromZone(zIdx,zones));
      else birSn=Math.round(val*(unit==='dk'?60:1));
    }
    let dinSn=120;
    const dinPats=[/(\d+(?:[.,]\d+)?)\s*(dk|sn)\s+(?:yГјrГјyГјЕҹ|hafif koЕҹu|aktif|tam duruЕҹ)/i,/(?:arasДұ|dinlenme)[^\d]*(\d+(?:[.,]\d+)?)\s*(dk|sn)/i];
    for(const p of dinPats){const dm=detay.match(p);if(dm){dinSn=Math.round(parseFloat(dm[1].replace(',','.'))*( dm[2].toLowerCase()==='dk'?60:1));break;}}
    if(detay.toLowerCase().includes('yГјrГјyГјЕҹ ini')) dinSn=120;
    const rpe=isSprintType?ZONE_RPE2[Math.min(zIdx,6)]||'':null;
    const ctr=rpe?{...calcRow(birSn,paceSec),pm:null,ps:null}:calcRow(birSn,paceSec);
    rows.push({type:'header',label:`вҶ» ${n} Tekrar`,color:'#1e293b',textColor:'#f8fafc',h:0,m:0,s:0,mesafe:0,pm:0,ps:0,repeatCount:n});
    rows.push({type:'run',label:baslik.split('В·')[0].trim(),color,textColor,...ctr,rpe,repeatCount:n});
    rows.push({type:'rest',label:'Dinlenme / Toparlanma',color:ZONE_COLORS_INLINE[0],textColor:ZONE_TEXT_COLOR[0],...calcRow(dinSn,getPaceFromZone(0,zones)),repeatCount:n});
    return rows;
  }

  // 5. Tek blok
  const rpe=isSprintType?ZONE_RPE2[Math.min(zIdx,6)]||'':null;
  let totalSn=adim.sure_dk>0?adim.sure_dk*60:0;
  if(!totalSn){const m=detay.match(/(\d+(?:[.,]\d+)?)\s*dk/i);if(m)totalSn=Math.round(parseFloat(m[1].replace(',','.'))*60);}
  if(!totalSn){const m=detay.match(/(\d+)\s*sn/i);if(m)totalSn=parseInt(m[1]);}
  if(!totalSn) totalSn=60;
  // TДұrmanДұЕҹ ana bloДҹu: tek kaynak вҖ” detay metnindeki ortalama pace'i oku
  let effectivePaceSec=blokPaceSec;
  if(adim._tirmanisAna){
    // Г–nce _tirAvgPaceSec (yeni snapshot), sonra detay metnindeki "(7:30)" formatДұ (eski snapshot)
    if(adim._tirAvgPaceSec){
      effectivePaceSec=adim._tirAvgPaceSec;
    } else {
      // Detay metninden ortalama tДұrmanДұЕҹ pace'ini oku: "beklenen pace: XвҖ“Y (Z)/km"
      const avgPaceM=detay.match(/beklenen pace:[^(]+\((\d+:\d+)\)/i);
      if(avgPaceM) effectivePaceSec=paceToSec(avgPaceM[1]);
    }
  }
  const csb=rpe?{...calcRow(totalSn,effectivePaceSec),pm:null,ps:null}:calcRow(totalSn,effectivePaceSec);
  const tirLabel=adim._tirmanisAna?baslik+' (tДұrmanДұЕҹta)':baslik;
  rows.push({type:'single',label:tirLabel,color,textColor,...csb,rpe});
  return rows;
}
function ReceteTablosu({yapilar, zones, isYuruyus, tip}){
  // _caprazNot olanlar tablo dДұЕҹДұnda yazДұlДұ gГ¶sterilir
  const caprazNotlar=(yapilar||[]).filter(y=>y._caprazNot);
  // ГҮapraz antrenman adДұmlarДұnДұ tamamen filtrele
  const CAPRAZ_KEYWORDS=['bisiklet','yГјzme','kГјrek','kuvvet','Г§apraz antrenman'];
  yapilar=(yapilar||[]).filter(y=>{
    if(y._caprazNot) return false;
    const b=(y.baslik||'').toLowerCase();
    const d=(y.detay||'').toLowerCase();
    if(b.startsWith('рҹҡҙ')||b.startsWith('вһ•')) return false;
    if(CAPRAZ_KEYWORDS.some(k=>b.includes(k)||d.includes(k))) return false;
    return true;
  });

  // рҹ’Ў Г¶neri bloklarДұnДұ ayДұr вҖ” tabloya dahil edilmez
  const oneriYapilar=(yapilar||[]).filter(y=>(y.baslik||'').startsWith('рҹ’Ў'));
  const normalYapilar=(yapilar||[]).filter(y=>!(y.baslik||'').startsWith('рҹ’Ў'));

  // SatДұrlarДұ Гјret вҖ” header satДұrlarДұ toplama dahil edilmez

function zoneInfo(zones, zIdx, label){
  const zLabel=label||(['Z1','Z2','Z3','Z4','Z5a','Z5b','Z5c'][zIdx]||'Z'+zIdx);
  const hr=zones?.hrZones?.[zIdx];
  const hrStr=hr?.lo_bpm&&hr?.hi_bpm?`${hr.lo_bpm}вҖ“${hr.hi_bpm} bpm`:'';
  const pace=zones?.paceZones?.[zIdx];
  const paceStr=pace?.lo_pace&&pace?.hi_pace?pz(zones,zIdx):'';
  const parts=[zLabel,hrStr,paceStr].filter(Boolean);
  return parts.join(' В· ');
}

// Z1 spesifik (alt sДұnДұr yok)
function zoneInfoZ1(zones){
  const hr=zones?.hrZones?.[0];
  const hrStr=hr?.hi_bpm?`< ${hr.hi_bpm} bpm`:'';
  const pace=zones?.paceZones?.[0];
  const paceStr=pace?.hi_pace?`> ${pace.hi_pace} /km`:'';
  const parts=['Z1',hrStr,paceStr].filter(Boolean);
  return parts.join(' В· ');
}

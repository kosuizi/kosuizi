function calcWeeklyTargets(athlete, races, workouts, optimizeMode=false){
  if(!athlete)return[];
  const {primary}=selectRaces(athlete,races);
  if(!primary||!primary.prep_weeks)return[];

  // ── Optimize mod: tüm yarışları entegre et ─────────────────────────────
  // Önce orijinal planı hesapla
  const orijinalPlan=calcWeeklyTargetsCore(athlete,races,workouts,primary);

  if(!optimizeMode)return orijinalPlan;

  // Diğer yaklaşan yarışları bul
  const today=new Date();
  const athIds=(athlete.yarıslar||[]).map(x=>typeof x==='string'?x:x.id);
  const digerYarislar=(races||[]).filter(r=>
    athIds.includes(r.id)&&
    r.id!==primary.id&&
    new Date(r.tarih+'T12:00:00')>today&&
    r.prep_weeks
  ).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));

  if(!digerYarislar.length)return orijinalPlan; // Tek yarış — optimize gerekmez

  // Her yarış için plan hesapla
  const digerPlanlar=digerYarislar.map(r=>({
    race:r,
    plan:calcWeeklyTargetsCore(athlete,races.map(x=>({...x,__force:x.id===r.id})),workouts,r)
  }));

  // Orijinal planın her haftasını diğer yarışlarla entegre et
  return orijinalPlan.map(wk=>{
    // Diğer yarışların bu haftaya ağırlıklı katkısı
    // Ağırlık = yarışa kalan süreye ters orantılı (yakın yarış daha ağır)
    let kmSum=wk.targetKm, dpSum=wk.targetDp, weightSum=1;
    const daysToMain=Math.ceil((new Date(primary.tarih+'T12:00:00')-wk.weekStart)/864e5);
    const mainWeight=Math.max(0.3,1-(daysToMain>365?1:daysToMain/365)*0.5);

    digerPlanlar.forEach(({race:r,plan:dp2})=>{
      // Bu hafta diğer yarışın planında karşılık geldiği haftayı bul
      const match=dp2.find(w2=>{
        const diff=Math.abs(w2.weekStart-wk.weekStart);
        return diff<7*864e5;
      });
      if(!match||match.targetKm<=0)return;
      // Uzak yarışlar daha az ağırlık
      const daysToOther=Math.ceil((new Date(r.tarih+'T12:00:00')-wk.weekStart)/864e5);
      if(daysToOther<0)return; // Geçmiş yarış
      const otherWeight=Math.max(0.1,0.5*(1-(daysToOther>365?1:daysToOther/365)*0.7));
      kmSum+=match.targetKm*otherWeight;
      dpSum+=match.targetDp*otherWeight;
      weightSum+=otherWeight;
    });

    const optKm=round1(kmSum/weightSum);
    const optDp=Math.round(dpSum/weightSum);

    // En kısıtlayıcı fazı seç (Taper > Zirve > Gelişme > Temel)
    const fazOnc={Taper:4,Zirve:3,Gelişme:2,Temel:1,'Yarış Sonrası':0};
    let enKısıtlayıcıFaz=wk.phase;
    digerPlanlar.forEach(({plan:dp2})=>{
      const match=dp2.find(w2=>Math.abs(w2.weekStart-wk.weekStart)<7*864e5);
      if(match&&(fazOnc[match.phase]||0)>(fazOnc[enKısıtlayıcıFaz]||0))
        enKısıtlayıcıFaz=match.phase;
    });

    // Faz Taper ise km'yi orijinal taper hedefine sınırla
    const finalKm=enKısıtlayıcıFaz==='Taper'?Math.min(optKm,wk.targetKm):optKm;
    const finalDp=enKısıtlayıcıFaz==='Taper'?Math.min(optDp,wk.targetDp):optDp;

    const changed=Math.abs(finalKm-wk.targetKm)>0.5||Math.abs(finalDp-wk.targetDp)>50;
    return{
      ...wk,
      targetKm:finalKm, targetDp:finalDp,
      phase:enKısıtlayıcıFaz,
      _optimize:changed,
      _origKm:wk.targetKm, _origDp:wk.targetDp
    };
  });
}

function calcWeeklyTargetsCore(athlete, races, workouts, primary){
  if(!athlete||!primary)return[];
  const today=new Date();
  const raceDate=new Date(primary.tarih+'T12:00:00');
  const prepWeeks=parseInt(primary.prep_weeks)||16;
  const km=parseFloat(primary.mesafe)||0;
  const dp=parseFloat(primary.d_plus)||0;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';

  const taperW=parseInt(primary.taper_w)||(km>42?3:km>21?2:1);
  const peakW=parseInt(primary.peak_w)||(km>42?4:km>21?3:2);
  const buildW=prepWeeks-taperW-peakW;

  const siklikStr=athlete.dinlenme_siklik||'3x1';
  const [siklikBlok,siklikDin]=(siklikStr.split('x').map(Number));

  // Geçmiş haftaların gerçekleşme durumunu hesapla — telafi için
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete.id);

  // Önce tüm haftaları hesapla (telafi için önce plan gerekli)
  const baseWeeks=[];
  for(let w=0;w<prepWeeks;w++){
    const weekStart=new Date(raceDate);
    weekStart.setDate(raceDate.getDate()-(prepWeeks-w)*7);
    const dow=weekStart.getDay();
    const diffToMon=dow===0?-6:1-dow;
    weekStart.setDate(weekStart.getDate()+diffToMon);
    weekStart.setHours(0,0,0,0);
    const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);weekEnd.setHours(23,59,59,999);
    const daysToRace=Math.ceil((raceDate-weekStart)/864e5);
    const isCurrent=weekStart<=today&&weekEnd>=today;
    const isPast=weekEnd<today;

    let phase;
    if(w>=prepWeeks-taperW)phase='Taper';
    else if(w>=prepWeeks-taperW-peakW)phase='Zirve';
    else if(w>=buildW*0.5)phase='Gelişme';
    else phase='Temel';

    const isRecovery=(()=>{
      if(phase==='Taper'||phase==='Zirve')return false;
      const posInBlock=(w%siklikBlok);
      return posInBlock>=(siklikBlok-siklikDin);
    })();

    let kmPct;
    if(phase==='Taper'){
      const taperIdx=w-buildW-peakW;
      kmPct=taperIdx===0?0.6:taperIdx===1?0.45:0.30;
    } else if(phase==='Zirve'){
      kmPct=isRecovery?0.65:0.85+0.05*(w-buildW);
    } else {
      const prog=Math.min(1,(w+1)/buildW);
      kmPct=isRecovery?prog*0.5:0.40+prog*0.40;
    }

    const baseKm=km<=21?km*0.8:km<=42?km*0.7:km*0.55;
    const targetKm=round1(baseKm*kmPct);
    const baseDp=isTrail?dp*0.6:dp*0.2;
    const targetDp=Math.round(baseDp*kmPct*(isRecovery?0.5:1));

    // Geçmiş hafta gerçekleşen km ve dp
    let actualKm=0, actualDp=0;
    if(isPast){
      const wWks=athWks.filter(w=>{const d=new Date(w.date+'T12:00:00');return d>=weekStart&&d<=weekEnd;});
      actualKm=round1(wWks.reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
      actualDp=Math.round(wWks.reduce((s,w)=>s+(parseFloat(w.irtifa)||0),0));
    }

    // Gerçekleşme durumu
    const kmRatio=targetKm>0?(actualKm/targetKm):null;
    let weekStatus='normal'; // normal | dinlenme_otomatik | eksik | yeterli
    if(isPast&&kmRatio!==null){
      if(kmRatio<0.40)weekStatus='dinlenme_otomatik';
      else if(kmRatio<0.70)weekStatus='eksik';
      else weekStatus='yeterli';
    }

    baseWeeks.push({
      weekIdx:w+1,weekStart,weekEnd,phase,isRecovery,
      targetKm,targetDp,daysToRace,
      isPast,isCurrent:weekStart<=today&&weekEnd>=today,
      actualKm,actualDp,kmRatio,weekStatus,
      _kmPct:kmPct,_baseKm:baseKm,_baseDp:baseDp,_isRecovery:isRecovery
    });
  }

  // Telafi mantığı: geçmiş haftalara göre gelecek hafta hedeflerini düzelt
  // Kümülatif telafi faktörü — birden fazla eksik hafta birikebilir (max ±%20)
  let telafiKm=0, telafiDp=0;
  const weeks=baseWeeks.map((wk,i)=>{
    if(wk.isPast){
      // Geçmiş hafta bitti — telafi birikimini güncelle
      if(wk.weekStatus==='dinlenme_otomatik'){
        // Kaybedilen yükü sonraki 3 haftaya yay (%10 artış)
        telafiKm+=wk.targetKm*0.10;
        telafiDp+=wk.targetDp*0.10;
      } else if(wk.weekStatus==='eksik'){
        // Eksik yükü sonraki 2 haftaya yay (%5 artış)
        telafiKm+=wk.targetKm*0.05;
        telafiDp+=wk.targetDp*0.05;
      }
      return{...wk,telafiUygulandı:false};
    }

    // Gelecek/mevcut hafta — birikmiş telafiyi uygula
    // Taper ve Zirve haftalarında telafi yok
    if(wk.phase==='Taper'||wk.phase==='Zirve'||telafiKm<=0){
      return{...wk,telafiUygulandı:false};
    }

    // Bu haftaya max %15 telafi uygula, kalanı sonraya bırak
    const buHaftaTelafi=Math.min(telafiKm,wk.targetKm*0.15);
    const buHaftaTelafiDp=Math.min(telafiDp,wk.targetDp*0.15);
    telafiKm=Math.max(0,telafiKm-buHaftaTelafi);
    telafiDp=Math.max(0,telafiDp-buHaftaTelafiDp);

    return{
      ...wk,
      targetKm:round1(wk.targetKm+buHaftaTelafi),
      targetDp:Math.round(wk.targetDp+buHaftaTelafiDp),
      telafiUygulandı:buHaftaTelafi>0,
      telafiKm:round1(buHaftaTelafi),
      telafiDp:Math.round(buHaftaTelafiDp),
      // Dinlenme otomatik işaretliyse planı dinlenme haftasına çevir
      isRecovery:wk.weekStatus==='dinlenme_otomatik'?true:wk.isRecovery
    };
  });

  return weeks;
}

// ── Günün Antrenmanı Motoru (yeniden yazıldı) ─────────────────────────────────

function recommendWorkout(athlete, history, races, workoutsThisWeek, allWorkouts, planMode='optimize', planTodayDay=null){
  if(!athlete) return null;
  const last=history[history.length-1];
  const today=new Date();
  const dayShort=DAYS_SHORT[today.getDay()];
  const dayOfWeek=DAYS_TR[today.getDay()];

  // ── Temel fitness metrikleri ──────────────────────────────────────────────
  const ctl=last?.ctl||0;
  const tsb=last?.tsb||0;
  const acwr=last?.acwr||1.0;
  const mechCtl=last?.mechCtl||0;
  const phase=last?.phase||'Temel';

  // ── Sporcu profili ────────────────────────────────────────────────────────
  const hrv=athlete.hrv_durum||'';
  const hrv7=parseFloat(athlete.hrv_7gun)||0;
  const inj=parseInt(athlete.sakatlık)||1;
  const motiv=parseInt(athlete.motivasyon)||3;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';
  const uzunGun=athlete.uzun_gun||'';
  const kosuGunleri=athlete.kosu_gunleri||[];
  const caprazGunleri=athlete.capraz_gunleri||[];
  const lthr=parseFloat(athlete.lthr)||0;
  const ftp=parseFloat(athlete.ftp)||0;
  const vo2max=parseFloat(athlete.vo2max)||0;
  const zones=calcZones(athlete);
  const band=ctlBand(ctl);

  // ── Yarış bilgileri ───────────────────────────────────────────────────────
  const {primary:nextRace,intermediate}=selectRaces(athlete,races);
  const daysToRace=nextRace?Math.ceil((new Date(nextRace.tarih+'T12:00:00')-today)/864e5):null;

  // ── Bu haftanın yükü ──────────────────────────────────────────────────────
  const wkMetrics=(workoutsThisWeek||[]).map(w=>({w,m:calcMetrics(w,athlete)}));
  const wkLoad=round1(wkMetrics.reduce((s,{m})=>s+(m.yukObj||0),0));
  const wkSessions=(workoutsThisWeek||[]).length;
  const wkKm=round1((workoutsThisWeek||[]).reduce((s,w)=>s+(parseFloat(w.mesafe)||0),0));
  const targetWeeklyLoad=ctl>0?round1(ctl*7):null;
  const remainingLoad=targetWeeklyLoad?Math.max(0,round1(targetWeeklyLoad-wkLoad)):null;

  // ── IF trendi ─────────────────────────────────────────────────────────────
  const wkIFs=wkMetrics.map(({m})=>m.IF).filter(v=>v>0);
  const meanIF=wkIFs.length?round2(wkIFs.reduce((s,v)=>s+v,0)/wkIFs.length):null;
  const ifOverloaded=meanIF!=null&&meanIF>0.90;

  // ── Güç yükü analizi ─────────────────────────────────────────────────────
  const wkHasPower=wkMetrics.some(({w})=>parseFloat(w.ort_guc)>0);
  const wkPTSS=wkMetrics.reduce((s,{m})=>s+(m.pTSS||0),0);
  const powerOverload=wkHasPower&&wkPTSS>0&&wkLoad>0&&(wkPTSS/wkLoad)>1.30;

  // ── Aerobik verimlilik trendi ─────────────────────────────────────────────
  const recentAerEff=history.slice(-14).filter(d=>d.aerEff!=null).map(d=>d.aerEff);
  const olderAerEff=history.slice(-28,-14).filter(d=>d.aerEff!=null).map(d=>d.aerEff);
  const avgRecent=recentAerEff.length?recentAerEff.reduce((s,v)=>s+v,0)/recentAerEff.length:null;
  const avgOlder=olderAerEff.length?olderAerEff.reduce((s,v)=>s+v,0)/olderAerEff.length:null;
  const aerEffDecline=avgRecent!=null&&avgOlder!=null&&(avgRecent-avgOlder)>5;

  // ── Nöromüsküler yük oranı ────────────────────────────────────────────────
  const mechRatio=ctl>5?(mechCtl/ctl):0;
  const mechOverload=mechRatio>0.18;

  // ── HRV 7g düşüklüğü ─────────────────────────────────────────────────────
  const hrv7Low=hrv7>0&&hrv7<50;

  // ── VO2max/CTL uyumu ─────────────────────────────────────────────────────
  const ctlVo2Ratio=vo2max>0?ctl/vo2max:0;
  const ctlNearCap=ctlVo2Ratio>1.8;

  // ── Haftalık km hedef ─────────────────────────────────────────────────────
  const weekTargets=calcWeeklyTargets(athlete,races,allWorkouts||[],planMode==='optimize');
  const thisWeekTarget=weekTargets.find(wt=>wt.isCurrent);
  const targetKm=thisWeekTarget?.targetKm||0;
  const kmDeficit=targetKm>0&&wkKm<targetKm*0.5&&wkSessions>=2;

  // ── Gün belirleme ─────────────────────────────────────────────────────────
  const isKosuGunu=kosuGunleri.includes(dayShort);
  const isCaprazGunu=caprazGunleri.includes(dayShort);
  const isUzunGun=uzunGun===dayShort;
  const isAntrenmanGunu=isKosuGunu||isCaprazGunu;

  // ── Uyarı ve blokerlar ────────────────────────────────────────────────────
  const warnings=[];
  const blockers=[];
  if(inj>=8) blockers.push({icon:'🚑',text:'Sakatlık puanı '+inj+'/10 — antrenman önerilmez.'});
  if(acwr>1.5) blockers.push({icon:'⚠',text:'ACWR '+acwr.toFixed(2)+' — aşırı yük riski. Dinlenme zorunlu.'});
  if(hrv==='düşük') warnings.push({icon:'📉',text:'HRV düşük — hafif toparlanma.'});
  if(hrv==='dengesiz') warnings.push({icon:'📊',text:'HRV dengesiz — Z3 üzerine çıkmayın.'});
  if(hrv7Low) warnings.push({icon:'📉',text:'HRV 7g ortalaması '+hrv7+'ms — kümülatif stres. Yoğunluk sınırlı.'});
  if(inj>=5&&inj<8) warnings.push({icon:'🩹',text:'Sakatlık '+inj+'/10 — yoğunluğu sınırlı tutun.'});
  if(tsb< -20) warnings.push({icon:'😴',text:'TSB '+tsb.toFixed(1)+' — ciddi yorgunluk.'});
  if(acwr>1.3) warnings.push({icon:'📈',text:'ACWR '+acwr.toFixed(2)+' — yük kontrolü.'});
  if(motiv<=2) warnings.push({icon:'🔋',text:'Motivasyon düşük — kısa ve keyifli.'});
  if(daysToRace!=null&&daysToRace<=7) warnings.push({icon:'🏁',text:'Yarışa '+daysToRace+' gün kaldı — taper.'});
  if(ifOverloaded) warnings.push({icon:'⚡',text:'Son hafta IF ortalaması '+meanIF+' — kronik yüksek yoğunluk. Aerobik taban gerekli.'});
  if(powerOverload) warnings.push({icon:'💪',text:'Güç yükü HR yükünden orantısız yüksek — nöromüsküler aşırı yük riski.'});
  if(aerEffDecline) warnings.push({icon:'📉',text:'Aerobik verimlilik son 2 haftada kötüleşiyor (aynı nabızda daha yavaş) — yorgunluk birikimi işareti.'});
  if(mechOverload) warnings.push({icon:'🏔',text:'Mekanik yük oranı yüksek (%'+Math.round(mechRatio*100)+') — düz antrenman önerilir.'});
  if(ctlNearCap) warnings.push({icon:'🔝',text:'CTL/VO2max oranı yüksek ('+ctlVo2Ratio.toFixed(2)+') — fitness tavan yakın. Hacmi koruyun.'});
  if(kmDeficit) warnings.push({icon:'📏',text:'Haftalık km hedefinin gerisinde ('+wkKm+'/'+targetKm+'km). Süre artırılabilir.'});

  if(blockers.length>0||!isAntrenmanGunu){
    return{tip:'dinlenme',baslik:'Dinlenme',aciklama:blockers.length>0?blockers[0].text:'Bugün antrenman programında yok.',sure_dk:0,yapilar:[],warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1};
  }

  // ── yMod: tüm toparlanma sinyalleri birleşik ─────────────────────────────
  let yMod=hrvMod(hrv);
  if(inj>=5)        yMod=Math.min(yMod,0.80);
  if(tsb< -20)      yMod=Math.min(yMod,0.80);
  else if(tsb< -15) yMod=Math.min(yMod,0.85);
  if(acwr>1.4)      yMod=Math.min(yMod,0.80);
  else if(acwr>1.3) yMod=Math.min(yMod,0.88);
  if(motiv<=2)      yMod=Math.min(yMod,0.85);
  if(hrv7Low)       yMod=Math.min(yMod,0.85);
  if(aerEffDecline) yMod=Math.min(yMod,0.90);
  if(powerOverload) yMod=Math.min(yMod,0.88);

  const kaliteliYapildi=(workoutsThisWeek||[]).some(w=>['interval','esik','tempo','yokus_kisa','yokus_uzun'].includes(w.tur));
  const uzunYapildi=(workoutsThisWeek||[]).some(w=>['uzun','tirmanis'].includes(w.tur));

  const athAllWorkouts=(allWorkouts||[]).filter(w=>w.athleteId===athlete.id);
  const zoneDist4w=calcPeriodZoneDist(athAllWorkouts,athlete,4);
  const zoneStatus=zoneDist4w?zoneDist_status(zoneDist4w):null;
  if(zoneStatus){
    zoneStatus.issues.forEach(i=>warnings.push({icon:'📊',text:i.msg}));
    if(zoneStatus.flags.length>0) warnings.push({icon:'💡',text:zoneStatus.flags[0].msg});
  }
  const anaPctHigh=zoneDist4w&&zoneDist4w.anaPct>15;
  const lowPctLow=zoneDist4w&&zoneDist4w.lowPct<65;
  const dpHedefGun=thisWeekTarget&&!uzunYapildi?Math.round(thisWeekTarget.targetDp*0.6):0;

  // ── Disiplin bayrakları ───────────────────────────────────────────────────
  const isYol=disiplin==='yol';
  const isUltra=disiplin==='ultra';
  const isKarma=disiplin==='karma';
  const isPatika=disiplin==='patika';
  const b2bYapildi=(workoutsThisWeek||[]).filter(w=>w.tur==='uzun').length>=2;
  const karmaYolYapildi=(workoutsThisWeek||[]).some(w=>w.spor==='kosu'&&!w.yapi_notu?.includes('arazi')&&['aerobik','tempo','esik','interval'].includes(w.tur));

  // Zorunlu toparlanma sinyalleri
  const forceEasy=anaPctHigh||ifOverloaded||mechOverload||(powerOverload&&wkSessions>=2);
  const forceLow=lowPctLow&&!kaliteliYapildi&&wkSessions>=1;

  // ── planDay'den bugünün temel önerisini al ───────────────────────────────
  // wkStats: planDay'in ihtiyacı olan haftalık durum
  const wkStatsForPlan={
    count:wkSessions,
    kaliteliYok:!kaliteliYapildi,
    uzunYapildi,
    wkLoad,
    dpHedefHafta:thisWeekTarget?.targetDp||0,
    weekOff: Math.floor((history.length||0)/7),
    isFutureWeek: false  // Günün antrenmanı her zaman mevcut hafta
  };
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const simStateToday={
    atl:last?.atl||0, ctl:last?.ctl||0,
    tsb:last?.tsb||0, acwr:last?.acwr||1.0
  };
  const {primary:nextRaceForPlan,intermediate:intermediateForPlan}=selectRaces(athlete,races);
  const daysToIntermediate=intermediateForPlan.length
    ?Math.ceil((new Date(intermediateForPlan[0].tarih+'T12:00:00')-today)/864e5):null;

  // planTodayDay varsa (generateTwoWeekPlan'dan geldi) onu kullan — haftalık planla tutarlılık
  // yoksa planDay'i doğrudan çağır (fallback)
  let tpl=planTodayDay||planDay(todayStr,athlete,simStateToday,phase,daysToRace,daysToIntermediate,
    wkStatsForPlan,kosuGunleri,caprazGunleri);

  // Dinlenme veya antrenman günü değilse hemen dön
  if(tpl.tip==='dinlenme'||!isAntrenmanGunu){
    return{...tpl,warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,
      phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1,
      zoneDist4w,zoneStatus};
  }

  // ── Güncel durum override'ları ────────────────────────────────────────────
  // Bloker varsa dinlenmeye zorla
  if(blockers.length>0){
    return{tip:'dinlenme',baslik:'Dinlenme',
      aciklama:blockers[0].text,sure_dk:0,yapilar:[],
      warnings,blockers,isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,
      phase,acwr,tsb,hrv,wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod:1,
      zoneDist4w,zoneStatus};
  }

  // yMod ile süreyi güncelle — planDay kendi yMod'unu kullandı, biz güncel sinyallerle yeniden uygularız
  tpl={...tpl, sure_dk:Math.round((tpl.sure_dk||45)*yMod)};

  // forceEasy: planın üzerine kolay koşuya indir
  if(forceEasy&&!['dinlenme','kolay','capraz'].includes(tpl.tip)){
    const orijinalTip=tpl.tip;
    tpl={...tplKolay(band,Math.round(50*yMod),zones),
      sure_dk:Math.round(50*yMod),
      _downgraded:true, _originalTip:orijinalTip};
    warnings.push({icon:'🔄',text:`Plan "${orijinalTip}" idi — aşırı yük sinyalleri nedeniyle kolay koşuya indirildi.`});
  } else if(forceLow&&['interval','esik','tempo','yokus_kisa','yokus_uzun'].includes(tpl.tip)){
    const orijinalTip=tpl.tip;
    tpl={...tplAerobik(band,Math.round(55*yMod),zones,disiplin),
      sure_dk:Math.round(55*yMod),
      _downgraded:true, _originalTip:orijinalTip};
    warnings.push({icon:'🔄',text:`Plan "${orijinalTip}" idi — düşük aerobik oranı nedeniyle aerobik koşuya çevrildi.`});
  }

  // ── Km hedefine göre süre düzeltmesi ─────────────────────────────────────
  if(kmDeficit&&tpl.tip==='aerobik'&&targetKm>0){
    const extraMin=Math.min(20,Math.round((targetKm-wkKm)*6));
    if(extraMin>5){
      tpl.sure_dk=Math.min(tpl.sure_dk+extraMin,Math.round(120*yMod));
      tpl.yapilar=tpl.yapilar.map((y,i)=>i===1?{...y,detay:y.detay+' (+'+extraMin+'dk km hedefi için)'}:y);
    }
  }

  // ── FTP varsa güç hedeflerini yapıya ekle ────────────────────────────────
  if(ftp>0&&['esik','tempo','interval'].includes(tpl.tip)){
    const powerTargets={esik:`${Math.round(ftp*0.88)}–${Math.round(ftp*0.95)}W`,tempo:`${Math.round(ftp*0.76)}–${Math.round(ftp*0.90)}W`,interval:`${Math.round(ftp*1.00)}–${Math.round(ftp*1.20)}W`};
    const pTarget=powerTargets[tpl.tip];
    if(pTarget) tpl.yapilar=tpl.yapilar.map((y,i)=>i===1?{...y,detay:y.detay+' · Güç hedefi: '+pTarget}:y);
  }

  const TIP_NAMES={kolay:'Kolay Koşu',aerobik:'Aerobik Koşu',uzun:'Uzun Koşu',tempo:'Tempo',esik:'Eşik',interval:'İnterval',yokus_kisa:'Kısa Yokuş Tekrarı',yokus_uzun:'Uzun Yokuş',tirmanis:'Tırmanış Koşusu',teknik:'Teknik İniş',acici:'Açıcı',capraz:'Çapraz Antrenman',dinlenme:'Dinlenme'};
  return{
    ...tpl,baslik:TIP_NAMES[tpl.tip]||tpl.tip,
    aciklama:tpl.yapilar.map(y=>y.baslik).join(' → '),
    warnings,blockers:[],
    isAntrenmanGunu,dayOfWeek,daysToRace,nextRace,phase,acwr,tsb,hrv,
    wkLoad,wkSessions,wkKm,targetWeeklyLoad,remainingLoad,yMod,
    zoneDist4w,zoneStatus,
    meanIF,mechRatio:round2(mechRatio),aerEffDecline,forceEasy,forceLow,
  };
}

function simulateFuture(lastHistory, plannedLoads){
  // lastHistory: mevcut history dizisinin son elemanı
  // plannedLoads: [{date, load}] — planlanan günlük yükler
  let atl=lastHistory?.atl||0;
  let ctl=lastHistory?.ctl||0;
  return plannedLoads.map(p=>{
    atl=p.load*λ_atl+atl*(1-λ_atl);
    ctl=p.load*λ_ctl+ctl*(1-λ_ctl);
    return{date:p.date,atl:round1(atl),ctl:round1(ctl),tsb:round1(ctl-atl),acwr:ctl>1?round2(atl/ctl):null};
  });
}

// Yarış zorluğu skoru
function raceDiffScore(r){
  const km=parseFloat(r.mesafe)||0;
  const dp=parseFloat(r.d_plus)||0;
  const iklim=parseInt(r.iklim_zorluk)||1;
  const altAvg=(parseFloat(r.maks_irtifa||0)+parseFloat(r.min_irtifa||0))/2;
  return km+(dp/100)+(iklim-1)*5+(altAvg>800?(altAvg-800)/200:0);
}

// Hedef yarış seçimi: en zor upcoming → birincil, öncesindekiler → ara
function selectRaces(athlete, races){
  const today=new Date();
  // Geriye dönük uyumluluk: yarıslar string[] veya {id,oncelik}[] olabilir
  const athRaces=(athlete.yarıslar||[]).map(x=>typeof x==='string'?{id:x,oncelik:'A'}:x);
  const athIds=athRaces.map(x=>x.id);
  const oncelikMap=Object.fromEntries(athRaces.map(x=>[x.id,x.oncelik||'A']));

  const upcoming=(races||[])
    .filter(r=>athIds.includes(r.id)&&new Date(r.tarih+'T12:00:00')>today)
    .sort((a,b)=>new Date(a.tarih)-new Date(b.tarih));
  if(!upcoming.length)return{primary:null,intermediate:[]};

  // __force ile manuel override
  const forced=upcoming.find(r=>r.__force);
  if(forced){
    const intermediate=upcoming.filter(r=>r.id!==forced.id&&new Date(r.tarih)<new Date(forced.tarih));
    return{primary:forced,intermediate};
  }

  // A/B/C öncelik: en yakın A → en yakın B → fallback en zor
  const aRaces=upcoming.filter(r=>oncelikMap[r.id]==='A');
  const bRaces=upcoming.filter(r=>oncelikMap[r.id]==='B');
  const primary=aRaces.length>0 ? aRaces[0]
    : bRaces.length>0 ? bRaces[0]
    : [...upcoming].sort((a,b)=>raceDiffScore(b)-raceDiffScore(a))[0];

  const intermediate=upcoming.filter(r=>
    r.id!==primary.id && new Date(r.tarih)<new Date(primary.tarih)
  );
  return{primary,intermediate};
}

// Tek gün için plan üret (şablon motoru ile)
function planDay(date, athlete, simState, phase, daysToRace, daysToIntermediate, wkStats, kosuGunleri, caprazGunleri){
  if(!athlete)return{tip:'dinlenme',baslik:'Dinlenme',sure_dk:0,yukHedef:0,yapilar:[],isPast:false,isToday:false};
  const today=new Date();
  const d=new Date(date+'T12:00:00');
  const dayShort=DAYS_SHORT[d.getDay()];
  const dayTR=DAYS_TR[d.getDay()];
  const isPast=d<today;
  const localToday=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const isToday=date===localToday;
  const isKosu=kosuGunleri.includes(dayShort);
  const isCapraz=caprazGunleri.includes(dayShort);
  const isUzunGun=(athlete.uzun_gun||'')===dayShort;
  const isAntrenman=isKosu||isCapraz;
  const disiplin=athlete.disiplin||'karma';
  const isTrail=disiplin!=='yol';
  const zones=calcZones(athlete);
  const band=ctlBand(simState.ctl||0);
  const acwr=simState.acwr||1.0;
  const tsb=simState.tsb||0;
  const hrv=athlete.hrv_durum||'';
  const inj=parseInt(athlete.sakatlık)||1;
  const yMod=Math.min(hrvMod(hrv),inj>=5?0.80:tsb< -15?0.85:acwr>1.3?0.85:1.0);

  const REST={date,dayTR,dayShort,tip:'dinlenme',baslik:'Dinlenme',sure_dk:0,yukHedef:0,yapilar:[],isPast,isToday,simState,phase};
  // Seçili antrenman günü değilse kesinlikle dinlenme
  if(!isAntrenman) return REST;

  const isSimulatedFuture=!isPast&&(wkStats.isFutureWeek===true);
  // Çapraz günler ACWR bloğundan muaf
  const acwrEsik=isCapraz&&!isKosu?99:(isSimulatedFuture?99:1.5);

  // Sakatlık >=8 — tek zorunlu dinlenme durumu
  if(inj>=8) return{...REST,baslik:'Zorunlu Dinlenme',uyari:'Sakatlık puanı yüksek ('+inj+'/10)',yapilar:[{baslik:'Dinlenme',detay:'Sakatlık nedeniyle zorunlu dinlenme'}]};

  const uzunGunTanimli=(athlete.uzun_gun||'')!=='';
  const dpGun=wkStats.uzunYapildi?0:Math.round((wkStats.dpHedefHafta||0)*0.6);
  const sonYogunGun=wkStats.sonYogunGun||false;
  const haftaGunTipi=wkStats.haftaGunTipi||null;

  // ── Test günü kontrolü — test planlanmışsa test antrenmanını ver ──────────
  const testPlan=wkStats.testPlanlar&&wkStats.testPlanlar.find(p=>p.athId===athlete.id&&p.date===date);
  if(testPlan&&isKosu){
    const testTur=TEST_TURLERI[testPlan.testTur];
    if(testTur){
      const yukFactor={interval:2.1,esik:1.7,aerobik:1.1,kolay:0.8}[testTur.tip]||1.1;
      const sure=Math.round((testTur.sure_dk||45)*yMod);
      const yukHedef=Math.round(sure*yukFactor);
      return{
        tip:testTur.tip,
        baslik:testTur.icon+' '+testTur.ad,
        sure_dk:sure,yukHedef,
        yapilar:testTur.yapilar||[],
        aciklama:testTur.amac,
        isTest:true, testTur:testPlan.testTur,
        isPast,isToday,simState,phase,yMod,date,dayTR,dayShort
      };
    }
  }

  // TSB/ACWR durumuna göre zorunlu indirim flag'leri
  const cokYorgun=tsb< -25;
  const yorgun=tsb< -15;
  const yukYuksek=acwr>1.5&&!isSimulatedFuture;

  // ── Koşu antrenmanı planla ──────────────────────────────────────────────
  let kosuTpl=null;
  let kosuUyari=null;
  if(isKosu){
    // Hafta iskeleti: 'aerobik' günse yoğun antrenman verme
    const iskeleteGoreAerobik=haftaGunTipi==='aerobik'&&!isUzunGun;

    // Çok yorgun veya yük çok yüksekse → kolay koşuya indir
    if((cokYorgun||yukYuksek)&&!isSimulatedFuture){
      const sure=Math.round((cokYorgun?30:40)*yMod);
      kosuTpl=tplKolay(band,sure,zones);
      kosuUyari=yukYuksek?'ACWR '+acwr.toFixed(2)+' — yük yüksek, kolay koşuya indirildi':
        'TSB '+tsb.toFixed(1)+' — çok yorgun, kolay koşuya indirildi';
    } else if(daysToIntermediate!==null&&daysToIntermediate<=2){
      kosuTpl=tplAcici(25,phase);
    } else if(daysToIntermediate!==null&&daysToIntermediate<=7){
      kosuTpl=tplKolay(band,Math.round(35*yMod),zones);
    } else if(phase==='Taper'||(daysToRace!==null&&daysToRace<=7)){
      kosuTpl=daysToRace<=3?tplAcici(25,phase):tplTempo(band,Math.round(40*yMod),zones,phase);
    } else if((isUzunGun||haftaGunTipi==='uzun')&&!wkStats.uzunYapildi){
      // Uzun koşu TSB'den bağımsız — her koşulda uzun koşu ver, sadece süre kısalır
      const uzunYMod=cokYorgun?0.65:yorgun?0.80:yMod;
      kosuTpl=isTrail&&dpGun>200
        ?tplTirmanisAcik(band,Math.round(70*uzunYMod),zones,dpGun)
        :tplUzun(band,simState.ctl||0,zones,disiplin,dpGun);
      if(cokYorgun)kosuUyari='TSB '+tsb.toFixed(1)+' — çok yorgun, uzun koşu süresi %35 kısaltıldı';
      else if(yorgun)kosuUyari='TSB '+tsb.toFixed(1)+' — yorgun, uzun koşu süresi %20 kısaltıldı';
    } else if(iskeleteGoreAerobik||sonYogunGun){
      // İskelet bu günü aerobik olarak atadı VEYA dün yoğundu
      kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
      if(sonYogunGun)kosuUyari='Dün yoğun antrenman vardı — bugün aerobik';
    } else if(haftaGunTipi==='kaliteli'&&!yorgun){
      // İskelet kaliteli atadı — faz + hafta rotasyonu ile çeşitlendir
      const wk=wkStats.weekOff||0;
      const recent=wkStats.recentKaliteli||[];
      // Son 2 haftada yapılan tipi tekrar vermeme — sekansı ilerlet
      const pickSeq=(seq)=>{
        for(let i=0;i<seq.length;i++){
          const tpl=seq[(wk+i)%seq.length]();
          if(!recent.slice(0,2).includes(tpl.tip)) return tpl;
        }
        return seq[wk%seq.length]();
      };
      if(daysToRace!==null&&daysToRace<=14){
        kosuTpl=tplAcici(Math.round(30*yMod),phase);
      } else if(phase==='Taper'){
        kosuTpl=tplYarisTempo(band,Math.round(45*yMod),zones,phase);
      } else if(phase==='Zirve'){
        const zirveSeq=[
          ()=>isTrail&&band>=3?tplYokusUzun(band,zones,phase):tplInterval(band,phase,zones),
          ()=>tplPiramit(band,zones,phase),
          ()=>tplCruise(band,Math.round(55*yMod),zones,phase),
          ()=>isTrail?tplHillSprint(band,zones,phase):tplOnOff(band,zones,phase),
        ];
        kosuTpl=pickSeq(zirveSeq);
      } else if(phase==='Gelişme'){
        const gelismeSeq=[
          ()=>isTrail&&band>=3?tplYokusKisa(band,zones,phase):tplInterval(band,phase,zones),
          ()=>tplTempoInterval(band,Math.round(50*yMod),zones,phase),
          ()=>tplPiramit(band,zones,phase),
          ()=>tplCruise(band,Math.round(50*yMod),zones,phase),
          ()=>tplOnOff(band,zones,phase),
          ()=>isTrail?tplHillSprint(band,zones,phase):tplYarisTempo(band,Math.round(48*yMod),zones,phase),
        ];
        kosuTpl=pickSeq(gelismeSeq);
      } else {
        const temelSeq=[
          ()=>tplTempo(band,Math.round(45*yMod),zones,phase),
          ()=>tplProgressive(band,Math.round(50*yMod),zones,phase),
          ()=>tplStrides(band,Math.round(50*yMod),zones,phase),
          ()=>tplCruise(band,Math.round(45*yMod),zones,phase),
        ];
        kosuTpl=pickSeq(temelSeq);
      }
    } else if(phase==='Temel'&&!iskeleteGoreAerobik&&!sonYogunGun&&wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)){
      // Temel fazda aerobik günlere zaman zaman strides ekle
      const wk=wkStats.weekOff||0;
      kosuTpl=wk%3===0
        ?tplStrides(band,Math.round(50*yMod),zones,phase)
        :tplAerobik(band,Math.round(55*yMod),zones,disiplin);
    } else {
      // Varsayılan faz mantığı — haftaGunTipi atanmamış veya kaliteli koşul sağlanmadı
      const wk=wkStats.weekOff||0;
      if(daysToRace!==null&&daysToRace<=14){
        kosuTpl=tplTempo(band,Math.round(40*yMod),zones,phase);
      } else if(phase==='Zirve'){
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)&&(acwr<1.2||isSimulatedFuture)){
          // Kaliteli henüz yapılmadıysa — rotasyonlu kaliteli ver
          const zirveSeq=[
            ()=>isTrail&&band>=3?tplYokusUzun(band,zones,phase):tplInterval(band,phase,zones),
            ()=>tplPiramit(band,zones,phase),
            ()=>tplCruise(band,Math.round(55*yMod),zones,phase),
            ()=>isTrail?tplHillSprint(band,zones,phase):tplOnOff(band,zones,phase),
          ];
          kosuTpl=zirveSeq[wk%zirveSeq.length]();
        } else if(!wkStats.uzunYapildi&&(!uzunGunTanimli||isUzunGun)){
          kosuTpl=isTrail?tplTirmanisAcik(band,Math.round(75*yMod),zones,dpGun):tplUzun(band,simState.ctl||0,zones,disiplin,dpGun);
        } else {
          kosuTpl=tplEsik(band,Math.round(55*yMod),zones,phase);
        }
      } else if(phase==='Gelişme'){
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)&&(acwr<1.2||isSimulatedFuture)){
          // Kaliteli henüz yapılmadıysa — rotasyonlu kaliteli ver
          const gelismeSeq=[
            ()=>isTrail&&band>=3?tplYokusKisa(band,zones,phase):tplInterval(band,phase,zones),
            ()=>tplTempoInterval(band,Math.round(50*yMod),zones,phase),
            ()=>tplPiramit(band,zones,phase),
            ()=>tplCruise(band,Math.round(50*yMod),zones,phase),
            ()=>tplOnOff(band,zones,phase),
            ()=>isTrail?tplHillSprint(band,zones,phase):tplYarisTempo(band,Math.round(48*yMod),zones,phase),
          ];
          kosuTpl=gelismeSeq[wk%gelismeSeq.length]();
        } else if(isTrail&&band>=2&&!wkStats.kaliteliYok){
          kosuTpl=tplTeknikInis(band,40,zones);
        } else {
          kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
        }
      } else {
        // Temel faz
        if(wkStats.kaliteliYok&&(tsb> -10||isSimulatedFuture)){
          const temelSeq=[
            ()=>tplTempo(band,Math.round(45*yMod),zones,phase),
            ()=>tplProgressive(band,Math.round(50*yMod),zones,phase),
            ()=>tplStrides(band,Math.round(50*yMod),zones,phase),
            ()=>tplCruise(band,Math.round(45*yMod),zones,phase),
          ];
          kosuTpl=temelSeq[wk%temelSeq.length]();
        } else {
          kosuTpl=tplAerobik(band,Math.round(55*yMod),zones,disiplin);
        }
      }
    }
    kosuTpl.sure_dk=Math.round((kosuTpl.sure_dk||45)*yMod);
    if(!kosuUyari&&acwr>1.3&&acwr<=1.5&&!isSimulatedFuture)
      kosuUyari='ACWR '+acwr.toFixed(2)+' — yük biraz yüksek, süre kısaltıldı';
    if(kosuUyari)kosuTpl.uyari=kosuUyari;
  }

  // ── Çapraz antrenman planla ─────────────────────────────────────────────
  let caprazTpl=null;
  if(isCapraz){
    const caprazSure=Math.round(45*yMod);
    caprazTpl={
      tip:'capraz',sure_dk:caprazSure,
      yapilar:[{baslik:'Çapraz Antrenman',detay:caprazSure+' dk bisiklet/yüzme/kürek — '+zoneInfoZ1(zones)}]
    };
  }

  // ── Sonuç ───────────────────────────────────────────────────────────────
  const TIP_LABELS={kolay:'Kolay Koşu',aerobik:'Aerobik Koşu',uzun:'Uzun Koşu',tempo:'Tempo',esik:'Eşik',interval:'İnterval',yokus_kisa:'Kısa Yokuş',yokus_uzun:'Uzun Yokuş',tirmanis:'Tırmanış',teknik:'Teknik İniş',acici:'Açıcı',capraz:'Çapraz',dinlenme:'Dinlenme'};
  const yukHesapla=(tpl)=>tpl?Math.round((tpl.sure_dk||45)*({kolay:0.8,aerobik:1.1,uzun:1.1,tempo:1.55,esik:1.7,interval:2.1,yokus_kisa:2.1,yokus_uzun:2.0,tirmanis:2.0,teknik:1.4,acici:1.2,capraz:0.8}[tpl.tip]||6)):0;

  if(kosuTpl&&caprazTpl){
    // Hem koşu hem çapraz — birleşik gün
    const yapilar=[
      {baslik:'🏃 '+TIP_LABELS[kosuTpl.tip],detay:''},
      ...kosuTpl.yapilar,
      {baslik:'🚴 Çapraz Antrenman',detay:''},
      ...caprazTpl.yapilar
    ];
    const yukHedef=yukHesapla(kosuTpl)+yukHesapla(caprazTpl);
    return{...kosuTpl,baslik:TIP_LABELS[kosuTpl.tip]+' + Çapraz',yapilar,yukHedef,
      caprazTpl,isKosuCapraz:true,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort};
  } else if(kosuTpl){
    const yukHedef=yukHesapla(kosuTpl);
    return{...kosuTpl,baslik:TIP_LABELS[kosuTpl.tip]||kosuTpl.tip,yukHedef,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort};
  } else if(caprazTpl){
    const yukHedef=yukHesapla(caprazTpl);
    return{...caprazTpl,baslik:'Çapraz Antrenman',yukHedef,isPast,isToday,simState,phase,yMod,date,dayTR,dayShort};
  }
  return REST;
}

// 2 haftalık plan üret
function generateTwoWeekPlan(athlete, history, races, actualWorkouts, testPlanlar=[]){
  const today=new Date();
  const last=history[history.length-1];
  const {primary,intermediate}=selectRaces(athlete,races);
  const kosuGunleri=athlete.kosu_gunleri||[];
  const caprazGunleri=athlete.capraz_gunleri||[];
  const athWorkouts=actualWorkouts.filter(w=>w.athleteId===athlete.id);
  const weekTargets=calcWeeklyTargets(athlete,races,actualWorkouts||[]);

  const weeks=[];
  let simAtl=last?.atl||0, simCtl=last?.ctl||0;
  let sonYogunGunGlobal=false; // Haftalar arası korunur

  for(let weekOff=0;weekOff<2;weekOff++){
    const {start}=getWeekBounds(weekOff);
    const days=[];
    const wt=weekTargets.find(t=>{
      const ws=new Date(start);
      return t.weekStart.toDateString()===ws.toDateString();
    });
    // Rotasyon indeksi: sporcu ID hash'i + history uzunluğu
    // → her sporcu farklı sekans noktasından başlar, benzer history'ye rağmen farklı antrenman alır
    const athHash = (athlete.id||'').split('').reduce((h,c)=>((h<<5)-h+c.charCodeAt(0))|0, 0);
    const rotIdx = Math.abs(athHash % 97) + Math.floor((history.length||0)/7) + weekOff;
    
    // Son 4 haftada yapılan kaliteli antrenman tiplerini bul (tekrar önleme)
    const recentKaliteli = athWorkouts
      .filter(w=>['interval','esik','tempo','piramit','on_off','tempo_interval','cruise','yaris_tempo','hill_sprint','yokus_kisa','yokus_uzun'].includes(w.tur))
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
      .slice(0,4)
      .map(w=>w.tur);
    
    let wkStats={count:0,kaliteliYok:true,uzunYapildi:false,wkLoad:0,dpHedefHafta:wt?.targetDp||0,weekOff:rotIdx,isFutureWeek:weekOff>0,recentKaliteli,sonYogunGun:sonYogunGunGlobal,testPlanlar:testPlanlar||[]};

    // ── Hafta İskeleti: Kaliteli antrenmanı en iyi TSB gününe ata ────────────
    // Sadece gelecek/mevcut haftalar için (geçmiş haftada gerçek veri var)
    // 1. Her koşu gününün tahmini TSB'sini hesapla
    // 2. En yüksek TSB → kaliteli antrenman günü
    // 3. uzun_gun → uzun koşu (eğer varsa)
    // 4. Geri kalanlar → aerobik
    const haftaIskeleti={}; // dateStr → 'kaliteli'|'uzun'|'aerobik'|null
    if(weekOff===0||weekOff===1){
      const kosuGunleriHafta=[];
      let tmpAtl=simAtl, tmpCtl=simCtl;
      for(let di=0;di<7;di++){
        const d=new Date(start);d.setDate(start.getDate()+di);
        const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dd2=String(d.getDate()).padStart(2,'0');
        const ds=`${y}-${mo}-${dd2}`;
        const dShort=DAYS_SHORT[d.getDay()];
        const isPastDay=d<today;
        const isKosuDay=kosuGunleri.includes(dShort);
        const isUzunDay=(athlete.uzun_gun||'')===dShort;
        const estTsb=round1(tmpCtl-tmpAtl);
        if(isKosuDay&&!isPastDay)kosuGunleriHafta.push({ds,di,estTsb,isUzunDay});
        // Tahmini yük: aerobik varsayımıyla simüle et
        const estLoad=isKosuDay?80:20;
        tmpAtl=estLoad*λ_atl+tmpAtl*(1-λ_atl);
        tmpCtl=estLoad*λ_ctl+tmpCtl*(1-λ_ctl);
      }
      // uzun_gun'u kilitle
      kosuGunleriHafta.forEach(g=>{if(g.isUzunDay)haftaIskeleti[g.ds]='uzun';});
      // Kalan günleri TSB'ye göre sırala — en yüksek TSB → kaliteli
      const kalanlar=kosuGunleriHafta.filter(g=>!haftaIskeleti[g.ds]);
      kalanlar.sort((a,b)=>b.estTsb-a.estTsb);
      // Haftada en az 1 kaliteli antrenman — TSB eşiği yok, planDay zaten kontrol eder
      if(kalanlar.length>0){
        haftaIskeleti[kalanlar[0].ds]='kaliteli';
        // Gelişme/Zirve fazında 2. en iyi günde de kaliteli olabilir
        if(kalanlar.length>2&&['Gelişme','Zirve'].includes(
          calcPhase(kalanlar[1].ds, primary?.tarih||'', parseInt(primary?.prep_weeks||16), primary)
        )){
          haftaIskeleti[kalanlar[1].ds]='kaliteli';
        }
      }
      // Geri kalanlar aerobik
      kalanlar.slice(1).forEach(g=>{if(!haftaIskeleti[g.ds])haftaIskeleti[g.ds]='aerobik';});
    }

    for(let di=0;di<7;di++){
      const d=new Date(start);d.setDate(start.getDate()+di);
      // toISOString() UTC kullanır — yerel tarih bileşenlerini al
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,'0');
      const d2=String(d.getDate()).padStart(2,'0');
      const dateStr=`${y}-${m}-${d2}`;
      const isToday=dateStr===`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      // Bugün için simState: gerçek history son değerini kullan (simülasyon değil)
      // Geçmiş günler için simüle edilen değerleri kullan (simAtl/simCtl)
      const simState=isToday&&last
        ?{atl:round1(last.atl||0),ctl:round1(last.ctl||0),tsb:round1((last.ctl||0)-(last.atl||0)),acwr:last.acwr||null}
        :{atl:round1(simAtl),ctl:round1(simCtl),tsb:round1(simCtl-simAtl),acwr:simCtl>1?round2(simAtl/simCtl):null};
      const isPast=d<today;
      const dtR=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-d)/864e5):null;
      const nextInt=intermediate.filter(r=>new Date(r.tarih+'T12:00:00')>=d).sort((a,b)=>new Date(a.tarih)-new Date(b.tarih))[0];
      const dtInt=nextInt?Math.ceil((new Date(nextInt.tarih+'T12:00:00')-d)/864e5):null;
      const phase=primary?calcPhase(dateStr,primary.tarih,primary.prep_weeks,primary):'Temel';
      const actual=athWorkouts.filter(w=>w.date===dateStr);
      let actualLoad=0,actualKm=0,actualDp=0;
      actual.forEach(w=>{
        const m=calcMetrics(w,athlete);
        actualLoad+=m.yukObj||0;
        actualKm+=parseFloat(w.mesafe)||0;
        actualDp+=parseFloat(w.irtifa)||0;
      });
      const planned=planDay(dateStr,athlete,simState,phase,dtR,dtInt,
        {...wkStats, haftaGunTipi:haftaIskeleti[dateStr]||null},
        kosuGunleri,caprazGunleri);
      // wkStats güncelleme — geçmiş günlerde gerçek antrenman varsa onu kullan
      const isTestDay=(testPlanlar||[]).some(p=>p.athId===athlete.id&&p.date===dateStr);
      // Geçmiş günlerde tüm gerçek antrenmanları al
      const primaryActual = actual.length > 0 ? actual[0] : null;
      const effectiveTip = isPast && primaryActual
        ? (primaryActual.tur || primaryActual.spor || 'aerobik')
        : planned.tip;
      // Geçmiş günlerde tüm antrenmanları başlıkta göster
      const effectiveBaslik = isPast && actual.length > 0
        ? actual.map(w => {
            const t = w.tur || w.spor || 'aerobik';
            const sporlbl = SPOR_MAP[w.spor]?.l || '';
            const turlbl = TUR_LABELS[t] || t;
            return w.spor === 'kosu' ? turlbl : sporlbl || turlbl;
          }).join(' + ')
        : planned.baslik;
      const effectiveSureDk = isPast && actual.length > 0
        ? Math.round(actual.reduce((s,w) => s + (toSec(w.sure_sa,w.sure_dk,w.sure_sn)||0), 0) / 60)
        : planned.sure_dk;

      // wkStats: tüm gerçek antrenmanları ayrı ayrı değerlendir
      if(isPast && actual.length > 0){
        actual.forEach(w => {
          const t = w.tur || w.spor || 'aerobik';
          if(t === 'dinlenme') return;
          wkStats.count++;
          if(['interval','esik','tempo','yokus_kisa','yokus_uzun'].includes(t)) wkStats.kaliteliYok=false;
          if(['uzun','tirmanis'].includes(t)) wkStats.uzunYapildi=true;
          wkStats.wkLoad += calcMetrics(w,athlete).yukObj||0;
        });
      } else if(!isPast){
        const t = planned.tip;
        if(t !== 'dinlenme'){
          wkStats.count++;
          if(['interval','esik','tempo','yokus_kisa','yokus_uzun'].includes(t)) wkStats.kaliteliYok=false;
          if(['uzun','tirmanis'].includes(t)) wkStats.uzunYapildi=true;
          wkStats.wkLoad += planned.yukHedef||0;
        }
      }

      const isYogunTip=['interval','esik','yokus_kisa','yokus_uzun','tirmanis'].includes(effectiveTip);
      // Ard arda yoğun gün takibi — haftalar arası korunur
      wkStats.sonYogunGun=isYogunTip;
      sonYogunGunGlobal=isYogunTip;
      // Kaliteli antrenman simülasyon yükünü yumuşat
      const rawLoad=isPast?(actualLoad||0):(planned.yukHedef||0);
      const hasKaliteliActual=isPast&&actual.some(w=>['interval','esik','yokus_kisa','yokus_uzun'].includes(w.tur||w.spor));
      const isKaliteliTip=hasKaliteliActual||['interval','esik','yokus_kisa','yokus_uzun'].includes(effectiveTip);
      const simFactor=isTestDay?0.4:isKaliteliTip?0.75:1.0;
      const loadForSim=Math.round(rawLoad*simFactor);
      simAtl=loadForSim*λ_atl+simAtl*(1-λ_atl);
      simCtl=loadForSim*λ_ctl+simCtl*(1-λ_ctl);
      let comparison=null;
      if(isPast&&actual.length>0&&planned.yukHedef>0){
        const diff=round1(actualLoad-planned.yukHedef);
        const pct=Math.round(actualLoad/planned.yukHedef*100);
        comparison={actual:round1(actualLoad),planned:planned.yukHedef,diff,pct,actualKm:round1(actualKm),actualDp:Math.round(actualDp),status:pct>=80&&pct<=120?'ok':pct<80?'eksik':'fazla'};
      } else if(isPast&&actual.length===0&&planned.tip!=='dinlenme'){
        comparison={actual:0,planned:planned.yukHedef,diff:-planned.yukHedef,pct:0,actualKm:0,actualDp:0,status:'atlandı'};
      }
      days.push({
        ...planned,
        tip:effectiveTip,
        baslik:effectiveBaslik,
        sure_dk:effectiveSureDk,
        actual,actualLoad:round1(actualLoad),actualKm:round1(actualKm),actualDp:Math.round(actualDp),comparison,nextInt:nextInt||null
      });
    }
    // Haftalık gerçekleşen toplam
    const wkActualKm=round1(days.reduce((s,d2)=>s+d2.actualKm,0));
    const wkActualDp=Math.round(days.reduce((s,d2)=>s+d2.actualDp,0));
    weeks.push({weekOff,start,days,primary,intermediate,wkStats,wt,wkActualKm,wkActualDp});
  }
  return{weeks,primary,intermediate};
}

    return races;

    if(!athlete)return null;

      ?races.map(r=>({...r,__force:r.id===selectedPrimary}))

    return generateTwoWeekPlan(athlete,history,racesOverride,workouts,testPlanlar||[]);

    if(!athlete)return[];

  },[athlete,races,selectedPrimary,workouts,planMode]);

  // Gerçekleşen haftalık km+D+ hesapla

    acici:'🎯',capraz:'🚴',dinlenme:'😴',yokus_kisa:'⛰',yokus_uzun:'🏔',
    tirmanis:'📈',teknik:'🎯',
    yoga:'🧘',pilates:'🤸',kuvvet:'💪',bisiklet:'🚴',yuzme:'🏊',
    kuerek:'🚣',futbol:'⚽',basketbol:'🏀',

  const dayEmoji=(day)=>day.isTest?(TEST_TURLERI[day.testTur]?.icon||'🧪'):day.isKosuCapraz?'🏃🚴':tipEmoji(day.tip);

function GununAntrenmanTab({athlete,history,races,workouts,planMode,testPlanlar,onSaveTestPlan,onDeleteTestPlan}){
  const today=new Date();
  const {start:wStart}=getWeekBounds(0);
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete?.id);
  const wkWorkouts=athWks.filter(w=>new Date(w.date+'T12:00:00')>=wStart);

  const todayStr=(()=>{const t=today;return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;})();
  const [showOteleme,setShowOteleme]=useState(false);
  const [otelemeGun,setOtelemeGun]=useState(null);

  // Bugün planlı test var mı?
  const bugunTestPlan=(testPlanlar||[]).find(p=>p.athId===athlete?.id&&p.date===todayStr);

  // Planlı test uygunluk kontrolü
  const testUygunluk=React.useMemo(()=>{
    if(!bugunTestPlan||!athlete)return null;
    const last=history[history.length-1];
    const {primary}=selectRaces(athlete,races);
    const daysToRace=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-today)/864e5):999;
    const tsb=last?.tsb||0;
    const acwr=last?.acwr||1;
    const sorunlar=[];

            ),

function FactorRow({label,val,goodDir='low'}){
  const v=parseFloat(val)||1;
  const isGood=goodDir==='low'?v<=1.02:v>=0.98;
  const isBad=goodDir==='low'?v>1.1:v<0.92;
  const cls=isGood?'good':isBad?'danger':'warn';
  const pct=round1((v-1)*100);
  return React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',borderBottom:'0.5px solid var(--border)',fontSize:12}},
    React.createElement('span',{style:{color:'var(--text-secondary)'}},label),
    React.createElement('span',{className:cls,fontWeight:500},pct>0?'+'+pct+'%':pct+'%')
  );
}

            // Yarışa ve hazırlık durumuna göre gerçekçi iyileştirme aralığı

            const prepWeeks=parseInt(race.prep_weeks)||12;
            const taperW=parseInt(race.taper_w)||(km>42?3:km>21?2:1);
            const daysLeft=race.tarih?Math.ceil((new Date(race.tarih+'T12:00:00')-new Date())/864e5):999;
            const trainingDaysLeft=Math.max(0,daysLeft-taperW*7);
            const totalTrainingDays=Math.max(1,(prepWeeks-taperW)*7);
            const prepPct=Math.min(1,(totalTrainingDays-trainingDaysLeft)/totalTrainingDays);

            // Mesafe & D+ bazlı max iyileştirme potansiyeli (hazırlık döngüsü başında)
            // Kısa mesafe → daha fazla iyileşme mümkün
            // Ultra/trail → teknik + D+ verimi önemli
            const dpPerKm=km>0?dp/km:0;
            let maxIyiPct;
            if(km<=5)       maxIyiPct=6.0;
            else if(km<=10) maxIyiPct=5.0;
            else if(km<=21) maxIyiPct=4.0;
            else if(km<=42) maxIyiPct=3.0;
            else if(km<=60) maxIyiPct=2.5;

            const expectedIyi=round1(maxIyiPct*realizePct);

                ),

                  React.createElement('div',{style:{fontSize:18,fontWeight:700,color:'var(--success)'}},fmtHMS(tHedef)),
                  React.createElement('div',{style:{fontSize:11,color:'var(--success)',marginTop:2}},'−'+expectedIyi+'% iyileştirme')
                ),
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Ort. Pace (Tahmin)'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:600}},fmtPaceStr(target.totalMin,parseFloat(race.mesafe)))
                ),
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Hedef Pace'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:600,color:'var(--success)'}},fmtPaceStr(tHedef,parseFloat(race.mesafe)))
                ),
                React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Tırmanış Ek Süre'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:500}},fmtHMS(target.climbMin))
                ),
                target.idleMin>0&&React.createElement('div',{className:'metric'},
                  React.createElement('div',{className:'metric-label'},'Duruş Süreleri'),
                  React.createElement('div',{style:{fontSize:16,fontWeight:500}},fmtHMS(target.idleMin))
                )
              ),
              // İyileştirme açıklaması
              React.createElement('div',{style:{

                background:'var(--bg-secondary)',borderRadius:'var(--radius)',marginBottom:8

// Belirli bir tarih için test uygunluğunu değerlendir
function calcTestDayUygunluk(testDate, athlete, history, races, workouts, dunkuYogunPlanlanan=false){
  if(!testDate||!athlete)return null;
  const testD=new Date(testDate+'T12:00:00');
  const {primary}=selectRaces(athlete,races);
  const daysToRace=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-testD)/864e5):999;

  // Önceki günü kontrol et — kayıtlı antrenman
  const oncekiGun=new Date(testD);oncekiGun.setDate(testD.getDate()-1);
  const oncekiGunStr=`${oncekiGun.getFullYear()}-${String(oncekiGun.getMonth()+1).padStart(2,'0')}-${String(oncekiGun.getDate()).padStart(2,'0')}`;
  const athWks=(workouts||[]).filter(w=>w.athleteId===athlete.id);
  const oncekiAntrenman=athWks.find(w=>w.date===oncekiGunStr);
  const dunkuYogunKayitli=oncekiAntrenman&&['interval','esik','yokus_kisa','yokus_uzun','tirmanis'].includes(oncekiAntrenman.tur);
  const dunkuYogun=dunkuYogunKayitli||dunkuYogunPlanlanan;

  // O güne yakın geçmişteki TSB tahmini
  const last=history[history.length-1];
  const tsb=last?.tsb||0;
  const acwr=last?.acwr||1;

  const sorunlar=[];
  if(dunkuYogun)sorunlar.push('Önceki gün yoğun antrenman var ('+oncekiAntrenman.tur+') — toparlanma yetersiz');
  if(daysToRace<14)sorunlar.push('Yarışa '+daysToRace+' gün kaldı — test yorgunluğu yarışı etkileyebilir');
  if(acwr>1.3)sorunlar.push('ACWR '+acwr.toFixed(2)+' — yük birikimi yüksek');
  if(tsb< -15)sorunlar.push('TSB '+tsb.toFixed(1)+' — yorgunluk fazla, test sonuçları güvenilmez');
  if(athlete.hrv_durum==='düşük')sorunlar.push('HRV düşük — toparlanma yetersiz');

  // Önerilen alternatif günler (önümüzdeki 14 gün, uygunluk sırasıyla)
  const oneriler=[];
  const kosuGunleri=athlete.kosu_gunleri||[];
  for(let i=1;i<=14;i++){
    const d=new Date(testD);d.setDate(testD.getDate()+i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    const ds=`${y}-${m}-${dd}`;
    const dayShort=DAYS_SHORT[d.getDay()];
    if(!kosuGunleri.includes(dayShort))continue;
    const dr=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-d)/864e5):999;
    if(dr<7)continue;
    const phase=primary?calcPhase(ds,primary.tarih,primary.prep_weeks,primary):'Temel';
    if(phase==='Taper')continue;
    // Önceki günü kontrol et — kayıtlı veya planlı
    const prevD=new Date(d);prevD.setDate(d.getDate()-1);
    const prevDs=`${prevD.getFullYear()}-${String(prevD.getMonth()+1).padStart(2,'0')}-${String(prevD.getDate()).padStart(2,'0')}`;
    const prevYogun=athWks.some(w=>w.date===prevDs&&['interval','esik','yokus_kisa','yokus_uzun'].includes(w.tur));
    if(prevYogun)continue;
    const label=d.toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long'});
    oneriler.push({dateStr:ds,label,dr});
    if(oneriler.length>=3)break;
  }

  return{uygun:sorunlar.length===0,sorunlar,oneriler};
}

function calcTestTiming(athlete, history, races, workouts){
  if(!athlete)return[];
  const last=history[history.length-1];
  const ctl=last?.ctl||0;
  const phase=last?.phase||'Temel';
  const today=new Date();

  // Yarışa kaç gün kaldı
  const {primary}=selectRaces(athlete,races);
  const daysToRace=primary?Math.ceil((new Date(primary.tarih+'T12:00:00')-today)/864e5):999;

  // Son testleri bul
  const athTests=(workouts||[]).filter(w=>w.athleteId===athlete.id&&w._isTest&&w._testTur);
  const lastTestByType={};
  athTests.forEach(w=>{
    const prev=lastTestByType[w._testTur];
    if(!prev||new Date(w.date)>new Date(prev.date))lastTestByType[w._testTur]=w;
  });

  const oneriler=[];
  Object.values(TEST_TURLERI).forEach(t=>{
    // Min CTL kontrolü
    if(ctl<t.min_ctl){oneriler.push({...t,durum:'bekle',neden:'CTL ('+ctl.toFixed(0)+') yeterli değil — en az '+t.min_ctl+' olmalı'});return;}
    // Faz kontrolü
    if(!t.uygun_faz.includes(phase)&&phase!=='Temel'){oneriler.push({...t,durum:'uygun_degil',neden:phase+' fazında bu test önerilmez'});return;}
    // Yarış yakınlık kontrolü
    if(daysToRace<14){oneriler.push({...t,durum:'yakin_yaris',neden:'Yarışa '+daysToRace+' gün kaldı — test riskli'});return;}
    // Frekans kontrolü
    const lastTest=lastTestByType[t.id];
    if(lastTest){
      const haftalar=Math.round((today-new Date(lastTest.date+'T12:00:00'))/(7*864e5));
      if(haftalar<t.freq_hafta){oneriler.push({...t,durum:'erken',neden:'Son testten '+haftalar+' hafta geçti — '+t.freq_hafta+' hafta beklenmeli',sonTest:lastTest});return;}
    }
    // Her şey uygun
    const vadeli=!lastTest?'İlk kez':Math.round((today-new Date(lastTest.date+'T12:00:00'))/(7*864e5))+' hafta önce yapıldı';
    oneriler.push({...t,durum:'onerilir',neden:vadeli,sonTest:lastTest||null});
  });

  return oneriler;
}

// Koşu dinamikleri analizi
function analyzeDynamics(workouts, athleteId){
  // Sabit tempolu antrenman tespiti — iki yol:
  // 1. Antrenman türü bilgisi varsa onu kullan
  // 2. Yoksa veri bazlı otomatik tespit
  const STEADY_TYPES=['kolay','aerobik','uzun'];
  const YOĞUN_TYPES=['interval','esik','tempo','yokus_kisa','yokus_uzun','tirmanis','teknik','acici','depar','yaris'];

  function isSteady(w){
    // Tür bilgisi varsa öncelikle onu kullan
    if(w.tur&&STEADY_TYPES.includes(w.tur)) return true;
    if(w.tur&&YOĞUN_TYPES.includes(w.tur)) return false;

    // Tür bilgisi yok — veri bazlı otomatik tespit
    const durSec=toSec(w.sure_sa,w.sure_dk,w.sure_sn);
    const durMin=durSec/60;
    const avgHR=parseFloat(w.ort_nabiz)||0;
    const maxHR=parseFloat(w.maks_nabiz)||0;
    const rpe=parseFloat(w.rpe)||0;
    const mesafe=parseFloat(w.mesafe)||0;

    // Çok kısa antrenmanlar hariç
    if(durMin<15) return false;

    // RPE varsa: ≤6 = sabit tempo
    if(rpe>0&&rpe>7) return false;
    if(rpe>0&&rpe<=6) return true;

    // Nabız farkı: maks-ort < 25 bpm → sabit tempo
    if(avgHR>0&&maxHR>0){
      const hrRange=maxHR-avgHR;
      if(hrRange>35) return false; // Yoğun antrenman
      if(hrRange<=25) return true;  // Sabit tempo
    }

    // Pace tutarlılığı: pace/km makul aralıkta
    if(mesafe>2&&durMin>0){
      const paceSecKm=(durMin*60)/mesafe;
      // 4:00–9:00 /km arası sabit tempo koşusu
      if(paceSecKm>=240&&paceSecKm<=540) return true;
    }

    // Yeterli sinyal yoksa dahil et — daha fazla veri daha iyi
    return durMin>=20;
  }

  const athWks=(workouts||[]).filter(w=>{
    if(w.athleteId!==athleteId) return false;
    if(!isSteady(w)) return false;
    // Dinamik verisi olan antrenmanlar
    return parseFloat(w.kadans)>0||parseFloat(w.yer_kontak)>0||parseFloat(w.dikey_salinim)>0;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  if(!athWks.length)return null;

  // Kaç tanesi otomatik tespit edildi vs tür bilgisiyle?
  const autoDetected=athWks.filter(w=>!w.tur||!STEADY_TYPES.includes(w.tur)).length;

  const refs={
    kadans:{iyi:180,kabul:170,birim:'spm',yuksek_iyi:true},
    yer_kontak:{iyi:250,kabul:300,birim:'ms',yuksek_iyi:false},
    dikey_salinim:{iyi:7,kabul:9,birim:'cm',yuksek_iyi:false},
  };

  const sonuc={};
  ['kadans','yer_kontak','dikey_salinim'].forEach(k=>{
    const vals=athWks.map(w=>parseFloat(w[k])).filter(v=>v>0);
    if(!vals.length){sonuc[k]=null;return;}
    const avg=round1(vals.reduce((s,v)=>s+v,0)/vals.length);
    const son=vals[vals.length-1];
    const ref=refs[k];
    let seviye;
    if(ref.yuksek_iyi){seviye=avg>=ref.iyi?'iyi':avg>=ref.kabul?'kabul':'gelistir';}
    else{seviye=avg<=ref.iyi?'iyi':avg<=ref.kabul?'kabul':'gelistir';}
    const trend=vals.length>=3?(()=>{
      const n=Math.min(5,vals.length);
      const son5=vals.slice(-n);
      const ilk5=vals.slice(0,n);
      const avgSon=son5.reduce((s,v)=>s+v,0)/son5.length;
      const avgIlk=ilk5.reduce((s,v)=>s+v,0)/ilk5.length;
      const fark=ref.yuksek_iyi?avgSon-avgIlk:avgIlk-avgSon;
      return fark>1?'iyilesiyor':fark<-1?'kötülessiyor':'sabit';
    })():'yetersiz_veri';
    sonuc[k]={avg,son,seviye,trend,vals,birim:ref.birim,ref};
  });
  return{sonuc,wkCount:athWks.length,autoDetected};
}

// ── Haftalık Plan Excel Dışa Aktarma (ExcelJS) ──────────────────────────────

async function exportHaftalikPlanXLSX(plan, athlete){
  // ── YENİ FORMAT: Tek sayfada haftalık takvim ──────────────────────────────
  // Sol (A-F): Pzt/Çar/Cum/Paz  |  Sağ (I-N): Sal/Per/Cmt
  // Satır rengi = pace değerine göre zone rengi
  // Süre hücreleri = formülle (mesafe + pace'den)
  // Toplam satırları = formülle
  if(!plan||!plan.weeks)return;
  if(typeof ExcelJS==='undefined'){alert('ExcelJS yüklenmedi.');return;}

  const wb=new ExcelJS.Workbook();
  wb.creator='Antrenman Takip'; wb.created=new Date();
  const ws=wb.addWorksheet('Haftalık Plan');

  // Sütun genişlikleri: A-F sol, G-H boşluk, I-N sağ
  ws.columns=[
    {width:6},{width:7},{width:7},{width:9},{width:7},{width:7},
    {width:2},{width:2},
    {width:6},{width:7},{width:7},{width:9},{width:7},{width:7},
  ];

  // ── Renkler ─────────────────────────────────────────────────────────────
  const ZONE_BG={Z1:'B6F5DC',Z2:'34D399',Z3:'FBBF24',Z4:'F97316',Z5a:'EF4444',Z5b:'DC2626',Z5c:'991B1B'};
  const ZONE_FG={Z1:'000000',Z2:'000000',Z3:'000000',Z4:'FFFFFF',Z5a:'FFFFFF',Z5b:'FFFFFF',Z5c:'FFFFFF'};
  const REST_BG='B0A8D8',HBDR='E8E8E8',SUBHDR='BFBFBF',TOTAL='FFD966',OK='70AD47',NO='D9D9D9',TEK='D0D0D0';
  const ROWS_PER_DAY=18; // sabit blok yüksekliği
  // Çapraz/dinlenme: tek satır, kendine özgü renk
  const SINGLE_ROW={
    dinlenme: ['B0A8D8','FFFFFF','Dinlenme'],
    kuvvet:   ['7C3AED','FFFFFF','💪 Kuvvet'],
    yoga:     ['DB2777','FFFFFF','🧘 Yoga'],
    pilates:  ['EC4899','000000','🤸 Pilates'],
    bisiklet: ['0284C7','FFFFFF','🚴 Bisiklet'],
    yuzme:    ['0891B2','FFFFFF','🏊 Yüzme'],
    kuerek:   ['0369A1','FFFFFF','🚣 Kürek'],
    futbol:   ['15803D','FFFFFF','⚽ Futbol'],
    basketbol:['EA580C','FFFFFF','🏀 Basketbol'],
    diger:    ['64748B','FFFFFF','🏅 Diğer'],
  };
  const thin={style:'thin',color:{argb:'FF000000'}};
  const brd={top:thin,left:thin,bottom:thin,right:thin};

  const flFn=(hex)=>({type:'pattern',pattern:'solid',fgColor:{argb:'FF'+hex}});
  const fnFn=(bold,sz,color)=>({name:'Arial',bold:!!bold,size:sz||10,color:{argb:'FF'+(color||'000000')}});
  const alFn=(h,wrap)=>({horizontal:h||'center',vertical:'middle',wrapText:!!wrap});

  function apC(ws,r,c,opts={}){
    const cell=ws.getCell(r,c);
    if(opts.value!==undefined)cell.value=opts.value;
    if(opts.bg)cell.fill=flFn(opts.bg);
    cell.font=fnFn(opts.bold,opts.sz||10,opts.fg);
    cell.alignment=alFn(opts.h,opts.wrap);
    cell.border=brd;
    return cell;
  }
  function mgC(ws,r1,c1,r2,c2,opts={}){
    ws.mergeCells(r1,c1,r2,c2);
    apC(ws,r1,c1,opts);
    for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){
      const cell=ws.getCell(r,c);
      if(opts.bg)cell.fill=flFn(opts.bg);
      cell.border=brd;
    }
  }

  // ── Pace → Zone ─────────────────────────────────────────────────────────
  // Sporcu bölge verisi varsa kullan, yoksa genel eşik değerleri
  const paceToZone=(paceDk,paceSn,ath)=>{
    const sec=(parseInt(paceDk)||0)*60+(parseInt(paceSn)||0);
    if(sec===0)return 'Z2';
    // Sporcu bölgeleri varsa
    if(ath&&ath.zones&&ath.zones.paceZones&&ath.zones.paceZones.length>=5){
      const pz=ath.zones.paceZones;
      // paceZones: [{min,max,avg},...] sn/km, Z1=0, Z5=4
      for(let i=pz.length-1;i>=0;i--){
        if(sec<=(pz[i].max||999))return ['Z1','Z2','Z3','Z4','Z5a'][i]||'Z5a';
      }
      return 'Z1';
    }
    // Genel eşikler
    if(sec<270)return 'Z5c';
    if(sec<300)return 'Z5b';
    if(sec<330)return 'Z5a';
    if(sec<360)return 'Z4';
    if(sec<420)return 'Z3';
    if(sec<480)return 'Z2';
    return 'Z1';
  };

  const writeDay=(day,c0,baseRow)=>{
    let r=baseRow;
    const endRow=baseRow+ROWS_PER_DAY;
    const letter=(n)=>ws.getColumn(n).letter;

    // Satır 1: Tarih | Gün
    const dateStr=day.date?new Date(day.date+'T12:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'numeric',year:'numeric'}):day.dayTR||'';
    mgC(ws,r,c0,r,c0+2,{value:dateStr,bg:HBDR,bold:true,sz:10});
    mgC(ws,r,c0+3,r,c0+5,{value:day.dayTR||'',bg:HBDR,bold:true,sz:10});
    ws.getRow(r).height=16; r++;

    // Çapraz/dinlenme → tek satır
    const singleDef=SINGLE_ROW[day.tip]||SINGLE_ROW[
      // spor alanıyla eşleştir
      day.spor==='bisiklet'?'bisiklet':day.spor==='yuzme'?'yuzme':
      day.spor==='kuerek'?'kuerek':day.spor==='kuvvet'?'kuvvet':
      day.spor==='yoga'?'yoga':day.spor==='pilates'?'pilates':
      day.spor==='futbol'?'futbol':day.spor==='basketbol'?'basketbol':
      day.tip==='capraz'?'bisiklet':null
    ];

    if(singleDef){
      const[bg,fg,lbl]=singleDef;
      mgC(ws,r,c0,r,c0+5,{value:lbl,bg,bold:true,sz:12,fg});
      ws.getRow(r).height=22; r++;
      // Kalan satırlar boş border
      while(r<endRow){for(let c=c0;c<=c0+5;c++){ws.getCell(r,c).border=brd;}ws.getRow(r).height=13;r++;}
      return;
    }

    // Koşu antrenmanı
    // Satır 2: Ad (2) | Durum (2) | Parkur (2)
    const terrain=athlete?.disiplin==='yol'?'Düzde':athlete?.disiplin==='patika'||athlete?.disiplin==='ultra'?'Patika':'Karma';
    const durum=day.isPast?'Tamamlandı':'Planlandı';
    mgC(ws,r,c0,  r,c0+1,{value:day.baslik||'',bg:SUBHDR,bold:true,sz:9,h:'left'});
    mgC(ws,r,c0+2,r,c0+3,{value:durum,bg:durum==='Tamamlandı'?OK:NO,bold:true,sz:9,fg:durum==='Tamamlandı'?'FFFFFF':'000000'});
    mgC(ws,r,c0+4,r,c0+5,{value:terrain,bg:SUBHDR,bold:true,sz:9});
    ws.getRow(r).height=15; r++;

    // Satır 3: Grup başlıkları
    mgC(ws,r,c0,  r,c0+2,{value:'Süre',bg:SUBHDR,bold:true,sz:9});
    apC(ws,r,c0+3,{value:'Mesafe',bg:SUBHDR,bold:true,sz:9});
    mgC(ws,r,c0+4,r,c0+5,{value:'Koşu Hızı (Pace)',bg:SUBHDR,bold:true,sz:9});
    ws.getRow(r).height=14; r++;

    // Satır 4: Alt başlıklar
    ['saat','dakika','saniye','metre','dakika','saniye'].forEach((lbl,i)=>{
      apC(ws,r,c0+i,{value:lbl,bg:SUBHDR,sz:8});
    });
    ws.getRow(r).height=13; r++;

    // Veri satırları
    const dataRows=[]; let tekrarRow=null;
    (day.yapilar||[]).forEach(y=>{
      const detay=y.detay||'';
      const tekrarMatch=detay.match(/^(\d+)[×x]/);

      if(tekrarMatch){
        for(let i=0;i<6;i++)apC(ws,r,c0+i,{value:null,bg:TEK,sz:9});
        const tek=parseInt(tekrarMatch[1]);
        ws.getCell(r,c0+2).value=tek; ws.getCell(r,c0+2).font=fnFn(true,9); ws.getCell(r,c0+2).fill=flFn(TEK); ws.getCell(r,c0+2).border=brd;
        ws.getCell(r,c0+3).value='X'; ws.getCell(r,c0+3).font=fnFn(true,9); ws.getCell(r,c0+3).fill=flFn(TEK); ws.getCell(r,c0+3).border=brd;
        ws.getRow(r).height=13; tekrarRow=r; r++; return;
      }

      // Pace'i detay'dan çıkar
      let paceDk=null,paceSn=null,metreVal=null;
      const paceAvg=detay.match(/\((\d+):(\d+)\)\s*\/km/);
      const paceRng=detay.match(/(\d+):(\d+)[–\-](\d+):(\d+)\s*\/km/);
      const kmM=detay.match(/([\d.]+)\s*km/);
      const metreM=detay.match(/(\d{3,5})\s*m(?:[^\/]|$)/i);
      const durM=detay.match(/(\d+)\s*dk/);
      if(paceAvg){paceDk=parseInt(paceAvg[1]);paceSn=parseInt(paceAvg[2]);}
      else if(paceRng){const avg=Math.round(((parseInt(paceRng[1])*60+parseInt(paceRng[2]))+(parseInt(paceRng[3])*60+parseInt(paceRng[4])))/2);paceDk=Math.floor(avg/60);paceSn=avg%60;}
      if(metreM)metreVal=parseInt(metreM[1]);
      else if(kmM)metreVal=Math.round(parseFloat(kmM[1])*1000);
      else if(durM&&paceDk){const pSec=paceDk*60+(paceSn||0);if(pSec>0)metreVal=Math.round(parseInt(durM[1])*60/pSec*1000);}

      const zone=paceToZone(paceDk,paceSn,athlete);
      const bg=ZONE_BG[zone]||'34D399'; const fg=ZONE_FG[zone]||'000000';
      const mCol=letter(c0+3),pdCol=letter(c0+4),psCol=letter(c0+5);

      apC(ws,r,c0+3,{value:metreVal,bg,fg,sz:9});
      apC(ws,r,c0+4,{value:paceDk,bg,fg,sz:9,bold:true});
      apC(ws,r,c0+5,{value:paceSn,bg,fg,sz:9,bold:true});

      const tot=`(${mCol}${r}/1000)*(${pdCol}${r}*60+${psCol}${r})`;
      [{col:c0,f:`=INT((${tot})/3600)`},{col:c0+1,f:`=INT(MOD((${tot}),3600)/60)`},{col:c0+2,f:`=ROUND(MOD((${tot}),60),0)`}]
      .forEach(({col,f})=>{const cell=ws.getCell(r,col);cell.value=f;cell.fill=flFn(bg);cell.font=fnFn(false,9,fg);cell.alignment=alFn();cell.border=brd;});

      ws.getRow(r).height=15;
      dataRows.push({row:r,tekrarRow,mCol,pdCol,psCol,c0});
      tekrarRow=null; r++;
    });

    // Toplam başlık
    mgC(ws,r,c0,  r,c0+2,{value:'Toplam Süre',bg:SUBHDR,bold:true,sz:9});
    apC(ws,r,c0+3,{value:'Toplam Mesafe',bg:SUBHDR,bold:true,sz:9});
    mgC(ws,r,c0+4,r,c0+5,{value:'Ort. Koşu Hızı (Pace)',bg:SUBHDR,bold:true,sz:9});
    ws.getRow(r).height=14; r++;

    if(dataRows.length>0){
      const snParts=[],mParts=[];
      dataRows.forEach(d=>{
        let snE=`(${d.mCol}${d.row}/1000)*(${d.pdCol}${d.row}*60+${d.psCol}${d.row})`;
        let mE=`${d.mCol}${d.row}`;
        if(d.tekrarRow){const tekC=ws.getColumn(d.c0+2).letter;snE=`${tekC}${d.tekrarRow}*(${snE})`;mE=`${tekC}${d.tekrarRow}*${mE}`;}
        snParts.push(snE);mParts.push(mE);
      });
      const totSn=snParts.join('+'),totM=mParts.join('+');
      const avgP=`IF((${totM})>0,(${totSn})/((${totM})/1000),0)`;
      [{col:c0,f:`=INT((${totSn})/3600)`},{col:c0+1,f:`=INT(MOD((${totSn}),3600)/60)`},{col:c0+2,f:`=ROUND(MOD((${totSn}),60),0)`},
       {col:c0+3,f:`=${totM}`},{col:c0+4,f:`=INT((${avgP})/60)`},{col:c0+5,f:`=ROUND(MOD((${avgP}),60),0)`}]
      .forEach(({col,f})=>{const cell=ws.getCell(r,col);cell.value=f;cell.fill=flFn(TOTAL);cell.font=fnFn(true,9,'000000');cell.alignment=alFn();cell.border=brd;});
    } else {
      for(let i=0;i<6;i++)apC(ws,r,c0+i,{value:null,bg:TOTAL,bold:true,sz:9});
    }
    ws.getRow(r).height=15; r++;

    // Kalan boş satırlar (sabit 18 satır)
    while(r<endRow){for(let c=c0;c<=c0+5;c++){ws.getCell(r,c).border=brd;}ws.getRow(r).height=13;r++;}
  };

    // Satır 2: Ad (2 sütun) | Durum (2 sütun) | Parkur (2 sütun)
    const terrain=athlete?.disiplin==='yol'?'Düzde':athlete?.disiplin==='patika'||athlete?.disiplin==='ultra'?'Patika':'Karma';
    const durum=day.isPast?'Tamamlandı':'Planlandı';
    mgC(ws,r,c0,  r,c0+1,{value:day.baslik||'',bg:SUBHDR,bold:true,sz:9,h:'left'});
    mgC(ws,r,c0+2,r,c0+3,{value:durum,bg:durum==='Tamamlandı'?OK:NO,bold:true,sz:9,fg:durum==='Tamamlandı'?'FFFFFF':'000000'});
    mgC(ws,r,c0+4,r,c0+5,{value:terrain,bg:SUBHDR,bold:true,sz:9});
    ws.getRow(r).height=15; r++;

    // Satır 3: Grup başlıkları
    mgC(ws,r,c0,  r,c0+2,{value:'Süre',bg:SUBHDR,bold:true,sz:9});
    apC(ws,r,c0+3,{value:'Mesafe',bg:SUBHDR,bold:true,sz:9});
    mgC(ws,r,c0+4,r,c0+5,{value:'Koşu Hızı (Pace)',bg:SUBHDR,bold:true,sz:9});
    ws.getRow(r).height=14; r++;

    // Satır 4: Alt başlıklar
    ['saat','dakika','saniye','metre','dakika','saniye'].forEach((lbl,i)=>{
      apC(ws,r,c0+i,{value:lbl,bg:SUBHDR,sz:8});
    });
    ws.getRow(r).height=13; r++;

    // Veri satırları — yapilar'ı parse et
    const dataRows=[]; let tekrarRow=null;
    (day.yapilar||[]).forEach(y=>{
      // Tekrar satırı tespiti: baslik 'X tekrar' veya detay'da tekrar bilgisi
      const detay=y.detay||'';
      const tekrarMatch=detay.match(/^(\d+)[×x]/);

      if(tekrarMatch){
        // Gri tekrar satırı
        for(let i=0;i<6;i++)apC(ws,r,c0+i,{value:null,bg:TEK,sz:9});
        const tek=parseInt(tekrarMatch[1]);
        ws.getCell(r,c0+2).value=tek;
        ws.getCell(r,c0+2).font=fnFn(true,9);
        ws.getCell(r,c0+2).fill=flFn(TEK);
        ws.getCell(r,c0+2).border=brd;
        ws.getCell(r,c0+3).value='X';
        ws.getCell(r,c0+3).font=fnFn(true,9);
        ws.getCell(r,c0+3).fill=flFn(TEK);
        ws.getCell(r,c0+3).border=brd;
        ws.getRow(r).height=13;
        tekrarRow=r; r++;
        return;
      }

      // Normal veri satırı — pace'i detay'dan çıkar
      let paceDk=null,paceSn=null,metreVal=null;
      const paceAvg=detay.match(/\((\d+):(\d+)\)\s*\/km/);
      const paceRng=detay.match(/(\d+):(\d+)[–\-](\d+):(\d+)\s*\/km/);
      const metreM=detay.match(/(\d+)\s*m(?:[^\/]|$)/i);
      const kmM=detay.match(/([\d.]+)\s*km/);
      const durM=detay.match(/(\d+)\s*dk/);

      if(paceAvg){paceDk=parseInt(paceAvg[1]);paceSn=parseInt(paceAvg[2]);}
      else if(paceRng){
        const avg=Math.round(((parseInt(paceRng[1])*60+parseInt(paceRng[2]))+(parseInt(paceRng[3])*60+parseInt(paceRng[4])))/2);
        paceDk=Math.floor(avg/60);paceSn=avg%60;
      }
      // mesafe: önce metre, sonra km
      if(metreM)metreVal=parseInt(metreM[1]);
      else if(kmM)metreVal=Math.round(parseFloat(kmM[1])*1000);
      else if(durM&&paceDk){
        const durSn=parseInt(durM[1])*60;
        const pSec=paceDk*60+(paceSn||0);
        if(pSec>0)metreVal=Math.round(durSn/pSec*1000);
      }

      // Zone ve renk
      const zone=paceToZone(paceDk,paceSn,athlete);
      const bg=ZONE_BG[zone]||'34D399';
      const fg=ZONE_FG[zone]||'000000';

      // Sütun harfleri
      const mCol=letter(c0+3),pdCol=letter(c0+4),psCol=letter(c0+5);
      const saCol=letter(c0),daCol=letter(c0+1),snCol=letter(c0+2);

      // INPUT: mesafe + pace
      apC(ws,r,c0+3,{value:metreVal,bg,fg,sz:9});
      apC(ws,r,c0+4,{value:paceDk,bg,fg,sz:9,bold:true});
      apC(ws,r,c0+5,{value:paceSn,bg,fg,sz:9,bold:true});

      // HESAPLANAN: saat/dk/sn formülle
      const tot=`(${mCol}${r}/1000)*(${pdCol}${r}*60+${psCol}${r})`;
      [{col:c0,  f:`=INT((${tot})/3600)`},
       {col:c0+1,f:`=INT(MOD((${tot}),3600)/60)`},
       {col:c0+2,f:`=ROUND(MOD((${tot}),60),0)`}
      ].forEach(({col,f})=>{
        const cell=ws.getCell(r,col);
        cell.value=f; cell.fill=flFn(bg);
        cell.font=fnFn(false,9,fg); cell.alignment=alFn(); cell.border=brd;
      });

      ws.getRow(r).height=15;
      dataRows.push({row:r,tekrarRow,mCol,pdCol,psCol,c0});
      tekrarRow=null; r++;
    });

    // Toplam başlık
    mgC(ws,r,c0,  r,c0+2,{value:'Toplam Süre',bg:SUBHDR,bold:true,sz:9});
    apC(ws,r,c0+3,{value:'Toplam Mesafe',bg:SUBHDR,bold:true,sz:9});
    mgC(ws,r,c0+4,r,c0+5,{value:'Ort. Koşu Hızı (Pace)',bg:SUBHDR,bold:true,sz:9});
    ws.getRow(r).height=14; r++;

    // Toplam değerler — formülle
    if(dataRows.length>0){
      const snParts=[],mParts=[];
      dataRows.forEach(d=>{
        let snE=`(${d.mCol}${d.row}/1000)*(${d.pdCol}${d.row}*60+${d.psCol}${d.row})`;
        let mE=`${d.mCol}${d.row}`;
        if(d.tekrarRow){
          const tekC=ws.getColumn(d.c0+2).letter;
          snE=`${tekC}${d.tekrarRow}*(${snE})`;
          mE=`${tekC}${d.tekrarRow}*${mE}`;
        }
        snParts.push(snE); mParts.push(mE);
      });
      const totSn=snParts.join('+'),totM=mParts.join('+');
      const avgP=`IF((${totM})>0,(${totSn})/((${totM})/1000),0)`;
      [
        {col:c0,  f:`=INT((${totSn})/3600)`},
        {col:c0+1,f:`=INT(MOD((${totSn}),3600)/60)`},
        {col:c0+2,f:`=ROUND(MOD((${totSn}),60),0)`},
        {col:c0+3,f:`=${totM}`},
        {col:c0+4,f:`=INT((${avgP})/60)`},
        {col:c0+5,f:`=ROUND(MOD((${avgP}),60),0)`},
      ].forEach(({col,f})=>{
        const cell=ws.getCell(r,col);
        cell.value=f; cell.fill=flFn(TOTAL);
        cell.font=fnFn(true,9,'000000'); cell.alignment=alFn(); cell.border=brd;
      });
    } else {
      for(let i=0;i<6;i++)apC(ws,r,c0+i,{value:0,bg:TOTAL,bold:true,sz:9});
    }
    ws.getRow(r).height=15; r++;

  // ── Günleri çiftler halinde yaz ─────────────────────────────────────────
  // Sol: Pzt/Çar/Cum/Paz  |  Sağ: Sal/Per/Cmt  — her blok tam ROWS_PER_DAY satır
  const allDays=[];
  plan.weeks.forEach(wk=>wk.days.forEach(d=>allDays.push(d)));
  const byDayName={};
  allDays.forEach(d=>{if(d.dayTR)byDayName[d.dayTR]=d;});

  const LEFT_DAYS=['Pazartesi','Çarşamba','Cuma','Pazar'];
  const RIGHT_DAYS=['Salı','Perşembe','Cumartesi',''];

  let currentRow=1;
  for(let i=0;i<LEFT_DAYS.length;i++){
    const lDay=byDayName[LEFT_DAYS[i]];
    const rDay=byDayName[RIGHT_DAYS[i]];
    if(lDay)writeDay(lDay,1,currentRow);
    if(rDay)writeDay(rDay,9,currentRow);
    currentRow+=ROWS_PER_DAY;
  }

  if(wb.worksheets.length===0){alert('Plan verisi bulunamadı.');return;}
  ws.pageSetup={orientation:'landscape',paperSize:9};
  ws.pageMargins={left:0.5,right:0.5,top:0.5,bottom:0.5};

  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const dateStr=new Date().toISOString().slice(0,10);
  a.href=url; a.download=`haftalik_plan_${dateStr}.xlsx`; a.click();
  URL.revokeObjectURL(url);
} // exportHaftalikPlanXLSX sonu

// Haftalık plandaki antrenman tipini → ANTRENMAN_TURLERI v değerine çevir
function planTipToTur(planTip, baslik=''){
  const b=(baslik||'').toLowerCase();
  // Başlıktan önce eşleştir — daha spesifik
  if(b.includes('piramit'))   return 'piramit';
  if(b.includes('cruise'))    return 'cruise';
  if(b.includes('progressive'))return 'progressive';
  if(b.includes('on-off')||b.includes('fartlek')) return 'on_off';
  if(b.includes('tempo interval')) return 'tempo_interval';
  if(b.includes('yarış temposu')||b.includes('race pace')) return 'yaris_tempo';
  if(b.includes('hill sprint')) return 'hill_sprint';
  if(b.includes('strides')||b.includes('açıcı')) return 'strides';
  if(b.includes('kısa yokuş')) return 'yokus_kisa';
  if(b.includes('uzun yokuş')) return 'yokus_uzun';
  // Sonra tip'ten eşleştir
  const map={
    kolay:'kolay',aerobik:'aerobik',uzun:'uzun',
    tempo:'tempo',esik:'esik',interval:'interval',
    yokus_kisa:'yokus_kisa',yokus_uzun:'yokus_uzun',
    tirmanis:'tirmanis',teknik:'teknik',acici:'strides',
    capraz:'capraz',dinlenme:'',
  };
  return map[planTip]||planTip||'';
}

// Plan gününden tur ve yapi_notu çıkar
function planDayToForm(day){
  if(!day||day.tip==='dinlenme')return{tur:'',yapi_notu:''};
  const tur=planTipToTur(day.tip, day.baslik||'');

  // yapilar içinden ana antrenman bloğunu bul (ısınma/soğuma hariç)
  const mainBlok=(day.yapilar||[]).find(y=>{
    const d=(y.detay||'').toLowerCase();
    const b=(y.baslik||'').toLowerCase();
    return !b.includes('ısınma')&&!b.includes('soğuma')&&!b.includes('dinlenme')&&d.length>5;
  });

  let yapi_notu='';
  if(mainBlok){
    const detay=mainBlok.detay||'';
    // Piramit: "1–2–3–2–1 dk" veya "2–3–4–5–4–3–2 dk"
    const pir=detay.match(/(\d+[–\-])+\d+\s*dk/);
    if(pir){yapi_notu=pir[0].trim();}
    // NxM pattern: "4×3 dk", "6×4 dk + 6×2 dk", "2×15 dk"
    else {
      const nx=detay.match(/(\d+[×x]\d+(?:\s*dk)?(?:\s*[+]\s*\d+[×x]\d+\s*dk)?)/);
      if(nx) yapi_notu=nx[0].replace(/\s+/g,' ').trim();
    }
    // Süre: "20 dk sürekli" gibi
    if(!yapi_notu){
      const s=detay.match(/(\d+)\s*dk/);
      if(s) yapi_notu=s[1]+' dk';
    }
  }

  // Eşleşen yapi_notu yoksa — YAPI_NOTLARI listesinden ilkini ver
  if(!yapi_notu){
    const notlar=YAPI_NOTLARI[tur]||[];
    if(notlar.length) yapi_notu=notlar[0];
  }

  return{tur,yapi_notu};
}

  const [form,setForm]=useState({...EMPTY_W});

  const durSec=toSec(form.sure_sa,form.sure_dk,form.sure_sn);
  const selectedAth=athletes.find(a=>a.id===selId)||null;
  const history=allHistory?.[selId]||[];

  // Sporcu veya tarih değişince → o günün önerilen antrenmanını çek
  React.useEffect(()=>{
    if(!selId||!form.date)return;
    const selAth=athletes.find(a=>a.id===selId);
    if(!selAth)return;
    if(!selAth.kosu_gunleri||selAth.kosu_gunleri.length===0){setPlanOneri(null);return;}
    try{
      const athWorkouts=(workouts||[]).filter(w=>w.athleteId===selId);
      const athHistory=(allHistory&&allHistory[selId])||[];
      const athRaceIds=(selAth.yarıslar||[]).map(x=>typeof x==='string'?x:x.id);
      const athRaces=(races||[]).filter(r=>athRaceIds.includes(r.id));

      // Seçilen tarih için günün planını bul
      // generateTwoWeekPlan'dan o günü çek — en güvenilir yol
      const plan=generateTwoWeekPlan(selAth,athHistory,athRaces,athWorkouts,testPlanlar||[]);
      if(!plan?.weeks){setPlanOneri(null);return;}

      const allDays=plan.weeks.flatMap(w=>w.days);
      const gunPlan=allDays.find(d=>d.date===form.date);

      if(!gunPlan||gunPlan.tip==='dinlenme'||!gunPlan.yapilar?.length){
        // Plan bulunamadıysa veya dinlenmeyse → recommendWorkout ile dene (bugün için)
        const today=new Date();

        if(form.date===todayStr){

              tur:planTipToTur(rec.tip),yapi_notu:planDayToForm(rec)?.yapi_notu||''});
            return;
          }
        }
        setPlanOneri(null);return;
      }

      const oneri=planDayToForm(gunPlan);
      setPlanOneri({baslik:gunPlan.baslik,tip:gunPlan.tip,sure_dk:gunPlan.sure_dk,

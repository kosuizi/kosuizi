function tplUzun(band, ctl, zones, disiplin, dpHedef, recentLongRuns){
  const isUltra=disiplin==='ultra';
  const isPatika=disiplin==='patika'||disiplin==='ultra'||disiplin==='karma';

  // в”Җв”Җ Band bazlДұ maksimum tavan (faz/band sДұnДұrДұ) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const bandMax=isUltra
    ?(band<=1?80:band===2?100:band===3?130:band===4?160:200)
    :(band<=1?60:band===2?75:band===3?90:band===4?110:130);

  // в”Җв”Җ Son uzun koЕҹulardan progresyon hesapla в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  // recentLongRuns: son 6 haftanДұn uzun koЕҹularДұ [{date, sure_dk}], yeniden eskiye
  let dk = bandMax; // veri yoksa band tablosunu kullan
  let progressNote = '';

  if(recentLongRuns && recentLongRuns.length > 0){
    const sonUzun = recentLongRuns[0].sure_dk || 0;

    if(sonUzun > 0){
      // Geri Г§ekme haftasДұ: son 3 ardДұЕҹДұk haftada artДұЕҹ varsa
      const son3 = recentLongRuns.slice(0, 3);
      const ardiArdina = son3.length >= 3 &&
        son3[0].sure_dk > son3[1].sure_dk &&
        son3[1].sure_dk > son3[2].sure_dk;

      if(ardiArdina){
        // 3 ardДұЕҹДұk artДұЕҹ вҶ’ geri Г§ekme: son uzunun %72'si
        dk = Math.round(sonUzun * 0.72);
        progressNote = `в¬Ү Geri Г§ekme haftasДұ (3 ardДұЕҹДұk artДұЕҹ sonrasДұ) вҖ” ${sonUzun}dk Г— 0.72`;
      } else {
        // Normal: son uzun + %8-12 artДұЕҹ
        // Faza gГ¶re artДұЕҹ oranДұ: Zirve daha agresif, Taper sДұfДұr
        const artisOran = 0.10; // sabit %10
        const artis = Math.max(10, Math.round(sonUzun * artisOran));
        dk = Math.min(bandMax, sonUzun + artis);
        progressNote = `в¬Ҷ Son: ${sonUzun}dk + ${artis}dk artДұЕҹ`;
      }

      // Tavan kontrolГј
      if(dk > bandMax){
        dk = bandMax;
        progressNote += ` (tavan: ${bandMax}dk)`;
      }
      // Alt sДұnДұr: son uzunun %65'inden dГјЕҹme
      const minDk = Math.round(sonUzun * 0.65);
      if(dk < minDk){
        dk = minDk;
        progressNote += ` (alt sДұnДұr korumasДұ)`;
      }
    }
  }

  const parts=[
    {baslik:'IsДұnma',detay:`15 dk вҖ” ${zoneInfoZ1(zones)||'Z1 kolay'}`},
    {baslik:'Uzun KoЕҹu',detay:`${dk-15} dk вҖ” ${zoneInfo(zones,1)||'Z2 aerobik'}${isPatika?' вҖ” arazi tercihli':''}${dpHedef>0?' В· Hedef D+: ~'+dpHedef+'m':''}${isUltra?' В· Dik tДұrmanДұЕҹlarda yГјrГјyГјЕҹ stratejisi uygula':''}${progressNote?' В· '+progressNote:''}`.trim()},
    {baslik:'SoДҹuma',detay:`5 dk вҖ” ${zoneInfoZ1(zones)||'Z1'}`},
  ];
  if(band>=4&&disiplin!=='yol') parts.splice(2,0,{baslik:'Ek TДұrmanДұЕҹ',detay:`Son 20 dk iГ§inde ${dpHedef>0?'en az '+Math.round(dpHedef*0.3)+'m tДұrmanДұЕҹ':'mГјmkГјn olduДҹunca tДұrmanДұЕҹ'} ekle вҖ” nabДұz ${zoneInfo(zones,2)||'Z3'} bandДұna Г§Дұkabilir`});
  return{tip:'uzun',sure_dk:dk,yapilar:parts,dpHedef};
}

function tplInterval(band, phase, zones){
  const sure_dk=band<=2?45:band===3?50:band===4?55:60;
  const z5a=zoneInfo(zones,4)||'Z5a VOвӮӮmax';

  // Faz + band kombinasyonuyla ilerleyen yapДұ

  }[phase]||{b12:`4Г—3 dk вҖ” ${z5a} В· 3 dk`,b3:`5Г—4 dk вҖ” ${z5a}`,b45:`6Г—3 dk вҖ” ${z5a}`};
  const blok=band<=2?cfg.b12:band===3?cfg.b3:cfg.b45;
  const strides=band<=2?'4Г—80m':band===3?'4Г—100m':'6Г—100m';
  // Д°nterval seviyesi: faz + band kombinasyonuna gГ¶re
  const intervalSeviye={
    'Temel_12':'S1','Temel_3':'S2','Temel_45':'S3',

// в”Җв”Җ Kesintisiz Piramit в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// HiГ§ durmadan: dГјЕҹГјk tempo вҶ’ artan yoДҹunluk вҶ’ zirve вҶ’ azalan yoДҹunluk
// YarДұЕҹta sГјrekli tempo deДҹiЕҹimlerine adaptasyon iГ§in ideal
function tplKesintisizPiramit(band, zones, phase='GeliЕҹme'){
  const z2=zoneInfo(zones,1)||'Z2'; const z3=zoneInfo(zones,2)||'Z3';

  const seg={
    'Temel':{
      b12:`5 dk ${z2} вҶ’ 4 dk ${z3} вҶ’ 3 dk ${z4} вҶ’ 4 dk ${z3} вҶ’ 5 dk ${z2}`,
      b3: `4 dk ${z2} вҶ’ 4 dk ${z3} вҶ’ 4 dk ${z4} вҶ’ 4 dk ${z3} вҶ’ 4 dk ${z2}`,
      b45:`5 dk ${z2} вҶ’ 4 dk ${z3} вҶ’ 5 dk ${z4} вҶ’ 4 dk ${z3} вҶ’ 5 dk ${z2}`,
      sure_b12:26, sure_b3:24, sure_b45:28
    },
    'GeliЕҹme':{
      b12:`6 dk ${z2} вҶ’ 4 dk ${z3} вҶ’ 4 dk ${z4} вҶ’ 2 dk ${z5a} вҶ’ 4 dk ${z4} вҶ’ 4 dk ${z3} вҶ’ 6 dk ${z2}`,
      b3: `5 dk ${z2} вҶ’ 4 dk ${z3} вҶ’ 5 dk ${z4} вҶ’ 3 dk ${z5a} вҶ’ 5 dk ${z4} вҶ’ 4 dk ${z3} вҶ’ 5 dk ${z2}`,
      b45:`6 dk ${z2} вҶ’ 5 dk ${z3} вҶ’ 5 dk ${z4} вҶ’ 4 dk ${z5a} вҶ’ 5 dk ${z4} вҶ’ 5 dk ${z3} вҶ’ 6 dk ${z2}`,
      sure_b12:36, sure_b3:38, sure_b45:42
    },
    'Zirve':{
      b12:`5 dk ${z2} вҶ’ 5 dk ${z3} вҶ’ 5 dk ${z4} вҶ’ 4 dk ${z5a} вҶ’ 5 dk ${z4} вҶ’ 5 dk ${z3} вҶ’ 5 dk ${z2}`,
      b3: `6 dk ${z2} вҶ’ 5 dk ${z3} вҶ’ 6 dk ${z4} вҶ’ 5 dk ${z5a} вҶ’ 6 dk ${z4} вҶ’ 5 dk ${z3} вҶ’ 6 dk ${z2}`,
      b45:`6 dk ${z2} вҶ’ 6 dk ${z3} вҶ’ 6 dk ${z4} вҶ’ 6 dk ${z5a} вҶ’ 6 dk ${z4} вҶ’ 6 dk ${z3} вҶ’ 6 dk ${z2}`,
      sure_b12:42, sure_b3:45, sure_b45:48

  }[phase]||{b12:'5 dk Z2 вҶ’ 4 dk Z3 вҶ’ 3 dk Z4 вҶ’ 4 dk Z3 вҶ’ 5 dk Z2',b3:'4 dk Z2 вҶ’ 4 dk Z3 вҶ’ 4 dk Z4 вҶ’ 4 dk Z3 вҶ’ 4 dk Z2',b45:'5 dk Z2 вҶ’ 4 dk Z3 вҶ’ 5 dk Z4 вҶ’ 4 dk Z3 вҶ’ 5 dk Z2',sure_b12:26,sure_b3:24,sure_b45:28};
  const blok=band<=2?seg.b12:band===3?seg.b3:seg.b45;
  const sure=band<=2?seg.sure_b12:band===3?seg.sure_b3:seg.sure_b45;
  const kpLevel={'Temel':'S1','GeliЕҹme':'S2','Zirve':'S3'};
  const seviyeKP=kpLevel[phase]||'';
  const yapiNotuKP=seviyeKP?`Kesintisiz Piramit В· ${seviyeKP} вҖ” ${phase}`:'';
  return{
    tip:'kesintisiz_piramit', sure_dk:sure+20,

      {baslik:'SoДҹuma',detay:`10 dk Z1 hafif koЕҹu + esneme`},
    ]
  };
}

function tplOnOff(band, zones, phase='GeliЕҹme'){
  const z5a=zoneInfo(zones,4)||'Z5a'; const z2=zoneInfo(zones,1)||'Z2';
  const cfg={
    'Temel':   {sets:band<=2?'6 set':band===3?'8 set':'10 set',  acik:'30sn', kapali:'45sn', tur:2, sure:band<=2?32:38},
    'GeliЕҹme': {sets:band<=2?'8 set':band===3?'10 set':'12 set', acik:'30sn', kapali:'30sn', tur:3, sure:band<=2?38:44},
    'Zirve':   {sets:band<=2?'10 set':band===3?'12 set':'15 set',acik:'40sn', kapali:'20sn', tur:3, sure:band<=2?44:50},
  }[phase]||{sets:'8 set',acik:'30sn',kapali:'30sn',tur:2,sure:38};
  const onoffLevel={'Temel_12':'S1','Temel_3':'S2','Temel_45':'S3','GeliЕҹme_12':'S4','GeliЕҹme_3':'S5','GeliЕҹme_45':'S6','Zirve_12':'S7','Zirve_3':'S8','Zirve_45':'S9'};
  const onoffKey=`${phase}_${band<=2?'12':band===3?'3':'45'}`;

function calcGAP(dpM, distKm, sure_dk){
  if(!dpM||!distKm||dpM<=0||distKm<=0)return null;
  // Ortalama eДҹim %
  const grade=Math.min(40,(dpM/(distKm*1000))*100);
  if(grade<2)return null; // %2 altДұ dГјzeltme gerekmiyor
  // Minetti simplified: GAP_factor = 1 + 0.033*grade (yokuЕҹ yukarДұ iГ§in)
  // Daha doДҹru versiyon (Strava benzeri):
  // factor = 0.033*g + 0.00055*g^2 (g = grade %)
  const factor=1+(0.033*grade+0.00055*grade*grade)/100*100;
  return{grade:Math.round(grade*10)/10, factor:Math.round(factor*100)/100};
}

// Flat pace (sn/km) вҶ’ beklenen gerГ§ek tДұrmanДұЕҹ pace'i (sn/km)
function gapToActualPace(flatPaceSec, gapFactor){
  if(!flatPaceSec||!gapFactor)return null;
  const actualSec=flatPaceSec*gapFactor;
  const m=Math.floor(actualSec/60);
  const s=Math.round(actualSec%60);
  return`${m}:${String(s).padStart(2,'0')}`;
}

// TДұrmanДұЕҹ antrenmanДұ iГ§in GAP bilgisi Гјret
function gapInfo(dpHedef, sure_dk, zones, zone_idx){
  if(!dpHedef||dpHedef<=0)return'';
  const estDistKm=Math.max(2,(sure_dk||60)/9);
  const gap=calcGAP(dpHedef,estDistKm,sure_dk);
  if(!gap)return'';
  const flatPace=zones?.paceZones?.[zone_idx];
  if(flatPace){
    const loSec=paceToSec(flatPace.lo_pace);
    const hiSec=paceToSec(flatPace.hi_pace);
    if(loSec&&hiSec){
      const actLo=gapToActualPace(loSec,gap.factor);
      const actHi=gapToActualPace(hiSec,gap.factor);
      const actAvg=actLo&&actHi?secToPace((paceToSec(actLo)+paceToSec(actHi))/2):null;
      return` В· TДұrmanДұЕҹta beklenen pace: ${actLo}вҖ“${actHi}${actAvg?` (${actAvg})`:''}/km (ort. %${gap.grade} eДҹim, GAP Г—${gap.factor})`;
    }
  }
  return` В· Ort. eДҹim: ~%${gap.grade} вҶ’ Flat pace hedefini Г—${gap.factor} ile Г§arp`;
}



function tplTirmanisAcik(band, sure_dk, zones, dpHedef){
  // GerГ§ekГ§i D+ cap: antrenman sГјresinin %55'i tДұrmanДұЕҹta geГ§se ulaЕҹДұlabilecek max
  const maxDpForSure=Math.round(realisticClimbRate(band)/60*(sure_dk*0.55));
  if(dpHedef>0) dpHedef=Math.min(dpHedef,maxDpForSure);

  // в”Җв”Җ GerГ§ekГ§i sГјre hesabДұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  let adjustedSure=sure_dk;
  let durationNote='';
  if(dpHedef>0){
    const climbRatePerMin=realisticClimbRate(band)/60;
    const minDkForDp=Math.ceil(dpHedef/climbRatePerMin);
    const minTotal=Math.ceil(minDkForDp/0.70);
    if(minTotal>sure_dk){
      adjustedSure=minTotal;
      durationNote=` (D+ hedefi iГ§in sГјre ${sure_dk}dk'dan ${minTotal}dk'ya ayarlandДұ вҖ” Band ${band} iГ§in tДұrmanДұЕҹ hДұzДұ ~${realisticClimbRate(band)}m/sa)`;
    }
  }

  // NabДұz hedefi вҖ” Z2вҖ“Z3
  const hrZ2=zones?.hrZones?.[1];
  const hrZ3=zones?.hrZones?.[2];
  const hrStr=hrZ2?.lo_bpm&&hrZ3?.hi_bpm?`${hrZ2.lo_bpm}вҖ“${hrZ3.hi_bpm} bpm (Z2вҖ“Z3)`:'Z2вҖ“Z3 nabДұz';

  // Pace hedefi (GAP ile)
  const flatPaceStr=pz(zones,2)||pz(zones,1)||'Z2вҖ“Z3 pace';
  const gap=dpHedef>0?calcGAP(dpHedef,Math.max(2,(adjustedSure||60)/9),adjustedSure):null;
  let paceDetay;
  if(gap&&zones?.paceZones){
    const z2lo=paceToSec(zones.paceZones[1]?.lo_pace);
    const z3hi=paceToSec(zones.paceZones[2]?.hi_pace);
    const actLo=z2lo?gapToActualPace(z2lo,gap.factor):null;
    const actHi=z3hi?gapToActualPace(z3hi,gap.factor):null;
    const actAvg=actLo&&actHi?secToPace((paceToSec(actLo)+paceToSec(actHi))/2):null;
    const actAvgSec=actLo&&actHi?Math.round((paceToSec(actLo)+paceToSec(actHi))/2):null;
    paceDetay=actLo&&actHi
      ?`Flat eЕҹdeДҹer: ${flatPaceStr} вҖ” TДұrmanДұЕҹta beklenen pace: ${actLo}вҖ“${actHi}${actAvg?` (${actAvg})`:''}/km (ort. %${gap.grade} eДҹim)`
      :`${flatPaceStr} efor hissiyle В· %${gap.grade} ort. eДҹimde pace daha yavaЕҹ olacak`;
  } else if(dpHedef>0){
    paceDetay=`${flatPaceStr} efor hissiyle вҖ” yokuЕҹta gerГ§ek pace daha yavaЕҹ olacak`;
  } else {
    paceDetay=`${flatPaceStr} efor hissiyle`;
  }

  // Ortalama tДұrmanДұЕҹ pace saniyesi вҖ” tablo iГ§in
  const tirAvgPaceSec=(()=>{
    if(gap&&zones?.paceZones){
      const z2lo=paceToSec(zones.paceZones[1]?.lo_pace);
      const z3hi=paceToSec(zones.paceZones[2]?.hi_pace);
      const actLo2=z2lo?gapToActualPace(z2lo,gap.factor):null;
      const actHi2=z3hi?gapToActualPace(z3hi,gap.factor):null;
      if(actLo2&&actHi2) return Math.round((paceToSec(actLo2)+paceToSec(actHi2))/2);
    }
    return null;
  })();

  return{
    tip:'tirmanis', sure_dk:adjustedSure,
    yapilar:[
      {baslik:'IsДұnma',detay:`10 dk вҖ” ${zoneInfoZ1(zones)||'Z1 kolay'} dГјz`},
      {baslik:'TДұrmanДұЕҹ KoЕҹusu',detay:`${adjustedSure-10} dk вҖ” NabДұz: ${hrStr} В· ${paceDetay} В· Hedef D+: ${dpHedef>0?'~'+dpHedef+'m':'maksimum'} В· TДұrmanДұЕҹta gГјГ§ adДұmДұ, iniЕҹte kontrollГј teknik${durationNote}`,_tirmanisAna:true,_tirAvgPaceSec:tirAvgPaceSec},
      {baslik:'SoДҹuma',detay:`5 dk вҖ” ${zoneInfoZ1(zones)||'Z1'}`},
      {baslik:'рҹ’Ў IsДұnma/SoДҹuma Notu',detay:'IsДұnma ve soДҹuma dГјzde koЕҹulmuyorsa (patika/yokuЕҹ) nabДұz hedeflerine dikkat edin вҖ” Z1 bandДұnda kalmak zor olabilir, tempo yerine nabzДұ baz alДұn'},
    ],
    dpHedef, gap
  };
}
